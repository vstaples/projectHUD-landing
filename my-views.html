<!-- my-views.html — Compass My Views module -->
<!-- Exports: window._viewsLoadView, window._viewsRefresh -->
<!-- Injected into #views-root inside utc-views tab -->

<style>
/* ── Shell ───────────────────────────────────────────────────────────────── */
#views-shell{display:grid;grid-template-columns:var(--notes-left-w,260px) 4px 1fr;height:calc(100vh - 120px);overflow:hidden;background:var(--bg0,#060a10)}

/* ── Left panel ──────────────────────────────────────────────────────────── */
#views-left{display:flex;flex-direction:column;overflow:hidden}
#views-splitter{width:4px;background:rgba(0,210,255,.08);cursor:col-resize;flex-shrink:0;transition:background .15s;position:relative;z-index:10}
#views-splitter:hover,#views-splitter.dragging{background:rgba(0,210,255,.35)}
#views-splitter::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:1px;height:32px;background:rgba(0,210,255,.3);border-radius:1px}
#views-left-header{padding:10px 14px;border-bottom:1px solid rgba(0,210,255,.08);flex-shrink:0}
#views-search:focus{border-color:rgba(0,210,255,.35)}
#views-search::placeholder{color:var(--text3,#6A94B8)}
#views-new-btn{width:100%;background:none;border:1px dashed rgba(0,210,255,.2);color:rgba(0,210,255,.5);font-family:var(--font-head,'Barlow Condensed',sans-serif);font-size:11px;letter-spacing:.07em;padding:5px;cursor:pointer;transition:all .12s;text-transform:uppercase}
#views-new-btn:hover{border-color:rgba(0,210,255,.5);color:#00D2FF;background:rgba(0,210,255,.04)}

/* ── Inbox section ───────────────────────────────────────────────────────── */
#views-inbox-section{flex-shrink:0;border-bottom:1px solid rgba(0,210,255,.08)}
.views-section-hdr{padding:6px 14px;font-family:var(--font-ui,sans-serif);font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text2,#90B8D8);display:flex;align-items:center;gap:6px;cursor:pointer;user-select:none}
.views-section-hdr:hover{color:var(--text2,#90B8D8)}
.views-inbox-count{font-family:var(--font-mono,monospace);font-size:11px;padding:1px 5px;background:rgba(0,210,255,.1);color:#00D2FF;border:0.5px solid rgba(0,210,255,.2);border-radius:2px;margin-left:auto}
#views-inbox-list{max-height:180px;overflow-y:auto}#views-inbox-list .views-item{padding-left:24px}

/* ── Tree section ────────────────────────────────────────────────────────── */
#views-tree-section{flex:1;overflow:hidden;display:flex;flex-direction:column}
#views-tree-scroll{flex:1;overflow-y:auto;padding-bottom:16px}

/* ── Left panel items ────────────────────────────────────────────────────── */
.views-item{padding:6px 14px 6px 14px;cursor:pointer;display:flex;align-items:flex-start;gap:8px;border-left:2px solid transparent;transition:all .1s}
.views-item:hover{background:rgba(0,210,255,.03);border-left-color:rgba(0,210,255,.15)}
.views-item-del{width:14px;height:14px;background:none;border:none;color:rgba(226,75,74,0);
  cursor:pointer;font-size:12px;padding:0;flex-shrink:0;line-height:1;transition:color .1s}
.views-item:hover .views-item-del{color:rgba(226,75,74,.5)}
.views-item-del:hover{color:#E24B4A!important}
.views-item.active{background:rgba(0,210,255,.06);border-left-color:#00D2FF}
.views-item.in-grid{background:rgba(0,210,255,.05);border-left-color:#00D2FF}.views-item.in-grid .views-item-title{color:rgba(0,210,255,.7)}.views-slot-badge{font-family:var(--font-mono,monospace);font-size:11px;padding:1px 5px;background:rgba(0,210,255,.15);border:0.5px solid rgba(0,210,255,.4);color:#00D2FF;border-radius:2px;flex-shrink:0;margin-top:2px}
.views-item-body{flex:1;min-width:0}
.views-item-title{font-family:var(--font-ui,sans-serif);font-size:12px;font-weight:400;color:var(--text1,#C8DFF0);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3}
.views-item-meta{font-family:var(--font-mono,monospace);font-size:10px;color:var(--text3,#6A94B8);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.views-item-source{font-family:var(--font-mono,monospace);font-size:11px;padding:1px 5px;background:rgba(255,255,255,.06);border:0.5px solid rgba(255,255,255,.1);color:var(--text3);border-radius:2px;flex-shrink:0;margin-top:2px}

/* ── Tree nodes ──────────────────────────────────────────────────────────── */
.views-branch{padding:5px 14px;font-family:var(--font-ui,'Barlow Condensed',sans-serif);font-size:13px;font-weight:700;color:var(--text0,#F0F6FF);cursor:pointer;display:flex;align-items:center;gap:6px;user-select:none;letter-spacing:.02em}
.views-branch-label,.views-subbranch-label{flex:1;outline:none;cursor:text}
.views-branch-label:focus,.views-subbranch-label:focus{color:var(--text0,#F0F6FF)}
.views-branch-add{width:14px;height:14px;background:none;border:none;color:var(--text3);cursor:pointer;font-size:12px;padding:0;opacity:0;transition:opacity .1s;flex-shrink:0;line-height:1}
.views-branch-del{width:14px;height:14px;background:none;border:none;color:rgba(226,75,74,.5);cursor:pointer;font-size:11px;padding:0;opacity:0;transition:opacity .1s;flex-shrink:0;line-height:1}
.views-branch:hover .views-branch-add,.views-branch:hover .views-branch-del,
.views-subbranch:hover .views-branch-add,.views-subbranch:hover .views-branch-del{opacity:1}
.views-add-root{padding:4px 14px;font-family:var(--font-ui,'Barlow Condensed',sans-serif);font-size:11px;color:rgba(0,210,255,.4);cursor:pointer;display:flex;align-items:center;gap:5px;border:none;background:none;width:100%;transition:color .12s}
.views-add-root:hover{color:#00D2FF}
.views-drop-target{background:rgba(0,210,255,.08)!important;border-left:2px solid rgba(0,210,255,.6)!important}.views-children.views-drop-target{background:transparent!important;border-left:none!important}
.views-drop-before{position:relative}
.views-drop-before::before{content:'';position:absolute;left:0;right:0;top:-1px;height:2px;
  background:#00D2FF;z-index:10;pointer-events:none;
  box-shadow:0 0 6px rgba(0,210,255,.6)}
.views-drop-after{position:relative}
.views-drop-after::after{content:'';position:absolute;left:0;right:0;bottom:-1px;height:2px;
  background:#00D2FF;z-index:10;pointer-events:none;
  box-shadow:0 0 6px rgba(0,210,255,.6)}
.views-branch:hover{color:var(--text0,#F0F6FF)}
.views-subbranch{padding:4px 14px 4px 26px;font-family:var(--font-ui,sans-serif);font-size:12px;font-weight:600;color:var(--text2,#90B8D8);cursor:pointer;display:flex;align-items:center;gap:6px;user-select:none}
.views-subbranch:hover{color:var(--text2)}
.views-chevron{width:10px;height:10px;transition:transform .15s;flex-shrink:0;opacity:.7;color:var(--text2,#90B8D8)}
.views-chevron.open{transform:rotate(90deg)}
.views-branch .views-chevron{opacity:.8;color:var(--text0,#F0F6FF)}
.views-children{overflow:hidden}
.views-branch-items .views-item{padding-left:28px}
.views-subbranch-items .views-item{padding-left:40px}

/* ── Grid workspace ──────────────────────────────────────────────────────── */
#views-right{display:flex;flex-direction:column;overflow:hidden}
#views-grid-header{padding:6px 16px;border-bottom:1px solid rgba(0,210,255,.08);display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px;flex-shrink:0}
#views-header-user{font-family:var(--font-ui,'Barlow Condensed',sans-serif);font-size:20px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#EF9F27;white-space:nowrap;pointer-events:none;text-align:center;justify-self:center;min-width:1px;visibility:hidden}
#views-header-user.has-name{visibility:visible}
#views-grid-label{font-family:var(--font-mono,monospace);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);flex:1}
.views-grid-btn{font-family:var(--font-ui,'Barlow Condensed',sans-serif);font-size:13px;padding:3px 8px;background:none;border:1px solid rgba(255,255,255,.12);color:var(--text3);cursor:pointer;transition:all .12s;letter-spacing:.04em}
.views-grid-btn:hover{border-color:rgba(0,210,255,.3);color:#00D2FF}
.views-grid-btn.active{background:rgba(0,210,255,.1);border-color:rgba(0,210,255,.4);color:#00D2FF}
/* ── Row editor bar ── */
#views-row-editor{display:flex;align-items:stretch;gap:6px;padding:6px 12px;border-bottom:1px solid rgba(0,210,255,.08);flex-shrink:0;flex-wrap:nowrap;overflow-x:auto;background:rgba(0,0,0,.15)}
#views-row-editor:empty{display:none}
.nre-row{display:flex;align-items:center;gap:4px;background:rgba(0,210,255,.04);border:1px solid rgba(0,210,255,.12);padding:3px 6px;flex-shrink:0}
.nre-grip{cursor:grab;color:var(--text3);font-size:12px;padding:0 2px;line-height:1;user-select:none}
.nre-grip:active{cursor:grabbing}
.nre-label{font-family:var(--font-mono,monospace);font-size:10px;color:var(--text3);letter-spacing:.06em;white-space:nowrap;padding:0 3px}
.nre-stepper{display:flex;align-items:center;gap:2px}
.nre-step-btn{width:16px;height:16px;background:none;border:1px solid rgba(0,210,255,.2);color:var(--text2);font-size:11px;cursor:pointer;padding:0;line-height:1;display:flex;align-items:center;justify-content:center;transition:all .1s}
.nre-step-btn:hover{border-color:rgba(0,210,255,.5);color:#00D2FF}
.nre-step-btn:disabled{opacity:.25;cursor:not-allowed}
.nre-col-val{font-family:var(--font-mono,monospace);font-size:11px;color:var(--text0);min-width:14px;text-align:center}
.nre-height-sel{background:#0a1628;border:1px solid rgba(0,210,255,.15);color:#90B8D8;font-family:var(--font-mono,monospace);font-size:10px;padding:2px 4px;cursor:pointer;outline:none;-webkit-appearance:auto}.nre-height-sel option{background:#0d1e35 !important;color:#90B8D8 !important}
.nre-height-sel:focus{border-color:rgba(0,210,255,.4)}
.nre-del{background:none;border:none;color:rgba(226,75,74,.3);cursor:pointer;font-size:11px;padding:0 2px;line-height:1;transition:color .1s}
.nre-del:hover{color:#E24B4A}
.nre-del:disabled{opacity:.15;cursor:not-allowed}
.nre-add-row{font-family:var(--font-mono,monospace);font-size:10px;padding:3px 8px;background:none;border:1px dashed rgba(0,210,255,.2);color:rgba(0,210,255,.5);cursor:pointer;transition:all .12s;letter-spacing:.04em;flex-shrink:0;white-space:nowrap;align-self:center}
.nre-add-row:hover{border-color:rgba(0,210,255,.5);color:#00D2FF;background:rgba(0,210,255,.04)}
.nre-add-row:disabled{opacity:.25;cursor:not-allowed}
/* ── Grid area — row-based ── */
#views-grid-area{flex:1;overflow-y:auto;overflow-x:hidden;padding:8px 12px;display:flex;flex-direction:column;gap:8px;-webkit-overflow-scrolling:touch}
.nre-grid-row{display:grid;gap:8px;flex-shrink:0;align-items:stretch}
.nre-grid-row[data-height="small"] .views-tile{min-height:120px;max-height:120px;overflow:hidden}
.nre-grid-row[data-height="medium"] .views-tile{min-height:180px;max-height:180px;overflow:hidden}
.nre-grid-row[data-height="large"] .views-tile{min-height:260px;max-height:260px;overflow:hidden}
.nre-grid-row[data-height="auto"] .views-tile{min-height:120px;overflow:hidden}
#views-grid{display:contents}/* legacy compat — children render into #views-grid-area */
#views-tray{border-top:1px solid rgba(0,210,255,.08);padding:8px 12px;display:flex;gap:8px;overflow-x:auto;flex-shrink:0;min-height:0}
#views-tray:empty{display:none}
.views-tray-chip{font-family:var(--font-mono,monospace);font-size:10px;padding:3px 10px;background:rgba(0,210,255,.06);border:1px solid rgba(0,210,255,.15);color:var(--text2);cursor:pointer;white-space:nowrap;flex-shrink:0}
/* ── Invitation dialog ── */
.views-invite-dialog-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:600;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(2px)}
.views-invite-dialog{background:#0d1e35;border:1px solid rgba(0,210,255,.3);box-shadow:0 16px 60px rgba(0,0,0,.8);width:420px;max-width:95vw;padding:0}
.nid-header{padding:20px 24px 16px;border-bottom:1px solid rgba(0,210,255,.1)}
.nid-from{font-family:var(--font-mono,monospace);font-size:10px;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px}
.nid-title{font-family:var(--font-ui,"Barlow Condensed",sans-serif);font-size:18px;font-weight:700;color:var(--text0,#F0F6FF);margin-bottom:4px}
.nid-note-name{font-family:var(--font-ui,"Barlow Condensed",sans-serif);font-size:14px;color:#00D2FF;margin-top:2px}
.nid-body{padding:18px 24px;font-family:var(--font-ui,"Barlow Condensed",sans-serif);font-size:13px;color:var(--text2);line-height:1.6}
.nid-actions{padding:14px 24px;border-top:1px solid rgba(0,210,255,.1);display:flex;gap:10px;justify-content:flex-end}
.nid-btn{font-family:var(--font-mono,monospace);font-size:11px;letter-spacing:.08em;padding:9px 20px;cursor:pointer;transition:all .15s}
.nid-btn-reject{background:none;border:1px solid rgba(226,75,74,.3);color:rgba(226,75,74,.7)}
.nid-btn-reject:hover{background:rgba(226,75,74,.08);color:#E24B4A}
.nid-btn-accept{background:rgba(0,210,255,.1);border:1px solid rgba(0,210,255,.4);color:#00D2FF}
.nid-btn-accept:hover{background:rgba(0,210,255,.18)}
/* ── Floating shared note window ── */
.views-float-window{position:fixed;z-index:500;background:var(--bg1,#0c1628);border:1px solid rgba(0,210,255,.35);box-shadow:0 16px 60px rgba(0,0,0,.8);width:520px;height:400px;display:flex;flex-direction:column;cursor:default}
.views-float-titlebar{padding:8px 12px;background:rgba(0,0,0,.3);border-bottom:1px solid rgba(0,210,255,.15);display:flex;align-items:center;gap:8px;cursor:move;user-select:none;flex-shrink:0}
.views-float-label{font-family:var(--font-mono,monospace);font-size:10px;color:#00D2FF;letter-spacing:.08em;text-transform:uppercase;margin-right:auto}
.views-float-hint{font-family:var(--font-mono,monospace);font-size:9px;color:var(--text3);letter-spacing:.04em}
.views-float-close{background:none;border:none;color:rgba(226,75,74,.6);cursor:pointer;font-size:12px;padding:0 4px}
.views-float-close:hover{color:#E24B4A}
.views-float-body{flex:1;overflow:hidden;display:flex;flex-direction:column;min-height:0}
.views-tray-chip:hover{background:rgba(0,210,255,.12);color:#00D2FF}

/* ── Note tile ───────────────────────────────────────────────────────────── */
.views-tile{display:flex;flex-direction:column;background:var(--bg1,#0c1628);border:1px solid rgba(0,210,255,.1);overflow:hidden;min-height:0;height:100%}
.views-tile.minimized{height:auto;min-height:0;border-color:rgba(0,210,255,.2)}
.views-tile.minimized .views-tile-header{border-bottom:none;background:rgba(0,0,0,.25)}
.views-tile.maximized{position:fixed;inset:60px 0 0 0;z-index:500;border:none;
  border-top:2px solid rgba(0,210,255,.4);box-shadow:0 0 60px rgba(0,0,0,.8)}
.views-tile.maximized .views-tile-header{background:rgba(6,10,16,.98)}
.views-tile.empty{border:1px dashed rgba(0,210,255,.12);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .12s}
.views-tile.empty:hover{background:rgba(0,210,255,.03);border-color:rgba(0,210,255,.25)}
.views-tile-header{padding:6px 10px;display:flex;align-items:center;gap:7px;flex-shrink:0;border-bottom:1px solid rgba(0,210,255,.08);background:rgba(0,0,0,.15)}.views-tile-title{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.views-presence{display:flex;align-items:center;gap:3px;flex-shrink:0}
.views-avatar{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--font-ui,"Barlow Condensed",sans-serif);font-size:9px;font-weight:700;color:#000;flex-shrink:0;border:1.5px solid rgba(0,0,0,.3);cursor:pointer;position:relative}
.views-avatar.active::after{content:"";position:absolute;bottom:-1px;right:-1px;width:5px;height:5px;border-radius:50%;background:#1D9E75;border:1px solid #0c1628}
.views-participant-card{position:fixed;z-index:1000;width:340px;background:var(--bg1,#0c1628);border:1px solid var(--border2,rgba(0,210,255,.2));box-shadow:0 8px 40px rgba(0,0,0,.6),0 0 0 1px rgba(0,210,255,.08);pointer-events:all;overflow-y:auto;max-height:calc(100vh - 20px)}
.npc-top{padding:14px 16px 10px;border-bottom:1px solid rgba(0,210,255,.08);display:flex;align-items:flex-start;gap:12px}
.npc-avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--font-ui,"Barlow Condensed",sans-serif);font-size:15px;font-weight:700;flex-shrink:0}
.npc-name{font-family:var(--font-ui,"Barlow Condensed",sans-serif);font-size:15px;font-weight:700;color:var(--text0,#F0F6FF)}
.npc-title{font-family:var(--font-mono,monospace);font-size:10px;color:var(--text3,#6A94B8);margin-top:2px}
.npc-section{padding:10px 16px;border-bottom:1px solid rgba(0,210,255,.06)}
.npc-section:last-child{border-bottom:none}
.npc-section-lbl{font-family:var(--font-mono,monospace);font-size:10px;color:#00D2FF;letter-spacing:.14em;margin-bottom:7px}
.npc-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.npc-row-lbl{font-family:var(--font-mono,monospace);font-size:10px;color:var(--text3,#6A94B8);letter-spacing:.08em}
.npc-row-val{font-family:var(--font-mono,monospace);font-size:10px;color:var(--text2,#90B8D8)}
.npc-active-dot{width:7px;height:7px;border-radius:50%;background:#1D9E75;display:inline-block;margin-right:4px}
.npc-alloc-bar{height:5px;background:rgba(255,255,255,.05);margin:5px 0}
.npc-alloc-fill{height:100%;transition:width .3s}
.npc-remove{width:100%;background:rgba(226,75,74,.08);border:1px solid rgba(226,75,74,.3);color:rgba(226,75,74,.8);font-family:var(--font-mono,monospace);font-size:10px;letter-spacing:.08em;padding:7px;cursor:pointer;transition:all .12s;margin:0}
.npc-remove:hover{background:rgba(226,75,74,.15);color:#E24B4A}
.views-invite-btn{width:18px;height:18px;border-radius:50%;background:rgba(255,255,255,.06);border:1px dashed rgba(255,255,255,.2);color:var(--text3);cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;transition:all .12s;flex-shrink:0;padding:0}
.views-invite-btn:hover{background:rgba(0,210,255,.1);border-color:rgba(0,210,255,.4);color:#00D2FF}
.views-invite-pop{position:fixed;z-index:1000;cursor:default;user-select:none;background:#0d1e35;border:1px solid rgba(0,210,255,.25);box-shadow:0 8px 32px rgba(0,0,0,.7);padding:10px;min-width:260px;max-height:70vh;overflow-y:auto}
.views-invite-pop input{width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(0,210,255,.15);color:var(--text0);font-family:var(--font-ui,"Barlow Condensed",sans-serif);font-size:12px;padding:5px 8px;outline:none;margin-bottom:6px;box-sizing:border-box}
.views-invite-pop input:focus{border-color:rgba(0,210,255,.4)}
.views-invite-result{max-height:480px;overflow-y:auto;cursor:default}.views-invite-pop .views-invite-row{cursor:pointer}
.views-invite-row{padding:5px 7px;cursor:pointer;display:flex;align-items:center;gap:8px;font-family:var(--font-ui,"Barlow Condensed",sans-serif);font-size:12px;color:var(--text1);transition:background .1s}
.views-invite-row:hover{background:rgba(0,210,255,.06)}
.views-invite-row .views-avatar{width:22px;height:22px;font-size:10px}
.views-tile-title{font-family:var(--font-ui,'Barlow Condensed',sans-serif);font-size:13px;font-weight:600;color:var(--text0,#F0F6FF);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:text;outline:none}
.views-tile-title:focus{color:#00D2FF}
.views-tile-source{font-family:var(--font-mono,monospace);font-size:11px;padding:1px 5px;background:rgba(0,210,255,.08);border:0.5px solid rgba(0,210,255,.2);color:rgba(0,210,255,.7);border-radius:2px;flex-shrink:0}
.views-tile-ctrl{width:16px;height:16px;background:none;border:none;color:var(--text3);cursor:pointer;font-size:10px;padding:0;display:flex;align-items:center;justify-content:center;transition:color .1s;flex-shrink:0}
.views-tile-ctrl:hover{color:var(--text0)}
.views-tile-body{display:flex;flex-direction:column;flex:1;overflow:hidden;min-height:0}
.views-tile-canvas{flex:1;padding:10px 12px;overflow-y:auto;font-family:var(--font-ui,'Barlow Condensed',sans-serif);font-size:13px;color:var(--text1,#C8DFF0);line-height:1.75;resize:none;background:transparent;border:none;outline:none;min-height:0}
.views-tile-canvas::placeholder{color:var(--text3);font-style:italic}
/* ── Block collaborative canvas ── */

<script>
(function() {
'use strict';

// ── State ─────────────────────────────────────────────────────────────────
const FIRM_ID  = 'aaaaaaaa-0001-0001-0001-000000000001';
let _inboxPollInterval = null;
let _inboxLastChecked  = new Date().toISOString();
let _lastTyped         = {}; // noteId → timestamp of last keystroke
let _userId    = null;
let _userName  = 'Vaughn Staples';
let _notes     = [];      // all notes for this user
let _messages  = {};      // noteId → [messages]
let _workspace = {        // full workspace state in Supabase
  activeView: 'Default',
  views: {
    'Default': _notesDefaultView()
  },
  library: {}               // template blueprints keyed by template name
};
// Convenience accessor for current view
function _cv() {
  if (!_workspace.views[_workspace.activeView]) {
    _workspace.views[_workspace.activeView] = _notesDefaultView();
  }
  return _workspace.views[_workspace.activeView];
}
let _saveTimer = null;

// ── Entry point ───────────────────────────────────────────────────────────
window._viewsLoadView = async function() {
  if (window._viewsLoaded) { window._viewsRefresh && window._viewsRefresh(); return; }
  window._viewsLoaded = true;

  const res = window._notesResource || window._myResource || null;
  _userId   = res?.user_id || null;
  _userName = res?.name || 'Vaughn Staples';

  await _notesFetchAll();
  await _notesLoadWorkspace();
  // MY VIEWS: skip _notesFetchSharedViewNotes, _notesCleanWidgetNotes, _notesFirstLaunchSeed
  // — these operate on MY NOTES data and must not run in the views module.
  _notesRenderLeft();
  _notesRenderGrid();
  // Wait for Block 2 to export _notesLoadInviteResources (it runs async after script injection),
  // then load resources and re-render the header user name and workflows panel.
  (function _waitForInviteResources(attempts) {
    if (typeof window._notesLoadInviteResources === 'function') {
      window._notesLoadInviteResources().then(function() {
        _notesRenderViewSwitcher();
        _notesRenderLibrary();
        _notesUpdateHeaderUser(); // explicit call after resources guaranteed loaded
        // Re-render widget tiles so cloned dashboards query the correct person's data
        var cv = _cv();
        if (cv && cv.tiles && window.WIDGET_REGISTRY) {
          cv.tiles.forEach(function(tile) {
            if (tile.canvasMode !== 'widget' || !tile.widgetId) return;
            var tileEl = document.querySelector('.views-tile[data-viewid="' + tile.noteId + '"]');
            if (!tileEl) return;
            var canvas = tileEl.querySelector('.tile-canvas');
            if (!canvas) return;
            delete canvas.dataset.widgetRendered;
            if (window._widgetContext) {
              window.WIDGET_REGISTRY.render(tile.widgetId, tile.widgetConfig || {}, canvas, window._widgetContext());
            }
          });
        }
      });
    } else if (attempts > 0) {
      setTimeout(function() { _waitForInviteResources(attempts - 1); }, 150);
    }
  })(20); // up to 3 seconds total
  // Restore saved panel width and init splitter
  const savedW = _cv().leftPanelWidth;
  if (savedW) {
    const shell = document.getElementById('views-shell');
    if (shell) shell.style.setProperty('--notes-left-w', savedW + 'px');
  }
  if (window._notesSplitterInit) window._notesSplitterInit();
  _notesDndInit();
  if (window._notesStartInboxPoll) window._notesStartInboxPoll();
  _notesStartSyncPoll();
  // Wire collaboration and start ping system after collab script runs
  setTimeout(() => {
    if (typeof _notesWireTilesCollab === 'function') _notesWireTilesCollab();
    else if (window._notesWireTilesCollab) window._notesWireTilesCollab();
    // ── STEP 5: start view presence for the initial active view ──────────
    if (window._notesStartViewPresence && _userId) {
      window._notesStartViewPresence(_userId, _workspace.activeView);
    }
  }, 0);
};

window._viewsRefresh = async function() {
  await _notesFetchAll();
  // Re-fetch shared view notes — _notesFetchAll only loads own notes
  await _notesFetchSharedViewNotes();
  _notesRenderLeft();
  _notesRenderGrid();
};

// ── One-time cleanup: remove note records that back widget tiles ───────────
// Runs silently on startup. Any note whose ID appears in a workspace tile with
// canvasMode='widget' (or a synthetic wt-/ph- ID) is an operational placeholder,
// not institutional knowledge. Delete the DB record and remove from local array.
async function _notesCleanWidgetNotes() {
  try {
    const toDelete = [];
    Object.values(_workspace.views || {}).forEach(function(v) {
      (v.tiles || []).forEach(function(t) {
        const nid = t.noteId;
        if (!nid) return;
        // Synthetic IDs — never in DB, just remove from local notes array
        if (nid.startsWith('ph-') || nid.startsWith('wt-')) {
          _notes = _notes.filter(function(n){ return n.id !== nid; });
          return;
        }
        // Real UUID that backs a widget tile — queue for DB deletion
        if (t.canvasMode === 'widget') {
          const exists = _notes.find(function(n){ return n.id === nid; });
          if (exists) toDelete.push(nid);
        }
      });
    });
    if (!toDelete.length) return;
    console.log('[Compass] Cleaning', toDelete.length, 'orphaned widget-tile note(s):', toDelete);
    // Delete from DB in batches of 10
    for (let i = 0; i < toDelete.length; i += 10) {
      const batch = toDelete.slice(i, i + 10);
      await API.del('notes?id=in.(' + batch.join(',') + ')').catch(function(){});
    }
    // Remove from local array
    const deleteSet = new Set(toDelete);
    _notes = _notes.filter(function(n){ return !deleteSet.has(n.id); });
    console.log('[Compass] Cleanup complete.');
  } catch(e) {
    console.warn('[Compass] _notesCleanWidgetNotes error:', e);
  }
}

// Fetch notes referenced by any shared view currently in workspace
async function _notesFetchSharedViewNotes() {
  const allTileNoteIds = new Set();
  Object.values(_workspace.views || {}).forEach(function(v) {
    if (!v._isSharedView) return;
    (v.tiles || []).forEach(function(t) { if (t.noteId) allTileNoteIds.add(t.noteId); });
  });
  if (!allTileNoteIds.size) return;
  // Only fetch ones not already in _notes
  const missing = Array.from(allTileNoteIds).filter(function(id) {
    return !_notes.find(function(n) { return n.id === id; });
  });
  if (!missing.length) return;
  try {
    const rows = await API.get(
      'notes?id=in.(' + missing.join(',') + ')&limit=100'
    ).catch(function() { return []; });
    (rows || []).forEach(function(n) {
      if (!_notes.find(function(x) { return x.id === n.id; })) _notes.push(n);
    });
  } catch(e) { console.warn('[Compass] _notesFetchSharedViewNotes error:', e); }
}

// ── Fetch ─────────────────────────────────────────────────────────────────
async function _notesFetchAll() {
  if (!_userId) return;
  try {
    const [notes, msgs] = await Promise.all([
      API.get('notes?owner_user_id=eq.' + _userId + '&firm_id=eq.' + FIRM_ID + '&order=updated_at.desc&limit=200').catch(()=>[]),
      API.get('note_messages?note_id=in.(' + '00000000-0000-0000-0000-000000000000' + ')&limit=1').catch(()=>[]), // placeholder — load per tile
    ]);
    _notes = Array.isArray(notes) ? notes : [];
  } catch(e) { console.error('[Compass] Notes fetch error:', e); }
}

async function _notesLoadMessages(noteId) {
  if (_messages[noteId]) return _messages[noteId];
  try {
    const rows = await API.get('note_messages?note_id=eq.' + noteId + '&order=created_at.asc&limit=100').catch(()=>[]);
    _messages[noteId] = Array.isArray(rows) ? rows : [];
  } catch(e) { _messages[noteId] = []; }
  return _messages[noteId];
}

// ── Workspace migration: gridSize → rows ─────────────────────────────────
function _notesMigrateView(view) {
  if (!view.gridSize || view.rows) return view; // already migrated
  const parts  = view.gridSize.split('x');
  const cols   = parseInt(parts[1]) || 2;
  const rowCnt = parseInt(parts[0]) || 2;
  view.rows = Array.from({ length: rowCnt }, (_, i) => ({
    id:      'row' + i,
    columns: cols,
    height:  'medium'
  }));
  view.tiles = (view.tiles || []).map(t => ({
    ...t,
    row:  'row' + Math.floor(t.slot / cols),
    slot: t.slot % cols,
  }));
  delete view.gridSize;
  return view;
}

async function _notesLoadWorkspace() {
  if (!_userId) return;
  try {
    const rows = await API.get('notes_workspace?user_id=eq.' + _userId + '&limit=1').catch(()=>[]);
    if (rows?.[0]?.state) {
      const fullState = rows[0].state;
      // MY VIEWS: read from state.viewsWorkspace if it exists (own saved state),
      // otherwise fall back to state.views (MY NOTES dashboards) so they're visible on first visit.
      const s = (fullState.viewsWorkspace && fullState.viewsWorkspace.views)
        ? fullState.viewsWorkspace
        : fullState;
      if (s.views) {
        _workspace.activeView = s.activeView || 'Default';
        _workspace.views      = s.views;
        _workspace.library    = s.library || {};
        if (!_workspace.views[_workspace.activeView]) {
          _workspace.views[_workspace.activeView] = _notesDefaultView();
        }
        let migrated = false;
        Object.keys(_workspace.views).forEach(vn => {
          const v = _workspace.views[vn];
          if (v.gridSize && !v.rows) { _notesMigrateView(v); migrated = true; }
        });
        if (migrated) _viewsSaveWorkspace(true);
      }
    }
  } catch(e) { console.error('[Compass] Views workspace load error:', e); }
  _notesCleanTiles();
  // MY VIEWS does not restore shared views — skip _notesRestoreSharedViews
}

async function _notesRestoreSharedViews() {
  if (!_userId) return;
  try {
    const parts = await API.get(
      'view_participants?user_id=eq.' + _userId +
      '&accepted_at=not.is.null' +
      '&select=workspace_owner_user_id,view_name,view_role,tile_edit_overrides' +
      '&limit=50'
    ).catch(function() { return []; });
    if (!parts || !parts.length) return;

    for (var i = 0; i < parts.length; i++) {
      var p = parts[i];
      if (p.workspace_owner_user_id === _userId) continue; // skip own views
      var ownerUserId = p.workspace_owner_user_id;
      var viewName    = p.view_name;
      var sharedKey   = '__shared__' + ownerUserId + '__' + viewName;
      // Always refresh layout from owner's current workspace (don't skip if already present)
      try {
        var wsRows = await API.get(
          'notes_workspace?user_id=eq.' + ownerUserId + '&limit=1'
        ).catch(function() { return []; });
        var ownerState = wsRows && wsRows[0] && wsRows[0].state;
        if (!ownerState) continue;
        var ownerView = (ownerState.views || {})[viewName];
        if (!ownerView) continue;
        // Fetch referenced notes into local _notes array
        var tileNoteIds = (ownerView.tiles || []).map(function(t) { return t.noteId; }).filter(Boolean);
        if (tileNoteIds.length) {
          var sharedNotes = await API.get(
            'notes?id=in.(' + tileNoteIds.join(',') + ')&limit=50'
          ).catch(function() { return []; });
          (sharedNotes || []).forEach(function(n) {
            if (!_notes.find(function(x) { return x.id === n.id; })) _notes.push(n);
          });
        }
        _workspace.views[sharedKey] = Object.assign({}, ownerView, {
          _isSharedView:   true,
          _sharedOwner:    ownerUserId,
          _sharedViewName: viewName,
        });
        // If the user's last active view was this shared view, restore it as active
        if (_workspace.activeView === sharedKey) {
          // Already set — nothing to do
        } else if (_workspace.sharedViews && _workspace.sharedViews[ownerUserId + '::' + viewName]) {
          // User had this shared view active — restore it
          const svMeta = _workspace.sharedViews[ownerUserId + '::' + viewName];
          if (svMeta && svMeta.wasActive) {
            _workspace.activeView = sharedKey;
          }
        }
      } catch(e) {
        console.warn('[Compass] Could not restore shared view:', viewName, e);
      }
    }
    // If activeView points to a sharedKey that now exists, keep it; 
    // if it points to a stale key, fall back to Default
    if (_workspace.activeView && _workspace.activeView.startsWith('__shared__')) {
      if (!_workspace.views[_workspace.activeView]) {
        _workspace.activeView = Object.keys(_workspace.views).find(function(k) { return !k.startsWith('__shared__'); }) || 'Default';
      }
    }
  } catch(e) {
    console.warn('[Compass] _notesRestoreSharedViews error:', e);
  }
}

function _notesCleanTiles() {
  Object.values(_workspace.views || {}).forEach(function(v) {
    if (!v.tiles || !v.rows) return;
    const validRowIds = new Set((v.rows || []).map(function(r) { return r.id; }));
    const orphans = v.tiles.filter(function(t) { return !validRowIds.has(t.row); });
    orphans.forEach(function(t) { if (!v.tray.includes(t.noteId)) v.tray.push(t.noteId); });
    v.tiles = v.tiles.filter(function(t) { return validRowIds.has(t.row); });
  });
}

function _notesDefaultView() {
  return {
    rows:  [{ id: 'row0', columns: 2, height: 'medium' },
            { id: 'row1', columns: 2, height: 'medium' }],
    tiles: [],
    tray:  [],
  };
}

async function _viewsSaveNow() {
  if (!_userId) return;
  // MY VIEWS isolation: read existing full state, merge viewsWorkspace sub-key, write back
  const viewsSnapshot = JSON.parse(JSON.stringify(_workspace));
  try {
    const rows = await API.get('notes_workspace?user_id=eq.' + _userId + '&limit=1').catch(()=>[]);
    const existingState = (rows && rows[0] && rows[0].state) ? rows[0].state : {};
    const mergedState = Object.assign({}, existingState, { viewsWorkspace: viewsSnapshot });
    const res = await API.patch(
      'notes_workspace?user_id=eq.' + _userId,
      { state: mergedState, updated_at: new Date().toISOString() }
    );
    if (!res || (Array.isArray(res) && res.length === 0)) {
      await API.post('notes_workspace', {
        firm_id: FIRM_ID, user_id: _userId,
        state: mergedState, updated_at: new Date().toISOString(),
      });
    }
  } catch(e) { console.error('[Compass] Views workspace save error:', e); }
}

async function _viewsSaveWorkspace(immediate) {
  if (!_userId) return;
  if (immediate) { clearTimeout(_saveTimer); return _viewsSaveNow(); }
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(_viewsSaveNow, 800);
}

// ── Left panel ────────────────────────────────────────────────────────────
function _notesRenderLeft() {
  _notesRenderLibrary();
  _notesRenderInbox();
  _notesRenderTree();
  _notesWireLeft(); // wire after both inbox and tree are in DOM
}

function _notesRenderInbox() {
  const inbox = _notes.filter(n => n.is_inbox);
  const el    = document.getElementById('views-inbox-list');
  const badge = document.getElementById('views-inbox-count');
  if (!el) return;
  if (badge) badge.textContent = inbox.length;
  el.innerHTML = inbox.length === 0
    ? '<div style="padding:8px 14px;font-family:var(--font-mono,monospace);font-size:10px;color:var(--text3)">Empty inbox</div>'
    : inbox.map(n => _notesItemHTML(n)).join('');
}

function _notesRenderTree() {
  const body = document.getElementById('views-tree-body');
  if (!body) return;

  // Collect all noteIds that back widget tiles or are placeholders — these are
  // operational tile slots, not knowledge records, and must not appear in the tree.
  const widgetNoteIds = new Set();
  Object.values((_workspace && _workspace.views) || {}).forEach(function(v) {
    (v.tiles || []).forEach(function(t) {
      if (t.canvasMode === 'widget' || t.isPlaceholder ||
          (t.noteId && t.noteId.startsWith('ph-')) ||
          (t.noteId && t.noteId.startsWith('wt-'))) {
        widgetNoteIds.add(t.noteId);
      }
    });
  });

  const organized = _notes.filter(function(n) {
    return !n.is_inbox && !widgetNoteIds.has(n.id);
  });
  const branches  = {};
  organized.forEach(n => {
    const parts  = (n.hierarchy_path || 'Work').split('/');
    const top    = parts[0] || 'Work';
    const sub    = parts[1] || null;
    if (!branches[top]) branches[top] = {};
    const subKey = sub || '__root__';
    if (!branches[top][subKey]) branches[top][subKey] = [];
    branches[top][subKey].push(n);
  });
  // Sort each group by sort_order, then updated_at as fallback
  Object.values(branches).forEach(subs => {
    Object.keys(subs).forEach(key => {
      subs[key].sort((a,b) => {
        if (a.sort_order !== b.sort_order) return (a.sort_order||0) - (b.sort_order||0);
        return (b.updated_at||'').localeCompare(a.updated_at||'');
      });
    });
  });

  ['Work','Personal'].forEach(b => { if (!branches[b]) branches[b] = {}; });

  body.innerHTML = '';

  Object.entries(branches).forEach(([branch, subs]) => {
    const bid        = 'nb-' + branch.replace(/\s+/g,'-');
    const totalCount = Object.values(subs).reduce((s,a) => s + a.length, 0);

    // Branch row
    const branchDiv = document.createElement('div');
    branchDiv.className = 'notes-branch';
    branchDiv.dataset.toggle     = bid;
    branchDiv.dataset.branchpath = branch;
    branchDiv.addEventListener('dragover', _notesBranchDragOver);
    branchDiv.addEventListener('dragleave', _notesBranchDragLeave);
    branchDiv.addEventListener('drop', _notesBranchDrop);

    const chev = document.createElementNS('http://www.w3.org/2000/svg','svg');
    chev.setAttribute('viewBox','0 0 10 10');
    chev.setAttribute('fill','none');
    chev.setAttribute('width','10');
    chev.setAttribute('height','10');
    chev.classList.add('notes-chevron','open');
    const chevPath = document.createElementNS('http://www.w3.org/2000/svg','path');
    chevPath.setAttribute('d','M3 2l4 3-4 3');
    chevPath.setAttribute('stroke','currentColor');
    chevPath.setAttribute('stroke-width','1.2');
    chevPath.setAttribute('stroke-linecap','round');
    chev.appendChild(chevPath);

    const label = document.createElement('span');
    label.className     = 'notes-branch-label';
    label.contentEditable = 'true';
    label.spellcheck    = false;
    label.textContent   = branch;
    label.dataset.branch = branch;
    label.addEventListener('click',  e => e.stopPropagation());
    label.addEventListener('mousedown', e => e.stopPropagation());
    label.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); label.blur(); } });
    label.addEventListener('blur', () => _notesRenameBranch(label, branch, null));

    const addBtn = document.createElement('button');
    addBtn.className   = 'notes-branch-add';
    addBtn.title       = 'Add sub-branch';
    addBtn.textContent = '+';
    addBtn.addEventListener('click', e => { e.stopPropagation(); _notesAddBranch(branch); });

    branchDiv.appendChild(chev);
    branchDiv.appendChild(label);
    branchDiv.appendChild(addBtn);

    if (totalCount === 0) {
      const delBtn = document.createElement('button');
      delBtn.className   = 'notes-branch-del';
      delBtn.title       = 'Delete branch';
      delBtn.textContent = '×';
      delBtn.addEventListener('click', e => { e.stopPropagation(); _notesDeleteBranch(branch, null); });
      branchDiv.appendChild(delBtn);
    }

    body.appendChild(branchDiv);

    // Children container — also a drop target for the branch
    const childrenDiv = document.createElement('div');
    childrenDiv.id              = bid;
    childrenDiv.className       = 'notes-children';
    childrenDiv.dataset.branchpath = branch;
    childrenDiv.style.minHeight = '8px'; // ensure drop area even when empty
    childrenDiv.addEventListener('dragover', _notesBranchDragOver);
    childrenDiv.addEventListener('dragleave', _notesBranchDragLeave);
    childrenDiv.addEventListener('drop', _notesBranchDrop);

    // Root-level notes
    const rootNotes = subs['__root__'] || [];
    if (rootNotes.length > 0) {
      const rootWrap = document.createElement('div');
      rootWrap.className = 'notes-branch-items';
      rootWrap.innerHTML = rootNotes.map(n => _notesItemHTML(n)).join('');
      childrenDiv.appendChild(rootWrap);
    }

    // Sub-branches
    Object.entries(subs).forEach(([sub, notes]) => {
      if (sub === '__root__') return;
      const sid      = 'ns-' + branch + '-' + sub.replace(/\s+/g,'-');
      const fullPath = branch + '/' + sub;

      const subDiv = document.createElement('div');
      subDiv.className = 'notes-subbranch';
      subDiv.dataset.toggle     = sid;
      subDiv.dataset.branchpath = fullPath;
      subDiv.addEventListener('dragover', _notesBranchDragOver);
      subDiv.addEventListener('dragleave', _notesBranchDragLeave);
      subDiv.addEventListener('drop', _notesBranchDrop);

      const subChev = document.createElementNS('http://www.w3.org/2000/svg','svg');
      subChev.setAttribute('viewBox','0 0 10 10');
      subChev.setAttribute('fill','none');
      subChev.setAttribute('width','10');
      subChev.setAttribute('height','10');
      subChev.classList.add('notes-chevron','open');
      const subChevPath = document.createElementNS('http://www.w3.org/2000/svg','path');
      subChevPath.setAttribute('d','M3 2l4 3-4 3');
      subChevPath.setAttribute('stroke','currentColor');
      subChevPath.setAttribute('stroke-width','1.2');
      subChevPath.setAttribute('stroke-linecap','round');
      subChev.appendChild(subChevPath);

      const subLabel = document.createElement('span');
      subLabel.className      = 'notes-subbranch-label';
      subLabel.contentEditable = 'true';
      subLabel.spellcheck     = false;
      subLabel.textContent    = sub;
      subLabel.dataset.branch = fullPath;
      subLabel.addEventListener('click', e => e.stopPropagation());
      subLabel.addEventListener('mousedown', e => e.stopPropagation());
      subLabel.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); subLabel.blur(); } });
      subLabel.addEventListener('blur', () => _notesRenameBranch(subLabel, branch, sub));

      const countSpan = document.createElement('span');
      countSpan.style.cssText = 'margin-left:auto;font-family:var(--font-mono,monospace);font-size:11px;color:var(--text3)';
      countSpan.textContent   = notes.length;

      subDiv.appendChild(subChev);
      subDiv.appendChild(subLabel);
      subDiv.appendChild(countSpan);

      if (notes.length === 0) {
        const delBtn2 = document.createElement('button');
        delBtn2.className   = 'notes-branch-del';
        delBtn2.title       = 'Delete branch';
        delBtn2.textContent = '×';
        delBtn2.addEventListener('click', e => { e.stopPropagation(); _notesDeleteBranch(branch, sub); });
        subDiv.appendChild(delBtn2);
      }

      childrenDiv.appendChild(subDiv);

      const subItemsDiv = document.createElement('div');
      subItemsDiv.id              = sid;
      subItemsDiv.className       = 'notes-children notes-subbranch-items';
      subItemsDiv.dataset.branchpath = fullPath;
      subItemsDiv.style.minHeight = '8px';
      subItemsDiv.innerHTML       = notes.map(n => _notesItemHTML(n)).join('');
      subItemsDiv.addEventListener('dragover', _notesBranchDragOver);
      subItemsDiv.addEventListener('dragleave', _notesBranchDragLeave);
      subItemsDiv.addEventListener('drop', _notesBranchDrop);
      childrenDiv.appendChild(subItemsDiv);
    });

    body.appendChild(childrenDiv);
  });

  // Add root branch button
  const addRoot = document.createElement('button');
  addRoot.className   = 'notes-add-root';
  addRoot.textContent = '+ Add branch';
  addRoot.addEventListener('click', () => _notesAddBranch(null));
  body.appendChild(addRoot);

  _notesWireLeft();
}

function _notesItemHTML(n) {
  const tile   = _cv().tiles.find(t => t.noteId === n.id);
  const inGrid = !!tile;
  const age    = _notesRelTime(n.updated_at);

  // (slot badge removed — row-based layout makes individual slot labels confusing)

  // Delete button — shows on hover for all notes
  const delFn  = n.is_inbox ? '_notesDeleteInboxNote' : '_notesDeleteTreeNote';
  const delBtn = '<button class="views-item-del" title="Delete" ' +
    'onclick="event.stopPropagation();' + delFn + '(\'' + _esc(n.id) + '\')">✕</button>';

  return '<div class="views-item' + (inGrid ? ' in-grid' : '') + '" draggable="true" data-viewid="' + _esc(n.id) + '">' +
    '<div class="views-item-body">' +
    '<div class="views-item-title">' + _esc(n.title || 'Untitled') + '</div>' +
    '<div class="views-item-meta">' + age + '</div>' +
    '</div>' +
    delBtn +
    '</div>';
}

function _notesWireLeft() {
  document.querySelectorAll('#views-shell [data-toggle]').forEach(el => {
    el.onclick = (e) => {
      // Don't toggle if clicking a button, contenteditable label, or input
      if (e.target?.closest?.('button, [contenteditable]')) return;
      const target = document.getElementById(el.dataset.toggle);
      if (!target) return;
      const open = target.style.display !== 'none';
      target.style.display = open ? 'none' : '';
      el.querySelector('.views-chevron')?.classList.toggle('open', !open);
    };
  });
  document.querySelectorAll('.views-item[data-viewid]').forEach(el => {
    el.onclick = (e) => {
      e.stopPropagation();
      const noteId = el.dataset.noteid;
      const note   = _notes.find(n => n.id === noteId);

      // ── STEP 5: view_invite / view_removed notifications ─────────────
      if (note?.is_inbox && note?.entity_type === 'view_invite') {
        if (window._notesShowViewInviteDialog) window._notesShowViewInviteDialog(note);
        return;
      }
      if (note?.is_inbox && note?.entity_type === 'view_removed') {
        const overlay = document.createElement('div');
        overlay.className = 'notes-invite-dialog-overlay';
        overlay.innerHTML =
          '<div class="views-invite-dialog">' +
            '<div class="nid-header"><div class="nid-from">View Access</div>' +
            '<div class="nid-title">' + _esc(note.title || '') + '</div></div>' +
            '<div class="nid-body">' + _esc(note.content || '') + '</div>' +
            '<div class="nid-actions"><button class="nid-btn nid-btn-accept" id="nid-vr-ack">OK</button></div>' +
          '</div>';
        document.body.appendChild(overlay);
        const dismiss = () => {
          overlay.remove();
          API.del('notes?id=eq.' + note.id).catch(()=>{});
          _notes = _notes.filter(n => n.id !== note.id);
          _notesRenderLeft();
        };
        overlay.querySelector('#nid-vr-ack').onclick = dismiss;
        overlay.addEventListener('mousedown', e => { if (e.target === overlay) dismiss(); });
        return;
      }

      // Invitation or removal notification — check which type
      if (note?.entity_id && note?.is_inbox) {
        // Check if it's a removal or declined notification
        if (note.title?.includes('removed themselves from:') ||
            note.title?.includes('declined your invitation')) {
          // Show simple acknowledgment dialog
          const overlay = document.createElement('div');
          overlay.className = 'notes-invite-dialog-overlay';
          overlay.innerHTML =
            '<div class="views-invite-dialog">' +
              '<div class="nid-header">' +
                '<div class="nid-from">Collaboration Update</div>' +
                '<div class="nid-title">' + _esc(note.title) + '</div>' +
              '</div>' +
              '<div class="nid-body">' + _esc(note.content || '') + '</div>' +
              '<div class="nid-actions">' +
                '<button class="nid-btn nid-btn-accept" id="nid-ack">OK</button>' +
              '</div>' +
            '</div>';
          document.body.appendChild(overlay);
          const dismiss = () => {
            overlay.remove();
            API.del('notes?id=eq.' + note.id).then(() => {
              _notes = _notes.filter(n => n.id !== note.id);
              _notesRenderLeft();
              if (note.entity_id && window._notesRenderPresence) {
                window._notesRenderPresence(note.entity_id);
              }
            }).catch(()=>{});
          };
          overlay.querySelector('#nid-ack').onclick = dismiss;
          overlay.addEventListener('mousedown', e => { if (e.target === overlay) dismiss(); });
          return;
        }
        // Check if already accepted
        const userId = _userId;
        if (userId) {
          API.get('note_participants?note_id=eq.' + note.entity_id + '&user_id=eq.' + userId + '&select=accepted_at&limit=1')
            .then(rows => {
              if (rows?.[0]?.accepted_at) {
                _notesOpenFloatingNote(note.entity_id, note.title?.replace(/^.+invited you to: /, '') || 'Shared Note');
              } else {
                _notesShowInviteDialog(note);
              }
            }).catch(() => _notesShowInviteDialog(note));
        } else {
          _notesShowInviteDialog(note);
        }
        return;
      }

      // Already in grid — do nothing
      if (_cv().tiles.some(t => t.noteId === noteId)) return;

      _notesOpenNote(noteId);
    };
  });
}

function _notesToggleSection(which) {
  const listId = which === 'inbox' ? 'notes-inbox-list' : which === 'library' ? 'notes-library-list' : 'notes-tree-scroll';
  const chevId = 'notes-chev-' + which;
  const el     = document.getElementById(listId);
  const chev   = document.getElementById(chevId);
  if (!el) return;
  const open = el.style.display !== 'none';
  el.style.display = open ? 'none' : '';
  chev?.classList.toggle('open', !open);
}

// ── Grid ──────────────────────────────────────────────────────────────────
// ── STEP 5: Viewer-role helper ────────────────────────────────────────────
// Returns { isViewer, overriddenSlots } for the current user on the active view.
// isViewer=false means owner or editor — full access.
// overriddenSlots is a Set of "rowId:slot" strings the viewer may edit regardless.
function _notesGetViewerRole() {
  const userId = _userId;
  if (!userId) return { isViewer: false, overriddenSlots: new Set() };
  const viewName    = _workspace.activeView;
  const viewParts   = window._notesGetViewParticipants
    ? window._notesGetViewParticipants(userId, viewName)
    : [];
  const myRow = viewParts.find(function(p) { return p.user_id === userId; });
  // If no row found yet, assume owner (safe default — restricts nothing)
  if (!myRow) return { isViewer: false, overriddenSlots: new Set() };
  if (myRow.view_role === 'owner' || myRow.view_role === 'editor') {
    return { isViewer: false, overriddenSlots: new Set() };
  }
  // viewer — build override set
  const overrides = Array.isArray(myRow.tile_edit_overrides) ? myRow.tile_edit_overrides : [];
  const myOverride = overrides.find(function(o) { return o.user_id === userId; });
  const slots = new Set(myOverride ? (myOverride.slot_keys || []) : []);
  return { isViewer: true, overriddenSlots: slots };
}
window._notesGetViewerRole = _notesGetViewerRole;

function _notesRenderGrid() {
  const gridArea = document.getElementById('views-grid-area');
  if (!gridArea) return;
  const cv   = _cv();
  const rows = cv.rows || [];
  // Clean orphaned tiles (row id doesn't exist in rows array)
  const validIds = new Set(rows.map(function(r) { return r.id; }));
  const orphaned = cv.tiles.filter(function(t) { return !validIds.has(t.row); });
  orphaned.forEach(function(t) { if (!cv.tray.includes(t.noteId)) cv.tray.push(t.noteId); });
  if (orphaned.length) cv.tiles = cv.tiles.filter(function(t) { return validIds.has(t.row); });

  // ── STEP 5: determine viewer status once per render ───────────────────
  const viewerCtx = _notesGetViewerRole();

  // Snapshot existing widget tile elements BEFORE wiping the grid so we can
  // transplant them back in. This preserves the .tile-canvas and its
  // dataset.widgetRendered guard, preventing dataFn from re-firing on every
  // _notesRenderGrid call (which would otherwise cause continuous API polls).
  const existingWidgetEls = {};
  gridArea.querySelectorAll('.views-tile[data-viewid]').forEach(function(el) {
    const nid = el.dataset.viewid;
    const canvas = el.querySelector('.tile-canvas');
    if (canvas && canvas.dataset.widgetRendered) {
      existingWidgetEls[nid] = el;
    }
  });

  gridArea.innerHTML = '';
  rows.forEach(function(row) {
    const cols   = Math.max(1, Math.min(8, row.columns || 2));
    const height = row.height || 'medium';
    const rowDiv = document.createElement('div');
    rowDiv.className = 'nre-grid-row';
    rowDiv.dataset.rowid  = row.id;
    rowDiv.dataset.height = height;
    rowDiv.style.gridTemplateColumns = 'repeat(' + cols + ', minmax(0, 1fr))';

    for (let s = 0; s < cols; s++) {
      const tile = cv.tiles.find(function(t) { return t.row === row.id && t.slot === s; });
      const note = tile ? _notes.find(function(n) { return n.id === tile.noteId; }) : null;

      // ── STEP 5: per-slot viewer check ──────────────────────────────────
      const slotKey        = row.id + ':' + s;
      const tileIsWidget   = tile && tile.canvasMode === 'widget';
      // Locked view: layout edits blocked (tile content still interactive for widgets)
      const viewIsLocked   = !!cv.locked;
      const tileIsReadOnly = !tileIsWidget && (viewIsLocked || (viewerCtx.isViewer && !viewerCtx.overriddenSlots.has(slotKey)));

      const isPlaceholderTile = tile && (tile.isPlaceholder ||
        (tile.noteId && (tile.noteId.startsWith('ph-') || tile.noteId.startsWith('wt-'))));

      // ── Widget tile DOM reuse ─────────────────────────────────────────
      // If we already have a rendered widget element for this noteId, transplant
      // it directly. This preserves the canvas and its widgetRendered guard so
      // dataFn is NOT re-invoked — eliminating the continuous refresh loop.
      if (tileIsWidget && tile.noteId && existingWidgetEls[tile.noteId]) {
        const existing = existingWidgetEls[tile.noteId];
        // Update minimized state in case it changed
        existing.className = 'notes-tile' + (tile.minimized ? ' minimized' : '');
        existing.dataset.rowid = row.id;
        existing.dataset.slot  = s;
        rowDiv.appendChild(existing);
        delete existingWidgetEls[tile.noteId]; // consumed
        continue;
      }

      const div = document.createElement('div');

      if (note || isPlaceholderTile || tileIsWidget) {
        // For placeholder/widget tiles without a note, synthesise a minimal note-like object
        const noteObj = note || { id: tile.noteId, title: tileIsWidget ? (tile.widgetId || 'Widget') : 'New tile', content: '' };
        div.className = 'notes-tile' + (tile.minimized ? ' minimized' : '');
        div.setAttribute('draggable', !tileIsReadOnly ? 'true' : 'false');
        div.innerHTML = _notesTileHTML(noteObj, tile, tileIsReadOnly);
        div.dataset.rowid  = row.id;
        div.dataset.slot   = s;
        div.dataset.noteid = noteObj.id;
        div.dataset.viewid = noteObj.id;
        // ── STEP 5: lock read-only content areas ──────────────────────
        if (tileIsReadOnly) {
          const ta = div.querySelector('.views-tile-canvas');
          if (ta) ta.readOnly = true;
          const title = div.querySelector('.views-tile-title');
          if (title) title.contentEditable = 'false';
        }
      } else {
        div.className = 'notes-tile empty';
        div.dataset.rowid = row.id;
        div.dataset.slot  = s;
        div.style.cssText = 'display:flex;flex-direction:column;cursor:pointer';
        // ── STEP 5: viewers cannot create notes in empty slots ────────
        if (!tileIsReadOnly) {
          (function(rid, sl) {
            div.onclick = function(e) {
              if (e.target.closest && e.target.closest('button')) return;
              if (window._notesNew) window._notesNew(rid, sl);
            };
          })(row.id, s);
        }
        div.innerHTML =
          '<div style="padding:6px 10px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;border-bottom:1px solid rgba(0,210,255,.08);background:rgba(0,0,0,.15);width:100%;box-sizing:border-box">' +
            '<div style="font-family:var(--font-ui,sans-serif);font-size:13px;font-weight:600;color:var(--text2);font-style:italic;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0;margin-right:8px">' +
              (tileIsReadOnly ? 'Empty' : 'New note…') +
            '</div>' +
            '<div style="display:flex;align-items:center;gap:7px;flex-shrink:0">' +
              '<button class="views-invite-btn" style="pointer-events:none;opacity:.5">+</button>' +
              '<button class="views-tile-ctrl" style="width:20px;height:20px;opacity:.5;pointer-events:none">' +
                '<svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg" width="14" height="14">' +
                '<path d="M2 3C2 2.44772 2.44772 2 3 2H13C13.5523 2 14 2.44772 14 3V10C14 10.5523 13.5523 11 13 11H9L6 14V11H3C2.44772 11 2 10.5523 2 10V3Z" stroke="#00D2FF" stroke-width="1.3" fill="none"/>' +
                '</svg></button>' +
              '<button class="views-tile-ctrl" style="font-size:13px;opacity:.5;pointer-events:none">◻</button>' +
              '<button class="views-tile-ctrl" style="color:rgba(226,75,74,.6);opacity:.5;pointer-events:none">✕</button>' +
            '</div>' +
          '</div>' +
          '<div style="flex:1;display:flex;align-items:center;justify-content:center">' +
            '<span class="views-slot-plus">' + (tileIsReadOnly ? '' : '+') + '</span>' +
          '</div>';
      }
      rowDiv.appendChild(div);
    }
    gridArea.appendChild(rowDiv);
  });

  _notesWireTiles();
  _notesRenderTray();
  _notesRenderViewSwitcher();
  _notesRenderRowEditor();

  // ── STEP 5: hide row editor bar entirely for viewers ─────────────────
  if (viewerCtx.isViewer) {
    const bar = document.getElementById('views-row-editor');
    if (bar) bar.style.display = 'none';
  }
}

// ── Row editor bar ────────────────────────────────────────────────────────
function _notesRenderRowEditor() {
  const bar = document.getElementById('views-row-editor');
  if (!bar) return;
  const cv      = _cv();
  const rows    = cv.rows || [];
  bar.innerHTML = '';

  rows.forEach(function(row, idx) {
    const cols     = Math.max(1, Math.min(8, row.columns || 2));
    const height   = row.height || 'medium';
    const occupied = (cv.tiles || []).some(function(t) { return t.row === row.id; });
    const seg      = document.createElement('div');
    seg.className    = 'nre-row';
    seg.dataset.rowid = row.id;
    seg.innerHTML =
      '<span class="nre-grip" title="Drag to reorder rows">⠿</span>' +
      '<span class="nre-label">R' + (idx + 1) + '</span>' +
      '<div class="nre-stepper">' +
        '<button class="nre-step-btn" data-action="col-dec" data-rowid="' + row.id + '"' + (cols <= 1 ? ' disabled' : '') + '>−</button>' +
        '<span class="nre-col-val">' + cols + '</span>' +
        '<button class="nre-step-btn" data-action="col-inc" data-rowid="' + row.id + '"' + (cols >= 8 ? ' disabled' : '') + '>+</button>' +
      '</div>' +
      '<select class="nre-height-sel" data-action="height" data-rowid="' + row.id + '">' +
        ['small','medium','large','auto'].map(function(h) {
          return '<option value="' + h + '"' + (h === height ? ' selected' : '') + '>' + h[0].toUpperCase() + h.slice(1) + '</option>';
        }).join('') +
      '</select>' +
      '<button class="nre-del" data-action="del-row" data-rowid="' + row.id + '"' +
        (occupied ? ' disabled title="Move or close tiles first"' : ' title="Remove row"') + '>×</button>';
    bar.appendChild(seg);
  });

  const addBtn = document.createElement('button');
  addBtn.className   = 'nre-add-row';
  addBtn.textContent = '+ Add row';
  addBtn.disabled    = rows.length >= 8;
  addBtn.title       = rows.length >= 8 ? 'Maximum 8 rows' : 'Add a new row';
  addBtn.onclick     = _notesAddRow;
  bar.appendChild(addBtn);

  bar.querySelectorAll('[data-action]').forEach(function(el) {
    const action = el.dataset.action;
    const rowId  = el.dataset.rowid;
    if (action === 'col-dec') el.onclick  = function() { _notesRowSetCols(rowId, -1); };
    if (action === 'col-inc') el.onclick  = function() { _notesRowSetCols(rowId,  1); };
    if (action === 'height')  el.onchange = function() { _notesRowSetHeight(rowId, el.value); };
    if (action === 'del-row') el.onclick  = function() { _notesRowDelete(rowId); };
  });

  _notesWireRowDrag(bar);
}

function _notesRowSetCols(rowId, delta) {
  const cv  = _cv();
  const row = cv.rows.find(function(r) { return r.id === rowId; });
  if (!row) return;
  const newCols = Math.max(1, Math.min(8, (row.columns || 2) + delta));
  if (newCols === row.columns) return;
  if (newCols < (row.columns || 2)) {
    const displaced = cv.tiles.filter(function(t) { return t.row === rowId && t.slot >= newCols; });
    displaced.forEach(function(t) { if (!cv.tray.includes(t.noteId)) cv.tray.push(t.noteId); });
    cv.tiles = cv.tiles.filter(function(t) { return !(t.row === rowId && t.slot >= newCols); });
  }
  row.columns = newCols;
  _viewsSaveWorkspace(true);
  _notesRenderGrid();
}

function _notesRowSetHeight(rowId, height) {
  const row = _cv().rows.find(function(r) { return r.id === rowId; });
  if (row) { row.height = height; _viewsSaveWorkspace(false); _notesRenderGrid(); }
}

function _notesAddRow() {
  const cv = _cv();
  if ((cv.rows || []).length >= 8) return;
  cv.rows.push({ id: 'row' + Date.now(), columns: 2, height: 'medium' });
  _viewsSaveWorkspace(true);
  _notesRenderGrid();
}

function _notesRowDelete(rowId) {
  const cv = _cv();
  if ((cv.tiles || []).some(function(t) { return t.row === rowId; })) return;
  cv.rows = cv.rows.filter(function(r) { return r.id !== rowId; });
  if (cv.rows.length === 0) cv.rows.push({ id: 'row0', columns: 2, height: 'medium' });
  _viewsSaveWorkspace(true);
  _notesRenderGrid();
}

function _notesWireRowDrag(bar) {
  // Create insertion indicator bar
  const indicator = document.createElement('div');
  indicator.style.cssText = 'width:2px;background:#00D2FF;height:28px;border-radius:1px;flex-shrink:0;display:none;box-shadow:0 0 6px rgba(0,210,255,.6)';
  indicator.id = 'nre-indicator';

  bar.querySelectorAll('.nre-grip').forEach(function(grip) {
    grip.style.cursor = 'grab';
    grip.addEventListener('mousedown', function(e) {
      const seg = grip.closest('.nre-row');
      if (!seg) return;
      e.preventDefault();
      e.stopPropagation();

      const dragging = seg.dataset.rowid;
      seg.style.opacity = '0.5';
      indicator.style.display = 'block';
      bar.appendChild(indicator); // start at end

      function getSorted() {
        return Array.from(bar.querySelectorAll('.nre-row'));
      }

      function onMove(ev) {
        const els = getSorted();
        // Find insertion point based on mouse X
        let insertBefore = null;
        for (const el of els) {
          if (el.dataset.rowid === dragging) continue;
          const r = el.getBoundingClientRect();
          if (ev.clientX < r.left + r.width / 2) {
            insertBefore = el;
            break;
          }
        }
        // Position indicator
        if (insertBefore) {
          bar.insertBefore(indicator, insertBefore);
        } else {
          // After last non-dragging element
          const last = els.filter(el => el.dataset.rowid !== dragging).pop();
          if (last) last.after ? last.after(indicator) : bar.appendChild(indicator);
          else bar.appendChild(indicator);
        }
      }

      function onUp(ev) {
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
        seg.style.opacity = '';
        indicator.style.display = 'none';

        // Read insertion point from indicator position
        const cv      = _cv();
        const rowMap  = {};
        cv.rows.forEach(function(r) { rowMap[r.id] = r; });

        // Build new order: all rows in DOM order, indicator marks where dragged row goes
        const allSegs = Array.from(bar.children); // includes indicator
        const newOrder = [];
        let draggedRow = rowMap[dragging];
        for (const el of allSegs) {
          if (el === indicator) { if (draggedRow) newOrder.push(draggedRow); }
          else if (el.dataset && el.dataset.rowid && el.dataset.rowid !== dragging) {
            const r = rowMap[el.dataset.rowid];
            if (r) newOrder.push(r);
          }
        }
        // Remove indicator from bar
        if (indicator.parentNode === bar) bar.removeChild(indicator);

        if (newOrder.length === cv.rows.length) {
          cv.rows = newOrder;
          _viewsSaveWorkspace(true);
          _notesRenderGrid();
        }
      }

      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });
  });
}

function _notesTileHTML(note, tileState, readOnly) {
  const chatOpen = tileState?.chatOpen || false;
  // Block canvas vs textarea — computed before return
  // Never use block canvas for widget tiles — the widget renderer owns the canvas
  const _tileIsWidget = tileState && tileState.canvasMode === 'widget';
  // Widget tiles are never read-only regardless of viewer role — viewers can see widget data
  const _effectiveReadOnly = _tileIsWidget ? false : readOnly;
  const useBlocks = !_tileIsWidget && typeof _notesIsBlockFormat === 'function' && _notesIsBlockFormat(note);
  const _presDiv = '<div class="views-presence" id="views-presence-' + note.id + '"></div>';
  // ── STEP 5: read-only (viewer role) controls ──────────────────────────
  const lockIcon = _effectiveReadOnly
    ? '<span title="View only" style="font-size:11px;color:var(--text3);opacity:.7;flex-shrink:0;cursor:default">🔒</span>'
    : '';
  const inviteBtn = _effectiveReadOnly ? '' :
    '<button class="views-invite-btn" title="Invite to note" onclick="_notesShowInvite(\'' + note.id + '\',this)">+</button>';
  const modeBtn = _effectiveReadOnly ? '' :
    (window._notesModeBtn ? window._notesModeBtn(note.id, tileState) : '');
  const closeBtn = _effectiveReadOnly ? '' :
    '<button class="views-tile-ctrl" title="Close" onclick="_notesCloseTile(\'' + note.id + '\')" style="color:rgba(226,75,74,.6)">✕</button>';
  const titleEditable = _effectiveReadOnly ? 'false' : 'true';
  const canvasReadOnly = _effectiveReadOnly ? ' readonly' : '';

  const canvasHtml = useBlocks
    ? '<div class="views-block-canvas" data-noteblocks="' + _esc(note.id) + '"></div>'
    : '<textarea class="views-tile-canvas" data-viewid="' + _esc(note.id) + '" ' +
        'placeholder="' + (_effectiveReadOnly ? 'Read only' : 'Start writing\u2026') + '"' + canvasReadOnly + ' ' +
        (_effectiveReadOnly ? '' : 'oninput="_notesSaveContent(this)"') + '>' + _esc(note.content || '') + '</textarea>';
  return '<div class="views-tile-header" style="position:relative">' +
    '<div class="views-tile-title" contenteditable="' + titleEditable + '" spellcheck="false" ' +
      'data-viewid="' + _esc(note.id) + '" ' +
      (_effectiveReadOnly ? '' : 'onblur="_notesSaveTitle(this)"') + '>' + _esc(note.title || 'Untitled') + '</div>' +
    (note.entity_type && note.entity_type !== 'note' ? '<span class="views-tile-source">' + _esc(note.entity_type) + '</span>' : '') +
    _presDiv +
    lockIcon +
    inviteBtn +
    '<button class="views-tile-ctrl" title="Toggle chat" onclick="_notesToggleChat(\'' + note.id + '\')" ' +
      'style="width:20px;height:20px;opacity:' + (chatOpen ? '1' : '.4') + '">' +
      '<svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg" width="14" height="14">' +
      '<path d="M2 3C2 2.44772 2.44772 2 3 2H13C13.5523 2 14 2.44772 14 3V10C14 10.5523 13.5523 11 13 11H9L6 14V11H3C2.44772 11 2 10.5523 2 10V3Z" ' +
      'stroke="#00D2FF" stroke-width="1.3" fill="' + (chatOpen ? 'rgba(0,210,255,.2)' : 'none') + '"/>' +
      '</svg></button>' +
    '<button class="views-tile-ctrl" id="views-max-btn-' + note.id + '" title="Maximize" ' +
      'onclick="_notesMaximizeTile(\'' + note.id + '\')" ' +
      'style="font-size:13px;opacity:.6">◻</button>' +
    closeBtn +
    '</div>' +
    '<div class="views-tile-body" id="views-tbody-' + note.id + '" ' +
      'style="' + (tileState?.minimized ? 'display:none' : '') + '">' +
    canvasHtml +
    '<div class="views-chat' + (chatOpen ? '' : ' hidden') + '" id="views-chat-' + note.id + '">' +
      '<div class="views-chat-msgs" id="views-chat-msgs-' + note.id + '">' +
        '<div style="font-family:var(--font-ui,\'Barlow Condensed\',sans-serif);font-size:13px;color:var(--text3);padding:8px">Loading…</div>' +
      '</div>' +
      '<div class="views-chat-compose">' +
        '<textarea class="views-chat-input" id="views-chat-inp-' + note.id + '" ' +
          'placeholder="Message…" rows="1" ' +
          'onkeydown="if((event.ctrlKey||event.metaKey)&&event.key===\'Enter\'){event.preventDefault();_notesSendMsg(\'' + note.id + '\')}"></textarea>' +
        '<button class="views-chat-send" onclick="_notesSendMsg(\'' + note.id + '\')">↑</button>' +
      '</div>' +
    '</div>' +
    '</div>';
}

function _notesWireTiles() {
  // Load messages for tiles with chat open
  _cv().tiles.forEach(t => {
    if (t.chatOpen) _notesLoadAndRenderMsgs(t.noteId);
  });
  // Render block canvases for block-format notes
  const _vCtx = typeof _notesGetViewerRole === 'function' ? _notesGetViewerRole() : { isViewer: false, overriddenSlots: new Set() };
  document.querySelectorAll('.views-block-canvas[data-noteblocks]').forEach(function(container) {
    if (container._blocksWired) return;
    container._blocksWired = true;
    const noteId = container.dataset.noteblocks;
    const note   = _notes.find(function(n) { return n.id === noteId; });
    if (!note) return;
    const tileEl  = container.closest('.views-tile');
    const rowId   = tileEl && tileEl.dataset.rowid;
    const slot    = tileEl && tileEl.dataset.slot;
    const slotKey = (rowId && slot !== undefined) ? rowId + ':' + slot : null;
    const tileRO  = _vCtx.isViewer && (!slotKey || !_vCtx.overriddenSlots.has(slotKey));
    if (typeof _notesRenderBlocks === 'function') _notesRenderBlocks(note, container, tileRO);
  });
  // Hook for widget system and other late-binding extensions
  setTimeout(function() {
    if (typeof window._viewsPostWire === 'function') window._viewsPostWire();
  }, 0);
}

function _notesRenderTray() {
  const tray = document.getElementById('views-tray');
  if (!tray) return;
  const trayNotes = _cv().tray.map(id => _notes.find(n => n.id === id)).filter(Boolean);
  tray.innerHTML = trayNotes.map(n =>
    '<div class="views-tray-chip" data-viewid="' + _esc(n.id) + '" ' +
      'onclick="_notesOpenNote(\'' + n.id + '\')">' +
      _esc(n.title || 'Untitled') + '</div>'
  ).join('');
}

// ── Grid actions ──────────────────────────────────────────────────────────
function _notesSetGrid(size, btn) { /* no-op — replaced by row editor */ }

function _notesOpenNote(noteId) {
  const cv       = _cv();
  const validIds = new Set((cv.rows || []).map(r => r.id));

  // Clean any orphaned tiles for this note before checking
  const orphaned = cv.tiles.filter(t => t.noteId === noteId && !validIds.has(t.row));
  if (orphaned.length) {
    cv.tiles = cv.tiles.filter(t => !(t.noteId === noteId && !validIds.has(t.row)));
  }

  // Already in grid with valid row — scroll to it
  if (cv.tiles.some(t => t.noteId === noteId && validIds.has(t.row))) {
    const tileEl = document.querySelector('.views-tile[data-viewid="' + noteId + '"]');
    if (tileEl) tileEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    return;
  }
  // Remove from tray if it was there
  cv.tray = cv.tray.filter(id => id !== noteId);

  // Find first empty {row, slot}
  const rows  = cv.rows || [];
  let placed  = false;
  for (const row of rows) {
    const cols = Math.max(1, Math.min(8, row.columns || 2));
    for (let s = 0; s < cols; s++) {
      if (!cv.tiles.some(t => t.row === row.id && t.slot === s)) {
        cv.tiles.push({ row: row.id, slot: s, noteId, chatOpen: false });
        placed = true; break;
      }
    }
    if (placed) break;
  }
  if (!placed) {
    // Grid full — displace first tile of first row to tray
    const first = rows[0];
    if (first) {
      const displaced = cv.tiles.find(t => t.row === first.id && t.slot === 0);
      if (displaced) cv.tray.push(displaced.noteId);
      cv.tiles = cv.tiles.filter(t => !(t.row === first.id && t.slot === 0));
      cv.tiles.push({ row: first.id, slot: 0, noteId, chatOpen: false });
    }
  }

  _viewsSaveWorkspace(true);
  _notesRenderGrid();
  _notesRenderLeft();
}

async function _notesCloseTile(noteId) {
  _cv().tiles = _cv().tiles.filter(t => t.noteId !== noteId);
  _cv().tray  = _cv().tray.filter(id => id !== noteId);
  _viewsSaveWorkspace(true);
  _notesRenderGrid();
  _notesRenderLeft();

  // If this is a shared note (we're a participant, not owner), notify the owner
  try {
    // Check if we own this note
    const noteRows = await API.get('notes?id=eq.' + noteId + '&select=owner_user_id,title&limit=1').catch(()=>[]);
    const noteOwnerUserId = noteRows?.[0]?.owner_user_id;
    const noteName        = noteRows?.[0]?.title || _notes.find(n => n.id === noteId)?.title || 'a note';
    const selfUserId      = _userId;

    // If we own it, no notification needed
    if (!noteOwnerUserId || noteOwnerUserId === selfUserId) return;

    const myName = window._notesResource?.name || 'Someone';

    await API.post('notes', {
      firm_id:        FIRM_ID,
      owner_user_id:  noteOwnerUserId,
      title:          myName + ' removed themselves from: ' + noteName,
      content:        myName + ' has removed the shared note "' + noteName + '" from their workspace.',
      hierarchy_path: 'Inbox',
      is_inbox:       true,
      entity_id:      noteId,
      entity_type:    null,
      created_at:     new Date().toISOString(),
      updated_at:     new Date().toISOString(),
    });

    // Remove self from note_participants if present
    await API.del('note_participants?note_id=eq.' + noteId + '&user_id=eq.' + selfUserId).catch(()=>{});
  } catch(e) { console.warn('[Compass] Close notification error:', e); }
}

function _notesToggleChat(noteId) {
  const tile = _cv().tiles.find(t => t.noteId === noteId);
  if (!tile) return;
  tile.chatOpen = !tile.chatOpen;
  const chatEl = document.getElementById('views-chat-' + noteId);
  if (chatEl) {
    chatEl.classList.toggle('hidden', !tile.chatOpen);
    if (tile.chatOpen) _notesLoadAndRenderMsgs(noteId);
  }
  // Update SVG icon fill and opacity
  const tileEl = document.querySelector('.views-tile[data-viewid="' + noteId + '"]');
  if (tileEl) {
    const btn  = tileEl.querySelector('[title="Toggle chat"]');
    const path = btn?.querySelector('path');
    if (btn)  btn.style.opacity = tile.chatOpen ? '1' : '.4';
    if (path) path.setAttribute('fill', tile.chatOpen ? 'rgba(0,210,255,.2)' : 'none');
  }
  _viewsSaveWorkspace();
}

async function _notesNew(rowId, slot) {
  if (!_userId) return;
  if (_cv().locked) return; // view is locked
  try {
    if (rowId && typeof slot === 'number') {
      // Slot click — create a local placeholder tile immediately (no DB record yet).
      // A real note record is only written when the user switches to note mode
      // and starts typing, or explicitly keeps it as a note. Widget tiles that
      // come from this path will never pollute the notes table.
      const cv = _cv();
      const existing = cv.tiles.find(t => t.row === rowId && t.slot === slot);
      if (existing) { cv.tray.push(existing.noteId); cv.tiles = cv.tiles.filter(t => !(t.row === rowId && t.slot === slot)); }
      const placeholderId = 'ph-' + Date.now() + '-' + Math.random().toString(36).slice(2,8);
      cv.tiles.push({ row: rowId, slot, noteId: placeholderId, chatOpen: false, isPlaceholder: true });
      _viewsSaveWorkspace();
      _notesRenderGrid();
      // Directly open the widget picker — don't rely on the mode button being
      // injected yet (it arrives asynchronously via _notesPostWire).
      // Use a short delay so the tile DOM is in place from _notesRenderGrid.
      setTimeout(function() {
        const cv2 = (typeof _cv === 'function' ? _cv() : (window._viewsCv && window._viewsCv()));
        const tileState = cv2 && cv2.tiles.find(function(t){ return t.noteId === placeholderId; });
        if (tileState && typeof window._viewsShowWidgetPicker === 'function') {
          window._viewsShowWidgetPicker(tileState);
        } else {
          // Fallback — try clicking the mode button if it was injected in time
          const tileEl = document.querySelector('.views-tile[data-viewid="' + placeholderId + '"]');
          const btn = tileEl && tileEl.querySelector('.tile-header-mode-btn');
          if (btn) btn.click();
        }
      }, 80);
    } else {
      // New note from left panel "+ New note" button — always creates a DB record
      const res = await API.post('notes', {
        firm_id:       FIRM_ID,
        owner_user_id: _userId,
        title:         'New note',
        content:       '',
        hierarchy_path:'Work',
        is_inbox:      false,
        created_at:    new Date().toISOString(),
        updated_at:    new Date().toISOString(),
      });
      const newNote = res?.[0];
      if (!newNote?.id) return;
      _notes.unshift(newNote);
      _notesOpenNote(newNote.id);
      _viewsSaveWorkspace();
      _notesRenderLeft();
      _notesRenderGrid();
      setTimeout(() => {
        const titleEl = document.querySelector('[data-viewid="' + newNote.id + '"].views-tile-title');
        if (titleEl) { titleEl.focus(); document.execCommand('selectAll', false, null); }
      }, 50);
    }
  } catch(e) { console.error('[Compass] New note error:', e); }
}


// ═══════════════════════════════════════════════════════════════════════════
// BLOCK-LEVEL COLLABORATIVE CANVAS
// ═══════════════════════════════════════════════════════════════════════════

// ── Block utilities ───────────────────────────────────────────────────────

// Returns the current user's attribution color for a given note.
// Checks note_participants first (note-level collab), then view_participants
// (view-level sharing) as fallback. Returns null for the note owner (no color).
function _notesGetMyColor(noteId) {
  const curResId = window._notesResource && window._notesResource.id;
  const curUserId = window._notesResource && window._notesResource.user_id;

  // 1. Check note_participants cache (Block 2 export)
  const noteParts = window._notesGetParticipants && window._notesGetParticipants(noteId);
  if (noteParts && noteParts.length) {
    const myNotePart = noteParts.find(function(p) {
      return p.resource_id === curResId || p.user_id === curUserId;
    });
    if (myNotePart) return myNotePart.color || null;
  }

  // 2. Fall back to view_participants for the active shared view
  const activeView = window._workspace && window._workspace.views && window._workspace.views[window._workspace.activeView];
  if (activeView && activeView._isSharedView && activeView._sharedOwner) {
    const vpParts = window._notesGetViewParticipants
      ? window._notesGetViewParticipants(activeView._sharedOwner, activeView._sharedViewName)
      : [];
    const myVpPart = vpParts.find(function(p) {
      return p.user_id === curUserId;
    });
    if (myVpPart && myVpPart.color) return myVpPart.color;
    // Assign a consistent color from PARTICIPANT_COLORS based on user position
    // Use a deterministic index based on user_id to keep color stable
    const COLORS = ['#E25B6B','#EF9F27','#1D9E75','#8B5CF6','#E879A0','#00B4D8'];
    if (curUserId) {
