    overlay = document.createElement('div');
    overlay.id = 'nvsd-overlay';
    overlay.className = 'ntd-overlay';
    document.body.appendChild(overlay);

    overlay.innerHTML =
      '<div class="ntd-dialog" style="width:540px;max-height:86vh;display:flex;flex-direction:column">' +
        '<div class="ntd-header"><div class="ntd-sub">Share View</div><div class="ntd-title">' + _esc(viewName) + '</div></div>' +
        '<div class="ntd-body" style="overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:10px">' +
          '<div><div class="ntd-label" style="margin-bottom:6px">People with access</div>' +
            '<div id="nvsd-people">' +
              (others.length ? others.map(peopleRowHtml).join('') :
                '<div style="font-family:var(--font-mono,monospace);font-size:10px;color:var(--text3)">No one else has access yet</div>') +
            '</div>' +
          '</div>' +
          '<div class="ntd-field"><label class="ntd-label">Add person</label>' +
            '<button class="ntd-input" id="nvsd-add-btn" style="text-align:left;cursor:pointer;color:rgba(0,210,255,.6);font-style:italic">Click to search\u2026</button></div>' +
          '<div id="nvsd-matrix">' + matrixHtml() + '</div>' +
        '</div>' +
        '<div class="ntd-actions">' +
          '<button class="ntd-btn ntd-btn-cancel" id="nvsd-cancel">Close</button>' +
          '<button class="ntd-btn ntd-btn-save" id="nvsd-save">Save Changes</button>' +
        '</div>' +
      '</div>';

    // Wire once — fresh overlay element, no accumulated listeners
    overlay.querySelector('#nvsd-cancel').onclick = function() {
      // Clear cache on close so next open always fetches fresh
      delete _viewParticipants[_vpViewKey(userId, viewName)];
      overlay.remove();
    };
    overlay.onclick = function(e) { if (e.target === overlay) overlay.remove(); };

    overlay.querySelectorAll('.nvsd-role-sel').forEach(function(sel) {
      sel.onchange = function() {
        const pid  = sel.dataset.pid;
        const vkey = _vpViewKey(userId, viewName);
        const part = (_viewParticipants[vkey]||[]).find(function(p){ return p.id===pid; });
        if (part) part.view_role = sel.value;
        overlay.querySelector('#nvsd-matrix').innerHTML = matrixHtml();
      };
    });

    overlay.querySelectorAll('.nvsd-remove').forEach(function(btn) {
      btn.onclick = async function() {
        btn.disabled = true;
        btn.style.opacity = '0.3';
        const pid  = btn.dataset.pid;
        const vkey = _vpViewKey(userId, viewName);
        // Get part from cache — but proceed even if not found (cache may be stale)
        const part = (_viewParticipants[vkey]||[]).find(function(p){ return p.id===pid; });
        // Remove from local cache immediately so re-render shows it gone
        _viewParticipants[vkey] = (_viewParticipants[vkey]||[]).filter(function(p){ return p.id !== pid; });
        // Delete by primary key (pid) — always reliable
        try {
          await API.del('view_participants?id=eq.' + pid);
        } catch(e) { console.warn('[Compass] Remove view participant delete error:', e); }
        // Send notification if we know who was removed
        if (part && part.user_id) {
          const myName = (window._notesResource && window._notesResource.name) || 'Someone';
          API.post('notes', {
            firm_id: 'aaaaaaaa-0001-0001-0001-000000000001', owner_user_id: part.user_id,
            title: myName + ' removed you from view: ' + viewName,
            content: myName + ' has removed your access to the shared view "' + viewName + '".',
            hierarchy_path: 'Inbox', is_inbox: true, entity_id: null, entity_type: 'view_removed',
            created_at: new Date().toISOString(), updated_at: new Date().toISOString(),
          }).catch(function(){});
        }
        // Re-fetch from DB then re-render to ensure accuracy
        await _viewsLoadViewParticipants(userId, viewName);
        renderDialog();
      };
    });

    overlay.querySelector('#nvsd-add-btn').onclick = function(e) {
      window._notesShowResourcePicker(e.currentTarget, async function(res) {
        if (!res.user_id) return;
        const vkey = _vpViewKey(userId, viewName);
        // Always re-fetch before duplicate check — prevents stale cache blocking re-invites
        await _viewsLoadViewParticipants(userId, viewName);
        const existing2 = _viewParticipants[vkey] || [];
        if (existing2.some(function(p){ return p.user_id===res.user_id; })) return;
        try {
          // Assign a color from palette based on participant count
          const _vpColors = ['#E25B6B','#EF9F27','#1D9E75','#8B5CF6','#E879A0','#00B4D8'];
          const _existingVp = _viewParticipants[_vpViewKey(userId, viewName)] || [];
          const _vpColor = _vpColors[(_existingVp.length) % _vpColors.length];
          await API.post('view_participants', {
            firm_id: 'aaaaaaaa-0001-0001-0001-000000000001',
            workspace_owner_user_id: userId, view_name: viewName,
            user_id: res.user_id, resource_id: res.id||null,
            view_role: 'viewer', tile_edit_overrides: [], color: _vpColor,
            invited_at: new Date().toISOString(), accepted_at: null, last_seen_at: null,
          });
          const myName = (window._notesResource && window._notesResource.name) || 'Someone';
          await API.post('notes', {
            firm_id: 'aaaaaaaa-0001-0001-0001-000000000001', owner_user_id: res.user_id,
            title: myName + ' invited you to view: ' + viewName,
            content: myName + ' has shared the view "' + viewName + '" with you. Accept in your inbox to access it.',
            hierarchy_path: 'Inbox', is_inbox: true, entity_id: null, entity_type: 'view_invite',
            entity_meta: { ownerUserId: userId, viewName: viewName },
            created_at: new Date().toISOString(), updated_at: new Date().toISOString(),
          }).catch(function(){});
        } catch(e) { console.warn('[Compass] Add view participant error:', e); }
        await _viewsLoadViewParticipants(userId, viewName);
        await renderDialog();
      });
    };

    overlay.querySelector('#nvsd-save').onclick = async function() {
      const vkey  = _vpViewKey(userId, viewName);
      const parts2 = _viewParticipants[vkey] || [];
      for (var i = 0; i < parts2.length; i++) {
        var p = parts2[i];
        if (p.user_id === userId) continue;
        const checkedSlots = [];
        overlay.querySelectorAll('.nvsd-slot-chk[data-pid="' + p.id + '"]:checked:not(:disabled)').forEach(function(chk) {
          checkedSlots.push(chk.dataset.slot);
        });
        const overrides = checkedSlots.length ? [{ user_id: p.user_id, slot_keys: checkedSlots }] : [];
        try {
          await API.patch('view_participants?id=eq.' + p.id, { view_role: p.view_role, tile_edit_overrides: overrides });
        } catch(e) { console.warn('[Compass] Save view participant error:', e); }
      }
      overlay.remove();
      await _viewsLoadViewParticipants(userId, viewName);
    };
  }

  if (!document.getElementById('nvsd-styles')) {
    const sty = document.createElement('style');
    sty.id = 'nvsd-styles';
    sty.textContent =
      '.nvsd-person-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid rgba(0,210,255,.06)}' +
      '.nvsd-matrix-row{display:flex;align-items:center;gap:0;padding:3px 0}' +
      '.nvsd-matrix-cell-hdr{width:54px;flex-shrink:0;font-family:var(--font-mono,monospace);font-size:9px;color:var(--text3);text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding:0 2px}' +
      '.nvsd-matrix-cell{width:54px;flex-shrink:0;display:flex;align-items:center;justify-content:center}' +
      '.nvsd-slot-chk{accent-color:#00D2FF;width:13px;height:13px;cursor:pointer}' +
      '.nvsd-slot-chk:disabled{opacity:.3;cursor:not-allowed}';
    document.head.appendChild(sty);
  }
  await renderDialog();
};

// ── STEP 5: View invite inbox dialog — accept / decline ───────────────────
async function _notesShowViewInviteDialog(inviteNote) {
  const titleMatch  = (inviteNote.title || '').match(/^(.+?) invited you to view: (.+)$/);
  const inviterName = titleMatch ? titleMatch[1] : 'Someone';
  const viewName    = titleMatch ? titleMatch[2] : 'a view';
  let ownerUserId   = null;
  try {
    // entity_meta may arrive as object (jsonb) or string depending on API layer — handle both
    const meta = inviteNote.entity_meta
      ? (typeof inviteNote.entity_meta === 'string' ? JSON.parse(inviteNote.entity_meta) : inviteNote.entity_meta)
      : null;
    ownerUserId = meta && meta.ownerUserId;
  } catch(e) {}
  if (!ownerUserId) return;

  const overlay = document.createElement('div');
  overlay.className = 'notes-invite-dialog-overlay';
  overlay.innerHTML =
    '<div class="views-invite-dialog">' +
      '<div class="nid-header">' +
        '<div class="nid-from">View Invitation</div>' +
        '<div class="nid-title">' + _esc(inviterName) + ' invited you to a view</div>' +
        '<div class="nid-note-name">\u229e ' + _esc(viewName) + '</div>' +
      '</div>' +
      '<div class="nid-body">' +
        _esc(inviterName) + ' has shared the view <strong style="color:#00D2FF">' + _esc(viewName) + '</strong> with you.' +
        '<br><br>Accepting will add this view to your workspace switcher. The view owner controls the layout.' +
        '<br><br>Declining will remove this invitation from your inbox.' +
      '</div>' +
      '<div class="nid-actions">' +
        '<button class="nid-btn nid-btn-reject" id="nvid-decline">\u2715 Decline</button>' +
        '<button class="nid-btn nid-btn-accept" id="nvid-accept">\u2713 Accept &amp; Open \u2192</button>' +
      '</div>' +
    '</div>';
  document.body.appendChild(overlay);
  overlay.addEventListener('mousedown', function(e) { if (e.target === overlay) overlay.remove(); });

  overlay.querySelector('#nvid-decline').onclick = async function() {
    overlay.remove();
    const selfUserId = window._notesResource && window._notesResource.user_id;
    // Remove from local array immediately before DB delete
    if (typeof _notes !== 'undefined') {
      const didx = _notes.findIndex(function(n) { return n.id === inviteNote.id; });
      if (didx >= 0) _notes.splice(didx, 1);
    }
    API.del('notes?id=eq.' + inviteNote.id).catch(function(){});
    if (selfUserId && ownerUserId) {
      try {
        await API.del(
          'view_participants?workspace_owner_user_id=eq.' + ownerUserId +
          '&view_name=eq.' + encodeURIComponent(viewName) +
          '&user_id=eq.' + selfUserId
        );
      } catch(e) {}
      const myName = (window._notesResource && window._notesResource.name) || 'Someone';
      try {
        await API.post('notes', {
          firm_id: 'aaaaaaaa-0001-0001-0001-000000000001', owner_user_id: ownerUserId,
          title: myName + ' declined your view invitation: ' + viewName,
          content: myName + ' has declined your invitation to the view "' + viewName + '".',
          hierarchy_path: 'Inbox', is_inbox: true, entity_id: null, entity_type: null,
          created_at: new Date().toISOString(), updated_at: new Date().toISOString(),
        });
      } catch(e) {}
    }
    // Refresh inbox
    const notesArr = typeof _notes !== 'undefined' ? _notes : [];
    const idx = notesArr.findIndex(function(n){ return n.id === inviteNote.id; });
    if (idx >= 0) notesArr.splice(idx, 1);
    if (typeof _notesRenderLeft === 'function') _notesRenderLeft();
    else if (window._notesRenderLeft) window._notesRenderLeft();
  };

  overlay.querySelector('#nvid-accept').onclick = async function() {
    overlay.remove();
    const selfUserId = window._notesResource && window._notesResource.user_id;
    if (!selfUserId || !ownerUserId) return;

    // 1. Mark view_participants row as accepted
    try {
      await API.patch(
        'view_participants?workspace_owner_user_id=eq.' + ownerUserId +
        '&view_name=eq.' + encodeURIComponent(viewName) +
        '&user_id=eq.' + selfUserId,
        { accepted_at: new Date().toISOString() }
      );
    } catch(e) { console.warn('[Compass] Accept view invite patch error:', e); }

    // 2. Update local workspace sharedViews — update in-memory only, save via existing workspace save
    const wsKey = _vpViewKey(ownerUserId, viewName);
    if (window._workspace) {
      if (!window._workspace.sharedViews) window._workspace.sharedViews = {};
      window._workspace.sharedViews[wsKey] = { ownerUserId: ownerUserId, viewName: viewName, acceptedAt: new Date().toISOString() };
    }
    // Persist — use upsert-safe pattern: read current state, merge, write back
    try {
      const wsRows = await API.get('notes_workspace?user_id=eq.' + selfUserId + '&limit=1').catch(function(){ return []; });
      const existing = wsRows && wsRows[0];
      const state = (existing && existing.state) ? existing.state : (window._workspace ? JSON.parse(JSON.stringify(window._workspace)) : {});
      if (!state.sharedViews) state.sharedViews = {};
      state.sharedViews[wsKey] = { ownerUserId: ownerUserId, viewName: viewName, acceptedAt: new Date().toISOString() };
      if (existing) {
        await API.patch('notes_workspace?user_id=eq.' + selfUserId, { state: state, updated_at: new Date().toISOString() });
      } else {
        await API.post('notes_workspace', { firm_id: 'aaaaaaaa-0001-0001-0001-000000000001', user_id: selfUserId, state: state, updated_at: new Date().toISOString() });
      }
    } catch(e) { console.warn('[Compass] Accept view invite workspace write error:', e); }

    // 3. Remove from local array first, then fire async DB delete
    if (typeof _notes !== 'undefined') {
      const idx = _notes.findIndex(function(n) { return n.id === inviteNote.id; });
      if (idx >= 0) _notes.splice(idx, 1);
    }
    // Advance lastChecked so inbox poller never re-fetches this deleted note
    try { window._inboxLastChecked = new Date().toISOString(); } catch(e) {}
    API.del('notes?id=eq.' + inviteNote.id).catch(function(e) { console.warn('[Compass] Inbox delete error:', e); });

    // 4. Re-render inbox (note already gone from array) then switch to shared view
    if (typeof _notesRenderLeft === 'function') _notesRenderLeft();
    else if (window._notesRenderLeft) window._notesRenderLeft();
    if (window._notesSwitchToSharedView) window._notesSwitchToSharedView(ownerUserId, viewName);
  };
}
window._notesShowViewInviteDialog = _notesShowViewInviteDialog;

})();
</script>

<script>
// ── Widget System — Phase 1 Infrastructure ────────────────────────────────
(function() {
'use strict';

const FIRM_ID = 'aaaaaaaa-0001-0001-0001-000000000001';

function _esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Widget Registry ───────────────────────────────────────────────────────
const WIDGET_REGISTRY = (function() {
  const _widgets = {};
  return {
    register: function(def) {
      if (!def.id || !def.renderFn || !def.dataFn) {
        console.error('[Widgets] Invalid registration:', def.id); return;
      }
      _widgets[def.id] = def;
      console.log('[Widgets] Registered:', def.id);
    },
    get: function(id) { return _widgets[id] || null; },
    getAll: function() { return Object.values(_widgets); },
    getByCategory: function(cat) { return Object.values(_widgets).filter(function(w) { return w.category === cat; }); },
    categories: function() {
      const cats = [];
      Object.values(_widgets).forEach(function(w) { if (!cats.includes(w.category)) cats.push(w.category); });
      return cats;
    },
    render: async function(widgetId, config, container, context) {
      const widget = _widgets[widgetId];
      if (!widget) { container.innerHTML = '<div class="widget-error">Unknown widget: ' + _esc(widgetId) + '</div>'; return; }
      try {
        const prevHTML = container.innerHTML;
        container.innerHTML = '<div class="widget-loading">Loading\u2026</div>';
        const data = await widget.dataFn(config, context);
        // If dataFn returns null (e.g. missing context), restore previous content and abort
        if (data === null || data === undefined) {
          container.innerHTML = prevHTML;
          return;
        }
        container.innerHTML = '';
        widget.renderFn(data, container, config);
      } catch(err) {
        console.error('[Widgets] Render error:', widgetId, err);
        container.innerHTML = '<div class="widget-error">Failed to load</div>';
      }
    }
  };
})();
// MY VIEWS: reuse shared WIDGET_REGISTRY if already set by MY NOTES
if (!window.WIDGET_REGISTRY) window.WIDGET_REGISTRY = WIDGET_REGISTRY;

// ── Widget context ────────────────────────────────────────────────────────
function _widgetContext() {
  const _res = window._notesResource || {};
  // MY VIEWS: use local _cv() directly — window._notesCv is MY NOTES' accessor
  const cv   = (typeof _cv === 'function') ? _cv() : (window._viewsCv && window._viewsCv());
  const _isShared    = !!(cv && cv._isSharedView);
  const _ownerUserId = (cv && cv._sharedOwner) || null;
  return {
    firmId:      FIRM_ID,
    userId:      _res.user_id || null,
    resourceId:  _res.id     || null,
    resource:    _res,
    api:         (typeof API !== 'undefined' && API) || window._notesAPI || null,
    isSharedView: _isShared,
    ownerUserId:  _ownerUserId,
  };
}
// MY VIEWS: store views-scoped context; only set shared _widgetContext if not already claimed
window._viewsWidgetContext = _widgetContext;
if (!window._widgetContext) window._widgetContext = _widgetContext;

// ── Refresh management ────────────────────────────────────────────────────
function startWidgetRefresh(tileEl, noteId, widgetId, config) {
  stopWidgetRefresh(tileEl);
  const widget = WIDGET_REGISTRY.get(widgetId);
  if (!widget || !widget.refreshInterval) return;
  tileEl._widgetInterval = setInterval(function() {
    const canvas = tileEl.querySelector('.tile-canvas');
    if (!canvas || tileEl.classList.contains('minimized')) return;
    WIDGET_REGISTRY.render(widgetId, config, canvas, _widgetContext());
  }, widget.refreshInterval);
}

function stopWidgetRefresh(tileEl) {
  if (tileEl && tileEl._widgetInterval) {
    clearInterval(tileEl._widgetInterval);
    delete tileEl._widgetInterval;
  }
}

// ── Canvas mode rendering ─────────────────────────────────────────────────
// forceRefresh=true bypasses the already-rendered guard (used by the periodic interval only)
function renderTileCanvas(tileEl, tileState, note, forceRefresh) {
  const mode = tileState.canvasMode || 'note';
  let canvas = tileEl.querySelector('.tile-canvas');
  if (!canvas) {
    canvas = document.createElement('div');
    canvas.className = 'tile-canvas';
    // Insert before chat panel
    const chat = tileEl.querySelector('[id^="notes-chat-"]');
    const body = tileEl.querySelector('[id^="notes-tbody-"]');
    const textarea = tileEl.querySelector('.views-tile-canvas');
    if (textarea) textarea.style.display = mode === 'note' ? '' : 'none';
    if (body) body.insertBefore(canvas, chat || null);
  }

  stopWidgetRefresh(tileEl);

  if (mode === 'widget' && tileState.widgetId) {
    canvas.style.display = '';
    const textarea = tileEl.querySelector('.views-tile-canvas');
    if (textarea) textarea.style.display = 'none';
    // Guard: skip dataFn if widget already rendered and this is just a re-wire call.
    // forceRefresh=true is only set by the periodic startWidgetRefresh interval.
    const alreadyRendered = canvas.dataset.widgetRendered === tileState.widgetId && !forceRefresh;
    if (alreadyRendered) {
      startWidgetRefresh(tileEl, tileState.noteId, tileState.widgetId, tileState.widgetConfig || {});
      return;
    }
    canvas.dataset.widgetRendered = tileState.widgetId;
    WIDGET_REGISTRY.render(tileState.widgetId, tileState.widgetConfig || {}, canvas, _widgetContext());
    startWidgetRefresh(tileEl, tileState.noteId, tileState.widgetId, tileState.widgetConfig || {});
  } else {
    // Note mode — hide canvas div, show textarea
    canvas.style.display = 'none';
    const textarea = tileEl.querySelector('.views-tile-canvas');
    if (textarea) textarea.style.display = '';
  }
}

// ── Mode switcher button (injected into tile header) ──────────────────────
function injectModeSwitcher(tileEl, tileState) {
  const header = tileEl.querySelector('.views-tile-header');
  if (!header || header.querySelector('.tile-header-mode-btn')) return;

  const mode   = tileState.canvasMode || 'note';
  const label  = mode === 'widget' ? (WIDGET_REGISTRY.get(tileState.widgetId)?.label || 'Widget') : 'Note';
  const btn    = document.createElement('button');
  btn.className = 'tile-header-mode-btn' + (mode === 'widget' ? ' widget-active' : '');
  btn.title     = mode === 'widget' ? 'Switch mode or reconfigure widget' : 'Switch canvas mode';
  btn.textContent = label;

  // Insert before the invite button
  const inviteBtn = header.querySelector('.views-invite-btn');
  if (inviteBtn) header.insertBefore(btn, inviteBtn);
  else header.appendChild(btn);

  btn.addEventListener('click', function(e) {
    e.stopPropagation();
    showModeSwitcher(btn, tileState);
  });

  // If in widget mode, also add a ⚙ reconfigure button
  if (mode === 'widget' && tileState.widgetId) {
    const gearBtn = document.createElement('button');
    gearBtn.className = 'tile-header-mode-btn';
    gearBtn.title     = 'Reconfigure widget';
    gearBtn.textContent = '⚙';
    gearBtn.dataset.widgetGear = '1';
    if (inviteBtn) header.insertBefore(gearBtn, inviteBtn);
    else header.appendChild(gearBtn);
    gearBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      showWidgetConfig(tileState.widgetId, tileState, tileState.widgetConfig || {});
    });
  }
}

function showModeSwitcher(btn, tileState) {
  document.querySelectorAll('.widget-mode-pop').forEach(function(el) { el.remove(); });
  const pop = document.createElement('div');
  pop.className = 'widget-mode-pop';
  const mode = tileState.canvasMode || 'note';

  pop.innerHTML =
    '<div class="widget-mode-item' + (mode === 'note' ? ' active' : '') + '" data-mode="note">' +
      '<span style="font-size:13px">✎</span> Note canvas' +
    '</div>' +
    '<div class="widget-mode-item' + (mode === 'widget' ? ' active' : '') + '" data-mode="widget">' +
      '<span style="font-size:13px">▦</span> Add widget' +
    '</div>';

  document.body.appendChild(pop);

  // Position below button
  const r = btn.getBoundingClientRect();
  pop.style.left = r.left + 'px';
  pop.style.top  = (r.bottom + 3) + 'px';

  pop.querySelectorAll('.widget-mode-item').forEach(function(item) {
    item.addEventListener('click', function() {
      pop.remove();
      const newMode = item.dataset.mode;
      if (newMode === 'widget') {
        showWidgetPicker(tileState);
      } else {
        // Switching to Note mode — if this is a placeholder tile (no DB record
        // yet), materialise a real note record now before rendering.
        const isPlaceholder = tileState.isPlaceholder ||
          (tileState.noteId && (tileState.noteId.startsWith('ph-') || tileState.noteId.startsWith('wt-')));
        if (isPlaceholder) {
          (async function() {
            try {
              const res = await API.post('notes', {
                firm_id:        FIRM_ID,
                owner_user_id:  _userId,
                title:          'New note',
                content:        '',
                hierarchy_path: 'Work',
                is_inbox:       false,
                created_at:     new Date().toISOString(),
                updated_at:     new Date().toISOString(),
              });
              const newNote = res?.[0];
              if (!newNote?.id) return;
              _notes.unshift(newNote);
              // Remap tileState to real note ID across ALL views (it may appear in tray too)
              const oldId = tileState.noteId;
              Object.values(_workspace.views || {}).forEach(function(v) {
                (v.tiles || []).forEach(function(t) { if (t.noteId === oldId) t.noteId = newNote.id; });
                v.tray = (v.tray || []).map(function(id) { return id === oldId ? newNote.id : id; });
              });
              tileState.noteId      = newNote.id;
              tileState.isPlaceholder = false;
              tileState.canvasMode  = 'note';
              delete tileState.widgetId;
              delete tileState.widgetConfig;
              _viewsSaveWorkspace(true);
              _notesRenderLeft();
              _notesRenderGrid();
              setTimeout(function() {
                const titleEl = document.querySelector('[data-viewid="' + newNote.id + '"].views-tile-title');
                if (titleEl) { titleEl.focus(); document.execCommand('selectAll', false, null); }
              }, 50);
            } catch(e) { console.error('[Compass] Failed to materialise note for placeholder tile:', e); }
          })();
        } else {
          tileState.canvasMode = 'note';
          delete tileState.widgetId;
          delete tileState.widgetConfig;
          _viewsSaveWorkspace(true);
          refreshTileWidget(tileState.noteId);
        }
      }
    });
  });

  setTimeout(function() {
    document.addEventListener('mousedown', function _close(e) {
      if (!pop.contains(e.target)) { pop.remove(); document.removeEventListener('mousedown', _close); }
    });
  }, 0);
}

// ── Widget picker ─────────────────────────────────────────────────────────
function showWidgetPicker(tileState) {
  document.querySelectorAll('.widget-picker-overlay').forEach(function(el) { el.remove(); });

  const overlay = document.createElement('div');
  overlay.className = 'widget-picker-overlay';

  function renderPicker(q) {
    const all  = WIDGET_REGISTRY.getAll();
    const cats = WIDGET_REGISTRY.categories();
    const lower = (q || '').toLowerCase().trim();
    const filtered = lower
      ? all.filter(function(w) { return w.label.toLowerCase().includes(lower) || (w.description||'').toLowerCase().includes(lower); })
      : all;

    const ICONS = { gauge:'⏱', counter:'🔢', sparkline:'📈', bars:'▬', feed:'📋', dial:'◉', heatmap:'▦', strip:'▬', default:'◈' };

    let bodyHtml = '';
    if (!filtered.length) {
      bodyHtml = '<div style="padding:20px;text-align:center;font-family:var(--font-mono,monospace);font-size:11px;color:var(--text3)">No widgets match</div>';
    } else if (lower) {
      bodyHtml = '<div class="widget-card-grid">' +
        filtered.map(function(w) { return widgetCardHTML(w, ICONS); }).join('') +
      '</div>';
    } else {
      cats.forEach(function(cat) {
        const items = filtered.filter(function(w) { return w.category === cat; });
        if (!items.length) return;
        bodyHtml +=
          '<div class="widget-cat-label">' + _esc(cat.charAt(0).toUpperCase() + cat.slice(1)) + '</div>' +
          '<div class="widget-card-grid">' + items.map(function(w) { return widgetCardHTML(w, ICONS); }).join('') + '</div>';
      });
    }

    overlay.innerHTML =
      '<div class="widget-picker-dialog">' +
        '<div class="widget-picker-header">' +
          '<div class="widget-picker-title">Add Widget</div>' +
          '<input class="widget-picker-search" id="wps-search" placeholder="Search widgets\u2026" value="' + _esc(q||'') + '" autocomplete="off"/>' +
          '<button class="widget-picker-close" id="wps-close">\u00d7</button>' +
        '</div>' +
        '<div class="widget-picker-body">' + bodyHtml + '</div>' +
      '</div>';

    overlay.querySelector('#wps-close').onclick = function() { overlay.remove(); };
    overlay.addEventListener('mousedown', function(e) { if (e.target === overlay) overlay.remove(); });

    const searchEl = overlay.querySelector('#wps-search');
    searchEl.addEventListener('input', function() { renderPicker(searchEl.value); });
    searchEl.focus();

    overlay.querySelectorAll('.widget-card').forEach(function(card) {
      card.addEventListener('click', function() {
        const widgetId = card.dataset.widgetId;
        overlay.remove();
        const widget = WIDGET_REGISTRY.get(widgetId);
        if (widget && widget.configSchema && widget.configSchema.length) {
          showWidgetConfig(widgetId, tileState, {});
        } else {
          applyWidget(widgetId, {}, tileState);
        }
      });
    });
  }

  function widgetCardHTML(w, icons) {
    const icon = icons[w.icon] || icons.default;
    return '<div class="widget-card" data-widget-id="' + _esc(w.id) + '">' +
      '<div class="widget-card-icon">' + icon + '</div>' +
      '<div class="widget-card-name">' + _esc(w.label) + '</div>' +
      '<div class="widget-card-desc">' + _esc(w.description || '') + '</div>' +
    '</div>';
  }

  renderPicker('');
  document.body.appendChild(overlay);
}

// ── Widget config form ────────────────────────────────────────────────────
async function showWidgetConfig(widgetId, tileState, existingConfig) {
  const widget = WIDGET_REGISTRY.get(widgetId);
  if (!widget) return;

  // Pre-load projects for any project_picker fields
  let _wcfProjects = [];
  const hasProjectPicker = (widget.configSchema||[]).some(function(f) { return f.type === 'project_picker'; });
  if (hasProjectPicker) {
    try {
      _wcfProjects = window._getProjectsForPicker
        ? await window._getProjectsForPicker()
        : [];
    } catch(e) {}
  }

  // Per-field config values — resource_picker uses resource_id, display separately
  const configValues = {};
  (widget.configSchema||[]).forEach(function(f) {
    configValues[f.key] = existingConfig[f.key] !== undefined ? existingConfig[f.key] : (f.default || '');
  });

  const overlay = document.createElement('div');
  overlay.className = 'widget-config-overlay';

  const fields = (widget.configSchema || []).map(function(field) {
    const val = configValues[field.key];
    let input = '';

    if (field.type === 'select') {
      input = '<select class="ntd-select wcf-input" data-key="' + _esc(field.key) + '">' +
        (field.options||[]).map(function(o) {
          return '<option value="' + _esc(o.value) + '"' + (o.value == val ? ' selected' : '') + '>' + _esc(o.label) + '</option>';
        }).join('') + '</select>';

    } else if (field.type === 'boolean') {
      input = '<input type="checkbox" class="wcf-input" data-key="' + _esc(field.key) + '"' + (val ? ' checked' : '') + ' style="width:auto"/>';

    } else if (field.type === 'project_picker') {
      input = '<select class="ntd-select wcf-input" data-key="' + _esc(field.key) + '" style="width:100%">' +
        '<option value="">— Select project —</option>' +
        _wcfProjects.map(function(p) {
          return '<option value="' + _esc(p.id) + '"' + (p.id === val ? ' selected' : '') + '>' + _esc(p.name) + '</option>';
        }).join('') +
      '</select>';

    } else if (field.type === 'resource_picker') {
      const selfName = window._notesResource ? (window._notesResource.name || 'Me') : 'Me';
      const displayName = val ? '' : selfName; // will be updated when loaded
      input =
        '<div style="display:flex;align-items:center;gap:8px">' +
          '<input type="hidden" class="wcf-input wcf-res-val" data-key="' + _esc(field.key) + '" value="' + _esc(String(val)) + '"/>' +
          '<div class="wcf-res-display" style="font-family:var(--font-ui,sans-serif);font-size:13px;color:var(--text1);flex:1;min-width:0">' + (val ? _esc(val) : _esc(selfName)) + '</div>' +
          '<button class="ntd-btn ntd-btn-cancel wcf-res-pick-btn" type="button" style="padding:4px 10px;font-size:10px;flex-shrink:0">Choose…</button>' +
        '</div>';

    } else {
      input = '<input class="ntd-input wcf-input" data-key="' + _esc(field.key) + '" type="' + (field.type === 'number' ? 'number' : 'text') + '" value="' + _esc(String(val)) + '" placeholder="' + _esc(field.label) + '"/>';
    }
    return '<div class="ntd-field"><label class="ntd-label">' + _esc(field.label) + '</label>' + input + '</div>';
  }).join('');

  overlay.innerHTML =
    '<div class="widget-config-dialog">' +
      '<div class="ntd-header">' +
        '<div class="ntd-sub">Configure Widget</div>' +
        '<div class="ntd-title">' + _esc(widget.label) + '</div>' +
      '</div>' +
      '<div class="ntd-body">' + fields + '</div>' +
      '<div class="ntd-actions">' +
        '<button class="ntd-btn ntd-btn-cancel" id="wcf-cancel">Cancel</button>' +
        '<button class="ntd-btn ntd-btn-save" id="wcf-apply">Apply</button>' +
      '</div>' +
    '</div>';

  document.body.appendChild(overlay);

  // Wire resource picker "Choose…" buttons — open the shared invite popover
  overlay.querySelectorAll('.wcf-res-pick-btn').forEach(function(btn) {
    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      if (!window._notesShowResourcePicker) return;
      const hiddenInput  = btn.parentElement.querySelector('.wcf-res-val');
      const displayEl    = btn.parentElement.querySelector('.wcf-res-display');
      window._notesShowResourcePicker(btn, function(resource) {
        hiddenInput.value  = resource.id || '';
        displayEl.textContent = resource.name || 'Me (default)';
      });
    });
  });

  // Resolve saved resource IDs to names for display
  overlay.querySelectorAll('.wcf-res-val').forEach(function(inp) {
    const savedId  = inp.value;
    const displayEl = inp.parentElement.querySelector('.wcf-res-display');
    if (savedId && displayEl && window._notesGetInviteResources) {
      const res = (window._notesGetInviteResources() || []).find(function(r) { return r.id === savedId; });
      if (res) displayEl.textContent = res.name;
    }
  });

  overlay.querySelector('#wcf-cancel').onclick = function() { overlay.remove(); };
  overlay.addEventListener('mousedown', function(e) { if (e.target === overlay) overlay.remove(); });
  overlay.querySelector('#wcf-apply').onclick = function() {
    const config = {};
    overlay.querySelectorAll('.wcf-input').forEach(function(inp) {
      if (inp.type === 'checkbox') config[inp.dataset.key] = inp.checked;
      else if (inp.dataset.key) config[inp.dataset.key] = inp.value;
    });
    overlay.remove();
    applyWidget(widgetId, config, tileState);
  };
}

// ── Apply widget to tile ──────────────────────────────────────────────────
function applyWidget(widgetId, config, tileState) {
  // If a real note record backs this tile, delete it — widget tiles have no
  // institutional knowledge worth preserving in the notes table.
  const noteId = tileState.noteId;
  const isPlaceholder = tileState.isPlaceholder || (noteId && noteId.startsWith('ph-'));
  if (!isPlaceholder && noteId) {
    // Delete the backing note record silently
    API.del('notes?id=eq.' + noteId).catch(function(){});
    // Remove from local _notes array
    if (typeof _notes !== 'undefined') {
      _notes = _notes.filter(function(n){ return n.id !== noteId; });
    }
    console.log('[Widgets] Deleted backing note for widget tile:', noteId, widgetId);
  }
  // Assign a stable synthetic ID for placeholder tiles (never hits the DB)
  let newNoteId = noteId;
  if (isPlaceholder && (!noteId || noteId.startsWith('ph-'))) {
    newNoteId = 'wt-' + Date.now() + '-' + Math.random().toString(36).slice(2,8);
    tileState.noteId = newNoteId;
    // Update the DOM element's data-viewid so refreshTileWidget can find it
    const oldEl = document.querySelector('.views-tile[data-viewid="' + noteId + '"]');
    if (oldEl) oldEl.dataset.noteid = newNoteId;
  }
  tileState.isPlaceholder = false;
  tileState.canvasMode    = 'widget';
  tileState.widgetId      = widgetId;
  tileState.widgetConfig  = config;
  _viewsSaveWorkspace(true);
  // Refresh left panel so deleted note disappears from knowledge tree
  if (typeof _notesRenderLeft === 'function') _notesRenderLeft();
  refreshTileWidget(tileState.noteId);
}

// ── Refresh a specific tile's widget rendering ────────────────────────────
function refreshTileWidget(noteId) {
  const tileEl = document.querySelector('.views-tile[data-viewid="' + noteId + '"]');
  if (!tileEl) return;
  const cv = (typeof _cv === 'function' ? _cv() : (window._viewsCv && window._viewsCv()));
  if (!cv) return;
  const tileState = cv.tiles.find(function(t) { return t.noteId === noteId; });
  if (!tileState) return;
  // Re-inject mode switcher (updates label, adds/removes gear button)
  const existing = tileEl.querySelectorAll('.tile-header-mode-btn');
  existing.forEach(function(el) { el.remove(); });
  injectModeSwitcher(tileEl, tileState);
  // Clear the rendered guard so the new config triggers a fresh dataFn call
  const canvas = tileEl.querySelector('.tile-canvas');
  if (canvas) delete canvas.dataset.widgetRendered;
  renderTileCanvas(tileEl, tileState, null);
}

// ── Wire into tile rendering via _notesPostWire hook ─────────────────────
// Export showWidgetPicker so _notesNew (Block 1) can open it directly
window._viewsShowWidgetPicker = function(tileState) { showWidgetPicker(tileState); };
window._viewsPostWire = function() {
  const cv = (typeof _cv === 'function' ? _cv() : (window._viewsCv && window._viewsCv()));
  if (!cv) return;
  const isLocked = !!cv.locked;
  cv.tiles.forEach(function(tileState) {
    const tileEl = document.querySelector('.views-tile[data-viewid="' + tileState.noteId + '"]');
    if (!tileEl) return;
    // Don't inject mode switcher on locked views — prevents widget/note switching
    if (!isLocked) injectModeSwitcher(tileEl, tileState);
    if (tileState.canvasMode === 'widget' && tileState.widgetId) {
      renderTileCanvas(tileEl, tileState, null);
    }
  });
};

// ── Gear icon for reconfiguring existing widget ───────────────────────────
// Exposed so tile HTML can call it
window._viewsWidgetReconfigure = function(noteId) {
  const cv = (typeof _cv === 'function' ? _cv() : (window._viewsCv && window._viewsCv()));
  if (!cv) return;
  const tileState = cv.tiles.find(function(t) { return t.noteId === noteId; });
  if (!tileState || !tileState.widgetId) return;
  showWidgetConfig(tileState.widgetId, tileState, tileState.widgetConfig || {});
};

// ── Stub widget — validates full pipeline ────────────────────────────────
WIDGET_REGISTRY.register({
  id:          'stub_hello',
  label:       'Hello Widget',
  category:    'personal',
  description: 'Stub widget — validates the full pipeline',
  icon:        'gauge',
  configSchema: [
    { key: 'message', label: 'Message', type: 'text', default: 'Hello from the widget system!' }
  ],
  refreshInterval: 0,
  minTileHeight:   'small',
  dataFn: async function(config) {
    return { message: config.message || 'Hello from the widget system!' };
  },
  renderFn: function(data, container) {
    container.innerHTML =
      '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:8px;padding:16px">' +
        '<div style="font-size:28px">▦</div>' +
        '<div style="font-family:var(--font-ui,\'Barlow Condensed\',sans-serif);font-size:14px;font-weight:600;color:#00D2FF;text-align:center">' +
          _esc((data && data.message) || 'Hello!') +
        '</div>' +
        '<div style="font-family:var(--font-mono,monospace);font-size:9px;color:var(--text3);letter-spacing:.08em">WIDGET SYSTEM ACTIVE</div>' +
      '</div>';
  }
});

console.log('[Widgets] Phase 1 infrastructure loaded. Registry:', WIDGET_REGISTRY.getAll().length, 'widget(s).');

})();
</script>

<script>
// ── Widget Library — Phase 2 ──────────────────────────────────────────────
// Fixed: window.API → bare API global (compass declares it as const, not window.API)
// Fixed: status=neq.completed → status=neq.complete (matches actual DB values)
// Fixed: setTimeout re-fires moved to AFTER all widget registrations
// Added: console diagnostics throughout dataFn pipeline
(function() {
'use strict';

const FIRM_ID = 'aaaaaaaa-0001-0001-0001-000000000001';
const P2 = '[W2]'; // log prefix — short, scannable in console

// ── Helpers ───────────────────────────────────────────────────────────────
function _esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── API resolver ─────────────────────────────────────────────────────────
// compass.html declares `const API = ...` at page scope — that is NOT a
// property of window, so `window.API` is undefined inside an IIFE.
// We must use `typeof API` to reach the bare global safely.
function _resolveApi() {
  if (typeof API !== 'undefined' && API && typeof API.get === 'function') return API;
  if (window._notesAPI && typeof window._notesAPI.get === 'function') return window._notesAPI;
  return null;
}

function _api(path) {
  const api = _resolveApi();
  if (!api) {
    console.warn(P2, '_api() — no API object available for path:', path);
    return Promise.resolve([]);
  }
  return api.get(path).catch(function(err) {
    console.error(P2, '_api() fetch error:', path, err);
    return [];
  });
}

function _selfResourceId() { return window._notesResource && window._notesResource.id; }
function _selfUserId()     { return window._notesResource && window._notesResource.user_id; }

// ── Context helper ────────────────────────────────────────────────────────
function _widgetCtx() {
  if (window._widgetContext) return window._widgetContext();
  const res = window._notesResource || {};
  return {
    firmId:     FIRM_ID,
    userId:     res.user_id || null,
    resourceId: res.id || null,
    role:       res.role || res.title || '',
    api:        _resolveApi(),
  };
}

// ── Target resolver — shared-view aware ──────────────────────────────────
// When a viewer opens a shared workspace, widgetConfig.targetResourceId may
// contain the *owner's* resource ID (saved when the owner configured the tile).
// The viewer should always see their own data. This helper resolves the correct
// rid/uid to query, substituting the viewer's own IDs whenever the config ID
// does not belong to the current user.
function _resolveTarget(config) {
  const ctx       = _widgetCtx();
  const myRid     = ctx.resourceId;
  const myUid     = ctx.userId;
  const configRid = (config && config.targetResourceId) || '';
  // Also accept legacy targetUserId key (next_week_queue/task_counter used this before the rename)
  const configUid = (config && config.targetUserId) || '';

  // In a shared view, if the saved ID is not ours → use our own IDs
  if (ctx.isSharedView && configRid && configRid !== myRid) {
    return { rid: myRid, uid: myUid };
  }
  if (ctx.isSharedView && configUid && configUid !== myUid) {
    return { rid: myRid, uid: myUid };
  }

  // For cloned dashboards: the active view may have forResourceId stamped on it.
  // When a widget config's targetResourceId is empty (owner didn't explicitly pick
  // themselves), fall back to the view's associated person rather than the logged-in
  // user. This is the key fix for cloned dashboards showing identical data.
  const cv = (typeof _cv === 'function' ? _cv() : (window._viewsCv && window._viewsCv()));
  const viewRid = cv && cv.forResourceId  ? cv.forResourceId  : null;

  // Prefer rid-derived uid over any raw configUid — a stale cloned config may have
  // the previous owner's targetUserId baked in. When configRid (or viewRid) is
  // available, always look up the uid fresh from _inviteResources instead.
  // configUid is only used as a last resort when there is no rid at all.
  const effectiveRid = configRid || viewRid || null;
  let resolvedUid = null;
  if (effectiveRid && window._inviteResources) {
    const res = window._inviteResources.find(function(r) { return r.id === effectiveRid; });
    if (res) resolvedUid = res.user_id || null;
  }
  if (!resolvedUid && !effectiveRid) resolvedUid = configUid || null;

  // Only fall back to myUid when we're genuinely targeting self (no effectiveRid,
  // or effectiveRid === myRid). When targeting another person whose user_id is null
  // (no login yet), return uid:null so widgets show empty rather than self's data.
  const targetingOther = effectiveRid && effectiveRid !== myRid;
  return {
    rid: effectiveRid || myRid,
    uid: resolvedUid || (targetingOther ? null : myUid),
  };
}

// ── Guard ─────────────────────────────────────────────────────────────────
if (!window.WIDGET_REGISTRY) {
  console.error(P2, 'WIDGET_REGISTRY not available — aborting Phase 2 registration');
  return;
}

// ── Project picker helper — role-aware ────────────────────────────────────
async function _getProjectsForPicker() {
  const ctx  = _widgetCtx();
  const api  = ctx.api;
  if (!api) { console.warn(P2, '_getProjectsForPicker: no API'); return []; }
  const role = (ctx.role || '').toLowerCase();
  const isPM = role.includes('pm') || role.includes('manager') || role.includes('director');

  if (isPM) {
    const rows = await api.get(
      'workflow_instances?select=project_id,title&status=eq.active&order=title.asc&limit=200'
    ).catch(function(){return[];});
    const seen = {};
    return (rows||[]).filter(function(r) {
      if (!r.project_id || seen[r.project_id]) return false;
      seen[r.project_id] = true; return true;
    }).map(function(r) { return { id: r.project_id, name: r.title }; });
  } else {
    const [taskRows, aiRows] = await Promise.all([
      api.get('tasks?select=project_id,workflow_instances(title)&assigned_to=eq.' + ctx.userId +
              '&status=neq.complete&not.project_id=is.null&limit=200').catch(function(){return[];}),
      api.get('workflow_action_items?select=instance_id,workflow_instances(project_id,title)' +
              '&owner_resource_id=eq.' + ctx.resourceId + '&status=eq.open&limit=200').catch(function(){return[];}),
    ]);
    const seen = {};
    const projects = [];
    (taskRows||[]).forEach(function(r) {
      if (r.project_id && !seen[r.project_id]) {
        seen[r.project_id] = true;
        projects.push({ id: r.project_id, name: (r.workflow_instances&&r.workflow_instances.title) || r.project_id });
      }
    });
    (aiRows||[]).forEach(function(r) {
      const wi = r.workflow_instances;
      if (wi && wi.project_id && !seen[wi.project_id]) {
        seen[wi.project_id] = true;
        projects.push({ id: wi.project_id, name: wi.title || wi.project_id });
      }
    });
    return projects.sort(function(a,b){return a.name.localeCompare(b.name);});
  }
}
window._getProjectsForPicker = _getProjectsForPicker;


// ── 1. CAPACITY GAUGE ─────────────────────────────────────────────────────
window.WIDGET_REGISTRY.register({
  id:              'capacity_gauge',
  label:           'Capacity gauge',
  category:        'personal',
  description:     'Load vs. capacity — hours when available, count when not',
  icon:            'gauge',
  configSchema: [
    { key:'targetResourceId', label:'Person', type:'resource_picker', default:'', required:true,
      templatePlaceholder:'Select person when launching' },
    { key:'dailyCapacity',   label:'Capacity (target open items)', type:'number', default:16 },
  ],
  refreshInterval: 120000,
  minTileHeight:   'medium',

  dataFn: async function(config) {
    const { rid, uid } = _resolveTarget(config);
    if (!rid && !uid) return null;
    const today = new Date().toISOString().slice(0,10);
    // dailyCapacity is reused as "target open items" — a simple workload ceiling.
    // Default 16 = a reasonable ceiling for open tasks+actions before overload.
    const cap = Math.max(1, parseFloat(config.dailyCapacity) || 16);

    const [aiRows, taskRows] = await Promise.all([
      rid ? _api('workflow_action_items?owner_resource_id=eq.'+rid+'&status=eq.open&select=id,due_date&limit=500') : [],
      uid ? _api('tasks?assigned_to=eq.'+uid+'&status=neq.complete&select=id,due_date&limit=500') : [],
    ]);

    const items = Array.isArray(aiRows)   ? aiRows   : [];
    const tasks = Array.isArray(taskRows) ? taskRows : [];
    const all   = items.concat(tasks);

    // Load % = open item count vs capacity ceiling. Capped at 200% for display.
    const count = all.length;
    const pct   = Math.round((count / cap) * 100);

    return {
      total:    count,
      overdue:  all.filter(function(i){return i.due_date&&i.due_date<today;}).length,
      dueToday: all.filter(function(i){return i.due_date===today;}).length,
      upcoming: all.filter(function(i){return i.due_date&&i.due_date>today;}).length,
      cap, pct,
      // hasHours always false now — count mode only, avoids misleading hour math
      hasHours: false,
      totalHours: 0,
    };
  },

  renderFn: function(data, container) {
    if (!data) { container.innerHTML='<div class="widget-error">No data</div>'; return; }
    const pct   = Math.min(data.pct, 200); // allow display up to 200%
    const color = pct>=100?'#E24B4A':pct>=75?'#EF9F27':'#1D9E75';
    container.innerHTML=
      '<div class="widget-counter">'+
        '<div class="wc-big" style="color:'+color+'">'+data.pct+'%</div>'+
        '<div class="wc-label">LOAD · '+data.total+' open / '+data.cap+' target</div>'+
        '<div class="widget-stat-row" style="margin-top:4px">'+
          '<div class="wsr-item"><div class="wsr-val">'+data.total+'</div><div class="wsr-lbl">Open</div></div>'+
          '<div class="wsr-item"><div class="wsr-val" style="color:#E24B4A">'+data.overdue+'</div><div class="wsr-lbl">Overdue</div></div>'+
          '<div class="wsr-item"><div class="wsr-val" style="color:#EF9F27">'+data.dueToday+'</div><div class="wsr-lbl">Today</div></div>'+
          '<div class="wsr-item"><div class="wsr-val" style="color:#4A9EFF">'+data.upcoming+'</div><div class="wsr-lbl">Upcoming</div></div>'+
        '</div>'+
      '</div>';
  }
});


// ── 2. ACTION ITEM COUNTER ────────────────────────────────────────────────
window.WIDGET_REGISTRY.register({
  id:              'action_item_counter',
  label:           'Action item counter',
  category:        'personal',
  description:     'Open action items — count with overdue breakdown',
  icon:            'counter',
  configSchema: [
    { key:'targetResourceId', label:'Person', type:'resource_picker', default:'', required:true,
      templatePlaceholder:'Select person when launching' },
  ],
  refreshInterval: 60000,
  minTileHeight:   'small',

  dataFn: async function(config) {
    const ctx   = _widgetCtx();
    const { rid } = _resolveTarget(config);
    if (!rid) return null;
    const today = new Date().toISOString().slice(0,10);
    const items = await _api('workflow_action_items?owner_resource_id=eq.'+rid+'&status=eq.open&select=id,due_date&limit=500');
    const all   = Array.isArray(items) ? items : [];
    return {
      total:    all.length,
      overdue:  all.filter(function(i){return i.due_date&&i.due_date<today;}).length,
      dueToday: all.filter(function(i){return i.due_date===today;}).length,
      upcoming: all.length - all.filter(function(i){return i.due_date&&i.due_date<=today;}).length,
    };
  },

  renderFn: function(data, container) {
    if (!data) { container.innerHTML='<div class="widget-error">No data</div>'; return; }
    const c = data.overdue>0?'#E24B4A':data.dueToday>0?'#EF9F27':'#00D2FF';
    container.innerHTML=
      '<div class="widget-counter">'+
        '<div class="wc-big" style="color:'+c+'">'+data.total+'</div>'+
        '<div class="wc-label">Open action items</div>'+
        '<div class="wc-breakdown">'+
          '<span style="color:#E24B4A">'+data.overdue+' overdue</span>'+
          '<span style="color:#EF9F27">'+data.dueToday+' today</span>'+
          '<span style="color:#4A9EFF">'+data.upcoming+' upcoming</span>'+
        '</div>'+
      '</div>';
  }
});


// ── 3. NEXT WEEK QUEUE ───────────────────────────────────────────────────
// Mirrors the "Next week" KPI from My Calendar:
// Tasks with due_date beyond this Sunday, OR no due_date at all.
// Hours = budget_hours || (effort_days * 8) || 2 per item (calendar default).
window.WIDGET_REGISTRY.register({
  id:              'next_week_queue',
  label:           'Next week queue',
  category:        'personal',
  description:     'Tasks queued for next week — count and budgeted hours',
  icon:            'counter',
  configSchema: [
    { key:'targetResourceId', label:'Person', type:'resource_picker', default:'', required:false,
      templatePlaceholder:'Select person when launching' },
  ],
  refreshInterval: 120000,
  minTileHeight:   'small',

  dataFn: async function(config) {
    const { uid } = _resolveTarget(config);
    // Return zero-state (not null) when uid unavailable — renderFn cleans up
    // stale DOM and tooltip rather than leaving previous user's data visible.
    if (!uid) return { count:0, hours:0, overdueN:0, thisWeekN:0,
                       today:'', nextSunIso:'', rows:[], noLogin:true };

    const now    = new Date();
    const today  = now.toLocaleDateString('en-CA');

    // Next Sunday — always advance (even if today is Sunday, target next one)
    const dayOfWeek  = now.getDay();
    const daysToSun  = dayOfWeek === 0 ? 7 : 7 - dayOfWeek;
    const nextSun    = new Date(now);
    nextSun.setDate(now.getDate() + daysToSun);
    const nextSunIso = nextSun.toLocaleDateString('en-CA');

    const tasks = await _api(
      'tasks?assigned_to=eq.'+uid+
      '&status=neq.complete' +
      '&select=id,name,due_date,budget_hours,effort_days,status,pct_complete&limit=500'
    );
    // Filter cancelled client-side — 'cancelled' may not exist in the task_status enum
    const all = (Array.isArray(tasks) ? tasks : []).filter(function(t){ return t.status !== 'cancelled'; });

    // Bucket: tasks that are overdue OR due on/before next Sunday.
    // Excludes tasks with no due date and tasks due beyond next Sunday.
    const bucket = all.filter(function(t) {
      if (!t.due_date) return false;
      return t.due_date.slice(0,10) <= nextSunIso;
    });

    function taskHrs(t) {
      return parseFloat(t.budget_hours || (t.effort_days ? t.effort_days * 8 : 0) || 2);
    }

    const totalHrs  = bucket.reduce(function(s,t){ return s + taskHrs(t); }, 0);
    const overdueN  = bucket.filter(function(t){ return t.due_date.slice(0,10) < today; }).length;
    const thisWeekN = bucket.length - overdueN;

    // Detail rows for tooltip — sorted by due date (overdue first naturally)
    const rows = bucket.slice().sort(function(a,b){
      const da = a.due_date.slice(0,10), db = b.due_date.slice(0,10);
      return da < db ? -1 : da > db ? 1 : 0;
    }).map(function(t) {
      const hrs  = taskHrs(t);
      const p    = parseFloat(t.pct_complete)||0;
      const pct  = p<=1&&p>0 ? Math.round(p*100) : Math.round(p);
      const due  = t.due_date.slice(0,10);
      return { name: t.name, hrs, pct, due, overdue: due < today, status: t.status||'' };
    });

    return {
      count: bucket.length,
      hours: Math.round(totalHrs * 10) / 10,
      overdueN, thisWeekN, today, nextSunIso, rows,
    };
  },

  renderFn: function(data, container) {
    // Always remove any stale tooltip from a previous render first
    if (container._nwqTip) { container._nwqTip.remove(); delete container._nwqTip; }
    if (!data) { container.innerHTML='<div class="widget-error">No data</div>'; return; }
    // No login — show clean zero state, no tooltip
    if (data.noLogin) {
      container.innerHTML=
        '<div class="widget-counter">'+
          '<div class="wc-big" style="color:rgba(0,210,255,.3)">0h</div>'+
          '<div class="wc-label">NEXT WEEK</div>'+
          '<div class="wc-breakdown"><span style="color:var(--text3)">No tasks — login not configured</span></div>'+
        '</div>';
      return;
    }
    const mono = 'font-family:var(--font-mono,monospace)';

    function fmtH(h) { return (Math.round(h*10)/10)+'h'; }
    function fmtD(iso) {
      if (!iso) return '\u2013';
      const d = new Date(iso+'T00:00:00');
      return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
    }
    function _esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    container.innerHTML =
      '<div class="widget-counter" style="position:relative">'+
        '<div class="wc-big" style="color:#00D2FF">'+fmtH(data.hours)+'</div>'+
        '<div class="wc-label">NEXT WEEK</div>'+
        '<div class="wc-breakdown">'+
          '<span style="color:rgba(255,255,255,.5)">'+data.count+' item'+(data.count!==1?'s':'')+' queued</span>'+
        '</div>'+
        '<div style="'+mono+';font-size:9px;color:var(--text3);margin-top:6px;display:flex;gap:10px;justify-content:center">'+
          '<span style="color:rgba(226,75,74,.8)">'+data.overdueN+' overdue</span>'+
          '<span>'+data.thisWeekN+' this/next week</span>'+
        '</div>'+
        (data.rows.length ? '<div style="'+mono+';font-size:8px;color:rgba(0,210,255,.3);margin-top:8px;letter-spacing:.04em">HOVER FOR DETAIL \u25b2</div>' : '')+
      '</div>';

    if (!data.rows.length) return;

    // ── Tooltip ──────────────────────────────────────────────────────────
    var tip = document.createElement('div');
    tip.style.cssText =
      'position:fixed;z-index:9999;display:none;'+
      'background:#0A1628;border:1px solid rgba(0,210,255,.25);'+
      'box-shadow:0 12px 48px rgba(0,0,0,.85);'+
      'font-family:var(--font-ui,"Barlow Condensed",sans-serif);'+
      'font-size:14px;color:var(--text1,#C8DFF0);'+
      'min-width:720px;max-width:960px;pointer-events:none';

    var COL = { name:'flex:1;padding-right:14px', hrs:'width:68px;text-align:right',
                pct:'width:58px;text-align:right', due:'width:80px;text-align:right',
                status:'width:100px;text-align:right' };

    var html =
      '<div style="padding:10px 16px 7px;border-bottom:1px solid rgba(0,210,255,.15);'+
          'display:flex;gap:0;'+mono+';font-size:11px;color:rgba(0,210,255,.55);letter-spacing:.07em;text-transform:uppercase">'+
        '<span style="'+COL.name+'">Task</span>'+
        '<span style="'+COL.hrs+'">Effort</span>'+
        '<span style="'+COL.pct+'">Done</span>'+
        '<span style="'+COL.due+'">Due</span>'+
        '<span style="'+COL.status+'">Status</span>'+
      '</div>'+
      '<div style="max-height:480px;overflow-y:auto">';

    data.rows.forEach(function(r) {
      var bg  = r.overdue ? 'rgba(226,75,74,.10)' : 'transparent';
      var dc  = r.overdue ? '#E24B4A' : 'rgba(255,255,255,.4)';
      var pc  = r.pct>=100 ? '#1D9E75' : r.pct>0 ? '#EF9F27' : 'rgba(255,255,255,.25)';
      var sl  = r.status ? r.status.charAt(0).toUpperCase()+r.status.slice(1).replace(/_/g,' ') : '\u2013';
      html +=
        '<div style="display:flex;gap:0;align-items:center;padding:7px 16px;'+
            'border-bottom:1px solid rgba(255,255,255,.04);background:'+bg+'">'+
          '<span style="'+COL.name+';overflow:hidden;text-overflow:ellipsis;white-space:nowrap;'+(r.overdue?'color:#E24B4A;':'')+'">'+_esc(r.name)+'</span>'+
          '<span style="'+COL.hrs+';'+mono+';font-size:13px;color:#00D2FF">'+fmtH(r.hrs)+'</span>'+
          '<span style="'+COL.pct+';'+mono+';font-size:13px;color:'+pc+'">'+r.pct+'%</span>'+
          '<span style="'+COL.due+';'+mono+';font-size:13px;color:'+dc+'">'+fmtD(r.due)+'</span>'+
          '<span style="'+COL.status+';font-size:13px;color:rgba(255,255,255,.4)">'+_esc(sl)+'</span>'+
        '</div>';
    });

    // Footer — total must match KPI exactly
    html +=
      '</div>'+
      '<div style="display:flex;gap:0;align-items:center;padding:8px 16px;'+
          'border-top:1px solid rgba(0,210,255,.2);background:rgba(0,210,255,.05)">'+
        '<span style="'+COL.name+';'+mono+';font-size:11px;color:rgba(0,210,255,.5);letter-spacing:.05em;text-transform:uppercase">'+
          'Total \u2014 '+data.count+' task'+(data.count!==1?'s':'')+
        '</span>'+
        '<span style="'+COL.hrs+';'+mono+';font-size:15px;font-weight:700;color:#00D2FF">'+fmtH(data.hours)+'</span>'+
        '<span style="'+COL.pct+'"></span>'+
        '<span style="'+COL.due+'"></span>'+
        '<span style="'+COL.status+'"></span>'+
      '</div>';

    tip.innerHTML = html;

    // Remove any previously attached tooltip for this container before adding new one
    if (container._nwqTip) { container._nwqTip.remove(); }
    container._nwqTip = tip;
    document.body.appendChild(tip);

    var wrapEl = container.querySelector('.widget-counter') || container;
    function showTip(e) { tip.style.display='block'; moveTip(e); }
    function moveTip(e) {
      var tw=tip.offsetWidth, th=tip.offsetHeight;
      var vw=window.innerWidth, vh=window.innerHeight;
      var x=e.clientX+16, y=e.clientY-24;
      if (x+tw>vw-8) x=e.clientX-tw-16;
      if (y+th>vh-8) y=vh-th-8;
      if (y<8) y=8;
      tip.style.left=x+'px'; tip.style.top=y+'px';
    }
    function hideTip() { tip.style.display='none'; }
    wrapEl.addEventListener('mouseenter', showTip);
    wrapEl.addEventListener('mousemove',  moveTip);
    wrapEl.addEventListener('mouseleave', hideTip);
    wrapEl.style.cursor = 'default';

    // Cleanup when container leaves DOM (view switch re-renders the tile)
    var obs = new MutationObserver(function() {
      if (!document.body.contains(container)) {
        tip.remove();
        if (container._nwqTip === tip) delete container._nwqTip;
        obs.disconnect();
      }
    });
    obs.observe(document.body, { childList:true, subtree:true });
  }
});


// ── 4. HOURS BY DAY ──────────────────────────────────────────────────────
// Speedometer gauge per day — exact port of My Work's "This week — hours by day"
// Cyan = billable arc, purple = non-billable arc, needle = total. Scale: 8h = full.
window.WIDGET_REGISTRY.register({
  id:              'hours_by_day',
  label:           'Hours by day',
  category:        'personal',
  description:     'This week\'s time entries as daily speedometer gauges',
  icon:            'bars',
  configSchema: [
    { key:'targetResourceId', label:'Person', type:'resource_picker', default:'', required:false,
      templatePlaceholder:'Select person when launching' },
  ],
  refreshInterval: 300000,
  minTileHeight:   'medium',

  dataFn: async function(config) {
    const { rid } = _resolveTarget(config);
    if (!rid) return null;

    // Build Mon–Sun array in local time
    const now = new Date();
    const dayOfWeek = now.getDay();
    const isoOffset = dayOfWeek === 0 ? 6 : dayOfWeek - 1;
    const mon = new Date(now); mon.setDate(now.getDate() - isoOffset);
    const weekDays = Array.from({length:7}, function(_,i) {
      const d = new Date(mon); d.setDate(mon.getDate() + i);
      return d.toLocaleDateString('en-CA');
    });
    const today    = now.toLocaleDateString('en-CA');
    const monIso   = weekDays[0];
    const sunIso   = weekDays[6];

    const entries = await _api(
      'time_entries?resource_id=eq.'+rid+
      '&date=gte.'+monIso+'&date=lte.'+sunIso+
      '&select=date,hours,is_billable&limit=500'
    );
    const all = Array.isArray(entries) ? entries : [];

    const hoursByDay = {}, billByDay = {};
    weekDays.forEach(function(d){ hoursByDay[d]=0; billByDay[d]=0; });
    all.forEach(function(e) {
      if (Object.prototype.hasOwnProperty.call(hoursByDay, e.date)) {
        const h = parseFloat(e.hours||0);
        hoursByDay[e.date] += h;
        if (e.is_billable) billByDay[e.date] += h;
      }
    });

    const weekTotal    = Object.values(hoursByDay).reduce(function(s,h){return s+h;},0);
    const weekBillable = Object.values(billByDay).reduce(function(s,h){return s+h;},0);
    const billPct = weekTotal > 0 ? Math.round((weekBillable/weekTotal)*100) : 0;

    return {
      weekDays, today, hoursByDay, billByDay,
      weekTotal:    Math.round(weekTotal*10)/10,
      weekBillable: Math.round(weekBillable*10)/10,
      weekNonBill:  Math.round((weekTotal-weekBillable)*10)/10,
      billPct,
    };
  },

  renderFn: function(data, container) {
    if (!data) { container.innerHTML='<div class="widget-error">No data</div>'; return; }

    const { weekDays, today, hoursByDay, billByDay } = data;
    const DAY_LABELS = ['MON','TUE','WED','THU','FRI','SAT','SUN'];
    const gaugeMax = 8;

    // SVG gauge geometry — exact match to My Work
    const GW=74, GH=70, GCX=37, GCY=48, GR=30;

    function gPt(deg) {
      const a = (deg - 180) * Math.PI / 180;
      return [(GCX + GR * Math.cos(a)).toFixed(1), (GCY + GR * Math.sin(a)).toFixed(1)];
    }
    function gArc(d1, d2) {
      if (d2 <= d1) return '';
      const p1 = gPt(d1), p2 = gPt(Math.min(d2, 179.9));
      return 'M'+p1[0]+','+p1[1]+' A'+GR+','+GR+' 0 '+(d2-d1>180?1:0)+' 1 '+p2[0]+','+p2[1];
    }

    // Tick marks + % labels
    const gTicks = Array.from({length:11}, function(_,i) {
      const deg = i * 18;
      const isMaj = i % 2 === 0;
      const a = (deg - 180) * Math.PI / 180;
      const r0 = GR + 2, r1 = isMaj ? GR + 7 : GR + 4;
      const x0=(GCX+r0*Math.cos(a)).toFixed(1), y0=(GCY+r0*Math.sin(a)).toFixed(1);
      const x1=(GCX+r1*Math.cos(a)).toFixed(1), y1=(GCY+r1*Math.sin(a)).toFixed(1);
      const tick = '<line x1="'+x0+'" y1="'+y0+'" x2="'+x1+'" y2="'+y1+'" stroke="rgba(255,255,255,.28)" stroke-width="'+(isMaj?1:.6)+'"/>';
      if (!isMaj) return tick;
      const rl=GR+16, lx=(GCX+rl*Math.cos(a)).toFixed(1), ly=(GCY+rl*Math.sin(a)).toFixed(1);
      return tick+'<text x="'+lx+'" y="'+ly+'" text-anchor="middle" dominant-baseline="central" font-size="7.5" font-family="monospace" font-weight="700" fill="rgba(255,255,255,.75)">'+(i*10)+'%</text>';
    }).join('');

    const gaugesHtml = weekDays.map(function(d, i) {
      const hrs  = hoursByDay[d]||0;
      const bill = billByDay[d]||0;
      const nonBill = hrs - bill;
      const isToday = d === today;
      const pct     = Math.min(hrs/gaugeMax, 1);
      const billPct = Math.min(bill/gaugeMax, 1);
      const nbPct   = Math.min(nonBill/gaugeMax, 1);
      const billEnd = billPct * 180;
      const nbEnd   = (billPct + nbPct) * 180;
      const needleRad = (pct * 180 - 180) * Math.PI / 180;
      const nx = (GCX + (GR-6) * Math.cos(needleRad)).toFixed(1);
      const ny = (GCY + (GR-6) * Math.sin(needleRad)).toFixed(1);
      const arcColor  = isToday ? '#00D2FF' : hrs>0 ? '#1D9E75' : 'rgba(255,255,255,.08)';
      const pillColor = isToday ? '#00D2FF' : hrs>0 ? '#1D9E75' : 'rgba(255,255,255,.2)';
      const dayColor  = isToday ? '#00D2FF' : '#6A94B8';
      const fw        = isToday ? '600' : '400';

      return '<div style="display:flex;flex-direction:column;align-items:center;gap:2px;flex:1;min-width:0">'+
        '<svg viewBox="0 0 '+GW+' '+GH+'" width="'+GW+'" height="'+GH+'" style="overflow:visible">'+
          gTicks+
          '<path d="'+gArc(0,179.9)+'" fill="none" stroke="rgba(255,255,255,.07)" stroke-width="4" stroke-linecap="round"/>'+
          (hrs>0
            ? (bill>0 ? '<path d="'+gArc(0,billEnd)+'" fill="none" stroke="'+arcColor+'" stroke-width="4" stroke-linecap="round"/>' : '')+
              (nonBill>0 ? '<path d="'+gArc(billEnd,nbEnd)+'" fill="none" stroke="#8B5CF6" stroke-width="4" stroke-linecap="round"/>' : '')+
              '<line x1="'+GCX+'" y1="'+GCY+'" x2="'+nx+'" y2="'+ny+'" stroke="'+arcColor+'" stroke-width="1.5" stroke-linecap="round"/>'+
              '<circle cx="'+GCX+'" cy="'+GCY+'" r="3" fill="'+arcColor+'"/>'
            : '<circle cx="'+GCX+'" cy="'+GCY+'" r="2" fill="rgba(255,255,255,.12)"/>'
          )+
          '<rect x="'+(GCX-17)+'" y="'+(GCY+5)+'" width="34" height="14" rx="7" fill="rgba(6,10,16,.7)" stroke="'+pillColor+'" stroke-width="1.2"/>'+
          '<text x="'+GCX+'" y="'+(GCY+12)+'" text-anchor="middle" dominant-baseline="central" font-size="11" font-family="monospace" font-weight="700" fill="'+pillColor+'">'+
            (hrs>0 ? hrs.toFixed(1)+'h' : '—')+
          '</text>'+
        '</svg>'+
        '<div style="font-family:var(--font-head,sans-serif);font-size:11px;font-weight:700;color:'+(isToday?dayColor:'#F0F6FF')+';text-align:center;line-height:1.4;letter-spacing:.04em">'+
          DAY_LABELS[i]+'<br>'+
          '<span style="font-weight:'+fw+';color:'+dayColor+';font-size:11px">'+new Date(d+'T00:00:00').getDate()+'</span>'+
        '</div>'+
      '</div>';
    }).join('');

    const mono = 'font-family:var(--font-mono,monospace)';
    const billColor = '#00D2FF';
    const nonBillColor = '#8B5CF6';
    const billPct = data.billPct;
    const nonPct  = 100 - billPct;

    // Right-side summary panel — mirrors My Work's billable vs non-bill panel
    const summaryPanel =
      '<div style="display:flex;flex-direction:column;justify-content:center;padding:8px 14px;'+
          'border-left:1px solid rgba(255,255,255,.07);flex-shrink:0;min-width:130px;gap:6px">'+
        '<div style="'+mono+';font-size:9px;color:var(--text3);letter-spacing:.1em;text-transform:uppercase">Billable vs Non-Bill</div>'+
        '<div style="display:flex;gap:16px;align-items:flex-end">'+
          '<div>'+
            '<div style="font-size:22px;font-weight:700;color:'+billColor+';line-height:1">'+data.weekBillable+'h</div>'+
            '<div style="'+mono+';font-size:9px;color:var(--text3);margin-top:2px">billable</div>'+
          '</div>'+
          '<div>'+
            '<div style="font-size:22px;font-weight:700;color:'+nonBillColor+';line-height:1">'+data.weekNonBill+'h</div>'+
            '<div style="'+mono+';font-size:9px;color:var(--text3);margin-top:2px">non-bill</div>'+
          '</div>'+
        '</div>'+
        // Split bar
        '<div style="height:4px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden;display:flex">'+
          '<div style="height:100%;width:'+billPct+'%;background:'+billColor+';border-radius:3px 0 0 3px;transition:width .4s"></div>'+
          '<div style="height:100%;width:'+nonPct+'%;background:'+nonBillColor+';transition:width .4s"></div>'+
        '</div>'+
        '<div style="display:flex;justify-content:space-between">'+
          '<span style="'+mono+';font-size:10px;color:'+billColor+'">'+billPct+'%</span>'+
          '<span style="'+mono+';font-size:10px;color:'+nonBillColor+'">'+nonPct+'%</span>'+
        '</div>'+
        '<div style="'+mono+';font-size:10px;color:#EF9F27">'+data.weekTotal+'h total this week</div>'+
      '</div>';

    container.innerHTML =
      '<div style="display:flex;flex-direction:column;height:100%;box-sizing:border-box;overflow:hidden">'+
        // Header
        '<div style="'+mono+';font-size:9px;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;padding:5px 10px 3px;flex-shrink:0;border-left:2px solid rgba(0,210,255,.5)">'+
          '\u2003This week \u2014 hours by day'+
        '</div>'+
        // Gauges + summary panel side by side
        '<div style="display:flex;flex:1;min-height:0;overflow:hidden">'+
          '<div style="display:flex;flex:1;align-items:flex-end;padding:0 4px;min-height:0;overflow:hidden">'+
            gaugesHtml+
          '</div>'+
          summaryPanel+
        '</div>'+
        // Legend
        '<div style="display:flex;align-items:center;gap:12px;padding:4px 10px 5px;flex-shrink:0;border-top:1px solid rgba(255,255,255,.05)">'+
          '<div style="display:flex;align-items:center;gap:5px;'+mono+';font-size:10px;color:var(--text3)">'+
            '<div style="width:14px;height:4px;background:'+billColor+';border-radius:2px"></div>Billable</div>'+
          '<div style="display:flex;align-items:center;gap:5px;'+mono+';font-size:10px;color:var(--text3)">'+
            '<div style="width:14px;height:4px;background:'+nonBillColor+';border-radius:2px"></div>Non-billable</div>'+
          '<span style="'+mono+';font-size:10px;color:var(--text3)">Scale: 8h = full</span>'+
        '</div>'+
      '</div>';
  }
});

// ── 6. MEETING HEALTH SPARKLINE ───────────────────────────────────────────
window.WIDGET_REGISTRY.register({
  id:              'meeting_health_sparkline',
  label:           'Meeting health',
  category:        'project',
  description:     'Last 7 meeting ratings — sparkline with trend',
  icon:            'sparkline',
  configSchema: [
    { key:'projectId', label:'Project', type:'project_picker', default:'', required:false,
      templatePlaceholder:'Select project when launching' },
  ],
  refreshInterval: 300000,
  minTileHeight:   'small',

  dataFn: async function(config) {
    if (!config.projectId) return { ratings:[], avg:0, trend:'stable', noProject:true };
    const ctx = _widgetCtx();
    const meetings = await _api(
      'v_meetings?select=id,meeting_date&firm_id=eq.'+ctx.firmId+
      '&project_id=eq.'+config.projectId+'&order=meeting_date.desc&limit=7'
    );
    if (!meetings||!meetings.length) return { ratings:[], avg:0, trend:'stable' };
    const ids = meetings.map(function(m){return m.id;});
    const ratings = await _api('meeting_ratings?meeting_id=in.('+ids.join(',')+')'+'&select=meeting_id,rating');
    const rMap={};
    (ratings||[]).forEach(function(r){(rMap[r.meeting_id]=rMap[r.meeting_id]||[]).push(r.rating);});
    const result = meetings.slice().reverse().map(function(m,i){
      const mrs=rMap[m.id]||[];
      const avg=mrs.length?Math.round((mrs.reduce(function(s,r){return s+r;},0)/mrs.length)*10)/10:0;
      return {label:'M'+(i+1),value:avg};
    });
    const vals=result.map(function(r){return r.value;}).filter(function(v){return v>0;});
    const avg=vals.length?Math.round((vals.reduce(function(s,v){return s+v;},0)/vals.length)*10)/10:0;
    const trend=vals.length>=2?(vals[vals.length-1]>vals[0]?'up':vals[vals.length-1]<vals[0]?'down':'stable'):'stable';
    return {ratings:result,avg,trend};
  },

  renderFn: function(data, container) {
    if (!data) { container.innerHTML='<div class="widget-error">No data</div>'; return; }
    if (data.noProject) {
      container.innerHTML='<div class="widget-error" style="font-size:10px;flex-direction:column;gap:4px"><span style="font-size:16px">&#9881;</span>Configure project</div>';
      return;
    }
    if (!data.ratings||!data.ratings.length) {
      container.innerHTML='<div class="widget-error" style="font-size:10px">No meeting data</div>'; return;
    }
    const W=200,H=56,n=data.ratings.length,barW=Math.floor(W/n)-3,maxVal=5;
    const tc=data.trend==='up'?'#1D9E75':data.trend==='down'?'#E24B4A':'#EF9F27';
    const ta=data.trend==='up'?'\u2191':data.trend==='down'?'\u2193':'\u2192';
    const bars=data.ratings.map(function(r,i){
      const x=i*(barW+3)+1,bh=r.value>0?Math.max(4,Math.round((r.value/maxVal)*H)):3,y=H-bh;
      const c=r.value>=4?'#1D9E75':r.value>=2.5?'#EF9F27':r.value>0?'#E24B4A':'rgba(255,255,255,.1)';
      return '<rect x="'+x+'" y="'+y+'" width="'+barW+'" height="'+bh+'" fill="'+c+'" rx="1"/>';
    }).join('');
    container.innerHTML=
      '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;padding:6px 8px;gap:4px">'+
        '<svg width="'+W+'" height="'+H+'" viewBox="0 0 '+W+' '+H+'">'+bars+'</svg>'+
        '<div class="widget-sparkline-footer">'+
          '<span>Avg <strong style="color:'+tc+'">'+data.avg+'</strong>/5</span>'+
          '<span style="color:'+tc+'">'+ta+' '+data.trend+'</span>'+
          '<span>'+n+' meetings</span>'+
        '</div>'+
      '</div>';
  }
});
