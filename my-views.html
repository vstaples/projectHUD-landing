<!-- my-views.html — Compass My Views module
     Loaded dynamically by compass.html via loadMyViewsView() in mw-tabs.js.

     PURPOSE
       Widget dashboard composition tool. Named views, tile grid, widget placement.
       No knowledge tree. No note creation. No block editor. No collaboration.
       Widget data is fetched independently by each widget's own dataFn.

     EXPORTS
       window._viewsLoadView()      — first-load init: fetch, load workspace, render
       window._viewsRefresh()       — re-render on tab revisit
       window._viewsSaveNow()       — save active dashboard's state to its compass_views row
       window._viewsCv()            — accessor for current named view state
       window._viewsRenderLeft()    — re-render left panel (dashboards + inbox)
       window._viewsRenderGrid()    — re-render tile grid

     WORKSPACE PERSISTENCE
       Per-dashboard rows in compass_views (one row per named view).
       view_participants references each dashboard via view_id FK to
       compass_views.id. Library is per-user localStorage (key:
       'compass-views-library-<user_id>').
       MY NOTES uses notes_workspace.state.views — never collides post-fork.

     SHARED GLOBALS (set by mw-tabs.js loadMyViewsView before calling _viewsLoadView)
       window._notesResource        — {id, user_id, name} for the logged-in user
       window._myResource           — fallback from compass.html scope

     DEPENDENCIES
       API                          — Supabase wrapper from api.js
       compassToast                 — toast helper from ui.js
       window.WIDGET_REGISTRY       — populated by blocks 2+3 (ws-widgets + ws-library)

     SCRIPT BLOCKS (3 total, load order matters)
       Block 1 (this block): dashboard shell, workspace, grid, view management
       Block 2: widget system infrastructure (WIDGET_REGISTRY, renderTileCanvas)
       Block 3: widget library (hours_by_day, task_list, action_item_list, etc.)

     WHAT WAS REMOVED (vs. original MY NOTES clone)
       — Block 2 of original: all collaboration/presence/invite/heartbeat/sync
       — Knowledge tree (_notesRenderTree and all branch CRUD/DnD)
       — Block editor (all _notesBlock* functions)
       — Chat panel (_notesToggleChat, _notesSendMsg, _notesLoadAndRenderMsgs)
       — Floating note windows
       — First-launch note seeding
       — Sync poll (no note content to sync)
       — _notesTileHTML replaced with widget-only version (20 lines vs 62)

     FONT POLICY: var(--font-mono) throughout. --font-ui/--font-head/--font-display banned.
-->

function _loadLibraryFromStorage() {
  try {
    const raw = localStorage.getItem(_libraryStorageKey());
    return raw ? (JSON.parse(raw) || {}) : {};
  } catch (e) { return {}; }
}
function _saveLibraryToStorage() {
  try {
    localStorage.setItem(_libraryStorageKey(), JSON.stringify(_workspace.library || {}));
  } catch (e) { /* quota or unavailable — best-effort */ }
}
let _saveTimer = null;

// ── Entry point ───────────────────────────────────────────────────────────
window._viewsLoadView = async function() {
  if (window._viewsLoaded) { window._viewsRefresh && window._viewsRefresh(); return; }
  window._viewsLoaded = true;

  const res = window._notesResource || window._myResource || null;
  _userId   = res?.user_id || null;
  _userName = res?.name || 'Vaughn Staples';

  await _notesFetchAll();
  await _notesLoadWorkspace();
  // MY VIEWS: skip _notesFetchSharedViewNotes, _notesCleanWidgetNotes, _notesFirstLaunchSeed
  // — these operate on MY NOTES data and must not run in the views module.
  _notesRenderLeft();
  _notesRenderGrid();
  // Render view switcher, library, and header user after workspace loads
  _notesRenderViewSwitcher();
  _notesRenderLibrary();
  _notesUpdateHeaderUser();
  // Restore saved panel width and init splitter
  const savedW = _cv().leftPanelWidth;
  if (savedW) {
    const shell = document.getElementById('views-shell');
    if (shell) shell.style.setProperty('--notes-left-w', savedW + 'px');
  }
  if (window._notesSplitterInit) window._notesSplitterInit();
  _notesDndInit();
  _notesStartInboxPoll();
  // Re-render widget tiles after DOM settles
  setTimeout(function() {
    if (window._viewsPostWire) window._viewsPostWire();
  }, 50);
};

window._viewsRefresh = async function() {
  await _notesFetchAll();
  _notesRenderLeft();
  _notesRenderGrid();
};

// ── One-time cleanup: remove note records that back widget tiles ───────────
// Runs silently on startup. Any note whose ID appears in a workspace tile with
// canvasMode='widget' (or a synthetic wt-/ph- ID) is an operational placeholder,
// not institutional knowledge. Delete the DB record and remove from local array.

// Fetch notes referenced by any shared view currently in workspace

// ── Fetch ─────────────────────────────────────────────────────────────────
async function _notesFetchAll() {
  // MY VIEWS: only fetch notes that back widget tiles (inbox items + tile-backed notes)
  // No tree notes, no messages — widgets fetch their own data via dataFn
  if (!_userId) return;
  try {
    const notes = await API.get(
      'notes?owner_user_id=eq.' + _userId + '&firm_id=eq.' + FIRM_ID +
      '&order=updated_at.desc&limit=200'
    ).catch(() => []);
    _notes = Array.isArray(notes) ? notes : [];
  } catch(e) { console.error('[Compass] Notes fetch error:', e); }
}


// ── Workspace migration: gridSize → rows ─────────────────────────────────
function _notesMigrateView(view) {
  if (!view.gridSize || view.rows) return view; // already migrated
  const parts  = view.gridSize.split('x');
  const cols   = parseInt(parts[1]) || 2;
  const rowCnt = parseInt(parts[0]) || 2;
  view.rows = Array.from({ length: rowCnt }, (_, i) => ({
    id:      'row' + i,
    columns: cols,
    height:  'medium'
  }));
  view.tiles = (view.tiles || []).map(t => ({
    ...t,
    row:  'row' + Math.floor(t.slot / cols),
    slot: t.slot % cols,
  }));
  delete view.gridSize;
  return view;
}

async function _notesLoadWorkspace() {
  if (!_userId) return;
  try {
    // MY VIEWS persistence fork: read dashboard rows from compass_views
    let rows = await API.get(
      'compass_views?owner_user_id=eq.' + _userId +
      '&select=id,view_name,state,created_at,updated_at' +
      '&order=created_at.asc'
    ).catch(function() { return []; });
    rows = Array.isArray(rows) ? rows : [];

    // Auto-create default dashboard if user has none (per Brief 2 §2.3)
    if (rows.length === 0) {
      try {
        const created = await API.post(
          'compass_views',
          { firm_id: FIRM_ID, owner_user_id: _userId, view_name: 'Default', state: {} },
          { Prefer: 'return=representation' }
        );
        const newRow = Array.isArray(created) ? created[0] : created;
        if (newRow && newRow.id) rows = [newRow];
      } catch(e) { console.warn('[Compass] Default dashboard auto-create failed:', e); }
    }

    // Build name-keyed in-memory workspace + name → id map
    const newViews = {};
    const newIdMap = {};
    rows.forEach(function(row) {
      const name  = row.view_name || 'Untitled';
      const state = row.state || {};
      // state shape: { rows, tiles, tray, leftPanelWidth?, locked?, clonedFrom?, parameters?, createdAt? }
      newViews[name] = Object.assign({}, _notesDefaultView(), state);
      newIdMap[name] = row.id;
    });

    _workspace.views   = newViews;
    _viewIdByName      = newIdMap;
    // Library: localStorage is the new home; one-shot migration reads from
    // legacy notes_workspace.state.viewsWorkspace.library if localStorage empty.
    let lib = _loadLibraryFromStorage();
    if (!lib || !Object.keys(lib).length) {
      try {
        const legacy = await API.get('notes_workspace?user_id=eq.' + _userId + '&limit=1').catch(function() { return []; });
        const legacyState = legacy && legacy[0] && legacy[0].state;
        const legacyLib   = legacyState && legacyState.viewsWorkspace && legacyState.viewsWorkspace.library;
        if (legacyLib && Object.keys(legacyLib).length) {
          lib = legacyLib;
          _workspace.library = lib;
          _saveLibraryToStorage();
        }
      } catch(e) { /* best-effort migration */ }
    }
    _workspace.library = lib || {};

    // Pick active view: keep current if still present, else first
    const names = Object.keys(newViews);
    if (!names.length) {
      // Fallback: nothing returned and auto-create failed — preserve in-memory default
      _workspace.activeView = 'Default';
      if (!_workspace.views['Default']) _workspace.views['Default'] = _notesDefaultView();
    } else if (!newViews[_workspace.activeView]) {
      _workspace.activeView = names[0];
    }

    // gridSize → rows migration (in-memory only; persisted on next save)
    let migrated = false;
    Object.keys(_workspace.views).forEach(function(vn) {
      const v = _workspace.views[vn];
      if (v.gridSize && !v.rows) { _notesMigrateView(v); migrated = true; }
    });
    if (migrated) _viewsSaveWorkspace(true);
  } catch(e) { console.error('[Compass] Views workspace load error:', e); }
  await _notesRestoreSharedViews();
  _notesCleanTiles();
}


async function _notesRestoreSharedViews() {
  if (!_userId) return;
  try {
    // MY VIEWS persistence fork: view_participants now references view_id (FK
    // to compass_views.id). MY NOTES dashboards have no compass_views row, so
    // this restore path will only return rows for shared MY VIEWS dashboards.
    // Note-level sharing (notes_workspace dashboards) is not yet representable
    // in view_participants — see Brief 2 §7.5.
    const parts = await API.get(
      'view_participants?user_id=eq.' + _userId +
      '&accepted_at=not.is.null' +
      '&select=id,view_id,view_role,tile_edit_overrides' +
      '&limit=50'
    ).catch(function() { return []; });
    if (!parts || !parts.length) return;

    for (var i = 0; i < parts.length; i++) {
      var p = parts[i];
      var viewId = p.view_id;
      if (!viewId) continue;
      try {
        // Read owner dashboard from compass_views
        var rows = await API.get(
          'compass_views?id=eq.' + viewId +
          '&select=id,owner_user_id,view_name,state&limit=1'
        ).catch(function() { return []; });
        var row = rows && rows[0];
        if (!row) continue;
        if (row.owner_user_id === _userId) continue; // skip own dashboards
        var ownerUserId = row.owner_user_id;
        var viewName    = row.view_name;
        var ownerView   = row.state || {};
        var sharedKey   = '__shared__' + ownerUserId + '__' + viewName;

        // Fetch referenced notes into local _notes array
        var tileNoteIds = (ownerView.tiles || [])
          .map(function(t) { return t.noteId; })
          .filter(function(id) { return id && !id.startsWith('ph-') && !id.startsWith('wt-'); });
        if (tileNoteIds.length) {
          var sharedNotes = await API.get(
            'notes?id=in.(' + tileNoteIds.join(',') + ')&limit=50'
          ).catch(function() { return []; });
          (sharedNotes || []).forEach(function(n) {
            if (!_notes.find(function(x) { return x.id === n.id; })) _notes.push(n);
          });
        }
        _workspace.views[sharedKey] = Object.assign({}, ownerView, {
          _isSharedView:   true,
          _sharedOwner:    ownerUserId,
          _sharedViewName: viewName,
          _sharedViewId:   viewId,
        });
        // If the user's last active view was this shared view, restore it as active
        if (_workspace.activeView === sharedKey) {
          // Already set — nothing to do
        } else if (_workspace.sharedViews && _workspace.sharedViews[ownerUserId + '::' + viewName]) {
          const svMeta = _workspace.sharedViews[ownerUserId + '::' + viewName];
          if (svMeta && svMeta.wasActive) {
            _workspace.activeView = sharedKey;
          }
        }
      } catch(e) {
        console.warn('[Compass] Could not restore shared view (view_id=' + viewId + '):', e);
      }
    }
    // Stale-key fallback
    if (_workspace.activeView && _workspace.activeView.startsWith('__shared__')) {
      if (!_workspace.views[_workspace.activeView]) {
        _workspace.activeView = Object.keys(_workspace.views).find(function(k) { return !k.startsWith('__shared__'); }) || 'Default';
      }
    }
  } catch(e) {
    console.warn('[Compass] _notesRestoreSharedViews error:', e);
  }
}


function _notesCleanTiles() {
  Object.values(_workspace.views || {}).forEach(function(v) {
    if (!v.tiles || !v.rows) return;
    const validRowIds = new Set((v.rows || []).map(function(r) { return r.id; }));
    const orphans = v.tiles.filter(function(t) { return !validRowIds.has(t.row); });
    orphans.forEach(function(t) { if (!v.tray.includes(t.noteId)) v.tray.push(t.noteId); });
    v.tiles = v.tiles.filter(function(t) { return validRowIds.has(t.row); });
  });
}

function _notesDefaultView() {
  return {
    rows:  [{ id: 'row0', columns: 2, height: 'medium' },
            { id: 'row1', columns: 2, height: 'medium' }],
    tiles: [],
    tray:  [],
  };
}

async function _viewsSaveNow() {
  if (!_userId) return;
  // MY VIEWS persistence fork: write the active dashboard's state to its
  // compass_views row. Library is per-user; persist to localStorage separately.
  _saveLibraryToStorage();
  const activeName = _workspace.activeView;
  const activeId   = _viewIdByName[activeName];
  if (!activeId) {
    // No row yet (auto-create may have failed; or view is local-only). Try to create.
    try {
      const created = await API.post(
        'compass_views',
        { firm_id: FIRM_ID, owner_user_id: _userId, view_name: activeName,
          state: _workspace.views[activeName] || {} },
        { Prefer: 'return=representation' }
      );
      const newRow = Array.isArray(created) ? created[0] : created;
      if (newRow && newRow.id) _viewIdByName[activeName] = newRow.id;
    } catch(e) { console.error('[Compass] Active view persist (insert) failed:', e); }
    return;
  }
  try {
    const stateToSave = _workspace.views[activeName] || {};
    await API.patch(
      'compass_views?id=eq.' + activeId,
      { state: stateToSave }
    );
  } catch(e) { console.error('[Compass] Views workspace save error:', e); }
}

async function _viewsSaveWorkspace(immediate) {
  if (!_userId) return;
  if (immediate) { clearTimeout(_saveTimer); return _viewsSaveNow(); }
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(_viewsSaveNow, 800);
}

// ── Left panel ────────────────────────────────────────────────────────────
function _notesRenderLeft() {
  _notesRenderLibrary();
  _notesRenderInbox();
  // MY VIEWS: _notesRenderTree() omitted — NOTES section not shown
  _notesWireLeft();
}

function _notesRenderInbox() {
  const inbox = _notes.filter(n => n.is_inbox);
  const el    = document.getElementById('views-inbox-list');
  const badge = document.getElementById('views-inbox-count');
  if (!el) return;
  if (badge) badge.textContent = inbox.length;
  el.innerHTML = inbox.length === 0
    ? '<div style="padding:8px 14px;font-family:var(--font-mono,monospace);font-size:10px;color:var(--text3)">Empty inbox</div>'
    : inbox.map(function(n) {
        var vid = (n.entity_meta && n.entity_meta.viewId) ? n.entity_meta.viewId : '';
        return '<div class="views-item" data-noteid="' + _esc(n.id) + '" data-viewid="' + _esc(vid) + '">'+
          '<div class="views-item-body"><div class="views-item-title">' + _esc(n.title||'Untitled') + '</div>'+
          '<div class="views-item-meta">' + _notesRelTime(n.updated_at) + '</div></div></div>';
      }).join('');
}



function _notesWireLeft() {
  document.querySelectorAll('#views-shell [data-toggle]').forEach(el => {
    el.onclick = (e) => {
      // Don't toggle if clicking a button, contenteditable label, or input
      if (e.target?.closest?.('button, [contenteditable]')) return;
      const target = document.getElementById(el.dataset.toggle);
      if (!target) return;
      const open = target.style.display !== 'none';
      target.style.display = open ? 'none' : '';
      el.querySelector('.views-chevron')?.classList.toggle('open', !open);
    };
  });
  document.querySelectorAll('.views-item[data-viewid]').forEach(el => {
    el.onclick = (e) => {
      e.stopPropagation();
      const noteId = el.dataset.noteid;
      const note   = _notes.find(n => n.id === noteId);

      // ── STEP 5: view_invite / view_removed notifications ─────────────
      if (note?.is_inbox && note?.entity_type === 'view_invite') {
        if (window._notesShowViewInviteDialog) window._notesShowViewInviteDialog(note);
        return;
      }
      if (note?.is_inbox && note?.entity_type === 'view_removed') {
        const overlay = document.createElement('div');
        overlay.className = 'views-invite-dialog-overlay';
        overlay.innerHTML =
          '<div class="views-invite-dialog">' +
            '<div class="nid-header"><div class="nid-from">View Access</div>' +
            '<div class="nid-title">' + _esc(note.title || '') + '</div></div>' +
            '<div class="nid-body">' + _esc(note.content || '') + '</div>' +
            '<div class="nid-actions"><button class="nid-btn nid-btn-accept" id="nid-vr-ack">OK</button></div>' +
          '</div>';
        document.body.appendChild(overlay);
        const dismiss = () => {
          overlay.remove();
          API.del('notes?id=eq.' + note.id).catch(()=>{});
          _notes = _notes.filter(n => n.id !== note.id);
          _notesRenderLeft();
        };
        overlay.querySelector('#nid-vr-ack').onclick = dismiss;
        overlay.addEventListener('mousedown', e => { if (e.target === overlay) dismiss(); });
        return;
      }

      // Invitation or removal notification — check which type
      if (note?.entity_id && note?.is_inbox) {
        // Check if it's a removal or declined notification
        if (note.title?.includes('removed themselves from:') ||
            note.title?.includes('declined your invitation')) {
          // Show simple acknowledgment dialog
          const overlay = document.createElement('div');
          overlay.className = 'views-invite-dialog-overlay';
          overlay.innerHTML =
            '<div class="views-invite-dialog">' +
              '<div class="nid-header">' +
                '<div class="nid-from">Collaboration Update</div>' +
                '<div class="nid-title">' + _esc(note.title) + '</div>' +
              '</div>' +
              '<div class="nid-body">' + _esc(note.content || '') + '</div>' +
              '<div class="nid-actions">' +
                '<button class="nid-btn nid-btn-accept" id="nid-ack">OK</button>' +
              '</div>' +
            '</div>';
          document.body.appendChild(overlay);
          const dismiss = () => {
            overlay.remove();
            API.del('notes?id=eq.' + note.id).then(() => {
              _notes = _notes.filter(n => n.id !== note.id);
              _notesRenderLeft();
              if (note.entity_id && window._notesRenderPresence) {
                window._notesRenderPresence(note.entity_id);
              }
            }).catch(()=>{});
          };
          overlay.querySelector('#nid-ack').onclick = dismiss;
          overlay.addEventListener('mousedown', e => { if (e.target === overlay) dismiss(); });
          return;
        }
        // MY VIEWS: note collaboration invites not supported — dismiss inbox item
        API.del('notes?id=eq.' + note.id).catch(() => {});
        _notes = _notes.filter(n => n.id !== note.id);
        _notesRenderLeft();
        return;
      }

      // Already in grid — do nothing
      if (_cv().tiles.some(t => t.noteId === noteId)) return;

      _notesOpenNote(noteId);
    };
  });
}

function _notesToggleSection(which) {
  const listId = which === 'inbox' ? 'views-inbox-list' : which === 'library' ? 'views-library-list' : 'views-tree-scroll';
  const chevId = 'views-chev-' + which;
  const el     = document.getElementById(listId);
  const chev   = document.getElementById(chevId);
  if (!el) return;
  const open = el.style.display !== 'none';
  el.style.display = open ? 'none' : '';
  chev?.classList.toggle('open', !open);
}

// ── Grid ──────────────────────────────────────────────────────────────────
// ── STEP 5: Viewer-role helper ────────────────────────────────────────────
// Returns { isViewer, overriddenSlots } for the current user on the active view.
// isViewer=false means owner or editor — full access.
// overriddenSlots is a Set of "rowId:slot" strings the viewer may edit regardless.
function _notesGetViewerRole() {
  const userId = _userId;
  if (!userId) return { isViewer: false, overriddenSlots: new Set() };
  const viewName    = _workspace.activeView;
  const viewParts   = window._notesGetViewParticipants
    ? window._notesGetViewParticipants(userId, viewName)
    : [];
  const myRow = viewParts.find(function(p) { return p.user_id === userId; });
  // If no row found yet, assume owner (safe default — restricts nothing)
  if (!myRow) return { isViewer: false, overriddenSlots: new Set() };
  if (myRow.view_role === 'owner' || myRow.view_role === 'editor') {
    return { isViewer: false, overriddenSlots: new Set() };
  }
  // viewer — build override set
  const overrides = Array.isArray(myRow.tile_edit_overrides) ? myRow.tile_edit_overrides : [];
  const myOverride = overrides.find(function(o) { return o.user_id === userId; });
  const slots = new Set(myOverride ? (myOverride.slot_keys || []) : []);
  return { isViewer: true, overriddenSlots: slots };
}
window._notesGetViewerRole = _notesGetViewerRole;

function _notesRenderGrid() {
  const gridArea = document.getElementById('views-grid-area');
  if (!gridArea) return;
  const cv   = _cv();
  const rows = cv.rows || [];
  // Clean orphaned tiles (row id doesn't exist in rows array)
  const validIds = new Set(rows.map(function(r) { return r.id; }));
  const orphaned = cv.tiles.filter(function(t) { return !validIds.has(t.row); });
  orphaned.forEach(function(t) { if (!cv.tray.includes(t.noteId)) cv.tray.push(t.noteId); });
  if (orphaned.length) cv.tiles = cv.tiles.filter(function(t) { return validIds.has(t.row); });

  // ── STEP 5: determine viewer status once per render ───────────────────
  const viewerCtx = _notesGetViewerRole();

  // Snapshot existing widget tile elements BEFORE wiping the grid so we can
  // transplant them back in. This preserves the .tile-canvas and its
  // dataset.widgetRendered guard, preventing dataFn from re-firing on every
  // _notesRenderGrid call (which would otherwise cause continuous API polls).
  //
  // EXCEPTION: if the view's forResourceId changed (user switched dashboards),
  // skip the transplant so widgets re-fetch with the correct person's data.
  const currentForRid = cv.forResourceId || null;
  const lastForRid    = gridArea.dataset.lastForResourceId || null;
  const forRidChanged = currentForRid !== lastForRid;
  gridArea.dataset.lastForResourceId = currentForRid || '';

  const existingWidgetEls = {};
  if (!forRidChanged) {
    gridArea.querySelectorAll('.views-tile[data-noteid]').forEach(function(el) {
      const nid = el.dataset.noteid;
      const canvas = el.querySelector('.tile-canvas');
      if (canvas && canvas.dataset.widgetRendered) {
        existingWidgetEls[nid] = el;
      }
    });
  }

  gridArea.innerHTML = '';
  rows.forEach(function(row) {
    const cols   = Math.max(1, Math.min(8, row.columns || 2));
    const height = row.height || 'medium';
    const rowDiv = document.createElement('div');
    rowDiv.className = 'nre-grid-row';
    rowDiv.dataset.rowid  = row.id;
    rowDiv.dataset.height = height;
    rowDiv.style.gridTemplateColumns = 'repeat(' + cols + ', minmax(0, 1fr))';

    for (let s = 0; s < cols; s++) {
      const tile = cv.tiles.find(function(t) { return t.row === row.id && t.slot === s; });
      const note = tile ? _notes.find(function(n) { return n.id === tile.noteId; }) : null;

      // ── STEP 5: per-slot viewer check ──────────────────────────────────
      const slotKey        = row.id + ':' + s;
      const tileIsWidget   = tile && tile.canvasMode === 'widget';
      // Locked view: layout edits blocked (tile content still interactive for widgets)
      const viewIsLocked   = !!cv.locked;
      const tileIsReadOnly = !tileIsWidget && (viewIsLocked || (viewerCtx.isViewer && !viewerCtx.overriddenSlots.has(slotKey)));

      const isPlaceholderTile = tile && (tile.isPlaceholder ||
        (tile.noteId && (tile.noteId.startsWith('ph-') || tile.noteId.startsWith('wt-'))));

      // ── Widget tile DOM reuse ─────────────────────────────────────────
      // If we already have a rendered widget element for this noteId, transplant
      // it directly. This preserves the canvas and its widgetRendered guard so
      // dataFn is NOT re-invoked — eliminating the continuous refresh loop.
      if (tileIsWidget && tile.noteId && existingWidgetEls[tile.noteId]) {
        const existing = existingWidgetEls[tile.noteId];
        // Update minimized state in case it changed
        existing.className = 'views-tile' + (tile.minimized ? ' minimized' : '');
        existing.dataset.rowid = row.id;
        existing.dataset.slot  = s;
        rowDiv.appendChild(existing);
        delete existingWidgetEls[tile.noteId]; // consumed
        continue;
      }

      const div = document.createElement('div');

      if (note || isPlaceholderTile || tileIsWidget) {
        // For placeholder/widget tiles without a note, synthesise a minimal note-like object
        const noteObj = note || { id: tile.noteId, title: tileIsWidget ? (tile.widgetId || 'Widget') : 'New tile', content: '' };
        div.className = 'views-tile' + (tile.minimized ? ' minimized' : '');
        div.setAttribute('draggable', !tileIsReadOnly ? 'true' : 'false');
        div.innerHTML = _notesTileHTML(noteObj, tile, tileIsReadOnly);
        div.dataset.rowid  = row.id;
        div.dataset.slot   = s;
        div.dataset.noteid = noteObj.id;
        div.dataset.viewid = noteObj.id;
        // ── STEP 5: lock read-only content areas ──────────────────────
        if (tileIsReadOnly) {
          const ta = div.querySelector('.views-tile-canvas');
          if (ta) ta.readOnly = true;
          const title = div.querySelector('.views-tile-title');
          if (title) title.contentEditable = 'false';
        }
      } else {
        div.className = 'views-tile empty';
        div.dataset.rowid = row.id;
        div.dataset.slot  = s;
        div.style.cssText = 'display:flex;flex-direction:column;cursor:pointer';
        // ── STEP 5: viewers cannot create notes in empty slots ────────
        if (!tileIsReadOnly) {
          (function(rid, sl) {
            div.onclick = function(e) {
              if (e.target.closest && e.target.closest('button')) return;
              if (window._viewsNew) window._viewsNew(rid, sl);
            };
          })(row.id, s);
        }
        div.innerHTML =
          '<div style="padding:6px 10px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;border-bottom:1px solid rgba(0,210,255,.08);background:rgba(0,0,0,.15);width:100%;box-sizing:border-box">' +

function _notesRowSetCols(rowId, delta) {
  const cv  = _cv();
  const row = cv.rows.find(function(r) { return r.id === rowId; });
  if (!row) return;
  const newCols = Math.max(1, Math.min(8, (row.columns || 2) + delta));
  if (newCols === row.columns) return;
  if (newCols < (row.columns || 2)) {
    const displaced = cv.tiles.filter(function(t) { return t.row === rowId && t.slot >= newCols; });
    displaced.forEach(function(t) { if (!cv.tray.includes(t.noteId)) cv.tray.push(t.noteId); });
    cv.tiles = cv.tiles.filter(function(t) { return !(t.row === rowId && t.slot >= newCols); });
  }
  row.columns = newCols;
  _viewsSaveWorkspace(true);
  _notesRenderGrid();
}

function _notesRowSetHeight(rowId, height) {
  const row = _cv().rows.find(function(r) { return r.id === rowId; });

function _notesAddRow() {
  const cv = _cv();

function _notesRowDelete(rowId) {

function _notesWireRowDrag(bar) {
  // Create insertion indicator bar
  const indicator = document.createElement('div');
  indicator.style.cssText = 'width:2px;background:#00D2FF;height:28px;border-radius:1px;flex-shrink:0;display:none;box-shadow:0 0 6px rgba(0,210,255,.6)';
  indicator.id = 'nre-indicator';

  bar.querySelectorAll('.nre-grip').forEach(function(grip) {
    grip.style.cursor = 'grab';
    grip.addEventListener('mousedown', function(e) {
      const seg = grip.closest('.nre-row');
      if (!seg) return;
      e.preventDefault();
      e.stopPropagation();

      const dragging = seg.dataset.rowid;
      seg.style.opacity = '0.5';
      indicator.style.display = 'block';
      bar.appendChild(indicator); // start at end

      function getSorted() {
        return Array.from(bar.querySelectorAll('.nre-row'));
      }

      function onMove(ev) {
        const els = getSorted();
        // Find insertion point based on mouse X
        let insertBefore = null;
        for (const el of els) {
          if (el.dataset.rowid === dragging) continue;
          const r = el.getBoundingClientRect();
          if (ev.clientX < r.left + r.width / 2) {
            insertBefore = el;
            break;
          }
        }
        // Position indicator
        if (insertBefore) {
          bar.insertBefore(indicator, insertBefore);
        } else {
          // After last non-dragging element
          const last = els.filter(el => el.dataset.rowid !== dragging).pop();
          if (last) last.after ? last.after(indicator) : bar.appendChild(indicator);
          else bar.appendChild(indicator);
        }
      }

      function onUp(ev) {
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
        seg.style.opacity = '';
        indicator.style.display = 'none';

        // Read insertion point from indicator position
        const cv      = _cv();
        const rowMap  = {};
        cv.rows.forEach(function(r) { rowMap[r.id] = r; });

        // Build new order: all rows in DOM order, indicator marks where dragged row goes
        const allSegs = Array.from(bar.children); // includes indicator
        const newOrder = [];
        let draggedRow = rowMap[dragging];
        for (const el of allSegs) {
          if (el === indicator) { if (draggedRow) newOrder.push(draggedRow); }
          else if (el.dataset && el.dataset.rowid && el.dataset.rowid !== dragging) {
            const r = rowMap[el.dataset.rowid];
            if (r) newOrder.push(r);
          }
        }
        // Remove indicator from bar
        if (indicator.parentNode === bar) bar.removeChild(indicator);

        if (newOrder.length === cv.rows.length) {
          cv.rows = newOrder;
          _viewsSaveWorkspace(true);
          _notesRenderGrid();
        }
      }

      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });
  });
}

function _notesOpenNote(noteId) {
  const cv       = _cv();
  const validIds = new Set((cv.rows || []).map(r => r.id));

  // Clean any orphaned tiles for this note before checking
  const orphaned = cv.tiles.filter(t => t.noteId === noteId && !validIds.has(t.row));
  if (orphaned.length) {
    cv.tiles = cv.tiles.filter(t => !(t.noteId === noteId && !validIds.has(t.row)));
  }

  // Already in grid with valid row — scroll to it
  if (cv.tiles.some(t => t.noteId === noteId && validIds.has(t.row))) {
    const tileEl = document.querySelector('.views-tile[data-noteid="' + noteId + '"]');
    if (tileEl) tileEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    return;
  }
  // Remove from tray if it was there
  cv.tray = cv.tray.filter(id => id !== noteId);

  // Find first empty {row, slot}
  const rows  = cv.rows || [];
  let placed  = false;
  for (const row of rows) {
    const cols = Math.max(1, Math.min(8, row.columns || 2));
    for (let s = 0; s < cols; s++) {
      if (!cv.tiles.some(t => t.row === row.id && t.slot === s)) {
        cv.tiles.push({ row: row.id, slot: s, noteId, chatOpen: false });
        placed = true; break;
      }
    }
    if (placed) break;
  }
  if (!placed) {
    // Grid full — displace first tile of first row to tray
    const first = rows[0];
    if (first) {
      const displaced = cv.tiles.find(t => t.row === first.id && t.slot === 0);
      if (displaced) cv.tray.push(displaced.noteId);
      cv.tiles = cv.tiles.filter(t => !(t.row === first.id && t.slot === 0));
      cv.tiles.push({ row: first.id, slot: 0, noteId, chatOpen: false });
    }
  }

  _viewsSaveWorkspace(true);
  _notesRenderGrid();
  _notesRenderLeft();
}

async function _notesCloseTile(noteId) {
  _cv().tiles = _cv().tiles.filter(t => t.noteId !== noteId);
  _cv().tray  = _cv().tray.filter(id => id !== noteId);
  _viewsSaveWorkspace(true);
  _notesRenderGrid();
  _notesRenderLeft();

  // If this is a shared note (we're a participant, not owner), notify the owner
  try {
    // Check if we own this note
    const noteRows = await API.get('notes?id=eq.' + noteId + '&select=owner_user_id,title&limit=1').catch(()=>[]);
    const noteOwnerUserId = noteRows?.[0]?.owner_user_id;
    const noteName        = noteRows?.[0]?.title || _notes.find(n => n.id === noteId)?.title || 'a note';
    const selfUserId      = _userId;

    // If we own it, no notification needed
    if (!noteOwnerUserId || noteOwnerUserId === selfUserId) return;

    const myName = window._notesResource?.name || 'Someone';

    await API.post('notes', {
      firm_id:        FIRM_ID,
      owner_user_id:  noteOwnerUserId,
      title:          myName + ' removed themselves from: ' + noteName,
      content:        myName + ' has removed the shared note "' + noteName + '" from their workspace.',
      hierarchy_path: 'Inbox',
      is_inbox:       true,
      entity_id:      noteId,
      entity_type:    null,
      created_at:     new Date().toISOString(),
      updated_at:     new Date().toISOString(),
    });

    // Remove self from note_participants if present
    await API.del('note_participants?note_id=eq.' + noteId + '&user_id=eq.' + selfUserId).catch(()=>{});
  } catch(e) { console.warn('[Compass] Close notification error:', e); }
}


async function _notesNew(rowId, slot) {
  if (!_userId) return;
  if (_cv().locked) return; // view is locked
  try {
    if (rowId && typeof slot === 'number') {
      // Slot click — create a local placeholder tile immediately (no DB record yet).
      // A real note record is only written when the user switches to note mode
      // and starts typing, or explicitly keeps it as a note. Widget tiles that
      // come from this path will never pollute the notes table.
      const cv = _cv();
      const existing = cv.tiles.find(t => t.row === rowId && t.slot === slot);
      if (existing) { cv.tray.push(existing.noteId); cv.tiles = cv.tiles.filter(t => !(t.row === rowId && t.slot === slot)); }
      const placeholderId = 'ph-' + Date.now() + '-' + Math.random().toString(36).slice(2,8);
      cv.tiles.push({ row: rowId, slot, noteId: placeholderId, chatOpen: false, isPlaceholder: true });
      _viewsSaveWorkspace();
      _notesRenderGrid();
      // Directly open the widget picker — don't rely on the mode button being
      // injected yet (it arrives asynchronously via _notesPostWire).
      // Use a short delay so the tile DOM is in place from _notesRenderGrid.
      setTimeout(function() {
        const cv2 = (typeof _cv === 'function' ? _cv() : (window._viewsCv && window._viewsCv()));
        const tileState = cv2 && cv2.tiles.find(function(t){ return t.noteId === placeholderId; });
        if (tileState && typeof window._viewsShowWidgetPicker === 'function') {
          window._viewsShowWidgetPicker(tileState);
        } else {
          // Fallback — try clicking the mode button if it was injected in time
          const tileEl = document.querySelector('.views-tile[data-noteid="' + placeholderId + '"]');
          const btn = tileEl && tileEl.querySelector('.tile-header-mode-btn');
          if (btn) btn.click();
        }
      }, 80);
    } else {
      // New note from left panel "+ New note" button — always creates a DB record
      const res = await API.post('notes', {
        firm_id:       FIRM_ID,
        owner_user_id: _userId,
        title:         'New note',
        content:       '',
        hierarchy_path:'Work',
        is_inbox:      false,
        created_at:    new Date().toISOString(),
        updated_at:    new Date().toISOString(),
      });
      const newNote = res?.[0];
      if (!newNote?.id) return;
      _notes.unshift(newNote);
      _notesOpenNote(newNote.id);
      _viewsSaveWorkspace();
      _notesRenderLeft();
      _notesRenderGrid();
      setTimeout(() => {
        const titleEl = document.querySelector('[data-viewid="' + newNote.id + '"].views-tile-title');
        if (titleEl) { titleEl.focus(); document.execCommand('selectAll', false, null); }
      }, 50);
    }
  } catch(e) { console.error('[Compass] New note error:', e); }
}

function _notesRelTime(iso) {
  if (!iso) return '';
  const diff = Date.now() - new Date(iso).getTime();
  const m = Math.floor(diff / 60000);
  if (m < 1)  return 'just now';
  if (m < 60) return m + 'm ago';
  const h = Math.floor(m / 60);
  if (h < 24) return h + 'h ago';
  const d = Math.floor(h / 24);
  if (d < 7)  return d + 'd ago';
  return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function _notesRenderLibrary() {
  const list = document.getElementById('views-library-list');
  if (!list) return;

  // Build workflow entries from all non-shared, non-default views.
  // Each view that has a person associated (stored as view.forResourceId /
  // view.forResourceName, stamped by Clone) gets grouped under that person.
  // Views without a person association appear under the owner's own name.
  const views     = _workspace.views || {};
  const myName    = (window._notesResource && window._notesResource.name) || 'Me';
  const myRid     = (window._notesResource && window._notesResource.id)   || '';

  // Collect entries — show all non-shared views.
  // Views with forResourceName are associated with that person.
  // Views without forResourceName are the owner's own workspace views —
  // show them under the owner but only if there are ANY to show.
  const ownViews   = [];
  const otherViews = [];

  Object.keys(views).forEach(function(vKey) {
    const v = views[vKey];
    if (v._isSharedView) return;
    if (v.forResourceName) {
      const personName = v.forResourceName;
      const personRid  = v.forResourceId || '';
      const initials   = personName.split(' ').map(function(w){return w[0]||'';}).join('').slice(0,2).toUpperCase();
      let colorIdx = 0;
      if (window._inviteResources && window._inviteResources.length) {
        const idx = window._inviteResources.findIndex(function(r){ return r.id === personRid; });
        colorIdx = idx >= 0 ? idx : 0;
      }
      const color = (window.PARTICIPANT_COLORS && window.PARTICIPANT_COLORS.length)
        ? window.PARTICIPANT_COLORS[colorIdx % window.PARTICIPANT_COLORS.length] : '#00D2FF';
      otherViews.push({ vKey, label: vKey, personName, personRid, initials, color, isActive: vKey === _workspace.activeView });
    } else {
      ownViews.push({ vKey, label: vKey, isActive: vKey === _workspace.activeView });
    }
  });

  const entries = otherViews.concat(ownViews);

  if (!entries.length) {
    list.innerHTML = '<div style="padding:5px 14px 8px 28px;font-family:var(--font-mono,monospace);font-size:10px;color:var(--text3)">No dashboards saved</div>';
    return;
  }

  // Group: associated-person views first (sorted alpha by person name),
  // then owner's own views under their own name
  const groups = {};
  otherViews.forEach(function(e) {
    if (!groups[e.personName]) groups[e.personName] = { color: e.color, initials: e.initials, isOwner: false, items: [] };
    groups[e.personName].items.push(e);
  });
  if (ownViews.length) {
    // Owner's own views — use their name and avatar
    const ownerColorIdx = (window._inviteResources && window._inviteResources.length)
      ? Math.max(0, window._inviteResources.findIndex(function(r){ return r.id === myRid; }))
      : 0;
    const ownerColor = (window.PARTICIPANT_COLORS && window.PARTICIPANT_COLORS.length)
      ? window.PARTICIPANT_COLORS[ownerColorIdx % window.PARTICIPANT_COLORS.length] : '#00D2FF';
    const ownerInitials = myName.split(' ').map(function(w){return w[0]||'';}).join('').slice(0,2).toUpperCase();
    if (!groups[myName]) groups[myName] = { color: ownerColor, initials: ownerInitials, isOwner: true, items: [] };
    ownViews.forEach(function(e){ groups[myName].items.push(e); });
  }

  const sortedGroups = Object.keys(groups).sort(function(a, b) {
    // Other-person groups first (alpha), owner last
    if (groups[a].isOwner) return 1;
    if (groups[b].isOwner) return -1;
    return a.localeCompare(b);
  });

  let html = '';
  sortedGroups.forEach(function(personName) {
    const grp      = groups[personName];
    const color    = grp.color;
    const initials = grp.initials;
    // One row per dashboard — name on left, avatar on right. No separate person header row.
    grp.items.forEach(function(e) {
      html +=
        '<div class="views-lib-entry" data-vkey="' + _esc(e.vKey) + '" ' +
            'style="padding:3px 10px 3px 30px;cursor:pointer;display:flex;align-items:center;gap:0;' +
            (e.isActive ? 'background:rgba(0,210,255,.06);border-left:2px solid rgba(0,210,255,.4);padding-left:28px;' : '') + '">' +
          '<span class="views-lib-name" style="font-size:12px;flex:1;color:' + (e.isActive ? '#00D2FF' : 'var(--text1)') + '">' +
            _esc(e.label) +
          '</span>' +
          (e.isActive ? '<span style="font-family:var(--font-mono,monospace);font-size:9px;color:rgba(0,210,255,.6);margin-right:6px">active</span>' : '') +
          '<div title="' + _esc(personName) + '" style="width:20px;height:20px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;' +
              'justify-content:center;font-family:var(--font-mono);font-size:8px;font-weight:700;' +
              'background:' + color + '22;color:' + color + ';border:1px solid ' + color + '55">' +
            initials +
          '</div>' +
        '</div>';
    });
  });

  list.innerHTML = html;

  // Wire clicks — switch to that view
  list.querySelectorAll('[data-vkey]').forEach(function(row) {
    row.addEventListener('click', function() {
      const vKey = row.dataset.vkey;
      if (vKey && vKey !== _workspace.activeView) {
        _notesSwitchView(vKey);
        _notesRenderLibrary(); // refresh active state
      }
    });
  });
}

async function _notesLaunchTemplate(name) {
  const tpl = (_workspace.library || {})[name];
  if (!tpl) return;
  const params = tpl.parameters || [];

  const allResources = (window._notesGetInviteResources && window._notesGetInviteResources()) || [];
  const selectedInvitees = [];
  let colorIdx = 0;
  const COLORS = ['#4A9EFF','#FF6B6B','#4ECDC4','#FFE66D','#A8E6CF','#FF8B94','#C3A6FF','#FFB347'];

  const overlay = document.createElement('div');
  overlay.className = 'ntd-overlay';

  function renderOverlay() {
    const selfId = window._notesResource && window._notesResource.user_id;
    const chipsHtml = selectedInvitees.length
      ? selectedInvitees.map(function(inv) {
          const key = inv.user_id || inv.resource_id;
          return '<span style="display:inline-flex;align-items:center;gap:4px;background:rgba(0,210,255,.08);border:1px solid rgba(0,210,255,.2);padding:2px 6px;font-family:var(--font-mono,monospace);font-size:10px;color:var(--text1)">' +
            '<span style="width:7px;height:7px;border-radius:50%;background:' + inv.color + ';flex-shrink:0"></span>' +
            _esc(inv.name) +
            '<button data-remove="' + _esc(key) + '" style="background:none;border:none;color:var(--text3);cursor:pointer;padding:0 0 0 3px;font-size:11px;line-height:1">×</button>' +
          '</span>';
        }).join('')
      : '<span style="font-family:var(--font-mono,monospace);font-size:10px;color:var(--text3)">No invitees — will be your view only</span>';

    overlay.innerHTML =
      '<div class="ntd-dialog" style="width:460px;max-height:86vh;display:flex;flex-direction:column">' +
        '<div class="ntd-header">' +
          '<div class="ntd-sub">Launch Template</div>' +
          '<div class="ntd-title">' + _esc(name) + '</div>' +
        '</div>' +
        '<div class="ntd-body" style="overflow-y:auto;flex:1;gap:10px;display:flex;flex-direction:column">' +
          (tpl.description ? '<div style="font-family:var(--font-mono);font-size:12px;color:var(--text3)">' + _esc(tpl.description) + '</div>' : '') +
          '<div class="ntd-field"><label class="ntd-label">View name</label>' +
            '<input class="ntd-input" id="ntd-launch-viewname" value="' + _esc(name) + '"/>' +
          '</div>' +
          params.map(function(p) {
            const label = p.replace(/([A-Z])/g,' $1').replace(/^./,function(s){return s.toUpperCase();});
            return '<div class="ntd-field"><label class="ntd-label">' + _esc(label) + '</label>' +
              '<input class="ntd-input ntd-param-input" data-param="' + _esc(p) + '" placeholder="' + _esc(label) + '…"/></div>';
          }).join('') +
          '<div class="ntd-field">' +
            '<label class="ntd-label" style="margin-bottom:6px">Invite to this view</label>' +
            '<div id="ntd-chips" style="display:flex;flex-wrap:wrap;gap:5px;min-height:20px;margin-bottom:7px">' + chipsHtml + '</div>' +
            '<input class="ntd-input" id="ntd-inv-search" placeholder="Search by name or department…" autocomplete="off"/>' +
            '<div id="ntd-inv-results" style="display:none;max-height:150px;overflow-y:auto;border:1px solid rgba(0,210,255,.12);margin-top:3px"></div>' +
          '</div>' +
        '</div>' +
        '<div class="ntd-actions">' +
          '<button class="ntd-btn ntd-btn-cancel" id="ntd-lcancel">Cancel</button>' +
          '<button class="ntd-btn ntd-btn-save" id="ntd-llaunch">Launch</button>' +
        '</div>' +
      '</div>';

    // Wire remove chips
    overlay.querySelectorAll('[data-remove]').forEach(function(btn) {
      btn.addEventListener('click', function() {
        const key = btn.dataset.remove;
        const i = selectedInvitees.findIndex(function(x) { return (x.user_id||x.resource_id) === key; });
        if (i >= 0) { selectedInvitees.splice(i,1); renderOverlay(); }
      });
    });

    // Wire search
    const searchEl  = overlay.querySelector('#ntd-inv-search');
    const resultsEl = overlay.querySelector('#ntd-inv-results');
    const selectedIds = new Set(selectedInvitees.map(function(x){ return x.user_id||x.resource_id; }));

    function renderResults(q) {
      const lower = (q||'').toLowerCase().trim();
      const filtered = allResources.filter(function(r) {
        if (!r.id || r.user_id === selfId) return false;
        if (selectedIds.has(r.user_id) || selectedIds.has(r.id)) return false;
        if (!lower) return true;
        return (r.name||'').toLowerCase().includes(lower) ||
               (r.department||'').toLowerCase().includes(lower) ||
               (r.email||'').toLowerCase().includes(lower);
      }).slice(0,10);

      if (!filtered.length) {
        resultsEl.innerHTML = '<div style="padding:7px 10px;font-family:var(--font-mono,monospace);font-size:10px;color:var(--text3)">' + (lower ? 'No results' : 'Type to search') + '</div>';
        resultsEl.style.display = 'block'; return;
      }
      const groups = {};
      filtered.forEach(function(r){ const d=r.department||'Other'; (groups[d]=groups[d]||[]).push(r); });
      let html = '';
      Object.keys(groups).forEach(function(dept) {
        html += '<div style="padding:3px 10px 2px;font-family:var(--font-mono,monospace);font-size:9px;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;background:rgba(0,0,0,.25)">' + _esc(dept) + '</div>';
        groups[dept].forEach(function(r) {
          html += '<div class="ntd-inv-row" data-rid="' + _esc(r.id) + '" data-uid="' + _esc(r.user_id||'') + '" data-name="' + _esc(r.name) + '"' +
            ' style="padding:5px 10px;cursor:pointer;transition:background .1s">' +
            '<div style="font-family:var(--font-mono);font-size:12px;color:var(--text1)">' + _esc(r.name) + '</div>' +
            '<div style="font-family:var(--font-mono,monospace);font-size:10px;color:var(--text3)">' + _esc(r.email||'') + '</div>' +
          '</div>';
        });
      });
      resultsEl.innerHTML = html;
      resultsEl.style.display = 'block';

      resultsEl.querySelectorAll('.ntd-inv-row').forEach(function(row) {
        row.addEventListener('click', function() {
          const color = COLORS[colorIdx++ % COLORS.length];
          selectedInvitees.push({ resource_id:row.dataset.rid, user_id:row.dataset.uid||null, name:row.dataset.name, color:color });
          selectedIds.add(row.dataset.uid||row.dataset.rid);
          searchEl.value = '';
          resultsEl.style.display = 'none';
          renderOverlay();
        });
      });
    }

    searchEl.addEventListener('input',  function(){ renderResults(searchEl.value); });
    searchEl.addEventListener('focus',  function(){ renderResults(searchEl.value); });
    document.addEventListener('mousedown', function _hide(e){
      if (!overlay.contains(e.target)) return;
      if (!resultsEl.contains(e.target) && e.target !== searchEl) { resultsEl.style.display='none'; document.removeEventListener('mousedown',_hide); }
    });

    overlay.querySelector('#ntd-lcancel').onclick = function(){ overlay.remove(); };
    overlay.querySelector('#ntd-llaunch').onclick = function(){
      const paramVals = {};
      overlay.querySelectorAll('.ntd-param-input').forEach(function(inp){ paramVals[inp.dataset.param]=inp.value.trim(); });
      const viewName = overlay.querySelector('#ntd-launch-viewname').value.trim() || name;
      overlay.remove();
      _notesLaunchTemplateNow(name, paramVals, viewName, selectedInvitees);
    };
    overlay.addEventListener('keydown', function(e){ if(e.key==='Escape') overlay.remove(); });
  }

  renderOverlay();
  document.body.appendChild(overlay);
  setTimeout(function(){ const vn=overlay.querySelector('#ntd-launch-viewname'); if(vn) vn.focus(); }, 50);
}

async function _notesLaunchTemplateNow(templateName, paramVals, requestedViewName, invitees) {
  const tpl = (_workspace.library || {})[templateName];
  if (!tpl) return;
  invitees = invitees || [];

  const base = requestedViewName || templateName;
  let viewName = base; let idx = 2;
  while (_workspace.views[viewName]) { viewName = base + ' (' + idx++ + ')'; }

  _workspace.views[viewName] = {
    rows:       JSON.parse(JSON.stringify(tpl.rows  || [])),
    tiles:      JSON.parse(JSON.stringify(tpl.tiles || [])),
    tray:       [],
    clonedFrom: templateName,
    parameters: paramVals,
    createdAt:  new Date().toISOString(),
  };
  _workspace.activeView = viewName;
  _notesRenderGrid(); _notesRenderLeft(); _notesRenderViewSwitcher();

  // MY VIEWS persistence fork: INSERT compass_views row to get view_id, then
  // insert owner + invitee rows in view_participants. Notifications written to
  // notes table per Brief 2 §2.6.
  const myName   = (window._notesResource && window._notesResource.name) || 'Someone';
  const myUserId = _userId;
  if (!myUserId) return;

  let newViewId = null;
  try {
    const created = await API.post(
      'compass_views',
      { firm_id: FIRM_ID, owner_user_id: myUserId, view_name: viewName,
        state: _workspace.views[viewName] || {} },
      { Prefer: 'return=representation' }
    );
    const newRow = Array.isArray(created) ? created[0] : created;
    if (newRow && newRow.id) {
      newViewId = newRow.id;
      _viewIdByName[viewName] = newRow.id;
    }
  } catch(e) { console.warn('[Compass] Template launch compass_views insert failed:', e); }

  if (!newViewId) return; // Without view_id, downstream view_participants writes will fail NOT NULL.

  try {
    await API.post('view_participants', {
      firm_id: FIRM_ID, view_id: newViewId,
      user_id: myUserId, view_role: 'owner',
      tile_edit_overrides: {}, color: '#00D2FF',
      invited_at: new Date().toISOString(),
      accepted_at: new Date().toISOString(), last_seen_at: new Date().toISOString(),
    });
  } catch(e) { console.warn('[Compass] Template launch owner row failed:', e); }

  for (var i = 0; i < invitees.length; i++) {
    var inv = invitees[i];
    if (!inv.user_id) continue;
    let participantRowId = null;
    try {
      const created = await API.post('view_participants', {
        firm_id: FIRM_ID, view_id: newViewId,
        user_id: inv.user_id, view_role: 'viewer',
        tile_edit_overrides: {}, color: inv.color || '#00D2FF',
        invited_at: new Date().toISOString(),
        accepted_at: null, last_seen_at: null,
      }, { Prefer: 'return=representation' });
      const newPart = Array.isArray(created) ? created[0] : created;
      if (newPart && newPart.id) participantRowId = newPart.id;
    } catch(e) { console.warn('[Compass] Template launch participant row failed:', e); }

    try {
      await API.post('notes', {
        firm_id: FIRM_ID, owner_user_id: inv.user_id,
        title:   myName + ' invited you to view: ' + viewName,
        content: myName + ' shared the view "' + viewName + '" with you (from template "' + templateName + '"). Accept in your inbox to access it.',
        hierarchy_path: 'Inbox', is_inbox: true,
        entity_id: participantRowId, entity_type: 'view_invite',
        entity_meta: { viewId: newViewId, viewName: viewName },
        created_at: new Date().toISOString(), updated_at: new Date().toISOString(),
      });
    } catch(e) { console.warn('[Compass] Template launch view invite notification failed:', e); }
  }
}

function _notesDeleteView() {
  const cur   = _workspace.activeView;
  const views = Object.keys(_workspace.views);
  if (views.length <= 1) {
    // Can't delete last view — show styled info dialog
    _notesConfirmDialog(
      'Cannot Delete', '"' + cur + '"',
      'You must have at least one view. Create another view before deleting this one.',
      'OK', 'rgba(0,210,255,.4)', '#00D2FF', 'rgba(0,210,255,.08)'
    );
    return;
  }
  _notesConfirmDialog(
    'Delete View', '“' + cur + '”',
    'All tiles will be removed from this view. Notes in your Knowledge Tree are not affected.',
    'Delete', 'rgba(226,75,74,.4)', '#E24B4A', 'rgba(226,75,74,.08)'
  ).then(function(confirmed) {
    if (!confirmed) return;
    const deletedId = _viewIdByName[cur];
    delete _workspace.views[cur];
    delete _viewIdByName[cur];
    // Switch to first remaining view
    _workspace.activeView = Object.keys(_workspace.views)[0];
    _viewsSaveWorkspace(true);
    _notesRenderGrid(); _notesRenderLeft(); _notesRenderViewSwitcher();
    // MY VIEWS persistence fork: DELETE the compass_views row. CASCADE removes view_participants.
    if (deletedId) {
      API.del('compass_views?id=eq.' + deletedId)
        .catch(function(e) { console.warn('[Compass] Delete compass_views row failed:', e); });
    }
  });
}

// MY VIEWS persistence fork: render pill-badges for accepted view_participants
// at the top of the workspace area for the active dashboard. Shared dashboards
// are rendered using the owner's view_id (stored in _sharedViewId on accept).
async function _viewsRenderParticipantBadges() {
  const bar = document.getElementById('views-participants-bar');
  if (!bar) return;
  const cv = _cv();
  // Resolve which view_id the badges should render for.
  const viewId = cv && cv._isSharedView
    ? (cv._sharedViewId || null)
    : _activeViewId();
  if (!viewId) {
    bar.style.display = 'none';
    bar.innerHTML = '';
    return;
  }
  let parts = [];
  try {
    const rows = await API.get(
      'view_participants?view_id=eq.' + viewId +
      '&accepted_at=not.is.null' +
      '&select=id,user_id,view_role,color,accepted_at'
    ).catch(function() { return []; });
    parts = Array.isArray(rows) ? rows : [];
  } catch(e) { parts = []; }
  if (!parts.length) {
    bar.style.display = 'none';
    bar.innerHTML = '';
    return;
  }
  // Look up names/initials from invite resources cache (already loaded by share dialog).
  const allRes = (typeof window._notesGetInviteResources === 'function')
    ? (window._notesGetInviteResources() || [])
    : [];
  function lookupRes(uid) {
    return allRes.find(function(r) { return r.user_id === uid; }) || null;
  }
  function initials(name) {
    return (name || '?').split(' ').map(function(w){ return w[0]; }).join('').slice(0,2).toUpperCase();
  }
  bar.innerHTML = parts.map(function(p) {
    const r = lookupRes(p.user_id);
    const nm = (r && r.name) || 'Unknown';
    const init = initials(nm);
    const color = p.color || '#00D2FF';

// Standalone so it can be called after _inviteResources loads asynchronously.
function _notesUpdateHeaderUser() {
  const headerUser = document.getElementById('views-header-user');
  if (!headerUser) return;
  const cv = _cv();
  if (!cv || cv._isSharedView) { headerUser.classList.remove('has-name'); headerUser.textContent = ''; return; }

  let userName = cv.forResourceName || null;

  // Fallback 1: resolve from forResourceId
  if (!userName && cv.forResourceId && window._inviteResources && window._inviteResources.length) {
    const res = window._inviteResources.find(function(r){ return r.id === cv.forResourceId; });
    if (res) { userName = res.name; cv.forResourceName = res.name; }
  }

  // Fallback 2: scan widget tile targetResourceId
  if (!userName && window._inviteResources && window._inviteResources.length) {
    const tile = (cv.tiles || []).find(function(t) {
      return t.canvasMode === 'widget' && t.widgetConfig && t.widgetConfig.targetResourceId;
    });
    if (tile) {
      const res = window._inviteResources.find(function(r){ return r.id === tile.widgetConfig.targetResourceId; });
      if (res) { userName = res.name; cv.forResourceName = res.name; cv.forResourceId = res.id; }
    }
  }

  if (userName) {
    headerUser.textContent = userName;
    headerUser.classList.add('has-name');
  } else {
    headerUser.textContent = '';
    headerUser.classList.remove('has-name');
  }
}

function _notesSwitchView(viewName) {
  if (!viewName || viewName === _workspace.activeView) return;
  if (!_workspace.views[viewName]) return;
  _workspace.activeView = viewName;
  // STEP 5: persist wasActive flag for shared views so refresh restores them
  const switchedView = _workspace.views[viewName];
  if (switchedView && switchedView._isSharedView && _workspace.sharedViews) {
    const svKey = switchedView._sharedOwner + '::' + switchedView._sharedViewName;
    if (_workspace.sharedViews[svKey]) _workspace.sharedViews[svKey].wasActive = true;
    // Clear wasActive on all other shared views
    Object.keys(_workspace.sharedViews).forEach(function(k) {
      if (k !== svKey && _workspace.sharedViews[k]) _workspace.sharedViews[k].wasActive = false;
    });
  } else if (_workspace.sharedViews) {
    // Switched to own view — clear all wasActive flags
    Object.keys(_workspace.sharedViews).forEach(function(k) {
      if (_workspace.sharedViews[k]) _workspace.sharedViews[k].wasActive = false;
    });
  }
  _viewsSaveWorkspace(true);
  _notesRenderGrid();
  _notesRenderLeft();
  _notesRenderViewSwitcher();
  _notesRenderLibrary();
  _notesUpdateHeaderUser();
  // ── Re-render widget tiles with correct person data after view switch ─────────
  // _inviteResources must be loaded for _resolveTarget to map rid→uid.
  // If already loaded (normal case after first load), re-render immediately
  // by clearing the widgetRendered guard. If not yet loaded, the
  // _waitForInviteResources callback on initial load will handle it.
  (function _switchViewWidgetRefresh(attempts) {
    if (window._inviteResources && window._inviteResources.length) {
      var cv = _cv();
      if (cv && cv.tiles && window.WIDGET_REGISTRY && window._widgetContext) {
        cv.tiles.forEach(function(tile) {
          if (tile.canvasMode !== 'widget' || !tile.widgetId) return;
          var tileEl = document.querySelector('.views-tile[data-noteid="' + tile.noteId + '"]');
          if (!tileEl) return;
          var canvas = tileEl.querySelector('.tile-canvas');
          if (!canvas) return;
          delete canvas.dataset.widgetRendered;
          window.WIDGET_REGISTRY.render(tile.widgetId, tile.widgetConfig || {}, canvas, window._widgetContext());
        });
      }
    } else if (attempts > 0) {
      setTimeout(function() { _switchViewWidgetRefresh(attempts - 1); }, 100);
    }
  })(30); // retry up to 3s after view switch
}

function _notesNewView() {
  const overlay = document.createElement('div');
  overlay.className = 'ntd-overlay';
  overlay.innerHTML =
    '<div class="ntd-dialog" style="width:360px">' +
      '<div class="ntd-header">' +
        '<div class="ntd-sub">Workspace</div>' +
        '<div class="ntd-title">New View</div>' +
      '</div>' +
      '<div class="ntd-body">' +
        '<div class="ntd-field">' +
          '<label class="ntd-label">View name</label>' +
          '<input class="ntd-input" id="nnv-name" placeholder="e.g. NovaBio Sprint, Weekly Review"/>' +
        '</div>' +
      '</div>' +
      '<div class="ntd-actions">' +
        '<button class="ntd-btn ntd-btn-cancel" id="nnv-cancel">Cancel</button>' +

      '</div>' +
    '</div>';
  document.body.appendChild(overlay);

  const input = overlay.querySelector('#nnv-name');
  input.focus();

  const doCreate = function() {
    const trimmed = input.value.trim();
    if (!trimmed) { input.focus(); return; }
    if (_workspace.views[trimmed]) {
      input.style.borderColor = 'rgba(226,75,74,.6)';
      input.title = 'A view named "' + trimmed + '" already exists';
      input.focus(); return;
    }
    overlay.remove();
    _workspace.views[trimmed] = _notesDefaultView();
    _workspace.activeView = trimmed;
    _notesRenderGrid();
    _notesRenderLeft();
    _notesRenderViewSwitcher();
    // MY VIEWS persistence fork: INSERT compass_views row, store id, then insert owner participant row.
    (async function() {
      if (!_userId) return;
      let newViewId = null;
      try {
        const created = await API.post(
          'compass_views',
          { firm_id: FIRM_ID, owner_user_id: _userId, view_name: trimmed,
            state: _workspace.views[trimmed] || {} },
          { Prefer: 'return=representation' }
        );
        const newRow = Array.isArray(created) ? created[0] : created;
        if (newRow && newRow.id) {
          newViewId = newRow.id;
          _viewIdByName[trimmed] = newRow.id;
        }
      } catch(e) {
        console.warn('[Compass] Create compass_views row failed:', e);
      }
      // Owner row in view_participants — Brief 1 schema (view_id FK)
      if (newViewId) {
        try {
          await API.post('view_participants', {
            firm_id:             FIRM_ID,
            view_id:             newViewId,
            user_id:             _userId,
            view_role:           'owner',
            tile_edit_overrides: {},
            color:               '#00D2FF',
            invited_at:          new Date().toISOString(),
            accepted_at:         new Date().toISOString(),
            last_seen_at:        new Date().toISOString(),
          });
        } catch(e) {
          console.warn('[Compass] view_participants owner row insert failed:', e);
        }
      }
    })();
  };

  overlay.querySelector('#nnv-create').onclick  = doCreate;
  overlay.querySelector('#nnv-cancel').onclick   = function() { overlay.remove(); };
  overlay.addEventListener('mousedown', function(e) { if (e.target === overlay) overlay.remove(); });
  input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doCreate();
    if (e.key === 'Escape') overlay.remove();
  });
}

        '<div class="ntd-title">' + _esc(currentName) + '</div>' +
      '</div>' +
      '<div class="ntd-body" style="padding:14px 20px 0;display:flex;flex-direction:column;gap:12px;overflow:hidden">' +
        '<div class="ntd-field">' +
          '<label class="ntd-label">Dashboard name</label>' +
          '<input class="ntd-input" id="nrv-name" value="' + _esc(currentName) + '" style="width:100%"/>' +
        '</div>' +
        '<div class="ntd-field" style="flex:1;min-height:0;display:flex;flex-direction:column">' +
          '<label class="ntd-label">Associated user</label>' +
          '<div style="font-family:var(--font-mono,monospace);font-size:9px;color:var(--text3);margin-bottom:5px">' +
            'Widgets will pull data for this person' +
          '</div>' +
          '<input id="nrv-search" placeholder="Search…" autocomplete="off" ' +
            'style="background:rgba(0,0,0,.3);border:1px solid rgba(0,210,255,.15);color:var(--text0);' +
              'font-family:var(--font-mono);font-size:12px;padding:4px 7px;margin-bottom:3px;outline:none;width:100%;box-sizing:border-box"/>' +
          '<div id="nrv-person-list" style="max-height:220px;overflow-y:auto;' +
              'border:1px solid rgba(0,210,255,.08);background:rgba(0,0,0,.2)">' +
            personListHtml +

            (cv.forResourceName ? '→ ' + _esc(cv.forResourceName) : '') +
          '</div>' +
        '</div>' +
      '</div>' +
      '<div class="ntd-actions" style="flex-shrink:0">' +
        '<button class="ntd-btn ntd-btn-cancel" id="nrv-cancel">Cancel</button>' +
        '<button class="ntd-btn ntd-btn-save" id="nrv-save">Save</button>' +
      '</div>' +
    '</div>';

  document.body.appendChild(overlay);

  const nameInp    = overlay.querySelector('#nrv-name');
  const searchInp  = overlay.querySelector('#nrv-search');
  const personList = overlay.querySelector('#nrv-person-list');
  const selectedLbl = overlay.querySelector('#nrv-selected-lbl');
  nameInp.focus(); nameInp.select();

  // Selection state — pre-seed from current view
  let selectedRid  = cv.forResourceId   || null;
  let selectedUid  = cv.forResourceId   ? (allResources.find(function(r){return r.id===cv.forResourceId;})||{}).user_id || null : null;
  let selectedName = cv.forResourceName || null;

  // Wire row selection
  personList.querySelectorAll('.rnv-person-row').forEach(function(row) {
    row.addEventListener('click', function() {
      personList.querySelectorAll('.rnv-person-row').forEach(function(r) {
        r.style.background = ''; r.querySelector('span') && (r.querySelector('span[style*="✓"]') ? r.querySelector('span').remove() : null);
      });
      row.style.background = 'rgba(0,210,255,.09)';
      selectedRid  = row.dataset.rid  || null;
      selectedUid  = row.dataset.uid  || null;
      selectedName = row.dataset.name || null;
      selectedLbl.textContent = selectedName ? ('→ ' + selectedName) : '';
    });
  });

  // Live search
  searchInp.addEventListener('input', function() {
    const q = searchInp.value.toLowerCase().trim();
    personList.querySelectorAll('.rnv-person-row').forEach(function(row) {
      row.style.display = (!q || (row.dataset.name||'').toLowerCase().includes(q)) ? '' : 'none';
    });
    personList.querySelectorAll('[style*="text-transform:uppercase"]').forEach(function(hdr) {
      let el = hdr.nextElementSibling, hasVis = false;
      while (el && el.classList.contains('rnv-person-row')) { if (el.style.display!=='none') hasVis=true; el=el.nextElementSibling; }
      hdr.style.display = hasVis ? '' : 'none';
    });
  });

  const doSave = function() {
    const newName = nameInp.value.trim();
    if (!newName) { nameInp.focus(); return; }
    if (newName !== currentName && _workspace.views[newName]) {
      nameInp.style.borderColor = 'rgba(226,75,74,.6)';
      nameInp.title = 'A view with this name already exists'; nameInp.focus(); return;
    }
    overlay.remove();
    // Update person association on the view
    const targetView = _workspace.views[currentName];
    if (targetView) {
      if (selectedName) { targetView.forResourceName = selectedName; targetView.forResourceId = selectedRid || null; }
      // Also update all widget configs to match the newly selected person
      if ((selectedRid || selectedUid) && (selectedRid !== cv.forResourceId || !cv.forResourceId)) {
        (targetView.tiles || []).forEach(function(t) {
          if (t.canvasMode !== 'widget' || !t.widgetConfig) return;
          const cfg = t.widgetConfig;
          if ('targetResourceId' in cfg && selectedRid) cfg.targetResourceId = selectedRid;
          if ('targetUserId'     in cfg && selectedUid) cfg.targetUserId     = selectedUid;
        });
      }
    }
    if (newName !== currentName) _notesRenameView(newName);
    else { _viewsSaveWorkspace(true); _notesRenderViewSwitcher(); _notesRenderLibrary(); }
    _notesRenderGrid(); // re-render widgets with new configs
  };

  overlay.querySelector('#nrv-save').onclick  = doSave;
  overlay.querySelector('#nrv-cancel').onclick = function() { overlay.remove(); };
  overlay.addEventListener('mousedown', function(e) { if (e.target===overlay) overlay.remove(); });
  nameInp.addEventListener('keydown', function(e) { if (e.key==='Enter') doSave(); if (e.key==='Escape') overlay.remove(); });
}

function _notesRenameView(newName) {
  if (!newName || newName === _workspace.activeView) return;
  if (_workspace.views[newName]) { return; }
  const oldName = _workspace.activeView;
  const viewId  = _viewIdByName[oldName];
  _workspace.views[newName] = _workspace.views[oldName];
  delete _workspace.views[oldName];
  if (viewId) {
    _viewIdByName[newName] = viewId;
    delete _viewIdByName[oldName];
  }
  _workspace.activeView = newName;
  _viewsSaveWorkspace(true);
  _notesRenderViewSwitcher();
  _notesRenderLibrary(); // keep WORKFLOWS left panel in sync with rename
  // MY VIEWS persistence fork: rename the compass_views row directly.
  // view_participants no longer keys on view_name (Brief 1 dropped that column),
  // so no view_participants update is needed — FK-by-view_id keeps sharing in sync.
  if (viewId) {
    API.patch(
      'compass_views?id=eq.' + viewId,
      { view_name: newName }
    ).catch(function(e) { console.warn('[Compass] Rename compass_views failed:', e); });
  }
}

function _notesClearWorkspace() {
  _cv().tiles = [];
  _cv().tray  = [];
  _viewsSaveWorkspace(true);
  _notesRenderGrid();
  _notesRenderLeft();
}
