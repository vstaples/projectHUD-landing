}

function _notesAddBranch(parentBranch) {
  const name = prompt(parentBranch ? 'New sub-branch under "' + parentBranch + '":' : 'New top-level branch name:');
  if (!name?.trim()) return;
  const trimmed = name.trim();
  const path    = parentBranch ? parentBranch + '/' + trimmed : trimmed;
  // Create a placeholder note to establish the branch, or just add an empty branch
  // We store branches implicitly via note hierarchy_path — create a stub entry
  // Actually: branches exist only when notes are in them. Add a welcome note.
  API.post('notes', {
    firm_id:        FIRM_ID,
    owner_user_id:  _userId,
    title:          'New note',
    content:        '',
    hierarchy_path: path,
    is_inbox:       false,
    created_at:     new Date().toISOString(),
    updated_at:     new Date().toISOString(),
  }).then(res => {
    const note = res?.[0];
    if (note) {
      _notes.unshift(note);
      _notesRenderLeft();
      // Auto-open the new note
      _notesOpenNote(note.id);
    }
  }).catch(e => console.error('Add branch error:', e));
}

async function _notesRenameBranch(el, topBranch, subBranch) {
  const newName = el.textContent.trim();
  const oldPath = subBranch ? topBranch + '/' + subBranch : topBranch;
  if (!newName || newName === (subBranch || topBranch)) return;
  const newPath = subBranch ? topBranch + '/' + newName : newName;

  // Update all notes with this hierarchy_path prefix
  const affected = _notes.filter(n =>
    n.hierarchy_path === oldPath || n.hierarchy_path?.startsWith(oldPath + '/')
  );
  for (const n of affected) {
    const updatedPath = n.hierarchy_path.replace(oldPath, newPath);
    try {
      await API.patch('notes?id=eq.' + n.id, {
        hierarchy_path: updatedPath,
        updated_at: new Date().toISOString()
      });
      n.hierarchy_path = updatedPath;
    } catch(e) { console.error('Rename branch error:', e); }
  }
  _notesRenderLeft();
}

async function _notesDeleteBranch(topBranch, subBranch) {
  const path = subBranch ? topBranch + '/' + subBranch : topBranch;
  const notes = _notes.filter(n => n.hierarchy_path === path || n.hierarchy_path?.startsWith(path + '/'));
  if (notes.length > 0) {
    alert('Branch "' + path + '" is not empty. Move or delete its notes first.');
    return;
  }
  const branchConfirmed = await _notesConfirmDialog(
    'Delete Branch',
    '\u201c' + path.split('/').pop() + '\u201d',
    'All notes in this branch will also be deleted.',
    'Delete', 'rgba(226,75,74,.4)', '#E24B4A', 'rgba(226,75,74,.08)'
  );
  if (!branchConfirmed) return;
  _notesRenderLeft();
}

function _notesBranchDragOver(e) {
  e.preventDefault();
  e.stopPropagation();
  const el = e.currentTarget;
  // If this is a children container, highlight its preceding branch/subbranch label only
  if (el.classList.contains('notes-children')) {
    const prev = el.previousElementSibling;
    if (prev) prev.classList.add('notes-drop-target');
  } else {
    el.classList.add('notes-drop-target');
  }
}
function _notesBranchDragLeave(e) {
  const el = e.currentTarget;
  if (el.classList.contains('notes-children')) {
    // Only remove if we actually left the element (not into a child)
    const rect = el.getBoundingClientRect();
    if (e.clientX < rect.left || e.clientX > rect.right ||
        e.clientY < rect.top  || e.clientY > rect.bottom) {
      const prev = el.previousElementSibling;
      if (prev) prev.classList.remove('notes-drop-target');
    }
  } else {
    el.classList.remove('notes-drop-target');
  }
}
async function _notesBranchDrop(e) {
  e.currentTarget.classList.remove('notes-drop-target');
  const prev = e.currentTarget.previousElementSibling;
  if (prev) prev.classList.remove('notes-drop-target');
  const targetPath = e.currentTarget.dataset.branchpath;
  if (!targetPath) return;
  return _notesDropOnBranch(e, targetPath);
}

async function _notesDropOnBranch(e, targetPath) {
  e.preventDefault();
  e.stopPropagation();
  e.currentTarget.classList.remove('notes-drop-target');
  const noteId = e.dataTransfer.getData('text/plain') || _dragNoteId;
  if (!noteId) return;
  const note = _notes.find(n => n.id === noteId);
  if (!note) return;
  try {
    await API.patch('notes?id=eq.' + noteId, {
      hierarchy_path: targetPath,
      is_inbox:       false,
      updated_at:     new Date().toISOString()
    });
    note.hierarchy_path = targetPath;
    note.is_inbox       = false;
    _notesRenderLeft();
  } catch(e2) { console.error('Drop on branch error:', e2); }
}

// ── Drag and drop ─────────────────────────────────────────────────────────
let _dragNoteId  = null;  // noteId being dragged
let _dragSlot    = null;  // slot index if dragging from grid
let _dragRowId   = null;  // row id if dragging from grid

function _notesDndInit() {
  const shell = document.getElementById('views-shell');
  if (!shell || shell._dndWired) return;
  shell._dndWired = true;

  // ── Left panel: manual mouse tracking (bypasses overflow:auto dragover bug) ──
  let _leftDragActive = false;
  let _leftDragGhost  = null;

  function _getItemAt(x, y) {
    const els = document.elementsFromPoint(x, y);
    for (const el of els) {
      const item = el.closest('.views-item[data-viewid]');
      if (item) return item;
    }
    return null;
  }

  let _mouseIsDown  = false;
  let _mouseDownPos = null;

  let _html5DragActive = false; // set true when HTML5 dragstart fires

  document.addEventListener('mousedown', e => {
    const item = e.target?.closest?.('#views-left .views-item[data-viewid]');
    if (!item) return;
    _html5DragActive = false; // reset — will be set true if dragstart fires
    _dragNoteId   = item.dataset.noteid;
    _dragSlot     = null;
    _mouseIsDown  = true;
    _mouseDownPos = { x: e.clientX, y: e.clientY };
  });

  // Track insert position: {noteId, position: 'before'|'after'}
  let _dropInsert = null;

  document.addEventListener('mousemove', e => {
    if (!_dragNoteId || !_mouseIsDown || _html5DragActive) return;
    // Require 5px movement before activating drag
    if (!_leftDragActive && _mouseDownPos) {
      const dx = Math.abs(e.clientX - _mouseDownPos.x);
      const dy = Math.abs(e.clientY - _mouseDownPos.y);
      if (dx < 5 && dy < 5) return;
    }
    // Only activate left-panel drag if cursor is still within #views-left
    const leftPanel = document.getElementById('views-left');
    const leftRect  = leftPanel ? leftPanel.getBoundingClientRect() : null;
    if (leftRect && (e.clientX > leftRect.right + 20)) return;
    if (!_leftDragActive) {
      _leftDragActive = true;
      document.getElementById('views-left').style.userSelect = 'none';
      const srcItem = document.querySelector('#views-left .views-item[data-viewid="' + _dragNoteId + '"]');
      if (srcItem) srcItem.style.opacity = '0.4';
      _leftDragGhost = document.createElement('div');
      _leftDragGhost.style.cssText = 'position:fixed;pointer-events:none;z-index:9999;' +
        'background:rgba(6,10,16,.95);border:1px solid rgba(0,210,255,.5);' +
        'padding:3px 10px;font-family:var(--font-ui,sans-serif);' +
        'font-size:12px;color:#00D2FF;border-radius:2px;white-space:nowrap;' +
        'box-shadow:0 4px 16px rgba(0,0,0,.7)';
      const note = _notes.find(n => n.id === _dragNoteId);
      _leftDragGhost.textContent = note?.title || 'Note';
      document.body.appendChild(_leftDragGhost);
    }
    if (_leftDragGhost) {
      _leftDragGhost.style.left = (e.clientX + 14) + 'px';
      _leftDragGhost.style.top  = (e.clientY - 8) + 'px';
    }
    // Clear all drop indicators
    shell.querySelectorAll('.views-drop-before,.views-drop-after').forEach(el => {
      el.classList.remove('notes-drop-before','notes-drop-after');
    });
    _dropInsert = null;

    // Find item under cursor
    if (_leftDragGhost) _leftDragGhost.style.visibility = 'hidden';
    const target = _getItemAt(e.clientX, e.clientY);
    if (_leftDragGhost) _leftDragGhost.style.visibility = '';

    if (target && target.dataset.noteid !== _dragNoteId &&
        target.closest('#views-left')) {
      const rect = target.getBoundingClientRect();
      const midY = rect.top + rect.height / 2;
      const pos  = e.clientY < midY ? 'before' : 'after';
      target.classList.add(pos === 'before' ? 'notes-drop-before' : 'notes-drop-after');
      _dropInsert = { noteId: target.dataset.noteid, position: pos };
    }
  });

  document.addEventListener('mouseup', async e => {
    _mouseIsDown = false;
    if (_html5DragActive) return; // HTML5 drag handles its own cleanup
    if (!_dragNoteId || !_leftDragActive) {
      _dragNoteId = null;
      return;
    }
    if (_leftDragGhost) { _leftDragGhost.remove(); _leftDragGhost = null; }
    const srcItem = document.querySelector('#views-left .views-item[data-viewid="' + _dragNoteId + '"]');
    if (srcItem) srcItem.style.opacity = '';
    shell.querySelectorAll('.views-drop-before,.views-drop-after').forEach(el => {
      el.classList.remove('notes-drop-before','notes-drop-after');
    });

    const savedDragId  = _dragNoteId;
    const savedInsert  = _dropInsert;
    _dragNoteId        = null;
    _leftDragActive    = false;
    _dropInsert        = null;

    if (!savedInsert) return;

    const targetNote = _notes.find(n => n.id === savedInsert.noteId);
    const dragNote   = _notes.find(n => n.id === savedDragId);
    if (!targetNote || !dragNote) return;

    // Move to same branch as target
    const newPath = targetNote.hierarchy_path || 'Inbox';
    const isInbox = !newPath || newPath === 'Inbox';
    dragNote.hierarchy_path = newPath;
    dragNote.is_inbox       = isInbox;

    // Recalculate sort_order for all notes in this branch
    const branchNotes = _notes
      .filter(n => n.hierarchy_path === newPath && n.id !== savedDragId)
      .sort((a,b) => (a.sort_order||0) - (b.sort_order||0));

    const targetIdx = branchNotes.findIndex(n => n.id === savedInsert.noteId);
    const insertAt  = savedInsert.position === 'before' ? targetIdx : targetIdx + 1;
    branchNotes.splice(insertAt, 0, dragNote);

    // Assign new sort_order values (10, 20, 30... leaves room for future inserts)
    const patches = branchNotes.map((n, i) => {
      n.sort_order = (i + 1) * 10;
      return API.patch('notes?id=eq.' + n.id, {
        hierarchy_path: newPath,
        is_inbox:       isInbox,
        sort_order:     n.sort_order,
        updated_at:     new Date().toISOString(),
      });
    });

    try {
      await Promise.all(patches);
      _notesRenderLeft();
    } catch(err) { console.error('Tree reorder error:', err); }
  });

  // ── Grid: standard HTML5 drag (no overflow:auto issue there) ─────────────
  shell.addEventListener('dragstart', e => {
    // Block tile/chip rearrangement when view is locked
    if (_cv().locked && e.target.closest?.('.views-tile[data-viewid]')) {
      e.preventDefault(); return;
    }
    const tile = e.target.closest?.('.views-tile[data-viewid]');
    const chip = e.target.closest?.('.views-tray-chip[data-viewid]');
    const item = e.target.closest?.('.views-item[data-viewid]');
    if (tile && !e.target.closest?.('.views-tile-title[contenteditable]')) {
      _dragNoteId  = tile.dataset.noteid;
        _dragRowId   = tile.dataset.rowid || null;
      _dragSlot    = tile.dataset.slot !== undefined ? parseInt(tile.dataset.slot) : null;
      tile.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', _dragNoteId);
      e.dataTransfer.setData('application/noteid', _dragNoteId);
    } else if (chip) {
      _dragNoteId = chip.dataset.noteid;
      _dragSlot   = null;
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', _dragNoteId);
    } else if (item) {
      _dragNoteId      = item.dataset.noteid;
      _dragSlot        = null;
      _html5DragActive = true;  // signal mouse-event system to stay out
      _leftDragActive  = false; // ensure left drag doesn't block grid drop
      item.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
      // Store in dataTransfer so drop handler can read it even if _dragNoteId is cleared
      e.dataTransfer.setData('text/plain', _dragNoteId);
      e.dataTransfer.setData('application/noteid', _dragNoteId);
      const ghost = document.createElement('div');
      ghost.textContent = item.querySelector('.views-item-title')?.textContent || 'Note';
      ghost.style.cssText = 'position:fixed;top:-999px;left:-999px;background:#0d1e35;border:1px solid rgba(0,210,255,.35);color:#00D2FF;font-family:var(--font-ui,"Barlow Condensed",sans-serif);font-size:13px;font-weight:600;padding:4px 12px;pointer-events:none;white-space:nowrap;';
      document.body.appendChild(ghost);
      e.dataTransfer.setDragImage(ghost, 0, 0);
      setTimeout(() => ghost.remove(), 0);
    } else if (!e.target.closest?.('#views-left')) {
      e.preventDefault();
    }
  });

  shell.addEventListener('dragend', e => {
    shell.querySelectorAll('.dragging').forEach(el => el.classList.remove('dragging'));
    shell.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
    _html5DragActive = false;
    if (!_leftDragActive) { _dragNoteId = null; _dragSlot = null; _dragRowId = null; }
  });

  // Use document-level dragover to bypass Chrome overflow:auto dragover suppression
  document.addEventListener('dragover', e => {
    if (!_dragNoteId || _leftDragActive) return;
    const tile     = e.target?.closest?.('.views-tile');
    const gridArea = e.target?.closest?.('#views-grid-area');
    if (gridArea && !e.target?.closest?.('#views-left')) {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      if (tile) {
        shell.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
        tile.classList.add('drag-over');
      }
    }
  });

  document.addEventListener('dragleave', e => {
    const tile = e.target?.closest?.('.views-tile');
    if (tile) tile.classList.remove('drag-over');
  });

  document.addEventListener('drop', async e => {
    e.preventDefault();
    // Recover noteId from dataTransfer in case _dragNoteId was cleared by mouseup
    const transferredId = e.dataTransfer.getData('application/noteid') || e.dataTransfer.getData('text/plain');
    if (!_dragNoteId && transferredId) _dragNoteId = transferredId;
    if (!_dragNoteId || _leftDragActive) return;
    // Block grid rearrangement when view is locked
    if (_cv().locked && e.target?.closest?.('#views-grid-area')) {
      _dragNoteId = null; _dragSlot = null; _dragRowId = null;
      shell.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
      return;
    }
    // Must be dropping into the grid area (not left panel)
    if (!e.target?.closest?.('#views-grid-area') || e.target?.closest?.('#views-left')) {
 return; }
    let dropTile = e.target?.closest?.('.views-tile');

    // If dropped on grid area background (not a tile), use _notesOpenNote to find first empty slot
    if (!dropTile) {
      const draggedNote2 = _notes.find(n => n.id === _dragNoteId);
      const eid = (draggedNote2?.is_inbox && draggedNote2?.entity_id) ? draggedNote2.entity_id : _dragNoteId;
      if (eid !== _dragNoteId && !_notes.find(n => n.id === eid)) {
        try { const r = await API.get('notes?id=eq.' + eid + '&limit=1').catch(()=>[]); if (r?.[0]) _notes.push(r[0]); } catch(ex) {}
      }
      _cv().tray  = _cv().tray.filter(id => id !== eid && id !== _dragNoteId);
      // Remove any orphaned tile entry so _notesOpenNote places it fresh
      _cv().tiles = _cv().tiles.filter(function(t) { return t.noteId !== eid && t.noteId !== _dragNoteId; });
      _notesOpenNote(eid);
      _viewsSaveWorkspace(true); _notesRenderLeft();
      _dragNoteId = null; _dragSlot = null; _dragRowId = null;
      return;
    }

    const targetRowId  = dropTile.dataset.rowid || null;
    const targetSlot   = dropTile.dataset.slot !== undefined ? parseInt(dropTile.dataset.slot) : 0;
    const targetNoteId = dropTile.dataset.noteid || null;
    const cv           = _cv();

    // If dragging an inbox invitation, use the shared note ID instead
    const draggedNote = _notes.find(n => n.id === _dragNoteId);
    const effectiveNoteId = (draggedNote?.is_inbox && draggedNote?.entity_id)
      ? draggedNote.entity_id : _dragNoteId;

    // Fetch shared note if not in local cache
    if (effectiveNoteId !== _dragNoteId && !_notes.find(n => n.id === effectiveNoteId)) {
      try {
        const fetched = await API.get('notes?id=eq.' + effectiveNoteId + '&limit=1').catch(()=>[]);
        if (fetched?.[0]) _notes.push(fetched[0]);
      } catch(ex) {}
    }

    if (dropTile.classList.contains('empty')) {
      // Move to empty slot
      cv.tray = cv.tray.filter(id => id !== effectiveNoteId && id !== _dragNoteId);
      const existing = cv.tiles.find(t => t.noteId === effectiveNoteId);
      if (existing) {
        existing.row  = targetRowId;
        existing.slot = targetSlot;
      } else {
        cv.tiles.push({ row: targetRowId, slot: targetSlot, noteId: effectiveNoteId, chatOpen: false });
      }
    } else if (targetNoteId && targetNoteId !== effectiveNoteId) {
      // Swap or displace
      const dragTile   = cv.tiles.find(t => t.noteId === effectiveNoteId);
      const targetTile = cv.tiles.find(t => t.noteId === targetNoteId);
      if (dragTile && targetTile) {
        // Swap {row, slot}
        const fromRow  = dragTile.row;
        const fromSlot = dragTile.slot;
        dragTile.row   = targetTile.row;
        dragTile.slot  = targetTile.slot;
        targetTile.row  = fromRow;
        targetTile.slot = fromSlot;
      } else {
        // Displace target to tray, place dragged in target position
        cv.tray = cv.tray.filter(id => id !== effectiveNoteId && id !== _dragNoteId);
        cv.tiles = cv.tiles.filter(t => t.noteId !== targetNoteId);
        if (!cv.tray.includes(targetNoteId)) cv.tray.push(targetNoteId);
        cv.tiles.push({ row: targetRowId, slot: targetSlot, noteId: effectiveNoteId, chatOpen: false });
      }
    }
    _viewsSaveWorkspace(true);
    _notesRenderGrid();
    _notesRenderLeft();
  });
}

// ── Resizable splitter ───────────────────────────────────────────────────
(function() {
  let dragging = false;
  let startX   = 0;
  let startW   = 260;

  function initSplitter() {
    const splitter = document.getElementById('views-splitter');
    const shell    = document.getElementById('views-shell');
    if (!splitter || !shell) return;

    splitter.addEventListener('mousedown', e => {
      dragging = true;
      startX   = e.clientX;
      startW   = shell.getBoundingClientRect().left
        ? parseInt(getComputedStyle(shell).getPropertyValue('--notes-left-w')) || 260
        : 260;
      // Read actual current left panel width
      const leftEl = document.getElementById('views-left');
      if (leftEl) startW = leftEl.getBoundingClientRect().width;
      splitter.classList.add('dragging');
      document.body.style.cursor    = 'col-resize';
      document.body.style.userSelect = 'none';
      e.preventDefault();
    });

    document.addEventListener('mousemove', e => {
      if (!dragging) return;
      const delta  = e.clientX - startX;
      const newW   = Math.max(180, Math.min(520, startW + delta));
      shell.style.setProperty('--notes-left-w', newW + 'px');
    });

    document.addEventListener('mouseup', () => {
      if (!dragging) return;
      dragging = false;
      const splitter = document.getElementById('views-splitter');
      if (splitter) splitter.classList.remove('dragging');
      document.body.style.cursor     = '';
      document.body.style.userSelect = '';
      // Save width to workspace
      const shell = document.getElementById('views-shell');
      if (shell && _workspace) {
        const w = parseInt(shell.style.getPropertyValue('--notes-left-w')) || 260;
        _cv().leftPanelWidth = w;
        _viewsSaveWorkspace();
      }
    });
  }

  // Init after DOM is ready — called after module loads
  window._notesSplitterInit = initSplitter;
})();

// ── Minimize tile ─────────────────────────────────────────────────────────
function _notesMinimizeTile(noteId) {
  const tile = _workspace.views[_workspace.activeView]?.tiles?.find(t => t.noteId === noteId);
  if (!tile) return;
  tile.minimized = !tile.minimized;

  // Toggle body visibility
  const body   = document.getElementById('views-tbody-' + noteId);
  const tileEl = body?.closest('.views-tile');
  const btn    = document.getElementById('views-min-btn-' + noteId);

  if (body)   body.style.display   = tile.minimized ? 'none' : '';
  if (tileEl) tileEl.classList.toggle('minimized', tile.minimized);
  if (btn)    btn.title = tile.minimized ? 'Restore tile' : 'Minimize tile';
  if (btn)    btn.textContent = tile.minimized ? '▢' : '—';

  _viewsSaveWorkspace(true);
}

// ── Maximize tile ─────────────────────────────────────────────────────────
let _maximizedNoteId = null;

function _notesMaximizeTile(noteId) {
  const isMaximized = _maximizedNoteId === noteId;

  // Restore any currently maximized tile first
  if (_maximizedNoteId) {
    const prevEl = document.querySelector('.views-tile.maximized');
    if (prevEl) prevEl.classList.remove('maximized');
    const prevBtn = document.getElementById('views-max-btn-' + _maximizedNoteId);
    if (prevBtn) { prevBtn.textContent = '◻'; prevBtn.title = 'Maximize'; prevBtn.style.opacity = '.6'; }
    _maximizedNoteId = null;
  }

  if (!isMaximized) {
    // Maximize this tile
    const tileEl = document.querySelector('.views-tile[data-viewid="' + noteId + '"]');
    if (!tileEl) return;
    // Restore if minimized first
    if (tileEl.classList.contains('minimized')) _notesMinimizeTile(noteId);
    tileEl.classList.add('maximized');
    const btn = document.getElementById('views-max-btn-' + noteId);
    if (btn) { btn.textContent = '⧉'; btn.title = 'Restore'; btn.style.opacity = '1'; }
    _maximizedNoteId = noteId;
    // Focus canvas
    setTimeout(() => tileEl.querySelector('.views-tile-canvas')?.focus(), 50);
  }
}

// Close maximize on Escape key
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && _maximizedNoteId) _notesMaximizeTile(_maximizedNoteId);
});

// ── Delete inbox note ────────────────────────────────────────────────────
// ── Shared confirm dialog (replaces browser confirm()) ──────────────────
function _notesConfirmDialog(title, subject, body, actionLabel, borderColor, color, bg) {
  return new Promise(function(resolve) {
    const overlay = document.createElement('div');
    overlay.className = 'ntd-overlay';
    overlay.innerHTML =
      '<div class="ntd-dialog" style="width:380px">' +
        '<div class="ntd-header">' +
          '<div class="ntd-sub">' + _esc(title) + '</div>' +
          '<div class="ntd-title">' + _esc(subject) + '</div>' +
        '</div>' +
        '<div class="ntd-body" style="padding:14px 24px">' +
          '<div style="font-family:var(--font-ui,sans-serif);font-size:13px;color:var(--text2);line-height:1.5">' +
            _esc(body) +
          '</div>' +
        '</div>' +
        '<div class="ntd-actions">' +
          '<button class="ntd-btn ntd-btn-cancel" id="ncd-cancel">Cancel</button>' +
          '<button class="ntd-btn" id="ncd-confirm" style="border-color:' + borderColor + ';color:' + color + ';background:' + bg + '">' +
            _esc(actionLabel) +
          '</button>' +
        '</div>' +
      '</div>';
    document.body.appendChild(overlay);
    overlay.querySelector('#ncd-confirm').onclick = function() { overlay.remove(); resolve(true); };
    overlay.querySelector('#ncd-cancel').onclick  = function() { overlay.remove(); resolve(false); };
    overlay.addEventListener('mousedown', function(e) { if (e.target === overlay) { overlay.remove(); resolve(false); } });
    overlay.addEventListener('keydown',   function(e) { if (e.key === 'Escape') { overlay.remove(); resolve(false); } });
  });
}

async function _notesDeleteTreeNote(noteId) {
  const note = _notes.find(n => n.id === noteId);
  const title = note?.title || 'this note';
  const confirmed = await _notesConfirmDialog(
    'Delete Note',
    '\u201c' + title + '\u201d',
    'This cannot be undone.',
    'Delete', 'rgba(226,75,74,.4)', '#E24B4A', 'rgba(226,75,74,.08)'
  );
  if (!confirmed) return;
  try {
    await API.del('notes?id=eq.' + noteId);
    _notes = _notes.filter(n => n.id !== noteId);
    _cv().tiles = _cv().tiles.filter(t => t.noteId !== noteId);
    _cv().tray  = _cv().tray.filter(id => id !== noteId);
    _viewsSaveWorkspace(true);
    _notesRenderLeft();
    _notesRenderGrid();
  } catch(e) { console.error('[Compass] Delete note error:', e); }
}
window._notesDeleteTreeNote    = _notesDeleteTreeNote;
window._notesSaveAsTemplate        = _notesSaveAsTemplate;
window._notesShowRenameViewDialog  = _notesShowRenameViewDialog;
window._notesDeleteView            = _notesDeleteView;
window._notesLaunchTemplate        = _notesLaunchTemplate;
window._notesDeleteTemplate    = _notesDeleteTemplate;
window._notesLaunchTemplate    = _notesLaunchTemplate;

async function _notesDeleteInboxNote(noteId) {
  const note = _notes.find(n => n.id === noteId);

  // If it's a shared invitation (entity_id set), confirm and notify owner
  if (note?.entity_id && note?.is_inbox) {
    // Check if already accepted (i.e. they've been collaborating)
    const userId = _userId;
    const parts  = userId ? await API.get(
      'note_participants?note_id=eq.' + note.entity_id + '&select=user_id,role&limit=20'
    ).catch(()=>[]) : [];
    let ownerPart = (parts||[]).find(p => p.role === 'owner');

    // Fallback: look up owner from the notes table directly
    if (!ownerPart) {
      try {
        const noteRows = await API.get('notes?id=eq.' + note.entity_id + '&select=owner_user_id&limit=1').catch(()=>[]);
        if (noteRows?.[0]?.owner_user_id) {
          ownerPart = { user_id: noteRows[0].owner_user_id, role: 'owner' };
        }
      } catch(e) {}
    }

    // Show confirmation dialog
    const confirmed = await new Promise(resolve => {
      const overlay = document.createElement('div');
      overlay.className = 'notes-invite-dialog-overlay';
      const noteName = note.title || 'this shared note';
      overlay.innerHTML =
        '<div class="views-invite-dialog">' +
          '<div class="nid-header">' +
            '<div class="nid-from">Remove Shared Note</div>' +
            '<div class="nid-title">' + _esc(noteName) + '</div>' +
          '</div>' +
          '<div class="nid-body">' +
            'Removing this note will delete it from your inbox.' +
            (ownerPart ? '<br><br>The note owner will be notified that you have left.' : '') +
          '</div>' +
          '<div class="nid-actions">' +
            '<button class="nid-btn nid-btn-reject" id="nid-cancel-del">Cancel</button>' +
            '<button class="nid-btn nid-btn-accept" style="border-color:rgba(226,75,74,.4);color:#E24B4A;background:rgba(226,75,74,.08)" id="nid-confirm-del">Remove</button>' +
          '</div>' +
        '</div>';
      document.body.appendChild(overlay);
      overlay.querySelector('#nid-cancel-del').onclick  = () => { overlay.remove(); resolve(false); };
      overlay.querySelector('#nid-confirm-del').onclick = () => { overlay.remove(); resolve(true); };
      overlay.addEventListener('mousedown', e => { if (e.target === overlay) { overlay.remove(); resolve(false); }});
    });
    if (!confirmed) return;

    // Stop presence heartbeat for this note
    if (window._notesStopPresence) window._notesStopPresence(note.entity_id);

    // Notify owner
    if (ownerPart?.user_id) {
      const myName    = window._notesResource?.name || 'Someone';
      // Get actual note title from the shared note, not the invitation wrapper
      let noteTitle = note.title?.replace(/^.+? invited you to: /, '') || note.title || 'a shared note';
      try {
        const sharedNoteRows = await API.get('notes?id=eq.' + note.entity_id + '&select=title&limit=1').catch(()=>[]);
        if (sharedNoteRows?.[0]?.title) noteTitle = sharedNoteRows[0].title;
      } catch(e) {}
      try {
        await API.post('notes', {
          firm_id: FIRM_ID, owner_user_id: ownerPart.user_id,
          title:   myName + ' removed themselves from: ' + noteTitle,
          content: myName + ' has left the shared note "' + noteTitle + '".',
          hierarchy_path: 'Inbox', is_inbox: true,
          entity_id: note.entity_id, entity_type: null,
          created_at: new Date().toISOString(), updated_at: new Date().toISOString(),
        });
      } catch(e) {}
      // Remove from note_participants
      try { await API.del('note_participants?note_id=eq.' + note.entity_id + '&user_id=eq.' + userId); } catch(e) {}
    }
  }

  // Delete the inbox note and clean up workspace
  try {
    await API.del('notes?id=eq.' + noteId);
    _notes = _notes.filter(n => n.id !== noteId);
    _cv().tiles = _cv().tiles.filter(t => t.noteId !== noteId);
    _cv().tray  = _cv().tray.filter(id => id !== noteId);
    _viewsSaveWorkspace(true);
    _notesRenderLeft();
    _notesRenderGrid();
  } catch(e) { console.error('[Compass] Delete inbox note error:', e); }
}

// ── Inbox poller — check for new notes every 10s ─────────────────────────
async function _notesInboxPoll() {
  if (!_userId) return;
  try {
    const newNotes = await API.get(
      'notes?owner_user_id=eq.' + _userId +
      '&is_inbox=eq.true&created_at=gt.' + _inboxLastChecked +
      '&order=created_at.desc&limit=10'
    ).catch(() => []);
    if (newNotes?.length) {
      newNotes.forEach(n => {
        if (!_notes.find(x => x.id === n.id)) _notes.unshift(n);
      });
      _inboxLastChecked = new Date().toISOString();
      _notesRenderLeft();
    }
  } catch(e) {}
}

function _notesStartInboxPoll() {
  if (_inboxPollInterval) return;
  _inboxPollInterval = setInterval(_notesInboxPoll, 10000);
}
function _notesStopInboxPoll() {
  clearInterval(_inboxPollInterval);
  _inboxPollInterval = null;
}

// ── Shared note content sync poller ─────────────────────────────────────
let _syncPollInterval = null;

async function _notesSyncPoll() {
  const tiles = _cv()?.tiles || [];
  for (const tile of tiles) {
    const noteId = tile.noteId;
    const typedAgo = Date.now() - (_lastTyped[noteId] || 0);
    if (typedAgo < 3000) continue;
    // Skip widget tiles and placeholder/synthetic IDs — these have no DB record
    if (tile.canvasMode === 'widget') continue;
    if (!noteId || noteId.startsWith('ph-') || noteId.startsWith('wt-')) continue;
    // Fetch both content and content_blocks — decide which to use from remote data
    try {
      const rows = await API.get('notes?id=eq.' + noteId + '&select=id,content,content_blocks,updated_at&limit=1').catch(()=>[]);
      const remote = rows?.[0];
      if (!remote) continue;
      const local = _notes.find(function(n) { return n.id === noteId; });

      // Block-format: remote has content_blocks array
      if (Array.isArray(remote.content_blocks) && remote.content_blocks.length > 0) {
        if (local) { local.content_blocks = remote.content_blocks; local.updated_at = remote.updated_at; }
        // Check if tile is rendering as block canvas
        const blockContainer = document.querySelector('.views-block-canvas[data-noteblocks="' + noteId + '"]');
        if (blockContainer) {
          if (typeof _notesDiffBlocks === 'function') _notesDiffBlocks(noteId, blockContainer, remote.content_blocks);
        } else {
          // Tile is still a textarea but note is now block-format — re-render
          if (local) local.content_blocks = remote.content_blocks;
          if (typeof _notesRenderGrid === 'function') _notesRenderGrid();
        }
        continue;
      }

      // Plain textarea note
      const ta = document.querySelector('.views-tile-canvas[data-viewid="' + noteId + '"]');
      if (!ta) continue;
      const remoteContent    = remote.content || '';
      const displayedContent = ta.value;
      if (remoteContent !== displayedContent) {
        const selStart = ta.selectionStart;
        const selEnd   = ta.selectionEnd;
        const wasReadOnly = ta.readOnly;
        if (wasReadOnly) ta.readOnly = false;
        ta.value = remoteContent;
        if (wasReadOnly) ta.readOnly = true;
        if (local) { local.content = remoteContent; local.updated_at = remote.updated_at; }
        try { ta.setSelectionRange(selStart, selEnd); } catch(e) {}
      }
    } catch(e) {}
  }
}

function _notesStartSyncPoll() {
  if (_syncPollInterval) return;
  _syncPollInterval = setInterval(_notesSyncPoll, 5000);
}
function _notesStopSyncPoll() {
  clearInterval(_syncPollInterval);
  _syncPollInterval = null;
}

// ── STEP 5: Switch to a shared view (called after accept) ─────────────────
// Loads the owner's workspace config for this view and renders it read-only.
window._notesSwitchToSharedView = async function(ownerUserId, viewName) {
  if (!ownerUserId || !viewName) return;
  try {
    const wsRows = await API.get(
      'notes_workspace?user_id=eq.' + ownerUserId + '&limit=1'
    ).catch(function() { return []; });
    const ownerState = wsRows && wsRows[0] && wsRows[0].state;
    if (!ownerState) return;
    const ownerView = (ownerState.views || {})[viewName];
    if (!ownerView) return;

    // Fetch the notes referenced by this view's tiles so they resolve for the participant
    const tileNoteIds = (ownerView.tiles || []).map(function(t) { return t.noteId; }).filter(Boolean);
    if (tileNoteIds.length) {
      try {
        const sharedNotes = await API.get(
          'notes?id=in.(' + tileNoteIds.join(',') + ')&limit=50'
        ).catch(function() { return []; });
        (sharedNotes || []).forEach(function(n) {
          if (!_notes.find(function(x) { return x.id === n.id; })) _notes.push(n);
        });
      } catch(e) { console.warn('[Compass] Could not fetch shared view notes:', e); }
    }

    // Store the shared view config in the local workspace under a special key
    // so it survives re-renders without polluting the user's own views
    const sharedKey = '__shared__' + ownerUserId + '__' + viewName;
    _workspace.views[sharedKey] = Object.assign({}, ownerView, {
      _isSharedView:   true,
      _sharedOwner:    ownerUserId,
      _sharedViewName: viewName,
    });
    _workspace.activeView = sharedKey;
    // Persist wasActive so page refresh restores this shared view
    if (!_workspace.sharedViews) _workspace.sharedViews = {};
    const _svKey = ownerUserId + '::' + viewName;
    if (!_workspace.sharedViews[_svKey]) _workspace.sharedViews[_svKey] = { ownerUserId: ownerUserId, viewName: viewName };
    _workspace.sharedViews[_svKey].wasActive = true;
    _viewsSaveWorkspace(true);
    _notesRenderGrid();
    _notesRenderLeft();
    _notesRenderViewSwitcher();
    // Start view presence as participant
    setTimeout(function() {
      if (window._notesStartViewPresence) {
        window._notesStartViewPresence(ownerUserId, viewName);
      }
    }, 0);
  } catch(e) {
    console.warn('[Compass] Switch to shared view error:', e);
  }
};

})();

<script>
// ── Collaboration — invite model & presence ───────────────────────────────
(function() {

// Local escape helper (mirrors the one in the main IIFE)
function _esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function _notesRelTime(iso) {
  if (!iso) return '';
  const diff = Date.now() - new Date(iso).getTime();
  const m = Math.floor(diff / 60000);
  if (m < 1)  return 'just now';
  if (m < 60) return m + 'm ago';
  const h = Math.floor(m / 60);
  if (h < 24) return h + 'h ago';
  return Math.floor(h / 24) + 'd ago';
}

const PARTICIPANT_COLORS = [
  '#E25B6B','#EF9F27','#1D9E75','#8B5CF6','#E879A0','#00B4D8'
];
window.PARTICIPANT_COLORS = PARTICIPANT_COLORS;

// Cache: noteId → [{user_id, name, color, last_seen_at}]
const _participants = {};
// Presence poll intervals: noteId → intervalId
const _presenceIntervals = {};

// ── Load participants for a note ──────────────────────────────────────────
async function _notesLoadParticipants(noteId) {
  // Placeholder and widget-tile IDs have no DB record — skip silently
  if (!noteId || noteId.startsWith('ph-') || noteId.startsWith('wt-')) {
    _participants[noteId] = [];
    return [];
  }
  try {
    const rows = await API.get(
      'note_participants?note_id=eq.' + noteId +
      '&select=id,user_id,resource_id,role,color,invited_at,accepted_at,last_seen_at&order=invited_at.asc'
    ).catch(() => []);
    _participants[noteId] = Array.isArray(rows) ? rows : [];
  } catch(e) { _participants[noteId] = []; }
  return _participants[noteId];
}

// ── Render presence avatars ───────────────────────────────────────────────
async function _notesRenderPresence(noteId) {
  const el = document.getElementById('views-presence-' + noteId);
  if (!el) return;
  const parts = _participants[noteId] || await _notesLoadParticipants(noteId);
  const now   = Date.now();
  if (!_inviteResources) await _notesLoadInviteResources();
  const resources = _inviteResources || [];
  const selfUserId = window._notesResource && window._notesResource.user_id;

  // Build the set of people to show from note_participants
  const filtered = parts.filter(function(p) {
    return !(p.user_id && p.user_id === selfUserId);
  });

  // Tile header presence = note_participants only (direct note collaborators)
  // View-level participants (view_participants) appear in the presence strip above
  // the grid, not in individual tile headers.

  el.innerHTML = '';
  filtered.forEach(function(p) {
    const res      = resources.find(function(r) { return r.id === p.resource_id; }) ||
                     resources.find(function(r) { return r.user_id === p.user_id; });
    const name     = res ? ((res.first_name || '') + ' ' + (res.last_name || '')).trim() : (p.user_id ? 'User' : '?');
    const initials = name.split(' ').map(function(w) { return w[0]; }).join('').slice(0,2).toUpperCase();
    const color    = p.color || '#00D2FF';
    const seenAgo  = p.last_seen_at ? now - new Date(p.last_seen_at).getTime() : Infinity;
    const active   = seenAgo < 15000;
    const pending  = !p.accepted_at;

    const avatar = document.createElement('div');
    if (pending) {
      avatar.className = 'notes-avatar notes-avatar-pending';
      avatar.style.cssText = 'background:transparent;color:' + color + ';border:1.5px solid ' + color + ';opacity:.6';
    } else {
      avatar.className = 'notes-avatar' + (active ? ' active' : '');
      avatar.style.background = color;
    }
    avatar.textContent = initials;
    avatar.title = name + (active ? ' (active)' : '');
    avatar.dataset.participantId = p.id;
    avatar.dataset.noteId        = noteId;

    avatar.addEventListener('click', function(e) {
      e.stopPropagation();
      _notesShowParticipantCard(avatar, p, res, name, color, active, noteId);
    });

    el.appendChild(avatar);
  });
}

// ── Heartbeat — update own last_seen_at every 5s ──────────────────────────
async function _notesHeartbeat(noteId) {
  // No DB record exists for placeholder or widget-tile IDs
  if (!noteId || noteId.startsWith('ph-') || noteId.startsWith('wt-')) return;
  const userId = window._notesResource?.user_id;
  if (!userId) return;
  try {
    await API.patch(
      'note_participants?note_id=eq.' + noteId + '&user_id=eq.' + userId,
      { last_seen_at: new Date().toISOString() }
    );
  } catch(e) {}
  // Refresh participants presence
  await _notesLoadParticipants(noteId);
  _notesRenderPresence(noteId);
  // Sync content if others are active on this note
  await _notesSyncContent(noteId);
}

async function _notesSyncContent(noteId) {
  const parts = _participants[noteId] || [];
  const selfUserId = window._notesResource?.user_id;
  const hasOthers = parts.some(p => p.user_id !== selfUserId && p.accepted_at);
  if (!hasOthers && parts.length <= 1) return;

  try {
    const rows = await API.get('notes?id=eq.' + noteId + '&select=id,content,updated_at&limit=1').catch(()=>[]);
    const remote = rows?.[0];
    if (!remote) return;
    const ta = document.querySelector('.views-tile-canvas[data-viewid="' + noteId + '"]');
    if (!ta) return;
    // Skip if user typed in this note within the last 3 seconds
    const typedAgo = Date.now() - (_lastTyped[noteId] || 0);
    if (typedAgo < 3000) return;
    const local = _notes.find(n => n.id === noteId);
    // Update if remote content differs from what's currently displayed
    const remoteContent    = remote.content || '';
    const displayedContent = ta.value;
    if (remoteContent !== displayedContent) {
      const selStart = ta.selectionStart;
      const selEnd   = ta.selectionEnd;
      ta.value = remoteContent;
      if (local) {
        local.content    = remoteContent;
        local.updated_at = remote.updated_at;
      }
      try { ta.setSelectionRange(selStart, selEnd); } catch(e) {}
    }
  } catch(e) {}
}

// ── Start/stop presence polling for a tile ────────────────────────────────
function _notesStartPresence(noteId) {
  if (_presenceIntervals[noteId]) return; // already running
  _notesHeartbeat(noteId); // immediate first tick
  _presenceIntervals[noteId] = setInterval(() => _notesHeartbeat(noteId), 5000);
}

function _notesStopPresence(noteId) {
  clearInterval(_presenceIntervals[noteId]);
  delete _presenceIntervals[noteId];
}

// ── Show invite popover ───────────────────────────────────────────────────
// Resource cache for invite popover
let _inviteResources = null;

async function _notesLoadInviteResources() {
  if (_inviteResources) return _inviteResources;
  try {
    const rows = await API.get(
      'resources?select=id,first_name,last_name,email,department,title,is_external,user_id,avatar_url&order=last_name.asc&limit=200'
    ).catch(() => []);
    _inviteResources = (Array.isArray(rows) ? rows : []).map(r => ({
      ...r,
      name: ((r.first_name || '') + ' ' + (r.last_name || '')).trim() || r.email || r.id,
    }));
    window._inviteResources = _inviteResources;
  } catch(e) { _inviteResources = []; }
  return _inviteResources;
}

window._notesShowInvite = async function(noteId, btn) {
  document.querySelectorAll('.views-invite-pop').forEach(p => p.remove());

  const pop = document.createElement('div');
  pop.className = 'notes-invite-pop';
  pop.innerHTML =
    '<div style="font-family:var(--font-ui,\'Barlow Condensed\',sans-serif);font-size:11px;' +
      'color:var(--text3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px">Invite to note</div>' +
    '<input id="views-invite-input" placeholder="Search by name or department…" autocomplete="off"/>' +
    '<div class="views-invite-result" id="views-invite-results">' +
      '<div style="padding:6px 7px;font-family:var(--font-ui,\'Barlow Condensed\',sans-serif);font-size:11px;color:var(--text3)">Loading…</div>' +
    '</div>';

  // Position fixed relative to the + button
  document.body.appendChild(pop);
  const btnRect = btn.getBoundingClientRect();
  const popW    = 280;
  let left = btnRect.right - popW;
  let top  = btnRect.bottom + 4;
  // Keep on screen
  if (left < 8) left = 8;
  if (top + 400 > window.innerHeight) top = btnRect.top - 420;
  pop.style.left = left + 'px';
  pop.style.top  = top  + 'px';
  pop.style.width = popW + 'px';

  const input = pop.querySelector('#views-invite-input');
  input.focus();

  const allResources = await _notesLoadInviteResources();

  function renderResults(q) {
    const lower = q.toLowerCase().trim();
    const selfId = window._notesResource?.user_id;
    const existingIds = new Set((_participants[noteId] || []).map(p => p.resource_id || p.user_id));
    let colorIdx = existingIds.size;

    const filtered = allResources.filter(r => {
      if (r.user_id === selfId) return false; // exclude self (by user_id if set)
      if (!r.id) return false;
      if (!lower) return true;
      return (r.name || '').toLowerCase().includes(lower) ||
             (r.department || '').toLowerCase().includes(lower) ||
             (r.email || '').toLowerCase().includes(lower);
    });

    const resultsEl = pop.querySelector('#views-invite-results');
    if (!filtered.length) {
      resultsEl.innerHTML = '<div style="padding:6px 7px;font-family:var(--font-ui,\'Barlow Condensed\',sans-serif);font-size:11px;color:var(--text3)">No results</div>';
      return;
    }

    // Group by department, External last
    const groups = {};
    filtered.forEach(r => {
      const grp = r.is_external ? 'External' : (r.department || 'Other');
      if (!groups[grp]) groups[grp] = [];
      groups[grp].push(r);
    });

    const keys = Object.keys(groups).sort((a,b) => {
      if (a === 'External') return 1;
      if (b === 'External') return -1;
      return a.localeCompare(b);
    });

    let html = '';
    keys.forEach(grp => {
      html += '<div style="padding:4px 7px 2px;font-family:var(--font-mono,monospace);font-size:10px;' +
        'color:var(--text3);letter-spacing:.08em;text-transform:uppercase;' +
        'border-top:1px solid rgba(0,210,255,.08);margin-top:2px">' + _esc(grp) + '</div>';
      groups[grp].forEach(r => {
        const initials = r.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
        const already  = existingIds.has(r.user_id);
        const color    = already
          ? (_participants[noteId]?.find(p=>p.user_id===r.user_id)?.color || '#00D2FF')
          : PARTICIPANT_COLORS[colorIdx % PARTICIPANT_COLORS.length];
        if (!already) colorIdx++;
        html += '<div class="views-invite-row" data-userid="' + _esc(r.user_id) + '" ' +
          'data-color="' + _esc(color) + '" data-already="' + already + '">' +
          '<div class="views-avatar" style="background:' + _esc(color) + ';color:#000">' + _esc(initials) + '</div>' +
          '<div style="flex:1;min-width:0">' +
            '<div style="font-family:var(--font-ui,\'Barlow Condensed\',sans-serif);font-size:12px;color:var(--text0)">' + _esc(r.name) + '</div>' +
            (r.email ? '<div style="font-family:var(--font-mono,monospace);font-size:10px;color:var(--text3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + _esc(r.email) + '</div>' : '') +
          '</div>' +
          (already ? '<span style="font-family:var(--font-mono,monospace);font-size:10px;color:var(--text3)">✓</span>' : '') +
          '</div>';
      });
    });

    resultsEl.innerHTML = html;
    resultsEl.querySelectorAll('.views-invite-row[data-already="false"]').forEach(row => {
      row.onclick = () => {
        if (row._inviting) return;
        row._inviting = true;
        row.style.opacity = '0.5';
        row.style.pointerEvents = 'none';
        _notesInvite(noteId, row.dataset.resourceid, row.dataset.userid || null, row.dataset.color, pop);
      };
    });
  }

  renderResults('');
  input.addEventListener('input', () => renderResults(input.value));

  setTimeout(() => {
    document.addEventListener('mousedown', function _close(e) {
      if (!pop.contains(e.target) && e.target !== btn) {
        pop.remove();
        document.removeEventListener('mousedown', _close);
      }
    });
  }, 50);
};

// ── Participant profile card ──────────────────────────────────────────────
async function _notesShowParticipantCard(anchor, participant, res, name, color, active, noteId) {
  document.querySelectorAll('.views-participant-card').forEach(c => c.remove());

  // Resolve resource first — needed for photo and title
  if (!_inviteResources) await _notesLoadInviteResources();
  let resolvedRes = res;
  if (!resolvedRes && _inviteResources) {
    resolvedRes = (participant.resource_id && _inviteResources.find(r => r.id === participant.resource_id)) ||
                  (participant.user_id    && _inviteResources.find(r => r.user_id === participant.user_id)) ||
                  null;
  }
  const resourceId = resolvedRes?.id || participant.resource_id;

  const card = document.createElement('div');
  card.className = 'notes-participant-card';

  const initials  = name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
  const title     = resolvedRes?.title || res?.title || '—';
  const photoUrl  = resolvedRes?.avatar_url || res?.avatar_url;

  const avatarHtml = photoUrl
    ? '<img src="' + _esc(photoUrl) + '" style="width:40px;height:40px;border-radius:50%;object-fit:cover;flex-shrink:0" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'">' +
      '<div class="npc-avatar" style="background:' + _esc(color) + '18;color:' + _esc(color) + ';border:1px solid ' + _esc(color) + '44;display:none">' + _esc(initials) + '</div>'
    : '<div class="npc-avatar" style="background:' + _esc(color) + '18;color:' + _esc(color) + ';border:1px solid ' + _esc(color) + '44">' + _esc(initials) + '</div>';

  card.innerHTML =
    '<div class="npc-top">' +
      avatarHtml +
      '<div><div class="npc-name">' + _esc(name) + '</div>' +
      '<div class="npc-title">' + _esc(title) + '</div></div>' +
    '</div>' +
    '<div id="npc-body-' + _esc(participant.id) + '"><div style="padding:14px 16px;font-family:var(--font-mono,monospace);font-size:10px;color:var(--text3)">' + (resourceId ? 'Loading…' : 'No resource data available') + '</div></div>' +
    '<button class="npc-remove" onclick="window._notesRemoveParticipant(\'' + _esc(participant.id) + '\',\'' + _esc(noteId) + '\')">✕ REMOVE FROM NOTE</button>';

  // Position
  document.body.appendChild(card);
  const rect = anchor.getBoundingClientRect();
  const cw   = 340;
  const ch   = Math.min(card.scrollHeight + 20, window.innerHeight - 20);
  let left = rect.right + 12;
  let top  = rect.top;
  if (left + cw > window.innerWidth  - 10) left = rect.left - cw - 12;
  if (top  + ch > window.innerHeight - 10) top  = window.innerHeight - ch - 10;
  card.style.left = Math.max(10, left) + 'px';
  card.style.top  = Math.max(10, top)  + 'px';

  // Close on outside click
  setTimeout(() => {
    document.addEventListener('mousedown', function _close(e) {
      if (!card.contains(e.target) && e.target !== anchor) {
        card.remove();
        document.removeEventListener('mousedown', _close);
      }
    });
  }, 50);

  if (!resourceId) return;

  // Fetch rich data in parallel

  const [skills, profile, domains, assignments, allSkills, allDomains] = await Promise.all([
    API.get('resource_skills?resource_id=eq.' + resourceId).catch(()=>[]),
    API.get('resource_profiles?resource_id=eq.' + resourceId + '&limit=1').catch(()=>[]),
    API.get('resource_domain_experience?resource_id=eq.' + resourceId).catch(()=>[]),
    API.get('task_resource_assignments?resource_id=eq.' + resourceId + '&select=*,tasks(name,start_date,due_date,status)&limit=10').catch(()=>[]),
    API.get('hud_skills?select=id,name&limit=500').catch(()=>[]),
    API.get('hud_skill_domains?select=id,name&limit=200').catch(()=>[]),
  ]);

  const prof     = profile?.[0];
  const now      = Date.now();
  const seenAgo  = participant.last_seen_at ? now - new Date(participant.last_seen_at).getTime() : Infinity;
  const isPending = !participant.accepted_at;
  const seenText  = isPending ? 'Invitation pending' : (active ? 'Active now' : (participant.last_seen_at ? _notesRelTime(participant.last_seen_at) + ' ago' : 'Never'));

  const totalPct  = (assignments||[]).reduce((s,a) => s + (a.allocation_pct||0), 0);
  const displayRes = resolvedRes || res;
  const availPct  = displayRes?.availability_pct ?? 100;
  const utilColor = totalPct > availPct ? 'var(--red,#E24B4A)' : totalPct > availPct*0.8 ? 'var(--amber,#EF9F27)' : 'var(--green,#1D9E75)';

  const profColors = { aware:'var(--text2)', practitioner:'var(--cyan,#00D2FF)', expert:'var(--amber,#EF9F27)', authority:'var(--purple,#8B5CF6)' };

  let html = '';

  // Contact & Info
  html += '<div class="npc-section">';
  html += '<div class="npc-section-lbl">CONTACT &amp; INFO</div>';
  if (displayRes?.email)      html += '<div class="npc-row"><span class="npc-row-lbl">EMAIL</span><span class="npc-row-val">' + _esc(displayRes.email) + '</span></div>';
  if (displayRes?.phone)      html += '<div class="npc-row"><span class="npc-row-lbl">PHONE</span><span class="npc-row-val">' + _esc(displayRes.phone) + '</span></div>';
  if (displayRes?.department) html += '<div class="npc-row"><span class="npc-row-lbl">DEPT</span><span class="npc-row-val">' + _esc(displayRes.department) + '</span></div>';
  if (displayRes?.hire_date)  html += '<div class="npc-row"><span class="npc-row-lbl">HIRED</span><span class="npc-row-val">' + new Date(displayRes.hire_date).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) + '</span></div>';
  if (displayRes?.availability_pct != null) html += '<div class="npc-row"><span class="npc-row-lbl">AVAILABILITY</span><span class="npc-row-val">' + displayRes.availability_pct + '%</span></div>';
  html += '<div class="npc-row"><span class="npc-row-lbl">PRESENCE</span><span class="npc-row-val">' + (active ? '<span class="npc-active-dot"></span>' : '') + _esc(seenText) + '</span></div>';
  html += '</div>';

  // Skills
  if (skills?.length) {
    const sorted = [...skills].sort((a,b) => {
      const o = {authority:0,expert:1,practitioner:2,aware:3};
      return (o[a.proficiency]||9)-(o[b.proficiency]||9);
    });
    html += '<div class="npc-section"><div class="npc-section-lbl">SKILLS &amp; PROFICIENCY</div>';
    html += '<div style="display:flex;flex-wrap:wrap;gap:4px;">';
    sorted.slice(0,8).forEach(s => {
      const pc = profColors[s.proficiency] || 'var(--text3)';
      const sk = (allSkills||[]).find(x => x.id === s.skill_id);
      html += '<span style="font-family:var(--font-mono,monospace);font-size:10px;padding:2px 7px;border:1px solid ' + pc + '44;color:' + pc + ';background:' + pc + '0d;white-space:nowrap;">' + _esc(sk?.name || s.skill_name || '?') + '</span>';
    });
    if (sorted.length > 8) html += '<span style="font-family:var(--font-mono,monospace);font-size:10px;color:var(--text3);padding:2px 4px;">+' + (sorted.length-8) + ' more</span>';
    html += '</div></div>';
  }

  // Domain experience
  if (domains?.length) {
    html += '<div class="npc-section"><div class="npc-section-lbl">DOMAIN EXPERIENCE</div>';
    domains.slice(0,3).forEach(d => {
      html += '<div style="padding:4px 0;border-bottom:1px solid rgba(255,255,255,.04);">';
      const dom = (allDomains||[]).find(x => x.id === d.domain_id);

      if (d.subsystem) html += '<div style="font-family:var(--font-mono,monospace);font-size:10px;color:#00D2FF;margin-top:1px">' + _esc(d.subsystem) + '</div>';
      const meta = [d.years_experience ? d.years_experience+'yr exp' : null, d.regulatory_class && d.regulatory_class!=='N/A' ? d.regulatory_class : null].filter(Boolean);
      if (meta.length) html += '<div style="font-family:var(--font-mono,monospace);font-size:10px;color:var(--text3)">' + _esc(meta.join(' · ')) + '</div>';
      html += '</div>';
    });
    html += '</div>';
  }

  // Allocation
  html += '<div class="npc-section"><div class="npc-section-lbl">ALLOCATION — FIRM-WIDE</div>';
  html += '<div class="npc-row"><span class="npc-row-lbl">CAPACITY</span><span class="npc-row-val">' + availPct + '%</span></div>';
  html += '<div class="npc-row"><span class="npc-row-lbl">COMMITTED</span><span style="font-family:var(--font-mono,monospace);font-size:11px;color:' + utilColor + ';font-weight:700;">' + totalPct.toFixed(0) + '%' + (totalPct > availPct ? ' ⚠ OVERLOADED' : '') + '</span></div>';
  html += '<div class="npc-alloc-bar"><div class="npc-alloc-fill" style="width:' + Math.min(totalPct/Math.max(availPct,1)*100,100) + '%;background:' + utilColor + '"></div></div>';
  if (assignments?.length) {
    assignments.slice(0,3).forEach(a => {

  const bodyEl = document.getElementById('npc-body-' + participant.id);
  if (bodyEl) bodyEl.innerHTML = html;

  // Reposition after content loaded
  const newH = Math.min(card.scrollHeight + 20, window.innerHeight - 20);

  card.style.overflowY = 'auto';
  if (parseFloat(card.style.top) + newH > window.innerHeight - 10) {
    card.style.top = Math.max(10, window.innerHeight - newH - 10) + 'px';
  }
}

// ── Remove participant from note ──────────────────────────────────────────
async function _notesRemoveParticipant(participantId, noteId) {
  document.querySelectorAll('.views-participant-card').forEach(c => c.remove());
  try {
    // Get participant details before deleting
    const parts = await API.get('note_participants?id=eq.' + participantId + '&select=user_id,resource_id').catch(()=>[]);
    const removedUserId = parts?.[0]?.user_id;

    await API.del('note_participants?id=eq.' + participantId);
    if (_participants[noteId]) {
      _participants[noteId] = _participants[noteId].filter(p => p.id !== participantId);
    }
    _notesRenderPresence(noteId);

    // Remove the shared note from the removed user's workspace
    if (removedUserId) {
      try {
        const wsRows = await API.get('notes_workspace?user_id=eq.' + removedUserId + '&limit=1').catch(()=>[]);
        if (wsRows?.[0]?.state) {
          const state = wsRows[0].state;
          let changed = false;
          // Remove from all views
          Object.values(state.views || {}).forEach(v => {
            const before = (v.tiles || []).length + (v.tray || []).length;
            v.tiles = (v.tiles || []).filter(t => t.noteId !== noteId);
            v.tray  = (v.tray  || []).filter(id => id !== noteId);
            if ((v.tiles.length + v.tray.length) < before) changed = true;
          });
          if (changed) {
            await API.patch('notes_workspace?user_id=eq.' + removedUserId, {
              state:      state,
              updated_at: new Date().toISOString(),
            });
          }
        }
      } catch(e) { console.warn('[Compass] Could not clean workspace for removed participant:', e); }
    }
  } catch(e) { console.error('[Compass] Remove participant error:', e); }
}

// ── Invite a user to a note ───────────────────────────────────────────────
async function _notesInvite(noteId, resourceId, userId, color, pop) {
  try {
    // If resource_id is empty string or null, try to find it from cached resources
    let resolvedResourceId = resourceId || null;
    let resolvedUserId = userId || null;
    if (!resolvedResourceId && resolvedUserId && _inviteResources) {
      const r = _inviteResources.find(r => r.user_id === resolvedUserId);
      if (r) resolvedResourceId = r.id;
    }
    if (!resolvedUserId && resolvedResourceId && _inviteResources) {
      const r = _inviteResources.find(r => r.id === resolvedResourceId);
      if (r) resolvedUserId = r.user_id || null;
    }

    // 1. Add to note_participants
    await API.post('note_participants', {
      note_id:      noteId,
      resource_id:  resolvedResourceId,
      user_id:      resolvedUserId,
      role:         'participant',
      color:        color,
      invited_at:   new Date().toISOString(),
      last_seen_at: null,
    });

    // 2. Send inbox notification to invitee if they have a user_id
    if (resolvedUserId) {
      const sourceNote = typeof _notes !== 'undefined'
        ? _notes.find(n => n.id === noteId)
        : null;
      const inviterName = window._notesResource?.name || 'A colleague';
      const noteName    = sourceNote?.title || 'a note';
      try {
        await API.post('notes', {
          firm_id:        'aaaaaaaa-0001-0001-0001-000000000001',
          owner_user_id:  resolvedUserId,
          title:          inviterName + ' invited you to: ' + noteName,
          content:        inviterName + ' has shared "' + noteName + '" with you. Click the note in your inbox to open it, or find it in the shared notes tree.',
          hierarchy_path: 'Inbox',
          is_inbox:       true,
          entity_id:      noteId,
          entity_type:    null,
          created_at:     new Date().toISOString(),
          updated_at:     new Date().toISOString(),
        });
      } catch(e) {
        console.warn('[Compass] Inbox notification failed:', e);
      }
    }

    // Migrate note to block format if this is the first participant
    // Skip widget tiles — they don't use the text canvas
    try {
      const noteForMigrate = typeof _notes !== 'undefined' ? _notes.find(function(n) { return n.id === noteId; }) : null;
      const _tileState = noteForMigrate && (typeof _cv === 'function' ? _cv : window._viewsCv) ? (function() {
        const cv = (typeof _cv === 'function' ? _cv() : (window._viewsCv && window._viewsCv())); return cv && cv.tiles && cv.tiles.find(function(t) { return t.noteId === noteId; });
      })() : null;
      const _isWidget = _tileState && _tileState.canvasMode === 'widget';
      if (noteForMigrate && !_notesIsBlockFormat(noteForMigrate) && !_isWidget) {
        const ownerResId = window._notesResource && window._notesResource.id;
        const ownerName  = window._notesResource && window._notesResource.name;
        const blocks     = _notesMigrateToBlocks(noteForMigrate.content || '', ownerResId, ownerName);
        noteForMigrate.content_blocks = blocks;
        await API.patch('notes?id=eq.' + noteId, {
          content_blocks: blocks,
          updated_at:     new Date().toISOString(),
        });
        if (typeof _notesRenderGrid === 'function') _notesRenderGrid();
      }
    } catch(e) { console.warn('[Compass] Block migration error:', e); }

    await _notesLoadParticipants(noteId);
    _notesRenderPresence(noteId);
    pop.remove();
  } catch(e) {
    console.error('[Compass] Invite error:', e);
  }
}

// ── STEP 5: View-level presence ───────────────────────────────────────────
// Per-view participant cache: viewKey → [{...view_participants row, name, initials, color}]
const _viewParticipants = {};
// Presence poll intervals: viewKey → intervalId
const _viewPresenceIntervals = {};
// Last-seen workspace config hash per view (for config sync)
const _viewConfigHash = {};

function _vpViewKey(ownerUserId, viewName) {
  return ownerUserId + '::' + viewName;
}

// Load view_participants rows for a given owner+viewName
async function _viewsLoadViewParticipants(ownerUserId, viewName) {
  const key = _vpViewKey(ownerUserId, viewName);
  try {
    const rows = await API.get(
      'view_participants?workspace_owner_user_id=eq.' + ownerUserId +
      '&view_name=eq.' + encodeURIComponent(viewName) +
      '&select=id,user_id,resource_id,view_role,tile_edit_overrides,color,invited_at,accepted_at,last_seen_at' +
      '&order=invited_at.asc'
    ).catch(() => []);
    const resources = _inviteResources || await _notesLoadInviteResources();
    _viewParticipants[key] = (Array.isArray(rows) ? rows : []).map(function(p) {
      const res = resources.find(function(r) {
        return r.id === p.resource_id || r.user_id === p.user_id;
      });
      const name = res
        ? ((res.first_name || '') + ' ' + (res.last_name || '')).trim() || res.email || 'User'
        : 'User';
      return Object.assign({}, p, {
        name:     name,
        initials: name.split(' ').map(function(w) { return w[0]; }).join('').slice(0, 2).toUpperCase(),
        // Use DB color if set, otherwise assign from palette by position
        color:    p.color || PARTICIPANT_COLORS[
          (Array.isArray(rows) ? rows : []).indexOf(p) % PARTICIPANT_COLORS.length
        ],
      });
    });
  } catch(e) {
    _viewParticipants[key] = [];
  }
  return _viewParticipants[key];
}

// Render the presence strip above the workspace grid
function _notesRenderViewPresenceStrip(ownerUserId, viewName) {
  const key    = _vpViewKey(ownerUserId, viewName);
  const parts  = _viewParticipants[key] || [];
  const now    = Date.now();
  const selfId = window._notesResource?.user_id;

  // Only show accepted participants other than self
  const visible = parts.filter(function(p) {
    return p.accepted_at && p.user_id !== selfId;
  });

  let strip = document.getElementById('views-view-presence-strip');
  if (!strip) {
    // Create the strip and insert it between the row-editor bar and the grid area
    strip = document.createElement('div');
    strip.id = 'notes-view-presence-strip';
    strip.style.cssText =
      'display:flex;align-items:center;gap:5px;padding:3px 14px;' +
      'border-bottom:1px solid rgba(0,210,255,.06);flex-shrink:0;min-height:0;' +
      'background:rgba(0,210,255,.02);transition:all .2s';
    const rowEditor = document.getElementById('views-row-editor');
    if (rowEditor && rowEditor.parentNode) {
      rowEditor.parentNode.insertBefore(strip, rowEditor.nextSibling);
    }
  }

  if (!visible.length) {
    strip.style.display = 'none';
    return;
  }

  strip.style.display = 'flex';
  strip.innerHTML =
    '<span style="font-family:var(--font-mono,monospace);font-size:9px;color:var(--text3);' +
    'letter-spacing:.08em;text-transform:uppercase;margin-right:3px">Also viewing</span>';

  visible.forEach(function(p) {
    const seenAgo = p.last_seen_at ? now - new Date(p.last_seen_at).getTime() : Infinity;
    const active  = seenAgo < 15000;
    const avatar  = document.createElement('div');
    avatar.className = 'notes-avatar' + (active ? ' active' : '');
    avatar.style.cssText =
      'width:18px;height:18px;font-size:9px;background:' + p.color +
      ';color:#000;cursor:default;flex-shrink:0';
    avatar.title    = p.name + (active ? ' (active)' : ' (away)');
    avatar.textContent = p.initials;
    strip.appendChild(avatar);
  });
}

// View heartbeat — patches own last_seen_at in view_participants, re-renders strip,
// and syncs the view config if the owner has made structural changes
async function _notesViewHeartbeat(ownerUserId, viewName) {
  const userId = window._notesResource?.user_id;
  if (!userId) return;

  // 1. Patch own last_seen_at
  try {
    await API.patch(
      'view_participants?workspace_owner_user_id=eq.' + ownerUserId +
      '&view_name=eq.' + encodeURIComponent(viewName) +
      '&user_id=eq.' + userId,
      { last_seen_at: new Date().toISOString() }
    );
  } catch(e) {}

  // 2. Reload participants + re-render strip
  await _viewsLoadViewParticipants(ownerUserId, viewName);
  _notesRenderViewPresenceStrip(ownerUserId, viewName);

  // 3. View-config sync for participants (not the owner)
  // If we are NOT the owner, check if the owner's workspace state has changed
  // and re-render our view accordingly
  if (userId !== ownerUserId) {
    try {
      const wsRows = await API.get(
        'notes_workspace?user_id=eq.' + ownerUserId + '&limit=1'
      ).catch(() => []);
      const ownerState = wsRows?.[0]?.state;
      if (!ownerState) return;
      const ownerView = (ownerState.views || {})[viewName];
      if (!ownerView) return;

      // Compare a lightweight hash (JSON string) to avoid unnecessary re-renders
      const key  = _vpViewKey(ownerUserId, viewName);
      const hash = JSON.stringify({ rows: ownerView.rows, tiles: ownerView.tiles });
      if (_viewConfigHash[key] !== hash) {
        _viewConfigHash[key] = hash;
        // Update local workspace state with owner's current layout
        const cvFn = (typeof _cv === 'function' ? _cv : window._viewsCv);
        if (typeof cvFn === 'function') {
          const cv = cvFn();
          if (cv) {
            cv.rows  = JSON.parse(JSON.stringify(ownerView.rows  || []));
            cv.tiles = JSON.parse(JSON.stringify(ownerView.tiles || []));
            // Fetch any new notes that aren't in memory yet
            const newNoteIds = (ownerView.tiles || [])
              .map(function(t) { return t.noteId; })
              .filter(function(id) {
                if (!id) return false;
                const notesArr = typeof _notes !== 'undefined' ? _notes : [];
                return !notesArr.find(function(n) { return n.id === id; });
              });
            if (newNoteIds.length) {
              API.get('notes?id=in.(' + newNoteIds.join(',') + ')&limit=50')
                .then(function(rows) {
                  (rows || []).forEach(function(n) {
                    const notesArr = typeof _notes !== 'undefined' ? _notes : [];
                    if (!notesArr.find(function(x) { return x.id === n.id; })) notesArr.push(n);
                  });
                  if (typeof window._viewsRenderGrid === 'function') window._viewsRenderGrid();
                })
                .catch(function() {
                  if (typeof window._viewsRenderGrid === 'function') window._viewsRenderGrid();
                });
            } else {
              if (typeof window._viewsRenderGrid === 'function') window._viewsRenderGrid();
            }
          }
        }
      }
    } catch(e) {}
  }
}

// Start/stop view-level presence polling
function _notesStartViewPresence(ownerUserId, viewName) {
  const key = _vpViewKey(ownerUserId, viewName);
  if (_viewPresenceIntervals[key]) return; // already running
  _notesViewHeartbeat(ownerUserId, viewName); // immediate first tick
  _viewPresenceIntervals[key] = setInterval(function() {
    _notesViewHeartbeat(ownerUserId, viewName);
  }, 5000);
}

function _notesStopViewPresence(ownerUserId, viewName) {
  const key = _vpViewKey(ownerUserId, viewName);
  clearInterval(_viewPresenceIntervals[key]);
  delete _viewPresenceIntervals[key];
  // Hide strip
  const strip = document.getElementById('views-view-presence-strip');
  if (strip) strip.style.display = 'none';
}

// Called by Block 1 when the active view changes
window._notesStartViewPresence  = _notesStartViewPresence;
window._notesStopViewPresence   = _notesStopViewPresence;
window._viewsLoadViewParticipants  = _viewsLoadViewParticipants;
window._notesRenderViewPresenceStrip = _notesRenderViewPresenceStrip;
window._notesGetViewParticipants = function(ownerUserId, viewName) {
  return _viewParticipants[_vpViewKey(ownerUserId, viewName)] || [];
};

// ── STEP 5: Share View dialog ─────────────────────────────────────────────
window._notesShowShareViewDialog = async function() {
  const userId   = window._notesResource && window._notesResource.user_id;
  const viewName = window._workspace && window._workspace.activeView;
  if (!userId || !viewName) return;

  const myParts = await _viewsLoadViewParticipants(userId, viewName);
  const myRow   = myParts.find(function(p) { return p.user_id === userId; });
  if (myRow && myRow.view_role === 'viewer') return;

  const allResources = await _notesLoadInviteResources();
  const cvFn = (typeof _cv === 'function' ? _cv : window._viewsCv);
  const cv   = typeof cvFn === 'function' ? cvFn() : null;
  const tiles = (cv && cv.tiles) || [];
  const rows  = (cv && cv.rows)  || [];

  const slots = [];
  rows.forEach(function(row) {
    const cols = Math.max(1, Math.min(8, row.columns || 2));
    for (var s = 0; s < cols; s++) {
      const tile   = tiles.find(function(t) { return t.row === row.id && t.slot === s; });
      const noteId = tile && tile.noteId;
      const _notesArr = typeof _notes !== 'undefined' ? _notes : [];
      const note   = noteId ? _notesArr.find(function(n) { return n.id === noteId; }) : null;
      slots.push({ slotKey: row.id + ':' + s, label: note ? (note.title || 'Untitled').slice(0,18) : 'Empty' });
    }
  });

  async function renderDialog() {
    // Always reload fresh from DB — never trust cache for the dialog
    await _viewsLoadViewParticipants(userId, viewName);
    const existing = _viewParticipants[_vpViewKey(userId, viewName)] || [];
    const others   = existing.filter(function(p) { return p.user_id !== userId; });

    function peopleRowHtml(p) {
      const isPending = !p.accepted_at;
      const roleOpts  = ['editor','viewer'].map(function(r) {
        return '<option value="' + r + '"' + (p.view_role === r ? ' selected' : '') + '>' + r[0].toUpperCase() + r.slice(1) + '</option>';
      }).join('');
      return '<div class="nvsd-person-row" data-participantid="' + _esc(p.id) + '">' +

        '<div style="flex:1;min-width:0">' +
          '<div style="font-family:var(--font-ui,\'Barlow Condensed\',sans-serif);font-size:13px;color:var(--text0);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + _esc(p.name||'Unknown') + '</div>' +
          (isPending ? '<div style="font-family:var(--font-mono,monospace);font-size:10px;color:var(--amber,#EF9F27)">Invitation pending</div>' : '') +
        '</div>' +
        '<select class="nvsd-role-sel ntd-select" data-pid="' + _esc(p.id) + '" style="font-size:11px;padding:2px 4px;width:74px">' + roleOpts + '</select>' +
        '<button class="nvsd-remove" data-pid="' + _esc(p.id) + '" style="background:none;border:none;color:rgba(226,75,74,.5);cursor:pointer;font-size:13px;padding:0 3px;line-height:1" title="Remove">\u2715</button>' +
      '</div>';
    }

    function matrixHtml() {
      if (!others.length || !slots.length) return '';
      var hdr = '<div class="nvsd-matrix-row" style="padding-bottom:3px;border-bottom:1px solid rgba(0,210,255,.08)">' +
        '<div style="width:130px;flex-shrink:0"></div>';
      slots.forEach(function(sl) {
        hdr += '<div class="nvsd-matrix-cell-hdr" title="' + _esc(sl.slotKey) + '">' + _esc(sl.label) + '</div>';
      });
      hdr += '</div>';
      var body = '';
      others.forEach(function(p) {
        const overrides   = Array.isArray(p.tile_edit_overrides) ? p.tile_edit_overrides : [];
        const myOverride  = overrides.find(function(o) { return o.user_id === p.user_id; });
        const editSlots   = new Set(myOverride ? (myOverride.slot_keys||[]) : []);
        const isEditor    = p.view_role === 'editor';
        body += '<div class="nvsd-matrix-row" data-matrixpid="' + _esc(p.id) + '">' +
          '<div style="width:130px;flex-shrink:0;font-family:var(--font-ui,\'Barlow Condensed\',sans-serif);font-size:12px;color:var(--text1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + _esc(p.name||'Unknown') + '</div>';
        slots.forEach(function(sl) {
          const checked  = isEditor || editSlots.has(sl.slotKey);
          const disabled = isEditor;
          body += '<div class="nvsd-matrix-cell"><input type="checkbox" class="nvsd-slot-chk" data-pid="' + _esc(p.id) + '" data-uid="' + _esc(p.user_id||'') + '" data-slot="' + _esc(sl.slotKey) + '"' + (checked?' checked':'') + (disabled?' disabled title="Editor has full access"':'') + '/></div>';
        });

    // Destroy and recreate overlay each render to avoid accumulated event listeners
