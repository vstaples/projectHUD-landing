    const today = new Date().toISOString().slice(0,10);
    if (!fetchUid && !rid) return { items:[], today };

    const api = _resolveApi();

    // ── 2. Use _wiItems cache only when targeting self (logged-in user)
    const myRid  = window._notesResource && window._notesResource.id;
    const isSelf = rid === myRid;
    if (isSelf && window._wiItems && window._wiItems.length) {
      const cached = window._wiItems.filter(function(w){ return w.type === 'task'; });
      if (cached.length) return { items: cached, today, source: 'cache' };
    }

    if (!fetchUid) return { items:[], today };

    // ── 3. Fetch tasks
    const taskQuery = 'tasks?select=id,name,project_id,status,due_date,pct_complete,budget_hours,effort_days' +
      '&assigned_to=eq.'+fetchUid+'&status=neq.complete&order=created_at.desc&limit=200';
    const tasks = await api.get(taskQuery).catch(function(err){
    });

    // ── 6. Fetch project names
    const projIds = {};
    (tasks||[]).forEach(function(t){ if(t.project_id) projIds[t.project_id]=true; });
    const pKeys = Object.keys(projIds);
    const projs = pKeys.length
      ? await _api('projects?id=in.('+pKeys.join(',')+')'+'&select=id,name&limit=200')
      : [];
    const pMap = {};
    (projs||[]).forEach(function(p){ pMap[p.id]=p.name; });

    // ── 7. Build items — filter cancelled and 100% complete
    const items = (tasks||[])
      .filter(function(t){ return t.status !== 'cancelled'; })
      .filter(function(t){
        const p = parseFloat(t.pct_complete)||0;
        const n = p<=1&&p>0 ? Math.round(p*100) : Math.round(p);
        return n < 100;
      })
      .map(function(t){
        const p   = parseFloat(t.pct_complete)||0;
        const pct = p<=1&&p>0 ? Math.round(p*100) : Math.round(p);
        const overdue = t.due_date && t.due_date < today;
        return {
          type: 'task', id: t.id, title: t.name,
          project: pMap[t.project_id] || '',
          status: t.status, due: t.due_date, overdue, pct,
          urgency: overdue ? 0 : (t.due_date ? 1 : 2),
        };
      });

    items.sort(function(a,b){
      if (a.urgency !== b.urgency) return a.urgency - b.urgency;
      if (a.due && b.due) return a.due.localeCompare(b.due);
      return 0;
    });

    return { items, today };
  },

  renderFn: function(data, container) {
    if (!data) { container.innerHTML='<div class="widget-error">No data</div>'; return; }
    const items      = data.items || [];
    const today      = data.today;
    const overdueCnt = items.filter(function(t){ return t.overdue; }).length;

    if (!items.length) {
      container.innerHTML=
        '<div class="widget-counter">'+
          '<div class="wc-big" style="color:#1D9E75">&#10003;</div>'+
          '<div class="wc-label">No open tasks</div>'+
        '</div>';
      return;
    }

    // Columns: type badge · title (flex) · progress · due · status
    // Progress is wide so the bar has room; due/status get generous fixed px
    const COLS = '28px minmax(0,1fr) 180px 58px 90px';
    const mono = 'font-family:var(--font-mono,monospace)';

    function fmtDue(due, overdue) {
      if (!due) return '<span style="'+mono+';font-size:11px;color:rgba(255,255,255,.25)">—</span>';
      if (overdue) {
        const d = Math.round((new Date(today) - new Date(due)) / 86400000);
        return '<span style="'+mono+';font-size:11px;font-weight:700;color:#E24B4A">'+d+'d</span>';
      }
      return due === today
        ? '<span style="'+mono+';font-size:11px;color:#EF9F27">Today</span>'
        : '<span style="'+mono+';font-size:11px;color:rgba(255,255,255,.4)">'+
            new Date(due+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'})+'</span>';
    }

    function fmtProgress(t) {
      if (t.pct <= 0) return '<span style="'+mono+';font-size:11px;color:rgba(255,255,255,.25)">—</span>';
      const fc = t.pct>=80?'#1D9E75':t.pct>=40?'#00D2FF':'rgba(255,255,255,.35)';
      return '<div style="display:flex;flex-direction:column;gap:3px;padding-right:12px;min-width:0">'+
        '<div style="'+mono+';font-size:10px;color:'+fc+'">'+t.pct+'%</div>'+
        '<div style="height:3px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden">'+
          '<div style="height:100%;width:'+Math.min(t.pct,100)+'%;background:'+fc+';border-radius:2px"></div>'+
        '</div>'+
      '</div>';
    }

    function fmtStatus(t) {
      if (t.status==='blocked')
        return '<div style="'+mono+';font-size:10px;font-weight:600;color:#E24B4A;border:1px solid rgba(226,75,74,.4);padding:2px 8px;text-align:center;white-space:nowrap">BLOCKED</div>';
      if (t.status==='in_progress')
        return '<div style="'+mono+';font-size:10px;font-weight:600;color:#EF9F27;border:1px solid rgba(239,159,39,.4);padding:2px 8px;text-align:center;white-space:nowrap">In Progress</div>';
      return '<div style="'+mono+';font-size:10px;font-weight:600;color:rgba(0,210,255,.8);border:1px solid rgba(0,210,255,.3);padding:2px 8px;text-align:center;white-space:nowrap">Start</div>';
    }

    const headerHtml =
      '<div style="display:grid;grid-template-columns:'+COLS+';align-items:center;'+
          'padding:4px 10px 4px 8px;border-bottom:1px solid rgba(255,255,255,.08);flex-shrink:0">'+
        '<div></div>'+
        '<div style="'+mono+';font-size:9px;color:var(--text3);letter-spacing:.08em;text-transform:uppercase">Task / Action</div>'+
        '<div style="'+mono+';font-size:9px;color:var(--text3);letter-spacing:.08em;text-transform:uppercase">Progress</div>'+
        '<div style="'+mono+';font-size:9px;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;text-align:right;padding-right:4px">Due</div>'+
        '<div style="'+mono+';font-size:9px;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;text-align:center">Status</div>'+
      '</div>';

    const rowsHtml = items.map(function(t){
      const leftBorder = t.overdue ? 'border-left:2px solid #E24B4A;' : '';
      return '<div style="display:grid;grid-template-columns:'+COLS+';align-items:center;'+
          'padding:5px 10px 5px 8px;border-bottom:1px solid rgba(255,255,255,.05);'+leftBorder+'">'+
        '<div style="display:flex;align-items:center">'+
          '<div style="width:14px;height:14px;border-radius:50%;border:1px solid rgba(0,210,255,.4);flex-shrink:0"></div>'+
        '</div>'+
        '<div style="min-width:0;padding-right:8px">'+
          '<div style="font-size:12px;font-weight:500;color:var(--text0);white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="'+_esc(t.title)+'">'+_esc(t.title)+'</div>'+
          (t.project
            ? '<div style="'+mono+';font-size:10px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+_esc(t.project)+(t.due?' · Due '+new Date(t.due+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'}):'')+'</div>'
            : (t.due ? '<div style="'+mono+';font-size:10px;color:var(--text3)">Due '+new Date(t.due+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'})+'</div>' : '')
          )+
        '</div>'+
        '<div>'+fmtProgress(t)+'</div>'+
        '<div style="text-align:right;padding-right:4px">'+fmtDue(t.due, t.overdue)+'</div>'+
        '<div style="display:flex;justify-content:center">'+fmtStatus(t)+'</div>'+
      '</div>';
    }).join('');

    const summaryColor = overdueCnt>0 ? '#E24B4A' : 'rgba(255,255,255,.25)';
    const summaryText  = items.length+' open'+(overdueCnt>0?' · '+overdueCnt+' overdue':'');

    container.innerHTML =
      '<div style="display:flex;flex-direction:column;height:100%;box-sizing:border-box;overflow:hidden">'+
        headerHtml+
        '<div style="flex:1;overflow-y:auto">'+rowsHtml+'</div>'+
        '<div style="'+mono+';font-size:9px;color:'+summaryColor+';padding:3px 10px;flex-shrink:0;'+
            'border-top:1px solid rgba(255,255,255,.05);text-align:right">'+summaryText+'</div>'+
      '</div>';
  }
});


// ── 9. ACTION ITEM LIST ───────────────────────────────────────────────────
// Cloned from task_list's proven dataFn pattern.
// Key differences vs task_list:
//   • Cache source: window._wiItems filtered to type==='action' (not type==='task')
//   • Fetch: workflow_action_items by owner_resource_id (not tasks by assigned_to/user_id)
//   • No pct_complete — progress column replaced by "From" (created_by_name)
window.WIDGET_REGISTRY.register({
  id:              'action_item_list',
  label:           'Action item list',
  category:        'personal',
  description:     'Open action items with due dates',
  icon:            'list',
  configSchema: [
    { key:'targetResourceId', label:'Person', type:'resource_picker', default:'', required:false,
      templatePlaceholder:'Select person when launching' },
  ],
  refreshInterval: 60000,
  minTileHeight:   'small',

  dataFn: async function(config) {
    const W = '[W2:action_item_list]';

    // ── 1. Resolve target person via shared _resolveTarget (handles clone/shared-view/self)
    const { rid, uid } = _resolveTarget(config);
    const today = new Date().toISOString().slice(0,10);
    if (!rid) return { items:[], today };

    const api = _resolveApi();

    // ── 2. Use caches only when targeting self (logged-in user)
    const myRid  = window._notesResource && window._notesResource.id;
    const isSelf = rid === myRid;
    if (isSelf && window._wiItems && window._wiItems.length) {
      const cached = window._wiItems.filter(function(w){ return w.type === 'action'; });
      if (cached.length) {
        const items = cached.map(function(a){
          return { id:a.id, title:a.title, due:a.due, overdue:a.overdue,
            createdBy: a.createdBy || null };
        });
        return { items, today, source:'cache' };
      }
    }
    if (isSelf && window.myActionItems && window.myActionItems.length) {
      const cached = window.myActionItems.filter(function(a){ return a.status === 'open'; });
      const items = cached.map(function(a){
        return { id:a.id, title:a.title, due:a.due_date,
          overdue: a.due_date && a.due_date < today,
          createdBy: a.created_by_name || null };
      });
      return { items, today, source:'myActionItems-cache' };
    }

    // ── 3. Fetch fresh directly from DB
    const targetRid = rid;

    const aiQuery = 'workflow_action_items?select=id,title,due_date,owner_resource_id,created_by_name' +
      '&owner_resource_id=eq.'+targetRid+'&status=eq.open&order=due_date.asc.nullslast&limit=100';
    const rows = await api.get(aiQuery).catch(function(err){
    });

    const items = (rows||[]).map(function(a){
      return { id:a.id, title:a.title, due:a.due_date,
        overdue: a.due_date && a.due_date < today,
        createdBy: a.created_by_name || null };
    });
    items.sort(function(a,b){
      const ua = a.overdue?0:(a.due?1:2), ub = b.overdue?0:(b.due?1:2);
      if (ua!==ub) return ua-ub;
      if (a.due&&b.due) return a.due.localeCompare(b.due);
      return 0;
    });
    return { items, today };
  },

  renderFn: function(data, container) {
    if (!data) { container.innerHTML='<div class="widget-error">No data</div>'; return; }
    const items      = data.items || [];
    const today      = data.today;
    const overdueCnt = items.filter(function(i){ return i.overdue; }).length;

    if (!items.length) {
      container.innerHTML=
        '<div class="widget-counter">'+
          '<div class="wc-big" style="color:#1D9E75">&#10003;</div>'+
          '<div class="wc-label">No open action items</div>'+
        '</div>';
      return;
    }

    // Columns: type badge · title (flex) · due · status — mirrors task_list layout
    const COLS = '28px minmax(0,1fr) 58px 90px';
    const mono = 'font-family:var(--font-mono,monospace)';

    function fmtDue(due, overdue) {
      if (!due) return '<span style="'+mono+';font-size:11px;color:rgba(255,255,255,.25)">—</span>';
      if (overdue) {
        const d = Math.round((new Date(today) - new Date(due)) / 86400000);
        return '<span style="'+mono+';font-size:11px;font-weight:700;color:#E24B4A">'+d+'d</span>';
      }
      return due === today
        ? '<span style="'+mono+';font-size:11px;color:#EF9F27">Today</span>'
        : '<span style="'+mono+';font-size:11px;color:rgba(255,255,255,.4)">'+
            new Date(due+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'})+'</span>';
    }

    // Action items carry status: 'open' always (we filter to open), but surface it
    // the same way task_list surfaces Start/In Progress/Blocked
    function fmtStatus(item) {
      if (item.overdue)
        return '<div style="'+mono+';font-size:10px;font-weight:600;color:#E24B4A;border:1px solid rgba(226,75,74,.4);padding:2px 8px;text-align:center;white-space:nowrap">Overdue</div>';
      return '<div style="'+mono+';font-size:10px;font-weight:600;color:rgba(0,210,255,.8);border:1px solid rgba(0,210,255,.3);padding:2px 8px;text-align:center;white-space:nowrap">Open</div>';
    }

    const headerHtml =
      '<div style="display:grid;grid-template-columns:'+COLS+';align-items:center;'+
          'padding:4px 10px 4px 8px;border-bottom:1px solid rgba(255,255,255,.08);flex-shrink:0">'+
        '<div></div>'+
        '<div style="'+mono+';font-size:9px;color:var(--text3);letter-spacing:.08em;text-transform:uppercase">Action Item</div>'+
        '<div style="'+mono+';font-size:9px;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;text-align:right;padding-right:4px">Due</div>'+
        '<div style="'+mono+';font-size:9px;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;text-align:center">Status</div>'+
      '</div>';

    const rowsHtml = items.map(function(item){
      const leftBorder = item.overdue ? 'border-left:2px solid #E24B4A;' : '';
      return '<div style="display:grid;grid-template-columns:'+COLS+';align-items:center;'+
          'padding:5px 10px 5px 8px;border-bottom:1px solid rgba(255,255,255,.05);'+leftBorder+'">'+
        '<div style="display:flex;align-items:center">'+
          '<div style="width:14px;height:14px;border-radius:50%;border:1px solid rgba(74,158,255,.4);flex-shrink:0"></div>'+
        '</div>'+
        '<div style="min-width:0;padding-right:8px">'+
          '<div style="font-size:12px;font-weight:500;color:var(--text0);white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="'+_esc(item.title)+'">'+_esc(item.title)+'</div>'+
          (item.due ? '<div style="'+mono+';font-size:10px;color:var(--text3)">Due '+new Date(item.due+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'})+'</div>' : '')+
        '</div>'+
        '<div style="text-align:right;padding-right:4px">'+fmtDue(item.due, item.overdue)+'</div>'+
        '<div style="display:flex;justify-content:center">'+fmtStatus(item)+'</div>'+
      '</div>';
    }).join('');

    const summaryColor = overdueCnt>0 ? '#E24B4A' : 'rgba(255,255,255,.25)';
    const summaryText  = items.length+' open'+(overdueCnt>0?' · '+overdueCnt+' overdue':'');

    container.innerHTML =
      '<div style="display:flex;flex-direction:column;height:100%;box-sizing:border-box;overflow:hidden">'+
        headerHtml+
        '<div style="flex:1;overflow-y:auto">'+rowsHtml+'</div>'+
        '<div style="'+mono+';font-size:9px;color:'+summaryColor+';padding:3px 10px;flex-shrink:0;'+
            'border-top:1px solid rgba(255,255,255,.05);text-align:right">'+summaryText+'</div>'+
      '</div>';
  }
});

setTimeout(function() {
  if (typeof window._viewsPostWire === 'function') {
    
    window._viewsPostWire();
  }
}, 50);
setTimeout(function() {
  if (typeof window._viewsPostWire === 'function') {
    
    window._viewsPostWire();
  }
}, 200);

})();
</script>
