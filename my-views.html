// ── Branch management ────────────────────────────────────────────────────






// ── Drag and drop ─────────────────────────────────────────────────────────
let _dragNoteId  = null;  // noteId being dragged
let _dragSlot    = null;  // slot index if dragging from grid
let _dragRowId   = null;  // row id if dragging from grid

function _notesDndInit() {
  const shell = document.getElementById('views-shell');
  if (!shell || shell._dndWired) return;
  shell._dndWired = true;

  // ── Left panel: manual mouse tracking (bypasses overflow:auto dragover bug) ──
  let _leftDragActive = false;
  let _leftDragGhost  = null;

  function _getItemAt(x, y) {
    const els = document.elementsFromPoint(x, y);
    for (const el of els) {
      const item = el.closest('.views-item[data-viewid]');
      if (item) return item;
    }
    return null;
  }

  let _mouseIsDown  = false;
  let _mouseDownPos = null;

  let _html5DragActive = false; // set true when HTML5 dragstart fires

  document.addEventListener('mousedown', e => {
    const item = e.target?.closest?.('#views-left .views-item[data-viewid]');
    if (!item) return;
    _html5DragActive = false; // reset — will be set true if dragstart fires
    _dragNoteId   = item.dataset.noteid;
    _dragSlot     = null;
    _mouseIsDown  = true;
    _mouseDownPos = { x: e.clientX, y: e.clientY };
  });

  // Track insert position: {noteId, position: 'before'|'after'}
  let _dropInsert = null;

  document.addEventListener('mousemove', e => {
    if (!_dragNoteId || !_mouseIsDown || _html5DragActive) return;
    // Require 5px movement before activating drag
    if (!_leftDragActive && _mouseDownPos) {
      const dx = Math.abs(e.clientX - _mouseDownPos.x);
      const dy = Math.abs(e.clientY - _mouseDownPos.y);
      if (dx < 5 && dy < 5) return;
    }
    // Only activate left-panel drag if cursor is still within #views-left
    const leftPanel = document.getElementById('views-left');
    const leftRect  = leftPanel ? leftPanel.getBoundingClientRect() : null;
    if (leftRect && (e.clientX > leftRect.right + 20)) return;
    if (!_leftDragActive) {
      _leftDragActive = true;
      document.getElementById('views-left').style.userSelect = 'none';
      const srcItem = document.querySelector('#views-left .views-item[data-viewid="' + _dragNoteId + '"]');
      if (srcItem) srcItem.style.opacity = '0.4';
      _leftDragGhost = document.createElement('div');
      _leftDragGhost.style.cssText = 'position:fixed;pointer-events:none;z-index:9999;' +
        'background:rgba(6,10,16,.95);border:1px solid rgba(0,210,255,.5);' +
        'padding:3px 10px;font-family:var(--font-mono);' +
        'font-size:12px;color:#00D2FF;border-radius:2px;white-space:nowrap;' +
        'box-shadow:0 4px 16px rgba(0,0,0,.7)';
      const note = _notes.find(n => n.id === _dragNoteId);
      _leftDragGhost.textContent = note?.title || 'Note';
      document.body.appendChild(_leftDragGhost);
    }
    if (_leftDragGhost) {
      _leftDragGhost.style.left = (e.clientX + 14) + 'px';
      _leftDragGhost.style.top  = (e.clientY - 8) + 'px';
    }
    // Clear all drop indicators
    shell.querySelectorAll('.views-drop-before,.views-drop-after').forEach(el => {
      el.classList.remove('views-drop-before','views-drop-after');
    });
    _dropInsert = null;

    // Find item under cursor
    if (_leftDragGhost) _leftDragGhost.style.visibility = 'hidden';
    const target = _getItemAt(e.clientX, e.clientY);
    if (_leftDragGhost) _leftDragGhost.style.visibility = '';

    if (target && target.dataset.noteid !== _dragNoteId &&
        target.closest('#views-left')) {
      const rect = target.getBoundingClientRect();
      const midY = rect.top + rect.height / 2;
      const pos  = e.clientY < midY ? 'before' : 'after';
      target.classList.add(pos === 'before' ? 'views-drop-before' : 'views-drop-after');
      _dropInsert = { noteId: target.dataset.noteid, position: pos };
    }
  });

  document.addEventListener('mouseup', async e => {
    _mouseIsDown = false;
    if (_html5DragActive) return; // HTML5 drag handles its own cleanup
    if (!_dragNoteId || !_leftDragActive) {
      _dragNoteId = null;
      return;
    }
    if (_leftDragGhost) { _leftDragGhost.remove(); _leftDragGhost = null; }
    const srcItem = document.querySelector('#views-left .views-item[data-viewid="' + _dragNoteId + '"]');
    if (srcItem) srcItem.style.opacity = '';
    shell.querySelectorAll('.views-drop-before,.views-drop-after').forEach(el => {
      el.classList.remove('views-drop-before','views-drop-after');
    });

    const savedDragId  = _dragNoteId;
    const savedInsert  = _dropInsert;
    _dragNoteId        = null;
    _leftDragActive    = false;
    _dropInsert        = null;

    if (!savedInsert) return;

    const targetNote = _notes.find(n => n.id === savedInsert.noteId);
    const dragNote   = _notes.find(n => n.id === savedDragId);
    if (!targetNote || !dragNote) return;

    // Move to same branch as target
    const newPath = targetNote.hierarchy_path || 'Inbox';
    const isInbox = !newPath || newPath === 'Inbox';
    dragNote.hierarchy_path = newPath;
    dragNote.is_inbox       = isInbox;

    // Recalculate sort_order for all notes in this branch
    const branchNotes = _notes
      .filter(n => n.hierarchy_path === newPath && n.id !== savedDragId)
      .sort((a,b) => (a.sort_order||0) - (b.sort_order||0));

    const targetIdx = branchNotes.findIndex(n => n.id === savedInsert.noteId);
    const insertAt  = savedInsert.position === 'before' ? targetIdx : targetIdx + 1;
    branchNotes.splice(insertAt, 0, dragNote);

    // Assign new sort_order values (10, 20, 30... leaves room for future inserts)
    const patches = branchNotes.map((n, i) => {
      n.sort_order = (i + 1) * 10;
      return API.patch('notes?id=eq.' + n.id, {
        hierarchy_path: newPath,
        is_inbox:       isInbox,
        sort_order:     n.sort_order,
        updated_at:     new Date().toISOString(),
      });
    });

    try {
      await Promise.all(patches);
      _notesRenderLeft();
    } catch(err) { console.error('Tree reorder error:', err); }
  });

  // ── Grid: standard HTML5 drag (no overflow:auto issue there) ─────────────
  shell.addEventListener('dragstart', e => {
    // Block tile/chip rearrangement when view is locked
    if (_cv().locked && e.target.closest?.('.views-tile[data-noteid]')) {
      e.preventDefault(); return;
    }
    const tile = e.target.closest?.('.views-tile[data-noteid]');
    const chip = e.target.closest?.('.views-tray-chip[data-viewid]');
    const item = e.target.closest?.('.views-item[data-viewid]');
    if (tile && !e.target.closest?.('.views-tile-title[contenteditable]')) {
      _dragNoteId  = tile.dataset.noteid;
        _dragRowId   = tile.dataset.rowid || null;
      _dragSlot    = tile.dataset.slot !== undefined ? parseInt(tile.dataset.slot) : null;
      tile.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', _dragNoteId);
      e.dataTransfer.setData('application/noteid', _dragNoteId);
    } else if (chip) {
      _dragNoteId = chip.dataset.noteid;
      _dragSlot   = null;
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', _dragNoteId);
    } else if (item) {
      _dragNoteId      = item.dataset.noteid;
      _dragSlot        = null;
      _html5DragActive = true;  // signal mouse-event system to stay out
      _leftDragActive  = false; // ensure left drag doesn't block grid drop
      item.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
      // Store in dataTransfer so drop handler can read it even if _dragNoteId is cleared
      e.dataTransfer.setData('text/plain', _dragNoteId);
      e.dataTransfer.setData('application/noteid', _dragNoteId);
      const ghost = document.createElement('div');
      ghost.textContent = item.querySelector('.views-item-title')?.textContent || 'Note';
      ghost.style.cssText = 'position:fixed;top:-999px;left:-999px;background:#0d1e35;border:1px solid rgba(0,210,255,.35);color:#00D2FF;font-family:var(--font-mono);font-size:13px;font-weight:600;padding:4px 12px;pointer-events:none;white-space:nowrap;';
      document.body.appendChild(ghost);
      e.dataTransfer.setDragImage(ghost, 0, 0);
      setTimeout(() => ghost.remove(), 0);
    } else if (!e.target.closest?.('#views-left')) {
      e.preventDefault();
    }
  });

  shell.addEventListener('dragend', e => {
    shell.querySelectorAll('.dragging').forEach(el => el.classList.remove('dragging'));
    shell.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
    _html5DragActive = false;
    if (!_leftDragActive) { _dragNoteId = null; _dragSlot = null; _dragRowId = null; }
  });

  // Use document-level dragover to bypass Chrome overflow:auto dragover suppression
  document.addEventListener('dragover', e => {
    if (!_dragNoteId || _leftDragActive) return;
    const tile     = e.target?.closest?.('.views-tile');
    const gridArea = e.target?.closest?.('#views-grid-area');
    if (gridArea && !e.target?.closest?.('#views-left')) {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      if (tile) {
        shell.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
        tile.classList.add('drag-over');
      }
    }
  });

  document.addEventListener('dragleave', e => {
    const tile = e.target?.closest?.('.views-tile');
    if (tile) tile.classList.remove('drag-over');
  });

  document.addEventListener('drop', async e => {
    e.preventDefault();
    // Recover noteId from dataTransfer in case _dragNoteId was cleared by mouseup
    const transferredId = e.dataTransfer.getData('application/noteid') || e.dataTransfer.getData('text/plain');
    if (!_dragNoteId && transferredId) _dragNoteId = transferredId;
    if (!_dragNoteId || _leftDragActive) return;
    // Block grid rearrangement when view is locked
    if (_cv().locked && e.target?.closest?.('#views-grid-area')) {
      _dragNoteId = null; _dragSlot = null; _dragRowId = null;
      shell.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
      return;
    }
    // Must be dropping into the grid area (not left panel)
    if (!e.target?.closest?.('#views-grid-area') || e.target?.closest?.('#views-left')) {
 return; }
    let dropTile = e.target?.closest?.('.views-tile');

    // If dropped on grid area background (not a tile), use _notesOpenNote to find first empty slot
    if (!dropTile) {
      const draggedNote2 = _notes.find(n => n.id === _dragNoteId);
      const eid = (draggedNote2?.is_inbox && draggedNote2?.entity_id) ? draggedNote2.entity_id : _dragNoteId;
      if (eid !== _dragNoteId && !_notes.find(n => n.id === eid)) {
        try { const r = await API.get('notes?id=eq.' + eid + '&limit=1').catch(()=>[]); if (r?.[0]) _notes.push(r[0]); } catch(ex) {}
      }
      _cv().tray  = _cv().tray.filter(id => id !== eid && id !== _dragNoteId);
      // Remove any orphaned tile entry so _notesOpenNote places it fresh
      _cv().tiles = _cv().tiles.filter(function(t) { return t.noteId !== eid && t.noteId !== _dragNoteId; });
      _notesOpenNote(eid);
      _viewsSaveWorkspace(true); _notesRenderLeft();
      _dragNoteId = null; _dragSlot = null; _dragRowId = null;
      return;
    }

    const targetRowId  = dropTile.dataset.rowid || null;
    const targetSlot   = dropTile.dataset.slot !== undefined ? parseInt(dropTile.dataset.slot) : 0;
    const targetNoteId = dropTile.dataset.noteid || null;
    const cv           = _cv();

    // If dragging an inbox invitation, use the shared note ID instead
    const draggedNote = _notes.find(n => n.id === _dragNoteId);
    const effectiveNoteId = (draggedNote?.is_inbox && draggedNote?.entity_id)
      ? draggedNote.entity_id : _dragNoteId;

    // Fetch shared note if not in local cache
    if (effectiveNoteId !== _dragNoteId && !_notes.find(n => n.id === effectiveNoteId)) {
      try {
        const fetched = await API.get('notes?id=eq.' + effectiveNoteId + '&limit=1').catch(()=>[]);
        if (fetched?.[0]) _notes.push(fetched[0]);
      } catch(ex) {}
    }

    if (dropTile.classList.contains('empty')) {
      // Move to empty slot
      cv.tray = cv.tray.filter(id => id !== effectiveNoteId && id !== _dragNoteId);
      const existing = cv.tiles.find(t => t.noteId === effectiveNoteId);
      if (existing) {
        existing.row  = targetRowId;
        existing.slot = targetSlot;
      } else {
        cv.tiles.push({ row: targetRowId, slot: targetSlot, noteId: effectiveNoteId, chatOpen: false });
      }
    } else if (targetNoteId && targetNoteId !== effectiveNoteId) {
      // Swap or displace
      const dragTile   = cv.tiles.find(t => t.noteId === effectiveNoteId);
      const targetTile = cv.tiles.find(t => t.noteId === targetNoteId);
      if (dragTile && targetTile) {
        // Swap {row, slot}
        const fromRow  = dragTile.row;
        const fromSlot = dragTile.slot;
        dragTile.row   = targetTile.row;
        dragTile.slot  = targetTile.slot;
        targetTile.row  = fromRow;
        targetTile.slot = fromSlot;
      } else {
        // Displace target to tray, place dragged in target position
        cv.tray = cv.tray.filter(id => id !== effectiveNoteId && id !== _dragNoteId);
        cv.tiles = cv.tiles.filter(t => t.noteId !== targetNoteId);
        if (!cv.tray.includes(targetNoteId)) cv.tray.push(targetNoteId);
        cv.tiles.push({ row: targetRowId, slot: targetSlot, noteId: effectiveNoteId, chatOpen: false });
      }
    }
    _viewsSaveWorkspace(true);
    _notesRenderGrid();
    _notesRenderLeft();
  });
}

// ── Resizable splitter ───────────────────────────────────────────────────
(function() {
  let dragging = false;
  let startX   = 0;
  let startW   = 260;

  function initSplitter() {
    const splitter = document.getElementById('views-splitter');
    const shell    = document.getElementById('views-shell');
    if (!splitter || !shell) return;

    splitter.addEventListener('mousedown', e => {
      dragging = true;
      startX   = e.clientX;
      startW   = shell.getBoundingClientRect().left
        ? parseInt(getComputedStyle(shell).getPropertyValue('--notes-left-w')) || 260
        : 260;
      // Read actual current left panel width
      const leftEl = document.getElementById('views-left');
      if (leftEl) startW = leftEl.getBoundingClientRect().width;
      splitter.classList.add('dragging');
      document.body.style.cursor    = 'col-resize';
      document.body.style.userSelect = 'none';
      e.preventDefault();
    });

    document.addEventListener('mousemove', e => {
      if (!dragging) return;
      const delta  = e.clientX - startX;
      const newW   = Math.max(180, Math.min(520, startW + delta));
      shell.style.setProperty('--notes-left-w', newW + 'px');
    });

    document.addEventListener('mouseup', () => {
      if (!dragging) return;
      dragging = false;
      const splitter = document.getElementById('views-splitter');
      if (splitter) splitter.classList.remove('dragging');
      document.body.style.cursor     = '';
      document.body.style.userSelect = '';
      // Save width to workspace
      const shell = document.getElementById('views-shell');
      if (shell && _workspace) {
        const w = parseInt(shell.style.getPropertyValue('--notes-left-w')) || 260;
        _cv().leftPanelWidth = w;
        _viewsSaveWorkspace();
      }
    });
  }

  // Init after DOM is ready — called after module loads
  window._notesSplitterInit = initSplitter;
})();

// ── Minimize tile ─────────────────────────────────────────────────────────
function _notesMinimizeTile(noteId) {
  const tile = _workspace.views[_workspace.activeView]?.tiles?.find(t => t.noteId === noteId);
  if (!tile) return;
  tile.minimized = !tile.minimized;

  // Toggle body visibility
  const body   = document.getElementById('views-tbody-' + noteId);
  const tileEl = body?.closest('.views-tile');
  const btn    = document.getElementById('views-min-btn-' + noteId);

  if (body)   body.style.display   = tile.minimized ? 'none' : '';
  if (tileEl) tileEl.classList.toggle('minimized', tile.minimized);
  if (btn)    btn.title = tile.minimized ? 'Restore tile' : 'Minimize tile';
  if (btn)    btn.textContent = tile.minimized ? '▢' : '—';

  _viewsSaveWorkspace(true);
}

// ── Maximize tile ─────────────────────────────────────────────────────────
let _maximizedNoteId = null;

function _notesMaximizeTile(noteId) {
  const isMaximized = _maximizedNoteId === noteId;

  // Restore any currently maximized tile first
  if (_maximizedNoteId) {
    const prevEl = document.querySelector('.views-tile.maximized');
    if (prevEl) prevEl.classList.remove('maximized');
    const prevBtn = document.getElementById('views-max-btn-' + _maximizedNoteId);
    if (prevBtn) { prevBtn.textContent = '◻'; prevBtn.title = 'Maximize'; prevBtn.style.opacity = '.6'; }
    _maximizedNoteId = null;
  }

  if (!isMaximized) {
    // Maximize this tile
    const tileEl = document.querySelector('.views-tile[data-noteid="' + noteId + '"]');
    if (!tileEl) return;
    // Restore if minimized first
    if (tileEl.classList.contains('minimized')) _notesMinimizeTile(noteId);
    tileEl.classList.add('maximized');
    const btn = document.getElementById('views-max-btn-' + noteId);
    if (btn) { btn.textContent = '⧉'; btn.title = 'Restore'; btn.style.opacity = '1'; }
    _maximizedNoteId = noteId;
    // Focus canvas
    setTimeout(() => tileEl.querySelector('.views-tile-canvas')?.focus(), 50);
  }
}

// Close maximize on Escape key
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && _maximizedNoteId) _notesMaximizeTile(_maximizedNoteId);

async function _notesDeleteInboxNote(noteId) {
  const note = _notes.find(n => n.id === noteId);

  // If it's a shared invitation (entity_id set), confirm and notify owner
  if (note?.entity_id && note?.is_inbox) {
    // Check if already accepted (i.e. they've been collaborating)
    const userId = _userId;
    const parts  = userId ? await API.get(
      'note_participants?note_id=eq.' + note.entity_id + '&select=user_id,role&limit=20'
    ).catch(()=>[]) : [];
    let ownerPart = (parts||[]).find(p => p.role === 'owner');

    // Fallback: look up owner from the notes table directly
    if (!ownerPart) {
      try {
        const noteRows = await API.get('notes?id=eq.' + note.entity_id + '&select=owner_user_id&limit=1').catch(()=>[]);
        if (noteRows?.[0]?.owner_user_id) {
          ownerPart = { user_id: noteRows[0].owner_user_id, role: 'owner' };
        }
      } catch(e) {}
    }

    // Show confirmation dialog
    const confirmed = await new Promise(resolve => {
      const overlay = document.createElement('div');
      overlay.className = 'views-invite-dialog-overlay';
      const noteName = note.title || 'this shared note';
      overlay.innerHTML =
        '<div class="views-invite-dialog">' +
          '<div class="nid-header">' +
            '<div class="nid-from">Remove Shared Note</div>' +
            '<div class="nid-title">' + _esc(noteName) + '</div>' +
          '</div>' +
          '<div class="nid-body">' +
            'Removing this note will delete it from your inbox.' +
            (ownerPart ? '<br><br>The note owner will be notified that you have left.' : '') +
          '</div>' +
          '<div class="nid-actions">' +
            '<button class="nid-btn nid-btn-reject" id="nid-cancel-del">Cancel</button>' +
            '<button class="nid-btn nid-btn-accept" style="border-color:rgba(226,75,74,.4);color:#E24B4A;background:rgba(226,75,74,.08)" id="nid-confirm-del">Remove</button>' +
          '</div>' +
        '</div>';
      document.body.appendChild(overlay);
      overlay.querySelector('#nid-cancel-del').onclick  = () => { overlay.remove(); resolve(false); };
      overlay.querySelector('#nid-confirm-del').onclick = () => { overlay.remove(); resolve(true); };
      overlay.addEventListener('mousedown', e => { if (e.target === overlay) { overlay.remove(); resolve(false); }});
    });
    if (!confirmed) return;

    // Stop presence heartbeat for this note
    if (window._notesStopPresence) window._notesStopPresence(note.entity_id);

    // Notify owner
    if (ownerPart?.user_id) {
      const myName    = window._notesResource?.name || 'Someone';
      // Get actual note title from the shared note, not the invitation wrapper
      let noteTitle = note.title?.replace(/^.+? invited you to: /, '') || note.title || 'a shared note';
      try {
        const sharedNoteRows = await API.get('notes?id=eq.' + note.entity_id + '&select=title&limit=1').catch(()=>[]);
        if (sharedNoteRows?.[0]?.title) noteTitle = sharedNoteRows[0].title;
      } catch(e) {}
      try {
        await API.post('notes', {
          firm_id: FIRM_ID, owner_user_id: ownerPart.user_id,
          title:   myName + ' removed themselves from: ' + noteTitle,
          content: myName + ' has left the shared note "' + noteTitle + '".',
          hierarchy_path: 'Inbox', is_inbox: true,
          entity_id: note.entity_id, entity_type: null,
          created_at: new Date().toISOString(), updated_at: new Date().toISOString(),
        });
      } catch(e) {}
      // Remove from note_participants
      try { await API.del('note_participants?note_id=eq.' + note.entity_id + '&user_id=eq.' + userId); } catch(e) {}
    }
  }

  // Delete the inbox note and clean up workspace
  try {
    await API.del('notes?id=eq.' + noteId);
    _notes = _notes.filter(n => n.id !== noteId);
    _cv().tiles = _cv().tiles.filter(t => t.noteId !== noteId);
    _cv().tray  = _cv().tray.filter(id => id !== noteId);
    _viewsSaveWorkspace(true);
    _notesRenderLeft();
    _notesRenderGrid();
  } catch(e) { console.error('[Compass] Delete inbox note error:', e); }
}

// ── Inbox poller — check for new notes every 10s ─────────────────────────
async function _notesInboxPoll() {
  if (!_userId) return;
  try {
    const newNotes = await API.get(
      'notes?owner_user_id=eq.' + _userId +
      '&is_inbox=eq.true&created_at=gt.' + _inboxLastChecked +
      '&order=created_at.desc&limit=10'
    ).catch(() => []);
    if (newNotes?.length) {
      newNotes.forEach(n => {
        if (!_notes.find(x => x.id === n.id)) _notes.unshift(n);
      });
      _inboxLastChecked = new Date().toISOString();
      _notesRenderLeft();
    }
  } catch(e) {}
}

// MY VIEWS persistence fork: Switch to a shared view (called after accept).
// Resolves the dashboard from compass_views by view_id (preferred) or by
// (owner_user_id, view_name) for legacy invites.
window._notesSwitchToSharedView = async function(ownerUserIdOrViewId, viewNameOrNull) {
  if (!ownerUserIdOrViewId) return;
  try {
    let ownerView = null;
    let ownerUserId = null;
    let viewName = viewNameOrNull;
    let viewId = null;

    // Path 1: caller passed a view_id (UUID) directly.
    // Path 2: legacy two-arg call with (ownerUserId, viewName).
    // Distinguish by whether second arg is present + first arg looks like a UUID.
    const looksLikeUUID = /^[0-9a-f-]{36}$/i.test(String(ownerUserIdOrViewId));
    if (looksLikeUUID && !viewNameOrNull) {
      viewId = ownerUserIdOrViewId;
      const rows = await API.get(
        'compass_views?id=eq.' + viewId + '&select=id,owner_user_id,view_name,state&limit=1'
      ).catch(function() { return []; });
      if (rows && rows[0]) {
        ownerView   = rows[0].state || {};
        ownerUserId = rows[0].owner_user_id;
        viewName    = rows[0].view_name;
      }
    } else {
      ownerUserId = ownerUserIdOrViewId;
      const rows = await API.get(
        'compass_views?owner_user_id=eq.' + ownerUserId +
        '&view_name=eq.' + encodeURIComponent(viewName) +
        '&select=id,view_name,state&limit=1'
      ).catch(function() { return []; });
      if (rows && rows[0]) {
        ownerView = rows[0].state || {};
        viewId    = rows[0].id;
      }
    }
    if (!ownerView) return;

    // Fetch notes referenced by this view's tiles so they resolve for the participant
    const tileNoteIds = (ownerView.tiles || [])
      .map(function(t) { return t.noteId; })
      .filter(function(id) { return id && !id.startsWith('ph-') && !id.startsWith('wt-'); });
    if (tileNoteIds.length) {
      try {
        const sharedNotes = await API.get(
          'notes?id=in.(' + tileNoteIds.join(',') + ')&limit=50'
        ).catch(function() { return []; });
        (sharedNotes || []).forEach(function(n) {
          if (!_notes.find(function(x) { return x.id === n.id; })) _notes.push(n);
        });
      } catch(e) { console.warn('[Compass] Could not fetch shared view notes:', e); }
    }

    // Store the shared view config in the local workspace under a special key
    const sharedKey = '__shared__' + ownerUserId + '__' + viewName;
    _workspace.views[sharedKey] = Object.assign({}, ownerView, {
      _isSharedView:   true,
      _sharedOwner:    ownerUserId,
      _sharedViewName: viewName,
      _sharedViewId:   viewId,
    });
    _workspace.activeView = sharedKey;
    if (!_workspace.sharedViews) _workspace.sharedViews = {};
    const _svKey = ownerUserId + '::' + viewName;
    if (!_workspace.sharedViews[_svKey]) _workspace.sharedViews[_svKey] = { ownerUserId: ownerUserId, viewName: viewName, viewId: viewId };
    _workspace.sharedViews[_svKey].wasActive = true;
    _notesRenderGrid();
    _notesRenderLeft();
    _notesRenderViewSwitcher();
  } catch(e) {
    console.warn('[Compass] Switch to shared view error:', e);
  }
};


// ── DIAGNOSTICS ──────────────────────────────────────────────────────────
window._viewsDiag = function() {
  const lines = [];
  const cv = (typeof _cv === 'function') ? _cv() : null;
  const tiles = cv ? cv.tiles : [];
  const widgetTiles = tiles.filter(function(t) { return t.canvasMode === 'widget'; });

  lines.push('=== MY VIEWS DIAGNOSTICS ===');

  lines.push('_workspace.activeView: ' + _workspace.activeView);
  lines.push('_workspace.views keys: ' + Object.keys(_workspace.views || {}).join(', '));

  lines.push('cv widget tiles: ' + widgetTiles.length);
  lines.push('');
  lines.push('window.WIDGET_REGISTRY: ' + (window.WIDGET_REGISTRY ? 'SET' : 'MISSING'));
  lines.push('window._widgetContext: ' + (window._widgetContext ? 'SET' : 'MISSING'));

  lines.push('window._notesResource: ' + JSON.stringify(window._notesResource ? {id: window._notesResource.id, name: window._notesResource.name} : null));
  lines.push('');

  // Check each widget tile
  widgetTiles.forEach(function(t) {
    var tileEl = document.querySelector('.views-tile[data-noteid="' + t.noteId + '"]');
    var canvas = tileEl ? tileEl.querySelector('.tile-canvas') : null;
    lines.push('Widget tile: ' + t.widgetId + ' | noteId: ' + t.noteId);
    lines.push('  tileEl found: ' + !!tileEl);
    lines.push('  canvas found: ' + !!canvas);
    lines.push('  widgetRendered: ' + (canvas ? canvas.dataset.widgetRendered : 'n/a'));
    if (window.WIDGET_REGISTRY) {
      var reg = window.WIDGET_REGISTRY.get(t.widgetId);
      lines.push('  registry entry: ' + (reg ? 'FOUND' : 'MISSING'));
    }
  });

  lines.push('');
  lines.push('DOM .views-tile[data-viewid] count: ' + document.querySelectorAll('.views-tile[data-noteid]').length);
  lines.push('DOM .views-tile[data-noteid] count: ' + document.querySelectorAll('.views-tile[data-noteid]').length);
  lines.push('DOM .tile-canvas count: ' + document.querySelectorAll('.tile-canvas').length);

  // Try a manual render of the first widget tile
  if (widgetTiles.length && window.WIDGET_REGISTRY && window._widgetContext) {
    var t = widgetTiles[0];
    var tileEl = document.querySelector('.views-tile[data-noteid="' + t.noteId + '"]');
    var canvas = tileEl ? tileEl.querySelector('.tile-canvas') : null;
    lines.push('');
    lines.push('Manual render attempt on: ' + t.widgetId);
    if (canvas) {
      try {
        delete canvas.dataset.widgetRendered;
        window.WIDGET_REGISTRY.render(t.widgetId, t.widgetConfig || {}, canvas, window._widgetContext());
        lines.push('  render() called — check tile visually');
      } catch(e) {
        lines.push('  render() threw: ' + e.message);
      }
    } else {
      lines.push('  canvas not found — cannot render');
    }
  }

  var txt = lines.join('\n');
  console.log(txt);

  // Show overlay
  var old = document.getElementById('views-diag-overlay');
  if (old) old.remove();
  var overlay = document.createElement('div');
  overlay.id = 'views-diag-overlay';
  overlay.style.cssText = 'position:fixed;top:60px;right:20px;z-index:99999;background:#0a0f18;border:1px solid #EF9F27;'
    + 'border-radius:4px;padding:14px 16px;font-family:monospace;font-size:11px;color:#C8DFF0;'
    + 'max-width:480px;max-height:70vh;overflow-y:auto;white-space:pre;line-height:1.6;'

    + 'color:#C8DFF0;cursor:pointer;font-size:11px;padding:3px 8px;border-radius:2px';
  closeBtn.onclick = function() { overlay.remove(); };

<script>
// ── Widget System — Phase 1 Infrastructure ────────────────────────────────
(function() {
'use strict';

const FIRM_ID = 'aaaaaaaa-0001-0001-0001-000000000001';

function _esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Widget Registry ───────────────────────────────────────────────────────
const WIDGET_REGISTRY = (function() {
  const _widgets = {};
  return {
    register: function(def) {
      if (!def.id || !def.renderFn || !def.dataFn) {
        console.error('[Widgets] Invalid registration:', def.id); return;
      }
      _widgets[def.id] = def;
      console.log('[Widgets] Registered:', def.id);
    },
    get: function(id) { return _widgets[id] || null; },
    getAll: function() { return Object.values(_widgets); },
    getByCategory: function(cat) { return Object.values(_widgets).filter(function(w) { return w.category === cat; }); },
    categories: function() {
      const cats = [];
      Object.values(_widgets).forEach(function(w) { if (!cats.includes(w.category)) cats.push(w.category); });
      return cats;
    },
    render: async function(widgetId, config, container, context) {
      const widget = _widgets[widgetId];
      if (!widget) { container.innerHTML = '<div class="widget-error">Unknown widget: ' + _esc(widgetId) + '</div>'; return; }
      try {
        const prevHTML = container.innerHTML;
        container.innerHTML = '<div class="widget-loading">Loading\u2026</div>';
        const data = await widget.dataFn(config, context);
        // If dataFn returns null (e.g. missing context), restore previous content and abort
        if (data === null || data === undefined) {
          container.innerHTML = prevHTML;
          return;
        }
        container.innerHTML = '';
        widget.renderFn(data, container, config);
      } catch(err) {
        console.error('[Widgets] Render error:', widgetId, err);
        container.innerHTML = '<div class="widget-error">Failed to load</div>';
      }
    }
  };
})();
// MY VIEWS: sync with shared WIDGET_REGISTRY
// If MY NOTES already created one, copy all our local registrations into it
// so capacity_gauge, task_list etc. (registered above) are visible globally.
if (window.WIDGET_REGISTRY && window.WIDGET_REGISTRY !== WIDGET_REGISTRY) {
  // Adopt shared registry — re-register everything from our local instance
  WIDGET_REGISTRY.getAll().forEach(function(def) {
    if (!window.WIDGET_REGISTRY.get(def.id)) window.WIDGET_REGISTRY.register(def);
  });
} else {
  window.WIDGET_REGISTRY = WIDGET_REGISTRY;
}

// ── Widget context ────────────────────────────────────────────────────────
function _widgetContext() {
  const _res = window._notesResource || {};
  // MY VIEWS: use local _cv() directly — window._notesCv is MY NOTES' accessor
  const cv   = (typeof _cv === 'function') ? _cv() : (window._viewsCv && window._viewsCv());
  const _isShared    = !!(cv && cv._isSharedView);
  const _ownerUserId = (cv && cv._sharedOwner) || null;
  return {
    firmId:      FIRM_ID,
    userId:      _res.user_id || null,
    resourceId:  _res.id     || null,
    resource:    _res,
    api:         (typeof API !== 'undefined' && API) || window._notesAPI || null,
    isSharedView: _isShared,
    ownerUserId:  _ownerUserId,
  };
}
// MY VIEWS: store views-scoped context; only set shared _widgetContext if not already claimed
window._viewsWidgetContext = _widgetContext;
if (!window._widgetContext) window._widgetContext = _widgetContext;

// ── Resource loader + picker — replaces Block 2 collab invite system ─────────
// Fetches all resources for the firm once, caches in window._inviteResources,
// and provides window._notesShowResourcePicker for the widget config form.

var _resLoaded = false;

function _loadResources() {
  if (_resLoaded) return Promise.resolve(window._inviteResources || []);
  _resLoaded = true;
  var api = (typeof API !== 'undefined' && API) || window._notesAPI || null;
  if (!api) return Promise.resolve([]);
  var FIRM = (typeof FIRM_ID !== 'undefined' ? FIRM_ID : null) ||
             (window.FIRM_ID || 'aaaaaaaa-0001-0001-0001-000000000001');
  return api.get('resources?firm_id=eq.' + FIRM + '&select=id,first_name,last_name,user_id,hud_role_id,level,department,is_external,title&order=first_name.asc&limit=200')
    .then(function(rows) {
      var resources = (Array.isArray(rows) ? rows : []).map(function(r) {
        return {
          id:          r.id,
          user_id:     r.user_id,
          name:        ((r.first_name || '') + ' ' + (r.last_name || '')).trim(),
          department:  r.department  || null,
          is_external: r.is_external || false,
          title:       r.title       || null,
        };
      });
      window._inviteResources = resources;
      return resources;
    })
    .catch(function() { return []; });
}

// Kick off resource load immediately when Block 2 runs
_loadResources();

window._notesGetInviteResources = function() { return window._inviteResources || []; };

window._notesShowResourcePicker = function(anchorEl, onSelect, opts) {
  // If person-picker.js is loaded (compass.html shared script), delegate to it.
  // If not yet loaded, fall back to the inline grouped implementation below.
  if (window.PersonPicker) {
    window.PersonPicker.show(anchorEl, onSelect, opts);
    return;
  }
  // ── Inline grouped picker (used when person-picker.js not yet loaded) ────
  var resources = (opts && opts.resources) || window._inviteResources || [];
  var COLORS    = (window.PARTICIPANT_COLORS && window.PARTICIPANT_COLORS.length)
    ? window.PARTICIPANT_COLORS
    : ['#00D2FF','#8B5CF6','#1D9E75','#EF9F27','#E24B4A','#58a6ff'];
  var myResId = window._notesResource && window._notesResource.id;

  function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  function initials(n){ return (n||'').split(' ').map(function(w){return w[0]||'';}).join('').slice(0,2).toUpperCase(); }

  function buildAndShow(list) {
    document.querySelectorAll('.pp-overlay').forEach(function(el){el.remove();});
    var pop = document.createElement('div');
    pop.className = 'pp-overlay';
    pop.style.cssText = 'position:fixed;z-index:9999;background:var(--bg1,#0c1628);' +
      'border:1px solid rgba(0,210,255,.25);box-shadow:0 8px 40px rgba(0,0,0,.65);' +
      'width:280px;max-height:340px;display:flex;flex-direction:column;overflow:hidden;border-radius:4px';

    var search = document.createElement('input');
    search.type='text'; search.placeholder='Search by name or department…'; search.autocomplete='off';
    search.style.cssText='padding:8px 12px;background:var(--bg0,#060a10);border:none;' +
      'border-bottom:1px solid rgba(0,210,255,.12);color:var(--text0,#F0F6FF);' +
      'font-family:var(--font-mono,monospace);font-size:12px;outline:none;flex-shrink:0';
    pop.appendChild(search);

    var listEl = document.createElement('div');
    listEl.style.cssText='overflow-y:auto;flex:1';
    pop.appendChild(listEl);

    function renderRows(filter) {
      var filtered = filter ? list.filter(function(r){
        var low=filter.toLowerCase();
        return r.name.toLowerCase().includes(low)||(r.department||'').toLowerCase().includes(low)||(r.title||'').toLowerCase().includes(low);
      }) : list;

      // Group by department / External
      var groups={};
      filtered.forEach(function(r){
        var g = r.is_external?'External':(r.department||'Other');
        if(!groups[g])groups[g]=[];
        groups[g].push(r);
      });
      var keys = Object.keys(groups).sort(function(a,b){
        if(a==='External')return 1; if(b==='External')return -1; return a.localeCompare(b);
      });

      var html=''; var ci=0;
      keys.forEach(function(g){
        html+='<div style="padding:4px 12px 2px;font-family:var(--font-mono,monospace);font-size:9px;'+
          'color:var(--text3,#6A94B8);letter-spacing:.1em;text-transform:uppercase;'+
          'border-top:1px solid rgba(0,210,255,.07);margin-top:2px">'+esc(g)+'</div>';
        groups[g].forEach(function(r){
          var col=COLORS[ci%COLORS.length]; ci++;
          var ini=initials(r.name);
          var isMe=r.id===myResId;
          html+='<div class="pp-row" data-rid="'+esc(r.id)+'" data-uid="'+esc(r.user_id||'')+'" data-name="'+esc(r.name)+'" '+
            'style="display:flex;align-items:center;gap:8px;padding:6px 12px;cursor:pointer">'+
            '<div style="width:28px;height:28px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;'+
              'justify-content:center;font-size:10px;font-weight:700;font-family:var(--font-mono,monospace);'+
              'background:'+col+'22;color:'+col+';border:1.5px solid '+col+'55">'+ini+'</div>'+
            '<div style="flex:1;min-width:0">'+
              '<div style="font-family:var(--font-mono,monospace);font-size:13px;color:var(--text0,#F0F6FF);'+
                'display:flex;align-items:center;gap:5px">'+esc(r.name)+
                (isMe?'<span style="font-size:9px;color:var(--text3,#6A94B8)">(you)</span>':'')+
              '</div>'+
              (r.title?'<div style="font-family:var(--font-mono,monospace);font-size:10px;color:var(--text3,#6A94B8);'+
                'white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc(r.title)+'</div>':'')+
            '</div></div>';
        });
      });
      if(!html) html='<div style="padding:12px;font-family:var(--font-mono,monospace);font-size:11px;color:var(--text3)">No results</div>';
      listEl.innerHTML=html;
      listEl.querySelectorAll('.pp-row').forEach(function(row){
        row.onmouseenter=function(){this.style.background='rgba(0,210,255,.05)';};
        row.onmouseleave=function(){this.style.background='';};
        row.onclick=function(){
          var res=list.find(function(r){return r.id===this.dataset.rid;}.bind(this));
          pop.remove();
          if(res) onSelect(res);
        };
      });
    }

    search.addEventListener('input', function(){renderRows(this.value);});
    renderRows('');
    document.body.appendChild(pop);
    var rect=anchorEl.getBoundingClientRect();
    var left=Math.min(rect.left, window.innerWidth-290);
    var top=rect.bottom+4;
    if(top+340>window.innerHeight) top=rect.top-344;
    pop.style.left=left+'px'; pop.style.top=top+'px';
    setTimeout(function(){
      document.addEventListener('mousedown',function _c(e){
        if(!pop.contains(e.target)&&e.target!==anchorEl){pop.remove();document.removeEventListener('mousedown',_c);}
      });
    },0);
    search.focus();
  }

  if (resources.length > 0) {
    buildAndShow(resources);
  } else {
    // Fetch if not yet loaded
    var api = (typeof API !== 'undefined' && API) || null;
    var FIRM = (typeof FIRM_ID !== 'undefined' ? FIRM_ID : null) || window.FIRM_ID || 'aaaaaaaa-0001-0001-0001-000000000001';
    if (!api) return;
    api.get('resources?firm_id=eq.'+FIRM+'&select=id,first_name,last_name,user_id,department,is_external,title&order=first_name.asc&limit=200')
      .then(function(rows){
        var list=(Array.isArray(rows)?rows:[]).map(function(r){
          return {id:r.id,user_id:r.user_id,name:((r.first_name||'')+' '+(r.last_name||'')).trim(),
            department:r.department||null,is_external:r.is_external||false,title:r.title||null};
        });
        window._inviteResources=list;
        buildAndShow(list);
      }).catch(function(){});
  }
};

// ── Refresh management ────────────────────────────────────────────────────
function startWidgetRefresh(tileEl, noteId, widgetId, config) {
  stopWidgetRefresh(tileEl);
  const widget = WIDGET_REGISTRY.get(widgetId);
  if (!widget || !widget.refreshInterval) return;
  tileEl._widgetInterval = setInterval(function() {
    const canvas = tileEl.querySelector('.tile-canvas');
    if (!canvas || tileEl.classList.contains('minimized')) return;
    // Re-read config from workspace each tick so forResourceId is always current
    const cv = (typeof _cv === 'function') ? _cv() : null;
    const liveConfig = cv
      ? (function() {
          var t = (cv.tiles || []).find(function(t) { return t.noteId === noteId; });
          return (t && t.widgetConfig) ? t.widgetConfig : config;
        })()
      : config;
    WIDGET_REGISTRY.render(widgetId, liveConfig, canvas, _widgetContext());
  }, widget.refreshInterval);
}

function stopWidgetRefresh(tileEl) {
  if (tileEl && tileEl._widgetInterval) {
    clearInterval(tileEl._widgetInterval);
    delete tileEl._widgetInterval;
  }
}

// ── Canvas mode rendering ─────────────────────────────────────────────────
// forceRefresh=true bypasses the already-rendered guard (used by the periodic interval only)
function renderTileCanvas(tileEl, tileState, note, forceRefresh) {
  const mode = tileState.canvasMode || 'note';
  let canvas = tileEl.querySelector('.tile-canvas');
  if (!canvas) {
    canvas = document.createElement('div');
    canvas.className = 'tile-canvas';
    // Insert before chat panel — MY VIEWS uses views-tbody-* and views-chat-*
    const chat = tileEl.querySelector('[id^="views-chat-"]');
    const body = tileEl.querySelector('[id^="views-tbody-"]');
    const textarea = tileEl.querySelector('.views-tile-canvas');
    if (textarea) textarea.style.display = mode === 'note' ? '' : 'none';
    if (body) body.insertBefore(canvas, chat || null);
    else tileEl.appendChild(canvas); // fallback: append directly to tile
  }

  stopWidgetRefresh(tileEl);

  if (mode === 'widget' && tileState.widgetId) {
    canvas.style.display = '';
    const textarea = tileEl.querySelector('.views-tile-canvas');
    if (textarea) textarea.style.display = 'none';
    // Guard: skip dataFn if widget already rendered and this is just a re-wire call.
    // forceRefresh=true is only set by the periodic startWidgetRefresh interval.
    const alreadyRendered = canvas.dataset.widgetRendered === tileState.widgetId && !forceRefresh;
    if (alreadyRendered) {
      startWidgetRefresh(tileEl, tileState.noteId, tileState.widgetId, tileState.widgetConfig || {});
      return;
    }
    canvas.dataset.widgetRendered = tileState.widgetId;
    WIDGET_REGISTRY.render(tileState.widgetId, tileState.widgetConfig || {}, canvas, _widgetContext());
    startWidgetRefresh(tileEl, tileState.noteId, tileState.widgetId, tileState.widgetConfig || {});
  } else {
    // Note mode — hide canvas div, show textarea
    canvas.style.display = 'none';
    const textarea = tileEl.querySelector('.views-tile-canvas');
    if (textarea) textarea.style.display = '';
  }
}

// ── Mode switcher button (injected into tile header) ──────────────────────
function injectModeSwitcher(tileEl, tileState) {
  const header = tileEl.querySelector('.views-tile-header');
  if (!header) return;

  // Remove any existing mode/gear buttons before re-injecting (handles re-render after config)
  header.querySelectorAll('.tile-header-mode-btn').forEach(function(el) { el.remove(); });

  const mode  = tileState.canvasMode || 'note';
  const label = mode === 'widget' ? (WIDGET_REGISTRY.get(tileState.widgetId)?.label || 'Widget') : 'Note';

  // Insert before maximize button so order is: title | [mode] | [gear] | maximize | close
  const maxBtn = header.querySelector('[id^="views-max-btn-"]');

  const btn = document.createElement('button');
  btn.className   = 'tile-header-mode-btn' + (mode === 'widget' ? ' widget-active' : '');
  btn.title       = mode === 'widget' ? 'Switch mode or reconfigure widget' : 'Switch canvas mode';
  btn.textContent = label;
  btn.addEventListener('click', function(e) {
    e.stopPropagation();
    showModeSwitcher(btn, tileState);
  });
  if (maxBtn) header.insertBefore(btn, maxBtn);
  else header.appendChild(btn);

  // Gear button — always present on widget tiles for easy reconfiguration
  if (mode === 'widget' && tileState.widgetId) {
    const gearBtn = document.createElement('button');
    gearBtn.className       = 'tile-header-mode-btn';
    gearBtn.title           = 'Reconfigure widget';
    gearBtn.textContent     = '⚙';
    gearBtn.dataset.widgetGear = '1';
    gearBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      showWidgetConfig(tileState.widgetId, tileState, tileState.widgetConfig || {});
    });
    if (maxBtn) header.insertBefore(gearBtn, maxBtn);
    else header.appendChild(gearBtn);
  }
}

function showModeSwitcher(btn, tileState) {
  document.querySelectorAll('.widget-mode-pop').forEach(function(el) { el.remove(); });
  const pop = document.createElement('div');
  pop.className = 'widget-mode-pop';
  const mode = tileState.canvasMode || 'note';

  pop.innerHTML =
    '<div class="widget-mode-item' + (mode === 'note' ? ' active' : '') + '" data-mode="note">' +
      '<span style="font-size:13px">✎</span> Note canvas' +
    '</div>' +
    '<div class="widget-mode-item' + (mode === 'widget' ? ' active' : '') + '" data-mode="widget">' +
      '<span style="font-size:13px">▦</span> Add widget' +
    '</div>';

  document.body.appendChild(pop);

  // Position below button
  const r = btn.getBoundingClientRect();
  pop.style.left = r.left + 'px';
  pop.style.top  = (r.bottom + 3) + 'px';

  pop.querySelectorAll('.widget-mode-item').forEach(function(item) {
    item.addEventListener('click', function() {
      pop.remove();
      const newMode = item.dataset.mode;
      if (newMode === 'widget') {
        showWidgetPicker(tileState);
      } else {
        // Switching to Note mode — if this is a placeholder tile (no DB record
        // yet), materialise a real note record now before rendering.
        const isPlaceholder = tileState.isPlaceholder ||
          (tileState.noteId && (tileState.noteId.startsWith('ph-') || tileState.noteId.startsWith('wt-')));
        if (isPlaceholder) {
          (async function() {
            try {
              const res = await API.post('notes', {
                firm_id:        FIRM_ID,
                owner_user_id:  _userId,
                title:          'New note',
                content:        '',
                hierarchy_path: 'Work',
                is_inbox:       false,
                created_at:     new Date().toISOString(),
                updated_at:     new Date().toISOString(),
              });
              const newNote = res?.[0];
              if (!newNote?.id) return;
              _notes.unshift(newNote);
              // Remap tileState to real note ID across ALL views (it may appear in tray too)
              const oldId = tileState.noteId;
              Object.values(_workspace.views || {}).forEach(function(v) {
                (v.tiles || []).forEach(function(t) { if (t.noteId === oldId) t.noteId = newNote.id; });
                v.tray = (v.tray || []).map(function(id) { return id === oldId ? newNote.id : id; });
              });
              tileState.noteId      = newNote.id;
              tileState.isPlaceholder = false;
              tileState.canvasMode  = 'note';
              delete tileState.widgetId;
              delete tileState.widgetConfig;
              window._viewsSaveWorkspace(true);
              window._notesRenderLeft && window._notesRenderLeft();
              window._notesRenderGrid && window._notesRenderGrid();
              setTimeout(function() {
                const titleEl = document.querySelector('[data-viewid="' + newNote.id + '"].views-tile-title');
                if (titleEl) { titleEl.focus(); document.execCommand('selectAll', false, null); }
              }, 50);
            } catch(e) { console.error('[Compass] Failed to materialise note for placeholder tile:', e); }
          })();
        } else {
          tileState.canvasMode = 'note';
          delete tileState.widgetId;
          delete tileState.widgetConfig;
          window._viewsSaveWorkspace(true);
          refreshTileWidget(tileState.noteId);
        }
      }
    });
  });

  setTimeout(function() {
    document.addEventListener('mousedown', function _close(e) {
      if (!pop.contains(e.target)) { pop.remove(); document.removeEventListener('mousedown', _close); }
    });
  }, 0);
}

// ── Widget picker ─────────────────────────────────────────────────────────
function showWidgetPicker(tileState) {
  document.querySelectorAll('.widget-picker-overlay').forEach(function(el) { el.remove(); });

  const overlay = document.createElement('div');
  overlay.className = 'widget-picker-overlay';

  function renderPicker(q) {
    const all  = WIDGET_REGISTRY.getAll();
    const cats = WIDGET_REGISTRY.categories();
    const lower = (q || '').toLowerCase().trim();
    const filtered = lower
      ? all.filter(function(w) { return w.label.toLowerCase().includes(lower) || (w.description||'').toLowerCase().includes(lower); })
      : all;

    const ICONS = { gauge:'⏱', counter:'🔢', sparkline:'📈', bars:'▬', feed:'📋', dial:'◉', heatmap:'▦', strip:'▬', default:'◈' };

    let bodyHtml = '';
    if (!filtered.length) {
      bodyHtml = '<div style="padding:20px;text-align:center;font-family:var(--font-mono,monospace);font-size:11px;color:var(--text3)">No widgets match</div>';
    } else if (lower) {
      bodyHtml = '<div class="widget-card-grid">' +
        filtered.map(function(w) { return widgetCardHTML(w, ICONS); }).join('') +
      '</div>';
    } else {
      cats.forEach(function(cat) {
        const items = filtered.filter(function(w) { return w.category === cat; });
        if (!items.length) return;
        bodyHtml +=
          '<div class="widget-cat-label">' + _esc(cat.charAt(0).toUpperCase() + cat.slice(1)) + '</div>' +
          '<div class="widget-card-grid">' + items.map(function(w) { return widgetCardHTML(w, ICONS); }).join('') + '</div>';
      });
    }

    overlay.innerHTML =
      '<div class="widget-picker-dialog">' +
        '<div class="widget-picker-header">' +
          '<div class="widget-picker-title">Add Widget</div>' +
          '<input class="widget-picker-search" id="wps-search" placeholder="Search widgets\u2026" value="' + _esc(q||'') + '" autocomplete="off"/>' +
          '<button class="widget-picker-close" id="wps-close">\u00d7</button>' +
        '</div>' +
        '<div class="widget-picker-body">' + bodyHtml + '</div>' +
      '</div>';

    overlay.querySelector('#wps-close').onclick = function() { overlay.remove(); };
    overlay.addEventListener('mousedown', function(e) { if (e.target === overlay) overlay.remove(); });

    const searchEl = overlay.querySelector('#wps-search');
    searchEl.addEventListener('input', function() { renderPicker(searchEl.value); });
    searchEl.focus();

    overlay.querySelectorAll('.widget-card').forEach(function(card) {
      card.addEventListener('click', function() {
        const widgetId = card.dataset.widgetId;
        overlay.remove();
        const widget = WIDGET_REGISTRY.get(widgetId);
        if (widget && widget.configSchema && widget.configSchema.length) {
          showWidgetConfig(widgetId, tileState, {});
        } else {
          applyWidget(widgetId, {}, tileState);
        }
      });
    });
  }

  function widgetCardHTML(w, icons) {
    const icon = icons[w.icon] || icons.default;
    return '<div class="widget-card" data-widget-id="' + _esc(w.id) + '">' +
      '<div class="widget-card-icon">' + icon + '</div>' +
      '<div class="widget-card-name">' + _esc(w.label) + '</div>' +
      '<div class="widget-card-desc">' + _esc(w.description || '') + '</div>' +
    '</div>';
  }

  renderPicker('');
  document.body.appendChild(overlay);
}

// ── Widget config form ────────────────────────────────────────────────────
async function showWidgetConfig(widgetId, tileState, existingConfig) {
  const widget = WIDGET_REGISTRY.get(widgetId);
  if (!widget) return;

  // Pre-load projects for any project_picker fields
  let _wcfProjects = [];
  const hasProjectPicker = (widget.configSchema||[]).some(function(f) { return f.type === 'project_picker'; });
  if (hasProjectPicker) {
    try {
      _wcfProjects = window._getProjectsForPicker
        ? await window._getProjectsForPicker()
        : [];
    } catch(e) {}
  }

  // Per-field config values — resource_picker uses resource_id, display separately
  const configValues = {};
  (widget.configSchema||[]).forEach(function(f) {
    configValues[f.key] = existingConfig[f.key] !== undefined ? existingConfig[f.key] : (f.default || '');
  });

  const overlay = document.createElement('div');
  overlay.className = 'widget-config-overlay';

  const fields = (widget.configSchema || []).map(function(field) {
    const val = configValues[field.key];
    let input = '';

    if (field.type === 'select') {
      input = '<select class="ntd-select wcf-input" data-key="' + _esc(field.key) + '">' +
        (field.options||[]).map(function(o) {
          return '<option value="' + _esc(o.value) + '"' + (o.value == val ? ' selected' : '') + '>' + _esc(o.label) + '</option>';
        }).join('') + '</select>';

    } else if (field.type === 'boolean') {
      input = '<input type="checkbox" class="wcf-input" data-key="' + _esc(field.key) + '"' + (val ? ' checked' : '') + ' style="width:auto"/>';

    } else if (field.type === 'project_picker') {
      input = '<select class="ntd-select wcf-input" data-key="' + _esc(field.key) + '" style="width:100%">' +
        '<option value="">— Select project —</option>' +
        _wcfProjects.map(function(p) {
          return '<option value="' + _esc(p.id) + '"' + (p.id === val ? ' selected' : '') + '>' + _esc(p.name) + '</option>';
        }).join('') +
      '</select>';

    } else if (field.type === 'resource_picker') {
      const selfName = window._notesResource ? (window._notesResource.name || 'Me') : 'Me';
      const displayName = val ? '' : selfName; // will be updated when loaded
      input =
        '<div style="display:flex;align-items:center;gap:8px">' +
          '<input type="hidden" class="wcf-input wcf-res-val" data-key="' + _esc(field.key) + '" value="' + _esc(String(val)) + '"/>' +
          '<div class="wcf-res-display" style="font-family:var(--font-mono);font-size:13px;color:var(--text1);flex:1;min-width:0">' + (val ? _esc(val) : _esc(selfName)) + '</div>' +
          '<button class="ntd-btn ntd-btn-cancel wcf-res-pick-btn" type="button" style="padding:4px 10px;font-size:10px;flex-shrink:0">Choose…</button>' +
        '</div>';

    } else {
      input = '<input class="ntd-input wcf-input" data-key="' + _esc(field.key) + '" type="' + (field.type === 'number' ? 'number' : 'text') + '" value="' + _esc(String(val)) + '" placeholder="' + _esc(field.label) + '"/>';
    }
    return '<div class="ntd-field"><label class="ntd-label">' + _esc(field.label) + '</label>' + input + '</div>';
  }).join('');

  overlay.innerHTML =
    '<div class="widget-config-dialog">' +
      '<div class="ntd-header">' +
        '<div class="ntd-sub">Configure Widget</div>' +
        '<div class="ntd-title">' + _esc(widget.label) + '</div>' +
      '</div>' +
      '<div class="ntd-body">' + fields + '</div>' +
      '<div class="ntd-actions">' +
        '<button class="ntd-btn ntd-btn-cancel" id="wcf-cancel">Cancel</button>' +
        '<button class="ntd-btn ntd-btn-save" id="wcf-apply">Apply</button>' +
      '</div>' +
    '</div>';

  document.body.appendChild(overlay);

  // Wire resource picker "Choose…" buttons — open the shared invite popover
  overlay.querySelectorAll('.wcf-res-pick-btn').forEach(function(btn) {
    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      if (!window._notesShowResourcePicker) return;
      const hiddenInput  = btn.parentElement.querySelector('.wcf-res-val');
      const displayEl    = btn.parentElement.querySelector('.wcf-res-display');
      window._notesShowResourcePicker(btn, function(resource) {
        hiddenInput.value  = resource.id || '';
        displayEl.textContent = resource.name || 'Me (default)';
      });
    });
  });

  // Resolve saved resource IDs to names for display
  overlay.querySelectorAll('.wcf-res-val').forEach(function(inp) {
    const savedId  = inp.value;
    const displayEl = inp.parentElement.querySelector('.wcf-res-display');
    if (savedId && displayEl && window._notesGetInviteResources) {
      const res = (window._notesGetInviteResources() || []).find(function(r) { return r.id === savedId; });
      if (res) displayEl.textContent = res.name;
    }
  });

  overlay.querySelector('#wcf-cancel').onclick = function() { overlay.remove(); };
  overlay.addEventListener('mousedown', function(e) { if (e.target === overlay) overlay.remove(); });
  overlay.querySelector('#wcf-apply').onclick = function() {
    const config = {};
    overlay.querySelectorAll('.wcf-input').forEach(function(inp) {
      if (inp.type === 'checkbox') config[inp.dataset.key] = inp.checked;
      else if (inp.dataset.key) config[inp.dataset.key] = inp.value;
    });
    overlay.remove();
    applyWidget(widgetId, config, tileState);
  };
}

// ── Apply widget to tile ──────────────────────────────────────────────────
function applyWidget(widgetId, config, tileState) {
  // If a real note record backs this tile, delete it — widget tiles have no
  // institutional knowledge worth preserving in the notes table.
  const noteId = tileState.noteId;
  const isPlaceholder = tileState.isPlaceholder || (noteId && noteId.startsWith('ph-'));
  if (!isPlaceholder && noteId) {
    // Delete the backing note record silently
    API.del('notes?id=eq.' + noteId).catch(function(){});
    // Remove from local _notes array
    if (typeof _notes !== 'undefined') {
      _notes = _notes.filter(function(n){ return n.id !== noteId; });
    }
    console.log('[Widgets] Deleted backing note for widget tile:', noteId, widgetId);
  }
  // Assign a stable synthetic ID for placeholder tiles (never hits the DB)
  let newNoteId = noteId;
  if (isPlaceholder && (!noteId || noteId.startsWith('ph-'))) {
    newNoteId = 'wt-' + Date.now() + '-' + Math.random().toString(36).slice(2,8);
    tileState.noteId = newNoteId;
    // Update the DOM element's data-viewid so refreshTileWidget can find it
    const oldEl = document.querySelector('.views-tile[data-noteid="' + noteId + '"]');
    if (oldEl) oldEl.dataset.noteid = newNoteId;
  }
  tileState.isPlaceholder = false;
  tileState.canvasMode    = 'widget';
  tileState.widgetId      = widgetId;
  tileState.widgetConfig  = config;
  window._viewsSaveWorkspace(true);
  // Refresh left panel so deleted note disappears from knowledge tree
  if (typeof _notesRenderLeft === 'function') _notesRenderLeft();
  refreshTileWidget(tileState.noteId);
}

// ── Refresh a specific tile's widget rendering ────────────────────────────
function refreshTileWidget(noteId) {
  const tileEl = document.querySelector('.views-tile[data-noteid="' + noteId + '"]');
  if (!tileEl) return;
  const cv = (typeof _cv === 'function' ? _cv() : (window._viewsCv && window._viewsCv()));
  if (!cv) return;
  const tileState = cv.tiles.find(function(t) { return t.noteId === noteId; });
  if (!tileState) return;
  // Re-inject mode switcher (updates label, adds/removes gear button)
  const existing = tileEl.querySelectorAll('.tile-header-mode-btn');
  existing.forEach(function(el) { el.remove(); });
  injectModeSwitcher(tileEl, tileState);
  // Clear the rendered guard so the new config triggers a fresh dataFn call
  const canvas = tileEl.querySelector('.tile-canvas');
  if (canvas) delete canvas.dataset.widgetRendered;
  renderTileCanvas(tileEl, tileState, null);
}

// ── Wire into tile rendering via _notesPostWire hook ─────────────────────
// Export showWidgetPicker so _notesNew (Block 1) can open it directly
window._viewsShowWidgetPicker = function(tileState) { showWidgetPicker(tileState); };

// ── Mode button factory — called by _notesTileHTML for newly created tiles ──
// Returns HTML string for the Note/Widget toggle button inserted into tile headers.
// For tiles rendered BEFORE Block 2 loads, _viewsPostWire calls injectModeSwitcher instead.
window._notesModeBtn = function(noteId, tileState) {
  var mode  = (tileState && tileState.canvasMode) || 'note';
  var label = mode === 'widget'
    ? (WIDGET_REGISTRY.get(tileState.widgetId) ? WIDGET_REGISTRY.get(tileState.widgetId).label : 'Widget')
    : 'Note';
  return '<button class="tile-header-mode-btn' + (mode === 'widget' ? ' widget-active' : '') + '" ' +
    'title="' + (mode === 'widget' ? 'Switch mode or reconfigure widget' : 'Switch canvas mode') + '" ' +
    'onclick="event.stopPropagation();' +
      'var ts=window._viewsCv&&window._viewsCv()&&window._viewsCv().tiles.find(function(t){return t.noteId===\'' + noteId + '\';});' +
      'if(ts&&window._viewsShowWidgetPicker)window._viewsShowWidgetPicker(ts);">' +
    label + '</button>';
};
window._viewsPostWire = function() {
  const cv = (typeof _cv === 'function' ? _cv() : (window._viewsCv && window._viewsCv()));
  if (!cv) return;
  const isLocked = !!cv.locked;
  const allTiles = document.querySelectorAll('.views-tile[data-noteid]');
  cv.tiles.forEach(function(tileState) {
    const tileEl = document.querySelector('.views-tile[data-noteid="' + tileState.noteId + '"]');
    if (!tileEl) return;
    if (!isLocked) injectModeSwitcher(tileEl, tileState);
    if (tileState.canvasMode === 'widget' && tileState.widgetId) {
      renderTileCanvas(tileEl, tileState, null);
    }
  });
};

// ── Gear icon for reconfiguring existing widget ───────────────────────────
// Exposed so tile HTML can call it
window._viewsWidgetReconfigure = function(noteId) {
  const cv = (typeof _cv === 'function' ? _cv() : (window._viewsCv && window._viewsCv()));
  if (!cv) return;
  const tileState = cv.tiles.find(function(t) { return t.noteId === noteId; });
  if (!tileState || !tileState.widgetId) return;
  showWidgetConfig(tileState.widgetId, tileState, tileState.widgetConfig || {});
};

// ── Stub widget — validates full pipeline ────────────────────────────────
WIDGET_REGISTRY.register({
  id:          'stub_hello',
  label:       'Hello Widget',
  category:    'personal',
  description: 'Stub widget — validates the full pipeline',
  icon:        'gauge',
  configSchema: [
    { key: 'message', label: 'Message', type: 'text', default: 'Hello from the widget system!' }
  ],
  refreshInterval: 0,
  minTileHeight:   'small',
  dataFn: async function(config) {
    return { message: config.message || 'Hello from the widget system!' };
  },
  renderFn: function(data, container) {
    container.innerHTML =
      '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:8px;padding:16px">' +
        '<div style="font-size:28px">▦</div>' +
        '<div style="font-family:var(--font-mono);font-size:14px;font-weight:600;color:#00D2FF;text-align:center">' +
          _esc((data && data.message) || 'Hello!') +
        '</div>' +
        '<div style="font-family:var(--font-mono,monospace);font-size:9px;color:var(--text3);letter-spacing:.08em">WIDGET SYSTEM ACTIVE</div>' +
      '</div>';
  }
});

console.log('[Widgets] Phase 1 infrastructure loaded. Registry:', WIDGET_REGISTRY.getAll().length, 'widget(s).');

})();
