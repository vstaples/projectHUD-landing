      const idx = parseInt(curUserId.replace(/-/g,'').slice(-4), 16) % COLORS.length;
      return COLORS[idx];
    }
  }
  return null;
}
window._notesGetMyColor = _notesGetMyColor;

function _notesNewBlock(authorResourceId, authorName, authorColor, content) {
  return {
    id:               'blk_' + Math.random().toString(36).slice(2, 8),
    type:             'text',
    content:          content || '',
    authorResourceId: authorResourceId || null,
    authorName:       authorName       || null,
    authorColor:      authorColor      || null,
    updatedAt:        new Date().toISOString(),
  };
}

function _notesIsBlockFormat(note) {
  if (!note) return false;
  if (note.content_blocks && Array.isArray(note.content_blocks)) return true;
  return false;
}

// Migrate plain text → blocks. Called once when first participant is added.
function _notesMigrateToBlocks(plainText, ownerResourceId, ownerName) {
  const lines = (plainText || '').split('\n').filter(function(l) { return l.trim().length > 0; });
  if (!lines.length) lines.push('');
  return lines.map(function(line) {
    return _notesNewBlock(ownerResourceId, ownerName, null, line);
  });
}

// Serialize blocks array to plain text for search / tree display
function _notesBlocksToPlainText(blocks) {
  return (blocks || []).map(function(b) { return b.content || ''; }).join('\n');
}

// ── Block save ────────────────────────────────────────────────────────────

let _blockTimers = {};

function _notesSaveBlocks(noteId, blocks) {
  if (!noteId) return;
  const note = _notes.find(function(n) { return n.id === noteId; });
  if (note) note.content_blocks = blocks;
  _lastTyped[noteId] = Date.now();
  clearTimeout(_blockTimers[noteId]);
  _blockTimers[noteId] = setTimeout(async function() {
    try {
      const plainText = _notesBlocksToPlainText(blocks);
      await API.patch('notes?id=eq.' + noteId, {
        content_blocks: blocks,
        content:        plainText,   // keep plain text in sync for search
        updated_at:     new Date().toISOString(),
      });
    } catch(e) { console.error('[Compass] Block save error:', e); }
  }, 800);
}

// ── Block diff + sync ─────────────────────────────────────────────────────
// Called by _notesSyncPoll for block-format notes.
// Diffs incoming blocks by id — updates changed, adds new, removes deleted.
// Skips any block the current user is actively typing in.

function _notesDiffBlocks(noteId, container, incomingBlocks) {
  if (!container || !Array.isArray(incomingBlocks)) return;
  const typedAgo = Date.now() - (_lastTyped[noteId] || 0);
  const selfTyping = typedAgo < 3000;

  // Get currently focused block id (if user is typing in this note)
  const focusedEl = document.activeElement;
  // activeElement may be the inner textDiv — walk up to find the block element with data-blockid
  const focusedBlock = focusedEl && (focusedEl.closest ? focusedEl.closest('[data-blockid]') : null);
  const focusedBlockId = (focusedBlock && focusedBlock.dataset.blockid) || null;

  // Remove deleted blocks first
  const incomingIds = new Set(incomingBlocks.map(function(b) { return b.id; }));
  container.querySelectorAll('[data-blockid]').forEach(function(el) {
    if (!incomingIds.has(el.dataset.blockid)) el.remove();
  });

  // Update existing and insert new blocks in correct order
  var prevEl = null; // track insertion position
  incomingBlocks.forEach(function(incoming) {
    var existing = container.querySelector('[data-blockid="' + incoming.id + '"]');
    if (!existing) {
      // New block — insert at correct position
      existing = _notesCreateBlockEl(noteId, incoming, false);
      if (prevEl && prevEl.nextSibling) {
        container.insertBefore(existing, prevEl.nextSibling);
      } else if (!prevEl) {
        container.insertBefore(existing, container.firstChild);
      } else {
        container.appendChild(existing);
      }
    } else {
      // Ensure existing block is in the right position
      if (prevEl) {
        if (existing !== prevEl.nextSibling) {
          container.insertBefore(existing, prevEl.nextSibling || null);
        }
      } else {
        if (existing !== container.firstChild) {
          container.insertBefore(existing, container.firstChild);
        }
      }
      // Update content if not actively typing in this block
      if (!(selfTyping && focusedBlockId === incoming.id)) {
        const existingTextDiv = existing.querySelector('.nbc-block-text');
        if (existingTextDiv && existingTextDiv.textContent !== (incoming.content || '')) {
          existingTextDiv.textContent = incoming.content || '';
        }
        // Update attribution if changed
        const prevColor = existing.dataset.authorcolor || '';
        const newColor  = incoming.authorColor || '';
        if (prevColor !== newColor) {
          existing.dataset.authorcolor = newColor;
          existing.dataset.authorname  = incoming.authorName || '';
          existing.style.borderLeft    = newColor ? '3px solid ' + newColor : 'none';
          existing.style.paddingLeft   = newColor ? '6px' : '0';
          _notesUpdateBlockAvatar(existing, incoming);
        }
      }
    }
    prevEl = existing;
  });
}

function _notesUpdateBlockAvatar(blockEl, block) {
  const existing = blockEl.querySelector('.nbc-avatar');
  if (existing) existing.remove();
  if (!block.authorColor || !block.authorName) return;
  const initials = (block.authorName || '').split(' ').map(function(w) { return w[0]; }).join('').slice(0, 2).toUpperCase();
  const av = document.createElement('span');
  av.className = 'nbc-avatar';
  av.textContent = initials;
  av.style.background = block.authorColor + '22';
  av.style.color       = block.authorColor;
  av.style.border      = '1px solid ' + block.authorColor + '44';
  av.title = block.authorName || '';
  blockEl.appendChild(av);
}

// ── Create a single block element ─────────────────────────────────────────

function _notesCreateBlockEl(noteId, block, readOnly) {
  const selfResourceId = window._notesResource && window._notesResource.id;
  const isOwnerBlock   = !block.authorColor; // null color = owner

  const el = document.createElement('div');
  el.className = 'nbc-block';
  // el is the flex container — not contenteditable itself
  el.dataset.blockid          = block.id;
  el.dataset.noteid           = noteId;
  el.dataset.authorcolor      = block.authorColor      || '';
  el.dataset.authorresourceid = block.authorResourceId || '';
  el.dataset.authorname       = block.authorName       || '';

  el.style.cssText =
    'padding:1px 0;' +
    'border-left:' + (block.authorColor ? '3px solid ' + block.authorColor : 'none') + ';' +
    'padding-left:' + (block.authorColor ? '6px' : '0') + ';';

  // Inner text div — the only contenteditable element
  const textDiv = document.createElement('div');
  textDiv.className = 'nbc-block-text';
  textDiv.setAttribute('contenteditable', readOnly ? 'false' : 'true');
  textDiv.setAttribute('spellcheck', 'false');
  textDiv.textContent = block.content || '';
  el.appendChild(textDiv);

  if (!isOwnerBlock) _notesUpdateBlockAvatar(el, block);
  if (readOnly) return el;

  // ── input — update local state + debounced save ─────────────────────────
  textDiv.addEventListener('input', function() {
    block.content   = textDiv.textContent;
    block.updatedAt = new Date().toISOString();
    // If user is editing a block attributed to someone else, take ownership
    const curResId = window._notesResource && window._notesResource.id;
    const curName  = window._notesResource && window._notesResource.name;
    if (block.authorResourceId && block.authorResourceId !== curResId) {
      block.authorResourceId = curResId;
      block.authorName       = curName;
      block.authorColor      = _notesGetMyColor(noteId);
      el.dataset.authorcolor  = block.authorColor || '';
      el.style.borderLeft     = block.authorColor ? '3px solid ' + block.authorColor : 'none';
      el.style.paddingLeft    = block.authorColor ? '6px' : '0';
      _notesUpdateBlockAvatar(el, block);
    }
    const noteLocal = _notes.find(function(n) { return n.id === noteId; });
    if (noteLocal) noteLocal.content_blocks = _notesGetBlocksFromContainer(el.parentNode);
    _notesSaveBlocks(noteId, _notesGetBlocksFromContainer(el.parentNode));
  });

  // ── keydown — Enter creates new block, Backspace at start merges ─────────
  textDiv.addEventListener('keydown', function(e) {
    const blocks = _notesGetBlocksFromContainer(el.parentNode);
    const idx    = blocks.findIndex(function(b) { return b.id === block.id; });

    if (e.key === 'Enter') {
      e.preventDefault();
      const curResId = window._notesResource && window._notesResource.id;
      const curName  = window._notesResource && window._notesResource.name;
      const myColor  = _notesGetMyColor(noteId);
      const newBlock = _notesNewBlock(curResId, curName, myColor, '');
      const newEl    = _notesCreateBlockEl(noteId, newBlock, false);
      el.parentNode.insertBefore(newEl, el.nextSibling);
      // Focus the inner text div of the new block
      const newTextDiv = newEl.querySelector('.nbc-block-text');
      if (newTextDiv) newTextDiv.focus();
      const noteLocal = _notes.find(function(n) { return n.id === noteId; });
      if (noteLocal) noteLocal.content_blocks = _notesGetBlocksFromContainer(el.parentNode);
      _notesSaveBlocks(noteId, _notesGetBlocksFromContainer(el.parentNode));
    }

    if (e.key === 'Backspace') {
      const sel = window.getSelection();
      const atStart = sel && sel.focusOffset === 0 && sel.anchorOffset === 0;
      if (atStart && textDiv.textContent === '' && idx > 0) {
        e.preventDefault();
        const prevEl = el.previousSibling;
        el.remove();
        if (prevEl) {
          const prevTextDiv = prevEl.querySelector('.nbc-block-text') || prevEl;
          prevTextDiv.focus();
          const range = document.createRange();
          const selObj = window.getSelection();
          range.selectNodeContents(prevTextDiv);
          range.collapse(false);
          selObj.removeAllRanges();
          selObj.addRange(range);
        }
        const noteLocal = _notes.find(function(n) { return n.id === noteId; });
        if (noteLocal) noteLocal.content_blocks = _notesGetBlocksFromContainer(el.parentNode);
        _notesSaveBlocks(noteId, _notesGetBlocksFromContainer(el.parentNode || document.querySelector('[data-noteblocks="' + noteId + '"]')));
      }
    }
  });

  return el;
}

// Collect current blocks array from DOM container
function _notesGetBlocksFromContainer(container) {
  if (!container) return [];
  const blocks = [];
  container.querySelectorAll('[data-blockid]').forEach(function(el) {
    // Always use inner .nbc-block-text — never fall back to el which includes avatar text
    const textEl = el.querySelector('.nbc-block-text');
    if (!textEl) return;
    blocks.push({
      id:               el.dataset.blockid,
      type:             'text',
      content:          textEl.textContent || '',
      authorResourceId: el.dataset.authorresourceid || null,
      authorName:       el.dataset.authorname       || null,
      authorColor:      el.dataset.authorcolor      || null,
      updatedAt:        new Date().toISOString(),
    });
  });
  return blocks;
}

// ── Render block canvas into a container element ──────────────────────────

function _notesRenderBlocks(note, container, readOnly) {
  if (!container) return;
  const blocks = note.content_blocks;
  if (!Array.isArray(blocks) || !blocks.length) {
    // Empty — create one starter block attributed to the owner
    const ownerResId = window._notesResource && window._notesResource.id;
    const ownerName  = window._notesResource && window._notesResource.name;
    const starter    = _notesNewBlock(ownerResId, ownerName, null, '');
    if (note) note.content_blocks = [starter];
    container.appendChild(_notesCreateBlockEl(note.id, starter, readOnly));
    return;
  }
  blocks.forEach(function(block) {
    container.appendChild(_notesCreateBlockEl(note.id, block, readOnly));
  });
}
window._notesRenderBlocks      = _notesRenderBlocks;
window._notesDiffBlocks        = _notesDiffBlocks;
window._notesIsBlockFormat     = _notesIsBlockFormat;
window._notesMigrateToBlocks   = _notesMigrateToBlocks;
window._notesBlocksToPlainText = _notesBlocksToPlainText;

// ── Save handlers ─────────────────────────────────────────────────────────
let _contentTimers = {};

function _notesSaveContent(el) {
  const noteId = el.dataset.noteid;
  if (!noteId) return;
  const note = _notes.find(n => n.id === noteId);
  if (note) note.content = el.value;
  // Track when user last typed for sync collision avoidance
  _lastTyped[noteId] = Date.now();
  clearTimeout(_contentTimers[noteId]);
  _contentTimers[noteId] = setTimeout(async () => {
    try {
      await API.patch('notes?id=eq.' + noteId, { content: el.value, updated_at: new Date().toISOString() });
    } catch(e) { console.error('[Compass] Note save error:', e); }
  }, 1200);
}

function _notesSaveTitle(el) {
  const noteId = el.dataset.noteid;
  if (!noteId) return;
  const newTitle = el.textContent.trim() || 'Untitled';
  el.textContent = newTitle;
  const note = _notes.find(n => n.id === noteId);
  if (note) note.title = newTitle;
  API.patch('notes?id=eq.' + noteId, { title: newTitle, updated_at: new Date().toISOString() }).catch(()=>{});
  // Update left panel
  document.querySelectorAll('.views-item[data-viewid="' + noteId + '"] .views-item-title').forEach(t => {
    t.textContent = newTitle;
  });
}

// ── Chat ──────────────────────────────────────────────────────────────────
async function _notesLoadAndRenderMsgs(noteId) {
  const msgs    = await _notesLoadMessages(noteId);
  const msgsEl  = document.getElementById('views-chat-msgs-' + noteId);
  if (!msgsEl) return;
  if (!msgs.length) {
    msgsEl.innerHTML = '<div style="font-family:var(--font-ui,\'Barlow Condensed\',sans-serif);font-size:13px;color:var(--text3);padding:8px">No messages yet</div>';
    return;
  }
  msgsEl.innerHTML = msgs.map(m =>
    '<div class="views-chat-msg">' +
    '<div class="views-chat-author">' + _esc(m.author_name || 'You') + ' <span class="views-chat-time">' + _notesRelTime(m.created_at) + '</span></div>' +
    '<div class="views-chat-body">' + _esc(m.body) + '</div>' +
    '</div>'
  ).join('');
  msgsEl.scrollTop = msgsEl.scrollHeight;
}

async function _notesSendMsg(noteId) {
  const inp  = document.getElementById('views-chat-inp-' + noteId);
  const body = inp?.value?.trim();
  if (!body || !_userId) return;
  inp.value = '';
  try {
    await API.post('note_messages', {
      note_id:        noteId,
      author_user_id: _userId,
      author_name:    _userName,
      body,
      created_at:     new Date().toISOString(),
    });
    delete _messages[noteId]; // bust cache
    await _notesLoadAndRenderMsgs(noteId);
  } catch(e) { console.error('[Compass] Send message error:', e); }
}

// ── Search ────────────────────────────────────────────────────────────────
function _notesSearch(q) {
  const query = q.toLowerCase().trim();
  document.querySelectorAll('.views-item[data-viewid]').forEach(el => {
    const n = _notes.find(x => x.id === el.dataset.noteid);
    if (!n) return;
    const hay = [n.title, n.content, n.hierarchy_path].filter(Boolean).join(' ').toLowerCase();
    el.style.display = (!query || hay.includes(query)) ? '' : 'none';
  });
}

// ── Helpers ───────────────────────────────────────────────────────────────
function _notesRelTime(iso) {
  if (!iso) return '';
  const diff = Date.now() - new Date(iso).getTime();
  const m = Math.floor(diff / 60000);
  if (m < 1)  return 'just now';
  if (m < 60) return m + 'm ago';
  const h = Math.floor(m / 60);
  if (h < 24) return h + 'h ago';
  const d = Math.floor(h / 24);
  if (d < 7)  return d + 'd ago';
  return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function _esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Invitation accept/reject dialog ──────────────────────────────────────
async function _notesShowInviteDialog(inviteNote) {
  const titleMatch  = (inviteNote.title || '').match(/^(.+?) invited you to: (.+)$/);
  const inviterName = titleMatch?.[1] || 'Someone';
  const noteName    = titleMatch?.[2] || 'a note';
  const sharedNoteId = inviteNote.entity_id;

  const overlay = document.createElement('div');
  overlay.className = 'notes-invite-dialog-overlay';
  overlay.innerHTML =
    '<div class="views-invite-dialog">' +
      '<div class="nid-header">' +
        '<div class="nid-from">Collaboration Invitation</div>' +
        '<div class="nid-title">' + _esc(inviterName) + ' invited you to collaborate</div>' +
        '<div class="nid-note-name">✎ ' + _esc(noteName) + '</div>' +
      '</div>' +
      '<div class="nid-body">' +
        _esc(inviterName) + ' has shared this note with you.' +
        '<br><br>Accepting will open a live view of the shared note in a floating window. You can then drag it into any grid tile.' +
        '<br><br>Declining will leave this invitation in your inbox.' +
      '</div>' +
      '<div class="nid-actions">' +
        '<button class="nid-btn nid-btn-reject" id="nid-reject">✕ Decline</button>' +
        '<button class="nid-btn nid-btn-accept" id="nid-accept">✓ Accept &amp; Open →</button>' +
      '</div>' +
    '</div>';

  document.body.appendChild(overlay);
  overlay.addEventListener('mousedown', e => { if (e.target === overlay) overlay.remove(); });

  overlay.querySelector('#nid-reject').onclick = async () => {
    overlay.remove();
    // Delete the invitation from Alan's inbox
    try {
      await API.del('notes?id=eq.' + inviteNote.id);
      _notes = _notes.filter(n => n.id !== inviteNote.id);
      _notesRenderLeft();
    } catch(e) {}
    // Remove Alan from note_participants so avatar disappears from Vaughn's view
    try {
      const userId = window._notesResource?.user_id;
      if (userId) {
        await API.del('note_participants?note_id=eq.' + sharedNoteId + '&user_id=eq.' + userId);
      }
    } catch(e) {}
    // Notify Vaughn — try participants table first, fall back to notes.owner_user_id
    try {
      let ownerUserId = null;
      const parts = await API.get('note_participants?note_id=eq.' + sharedNoteId + '&role=eq.owner&limit=1').catch(()=>[]);
      ownerUserId = parts?.[0]?.user_id;
      if (!ownerUserId) {
        const noteRows = await API.get('notes?id=eq.' + sharedNoteId + '&select=owner_user_id&limit=1').catch(()=>[]);
        ownerUserId = noteRows?.[0]?.owner_user_id;
      }
      if (ownerUserId) {
        const myName = window._notesResource?.name || 'Someone';
        await API.post('notes', {
          firm_id: FIRM_ID, owner_user_id: ownerUserId,
          title:   myName + ' declined your invitation to: ' + noteName,
          content: myName + ' has declined your invitation to collaborate on "' + noteName + '".',
          hierarchy_path: 'Inbox', is_inbox: true,
          entity_id: sharedNoteId, entity_type: null,
          created_at: new Date().toISOString(), updated_at: new Date().toISOString(),
        });
      }
    } catch(e) { console.warn('[Compass] Rejection notification failed:', e); }
  };

  overlay.querySelector('#nid-accept').onclick = async () => {
    overlay.remove();
    // Update inbox invitation title to match the actual note title
    try {
      const noteRows = await API.get('notes?id=eq.' + sharedNoteId + '&select=title&limit=1').catch(()=>[]);
      const sharedTitle = noteRows?.[0]?.title;
      if (sharedTitle && inviteNote.id) {
        await API.patch('notes?id=eq.' + inviteNote.id, {
          title:      sharedTitle,
          updated_at: new Date().toISOString(),
        });
        const local = _notes.find(n => n.id === inviteNote.id);
        if (local) local.title = sharedTitle;
        _notesRenderLeft();
      }
    } catch(e) {}
    // Keep invitation in inbox as persistent pointer — clicking it reopens the float
    // Mark participant as accepted — upsert in case row was removed
    try {
      const userId     = window._notesResource?.user_id;
      const resourceId = window._notesResource?.id || null;
      if (userId) {
        // Check if row exists first
        const existing = await API.get(
          'note_participants?note_id=eq.' + sharedNoteId + '&user_id=eq.' + userId + '&limit=1'
        ).catch(()=>[]);
        if (existing?.length) {
          await API.patch(
            'note_participants?note_id=eq.' + sharedNoteId + '&user_id=eq.' + userId,
            { accepted_at: new Date().toISOString() }
          );
        } else {
          // Row was deleted — recreate it
          await API.post('note_participants', {
            note_id:      sharedNoteId,
            user_id:      userId,
            resource_id:  resourceId,
            role:         'participant',
            color:        '#00D2FF',
            invited_at:   new Date().toISOString(),
            accepted_at:  new Date().toISOString(),
            last_seen_at: null,
          });
        }
      }
    } catch(e) { console.warn('[Compass] Accept participant error:', e); }
    await _notesOpenFloatingNote(sharedNoteId, noteName);
  };
}

// ── Floating shared note window ───────────────────────────────────────────
async function _notesOpenFloatingNote(noteId, noteName) {
  let note = _notes.find(n => n.id === noteId);
  if (!note) {
    const rows = await API.get('notes?id=eq.' + noteId + '&limit=1').catch(()=>[]);
    note = rows?.[0];
    if (note) _notes.push(note);
  }
  if (!note) { alert('Could not load the shared note. It may have been deleted.'); return; }

  const win = document.createElement('div');
  win.className = 'notes-float-window';
  win.style.cssText = 'top:80px;left:calc(50% - 260px)';
  win.dataset.noteId = noteId;

  win.innerHTML =
    '<div class="views-float-titlebar" id="nfw-tb-' + _esc(noteId) + '">' +
      '<div class="views-float-label">SHARED NOTE</div>' +
      '<span style="font-family:var(--font-ui,\'Barlow Condensed\',sans-serif);font-size:13px;font-weight:600;color:var(--text0,#F0F6FF);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + _esc(note.title || noteName) + '</span>' +
      '<span class="views-float-hint">drag title bar to move</span>' +
    '<button class="views-float-close" onclick="_notesFloatClose(\'' + _esc(noteId) + '\',this)">✕</button>' +
    '</div>' +
    '<div class="views-float-body">' +
      '<textarea class="views-tile-canvas" data-viewid="' + _esc(noteId) + '" ' +
        'placeholder="Start writing…" oninput="_notesSaveContent(this)">' + _esc(note.content || '') + '</textarea>' +
    '</div>' +
    '<div style="padding:5px 12px;border-top:1px solid rgba(0,210,255,.08);flex-shrink:0">' +
      '<span style="font-family:var(--font-mono,monospace);font-size:10px;color:var(--text3)">Drag title bar to move · Close to return to inbox</span>' +
    '</div>';

  document.body.appendChild(win);
  _notesWireFloatDrag(win, win.querySelector('#nfw-tb-' + noteId));

  // Start presence heartbeat for this shared note so others can see activity
  console.log('[Compass] Float open: starting presence for', noteId, 'fn:', typeof window._notesStartPresence);
  if (window._notesStartPresence) {
    window._notesStartPresence(noteId);
    console.log('[Compass] Presence started');
  } else {
    console.warn('[Compass] _notesStartPresence not available yet');
    // Retry after collab script has run
    setTimeout(() => {
      if (window._notesStartPresence) window._notesStartPresence(noteId);
    }, 500);
  }

  // Stop presence when window is closed
  // Wire close button directly
  const closeBtn = win.querySelector('.views-float-close');
  if (closeBtn) {
    closeBtn.removeAttribute('onclick');
    closeBtn.addEventListener('click', () => {
      // Don't stop presence — keep heartbeat running so avatar stays active in owner's view
      _notesFloatClose(noteId, closeBtn);
    });
  }
}

function _notesFloatClose(noteId, btn) {
  const win = btn?.closest?.('.views-float-window') || document.querySelector('.views-float-window');
  if (win) win.remove();
  // Add shared note to tray so it persists and can be dragged to grid
  if (noteId && !_cv().tiles.some(t => t.noteId === noteId)) {
    if (!_cv().tray.includes(noteId)) {
      _cv().tray.push(noteId);
      _viewsSaveWorkspace(true);
      _notesRenderTray();
    }
  }
}
window._notesFloatClose = _notesFloatClose;

function _notesAddFloatToGrid(noteId, winEl) {
  if (winEl) winEl.remove();
  _notesOpenNote(noteId);
}

function _notesWireFloatDrag(win, handle) {
  if (!handle) return;
  let dragging = false, ox = 0, oy = 0;
  handle.addEventListener('mousedown', e => {
    dragging = true;
    win.style.transform = 'none';
    const r = win.getBoundingClientRect();
    win.style.left = r.left + 'px';
    win.style.top  = r.top  + 'px';
    ox = e.clientX - r.left;
    oy = e.clientY - r.top;
    e.preventDefault();
  });
  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    win.style.left = Math.max(0, Math.min(window.innerWidth  - win.offsetWidth,  e.clientX - ox)) + 'px';
    win.style.top  = Math.max(0, Math.min(window.innerHeight - win.offsetHeight, e.clientY - oy)) + 'px';
  });
  document.addEventListener('mouseup', () => { dragging = false; });
}

window._notesAddFloatToGrid    = _notesAddFloatToGrid;
window._notesDeleteInboxNote   = _notesDeleteInboxNote;

function _notesRenderLibrary() {
  const list = document.getElementById('views-library-list');
  if (!list) return;

  // Build workflow entries from all non-shared, non-default views.
  // Each view that has a person associated (stored as view.forResourceId /
  // view.forResourceName, stamped by Clone) gets grouped under that person.
  // Views without a person association appear under the owner's own name.
  const views     = _workspace.views || {};
  const myName    = (window._notesResource && window._notesResource.name) || 'Me';
  const myRid     = (window._notesResource && window._notesResource.id)   || '';

  // Collect entries — show all non-shared views.
  // Views with forResourceName are associated with that person.
  // Views without forResourceName are the owner's own workspace views —
  // show them under the owner but only if there are ANY to show.
  const ownViews   = [];
  const otherViews = [];

  Object.keys(views).forEach(function(vKey) {
    const v = views[vKey];
    if (v._isSharedView) return;
    if (v.forResourceName) {
      const personName = v.forResourceName;
      const personRid  = v.forResourceId || '';
      const initials   = personName.split(' ').map(function(w){return w[0]||'';}).join('').slice(0,2).toUpperCase();
      let colorIdx = 0;
      if (window._inviteResources && window._inviteResources.length) {
        const idx = window._inviteResources.findIndex(function(r){ return r.id === personRid; });
        colorIdx = idx >= 0 ? idx : 0;
      }
      const color = (window.PARTICIPANT_COLORS && window.PARTICIPANT_COLORS.length)
        ? window.PARTICIPANT_COLORS[colorIdx % window.PARTICIPANT_COLORS.length] : '#00D2FF';
      otherViews.push({ vKey, label: vKey, personName, personRid, initials, color, isActive: vKey === _workspace.activeView });
    } else {
      ownViews.push({ vKey, label: vKey, isActive: vKey === _workspace.activeView });
    }
  });

  const entries = otherViews.concat(ownViews);

  if (!entries.length) {
    list.innerHTML = '<div style="padding:5px 14px 8px 28px;font-family:var(--font-mono,monospace);font-size:10px;color:var(--text3)">No dashboards saved</div>';
    return;
  }

  // Group: associated-person views first (sorted alpha by person name),
  // then owner's own views under their own name
  const groups = {};
  otherViews.forEach(function(e) {
    if (!groups[e.personName]) groups[e.personName] = { color: e.color, initials: e.initials, isOwner: false, items: [] };
    groups[e.personName].items.push(e);
  });
  if (ownViews.length) {
    // Owner's own views — use their name and avatar
    const ownerColorIdx = (window._inviteResources && window._inviteResources.length)
      ? Math.max(0, window._inviteResources.findIndex(function(r){ return r.id === myRid; }))
      : 0;
    const ownerColor = (window.PARTICIPANT_COLORS && window.PARTICIPANT_COLORS.length)
      ? window.PARTICIPANT_COLORS[ownerColorIdx % window.PARTICIPANT_COLORS.length] : '#00D2FF';
    const ownerInitials = myName.split(' ').map(function(w){return w[0]||'';}).join('').slice(0,2).toUpperCase();
    if (!groups[myName]) groups[myName] = { color: ownerColor, initials: ownerInitials, isOwner: true, items: [] };
    ownViews.forEach(function(e){ groups[myName].items.push(e); });
  }

  const sortedGroups = Object.keys(groups).sort(function(a, b) {
    // Other-person groups first (alpha), owner last
    if (groups[a].isOwner) return 1;
    if (groups[b].isOwner) return -1;
    return a.localeCompare(b);
  });

  let html = '';
  sortedGroups.forEach(function(personName) {
    const grp      = groups[personName];
    const color    = grp.color;
    const initials = grp.initials;
    // One row per dashboard — name on left, avatar on right. No separate person header row.
    grp.items.forEach(function(e) {
      html +=
        '<div class="views-lib-entry" data-vkey="' + _esc(e.vKey) + '" ' +
            'style="padding:3px 10px 3px 30px;cursor:pointer;display:flex;align-items:center;gap:0;' +
            (e.isActive ? 'background:rgba(0,210,255,.06);border-left:2px solid rgba(0,210,255,.4);padding-left:28px;' : '') + '">' +
          '<span class="views-lib-name" style="font-size:12px;flex:1;color:' + (e.isActive ? '#00D2FF' : 'var(--text1)') + '">' +
            _esc(e.label) +
          '</span>' +
          (e.isActive ? '<span style="font-family:var(--font-mono,monospace);font-size:9px;color:rgba(0,210,255,.6);margin-right:6px">active</span>' : '') +
          '<div title="' + _esc(personName) + '" style="width:20px;height:20px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;' +
              'justify-content:center;font-family:var(--font-ui,sans-serif);font-size:8px;font-weight:700;' +
              'background:' + color + '22;color:' + color + ';border:1px solid ' + color + '55">' +
            initials +
          '</div>' +
        '</div>';
    });
  });

  list.innerHTML = html;

  // Wire clicks — switch to that view
  list.querySelectorAll('[data-vkey]').forEach(function(row) {
    row.addEventListener('click', function() {
      const vKey = row.dataset.vkey;
      if (vKey && vKey !== _workspace.activeView) {
        _notesSwitchView(vKey);
        _notesRenderLibrary(); // refresh active state
      }
    });
  });
}

async function _notesLaunchTemplate(name) {
  const tpl = (_workspace.library || {})[name];
  if (!tpl) return;
  const params = tpl.parameters || [];

  if (window._notesLoadInviteResources) await window._notesLoadInviteResources();
  const allResources = (window._notesGetInviteResources && window._notesGetInviteResources()) || [];
  const selectedInvitees = [];
  let colorIdx = 0;
  const COLORS = ['#4A9EFF','#FF6B6B','#4ECDC4','#FFE66D','#A8E6CF','#FF8B94','#C3A6FF','#FFB347'];

  const overlay = document.createElement('div');
  overlay.className = 'ntd-overlay';

  function renderOverlay() {
    const selfId = window._notesResource && window._notesResource.user_id;
    const chipsHtml = selectedInvitees.length
      ? selectedInvitees.map(function(inv) {
          const key = inv.user_id || inv.resource_id;
          return '<span style="display:inline-flex;align-items:center;gap:4px;background:rgba(0,210,255,.08);border:1px solid rgba(0,210,255,.2);padding:2px 6px;font-family:var(--font-mono,monospace);font-size:10px;color:var(--text1)">' +
            '<span style="width:7px;height:7px;border-radius:50%;background:' + inv.color + ';flex-shrink:0"></span>' +
            _esc(inv.name) +
            '<button data-remove="' + _esc(key) + '" style="background:none;border:none;color:var(--text3);cursor:pointer;padding:0 0 0 3px;font-size:11px;line-height:1">×</button>' +
          '</span>';
        }).join('')
      : '<span style="font-family:var(--font-mono,monospace);font-size:10px;color:var(--text3)">No invitees — will be your view only</span>';

    overlay.innerHTML =
      '<div class="ntd-dialog" style="width:460px;max-height:86vh;display:flex;flex-direction:column">' +
        '<div class="ntd-header">' +
          '<div class="ntd-sub">Launch Template</div>' +
          '<div class="ntd-title">' + _esc(name) + '</div>' +
        '</div>' +
        '<div class="ntd-body" style="overflow-y:auto;flex:1;gap:10px;display:flex;flex-direction:column">' +
          (tpl.description ? '<div style="font-family:var(--font-ui,sans-serif);font-size:12px;color:var(--text3)">' + _esc(tpl.description) + '</div>' : '') +
          '<div class="ntd-field"><label class="ntd-label">View name</label>' +
            '<input class="ntd-input" id="ntd-launch-viewname" value="' + _esc(name) + '"/>' +
          '</div>' +
          params.map(function(p) {
            const label = p.replace(/([A-Z])/g,' $1').replace(/^./,function(s){return s.toUpperCase();});
            return '<div class="ntd-field"><label class="ntd-label">' + _esc(label) + '</label>' +
              '<input class="ntd-input ntd-param-input" data-param="' + _esc(p) + '" placeholder="' + _esc(label) + '…"/></div>';
          }).join('') +
          '<div class="ntd-field">' +
            '<label class="ntd-label" style="margin-bottom:6px">Invite to this view</label>' +
            '<div id="ntd-chips" style="display:flex;flex-wrap:wrap;gap:5px;min-height:20px;margin-bottom:7px">' + chipsHtml + '</div>' +
            '<input class="ntd-input" id="ntd-inv-search" placeholder="Search by name or department…" autocomplete="off"/>' +
            '<div id="ntd-inv-results" style="display:none;max-height:150px;overflow-y:auto;border:1px solid rgba(0,210,255,.12);margin-top:3px"></div>' +
          '</div>' +
        '</div>' +
        '<div class="ntd-actions">' +
          '<button class="ntd-btn ntd-btn-cancel" id="ntd-lcancel">Cancel</button>' +
          '<button class="ntd-btn ntd-btn-save" id="ntd-llaunch">Launch</button>' +
        '</div>' +
      '</div>';

    // Wire remove chips
    overlay.querySelectorAll('[data-remove]').forEach(function(btn) {
      btn.addEventListener('click', function() {
        const key = btn.dataset.remove;
        const i = selectedInvitees.findIndex(function(x) { return (x.user_id||x.resource_id) === key; });
        if (i >= 0) { selectedInvitees.splice(i,1); renderOverlay(); }
      });
    });

    // Wire search
    const searchEl  = overlay.querySelector('#ntd-inv-search');
    const resultsEl = overlay.querySelector('#ntd-inv-results');
    const selectedIds = new Set(selectedInvitees.map(function(x){ return x.user_id||x.resource_id; }));

    function renderResults(q) {
      const lower = (q||'').toLowerCase().trim();
      const filtered = allResources.filter(function(r) {
        if (!r.id || r.user_id === selfId) return false;
        if (selectedIds.has(r.user_id) || selectedIds.has(r.id)) return false;
        if (!lower) return true;
        return (r.name||'').toLowerCase().includes(lower) ||
               (r.department||'').toLowerCase().includes(lower) ||
               (r.email||'').toLowerCase().includes(lower);
      }).slice(0,10);

      if (!filtered.length) {
        resultsEl.innerHTML = '<div style="padding:7px 10px;font-family:var(--font-mono,monospace);font-size:10px;color:var(--text3)">' + (lower ? 'No results' : 'Type to search') + '</div>';
        resultsEl.style.display = 'block'; return;
      }
      const groups = {};
      filtered.forEach(function(r){ const d=r.department||'Other'; (groups[d]=groups[d]||[]).push(r); });
      let html = '';
      Object.keys(groups).forEach(function(dept) {
        html += '<div style="padding:3px 10px 2px;font-family:var(--font-mono,monospace);font-size:9px;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;background:rgba(0,0,0,.25)">' + _esc(dept) + '</div>';
        groups[dept].forEach(function(r) {
          html += '<div class="ntd-inv-row" data-rid="' + _esc(r.id) + '" data-uid="' + _esc(r.user_id||'') + '" data-name="' + _esc(r.name) + '"' +
            ' style="padding:5px 10px;cursor:pointer;transition:background .1s">' +
            '<div style="font-family:var(--font-ui,sans-serif);font-size:12px;color:var(--text1)">' + _esc(r.name) + '</div>' +
            '<div style="font-family:var(--font-mono,monospace);font-size:10px;color:var(--text3)">' + _esc(r.email||'') + '</div>' +
          '</div>';
        });
      });
      resultsEl.innerHTML = html;
      resultsEl.style.display = 'block';

      resultsEl.querySelectorAll('.ntd-inv-row').forEach(function(row) {
        row.addEventListener('click', function() {
          const color = COLORS[colorIdx++ % COLORS.length];
          selectedInvitees.push({ resource_id:row.dataset.rid, user_id:row.dataset.uid||null, name:row.dataset.name, color:color });
          selectedIds.add(row.dataset.uid||row.dataset.rid);
          searchEl.value = '';
          resultsEl.style.display = 'none';
          renderOverlay();
        });
      });
    }

    searchEl.addEventListener('input',  function(){ renderResults(searchEl.value); });
    searchEl.addEventListener('focus',  function(){ renderResults(searchEl.value); });
    document.addEventListener('mousedown', function _hide(e){
      if (!overlay.contains(e.target)) return;
      if (!resultsEl.contains(e.target) && e.target !== searchEl) { resultsEl.style.display='none'; document.removeEventListener('mousedown',_hide); }
    });

    overlay.querySelector('#ntd-lcancel').onclick = function(){ overlay.remove(); };
    overlay.querySelector('#ntd-llaunch').onclick = function(){
      const paramVals = {};
      overlay.querySelectorAll('.ntd-param-input').forEach(function(inp){ paramVals[inp.dataset.param]=inp.value.trim(); });
      const viewName = overlay.querySelector('#ntd-launch-viewname').value.trim() || name;
      overlay.remove();
      _notesLaunchTemplateNow(name, paramVals, viewName, selectedInvitees);
    };
    overlay.addEventListener('keydown', function(e){ if(e.key==='Escape') overlay.remove(); });
  }

  renderOverlay();
  document.body.appendChild(overlay);
  setTimeout(function(){ const vn=overlay.querySelector('#ntd-launch-viewname'); if(vn) vn.focus(); }, 50);
}

async function _notesLaunchTemplateNow(templateName, paramVals, requestedViewName, invitees) {
  const tpl = (_workspace.library || {})[templateName];
  if (!tpl) return;
  invitees = invitees || [];

  const base = requestedViewName || templateName;
  let viewName = base; let idx = 2;
  while (_workspace.views[viewName]) { viewName = base + ' (' + idx++ + ')'; }

  _workspace.views[viewName] = {
    rows:       JSON.parse(JSON.stringify(tpl.rows  || [])),
    tiles:      JSON.parse(JSON.stringify(tpl.tiles || [])),
    tray:       [],
    clonedFrom: templateName,
    parameters: paramVals,
    createdAt:  new Date().toISOString(),
  };
  _workspace.activeView = viewName;
  _viewsSaveWorkspace(true);
  _notesRenderGrid(); _notesRenderLeft(); _notesRenderViewSwitcher();

  // STEP 5: insert owner row then invite each person via view_participants + inbox
  const myName   = (window._notesResource && window._notesResource.name) || 'Someone';
  const myUserId = _userId;
  const myResId  = (window._notesResource && window._notesResource.id) || null;

  if (myUserId) {
    try {
      await API.post('view_participants', {
        firm_id: FIRM_ID, workspace_owner_user_id: myUserId, view_name: viewName,
        user_id: myUserId, resource_id: myResId, view_role: 'owner',
        tile_edit_overrides: [], invited_at: new Date().toISOString(),
        accepted_at: new Date().toISOString(), last_seen_at: new Date().toISOString(),
      });
    } catch(e) { console.warn('[Compass] Template launch owner row failed:', e); }
  }

  for (var i = 0; i < invitees.length; i++) {
    var inv = invitees[i];
    if (!inv.user_id) continue;
    try {
      await API.post('view_participants', {
        firm_id: FIRM_ID, workspace_owner_user_id: myUserId, view_name: viewName,
        user_id: inv.user_id, resource_id: inv.resource_id || null, view_role: 'viewer',
        tile_edit_overrides: [], invited_at: new Date().toISOString(),
        accepted_at: null, last_seen_at: null,
      });
    } catch(e) { console.warn('[Compass] Template launch participant row failed:', e); }
    try {
      await API.post('notes', {
        firm_id: FIRM_ID, owner_user_id: inv.user_id,
        title:   myName + ' invited you to view: ' + viewName,
        content: myName + ' shared the view "' + viewName + '" with you (from template "' + templateName + '"). Accept in your inbox to access it.',
        hierarchy_path: 'Inbox', is_inbox: true,
        entity_id: null, entity_type: 'view_invite',
        entity_meta: { ownerUserId: myUserId, viewName: viewName },
        created_at: new Date().toISOString(), updated_at: new Date().toISOString(),
      });
    } catch(e) { console.warn('[Compass] Template launch view invite notification failed:', e); }
  }
}

function _notesDeleteView() {
  const cur   = _workspace.activeView;
  const views = Object.keys(_workspace.views);
  if (views.length <= 1) {
    // Can't delete last view — show styled info dialog
    _notesConfirmDialog(
      'Cannot Delete', '"' + cur + '"',
      'You must have at least one view. Create another view before deleting this one.',
      'OK', 'rgba(0,210,255,.4)', '#00D2FF', 'rgba(0,210,255,.08)'
    );
    return;
  }
  _notesConfirmDialog(
    'Delete View', '“' + cur + '”',
    'All tiles will be removed from this view. Notes in your Knowledge Tree are not affected.',
    'Delete', 'rgba(226,75,74,.4)', '#E24B4A', 'rgba(226,75,74,.08)'
  ).then(function(confirmed) {
    if (!confirmed) return;
    delete _workspace.views[cur];
    // Switch to first remaining view
    _workspace.activeView = Object.keys(_workspace.views)[0];
    _viewsSaveWorkspace(true);
    _notesRenderGrid(); _notesRenderLeft(); _notesRenderViewSwitcher();
  });
}

function _notesRenderViewSwitcher() {
  const sel = document.getElementById('views-view-switcher');
  if (!sel) return;
  const views = Object.keys(_workspace.views);
  sel.innerHTML = views.map(function(v) {
    const viewData = _workspace.views[v];
    const label = (viewData && viewData._isSharedView)
      ? '\u21aa ' + (viewData._sharedViewName || v)
      : v;
    return '<option value="' + _esc(v) + '"' + (v === _workspace.activeView ? ' selected' : '') + '>' + _esc(label) + '</option>';
  }).join('');
  const cv = _cv();
  const srcName = cv.clonedFrom || null;
  const tpl = srcName ? (_workspace.library || {})[srcName] : null;
  const descBar = document.getElementById('views-tpl-desc-bar');
  const editBtn = document.getElementById('views-edit-tpl-btn');
  if (tpl && tpl.description && descBar) {
    descBar.textContent = '\u25a6 ' + srcName + ' \u2014 ' + tpl.description;
    descBar.style.display = 'block';
  } else if (descBar) {
    descBar.style.display = 'none';
  }
  // Shared-view indicator bar
  var sharedBar = document.getElementById('views-shared-view-bar');
  if (!sharedBar) {
    sharedBar = document.createElement('div');
    sharedBar.id = 'notes-shared-view-bar';
    sharedBar.style.cssText = 'display:none;padding:3px 16px;font-family:var(--font-mono,monospace);font-size:10px;color:rgba(0,210,255,.6);background:rgba(0,210,255,.03);border-bottom:1px solid rgba(0,210,255,.06)';
    var descBarEl = document.getElementById('views-tpl-desc-bar');
    if (descBarEl && descBarEl.parentNode) descBarEl.parentNode.insertBefore(sharedBar, descBarEl.nextSibling);
  }
  if (cv._isSharedView) {
    sharedBar.textContent = '\u21aa Shared view \u00b7 Read-only';
    sharedBar.style.display = 'block';
  } else {
    sharedBar.style.display = 'none';
  }
  if (editBtn) editBtn.style.display = (tpl && !cv._isSharedView) ? '' : 'none';

  // ── Centered associated user name ───────────────────────────────────────
  _notesUpdateHeaderUser();

  // ── Lock button state ────────────────────────────────────────────────────
  const isLocked   = !!cv.locked;
  const lockBtn    = document.getElementById('views-lock-btn');
  const renameBtn  = document.getElementById('views-rename-btn');
  if (lockBtn) {
    lockBtn.textContent     = isLocked ? '🔒' : '🔓';
    lockBtn.dataset.locked  = isLocked ? '1' : '0';
    lockBtn.style.color     = isLocked ? '#EF9F27' : '';
    lockBtn.title           = isLocked ? 'View locked — click to unlock' : 'Lock view — prevents layout edits';
    lockBtn.onmouseout      = function() { this.style.color = isLocked ? '#EF9F27' : ''; };
  }
  // Hide edit controls when locked (row editor, rename, delete, new view, clear, save template)
  const editEls = [
    document.getElementById('views-row-editor'),
    renameBtn,
    document.getElementById('views-edit-tpl-btn'),
  ];
  // Also hide the delete-view and Clear buttons (inside the grid header)
  document.querySelectorAll('#views-grid-header .views-grid-btn').forEach(function(btn) {
    const txt = btn.textContent.trim();
    if (txt === 'Clear' || txt === '⊞ Save Template') {
      btn.style.display = isLocked ? 'none' : '';
    }
    if (btn.id === 'notes-clone-btn') {
      // Clone is meaningful when the dashboard is locked (finalised).
      // Gray it out in edit mode so intent is clear.
      btn.style.opacity      = isLocked ? '1'    : '0.35';
      btn.style.pointerEvents = isLocked ? 'auto' : 'none';
      btn.title              = isLocked
        ? 'Clone this view — copy layout and widgets to a new named view'
        : 'Lock the view first to enable cloning';
    }
  });
  document.querySelectorAll('#views-view-name-wrap button').forEach(function(btn) {
    if (btn.id === 'notes-lock-btn') return; // keep lock button always visible
    btn.style.display = isLocked ? 'none' : '';
  });
  const rowEditor = document.getElementById('views-row-editor');
  if (rowEditor) rowEditor.style.display = isLocked ? 'none' : '';

  const sel2 = document.getElementById('views-view-switcher');
  if (sel2 && !sel2._renameWired) {
    sel2._renameWired = true;
    sel2.addEventListener('dblclick', function() {
      if (_cv()._isSharedView || _cv().locked) return;
      _notesShowRenameViewDialog(_workspace.activeView);
    });
  }
}

// ── Header user name update ───────────────────────────────────────────────
// Standalone so it can be called after _inviteResources loads asynchronously.
function _notesUpdateHeaderUser() {
  const headerUser = document.getElementById('views-header-user');
  if (!headerUser) return;
  const cv = _cv();
  if (!cv || cv._isSharedView) { headerUser.classList.remove('has-name'); headerUser.textContent = ''; return; }

  let userName = cv.forResourceName || null;

  // Fallback 1: resolve from forResourceId
  if (!userName && cv.forResourceId && window._inviteResources && window._inviteResources.length) {
    const res = window._inviteResources.find(function(r){ return r.id === cv.forResourceId; });
    if (res) { userName = res.name; cv.forResourceName = res.name; }
  }

  // Fallback 2: scan widget tile targetResourceId
  if (!userName && window._inviteResources && window._inviteResources.length) {
    const tile = (cv.tiles || []).find(function(t) {
      return t.canvasMode === 'widget' && t.widgetConfig && t.widgetConfig.targetResourceId;
    });
    if (tile) {
      const res = window._inviteResources.find(function(r){ return r.id === tile.widgetConfig.targetResourceId; });
      if (res) { userName = res.name; cv.forResourceName = res.name; cv.forResourceId = res.id; }
    }
  }

  if (userName) {
    headerUser.textContent = userName;
    headerUser.classList.add('has-name');
  } else {
    headerUser.textContent = '';
    headerUser.classList.remove('has-name');
  }
}
window._notesUpdateHeaderUser = _notesUpdateHeaderUser;

    // Rewrite widget configs to target selected person
    if (targetRid || targetUid) {
      (cloned.tiles || []).forEach(function(t) {
        if (t.canvasMode !== 'widget' || !t.widgetConfig) return;
        const cfg = t.widgetConfig;
        if ('targetResourceId' in cfg && targetRid) cfg.targetResourceId = targetRid;
        if ('targetUserId'     in cfg && targetUid) cfg.targetUserId     = targetUid;
      });
    }

    let finalName = newName;
    let suffix = 2;
    while (_workspace.views[finalName]) { finalName = newName + ' ' + suffix++; }

    _workspace.views[finalName] = cloned;
    _workspace.activeView       = finalName;
    _viewsSaveWorkspace(true);
    _notesRenderGrid();
    _notesRenderLeft();
    _notesRenderViewSwitcher();
    _notesRenderLibrary();
    _notesUpdateHeaderUser();
    // Re-render widget tiles with the correct target person's data.
    // _inviteResources is already loaded at clone time (fetched at dialog open),
    // so this should resolve immediately on the first attempt.
    (function _cloneWidgetRefresh(attempts) {
      if (window._inviteResources && window._inviteResources.length) {
        var cv = _cv();
        if (cv && cv.tiles && window.WIDGET_REGISTRY && window._widgetContext) {
          cv.tiles.forEach(function(tile) {
            if (tile.canvasMode !== 'widget' || !tile.widgetId) return;
            var tileEl = document.querySelector('.views-tile[data-viewid="' + tile.noteId + '"]');
            if (!tileEl) return;
            var canvas = tileEl.querySelector('.tile-canvas');
            if (!canvas) return;
            delete canvas.dataset.widgetRendered;
            window.WIDGET_REGISTRY.render(tile.widgetId, tile.widgetConfig || {}, canvas, window._widgetContext());
          });
        }
      } else if (attempts > 0) {
        setTimeout(function() { _cloneWidgetRefresh(attempts - 1); }, 100);
      }
    })(30);
  };
};


function _notesSwitchView(viewName) {
  if (!viewName || viewName === _workspace.activeView) return;
  if (!_workspace.views[viewName]) return;
  // ── STEP 5: stop presence on previous view ────────────────────────────
  if (window._notesStopViewPresence && _userId) {
    window._notesStopViewPresence(_userId, _workspace.activeView);
  }
  _workspace.activeView = viewName;
  // STEP 5: persist wasActive flag for shared views so refresh restores them
  const switchedView = _workspace.views[viewName];
  if (switchedView && switchedView._isSharedView && _workspace.sharedViews) {
    const svKey = switchedView._sharedOwner + '::' + switchedView._sharedViewName;
    if (_workspace.sharedViews[svKey]) _workspace.sharedViews[svKey].wasActive = true;
    // Clear wasActive on all other shared views
    Object.keys(_workspace.sharedViews).forEach(function(k) {
      if (k !== svKey && _workspace.sharedViews[k]) _workspace.sharedViews[k].wasActive = false;
    });
  } else if (_workspace.sharedViews) {
    // Switched to own view — clear all wasActive flags
    Object.keys(_workspace.sharedViews).forEach(function(k) {
      if (_workspace.sharedViews[k]) _workspace.sharedViews[k].wasActive = false;
    });
  }
  _viewsSaveWorkspace(true);
  _notesRenderGrid();
  _notesRenderLeft();
  _notesRenderViewSwitcher();
  _notesRenderLibrary();
  _notesUpdateHeaderUser();
  // ── Re-render widget tiles with correct person data after view switch ─────────
  // _inviteResources must be loaded for _resolveTarget to map rid→uid.
  // If already loaded (normal case after first load), re-render immediately
  // by clearing the widgetRendered guard. If not yet loaded, the
  // _waitForInviteResources callback on initial load will handle it.
  (function _switchViewWidgetRefresh(attempts) {
    if (window._inviteResources && window._inviteResources.length) {
      var cv = _cv();
      if (cv && cv.tiles && window.WIDGET_REGISTRY && window._widgetContext) {
        cv.tiles.forEach(function(tile) {
          if (tile.canvasMode !== 'widget' || !tile.widgetId) return;
          var tileEl = document.querySelector('.views-tile[data-viewid="' + tile.noteId + '"]');
          if (!tileEl) return;
          var canvas = tileEl.querySelector('.tile-canvas');
          if (!canvas) return;
          delete canvas.dataset.widgetRendered;
          window.WIDGET_REGISTRY.render(tile.widgetId, tile.widgetConfig || {}, canvas, window._widgetContext());
        });
      }
    } else if (attempts > 0) {
      setTimeout(function() { _switchViewWidgetRefresh(attempts - 1); }, 100);
    }
  })(30); // up to 3s; initial-load fallback: _waitForInviteResources handles it
  // ── STEP 5: start presence on new view ───────────────────────────────
  setTimeout(function() {
    if (window._notesStartViewPresence && _userId) {
      window._notesStartViewPresence(_userId, viewName);
    }
  }, 0);
}

  if (!newName || newName === _workspace.activeView) return;

  _workspace.views[newName] = _workspace.views[oldName];
  delete _workspace.views[oldName];
  _workspace.activeView = newName;
  _viewsSaveWorkspace(true);
  _notesRenderViewSwitcher();
  _notesRenderLibrary(); // keep WORKFLOWS left panel in sync with rename
  // STEP 5: keep view_participants in sync so participant heartbeats stay aligned

      '&view_name=eq.' + encodeURIComponent(oldName),
      { view_name: newName }
    ).catch(function(e) { console.warn('[Compass] Rename view_participants failed:', e); });
  }
}

function _notesWireBranchEditing() {
  // Prevent branch label clicks from toggling the branch collapse
  document.querySelectorAll('.views-branch-label, .views-subbranch-label').forEach(el => {
    el.addEventListener('click', e => e.stopPropagation());
    el.addEventListener('mousedown', e => e.stopPropagation());
