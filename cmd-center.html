<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Command Center — ProjectHUD</title>
<style>
html, body {
  margin: 0; padding: 0;
  background: #060a10;
  height: 100%; overflow: hidden;
  font-family: monospace;
}
</style>
</head>
<body>

<script>
// Read state passed from parent window via window.name
(function() {
  try {
    var state = window.name ? JSON.parse(window.name) : null;
    if (state) {
      if (state.session)    window._myResourceOverride = state.session;
      if (state.scripts)    window._scriptsOverride    = state.scripts;
      if (state.transcript) window._transcriptOverride = state.transcript;
      // Re-use the parent's PHUD config if available
      if (!window.PHUD && state.origin) {
        // PHUD config will be picked up from the script itself via hardcoded fallback
      }
    }
  } catch(e) {
    console.warn('[CMD Center] Could not read window.name state:', e);
  }
})();
</script>

<!-- Load same config as main app -->
<script src="/js/config.js" onerror="console.warn('config.js not found — using defaults')"></script>

<!-- Load CMD Center -->
<script src="/js/cmd-center.js?v=20260412-CMD5"></script>

<script>
// Auto-open panel fullscreen once loaded
window.addEventListener('load', function() {
  setTimeout(function() {
    if (window.CMDCenter) {
      window.CMDCenter.toggle();
      // Expand to fill the window
      setTimeout(function() {
        var p = document.getElementById('phud-runner-panel');
        if (p) {
          p.style.position = 'fixed';
          p.style.inset    = '0';
          p.style.width    = '100vw';
          p.style.height   = '100vh';
          p.style.borderRadius = '0';
          p.style.resize   = 'none';
          p.style.bottom   = 'auto';
          p.style.right    = 'auto';
        }
      }, 300);
    }
  }, 800);
});
</script>

</body>
</html>
