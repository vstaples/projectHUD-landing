<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ProjectHUD — Video Library</title>
<link rel="stylesheet" href="/css/hud.css">
<style>
.vl-header {
  padding: 24px 28px 20px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
.vl-title {
  font-family: var(--font-hud); font-size: 22px; font-weight: 700;
  color: var(--text0); letter-spacing: 0.06em;
}
.vl-sub {
  font-family: var(--font-mono); font-size: 11px;
  color: var(--text3); letter-spacing: 0.14em; margin-top: 4px;
}
.vl-filters {
  padding: 14px 28px;
  border-bottom: 1px solid var(--border);
  display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
}
.vl-filter-btn {
  font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.12em;
  padding: 5px 14px; background: none;
  border: 1px solid rgba(100,160,220,0.15);
  color: var(--text3); cursor: pointer; transition: all 0.15s;
}
.vl-filter-btn:hover { border-color: rgba(0,210,255,0.35); color: var(--text1); }
.vl-filter-btn.active { border-color: var(--cyan); color: var(--cyan); background: rgba(0,210,255,0.06); }
.vl-search {
  flex: 1; max-width: 260px;
  background: rgba(0,0,0,0.3); border: 1px solid rgba(100,160,220,0.15);
  color: var(--text1); font-family: var(--font-mono); font-size: 11px;
  padding: 5px 12px; outline: none; letter-spacing: 0.08em;
}
.vl-search:focus { border-color: rgba(0,210,255,0.35); }
.vl-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 16px;
  padding: 20px 28px;
}
.vl-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  cursor: pointer;
  transition: border-color 0.15s, box-shadow 0.15s;
  display: flex; flex-direction: column;
}
.vl-card:hover {
  border-color: rgba(0,210,255,0.30);
  box-shadow: 0 4px 20px rgba(0,0,0,0.4);
}
.vl-thumb {
  width: 100%; aspect-ratio: 16/9;
  background: rgba(0,0,0,0.5);
  display: flex; align-items: center; justify-content: center;
  position: relative; overflow: hidden;
}
.vl-thumb img { width: 100%; height: 100%; object-fit: cover; }
.vl-thumb-placeholder {
  display: flex; align-items: center; justify-content: center;
  width: 100%; height: 100%;
  font-size: 32px; color: rgba(0,210,255,0.20);
}
.vl-duration {
  position: absolute; bottom: 6px; right: 8px;
  background: rgba(0,0,0,0.75);
  font-family: var(--font-mono); font-size: 11px; color: var(--text0);
  padding: 2px 6px; letter-spacing: 0.06em;
}
.vl-play-overlay {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  background: rgba(0,0,0,0); transition: background 0.15s;
}
.vl-card:hover .vl-play-overlay { background: rgba(0,0,0,0.35); }
.vl-play-icon {
  width: 44px; height: 44px; border-radius: 50%;
  background: rgba(0,210,255,0.20); border: 2px solid rgba(0,210,255,0.50);
  display: flex; align-items: center; justify-content: center;
  opacity: 0; transition: opacity 0.15s;
}
.vl-card:hover .vl-play-icon { opacity: 1; }
.vl-card-body { padding: 12px 14px; flex: 1; display: flex; flex-direction: column; gap: 6px; }
.vl-card-title {
  font-family: var(--font-ui); font-size: 13px; font-weight: 600;
  color: var(--text0); letter-spacing: 0.02em; line-height: 1.3;
}
.vl-card-meta {
  font-family: var(--font-mono); font-size: 10px;
  color: var(--text3); letter-spacing: 0.1em;
  display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
}
.vl-cat-badge {
  font-family: var(--font-mono); font-size: 10px; font-weight: 700;
  letter-spacing: 0.1em; padding: 2px 7px;
  border: 1px solid;
}
.vl-cat-badge.marketing  { color: var(--cyan);   border-color: rgba(0,210,255,0.35); }
.vl-cat-badge.training   { color: var(--green);  border-color: rgba(0,229,160,0.35); }
.vl-cat-badge.internal   { color: var(--text2);  border-color: rgba(100,160,220,0.20); }
.vl-annot-count {
  font-family: var(--font-mono); font-size: 10px;
  color: rgba(155,89,182,0.7); letter-spacing: 0.06em;
}
.vl-card-desc {
  font-family: var(--font-body, Barlow, sans-serif); font-size: 12px;
  color: var(--text2); line-height: 1.5;
  display: -webkit-box; -webkit-line-clamp: 2;
  -webkit-box-orient: vertical; overflow: hidden;
}

/* ── Video player modal ─────────────────────────────────── */
#vl-player-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.85);
  z-index: 500; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
}
#vl-player-wrap {
  width: min(1100px, 94vw);
  background: var(--bg1);
  border: 1px solid rgba(0,210,255,0.20);
  box-shadow: 0 32px 80px rgba(0,0,0,0.8);
  display: flex; flex-direction: column;
}
#vl-player-header {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
#vl-player-title {
  font-family: var(--font-hud); font-size: 15px;
  color: var(--text0); letter-spacing: 0.06em;
}
#vl-player-close {
  background: none; border: none; color: var(--text3);
  cursor: pointer; font-size: 18px; transition: color 0.15s;
}
#vl-player-close:hover { color: var(--red); }
#vl-player-video {
  width: 100%; max-height: 60vh; background: #000;
  display: block;
}
#vl-player-footer {
  padding: 12px 16px;
  border-top: 1px solid var(--border);
  display: flex; gap: 8px; align-items: flex-start;
}
#vl-player-annots {
  flex: 1;
}
.vl-annot-list-title {
  font-family: var(--font-mono); font-size: 10px;
  color: rgba(155,89,182,0.7); letter-spacing: 0.14em; margin-bottom: 6px;
}
.vl-annot-row {
  display: flex; align-items: center; gap: 10px;
  font-family: var(--font-mono); font-size: 11px;
  color: var(--text2); padding: 4px 0;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  cursor: pointer; transition: color 0.12s;
}
.vl-annot-row:hover { color: var(--text0); }
.vl-annot-row .at { color: #9b59b6; min-width: 44px; }
.vl-annot-row .tp {
  font-size: 9px; color: rgba(0,210,255,0.55);
  text-transform: uppercase; min-width: 56px;
}
</style>
</head>
<body>
<div id="ticker">
  <div id="ticker-live"><div class="dot"></div><span>LIVE</span></div>
  <div id="ticker-scroll-wrap"><div id="ticker-scroll"></div></div>
</div>
<div id="app">
  <nav id="sidebar"></nav>
  <div id="main">

    <div class="vl-header">
      <div>
        <div class="vl-title">VIDEO LIBRARY</div>
        <div class="vl-sub">RECORDED SESSIONS · DEMOS · TRAINING</div>
      </div>
      <button class="hud-btn primary" onclick="HUDRecorder.start()" style="display:flex;align-items:center;gap:8px;">
        <span style="color:#ff4757;font-size:14px;">⏺</span> NEW RECORDING
      </button>
    </div>

    <div class="vl-filters">
      <button class="vl-filter-btn active" data-filter="all">ALL</button>
      <button class="vl-filter-btn" data-filter="marketing">MARKETING</button>
      <button class="vl-filter-btn" data-filter="training">TRAINING</button>
      <button class="vl-filter-btn" data-filter="internal">INTERNAL</button>
      <input class="vl-search" type="text" placeholder="SEARCH CLIPS…" id="vl-search-input" />
    </div>

    <div id="vl-grid" class="vl-grid"></div>

  </div>
</div>

<script src="/js/config.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/api.js"></script>
<script src="/js/ui.js"></script>
<script src="/js/ticker.js"></script>
<script src="/js/sidebar.js"></script>
<script src="/js/hud-recorder.js"></script>
<script>
Ticker.init('ticker-scroll', Ticker.DEFAULT_EVENTS);
Sidebar.init('video-library.html');

let ALL_CLIPS = [];
let ACTIVE_FILTER = 'all';

function fmtDuration(sec) {
  sec = Math.round(sec || 0);
  const m = Math.floor(sec/60), s = sec%60;
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}
function fmtDate(iso) {
  return new Date(iso).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
}

function renderGrid(clips) {
  const grid = document.getElementById('vl-grid');
  if (!clips.length) {
    grid.innerHTML = `<div style="grid-column:1/-1;padding:40px;text-align:center;">
      ${UI.allClear('NO CLIPS', 'No recordings match this filter')}
    </div>`;
    return;
  }
  grid.innerHTML = clips.map(c => {
    const annots = Array.isArray(c.annotations) ? c.annotations : [];
    const thumb  = c.thumbnail_url
      ? `<img src="${c.thumbnail_url}" alt="${c.title}" loading="lazy">`
      : `<div class="vl-thumb-placeholder">▶</div>`;
    return `<div class="vl-card" onclick="openPlayer('${c.id}')">
      <div class="vl-thumb">
        ${thumb}
        <div class="vl-play-overlay">
          <div class="vl-play-icon">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="#00d2ff"><polygon points="4,2 14,8 4,14"/></svg>
          </div>
        </div>
        <div class="vl-duration">${fmtDuration(c.duration_seconds)}</div>
      </div>
      <div class="vl-card-body">
        <div class="vl-card-title">${c.title}</div>
        <div class="vl-card-meta">
          <span class="vl-cat-badge ${c.category}">${c.category.toUpperCase()}</span>
          <span>${fmtDate(c.created_at)}</span>
          ${annots.length ? `<span class="vl-annot-count">◆ ${annots.length} markers</span>` : ''}
          <span>${(c.file_size_bytes/1024/1024).toFixed(1)} MB</span>
        </div>
        ${c.description ? `<div class="vl-card-desc">${c.description}</div>` : ''}
      </div>
    </div>`;
  }).join('');
}

function applyFilter() {
  const search = document.getElementById('vl-search-input').value.toLowerCase();
  let clips = ACTIVE_FILTER === 'all' ? ALL_CLIPS : ALL_CLIPS.filter(c => c.category === ACTIVE_FILTER);
  if (search) clips = clips.filter(c =>
    c.title.toLowerCase().includes(search) ||
    (c.description||'').toLowerCase().includes(search) ||
    (c.tags||[]).some(t => t.toLowerCase().includes(search))
  );
  renderGrid(clips);
}

document.querySelectorAll('.vl-filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.vl-filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    ACTIVE_FILTER = btn.dataset.filter;
    applyFilter();
  });
});
document.getElementById('vl-search-input').addEventListener('input', applyFilter);

const SUPABASE_URL = 'https://dvbetgdzksatcgdfftbs.supabase.co';

async function openPlayer(clipId) {
  const clip = ALL_CLIPS.find(c => c.id === clipId);
  if (!clip) return;

  // Get signed URL via REST API (supabase client not available here)
  let videoUrl = '';
  try {
    const token = await Auth.getFreshToken?.();
    const res = await fetch(
      `${SUPABASE_URL}/storage/v1/object/sign/video-library/${clip.file_path}`,
      {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${token}`,
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({ expiresIn: 3600 }),
      }
    );
    const data = await res.json();
    // Supabase returns a relative path — prepend the base URL
    if (data.signedURL) {
      videoUrl = `${SUPABASE_URL}/storage/v1${data.signedURL}`;
    }
  } catch(e) { console.error('Signed URL error:', e); }

  const annots = Array.isArray(clip.annotations) ? clip.annotations : [];

  document.getElementById('vl-player-overlay')?.remove();
  const overlay = document.createElement('div');
  overlay.id = 'vl-player-overlay';
  overlay.innerHTML = `
    <div id="vl-player-wrap">
      <div id="vl-player-header">
        <div id="vl-player-title">${clip.title}</div>
        <button id="vl-player-close" onclick="document.getElementById('vl-player-overlay').remove()">✕</button>
      </div>
      <video id="vl-player-video" controls src="${videoUrl}"></video>
      <div id="vl-player-footer">
        ${annots.length ? `
          <div id="vl-player-annots">
            <div class="vl-annot-list-title">◆ CHAPTER MARKERS & ANNOTATIONS</div>
            ${annots.map(a => `
              <div class="vl-annot-row" onclick="seekTo(${a.time_seconds})">
                <span class="at">${fmtDuration(a.time_seconds)}</span>
                <span class="tp">${a.type}</span>
                <span>${a.label}</span>
              </div>`).join('')}
          </div>` : '<div style="font-family:var(--font-mono);font-size:11px;color:var(--text3);">No annotations</div>'}
        <div style="display:flex;flex-direction:column;gap:6px;align-items:flex-end;min-width:120px;">
          <button class="hud-btn" style="font-size:11px;"
            onclick="downloadClip('${videoUrl}','${clip.title}.webm')">↓ DOWNLOAD</button>
          <span style="font-family:var(--font-mono);font-size:10px;color:var(--text3);">
            ${fmtDuration(clip.duration_seconds)} · ${(clip.file_size_bytes/1024/1024).toFixed(1)} MB
          </span>
        </div>
      </div>
    </div>
  `;
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
  document.body.appendChild(overlay);
}

function seekTo(seconds) {
  const vid = document.getElementById('vl-player-video');
  if (vid) { vid.currentTime = seconds; vid.play(); }
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') document.getElementById('vl-player-overlay')?.remove();
});

// Download via blob to force correct filename
async function downloadClip(url, filename) {
  if (!url) return;
  try {
    const res = await fetch(url, { headers: { 'Cache-Control': 'no-cache' } });
    const blob = await res.blob();
    const a    = document.createElement('a');
    a.href     = URL.createObjectURL(blob);
    a.download = filename;
    a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 5000);
  } catch(e) {
    console.error('Download failed:', e);
    alert('Download failed: ' + e.message);
  }
}

async function loadClips() {
  const grid = document.getElementById('vl-grid');
  grid.innerHTML = `<div style="grid-column:1/-1;padding:40px;">${UI.loading('LOADING CLIPS…')}</div>`;
  try {
    const clips = await API.get(
      `video_clips?select=*&order=created_at.desc`
    );
    ALL_CLIPS = clips || [];
    applyFilter();
  } catch(e) {
    console.error('Video library load error:', e);
    grid.innerHTML = `<div style="grid-column:1/-1;padding:40px;">${UI.allClear('ERROR', e.message)}</div>`;
  }
}

loadClips();
</script>
</body>
</html>
