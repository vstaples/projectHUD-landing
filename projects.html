// ── Deliverable state helpers ─────────────────────────────────────────────────
function delivStateColor(state, minState) {
  const stateRank = {not_started:0,draft:1,in_progress:1,under_review:2,approved:3,released:4,superseded:0};
  const minRank   = {completed:2, approved:3, released:4};
  const sr = stateRank[state] || 0;
  const mr = minRank[minState] || 0;
  if (sr >= mr) return 'var(--green)';
  if (sr === mr - 1) return 'var(--amber)';
  return '#f07a7a';
}
function delivStateLabel(state) {
  return { not_started:'Not Started', draft:'Draft', in_progress:'In Progress',
    under_review:'Under Review', approved:'Approved', released:'Released', superseded:'Superseded' }[state] || state;
}
function isDelivBlocking(d) {
  const stateRank = {not_started:0,draft:1,in_progress:1,under_review:2,approved:3,released:4};
  const minRank   = {completed:2, approved:3, released:4};
  return d.is_required && (stateRank[d.current_state]||0) < (minRank[d.minimum_state]||0);
}

// ── Root cause analysis ───────────────────────────────────────────────────────
function analyzeRootCause(t, taskDeliverables, taskDeps) {
  const reasons = [];
  const upstream = taskDeps.filter(d => d.successor_task_id === t.id);
  const blockingInputs = taskDeliverables.filter(d => d.direction === 'input' && isDelivBlocking(d));

  if (!t.assigned_to) reasons.push({ code:'unassigned', label:'Unassigned', detail:'No resource is responsible for this task. It cannot progress without an assignee.', icon:'👤' });
  if (blockingInputs.length > 0) {
    const names = blockingInputs.map(d => d.name).join(', ');
    reasons.push({ code:'inputs', label:'Required Inputs Not Ready', detail:`${blockingInputs.length} required input${blockingInputs.length!==1?'s are':' is'} not in the minimum required state: ${names}.`, icon:'📄' });
  }
  if (upstream.length > 0) {
    const incompleteUp = upstream.map(d => _tasks.find(t2 => t2.id === d.predecessor_task_id)).filter(t2 => t2 && t2.status !== 'complete');
    if (incompleteUp.length > 0) {
      const names = incompleteUp.map(t2 => t2.name).join(', ');
      reasons.push({ code:'upstream', label:'Upstream Tasks Incomplete', detail:`${incompleteUp.length} predecessor task${incompleteUp.length!==1?'s are':' is'} not complete: ${names}.`, icon:'⬆' });
    }
  }
  if (reasons.length === 0 && t.status === 'not_started') reasons.push({ code:'not_started', label:'Not Yet Started', detail:'Task is assigned but work has not begun. Check assignee availability and competing priorities.', icon:'⏸' });
  if (reasons.length === 0 && t.status === 'in_progress') reasons.push({ code:'in_progress', label:'In Progress — Missed Due Date', detail:`Task is ${Math.round((t.pct_complete||0) * (t.pct_complete <= 1 ? 100 : 1))}% complete but passed its due date. Assess remaining effort vs. available capacity.`, icon:'⏱' });
  return reasons;
}

// ── Criticality assessment ────────────────────────────────────────────────────
function assessCriticality(t) {
  const today = new Date().toLocaleDateString('en-CA');
  const downstreamMilestones = _milestones.filter(m =>
    m.project_id === t.project_id &&
    m.target_date >= today &&
    ['not_started','in_progress','at_risk'].includes(m.status)
  ).sort((a,b) => a.target_date.localeCompare(b.target_date));

  const nearestMs = downstreamMilestones[0];
  const daysToMs  = nearestMs ? Math.round((new Date(nearestMs.target_date+'T00:00:00') - new Date()) / 86400000) : null;
  const fanOut = _dependencies.filter(d => d.predecessor_task_id === t.id).length;

  // HIGH = red, MEDIUM = amber, LOW = cyan/blue
  if (daysToMs !== null && daysToMs <= 14) return { level:'HIGH',   color:'#f07a7a',      bg:'rgba(192,64,74,.08)',   reason:`Critical path to ${nearestMs.name} in ${daysToMs}d` };
  if (daysToMs !== null && daysToMs <= 30) return { level:'MEDIUM', color:'var(--amber)',  bg:'rgba(212,144,31,.08)', reason:`Milestone ${nearestMs.name} in ${daysToMs}d` };
  if (fanOut >= 3)                         return { level:'MEDIUM', color:'var(--amber)',  bg:'rgba(212,144,31,.08)', reason:`Blocks ${fanOut} downstream tasks` };
  return { level:'LOW', color:'var(--accent)', bg:'rgba(79,142,247,.08)', reason: daysToMs ? `Next milestone in ${daysToMs}d` : 'No immediate milestone dependency' };
}

// ── Full case file renderer ───────────────────────────────────────────────────
function renderTaskDetail(t) {
  const caseId = 'case-' + (t.id||'').replace(/-/g,'').substring(0,12);
  const cls = t.cls || classifyTask(t);
  const clsColor = cls === 'blocked' ? '#f07a7a' : cls === 'technical' ? '#a78bfa' : 'var(--amber)';
  const allocColor = t.assigneeAlloc > 100 ? 'var(--red)' : t.assigneeAlloc > 80 ? 'var(--amber)' : 'var(--green)';
  const proj = _projects.find(p => p.id === t.project_id);
  const openReq = _requests.find(r => r.task_id === t.id ||
    (r.project_id === t.project_id && r.requested_resource_id === t.assigned_to));

  // Task-specific deliverables and dependencies
  const taskDeliverables = _deliverables.filter(d => d.task_id === t.id);
  const taskDeps = _dependencies.filter(d => d.predecessor_task_id === t.id || d.successor_task_id === t.id);
  const blockingInputs = taskDeliverables.filter(d => d.direction === 'input' && isDelivBlocking(d));
  const rootCauses = analyzeRootCause(t, taskDeliverables, taskDeps);
  const criticality = assessCriticality(t);
  const pctDisplay = Math.round((t.pct_complete||0) * (t.pct_complete <= 1 ? 100 : 1));

  // ── SITUATION PANEL ────────────────────────────────────────────────────────
  let html = `
    <div class="exc-classification ${cls}">${classificationLabel(cls)}</div>

    <div class="exc-detail-grid">
      <div class="exc-detail-cell">
        <div class="exc-detail-label">Assignee</div>
        ${(() => {
          // Gather all assignees: task_assignees junction + primary assigned_to
          const junctionAssignees = _taskAssignees
            .filter(a => a.task_id === t.id)
            .map(a => resolveAssignee(a.user_id || a.resource_id))
            .filter(Boolean);
          const primary = t.assigned_to ? resolveAssignee(t.assigned_to) : null;
          // Deduplicate
          const allAssignees = primary ? [primary, ...junctionAssignees.filter(a => a.id !== primary.id)] : junctionAssignees;
          if (allAssignees.length === 0) {
            return `<div class="exc-detail-val" style="color:#f07a7a">— Unassigned —</div>`;
          }
          return `<div class="exc-detail-val">${escHtml(allAssignees[0].first_name+' '+allAssignees[0].last_name)}</div>
            ${allAssignees.length > 1 ? `<div style="margin-top:3px">${allAssignees.slice(1).map(a=>`<span style="font-size:10px;background:rgba(0,210,255,.08);border:1px solid rgba(0,210,255,.2);color:var(--cyan);padding:1px 6px;border-radius:3px;margin-right:3px">${escHtml(a.first_name+' '+a.last_name)}</span>`).join('')}</div>` : ''}
            <div class="exc-detail-sub" style="color:${allocColor}">${t.assigneeAlloc}% allocation${t.assigneeAlloc > 100 ? ' — OVER' : ''}</div>`;
        })()}
        <div id="assignees-display-${t.id?.replace(/-/g,'').substring(0,12)}" style="margin-top:3px"></div>
        <button class="case-action-btn" style="margin-top:6px;width:100%;text-align:left" onclick="openResourcePicker('${t.id}',event)">
          👤 ${t.assigned_to && t.assignee ? 'Change / Add Assignees' : 'Assign Resource →'}
        </button>
      </div>
      <div class="exc-detail-cell">
        <div class="exc-detail-label">Phase</div>
        <div class="exc-detail-val">${escHtml(t.phase||'—')}</div>
        <div class="exc-detail-sub">${escHtml(proj?.name||'—')}</div>
        <div class="exc-detail-sub" style="margin-top:4px">${pctDisplay}% complete</div>
      </div>
      <div class="exc-detail-cell" style="border-color:${criticality.color};border-left:2px solid ${criticality.color}">
        <div class="exc-detail-label">Criticality</div>
        <div class="exc-detail-val" style="color:${criticality.color};font-size:14px">${criticality.level}</div>
        <div class="exc-detail-sub">${escHtml(criticality.reason)}</div>
      </div>
    </div>

    ${openReq ? `<div style="font-size:11px;color:var(--accent);margin-bottom:8px;padding:5px 8px;
        background:rgba(79,142,247,.06);border:1px solid rgba(79,142,247,.2);border-radius:4px">
        ⬡ Resource request already open — ${(openReq.urgency||'unknown').toUpperCase()} · ${openReq.status}
        <a href="/resource-requests.html" onclick="event.stopPropagation()"
           style="color:var(--cyan);margin-left:8px;text-decoration:none">View →</a>
      </div>` : ''}`;

  // ── ROOT CAUSE PANEL ───────────────────────────────────────────────────────
  html += `<div class="exc-suggestion" style="margin-bottom:10px">
    <div class="exc-suggestion-label">Why Is This Overdue?</div>`;
  if (rootCauses.length > 0) {
    rootCauses.forEach(rc => {
      html += `<div style="display:flex;gap:8px;margin-top:6px;padding-top:6px;border-top:1px solid rgba(255,255,255,.05)">
        <span style="font-size:14px;flex-shrink:0">${rc.icon}</span>
        <div><div style="font-size:11px;font-weight:700;color:var(--text);margin-bottom:2px">${escHtml(rc.label)}</div>
        <div style="font-size:11px;color:var(--muted)">${escHtml(rc.detail)}</div></div>
      </div>`;
    });
  } else {
    html += `<div style="font-size:11px;color:var(--muted);margin-top:4px">${escHtml(t.suggestion || suggestNextAction(t, cls, t.assigneeAlloc, !!openReq))}</div>`;
  }
  html += `</div>`;

  // ── INPUTS & OUTPUTS PANE ──────────────────────────────────────────────────
  const inputs  = taskDeliverables.filter(d => d.direction === 'input');
  const outputs = taskDeliverables.filter(d => d.direction === 'output');
  const blockingCount = inputs.filter(d => isDelivBlocking(d)).length;

  html += `<div class="case-pane">
    <div class="case-pane-header" onclick="toggleCasePane('${caseId}-io',event)">
      <div class="case-pane-title">
        <span class="pane-icon">📄</span> Inputs &amp; Outputs
        ${blockingCount > 0 ? `<span style="color:#f07a7a;font-size:9px">(${blockingCount} blocking)</span>` : ''}
        ${inputs.length === 0 && outputs.length === 0 ? '<span style="color:var(--text3)">None defined</span>' : `<span style="color:var(--text3)">${inputs.length} in · ${outputs.length} out</span>`}
      </div>
      <div style="display:flex;align-items:center;gap:6px">
        <button class="case-action-btn" style="font-size:9px;padding:2px 8px" onclick="openAddInput('${t.id}',event)">+ Add Input</button>
        <div class="case-pane-arrow" id="${caseId}-io-arrow">▼</div>
      </div>
    </div>
    <div class="case-pane-body" id="${caseId}-io">`;

  if (inputs.length > 0) {
    html += `<div style="font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:6px">Required Inputs</div>`;
    inputs.forEach(d => {
      const color = delivStateColor(d.current_state, d.minimum_state);
      const blocking = isDelivBlocking(d);
      html += `<div class="deliv-row">
        <div class="deliv-state-dot" style="background:${color}"></div>
        <div style="flex:1;min-width:0">
          <div class="deliv-name">${escHtml(d.name)}${blocking ? '<span class="deliv-blocking">BLOCKING</span>' : ''}</div>
          <div class="deliv-meta">${escHtml(d.deliverable_type||'—')} · Current: <strong style="color:${color}">${delivStateLabel(d.current_state)}</strong> · Required: ${d.minimum_state||'—'}
          ${d.source_external ? ` · Source: ${escHtml(d.source_external)}` : ''}
          ${!d.is_required ? ' · <em>Optional</em>' : ''}</div>
        </div>
      </div>`;
    });
  }
  if (outputs.length > 0) {
    html += `<div style="font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin:${inputs.length?'12px':'0'} 0 6px">Outputs This Task Produces</div>`;
    outputs.forEach(d => {
      const color = d.current_state === 'released' ? 'var(--green)' : d.current_state === 'not_started' ? 'var(--muted)' : 'var(--amber)';
      html += `<div class="deliv-row">
        <div class="deliv-state-dot" style="background:${color}"></div>
        <div style="flex:1;min-width:0">
          <div class="deliv-name">${escHtml(d.name)}</div>
          <div class="deliv-meta">${escHtml(d.deliverable_type||'—')} · ${delivStateLabel(d.current_state)}${d.is_required ? ' · Required for downstream' : ''}</div>
        </div>
      </div>`;
    });
  }
  if (inputs.length === 0 && outputs.length === 0) {
    html += `<div style="font-size:11px;color:var(--text3);padding:6px 0">No inputs or outputs defined for this task yet.</div>`;
  }
  html += `</div></div>`;

  // ── DEPENDENCIES PANE ──────────────────────────────────────────────────────
  const upstream   = taskDeps.filter(d => d.successor_task_id === t.id);
  const downstream = taskDeps.filter(d => d.predecessor_task_id === t.id);

  html += `<div class="case-pane">
    <div class="case-pane-header" onclick="toggleCasePane('${caseId}-deps',event)">
      <div class="case-pane-title">
        <span class="pane-icon">🔗</span> Dependencies
        <span style="color:var(--text3)">${upstream.length} upstream · ${downstream.length} downstream</span>
      </div>
      <div class="case-pane-arrow" id="${caseId}-deps-arrow">▼</div>
    </div>
    <div class="case-pane-body" id="${caseId}-deps">`;

  if (upstream.length > 0) {
    html += `<div style="font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:6px">Upstream — must complete before this task</div>`;
    upstream.forEach(dep => {
      const pt = _tasks.find(t2 => t2.id === dep.predecessor_task_id);
      if (!pt) return;
      const pAssignee = resolveAssignee(pt.assigned_to);
      const pPct = Math.round((pt.pct_complete||0) * (pt.pct_complete <= 1 ? 100 : 1));
      const pColor = pt.status === 'complete' ? 'var(--green)' : pt.status === 'blocked' ? '#f07a7a' : pt.due_date && pt.due_date < new Date().toLocaleDateString('en-CA') ? 'var(--amber)' : 'var(--muted)';
      html += `<div class="dep-row">
        <span class="dep-dir upstream">↑ UP</span>
        <div class="dep-name">${escHtml(pt.name?.substring(0,35)||'—')}</div>
        <div class="dep-status" style="color:${pColor}">${escHtml(pt.status?.replace('_',' ')||'—')}</div>
        <div class="dep-pct" style="color:${pColor}">${pPct}%</div>
        <div style="font-size:10px;color:var(--muted);flex-shrink:0">${pAssignee ? escHtml(pAssignee.first_name+' '+pAssignee.last_name) : 'Unassigned'}</div>
      </div>`;
    });
  }
  if (downstream.length > 0) {
    html += `<div style="font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin:${upstream.length?'10px':'0'} 0 6px">Downstream — tasks this unblocks</div>`;
    downstream.forEach(dep => {
      const st = _tasks.find(t2 => t2.id === dep.successor_task_id);
      if (!st) return;
      const sPct = Math.round((st.pct_complete||0) * (st.pct_complete <= 1 ? 100 : 1));
      html += `<div class="dep-row">
        <span class="dep-dir downstream">↓ DOWN</span>
        <div class="dep-name">${escHtml(st.name?.substring(0,35)||'—')}</div>
        <div class="dep-status">${escHtml(st.status?.replace('_',' ')||'—')}</div>
        <div class="dep-pct">${sPct}%</div>
      </div>`;
    });
  }
  if (upstream.length === 0 && downstream.length === 0) {
    html += `<div style="font-size:11px;color:var(--text3);padding:6px 0">No dependencies recorded for this task.</div>`;
  }
  html += `</div></div>`;

  // ── ACTIONS PANE ───────────────────────────────────────────────────────────
  // Render existing action items for this task
  const taskActionItems = [];  // loaded async — placeholder rendered now, filled on open
  html += `<div class="case-pane">
    <div class="case-pane-header" onclick="toggleActionsPane('${caseId}-actions','${t.id}',event)">
      <div class="case-pane-title"><span class="pane-icon">⚡</span> Actions</div>
      <div class="case-pane-arrow" id="${caseId}-actions-arrow">▼</div>
    </div>
    <div class="case-pane-body" id="${caseId}-actions">
      <div id="${caseId}-action-items-list" style="margin-bottom:8px"></div>
      <div style="display:flex;flex-wrap:wrap;gap:8px;padding-top:6px">
        <button class="case-action-btn" style="background:rgba(0,210,255,.1);border-color:rgba(0,210,255,.35)" onclick="openAddActionItem('${t.id}','${t.project_id}',event)">✚ Add Action Item</button>
        <button class="case-action-btn amber" onclick="logAnnotation('${t.id}','note',event)">📝 Add Note</button>
        <button class="case-action-btn" onclick="logAnnotation('${t.id}','acknowledgment',event)">✓ Acknowledge</button>
        ${blockingInputs && blockingInputs.length > 0 ? `<button class="case-action-btn amber" onclick="logAnnotation('${t.id}','block_discovery',event)">📄 Flag Blocking Input</button>` : ''}
        ${!openReq ? `<button class="case-action-btn" onclick="raiseResourceRequest('${t.id}','${t.project_id}',event)">⬡ Raise Resource Request</button>` : ''}
        <button class="case-action-btn red" onclick="logAnnotation('${t.id}','escalation',event)">↑ Escalate</button>
      </div>
    </div>
  </div>`;

  // ── HISTORY (Chain of Custody) PANE ───────────────────────────────────────
  html += `<div class="case-pane">
    <div class="case-pane-header" onclick="loadAndToggleHistory('${t.id}','${caseId}-hist',event)">
      <div class="case-pane-title"><span class="pane-icon">📋</span> Chain of Custody</div>
      <div class="case-pane-arrow" id="${caseId}-hist-arrow">▼</div>
    </div>
    <div class="case-pane-body" id="${caseId}-hist">
      <div id="${caseId}-hist-content" style="font-size:11px;color:var(--text3);padding:6px 0">Loading history...</div>
    </div>
  </div>`;

  return html;
}

// ── Actions pane toggle — loads action items on open ─────────────────────────
async function toggleActionsPane(paneId, taskId, event) {
  if (event) event.stopPropagation();
  const body  = document.getElementById(paneId);
  const arrow = document.getElementById(paneId + '-arrow');
  if (!body) return;
  const open = body.classList.toggle('open');
  if (arrow) arrow.classList.toggle('open', open);
  if (!open) return;

  // Load and render action items for this task
  const listEl = document.getElementById(paneId.replace('-actions', '') + '-action-items-list');
  if (!listEl || listEl.dataset.loaded) return;
  listEl.dataset.loaded = '1';

  try {
    const items = await API.get(
      `action_items?project_id=eq.${_tasks.find(t=>t.id===taskId)?.project_id}&select=id,description,responsible,target_date,status,priority&order=created_at.desc`
    ).catch(()=>[]);
    _renderActionItemsList(listEl, items, taskId);
  } catch(e) {
    listEl.innerHTML = '<div style="font-size:10px;color:var(--muted)">Could not load action items.</div>';
  }
}

function _renderActionItemsList(listEl, items, taskId) {
  if (!items || items.length === 0) {
    listEl.innerHTML = '<div style="font-size:10px;color:var(--muted);font-style:italic;padding:4px 0">No action items yet.</div>';
    return;
  }
  const priColor = { critical:'#f07a7a', high:'#f07a7a', medium:'var(--amber)', low:'var(--muted)' };
  const today = new Date().toLocaleDateString('en-CA');
  listEl.innerHTML = items.map(item => {
    const done    = item.status === 'completed';
    const assignee = resolveAssignee(item.responsible);
    const aName    = assignee ? assignee.first_name+' '+assignee.last_name : '—';
    const initials = assignee ? (assignee.first_name[0]||'')+(assignee.last_name[0]||'') : '?';
    const pc       = priColor[item.priority] || 'var(--muted)';
    const overdue  = !done && item.target_date && item.target_date < today;
    const due      = item.target_date ? fmtDate(item.target_date) : null;

    // Status badge colours
    const badgeBg  = done ? 'rgba(42,157,64,.15)' : overdue ? 'rgba(192,64,74,.12)' : 'rgba(212,144,31,.12)';
    const badgeClr = done ? '#7af0a0'              : overdue ? '#f07a7a'              : 'var(--amber)';

    return `<div style="display:flex;align-items:flex-start;gap:8px;padding:7px 0;
        border-bottom:1px solid rgba(255,255,255,.04)"
        data-ai-id="${item.id}"
        data-ai-status="${item.status||'open'}">

      <!-- Checkbox -->
      <div style="width:15px;height:15px;border-radius:4px;flex-shrink:0;margin-top:2px;
          border:1px solid ${done?'var(--green)':'rgba(255,255,255,.14)'};
          background:${done?'var(--green)':'transparent'};
          display:flex;align-items:center;justify-content:center;
          cursor:pointer;font-size:9px;color:#fff"
          onclick="event.stopPropagation();_toggleActionItem(this)">
        ${done?'✓':''}
      </div>

      <!-- Body -->
      <div style="flex:1;min-width:0">
        <div style="font-size:11px;font-weight:500;line-height:1.45;margin-bottom:4px;
            color:${done?'var(--muted)':'var(--text)'};
            text-decoration:${done?'line-through':'none'}">
          ${escHtml(item.description)}
        </div>
        <div style="display:flex;align-items:center;gap:7px;flex-wrap:wrap">
          <!-- Priority dot + assignee -->
          <div style="display:flex;align-items:center;gap:4px">
            <div style="width:5px;height:5px;border-radius:50%;background:${pc};flex-shrink:0"></div>
            <div style="width:15px;height:15px;border-radius:50%;flex-shrink:0;
                background:rgba(79,142,247,.15);color:var(--accent);
                font-size:7px;font-weight:700;
                display:flex;align-items:center;justify-content:center">
              ${escHtml(initials)}
            </div>
            <span style="font-size:10px;color:var(--muted)">${escHtml(aName)}</span>
          </div>
          <!-- Due date -->
          ${due ? `<span style="font-size:10px;color:${overdue?'#f07a7a':'var(--muted)'}"
              data-due="${item.target_date}">
            ${overdue?'⚠ ':''}Due ${due}
          </span>` : ''}
          <!-- Status badge -->
          <span data-status-badge
              style="font-size:10px;padding:1px 6px;border-radius:4px;
              background:${badgeBg};color:${badgeClr}">
            ${(item.status||'open').replace('_',' ')}
          </span>
        </div>
      </div>
    </div>`;
  }).join('');
}

// Toggle action item status — PATCHes action_items.status, updates DOM in-place, no re-render
async function _toggleActionItem(checkboxEl) {
  const row       = checkboxEl.closest('[data-ai-id]');
  if (!row) return;
  const id        = row.dataset.aiId;
  const curStatus = row.dataset.aiStatus || 'open';
  const newStatus = curStatus === 'completed' ? 'open' : 'completed';

  try {
    await API.patch(`action_items?id=eq.${id}`, { status: newStatus });

    // Update row data attribute
    row.dataset.aiStatus = newStatus;
    const done = newStatus === 'completed';

    // Update checkbox appearance
    checkboxEl.style.background  = done ? 'var(--green)' : 'transparent';
    checkboxEl.style.borderColor = done ? 'var(--green)' : 'rgba(255,255,255,.14)';
    checkboxEl.textContent       = done ? '✓' : '';

    // Update description line-through + colour
    const descEl = row.querySelector('[style*="text-decoration"]');
    if (descEl) {
      descEl.style.textDecoration = done ? 'line-through' : 'none';
      descEl.style.color          = done ? 'var(--muted)' : 'var(--text)';
    }

    // Update status badge
    const badge = row.querySelector('[data-status-badge]');
    if (badge) {
      badge.textContent       = done ? 'completed' : 'open';
      badge.style.background  = done ? 'rgba(42,157,64,.15)' : 'rgba(212,144,31,.12)';
      badge.style.color       = done ? '#7af0a0'              : 'var(--amber)';
    }

    // Update overdue warning on due-date span
    const today = new Date().toLocaleDateString('en-CA');
    const dueSpan = row.querySelector('[data-due]');
    if (dueSpan) {
      const due = dueSpan.dataset.due;
      const isOverdue = due && due < today && !done;
      dueSpan.style.color = isOverdue ? '#f07a7a' : 'var(--muted)';
      dueSpan.textContent = (isOverdue ? '⚠ ' : '') + 'Due ' + fmtDate(due);
    }

  } catch(e) {
    console.error('_toggleActionItem error:', e);
    showToast('Could not update action item status', 'error');
  }
}

// After saving an action item, refresh the list in the open pane
async function _refreshActionItemsList(taskId) {
  const caseId = 'case-' + taskId.replace(/-/g,'').substring(0,12);
  const listEl = document.getElementById(caseId + '-action-items-list');
  if (!listEl) return;
  listEl.dataset.loaded = ''; // allow reload
  const task = _tasks.find(t=>t.id===taskId);
  const items = await API.get(
    `action_items?project_id=eq.${task?.project_id}&select=id,description,responsible,target_date,status,priority&order=created_at.desc`
  ).catch(()=>[]);
  _renderActionItemsList(listEl, items, taskId);
}

// ── Case pane toggle ──────────────────────────────────────────────────────────
function toggleCasePane(id, event) {
  if (event) event.stopPropagation();
  const body  = document.getElementById(id);
  const arrow = document.getElementById(id + '-arrow');

// ── Load and toggle history ───────────────────────────────────────────────────
async function loadAndToggleHistory(taskId, paneId, event) {
  if (event) event.stopPropagation();
  const body    = document.getElementById(paneId);
  const arrow   = document.getElementById(paneId + '-arrow');
  const content = document.getElementById(paneId + '-content');
  if (!body) return;

  const open = body.classList.toggle('open');
  if (arrow) arrow.classList.toggle('open', open);
  if (!open || !content) return;

  content.textContent = 'Loading...';
  try {
    const annotations = await API.get(
      `exception_annotations?entity_type=eq.task&entity_id=eq.${taskId}&order=occurred_at.desc&select=*`
    ).catch(()=>[]);

    if (!annotations || annotations.length === 0) {
      content.innerHTML = '<div style="color:var(--text3);font-style:italic;padding:4px 0">No history recorded yet. Actions taken from this card will appear here.</div>';
      return;
    }

    const typeLabel = { block_discovery:'Block Discovered', block_classification:'Classified', acknowledgment:'Acknowledged', intended_action:'Intent Recorded', intervention:'Intervention', escalation:'Escalated', note:'Note', resolution:'Resolved', unblocked:'Unblocked' };
    const typeColor = { block_discovery:'#f07a7a', escalation:'#f07a7a', acknowledgment:'var(--cyan)', resolution:'var(--green)', unblocked:'var(--green)', note:'var(--muted)', intervention:'var(--amber)' };

    content.innerHTML = annotations.map(a => {
      const actor = _resources.find(r => r.id === a.actor_resource_id);
      const actorName = actor ? actor.first_name + ' ' + actor.last_name : 'System';
      const color = typeColor[a.action_type] || 'var(--muted)';
      const label = typeLabel[a.action_type] || a.action_type;
      const ts = new Date(a.occurred_at).toLocaleString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
      // Resolve any raw UUIDs in notes text
      const resolvedNotes = a.notes ? a.notes.replace(/[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}/gi, id => {
        const r = resolveAssignee(id); return r ? r.first_name+' '+r.last_name : id;
      }) : '';
      return `<div class="hist-row" id="ann-${a.id}">
        <div class="hist-time">${ts}</div>
        <div style="flex:1;min-width:0">
          <div class="hist-type" style="color:${color}">${label}</div>
          <div class="hist-actor">${escHtml(actorName)}</div>
          ${resolvedNotes ? `<div class="hist-body">${escHtml(resolvedNotes)}</div>` : ''}
          ${a.intended_action ? `<div class="hist-body" style="color:var(--cyan)">Intent: ${escHtml(a.intended_action)}</div>` : ''}
          ${a.outcome ? `<div class="hist-body" style="color:var(--green)">Outcome: ${escHtml(a.outcome)}</div>` : ''}
        </div>
        <button onclick="deleteAnnotation('${a.id}',event)" title="Delete (dev)" style="background:none;border:none;color:var(--border2);cursor:pointer;font-size:13px;padding:2px 4px;flex-shrink:0;transition:color .15s" onmouseenter="this.style.color='#f07a7a'" onmouseleave="this.style.color='var(--border2)'">🗑</button>
      </div>`;
    }).join('');
  } catch(e) {
    content.textContent = 'Error loading history: ' + e.message;
  }
}

// ── Assign task ───────────────────────────────────────────────────────────────
async function assignTask(taskId, resourceId, event) {
  if (event) event.stopPropagation();
  if (!resourceId) return;
  try {
    await API.patch(`tasks?id=eq.${taskId}`, { assigned_to: resourceId });
    // Log annotation
    await API.post('exception_annotations', {
      firm_id: FIRM_ID, project_id: null, entity_type: 'task', entity_id: taskId,

// ── Resource Picker Modal ─────────────────────────────────────────────────────
let _rpTaskId = null;
let _rpSelected = [];  // array of resource IDs

function openResourcePicker(taskId, event) {
  if (event) event.stopPropagation();
  _rpTaskId = taskId;
  const task = _tasks.find(t => t.id === taskId);
  // Pre-populate with current assignee
  _rpSelected = task?.assigned_to ? [task.assigned_to] : [];

  const overlay = document.createElement('div');
  overlay.className = 'hud-modal-overlay';
  overlay.id = 'rp-overlay';
  overlay.onclick = e => { if (e.target === overlay) closeResourcePicker(); };

  const today = new Date();
  // Group resources by department
  const byDept = {};
  _resources.forEach(r => {
    const dept = r.department || 'Other';
    if (!byDept[dept]) byDept[dept] = [];
    byDept[dept].push(r);
  });

  const levelOrder = { principal:0, senior:1, staff:2, junior:3 };
  Object.values(byDept).forEach(arr => arr.sort((a,b) => (levelOrder[a.level]||9)-(levelOrder[b.level]||9) || a.last_name.localeCompare(b.last_name)));

  let tableHTML = '';
  Object.entries(byDept).sort(([a],[b])=>a.localeCompare(b)).forEach(([dept, resources]) => {
    tableHTML += `<div class="rp-dept-header">${escHtml(dept)}</div>
    <table class="rp-table">
      <thead><tr>
        <th>Name</th><th>Level / Title</th><th>Yrs Exp</th><th>% Allocated</th>
      </tr></thead><tbody>`;
    resources.forEach(r => {
      const alloc = _allocations.filter(a=>a.resource_id===r.id).reduce((s,a)=>s+(a.allocation_pct||0),0);
      const yrs = r.hire_date ? Math.floor((today - new Date(r.hire_date)) / (365.25*86400000)) : '—';
      const allocColor = alloc > 100 ? 'var(--red)' : alloc > 80 ? 'var(--amber)' : 'var(--green)';
      const levelLabel = { principal:'Principal', senior:'Senior', staff:'Staff', junior:'Junior' }[r.level] || (r.level||'');
      tableHTML += `<tr id="rp-row-${r.id}" class="${_rpSelected.includes(r.id)?'selected':''}" onclick="rpToggle('${r.id}','${escHtml(r.first_name+' '+r.last_name)}')">
        <td style="font-weight:600;color:var(--text)">${escHtml(r.first_name+' '+r.last_name)}</td>
        <td style="color:var(--muted)">${levelLabel}${r.title?` · ${escHtml(r.title)}`:''}  </td>
        <td style="font-family:var(--font-mono)">${yrs}</td>
        <td>
          <span style="color:${allocColor};font-weight:700;font-family:var(--font-mono)">${alloc}%</span>
          <span class="rp-alloc-bar"><span class="rp-alloc-fill" style="width:${Math.min(100,alloc)}%;background:${allocColor}"></span></span>
        </td>
      </tr>`;
    });
    tableHTML += '</tbody></table>';
  });

  overlay.innerHTML = `
    <div class="hud-modal" style="width:640px">
      <div class="hud-modal-header">
        <div class="hud-modal-title">Assign Resource(s) — ${escHtml(task?.name?.substring(0,40)||'Task')}</div>
        <button class="hud-modal-close" onclick="closeResourcePicker()">✕</button>
      </div>
      <div class="hud-modal-body">
        <div style="font-size:11px;color:var(--muted);margin-bottom:8px">Click to select one or more resources. For team tasks (e.g. design review) select all participants.</div>
        <div style="font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:4px">Selected</div>
        <div class="rp-selected-chips" id="rp-chips">
          ${_rpSelected.length === 0 ? '<span style="font-size:11px;color:var(--text3);padding:4px 6px">None selected</span>' : _rpSelected.map(id => {
            const r = _resources.find(r=>r.id===id);
            return r ? `<div class="rp-chip">${escHtml(r.first_name+' '+r.last_name)}<span class="rp-chip-x" onclick="rpToggle('${r.id}','',event)">×</span></div>` : '';
          }).join('')}
        </div>
        <input class="rp-search" placeholder="Search by name, title, department..." oninput="rpFilter(this.value)">
        <div id="rp-table-container">${tableHTML}</div>
      </div>
      <div class="hud-modal-footer">
        <button class="btn-cancel" onclick="closeResourcePicker()">Cancel</button>
        <button class="btn-save" onclick="confirmResourcePicker()">✓ Confirm Assignment</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
}

function rpToggle(resourceId, name, event) {
  if (event) event.stopPropagation();
  const idx = _rpSelected.indexOf(resourceId);
  if (idx >= 0) _rpSelected.splice(idx, 1);
  else _rpSelected.push(resourceId);
  // Update row highlight
  const row = document.getElementById('rp-row-' + resourceId);
  if (row) row.classList.toggle('selected', _rpSelected.includes(resourceId));
  // Update chips
  const chips = document.getElementById('rp-chips');
  if (chips) {
    if (_rpSelected.length === 0) {
      chips.innerHTML = '<span style="font-size:11px;color:var(--text3);padding:4px 6px">None selected</span>';
    } else {
      chips.innerHTML = _rpSelected.map(id => {
        const r = _resources.find(r=>r.id===id);
        return r ? `<div class="rp-chip">${escHtml(r.first_name+' '+r.last_name)}<span class="rp-chip-x" onclick="rpToggle('${r.id}','',event)">×</span></div>` : '';
      }).join('');
    }
  }
}

function rpFilter(query) {
  const q = query.toLowerCase();
  document.querySelectorAll('#rp-table-container tr[id^="rp-row-"]').forEach(row => {
    const text = row.textContent.toLowerCase();
    row.style.display = !q || text.includes(q) ? '' : 'none';
  });
}

function closeResourcePicker() {
  const overlay = document.getElementById('rp-overlay');
  if (overlay) overlay.remove();
}

async function confirmResourcePicker() {
  if (!_rpTaskId || _rpSelected.length === 0) {
    showToast('Select at least one resource', 'warning'); return;
  }
  // Assign primary (first selected) to task.assigned_to
  const primaryId = _rpSelected[0];
  const primaryRes = _resources.find(r=>r.id===primaryId);
  const names = _rpSelected.map(id=>{const r=resolveAssignee(id);return r?r.first_name+' '+r.last_name:id;}).join(', ');
  try {
    await API.patch(`tasks?id=eq.${_rpTaskId}`, { assigned_to: primaryId });
    const task = _tasks.find(t=>t.id===_rpTaskId);
    if (task) task.assigned_to = primaryId;

    // Write all selected to task_assignees junction — clear then re-insert
    await API.del(`task_assignees?task_id=eq.${_rpTaskId}&firm_id=eq.${FIRM_ID}`).catch(()=>{});
    const insertErrors = [];
    for (const rid of _rpSelected) {
      // Determine if ID belongs to users table or resources table
      const isUser     = !!_users.find(u => u.id === rid);
      const isResource = !!_resources.find(r => r.id === rid);
      // Skip if ID not found in either — prevents FK violations
      if (!isUser && !isResource) { insertErrors.push(rid); continue; }
      const result = await API.post('task_assignees', {
        firm_id: FIRM_ID, task_id: _rpTaskId,
        user_id:     isUser ? rid : null,
        resource_id: isResource ? rid : null,
        role: 'assignee',
      }).catch(e => { insertErrors.push(rid+':'+e.message); return null; });
    }
    if (insertErrors.length) console.warn('task_assignees insert errors:', insertErrors);
    // Update local cache
    _taskAssignees = _taskAssignees.filter(a => a.task_id !== _rpTaskId);
    _rpSelected.forEach(rid => {
      const isUser     = !!_users.find(u => u.id === rid);
      const isResource = !!_resources.find(r => r.id === rid);
      if (isUser || isResource) {
        _taskAssignees.push({ task_id: _rpTaskId, firm_id: FIRM_ID,
          user_id: isUser ? rid : null, resource_id: isResource ? rid : null });
      }
    });

    // Log to CoC
    await API.post('exception_annotations', {
      firm_id: FIRM_ID, project_id: task?.project_id||null,
      entity_type:'task', entity_id:_rpTaskId,
      actor_resource_id: CURRENT_USER_RESOURCE_ID, action_type:'intervention',
      notes: `Task assigned to: ${names}${_rpSelected.length>1?' (team assignment)':''}`,
      occurred_at: new Date().toISOString(),
    });
    closeResourcePicker();
    showToast(`Assigned to ${names} — recorded in chain of custody`, 'success');
    _patchTaskDisplayInPlace(_rpTaskId, primaryId, names);
  } catch(e) {
    showToast('Error: ' + e.message, 'error');
  }
}

// ── Set exception priority — persists to DB, updates local state + DOM ──────────
async function setPriority(taskId, priority, btnEl, event) {
  if (event) event.stopPropagation();
  try {
    await API.patch(`tasks?id=eq.${taskId}`, { exception_priority: priority });
    // Update local task state
    const t = _tasks.find(t => t.id === taskId);
    if (t) t.exception_priority = priority;

    // Update button states in this row — find all pri-btns in the same row
    const row = btnEl.closest('.exc-group-item, .exc-detail-cell, div');
    const allBtns = btnEl.parentElement.querySelectorAll('.pri-btn');
    allBtns.forEach(b => {
      b.classList.toggle('active', b.classList.contains(priority));
    });
    // Hide the "unset" label if present
    const unsetSpan = btnEl.parentElement.querySelector('.pri-unset');
    if (unsetSpan) unsetSpan.remove();

    // Log to CoC
    await API.post('exception_annotations', {
      firm_id: FIRM_ID, project_id: t?.project_id||null,
      entity_type:'task', entity_id:taskId,
      actor_resource_id: CURRENT_USER_RESOURCE_ID,
      action_type:'note',
      notes: `Priority set to ${priority.toUpperCase()}`,
      occurred_at: new Date().toISOString(),
    });

    // Re-sort the group visually — move rows within parent
    const groupBody = btnEl.closest('.exc-group-body');
    if (groupBody) {
      const items = [...groupBody.querySelectorAll('.exc-group-item')];
      const priOrder = { high:1, medium:2, low:3 };
      const getItemPri = el => {
        const active = el.querySelector('.pri-btn.active');
        if (!active) return 0; // unset = top
        return priOrder[active.classList[1]] || 99;
      };
      items.sort((a,b) => getItemPri(a) - getItemPri(b));
      items.forEach(item => {
        const detail = item.nextElementSibling;
        groupBody.appendChild(item);
        if (detail && !detail.classList.contains('exc-group-item')) groupBody.appendChild(detail);
      });
    }

    showToast(`Priority set to ${priority.toUpperCase()}`, 'success');
  } catch(e) {
    showToast('Error setting priority: ' + e.message, 'error');
  }
}

// ── Inline patch — update assignee display without rebuilding the view ─────────
function _patchTaskDisplayInPlace(taskId, resourceId, names) {
  const res   = _resources.find(r => r.id === resourceId);
  if (!res) return;
  const alloc = _allocations.filter(a => a.resource_id === resourceId).reduce((s,a)=>s+(a.allocation_pct||0),0);
  const allocColor = alloc > 100 ? 'var(--red)' : alloc > 80 ? 'var(--amber)' : 'var(--green)';

  // Find the Assignee detail cell anywhere in the current expanded cards
  document.querySelectorAll('.exc-detail-cell').forEach(cell => {
    const lbl = cell.querySelector('.exc-detail-label');
    if (lbl?.textContent?.trim() !== 'Assignee') return;
    const valEl = cell.querySelector('.exc-detail-val');
    const subEl = cell.querySelector('.exc-detail-sub');
    if (valEl) { valEl.textContent = names; valEl.style.color = ''; }
    if (subEl) {
      subEl.textContent = alloc + '% total allocation' + (alloc > 100 ? ' — OVER-ALLOCATED' : '');
      subEl.style.color = allocColor;
    }
    const btn = cell.querySelector('.case-action-btn');
    if (btn) btn.textContent = '👤 Change / Add Assignees';
  });

  // Rebuild the full assignee display in-place
  const caseShort = taskId.replace(/-/g,'').substring(0,12);
  const chipDiv = document.getElementById('assignees-display-' + caseShort);
  if (chipDiv) {
    // Build chips for all task_assignees
    const allForTask = _taskAssignees.filter(a => a.task_id === taskId);
    const extras = allForTask
      .map(a => resolveAssignee(a.user_id || a.resource_id))
      .filter(r => r && r.id !== resourceId);
    chipDiv.innerHTML = extras.length > 0
      ? extras.map(r => `<span style="font-size:10px;background:rgba(0,210,255,.08);border:1px solid rgba(0,210,255,.2);color:var(--cyan);padding:1px 6px;border-radius:3px;margin-right:3px">${escHtml(r.first_name+' '+r.last_name)}</span>`).join('')
      : '';
  }
}

async function saveAddActionItem(taskId, projectId, event) {
  if (event) event.stopPropagation();
  const desc        = document.getElementById('aim-desc')?.value?.trim();
  const responsible = document.getElementById('aim-responsible')?.value;
  const targetDate  = document.getElementById('aim-target')?.value;
  if (!desc)        { showToast('Description is required', 'warning'); return; }
  if (!responsible) { showToast('Please assign to someone', 'warning'); return; }
  if (!targetDate)  { showToast('Due date is required', 'warning'); return; }

  const task = _tasks.find(t => t.id === taskId);
  try {
    // submitted_by must be a users.id — find current user in _users
    const currentUser = _users.find(u =>
      u.resource_id === CURRENT_USER_RESOURCE_ID ||
      u.name?.toLowerCase().includes('vaughn')
    );
    const submittedBy = currentUser?.id || _users[0]?.id;

    // responsible: if selected ID is a resource not in users, map via resource_id
    let responsibleUserId = responsible;
    const isUser = _users.find(u => u.id === responsible);
    if (!isUser) {
      // It's a resource ID — find matching user by resource_id
      const matchUser = _users.find(u => u.resource_id === responsible);
      if (matchUser) responsibleUserId = matchUser.id;
      // If still no match (extended resource staff), keep the ID but warn
    }

    const payload = {
      firm_id:       FIRM_ID,
      project_id:    projectId || null,
      submitted_by:  submittedBy,
      description:   desc,
      responsible:   responsibleUserId,
      target_date:   targetDate,
      assigned_date: new Date().toLocaleDateString('en-CA'),
      priority:      document.getElementById('aim-priority')?.value || 'medium',
      source:        document.getElementById('aim-source')?.value   || 'internal',
      deliverable:   document.getElementById('aim-deliverable')?.value?.trim() || null,
      comments:      document.getElementById('aim-comments')?.value?.trim()    || null,
      status:        'open',
    };
    await API.post('action_items', payload);

    // Also log to CoC
    const assignee = resolveAssignee(responsible);
    const assigneeName = assignee ? assignee.first_name+' '+assignee.last_name : responsible;
    await API.post('exception_annotations', {
      firm_id: FIRM_ID, project_id: projectId||null,
      entity_type:'task', entity_id: taskId,
      actor_resource_id: CURRENT_USER_RESOURCE_ID,
      action_type: 'action_item',
      notes: `Action item created: "${desc}" — assigned to ${assigneeName}, due ${targetDate}`,
      occurred_at: new Date().toISOString(),
    });

    document.getElementById('ai-modal-overlay')?.remove();
    showToast('Action item saved', 'success');

    // Refresh action items list in the open pane
    await _refreshActionItemsList(taskId);

    // Refresh CoC if open
    const caseId = 'case-' + taskId.replace(/-/g,'').substring(0,12);
    const histBody = document.getElementById(caseId+'-hist');
    if (histBody?.classList.contains('open')) {
      const histContent = document.getElementById(caseId+'-hist-content');
      if (histContent) await _refreshCoCContent(taskId, histContent);
    }
  } catch(e) {
    showToast('Error saving: ' + e.message, 'error');
  }
}

// ── Shared CoC content refresh ────────────────────────────────────────────────
async function _refreshCoCContent(taskId, contentEl) {
  const annotations = await API.get(
    `exception_annotations?entity_type=eq.task&entity_id=eq.${taskId}&order=occurred_at.desc&select=*`
  ).catch(()=>[]);

  const typeLabel = { block_discovery:'Block Discovered', block_classification:'Classified',
    acknowledgment:'Acknowledged', intended_action:'Intent Recorded', intervention:'Intervention',
    escalation:'Escalated', note:'Note', resolution:'Resolved', unblocked:'Unblocked',
    action_item:'Action Item Created' };
  const typeColor = { block_discovery:'#f07a7a', escalation:'#f07a7a',
    acknowledgment:'var(--cyan)', resolution:'var(--green)', unblocked:'var(--green)',
    note:'var(--muted)', intervention:'var(--amber)', action_item:'var(--cyan)' };

  if (!annotations.length) {
    contentEl.innerHTML = '<div style="color:var(--text3);font-style:italic;padding:4px 0">No history recorded yet. Actions taken from this card will appear here.</div>';
    return;
  }
  contentEl.innerHTML = annotations.map(a => {
    const actor = resolveAssignee(a.actor_resource_id);
    const actorName = actor ? actor.first_name+' '+actor.last_name : 'System';
    const color = typeColor[a.action_type] || 'var(--muted)';
    const label = typeLabel[a.action_type] || a.action_type;
    const ts = new Date(a.occurred_at).toLocaleString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
    const resolvedNotes = a.notes ? a.notes.replace(/[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}/gi, id => {
      const r = resolveAssignee(id); return r ? r.first_name+' '+r.last_name : id;
    }) : '';
    return `<div class="hist-row" id="ann-${a.id}">
      <div class="hist-time">${ts}</div>
      <div style="flex:1;min-width:0">
        <div class="hist-type" style="color:${color}">${label}</div>
        <div class="hist-actor">${escHtml(actorName)}</div>
        ${resolvedNotes ? `<div class="hist-body">${escHtml(resolvedNotes)}</div>` : ''}
        ${a.intended_action ? `<div class="hist-body" style="color:var(--cyan)">Intent: ${escHtml(a.intended_action)}</div>` : ''}
        ${a.outcome ? `<div class="hist-body" style="color:var(--green)">Outcome: ${escHtml(a.outcome)}</div>` : ''}
      </div>
      <button onclick="deleteAnnotation('${a.id}',event)" title="Delete (dev)" style="background:none;border:none;color:var(--border2);cursor:pointer;font-size:13px;padding:2px 4px;flex-shrink:0;transition:color .15s" onmouseenter="this.style.color='#f07a7a'" onmouseleave="this.style.color='var(--border2)'">🗑</button>
    </div>`;
  }).join('');
}

// ── Add Input modal ───────────────────────────────────────────────────────────

  const task = _tasks.find(t=>t.id===taskId);
  const overlay = document.createElement('div');

  overlay.id = 'add-input-overlay';
  overlay.onclick = e => { if (e.target===overlay) overlay.remove(); };

  const typeOptions = ['drawing','specification','test_report','approval','material_cert','procedure','analysis','model','prototype','other']
    .map(t=>`<option value="${t}">${t.replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase())}</option>`).join('');
  const stateOptions = ['completed','approved','released'].map(s=>`<option value="${s}">${s}</option>`).join('');

  overlay.innerHTML = `
    <div class="hud-modal" style="width:480px">
      <div class="hud-modal-header">
        <div class="hud-modal-title">Add Required Input — ${escHtml(task?.name?.substring(0,30)||'Task')}</div>
        <button class="hud-modal-close" onclick="this.closest('.hud-modal-overlay').remove()">✕</button>
      </div>
      <div class="hud-modal-body">
        <div class="hud-field-label">Input Name *</div>
        <input class="hud-input" id="ai-name" placeholder="e.g. PCB Layout Drawing Rev B">
        <div class="hud-field-label">Type</div>
        <select class="hud-select" id="ai-type">${typeOptions}</select>
        <div class="hud-field-label">Description</div>
        <textarea class="hud-textarea" id="ai-desc" placeholder="What this document or artifact must contain..." rows="2"></textarea>
        <div class="hud-field-label">Source (if external)</div>
        <input class="hud-input" id="ai-source" placeholder="e.g. Vendor: PCB Manufacturer, Client: Approval">
        <div class="hud-field-label">Minimum Required State</div>
        <select class="hud-select" id="ai-state">${stateOptions}</select>
        <div style="display:flex;align-items:center;gap:8px;margin-top:12px">
          <input type="checkbox" id="ai-required" checked>
          <label for="ai-required" style="font-size:11px;color:var(--text)">Hard gate — task cannot start without this input</label>

      <div class="hud-modal-footer">

async function saveNewInput(taskId, event) {
  if (event) event.stopPropagation();
  const name = document.getElementById('ai-name')?.value?.trim();
  if (!name) { showToast('Name is required', 'warning'); return; }
  const task = _tasks.find(t=>t.id===taskId);
  try {
    const [created] = await API.post('task_deliverables', {
      firm_id: FIRM_ID, task_id: taskId,
      direction:'input',
      deliverable_type: document.getElementById('ai-type')?.value || 'other',
      name,
      description: document.getElementById('ai-desc')?.value?.trim() || null,
      source_external: document.getElementById('ai-source')?.value?.trim() || null,
      minimum_state: document.getElementById('ai-state')?.value || 'approved',
      is_required: document.getElementById('ai-required')?.checked !== false,
      current_state: 'not_started',
      sequence_order: _deliverables.filter(d=>d.task_id===taskId&&d.direction==='input').length + 1,
    });
    if (created) _deliverables.push(created);
    document.getElementById('add-input-overlay')?.remove();
    showToast('Input added', 'success');
    renderView('exceptions');
  } catch(e) {
    showToast('Error: '+e.message, 'error');
  }
}

// ── Resource Request modal ────────────────────────────────────────────────────
function raiseResourceRequest(taskId, projectId, event) {
  if (event) event.stopPropagation();

  ).join('');

  overlay.innerHTML = `
    <div class="hud-modal" style="width:520px">
      <div class="hud-modal-header">
        <div class="hud-modal-title">Raise Resource Request</div>
        <button class="hud-modal-close" onclick="this.closest('.hud-modal-overlay').remove()">✕</button>
      </div>
      <div class="hud-modal-body">
        <div style="font-size:11px;color:var(--muted);margin-bottom:10px;padding:6px 8px;background:rgba(0,0,0,.2);border-radius:4px">
          Task: <strong style="color:var(--text)">${escHtml(task?.name||'—')}</strong> · ${escHtml(proj?.name||'—')}
        </div>
        <div class="hud-field-label">Resource Needed *</div>
        <select class="hud-select" id="rr-resource">${resOptions}</select>
        <div class="hud-field-label">Urgency</div>
        <select class="hud-select" id="rr-urgency">
          <option value="high">HIGH</option>
          <option value="critical">CRITICAL</option>
          <option value="medium">MEDIUM</option>
          <option value="low">LOW</option>
        </select>
        <div class="hud-field-label">Allocation % Requested</div>
        <input class="hud-input" id="rr-alloc" type="number" min="10" max="100" step="10" value="50" style="width:100px">
        <div class="hud-field-label">Proposed Start Date</div>
        <input class="hud-input" id="rr-start" type="date" value="${new Date().toLocaleDateString('en-CA')}" style="width:160px">
        <div class="hud-field-label">What is failing and why is this resource needed? *</div>
        <textarea class="hud-textarea" id="rr-context" placeholder="Describe the specific situation and what the resource will do..." rows="3"></textarea>
        <div class="hud-field-label">Impact if not resolved</div>
        <textarea class="hud-textarea" id="rr-impact" placeholder="Milestone at risk, client consequence, cost impact..." rows="2"></textarea>
        <div class="hud-field-label">What has already been tried?</div>
        <textarea class="hud-textarea" id="rr-tried" placeholder="Resources already approached, alternatives considered..." rows="2"></textarea>
      </div>
      <div class="hud-modal-footer">
        <button class="btn-cancel" onclick="this.closest('.hud-modal-overlay').remove()">Cancel</button>
        <button class="btn-save" onclick="submitResourceRequest('${taskId}','${projectId}',event)">⬡ Submit Request</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
}

async function submitResourceRequest(taskId, projectId, event) {
  if (event) event.stopPropagation();
  const context = document.getElementById('rr-context')?.value?.trim();
  const resourceId = document.getElementById('rr-resource')?.value;
  if (!context || !resourceId) { showToast('Resource and context are required', 'warning'); return;  }

  const task = _tasks.find(t=>t.id===taskId);
  const approverRes = _resources.find(r=>r.id!==CURRENT_USER_RESOURCE_ID);
  try {
    const [req] = await API.post('resource_requests', {
      firm_id: FIRM_ID,
      requesting_resource_id: CURRENT_USER_RESOURCE_ID,
      requested_resource_id: resourceId,
      approver_resource_id: approverRes?.id || CURRENT_USER_RESOURCE_ID,
      project_id: projectId,
      task_id: taskId,
      urgency: document.getElementById('rr-urgency')?.value || 'high',
      allocation_pct: parseInt(document.getElementById('rr-alloc')?.value)||50,
      proposed_start: document.getElementById('rr-start')?.value || null,
      context,
      impact_statement: document.getElementById('rr-impact')?.value?.trim() || null,
      attempts_made: document.getElementById('rr-tried')?.value?.trim() || null,
      status: 'pending',
      submitted_at: new Date().toISOString(),
      sla_tier1_hours: 4, sla_tier2_hours: 24, sla_tier3_hours: 48,
    });
    if (req) {
      await API.post('resource_request_events', {
        firm_id: FIRM_ID, request_id: req.id,
        actor_resource_id: CURRENT_USER_RESOURCE_ID, actor_role:'pm',
        event_type:'submitted', heartbeat_tier:0,
        notes:'Request submitted from Exception Triage', occurred_at: new Date().toISOString(),
      });
      _requests.push(req);
    }
    document.getElementById('rr-overlay')?.remove();
    showToast('Resource request submitted — view in Requests page', 'success');
    // Don't re-render — would collapse expanded panes
  } catch(e) {
    showToast('Error: '+e.message, 'error');
  }
}

// ── Delete annotation (dev mode) ─────────────────────────────────────────────
async function deleteAnnotation(annotationId, event) {
  if (event) event.stopPropagation();
  if (!confirm('Delete this chain of custody entry? (Development only)')) return;
  try {
    await API.del(`exception_annotations?id=eq.${annotationId}`);
    const row = document.getElementById('ann-' + annotationId);
    if (row) row.remove();
    showToast('Entry deleted', 'success');
  } catch(e) {
    showToast('Error: ' + e.message, 'error');
  }
}

// ── Task name hover tooltip ───────────────────────────────────────────────────
let _taskTipEl = null;
let _taskTipTimer = null;

function showTaskTip(taskId, anchorEl, event) {
  clearTimeout(_taskTipTimer);
  _taskTipTimer = setTimeout(() => {
    const task = _tasks.find(t=>t.id===taskId);
    if (!task) return;

    // Get all tasks in same phase
    const phaseTasks = _tasks
      .filter(t => t.project_id === task.project_id && t.phase === task.phase)
      .sort((a,b) => (a.sequence_order||0)-(b.sequence_order||0));

    // Get dependency IDs for this task
    const myDeps = _dependencies.filter(d => d.predecessor_task_id===taskId||d.successor_task_id===taskId);

    const statusColor = { complete:'var(--green)', in_progress:'var(--cyan)', blocked:'#f07a7a', not_started:'var(--muted)' };

    let rows = phaseTasks.map(t => {
      const isCurrent = t.id === taskId;
      const assignee = resolveAssignee(t.assigned_to);
      const aName = assignee ? assignee.first_name+' '+assignee.last_name : '—';
      const sc = statusColor[t.status] || 'var(--muted)';
      const pct = Math.round((t.pct_complete||0) * (t.pct_complete<=1?100:1));
      const depCount = _dependencies.filter(d=>d.predecessor_task_id===t.id||d.successor_task_id===t.id).length;
      return `<div class="task-tip-row${isCurrent?' current':''}">
        <div style="color:${isCurrent?'#ffd700':'var(--text)'};font-weight:${isCurrent?700:400}">${escHtml(t.name?.substring(0,38)||'—')}</div>
        <div style="color:var(--muted);font-size:10px">${escHtml(aName.substring(0,18))}</div>
        <div style="color:${sc};font-size:10px">${t.status?.replace('_',' ')||'—'} ${pct>0?pct+'%':''}</div>
        <div style="color:var(--muted);font-size:10px">${depCount>0?depCount+' dep':''}</div>
      </div>`;
    }).join('');

    if (!_taskTipEl) {
      _taskTipEl = document.createElement('div');
      _taskTipEl.className = 'task-tip';
      document.body.appendChild(_taskTipEl);
    }
    _taskTipEl.innerHTML = `
      <div class="task-tip-phase">${escHtml(task.phase||'Phase')} — ${phaseTasks.length} tasks</div>
      <div class="task-tip-row header">
        <div>Task</div><div>Assignee</div><div>Status</div><div>Deps</div>
      </div>
      ${rows}`;

    // Position
    const rect = anchorEl.getBoundingClientRect();
    const tipW = 420;
    const left = Math.min(rect.left, window.innerWidth - tipW - 16);
    const top  = rect.bottom + 8;
    _taskTipEl.style.cssText = `left:${left}px;top:${top}px;display:block`;
  }, 300);
}

function hideTaskTip() {
  clearTimeout(_taskTipTimer);
  if (_taskTipEl) _taskTipEl.style.display = 'none';
}

function toggleExcCard(id) {
  const detail = document.getElementById(id);
  const arrow  = document.getElementById(id + '-arrow');
  if (!detail) return;
  const isOpen = detail.classList.contains('open') || detail.style.display === 'block';
  if (detail.classList.contains('exc-detail')) {
    detail.classList.toggle('open', !isOpen);
  } else {
    detail.style.display = isOpen ? 'none' : 'block';
  }
  if (arrow) arrow.classList.toggle('open', !isOpen);

  // When opening: auto-open Chain of Custody pane
  if (!isOpen) {
    // Extract taskId from the detail container — find the loadAndToggleHistory button
    const histBtn = detail.querySelector?.('[onclick*="loadAndToggleHistory"]');
    if (histBtn) {
      const match = histBtn.getAttribute('onclick')?.match(/loadAndToggleHistory\('([^']+)'/);
      if (match) {
        const taskId = match[1];
        const caseId = 'case-' + taskId.replace(/-/g,'').substring(0,12);
        const histPaneId = caseId + '-hist';
        const histBody = document.getElementById(histPaneId);
        if (histBody && !histBody.classList.contains('open')) {
          loadAndToggleHistory(taskId, histPaneId, null);
        }
      }
    }
  }
}

function toggleExcGroup(id) {
  const body  = document.getElementById(id);
  const arrow = document.getElementById(id + '-arrow');
  if (!body) return;
  const isOpen = body.classList.contains('open');
  body.classList.toggle('open', !isOpen);
  if (arrow) arrow.classList.toggle('open', !isOpen);
}

// ── Team view ─────────────────────────────────────────────────────────────────
function renderTeam(el) {
  // Group allocations by resource
  const resourceMap = {};
  _allocations.forEach(a => {
    if (!resourceMap[a.resource_id]) resourceMap[a.resource_id] = [];
    resourceMap[a.resource_id].push(a);
  });

  const cards = _resources.map(r => {
    const allocs     = resourceMap[r.id] || [];
    const totalPct   = allocs.reduce((s,a) => s + (a.allocation_pct||0), 0);
    const initials   = (r.first_name[0] + r.last_name[0]).toUpperCase();
    const overAlloc  = totalPct > 100;
    const allocColor = overAlloc ? 'var(--red)' : totalPct >= 100 ? 'var(--amber)' : 'var(--green)';
    const fillPct    = Math.min(100, totalPct);

    const projRows = allocs.map(a => {
      const proj = _projects.find(p => p.id === a.project_id);
      return `<div class="team-project-row">
        <span class="team-project-name">${escHtml(proj?.name?.substring(0,28)||'—')}</span>
        <span class="team-project-pct">${a.allocation_pct}%</span>
      </div>`;
    }).join('');

    const openReqs = _requests.filter(r2 =>
      r2.requested_resource_id === r.id ||
      r2.requesting_resource_id === r.id
    ).length;

    return `
    <div class="team-card">
      <div class="team-card-head">
        <div class="team-avatar">${initials}</div>
        <div>
          <div class="team-name">${escHtml(r.first_name + ' ' + r.last_name)}</div>
          <div class="team-title">${escHtml(r.title||'—')}</div>
        </div>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:5px">
        <span style="color:var(--muted)">Total allocation</span>
        <span style="color:${allocColor};font-weight:700">${totalPct}%${overAlloc?' ⚠':''}</span>
      </div>
      <div class="team-alloc-bar">
        <div class="team-alloc-fill" style="width:${fillPct}%;background:${allocColor}"></div>
      </div>
      ${projRows ? `<div class="team-projects">${projRows}</div>` : '<div style="font-size:11px;color:var(--text3);margin-top:8px">No current allocations</div>'}
      ${openReqs > 0 ? `<div style="margin-top:8px;font-size:10px;color:#f07a7a">
        ${openReqs} open resource request${openReqs!==1?'s':''}</div>` : ''}
    </div>`;
  }).join('');

  el.innerHTML = cards || '<div class="empty"><div class="title">No resources found</div></div>';
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function fmtDate(d) {
  if (!d) return '—';
  return new Date((d.includes('T') ? d : d + 'T00:00:00'))
    .toLocaleDateString('en-US', {month:'short', day:'numeric', year:'2-digit'});
}

function escHtml(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg, type='info') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `toast show`;
  el.style.borderColor = type === 'info' ? 'rgba(79,142,247,.4)' : 'rgba(42,157,64,.4)';
  setTimeout(() => el.classList.remove('show'), 3000);
}
