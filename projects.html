<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Projects — ProjectHUD</title>
<style>
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }

:root {
  --sidebar-w: 220px;
  --bg:      #0f1117;
  --bg1:     #0c1220;
  --bg2:     #111827;
  --surface: #181c27;
  --surf2:   #1e2436;
  --surf3:   #232a3e;
  --border:  rgba(255,255,255,.08);
  --border2: rgba(255,255,255,.14);
  --text:    #e8eaf0;
  --text0:   #e8f4ff;
  --text1:   #c8dff0;
  --text2:   #7a9bbf;
  --text3:   #3a5a7a;
  --muted:   #7a8099;
  --accent:  #4f8ef7;
  --cyan:    #00d2ff;
  --cyan-dim: rgba(0,210,255,.08);
  --green:   #2a9d40;
  --amber:   #d4901f;
  --red:     #c0404a;
  --purple:  #7c4dff;
  --font-hud:  'Rajdhani', 'Inter', sans-serif;
  --font-ui:   'Inter', system-ui, sans-serif;
  --font-mono: 'Share Tech Mono', monospace;
  --border-act: rgba(0,210,255,.25);
}

html, body { height:100%; overflow:hidden; }
body { font-family:var(--font-ui); background:var(--bg); color:var(--text);
       display:flex; flex-direction:column; }
#app  { display:flex; flex:1; overflow:hidden; }
#main { flex:1; display:flex; flex-direction:column; overflow:hidden; min-width:0; }

/* ── Sidebar (same as resource-requests.html) ── */
#sidebar { width:var(--sidebar-w); flex-shrink:0; background:var(--bg1);
           border-right:1px solid var(--border); display:flex; flex-direction:column;
           height:100%; overflow:hidden; }
.sidebar-logo { padding:16px 18px 14px; border-bottom:1px solid var(--border);
                display:flex; align-items:center; gap:10px; flex-shrink:0; }
.logo-mark { width:28px; height:28px; flex-shrink:0; }
.wordmark { font-family:var(--font-hud); font-size:18px; font-weight:700;
            letter-spacing:.08em; color:var(--text0); line-height:1; }
.wordmark span { color:var(--cyan); }
.firm { font-family:var(--font-mono); font-size:11px; color:var(--text3);
        letter-spacing:.18em; margin-top:3px; }
#sidebar-nav { flex:1; overflow-y:auto; padding:8px 10px; }
.nav-section-label { font-family:var(--font-mono); font-size:11px; color:var(--text3);
                     letter-spacing:.2em; padding:10px 8px 4px; }
.nav-item { display:flex; align-items:center; gap:9px; padding:9px 10px;
            border-left:2px solid transparent; cursor:pointer; font-size:13px;
            font-weight:500; color:var(--text2); letter-spacing:.04em;
            transition:all .12s; margin-bottom:1px; text-decoration:none; }
.nav-item:hover { color:var(--text0); background:rgba(0,210,255,.04); }
.nav-item.active { border-left-color:var(--cyan); background:var(--cyan-dim); color:var(--cyan); }
.nav-icon { font-size:13px; width:16px; text-align:center; flex-shrink:0; }
#operator { border-top:1px solid var(--border); padding:12px 14px; flex-shrink:0; }
.op-label { font-family:var(--font-mono); font-size:11px; color:var(--text3);
            letter-spacing:.2em; margin-bottom:8px; }
.op-user { display:flex; align-items:center; gap:9px; padding:8px 10px;
           background:var(--bg2); border:1px solid var(--border); margin-bottom:8px; }
.op-avatar { width:32px; height:32px; flex-shrink:0; background:#1a3a5a;
             border:1px solid rgba(0,210,255,.3); display:flex; align-items:center;
             justify-content:center; font-family:var(--font-hud); font-size:13px;
             font-weight:700; color:var(--cyan); }
.op-name { font-size:13px; font-weight:600; color:var(--text0); line-height:1.2; }
.op-role { font-family:var(--font-mono); font-size:11px; color:var(--amber);
           letter-spacing:.12em; margin-top:1px; }
.op-tools { display:flex; gap:6px; margin-bottom:8px; }
.op-btn { flex:1; padding:6px 0; background:transparent; border:1px solid var(--border);
          color:var(--text3); cursor:pointer; font-size:13px; display:flex;
          align-items:center; justify-content:center; transition:all .12s; }
.op-btn:hover { border-color:var(--cyan); color:var(--cyan); background:var(--cyan-dim); }
.op-version { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
.op-version span { font-family:var(--font-mono); font-size:11px; color:var(--text3); }
.nominal { display:flex; align-items:center; gap:5px; flex:1; }
.nominal-dot { width:5px; height:5px; background:var(--green); transform:rotate(45deg); }
.nominal-text { font-family:var(--font-mono); font-size:11px; color:var(--text2); letter-spacing:.1em; }
.op-notif { position:relative; background:none; border:1px solid var(--border);
            color:var(--text2); cursor:pointer; padding:3px 7px; font-size:12px; transition:all .12s; }
.op-logout { background:none; border:1px solid var(--border); color:var(--text3);
             cursor:pointer; padding:3px 8px; font-family:var(--font-mono);
             font-size:11px; letter-spacing:.1em; transition:all .12s; }
.op-logout:hover { border-color:var(--red); color:var(--red); }
.notif-badge { position:absolute; top:-5px; right:-5px; background:var(--red); color:#fff;
               font-size:10px; font-weight:700; width:15px; height:15px; border-radius:50%;
               display:flex; align-items:center; justify-content:center; }

/* ── Page header ── */
.page-header { padding:16px 24px 12px; border-bottom:1px solid var(--border);
               display:flex; align-items:flex-end; justify-content:space-between; flex-shrink:0; }
.page-title { font-family:var(--font-hud); font-size:22px; font-weight:700;
              letter-spacing:.06em; color:var(--text0); }
.page-subtitle { font-family:var(--font-mono); font-size:11px; color:var(--muted);
                 letter-spacing:.12em; margin-top:3px; }

/* ── View switcher ── */
.view-strip { display:flex; gap:2px; padding:0 24px;
              border-bottom:1px solid var(--border); flex-shrink:0; }
.view-btn { padding:10px 18px; font-size:11px; font-weight:600; letter-spacing:.08em;
            text-transform:uppercase; background:none; border:none; color:var(--muted);
            cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-1px;
            transition:all .15s; font-family:var(--font-ui); }
.view-btn.active { color:var(--cyan); border-bottom-color:var(--cyan); }
.view-btn:hover:not(.active) { color:var(--text); }

/* ── Milestone horizon strip ── */
.horizon { padding:12px 24px; border-bottom:1px solid var(--border);
           background:rgba(0,210,255,.02); flex-shrink:0; overflow-x:auto; }
.horizon-label { font-size:9px; font-weight:700; letter-spacing:.12em;
                 text-transform:uppercase; color:var(--muted); margin-bottom:8px; }
.horizon-track { display:flex; align-items:center; gap:6px; min-width:max-content; }
.milestone-pip { display:flex; flex-direction:column; align-items:center; gap:3px;
                 cursor:default; }
.milestone-pip .pip-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.milestone-pip .pip-name { font-size:9px; color:var(--muted); max-width:80px;
                           text-align:center; line-height:1.2; white-space:nowrap;
                           overflow:hidden; text-overflow:ellipsis; }
.milestone-pip .pip-date { font-family:var(--font-mono); font-size:9px; color:var(--text3); }
.horizon-connector { width:24px; height:1px; background:var(--border); flex-shrink:0; }
.horizon-today { width:2px; height:28px; background:var(--cyan); opacity:.4;
                 border-radius:1px; flex-shrink:0; position:relative; }
.horizon-today::after { content:'TODAY'; position:absolute; top:-14px; left:50%;
                        transform:translateX(-50%); font-size:8px; color:var(--cyan);
                        font-family:var(--font-mono); letter-spacing:.08em; white-space:nowrap; }

/* ── Content scroll area ── */
.content { flex:1; overflow-y:auto; padding:20px 24px 32px; }
.content::-webkit-scrollbar { width:4px; }
.content::-webkit-scrollbar-thumb { background:var(--border2); border-radius:2px; }

/* ── KPI strip ── */
.kpi-strip { display:grid; grid-template-columns:repeat(5,1fr); gap:10px; margin-bottom:20px; }
.kpi { background:var(--surface); border:1px solid var(--border); padding:12px 14px;
       border-top:2px solid; position:relative; }
.kpi-val { font-family:var(--font-hud); font-size:28px; font-weight:700; line-height:1; margin-bottom:4px; }
.kpi-lbl { font-size:10px; font-weight:700; letter-spacing:.1em; text-transform:uppercase;
           color:var(--muted); margin-bottom:2px; }
.kpi-sub { font-family:var(--font-mono); font-size:10px; color:var(--text3); }

/* ── Project card (Portfolio view) ── */
.proj-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(520px,1fr)); gap:14px; }
.proj-card { background:var(--surface); border:1px solid var(--border); border-radius:6px;
             overflow:hidden; cursor:pointer; transition:border-color .15s; }
.proj-card:hover { border-color:var(--border2); }
.proj-card.status-active  { border-left:3px solid var(--cyan); }
.proj-card.status-planning { border-left:3px solid var(--muted); }
.proj-card.status-on_hold  { border-left:3px solid var(--amber); }
.proj-card.status-complete { border-left:3px solid var(--green); opacity:.7; }

.proj-card-head { padding:14px 16px 10px; display:flex; align-items:flex-start;
                  justify-content:space-between; gap:12px; }
.proj-name { font-size:14px; font-weight:700; color:var(--text0); line-height:1.3; }
.proj-meta { font-size:11px; color:var(--muted); margin-top:3px; }
.proj-status-badge { font-size:9px; font-weight:700; letter-spacing:.1em; text-transform:uppercase;
                     padding:2px 8px; border-radius:3px; border:1px solid; flex-shrink:0; }
.proj-status-badge.active   { color:var(--cyan); border-color:rgba(0,210,255,.3); background:rgba(0,210,255,.06); }
.proj-status-badge.planning { color:var(--muted); border-color:var(--border2); background:transparent; }
.proj-status-badge.on_hold  { color:var(--amber); border-color:rgba(212,144,31,.3); background:rgba(212,144,31,.06); }
.proj-status-badge.complete { color:var(--green); border-color:rgba(42,157,64,.3); background:rgba(42,157,64,.06); }

/* EVM row */
.evm-row { display:grid; grid-template-columns:repeat(4,1fr); gap:1px;
           background:var(--border); border-top:1px solid var(--border);
           border-bottom:1px solid var(--border); }
.evm-cell { background:var(--surf2); padding:8px 12px; text-align:center; }
.evm-cell-label { font-size:9px; font-weight:700; letter-spacing:.1em; text-transform:uppercase;
                  color:var(--muted); margin-bottom:3px; }
.evm-cell-val { font-family:var(--font-hud); font-size:18px; font-weight:700; line-height:1; }

/* Progress bar */
.proj-progress { padding:10px 16px; }
.progress-bar-bg { height:4px; background:rgba(255,255,255,.06); border-radius:2px; overflow:hidden; }
.progress-bar-fg { height:100%; border-radius:2px; transition:width .3s; }
.progress-meta { display:flex; justify-content:space-between; font-size:10px;
                 color:var(--muted); margin-top:5px; }

/* Forecast + signals row */
.proj-footer { padding:10px 16px 12px; display:flex; align-items:center;
               justify-content:space-between; gap:10px; flex-wrap:wrap; }
.forecast-dates { display:flex; gap:12px; font-size:11px; }
.forecast-item { display:flex; flex-direction:column; gap:1px; }
.forecast-item .fl { font-size:9px; color:var(--muted); letter-spacing:.06em;
                     text-transform:uppercase; }
.forecast-item .fv { font-weight:600; }
.signal-badges { display:flex; gap:6px; align-items:center; }
.sig-badge { font-size:9px; font-weight:700; letter-spacing:.08em; padding:2px 7px;
             border-radius:3px; border:1px solid; }
.sig-badge.task { color:var(--amber); border-color:rgba(212,144,31,.3); background:rgba(212,144,31,.06); }
.sig-badge.request { color:#f07a7a; border-color:rgba(192,64,74,.3); background:rgba(192,64,74,.06); }
.sig-badge.milestone { color:var(--purple); border-color:rgba(124,77,255,.3); background:rgba(124,77,255,.06); }

/* Diagnosis */
.proj-diagnosis { padding:0 16px 10px; font-size:11px; color:var(--muted);
                  font-style:italic; line-height:1.5; }

/* ── Exceptions view ── */
.exception-list { display:flex; flex-direction:column; gap:8px; }
.exception-card { background:var(--surface); border:1px solid var(--border); border-radius:6px;
             overflow:hidden; cursor:pointer; transition:border-color .15s; }
.exception-card:hover { border-color:var(--border2); }
.exception-card.sev-critical { border-left:3px solid var(--red); }
.exception-card.sev-high     { border-left:3px solid var(--amber); }
.exception-card.sev-medium   { border-left:3px solid var(--accent); }
.exc-card-header { padding:11px 14px; display:flex; align-items:center; gap:12px; }
.exc-icon { width:30px; height:30px; border-radius:50%; display:flex; align-items:center;
            justify-content:center; font-size:13px; flex-shrink:0; }
.exc-icon.task      { background:rgba(212,144,31,.12); color:var(--amber); }
.exc-icon.blocked   { background:rgba(192,64,74,.15);  color:#f07a7a; }
.exc-icon.request   { background:rgba(192,64,74,.12);  color:#f07a7a; }
.exc-icon.milestone { background:rgba(124,77,255,.12); color:#a78bfa; }
.exc-icon.budget    { background:rgba(79,142,247,.12);  color:var(--accent); }
.exc-body  { flex:1; min-width:0; }
.exc-title { font-size:12px; font-weight:700; color:var(--text); }
.exc-sub   { font-size:11px; color:var(--muted); margin-top:2px; line-height:1.4; }
.exc-proj  { font-size:10px; font-family:var(--font-mono); color:var(--accent); margin-top:3px; }
.exc-right { display:flex; flex-direction:column; align-items:flex-end; gap:4px; flex-shrink:0; }
.exc-age   { font-size:10px; font-family:var(--font-mono); color:var(--muted); }
.exc-expand-btn { font-size:10px; color:var(--muted); transition:transform .2s; display:inline-block; }
.exc-expand-btn.open { transform:rotate(180deg); }
.exc-detail { display:none; padding:0 14px 12px 56px; border-top:1px solid var(--border); }
.exc-detail.open { display:block; }
.exc-detail-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin:10px 0; }
.exc-detail-cell { background:var(--surf2); border:1px solid var(--border); border-radius:4px; padding:8px 10px; }
.exc-detail-label { font-size:9px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); margin-bottom:3px; }
.exc-detail-val   { font-size:12px; font-weight:600; color:var(--text); }
.exc-detail-sub   { font-size:10px; color:var(--muted); margin-top:1px; }
.exc-classification { display:inline-flex; align-items:center; gap:5px; font-size:9px;
  font-weight:700; letter-spacing:.08em; text-transform:uppercase; padding:2px 8px;
  border-radius:3px; border:1px solid; margin-bottom:8px; }
.exc-classification.late     { color:var(--amber); border-color:rgba(212,144,31,.3); background:rgba(212,144,31,.06); }
.exc-classification.blocked  { color:#f07a7a; border-color:rgba(192,64,74,.3); background:rgba(192,64,74,.06); }
.exc-classification.technical{ color:#a78bfa; border-color:rgba(124,77,255,.3); background:rgba(124,77,255,.06); }
.exc-suggestion { background:rgba(0,210,255,.04); border:1px solid rgba(0,210,255,.15);
  border-radius:4px; padding:8px 10px; font-size:11px; line-height:1.6; color:var(--text); }
.exc-suggestion-label { font-size:9px; font-weight:700; letter-spacing:.1em;
  text-transform:uppercase; color:var(--cyan); margin-bottom:4px; }
.exc-group-card { background:var(--surface); border:1px solid var(--border); border-radius:6px; overflow:hidden; }
.exc-group-card.sev-critical { border-left:3px solid var(--red); }
.exc-group-card.sev-high     { border-left:3px solid var(--amber); }
.exc-group-header { padding:11px 14px; display:flex; align-items:center; gap:12px; cursor:pointer; }
.exc-group-header:hover { background:rgba(255,255,255,.02); }
.exc-group-body { display:none; border-top:1px solid var(--border); }
.exc-group-body.open { display:block; }
.exc-group-item { padding:8px 14px 8px 56px; border-bottom:1px solid rgba(255,255,255,.04);
  font-size:11px; cursor:pointer; display:flex; align-items:center; justify-content:space-between; }
.exc-group-item:hover { background:rgba(255,255,255,.02); }
.exc-group-item:last-child { border-bottom:none; }
.exc-section-header { font-size:9px; font-weight:700; letter-spacing:.12em;
  text-transform:uppercase; padding:10px 0 5px;
  border-bottom:1px solid var(--border); margin-bottom:8px; }
.exc-section-header.critical { color:var(--red); }
.exc-section-header.high     { color:var(--amber); }
.exc-section-header.medium   { color:var(--accent); }

/* ── Team view ── */
.team-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(280px,1fr)); gap:12px; }
.team-card { background:var(--surface); border:1px solid var(--border); border-radius:6px;
             padding:14px 16px; }
.team-card-head { display:flex; align-items:center; gap:10px; margin-bottom:12px; }
.team-avatar { width:36px; height:36px; border-radius:50%; background:rgba(79,142,247,.15);
               color:var(--accent); font-size:12px; font-weight:700; display:flex;
               align-items:center; justify-content:center; flex-shrink:0; }
.team-name  { font-size:13px; font-weight:700; }
.team-title { font-size:11px; color:var(--muted); margin-top:1px; }
.team-alloc-bar { height:6px; border-radius:3px; background:rgba(255,255,255,.06);
                  margin-bottom:6px; overflow:hidden; }
.team-alloc-fill { height:100%; border-radius:3px; }
.team-projects { display:flex; flex-direction:column; gap:4px; margin-top:8px; }
.team-project-row { display:flex; align-items:center; justify-content:space-between;
                    font-size:11px; }
.team-project-name { color:var(--muted); }
.team-project-pct  { font-family:var(--font-mono); color:var(--text); }

/* ── Add Project button ── */
.add-btn { padding:8px 16px; background:rgba(0,210,255,.08); border:1px solid rgba(0,210,255,.25);
           color:var(--cyan); font-size:11px; font-weight:700; letter-spacing:.08em;
           text-transform:uppercase; cursor:pointer; border-radius:4px; font-family:var(--font-ui);
           transition:all .15s; }
.add-btn:hover { background:rgba(0,210,255,.14); }

/* ── Empty state ── */
.empty { text-align:center; padding:60px 24px; color:var(--muted); }
.empty .icon { font-size:36px; margin-bottom:12px; }
.empty .title { font-size:14px; font-weight:700; color:var(--text); margin-bottom:6px; }

/* ── Case file panes ── */
.case-pane { border-top:1px solid var(--border); }
.case-pane-header { display:flex; align-items:center; justify-content:space-between;
  padding:8px 14px 8px 0; cursor:pointer; user-select:none; }
.case-pane-header:hover .case-pane-title { color:var(--text0); }
.case-pane-title { font-size:9px; font-weight:700; letter-spacing:.12em;
  text-transform:uppercase; color:var(--muted); display:flex; align-items:center; gap:6px; }
.case-pane-title .pane-icon { font-size:11px; }
.case-pane-arrow { font-size:10px; color:var(--muted); transition:transform .2s; }
.case-pane-arrow.open { transform:rotate(180deg); }
.case-pane-body { padding:0 0 12px 0; display:none; }
.case-pane-body.open { display:block; }

/* deliverable rows */
.deliv-row { display:flex; align-items:flex-start; gap:10px; padding:6px 0;
  border-bottom:1px solid rgba(255,255,255,.04); }
.deliv-row:last-child { border-bottom:none; }
.deliv-state-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; margin-top:4px; }
.deliv-name { font-size:11px; font-weight:600; color:var(--text); flex:1; min-width:0; }
.deliv-meta { font-size:10px; color:var(--muted); margin-top:2px; line-height:1.4; }
.deliv-state-badge { font-size:9px; font-weight:700; letter-spacing:.06em; padding:1px 6px;
  border-radius:3px; border:1px solid; flex-shrink:0; text-transform:uppercase; }
.deliv-blocking { font-size:9px; color:#f07a7a; font-weight:700; letter-spacing:.06em;
  background:rgba(192,64,74,.08); border:1px solid rgba(192,64,74,.2); padding:1px 5px;
  border-radius:3px; margin-left:4px; }

/* Priority buttons */
.pri-btn { font-size:9px; font-weight:700; letter-spacing:.08em; padding:2px 7px;
  border-radius:3px; border:1px solid; cursor:pointer; font-family:var(--font-ui);
  transition:all .15s; opacity:.45; }
.pri-btn:hover { opacity:.8; }
.pri-btn.active { opacity:1; }
.pri-btn.high   { color:#f07a7a; border-color:rgba(192,64,74,.4); background:rgba(192,64,74,.08); }
.pri-btn.medium { color:var(--amber); border-color:rgba(212,144,31,.4); background:rgba(212,144,31,.08); }
.pri-btn.low    { color:var(--muted); border-color:var(--border); background:transparent; }
.pri-unset { font-size:9px; color:var(--text3); font-style:italic; letter-spacing:.04em; }

/* dependency rows */
.dep-row { display:flex; align-items:center; gap:8px; padding:5px 0;
  border-bottom:1px solid rgba(255,255,255,.04); font-size:11px; }
.dep-row:last-child { border-bottom:none; }
.dep-dir { font-size:9px; font-weight:700; letter-spacing:.06em; padding:1px 5px;
  border-radius:3px; flex-shrink:0; }
.dep-dir.upstream   { background:rgba(212,144,31,.1); color:var(--amber); border:1px solid rgba(212,144,31,.25); }
.dep-dir.downstream { background:rgba(79,142,247,.1); color:var(--accent); border:1px solid rgba(79,142,247,.25); }
.dep-name { flex:1; min-width:0; font-weight:600; color:var(--text); }
.dep-status { font-size:9px; color:var(--muted); }
.dep-pct { font-family:var(--font-mono); font-size:10px; color:var(--muted); flex-shrink:0; }

/* history rows */
.hist-row { display:flex; gap:10px; padding:6px 0;
  border-bottom:1px solid rgba(255,255,255,.04); }
.hist-row:last-child { border-bottom:none; }
.hist-time { font-family:var(--font-mono); font-size:9px; color:var(--muted);
  flex-shrink:0; width:90px; padding-top:2px; }
.hist-actor { font-size:10px; font-weight:700; color:var(--text); flex-shrink:0; width:90px; }
.hist-body { flex:1; min-width:0; font-size:10px; color:var(--text); line-height:1.5; }
.hist-type { font-size:9px; font-weight:700; letter-spacing:.06em; text-transform:uppercase;
  color:var(--muted); margin-bottom:2px; }

/* assignee selector */
.assignee-select { background:var(--surf2); border:1px solid var(--border2); color:var(--text);
  font-size:11px; padding:4px 8px; border-radius:4px; font-family:var(--font-ui); width:100%;
  cursor:pointer; }
.assignee-select:focus { outline:none; border-color:var(--cyan); }

/* action buttons */
.case-action-btn { background:rgba(0,210,255,.06); border:1px solid rgba(0,210,255,.2);
  color:var(--cyan); font-size:10px; font-weight:700; letter-spacing:.06em; padding:5px 10px;
  border-radius:4px; cursor:pointer; font-family:var(--font-ui); transition:all .15s; }
.case-action-btn:hover { background:rgba(0,210,255,.12); }
.case-action-btn.amber { background:rgba(212,144,31,.06); border-color:rgba(212,144,31,.2); color:var(--amber); }
.case-action-btn.red   { background:rgba(192,64,74,.06);  border-color:rgba(192,64,74,.2);  color:#f07a7a; }

/* ── Loading ── */
.loading { display:flex; align-items:center; justify-content:center; flex:1;
           font-family:var(--font-mono); font-size:12px; color:var(--muted);
           letter-spacing:.1em; }

/* ── Rich tooltip ── */
#rich-tip {
  position:fixed; z-index:500; pointer-events:none;
  background:var(--surf3); border:1px solid var(--border2);
  border-radius:8px; padding:12px 14px; max-width:320px;
  box-shadow:0 8px 28px rgba(0,0,0,.5);
  font-size:12px; line-height:1.6; color:var(--text);
  display:none; font-style:normal; font-weight:400;
}
#rich-tip.visible { display:block; animation:tipFade .12s ease; }
@keyframes tipFade { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:translateY(0); } }
#rich-tip .tip-title { font-size:11px; font-weight:700; letter-spacing:.08em;
  text-transform:uppercase; color:var(--cyan); margin-bottom:6px; }
#rich-tip .tip-formula { font-family:var(--font-mono); font-size:10px; color:var(--muted);
  padding:4px 8px; background:rgba(255,255,255,.04); border-radius:3px; margin-bottom:6px; }
#rich-tip .tip-row { display:flex; justify-content:space-between; gap:12px;
  font-size:11px; padding:2px 0; border-bottom:1px solid rgba(255,255,255,.05); }
#rich-tip .tip-row:last-child { border-bottom:none; }
#rich-tip .tip-lbl { color:var(--muted); }
#rich-tip .tip-val { font-weight:600; text-align:right; }
#rich-tip .tip-interp { margin-top:6px; padding-top:6px; border-top:1px solid rgba(255,255,255,.07);
  font-size:11px; color:var(--muted); font-style:italic; }
#rich-tip .tip-section { font-size:10px; font-weight:700; letter-spacing:.08em;
  text-transform:uppercase; color:var(--muted); margin:8px 0 4px; }
#rich-tip .tip-badge { display:inline-block; padding:2px 7px; border-radius:3px;
  font-size:10px; font-weight:700; margin-right:4px; margin-bottom:2px; }
/* ── Modal overlay ── */
.hud-modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:400;
  display:flex; align-items:center; justify-content:center; padding:20px; }
.hud-modal { background:var(--surf2); border:1px solid var(--border2); border-radius:8px;
  box-shadow:0 8px 40px rgba(0,0,0,.6); max-height:80vh; display:flex; flex-direction:column;
  font-family:var(--font-ui); }
.hud-modal-header { padding:14px 18px 12px; border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
.hud-modal-title { font-size:13px; font-weight:700; color:var(--text0); letter-spacing:.04em; }
.hud-modal-close { background:none; border:none; color:var(--muted); cursor:pointer;
  font-size:18px; line-height:1; padding:0 2px; transition:color .15s; }
.hud-modal-close:hover { color:var(--text); }
.hud-modal-body { flex:1; overflow-y:auto; padding:14px 18px; }
.hud-modal-body::-webkit-scrollbar { width:4px; }
.hud-modal-body::-webkit-scrollbar-thumb { background:var(--border2); }
.hud-modal-footer { padding:12px 18px; border-top:1px solid var(--border);
  display:flex; align-items:center; justify-content:flex-end; gap:8px; flex-shrink:0; }

/* Resource picker */
.rp-dept-header { font-size:9px; font-weight:700; letter-spacing:.12em; text-transform:uppercase;
  color:var(--cyan); padding:10px 0 5px; border-bottom:1px solid var(--border); margin-bottom:4px; }
.rp-table { width:100%; border-collapse:collapse; font-size:11px; }
.rp-table th { font-size:9px; font-weight:700; letter-spacing:.1em; text-transform:uppercase;
  color:var(--muted); padding:4px 8px; text-align:left; border-bottom:1px solid var(--border); }
.rp-table td { padding:6px 8px; border-bottom:1px solid rgba(255,255,255,.04); vertical-align:middle; }
.rp-table tr:hover td { background:rgba(255,255,255,.03); cursor:pointer; }
.rp-table tr.selected td { background:rgba(0,210,255,.06); }
.rp-alloc-bar { height:4px; border-radius:2px; background:rgba(255,255,255,.08); width:60px; overflow:hidden; display:inline-block; vertical-align:middle; margin-left:6px; }
.rp-alloc-fill { height:100%; border-radius:2px; }
.rp-selected-chips { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:10px; min-height:28px;
  padding:4px; background:rgba(0,0,0,.2); border:1px solid var(--border); border-radius:4px; }
.rp-chip { display:flex; align-items:center; gap:4px; background:rgba(0,210,255,.1);
  border:1px solid rgba(0,210,255,.25); color:var(--cyan); font-size:10px; font-weight:600;
  padding:2px 8px; border-radius:3px; }
.rp-chip-x { cursor:pointer; font-size:13px; line-height:1; color:var(--muted); }
.rp-chip-x:hover { color:#f07a7a; }
.rp-search { width:100%; background:var(--surface); border:1px solid var(--border); color:var(--text);
  font-size:11px; padding:6px 10px; border-radius:4px; font-family:var(--font-ui); margin-bottom:10px; }
.rp-search:focus { outline:none; border-color:var(--cyan); }

/* Form fields */
.hud-field-label { font-size:9px; font-weight:700; letter-spacing:.1em; text-transform:uppercase;
  color:var(--muted); margin-bottom:4px; margin-top:12px; }
.hud-field-label:first-child { margin-top:0; }
.hud-input { width:100%; background:var(--surface); border:1px solid var(--border); color:var(--text);
  font-size:12px; padding:7px 10px; border-radius:4px; font-family:var(--font-ui); }
.hud-input:focus { outline:none; border-color:var(--cyan); }
.hud-textarea { width:100%; background:var(--surface); border:1px solid var(--border); color:var(--text);
  font-size:12px; padding:7px 10px; border-radius:4px; font-family:var(--font-ui);
  resize:vertical; min-height:70px; }
.hud-textarea:focus { outline:none; border-color:var(--cyan); }
.hud-select { width:100%; background:var(--surface); border:1px solid var(--border); color:var(--text);
  font-size:12px; padding:7px 10px; border-radius:4px; font-family:var(--font-ui); }
.hud-select:focus { outline:none; border-color:var(--cyan); }

/* Inline annotation widget */
.annotation-widget { background:rgba(0,0,0,.2); border:1px solid var(--border2); border-radius:6px;
  padding:12px; margin-top:8px; }
.annotation-widget-title { font-size:10px; font-weight:700; letter-spacing:.08em;
  text-transform:uppercase; color:var(--cyan); margin-bottom:8px; }

/* Task name tooltip */
.task-tip { position:fixed; background:var(--surf2); border:1px solid var(--border2);
  border-radius:6px; padding:0; z-index:350; min-width:420px; max-width:600px;
  max-height:400px; overflow-y:auto; box-shadow:0 8px 32px rgba(0,0,0,.6);
  font-family:var(--font-ui); pointer-events:none; }
.task-tip::-webkit-scrollbar { width:4px; }
.task-tip::-webkit-scrollbar-thumb { background:var(--border2); }
.task-tip-phase { font-size:9px; font-weight:700; letter-spacing:.12em; text-transform:uppercase;
  color:var(--cyan); padding:8px 12px 6px; border-bottom:1px solid var(--border);
  position:sticky; top:0; background:var(--surf2); }
.task-tip-row { display:grid; grid-template-columns:1fr 100px 80px 80px;
  gap:6px; padding:5px 12px; border-bottom:1px solid rgba(255,255,255,.04);
  font-size:10px; align-items:center; }
.task-tip-row:last-child { border-bottom:none; }
.task-tip-row.header { font-size:9px; font-weight:700; letter-spacing:.06em; color:var(--muted);
  text-transform:uppercase; background:rgba(0,0,0,.2); }
.task-tip-row.current { background:rgba(0,210,255,.06); }

/* Save/Cancel buttons */
.btn-save { background:rgba(0,210,255,.1); border:1px solid rgba(0,210,255,.3); color:var(--cyan);
  font-size:11px; font-weight:700; letter-spacing:.06em; padding:6px 14px; border-radius:4px;
  cursor:pointer; font-family:var(--font-ui); transition:all .15s; }
.btn-save:hover { background:rgba(0,210,255,.18); }
.btn-cancel { background:transparent; border:1px solid var(--border); color:var(--muted);
  font-size:11px; font-weight:600; padding:6px 14px; border-radius:4px;
  cursor:pointer; font-family:var(--font-ui); transition:all .15s; }
.btn-cancel:hover { border-color:var(--text); color:var(--text); }

/* ── Toast ── */
.toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
         background:var(--surf2); border:1px solid var(--border2); border-radius:8px;
         padding:10px 20px; font-size:12px; font-weight:600; z-index:300;
         display:none; }
.toast.show { display:block; animation:fadeUp .2s ease; }
@keyframes fadeUp { from { opacity:0; transform:translateX(-50%) translateY(6px); } to { opacity:1; transform:translateX(-50%) translateY(0); } }
</style>

<script>
Sidebar.init('projects.html');
Sidebar.init('projects.html');

// ── Rich Tooltip Engine ───────────────────────────────────────────────────────
const TIP = {
  el: null,
  init() { this.el = document.getElementById('rich-tip'); },

  show(html, event) {
    if (!this.el) this.init();
    this.el.innerHTML = html;
    this.el.classList.add('visible');
    this.position(event);
  },

  hide() {
    if (!this.el) return;
    this.el.classList.remove('visible');
  },

  position(e) {
    if (!this.el) return;
    const pad = 12;
    const tw  = this.el.offsetWidth  || 280;
    const th  = this.el.offsetHeight || 120;
    let x = e.clientX + 14;
    let y = e.clientY - th / 2;
    // Keep within viewport
    if (x + tw > window.innerWidth  - pad) x = e.clientX - tw - 14;
    if (y < pad)                           y = pad;
    if (y + th > window.innerHeight - pad) y = window.innerHeight - th - pad;
    this.el.style.left = x + 'px';
    this.el.style.top  = y + 'px';
  },
};

// ── EVM metric tooltip content ────────────────────────────────────────────────
function evmTipHTML(metric, evm, proj) {
  const fmtN = n => n != null ? parseFloat(n).toFixed(2) : '—';
  const color = (v, invert=false) => {
    if (v == null) return 'var(--muted)';
    const good = invert ? v <= 1.1 : v >= 1.0;
    const warn = invert ? v <= 1.2 : v >= 0.9;
    return good ? 'var(--green)' : warn ? 'var(--amber)' : 'var(--red)';
  };

  const defs = {
    'CPI': {
      title: 'CPI — Cost Performance Index',
      formula: 'CPI = EV ÷ AC',
      rows: [
        ['Earned Value (EV)', Math.round(evm.ev||0) + ' hrs'],
        ['Actual Cost (AC)',  Math.round(evm.actualHrs||0) + ' hrs'],
        ['CPI', `<span style="color:${color(evm.cpi)};font-weight:700">${fmtN(evm.cpi)}</span>`],
      ],
      interp: evm.cpi
        ? `Earning ${(evm.cpi*100).toFixed(0)}¢ of value per $1 spent. ${evm.cpi >= 1 ? 'Under budget.' : 'Over budget.'}`
        : 'Insufficient data to compute.',
    },
    'SPI': {
      title: 'SPI — Schedule Performance Index',
      formula: 'SPI = EV ÷ PV',
      rows: [
        ['Earned Value (EV)',   Math.round(evm.ev||0) + ' hrs'],
        ['Planned Value (PV)',  Math.round(evm.pv||0) + ' hrs'],
        ['SPI', `<span style="color:${color(evm.spi)};font-weight:700">${fmtN(evm.spi)}</span>`],
      ],
      interp: evm.spi
        ? `Completing ${(evm.spi*100).toFixed(0)}% of planned work on time. ${evm.spi >= 1 ? 'Ahead of schedule.' : 'Behind schedule.'}`
        : 'Insufficient data to compute.',
    },
    'TCPI': {
      title: 'TCPI — To Complete Performance Index',
      formula: 'TCPI = (BAC − EV) ÷ (BAC − AC)',
      rows: [
        ['Budget (BAC)',        (evm.bac||0) + ' hrs'],
        ['Earned Value (EV)',   Math.round(evm.ev||0) + ' hrs'],
        ['Actual (AC)',         Math.round(evm.actualHrs||0) + ' hrs'],
        ['TCPI', `<span style="color:${color(evm.tcpi, true)};font-weight:700">${fmtN(evm.tcpi)}</span>`],
      ],
      interp: evm.tcpi
        ? `Team must sustain ${fmtN(evm.tcpi)} efficiency to finish within budget. ${evm.tcpi > 1.15 ? '⚠ Recovery unlikely without intervention.' : evm.tcpi <= 1.0 ? '✓ Achievable.' : 'Challenging but possible.'}`
        : 'Insufficient data to compute.',
    },
    'SLIP': {
      title: 'Forecast Slip — P50 Schedule Variance',
      formula: 'Slip = P50 Forecast − Target Date',
      rows: [
        ['Target date',    fmtDate(proj.target_date)],
        ['P50 forecast',   fmtDate(evm.p50Date) || '—'],
        ['P25 optimistic', fmtDate(evm.p25Date) || '—'],
        ['P80 pessimistic',fmtDate(evm.p80Date) || '—'],
        ['Slip', evm.slipDays > 0
          ? `<span style="color:${evm.slipDays>14?'var(--red)':'var(--amber)'}">+${evm.slipDays} days</span>`
          : `<span style="color:var(--green)">${evm.slipDays < 0 ? evm.slipDays+' days early' : 'On track'}</span>`],
      ],
      interp: evm.slipDays > 0
        ? `At current schedule performance (SPI ${fmtN(evm.spi)}), project finishes ${evm.slipDays} days past target.`
        : 'Project tracking on or ahead of target date.',
    },
  };

  const d = defs[metric];
  if (!d) return '';
  const rowsHTML = d.rows.map(([l,v]) =>
    `<div class="tip-row"><span class="tip-lbl">${l}</span><span class="tip-val">${v}</span></div>`
  ).join('');
  return `<div class="tip-title">${d.title}</div>
    <div class="tip-formula">${d.formula}</div>
    ${rowsHTML}
    <div class="tip-interp">${d.interp}</div>`;
}

// ── Overdue tasks tooltip ─────────────────────────────────────────────────────
function overdueTipHTML(projId) {
  const today    = new Date().toLocaleDateString('en-CA');
  const overdue  = _tasks.filter(t =>
    t.project_id === projId &&
    t.due_date && t.due_date < today &&
    t.status !== 'complete'
  ).sort((a,b) => a.due_date.localeCompare(b.due_date));

  if (!overdue.length) return '';

  const rows = overdue.slice(0,5).map(t => {
    const daysOver = Math.round((new Date(today) - new Date(t.due_date+'T00:00:00')) / 86400000);
    const c = daysOver > 14 ? 'var(--red)' : daysOver > 7 ? '#f07a7a' : 'var(--amber)';
    return `<div class="tip-row">
      <span class="tip-lbl" style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">
        ${escHtml(t.name.substring(0,30))}</span>
      <span class="tip-val" style="color:${c}">+${daysOver}d</span>
    </div>`;
  }).join('');

  const more = overdue.length > 5 ? `<div class="tip-interp">+ ${overdue.length-5} more overdue tasks</div>` : '';

  return `<div class="tip-title">⚠ ${overdue.length} Overdue Task${overdue.length!==1?'s':''}</div>
    <div class="tip-section">Task · Days overdue</div>
    ${rows}${more}
    <div class="tip-interp">Click card to view project detail</div>`;
}

// ── Open requests tooltip ─────────────────────────────────────────────────────
function requestsTipHTML(projId) {
  const reqs = _requests.filter(r => r.project_id === projId);
  if (!reqs.length) return '';

  const rows = reqs.map(r => {
    const res = _resources.find(x => x.id === r.requested_resource_id);
    const resName = res ? res.first_name + ' ' + res.last_name : '—';
    const hrs = Math.round((Date.now() - new Date(r.submitted_at)) / 3600000);
    const urgColor = r.urgency === 'critical' ? 'var(--red)' : r.urgency === 'high' ? 'var(--amber)' : 'var(--accent)';
    const tierColor = hrs > 48 ? 'var(--red)' : hrs > 24 ? '#f07a7a' : hrs > 4 ? 'var(--amber)' : 'var(--muted)';
    return `<div style="padding:6px 0;border-bottom:1px solid rgba(255,255,255,.05)">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:2px">
        <span style="font-weight:600">${escHtml(resName)}</span>
        <span class="tip-badge" style="background:${urgColor}18;color:${urgColor};border:1px solid ${urgColor}40">
          ${(r.urgency||'unknown').toUpperCase()}</span>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--muted)">
        <span>${r.status.replace('_',' ')}</span>
        <span style="color:${tierColor}">${hrs}h open</span>
      </div>
      ${r.impact_statement ? `<div style="font-size:10px;color:#f07a7a;margin-top:2px;font-style:italic">
        "${escHtml(r.impact_statement.substring(0,80))}${r.impact_statement.length>80?'…':''}"</div>` : ''}
    </div>`;
  }).join('');

  return `<div class="tip-title">⬡ ${reqs.length} Open Resource Request${reqs.length!==1?'s':''}</div>
    ${rows}
    <div class="tip-interp" style="margin-top:6px">Navigate to Requests page for full chain of custody</div>`;
}

// ── PM bio tooltip ────────────────────────────────────────────────────────────
const _pmCache = {};
function showPMTip(resourceId, event) {
  if (_pmCache[resourceId]) {
    TIP.show(pmTipHTML(_pmCache[resourceId]), event);
    return;
  }
  // Fetch full resource record
  API.get(`resources?id=eq.${resourceId}&select=*`).then(rows => {
    if (rows && rows[0]) {
      _pmCache[resourceId] = rows[0];
      TIP.show(pmTipHTML(rows[0]), event);
    }
  }).catch(()=>{});
  // Show loading state immediately
  TIP.show(`<div class="tip-title">Loading...</div>`, event);
}

function pmTipHTML(r) {
  const initials = (r.first_name[0] + r.last_name[0]).toUpperCase();
  const allocations = _allocations.filter(a => a.resource_id === r.id);
  const totalAlloc  = allocations.reduce((s,a) => s+(a.allocation_pct||0),0);
  const allocColor  = totalAlloc > 100 ? 'var(--red)' : totalAlloc >= 90 ? 'var(--amber)' : 'var(--green)';

  const projList = allocations.slice(0,3).map(a => {
    const p = _projects.find(x => x.id === a.project_id);
    return `<div class="tip-row">
      <span class="tip-lbl">${escHtml(p?.name?.substring(0,25)||'—')}</span>

// ── State ─────────────────────────────────────────────────────────────────────
let _projects    = [];
let _tasks       = [];
let _milestones  = [];
let _allocations  = [];
let _deliverables  = [];  // task_deliverables — inputs/outputs per task
let _dependencies  = [];  // task_dependencies — predecessor/successor links
let _users         = [];  // users table — tasks.assigned_to references users.id
let _taskAssignees = [];  // task_assignees junction table — multiple assignees per task
let _resources   = [];
let _requests    = [];
let _timeEntries = [];
let _evms        = {};
let _currentView = 'portfolio';

// ── EVM computation (from dashboard.html) ─────────────────────────────────────
function calcEVM(proj, projTasks, projEntries) {
  const today       = new Date().toLocaleDateString('en-CA');
  const bac         = parseFloat(proj.budget_baseline_hours || 0);
  const actualHrs   = (projEntries||[]).reduce((s,e) => s + parseFloat(e.hours||0), 0);
  const totalEffort = projTasks.reduce((s,t) => s + parseFloat(t.effort_days||1), 0);
  // Detect pct_complete scale: if max value <= 1 it's a fraction (0–1), else whole number (0–100)
  const maxPct      = projTasks.reduce((m,t) => Math.max(m, parseFloat(t.pct_complete||0)), 0);
  const pctScale    = maxPct <= 1 ? 1 : 100;  // divide by this to get 0–1
  const earnedEff   = projTasks.reduce((s,t) =>
    s + (parseFloat(t.pct_complete||0)/pctScale * parseFloat(t.effort_days||1)), 0);
  const evPct       = totalEffort > 0 ? earnedEff / totalEffort : 0;
  const ev          = bac > 0 ? evPct * bac : earnedEff;

  const startDate   = proj.start_date;
  const targetDate  = proj.target_date;
  const daysTotal   = (startDate && targetDate)
    ? Math.max(1, Math.round((new Date(targetDate+'T00:00:00') - new Date(startDate+'T00:00:00')) / 86400000)) : 0;
  const daysElapsed = startDate
    ? Math.max(0, Math.round((new Date(today) - new Date(startDate+'T00:00:00')) / 86400000)) : 0;
  const schedPct    = daysTotal > 0 ? Math.min(1, daysElapsed / daysTotal) : 0;
  const pv          = bac > 0 ? schedPct * bac : schedPct * totalEffort;

  const cpi  = actualHrs > 0 ? ev / actualHrs : null;
  const spi  = pv > 0        ? ev / pv         : null;
  const eac  = (cpi && cpi > 0 && bac > 0) ? bac / cpi : null;

  let teacDate = null, slipDays = null;
  let p25Date = null, p50Date = null, p80Date = null;
  if (spi && spi > 0 && daysTotal > 0 && startDate) {
    const teacDays = Math.round(daysTotal / spi);
    const ms = (d) => new Date(startDate+'T00:00:00').getTime() + d * 86400000;
    teacDate  = new Date(ms(teacDays)).toLocaleDateString('en-CA');
    if (targetDate)
      slipDays = Math.round((new Date(teacDate+'T00:00:00') - new Date(targetDate+'T00:00:00')) / 86400000);
    const daysRem = daysTotal - daysElapsed;
    p25Date = new Date(ms(Math.round(daysElapsed + daysRem / 1.0))).toLocaleDateString('en-CA');
    p50Date = new Date(ms(Math.round(daysTotal / spi))).toLocaleDateString('en-CA');
    p80Date = new Date(ms(Math.round(daysTotal / (spi * 0.85)))).toLocaleDateString('en-CA');
  }

  const workRem  = bac - ev;
  const fundsRem = bac - actualHrs;
  const tcpi     = fundsRem > 0 ? workRem / fundsRem : null;

  const overdueTasks  = projTasks.filter(t =>
    t.due_date && t.due_date < today && t.status !== 'complete').length;
  const blockedTasks  = projTasks.filter(t => t.status === 'blocked').length;
  const inProgressCnt = projTasks.filter(t => t.status === 'in_progress').length;
  const completeCnt   = projTasks.filter(t => t.status === 'complete').length;

  let diagnosis = '';
  if (blockedTasks > 0 && spi && spi < 1)
    diagnosis = `${blockedTasks} blocked task${blockedTasks!==1?'s':''} — schedule at ${(spi*100).toFixed(0)}% efficiency`;
  else if (overdueTasks > 0)
    diagnosis = `${overdueTasks} overdue task${overdueTasks!==1?'s':''} — resourcing pressure on schedule`;
  else if (cpi && cpi < 0.95)
    diagnosis = `Cost overrun: CPI ${cpi.toFixed(2)} — ${((1/cpi-1)*100).toFixed(0)}% more effort than planned`;
  else if (spi && spi < 0.95)
    diagnosis = `Schedule slipping: SPI ${spi.toFixed(2)} — ${Math.round((1-spi)*100)}% behind plan`;
  else
    diagnosis = 'On track — no significant variance detected';

  return { evPct, ev, pv, bac, actualHrs, cpi, spi, eac, tcpi,
           teacDate, slipDays, p25Date, p50Date, p80Date,
           diagnosis, overdueTasks, blockedTasks, inProgressCnt, completeCnt,
           totalTasks: projTasks.length,
           totalEffortDays: Math.round(totalEffort),
           earnedEffortDays: Math.round(earnedEff * 10) / 10 };
}

// ── Load ──────────────────────────────────────────────────────────────────────
async function loadAll() {
  try {
    const [projects, tasks, milestones, allocations, resources, requests, times, deliverables, deps, users, taskAssignees] = await Promise.all([
      API.getProjects().catch(()=>[]),
      API.getTasks().catch(()=>[]),
      API.get('milestones?select=*&order=target_date.asc').catch(()=>[]),
      API.get('resource_allocations?select=*').catch(()=>[]),
      API.get('resources?is_active=eq.true&select=id,first_name,last_name,title,email,bio,notes,level,availability_pct,department,location,avatar_url,hud_role_id').catch(()=>[]),
      API.get('resource_requests?status=in.(pending,acknowledged,countered,escalated,delegated)&select=*').catch(()=>[]),
      API.get('time_entries?select=*').catch(()=>[]),
      API.get('task_deliverables?select=*&order=direction.asc,sequence_order.asc').catch(()=>[]),
      API.get('task_dependencies?select=*').catch(()=>[]),
      API.get('users?is_active=eq.true&select=id,name,email,title,resource_id').catch(()=>[]),
      API.get('task_assignees?select=*').catch(()=>[]),
    ]);

    _projects      = projects     || [];
    _tasks         = tasks        || [];
    _milestones    = milestones   || [];
    _allocations   = allocations  || [];
    _resources     = resources    || [];
    _requests      = requests     || [];
    _timeEntries   = times        || [];
    _deliverables  = deliverables || [];
    _dependencies  = deps         || [];
    _users         = users        || [];
    _taskAssignees = taskAssignees || [];

    // Compute EVM for all projects
    _projects.forEach(p => {
      const pt = _tasks.filter(t => t.project_id === p.id);
      const pe = _timeEntries.filter(e => e.project_id === p.id);
      _evms[p.id] = calcEVM(p, pt, pe);
    });

    renderHeader();
    renderHorizon();
    renderView(_currentView);
  } catch(e) {
    document.getElementById('content').innerHTML =
      `<div class="loading" style="color:var(--red)">Error loading data: ${e.message}</div>`;
  }
}

// ── Header meta ───────────────────────────────────────────────────────────────
function renderHeader() {
  const active   = _projects.filter(p => p.status === 'active').length;
  const planning = _projects.filter(p => p.status === 'planning').length;
  const openReqs = _requests.length;
  document.getElementById('page-subtitle').textContent =
    `${_projects.length} projects total · ${active} active · ${planning} in planning`;
  document.getElementById('header-meta').textContent =
    openReqs > 0 ? `${openReqs} open resource request${openReqs!==1?'s':''}` : '';
}

// ── Milestone horizon ─────────────────────────────────────────────────────────
function renderHorizon() {
  const today    = new Date();
  const in90     = new Date(today.getTime() + 90 * 86400000);
  const todayStr = today.toLocaleDateString('en-CA');

  const upcoming = _milestones
    .filter(m => m.target_date >= todayStr && m.target_date <= in90.toLocaleDateString('en-CA'))
    .sort((a,b) => a.target_date.localeCompare(b.target_date));

  if (!upcoming.length) {
    document.getElementById('horizon-track').innerHTML =
      '<div style="font-size:11px;color:var(--muted)">No milestones in the next 90 days</div>';
    return;
  }

  const statusColor = { complete:'var(--green)', in_progress:'var(--cyan)',
    at_risk:'var(--amber)', blocked:'var(--red)', not_started:'var(--muted)' };

  const proj = Object.fromEntries(_projects.map(p => [p.id, p.name.split('—')[0].trim()]));

  let html = '';
  upcoming.forEach((m, i) => {
    const color = statusColor[m.status] || 'var(--muted)';
    const daysAway = Math.round((new Date(m.target_date+'T00:00:00') - today) / 86400000);
    const projName = proj[m.project_id] || '—';
    html += `
      <div class="milestone-pip" title="${escHtml(m.name)} · ${escHtml(projName)}">
        <div class="pip-dot" style="background:${color}"></div>
        <div class="pip-name" style="color:${color === 'var(--muted)' ? 'var(--muted)' : 'var(--text)'}">
          ${escHtml(m.name.substring(0,20))}</div>
        <div class="pip-date">${daysAway}d</div>
      </div>`;
    if (i < upcoming.length - 1) html += '<div class="horizon-connector"></div>';
  });

  document.getElementById('horizon-track').innerHTML = html;
}

// ── View switcher ─────────────────────────────────────────────────────────────
function switchView(view) {
  _currentView = view;
  ['portfolio','exceptions','team'].forEach(v => {
    document.getElementById('vbtn-' + v).classList.toggle('active', v === view);
  });
  renderView(view);
}

function renderView(view) {
  const el = document.getElementById('content');
  if      (view === 'portfolio')  renderPortfolio(el);
  else if (view === 'exceptions') renderExceptions(el);
  else if (view === 'team')       renderTeam(el);
}

// ── Portfolio view ─────────────────────────────────────────────────────────────
function renderPortfolio(el) {
  const active   = _projects.filter(p => p.status === 'active');
  const planning = _projects.filter(p => p.status === 'planning');
  const other    = _projects.filter(p => !['active','planning'].includes(p.status));

  // KPI strip
  const allEvms    = active.map(p => _evms[p.id]).filter(Boolean);
  const avgCPI     = allEvms.filter(e=>e.cpi).length
    ? (allEvms.filter(e=>e.cpi).reduce((s,e)=>s+e.cpi,0)/allEvms.filter(e=>e.cpi).length).toFixed(2) : '—';
  const avgSPI     = allEvms.filter(e=>e.spi).length
    ? (allEvms.filter(e=>e.spi).reduce((s,e)=>s+e.spi,0)/allEvms.filter(e=>e.spi).length).toFixed(2) : '—';
  const worstSlip  = Math.max(0, ...allEvms.map(e=>e.slipDays||0));
  const totalBudgetH = _projects.reduce((s,p)=>s+(p.budget_baseline_hours||0),0);
  const totalUsedH   = _timeEntries.reduce((s,e)=>s+parseFloat(e.hours||0),0);
  const openReqs   = _requests.length;

  const cpiColor = avgCPI === '—' ? 'var(--muted)' : parseFloat(avgCPI) >= 1 ? 'var(--green)' : parseFloat(avgCPI) >= 0.9 ? 'var(--amber)' : 'var(--red)';
  const spiColor = avgSPI === '—' ? 'var(--muted)' : parseFloat(avgSPI) >= 1 ? 'var(--green)' : parseFloat(avgSPI) >= 0.9 ? 'var(--amber)' : 'var(--red)';
  const slipColor = worstSlip === 0 ? 'var(--green)' : worstSlip <= 14 ? 'var(--amber)' : 'var(--red)';
  const reqColor  = openReqs === 0 ? 'var(--green)' : 'var(--red)';

  // Pre-compute tooltip strings — avoids ${} expressions inside HTML attrs inside template literals
  const tipSlip  = worstSlip > 0 ? 'Worst P50 forecast slip across active projects' : 'All projects on or ahead of target';
  const tipHours = Math.round(totalBudgetH > 0 ? totalUsedH/totalBudgetH*100 : 0) + '% of total portfolio budget consumed';
  const tipReqs  = openReqs > 0 ? openReqs + ' open resource request' + (openReqs!==1?'s':'') + ' — navigate to Requests page' : 'No open resource requests';

  let html = `
    <div class="kpi-strip">
      <div class="kpi" style="border-top-color:${cpiColor}" data-tip="Average CPI across active projects. Below 1.0 = over budget">
        <div class="kpi-lbl">Portfolio CPI</div>
        <div class="kpi-val" style="color:${cpiColor}">${avgCPI}</div>
        <div class="kpi-sub">Cost performance avg</div>
      </div>
      <div class="kpi" style="border-top-color:${spiColor}" data-tip="Average SPI across active projects. Below 1.0 = behind schedule">
        <div class="kpi-lbl">Portfolio SPI</div>
        <div class="kpi-val" style="color:${spiColor}">${avgSPI}</div>
        <div class="kpi-sub">Schedule performance avg</div>
      </div>
      <div class="kpi" style="border-top-color:${slipColor}" data-tip="${tipSlip}">
        <div class="kpi-lbl">Worst Slip</div>
        <div class="kpi-val" style="color:${slipColor}">${worstSlip > 0 ? '+'+worstSlip+'d' : '✓'}</div>
        <div class="kpi-sub">Forecast vs target</div>
      </div>
      <div class="kpi" style="border-top-color:var(--accent)" data-tip="${tipHours}">
        <div class="kpi-lbl">Labor Hours</div>
        <div class="kpi-val" style="color:var(--text)">${Math.round(totalUsedH)}</div>
        <div class="kpi-sub">of ${totalBudgetH.toLocaleString()} budgeted</div>
      </div>
      <div class="kpi" style="border-top-color:${reqColor}" data-tip="${tipReqs}">
        <div class="kpi-lbl">Open Requests</div>
        <div class="kpi-val" style="color:${reqColor}">${openReqs}</div>
        <div class="kpi-sub">Resource requests pending</div>
      </div>
    </div>`;

  // Project cards
  const sections = [
    { label: 'ACTIVE', items: active },
    { label: 'PLANNING', items: planning },
    { label: 'OTHER', items: other },
  ].filter(s => s.items.length > 0);

  sections.forEach(sec => {
    html += `<div style="font-size:9px;font-weight:700;letter-spacing:.12em;color:var(--muted);
      text-transform:uppercase;margin:${sec === sections[0] ? '0' : '20px'} 0 10px">${sec.label}</div>
      <div class="proj-grid">`;
    sec.items.forEach(p => { html += renderProjectCard(p); });
    html += '</div>';
  });

  el.innerHTML = html;

  // Update exceptions badge
  const excCount = buildExceptions().length;
  const excEl = document.getElementById('exc-count');
  if (excCount > 0) {
    excEl.textContent = excCount;
    excEl.style.display = 'inline';
  }
}

        <div class="forecast-item">
          <span class="fl">P50 Forecast</span>
          <span class="fv" style="color:${slipC}">${fmtDate(evm.p50Date)}</span>
        </div>` : ''}
        ${nextMs ? `
        <div class="forecast-item">
          <span class="fl">Next milestone</span>
          <span class="fv" style="color:${nextMs.status==='at_risk'?'var(--amber)':'var(--text)'}">
            ${escHtml(nextMs.name.substring(0,25))} · ${fmtDate(nextMs.target_date)}</span>

          onmouseenter="TIP.show(overdueTipHTML('${p.id}'),event)"
          onmouseleave="TIP.hide()" onmousemove="TIP.position(event)">⚠ ${evm.overdueTasks} overdue</span>` : ''}
        ${openReq > 0 ? `<span class="sig-badge request" style="cursor:default"
          onmouseenter="TIP.show(requestsTipHTML('${p.id}'),event)"
          onmouseleave="TIP.hide()" onmousemove="TIP.position(event)">⬡ ${openReq} request${openReq!==1?'s':''}</span>` : ''}
        ${upcomingMs.filter(m=>m.status==='at_risk').length > 0 ?
          `<span class="sig-badge milestone" data-tip="One or more upcoming milestones flagged at risk — expand for details">◈ milestone at risk</span>` : ''}

}

// ── Exceptions view ───────────────────────────────────────────────────────────
function getBlockingDeliverables(taskId) {
  // Returns input deliverables that are NOT in their required state
  return _deliverables.filter(d => {
    if (d.task_id !== taskId || d.direction !== 'input') return false;
    if (!d.is_required) return false;
    const stateOrder = { not_started:0, in_progress:1, draft:2, under_review:3, approved:4, released:5 };
    const required   = stateOrder[d.minimum_state] ?? 4;
    const current    = stateOrder[d.current_state]  ?? 0;
    return current < required; // not yet at minimum required state
  });
}

// ── Resolve assignee — tasks.assigned_to may point to users.id or resources.id ──
function resolveAssignee(assignedToId) {
  if (!assignedToId) return null;
  // Try resources first
  const res = _resources.find(r => r.id === assignedToId);
  if (res) return { id: res.id, first_name: res.first_name, last_name: res.last_name, title: res.title, source: 'resource' };
  // Fall back to users table
  const usr = _users.find(u => u.id === assignedToId);
  if (usr) {
    const parts = (usr.name || '').split(' ');
    return { id: usr.id, first_name: parts[0]||'', last_name: parts.slice(1).join(' ')||'', title: usr.title||'', source: 'user' };
  }
  return null;
}

function classifyTask(t) {
  // Three-way classification: late | blocked | technical
  if (t.status === 'blocked') return 'technical';
  // Check deliverable inputs — if any required input is below minimum state, task is blocked by inputs
  const blockedInputs = getBlockingDeliverables(t.id);
  if (blockedInputs.length > 0) return 'blocked';
  // Check if any open resource request exists for this task
  const hasRequest = _requests.some(r => r.task_id === t.id ||
    (r.project_id === t.project_id && r.requested_resource_id === t.assigned_to));
  if (hasRequest) return 'blocked';
  return 'late'; // unblocked — labor/scheduling issue
}

function classificationLabel(cls) {
  return { late: 'LATE — UNBLOCKED', blocked: 'BLOCKED — RESOURCE CONSTRAINT', technical: 'BLOCKED — TECHNICAL' }[cls] || 'LATE';
}

function suggestNextAction(t, cls, assigneeAlloc, hasRequest) {
  const resolved = resolveAssignee(t.assigned_to);
  const name = resolved?.first_name || 'The assignee';
  if (cls === 'technical') return 'Initiate a root cause investigation. Assign a technical lead to diagnose and document the failure mode before assigning additional effort.';
  // Check for specific blocking inputs
  const blockedInputs = getBlockingDeliverables(t.id);
  if (blockedInputs.length > 0) {
    const first = blockedInputs[0];
    const stateLabel = { not_started:'not yet started', draft:'in draft', under_review:'under review — awaiting sign-off', approved:'approved but not yet released' }[first.current_state] || first.current_state;
    const needed = { released:'formally released', approved:'approved' }[first.minimum_state] || first.minimum_state;
    return `This task is waiting on an input that is not yet ready: "${first.name}" is currently ${stateLabel} — must be ${needed} before work can proceed. ${blockedInputs.length > 1 ? `(+${blockedInputs.length-1} other blocked input${blockedInputs.length>2?'s':''})` : ''} Escalate the review or find an alternate path.`;
  }
  if (cls === 'blocked' && hasRequest) return 'A resource request is already open. Review it in the Requests page — approve or counter to unblock this task.';
  if (assigneeAlloc > 100) return `${name} is at ${assigneeAlloc}% total allocation — over-committed. Consider raising a resource request or redistributing their workload before expecting progress.`;
  if (assigneeAlloc > 80) return `${name} is at ${assigneeAlloc}% allocation across projects. Review their current task priorities and confirm this task is their active focus.`;
  return `Check in directly with ${name} to understand the specific blocker. If it is an input dependency or external factor, classify this task as Blocked to trigger the correct triage path.`;
}

function buildExceptions() {
  const today    = new Date().toLocaleDateString('en-CA');
  const items    = [];
  const projName = (id) => _projects.find(p=>p.id===id)?.name || '—';

  // 1. Overdue tasks — group by project + phase
  const overdueTasks = _tasks.filter(t => t.due_date && t.due_date < today && t.status !== 'complete');
  
  // Group by project
  const tasksByProj = {};
  overdueTasks.forEach(t => {
    const key = t.project_id;
    if (!tasksByProj[key]) tasksByProj[key] = [];
    tasksByProj[key].push(t);
  });

  Object.entries(tasksByProj).forEach(([projId, tasks]) => {
    const proj = _projects.find(p => p.id === projId);
    const maxDays = Math.max(...tasks.map(t =>
      Math.round((new Date(today) - new Date(t.due_date+'T00:00:00')) / 86400000)));
    const sev = maxDays > 7 ? 'critical' : 'high';

    // Enrich each task with assignee + allocation + classification
    const enriched = tasks.map(t => {
      const daysOver = Math.round((new Date(today) - new Date(t.due_date+'T00:00:00')) / 86400000);
      const assignee = resolveAssignee(t.assigned_to);
      const assigneeAlloc = _allocations.filter(a => a.resource_id === t.assigned_to)
        .reduce((s,a) => s + (a.allocation_pct||0), 0);
      const hasRequest = _requests.some(r =>
        r.task_id === t.id ||
        (r.project_id === t.project_id && r.requested_resource_id === t.assigned_to));
      const cls = classifyTask(t);
      return {
        ...t,
        daysOver,
        assignee,
        assigneeAlloc,
        hasRequest,
        cls,
        exception_priority: t.exception_priority || null,
        suggestion: suggestNextAction(t, cls, assigneeAlloc, hasRequest),
      };
    });

    // Sort: unset (null) first → HIGH → MEDIUM → LOW
    const priOrder = { high:1, medium:2, low:3 };
    enriched.sort((a,b) => {
      const ap = a.exception_priority ? (priOrder[a.exception_priority]||9) : 0;
      const bp = b.exception_priority ? (priOrder[b.exception_priority]||9) : 0;
      return ap - bp;
    });

    if (tasks.length === 1) {
      // Single task — show as individual card
      const t = enriched[0];
      items.push({
        type: t.cls === 'blocked' ? 'blocked' : 'task',
        sev,
        title: `${t.cls === 'blocked' ? '🔴 Blocked' : '⚠ Overdue'}: ${t.name}`,
        sub: `${t.daysOver} day${t.daysOver!==1?'s':''} past due · ${t.phase||'—'} · ${t.status.replace('_',' ')}`,
        proj: proj?.name || '—',
        projId,
        age: t.daysOver + 'd',
        sortKey: -t.daysOver,
        taskData: t,
        grouped: false,
      });
    } else {
      // Multiple tasks from same project — group them
      const blockedCount = enriched.filter(t => t.cls === 'blocked').length;
      const phases = [...new Set(enriched.map(t => t.phase).filter(Boolean))];
      items.push({
        type: 'task',
        sev,
        title: `${tasks.length} overdue tasks${blockedCount > 0 ? ` (${blockedCount} blocked)` : ''}`,
        sub: `${projName(projId)} · ${phases.slice(0,2).join(', ')}${phases.length > 2 ? ` +${phases.length-2} more` : ''}`,
        proj: proj?.name || '—',
        projId,
        age: `up to ${maxDays}d`,
        sortKey: -maxDays,
        taskData: null,
        grouped: true,
        groupTasks: enriched,
      });
    }
  });

  // 2. At-risk milestones
  _milestones.filter(m => m.status === 'at_risk' || m.status === 'blocked').forEach(m => {
    items.push({
      type: 'milestone', sev: m.status === 'blocked' ? 'critical' : 'high',
      title: `${m.status === 'blocked' ? '🔴 Blocked' : '◈ At risk'}: ${m.name}`,
      sub: `Milestone target ${fmtDate(m.target_date)}`,
      proj: projName(m.project_id),
      projId: m.project_id,
      age: fmtDate(m.target_date),
      sortKey: m.target_date,
      grouped: false,
    });
  });

  // 3. Open resource requests
  _requests.forEach(r => {
    const hoursOpen = Math.round((Date.now() - new Date(r.submitted_at)) / 3600000);
    const res = _resources.find(x=>x.id===r.requested_resource_id);
    const resName = res ? res.first_name + ' ' + res.last_name : '—';
    items.push({
      type: 'request', sev: r.urgency === 'critical' ? 'critical' : hoursOpen > 24 ? 'high' : 'medium',
      title: `Resource request: ${resName}`,
      sub: `${(r.urgency||'unknown').toUpperCase()} · ${r.status||'—'} · ${hoursOpen}h without resolution`,
      proj: projName(r.project_id),
      projId: r.project_id,
      age: hoursOpen + 'h open',
      sortKey: -hoursOpen,
      grouped: false,
      requestData: r,
    });
  });

  // 4. Budget warnings
  _projects.filter(p => p.status === 'active').forEach(p => {
    const evm = _evms[p.id];
    if (!evm || !evm.bac || evm.bac === 0) return;
    const pctUsed = evm.actualHrs / evm.bac;
    if (pctUsed >= 0.8 && evm.evPct < 0.9) {
      items.push({
        type: 'budget', sev: pctUsed >= 0.95 ? 'critical' : 'high',
        title: `Budget warning: ${(pctUsed*100).toFixed(0)}% hours consumed`,
        sub: `${Math.round(evm.actualHrs)}h used of ${evm.bac}h budget · ${Math.round(evm.evPct*100)}% complete`,
        proj: p.name,
        projId: p.id,
        age: `CPI ${evm.cpi?.toFixed(2)||'—'}`,
        sortKey: -pctUsed,
        grouped: false,
      });
    }
  });

  return items.sort((a,b) => {
    const sevOrder = {critical:0, high:1, medium:2};
    return (sevOrder[a.sev]||3) - (sevOrder[b.sev]||3);
  });
}
