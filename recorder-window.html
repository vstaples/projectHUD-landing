<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HUD Recorder</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  :root {
    --bg:#060a10; --bg2:#0c1628; --border:rgba(0,210,255,0.14);
    --cyan:#00d2ff; --green:#00e5a0; --amber:#ffaa00;
    --red:#ff4757; --purple:#9b59b6;
    --text0:rgba(230,240,250,0.95); --text2:rgba(180,210,235,0.55);
    --text3:rgba(140,175,210,0.35);
  }
  html,body { width:100%;height:100%;background:var(--bg);overflow:hidden;
    font-family:'Barlow Condensed','Segoe UI',sans-serif;user-select:none; }

  #drag-bar { height:32px;background:var(--bg2);border-bottom:1px solid var(--border);
    display:flex;align-items:center;justify-content:space-between;padding:0 10px;cursor:move; }
  #drag-title { font-size:10px;letter-spacing:0.18em;color:var(--text2);
    display:flex;align-items:center;gap:6px; }
  #drag-close { background:none;border:none;color:var(--text3);cursor:pointer;
    font-size:14px;line-height:1;transition:color 0.15s; }
  #drag-close:hover { color:var(--red); }

  body.recording { box-shadow:inset 0 0 0 2px var(--red); }
  body.paused    { box-shadow:inset 0 0 0 2px var(--amber); }

  #panel { padding:12px 12px 8px;display:flex;flex-direction:column;gap:10px; }

  #timer-row { display:flex;align-items:center;gap:10px; }
  #rec-dot { width:10px;height:10px;border-radius:50%;background:var(--text3);flex-shrink:0; }
  body.recording #rec-dot { background:var(--red);animation:pulse 1.2s ease-in-out infinite; }
  body.paused    #rec-dot { background:var(--amber);animation:none; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.3;transform:scale(0.75)} }

  #timer { font-family:'Share Tech Mono','Courier New',monospace;font-size:28px;
    font-weight:700;color:var(--text3);letter-spacing:0.06em;flex:1;transition:color 0.2s; }
  body.recording #timer { color:var(--red); }
  body.paused    #timer { color:var(--amber); }

  #state-label { font-size:10px;letter-spacing:0.18em;color:var(--text3);
    text-transform:uppercase;min-width:70px;text-align:right; }
  body.recording #state-label { color:var(--red); }
  body.paused    #state-label { color:var(--amber); }

  #controls { display:flex;gap:6px; }
  .ctrl-btn { flex:1;height:36px;border:1px solid;background:none;cursor:pointer;
    font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;
    letter-spacing:0.1em;display:flex;align-items:center;justify-content:center;
    gap:5px;transition:background 0.15s;border-radius:2px; }
  #btn-start  { border-color:rgba(255,71,87,0.45);  color:var(--red);   }
  #btn-start:hover  { background:rgba(255,71,87,0.10); }
  #btn-pause  { border-color:rgba(255,170,0,0.45);  color:var(--amber); }
  #btn-pause:hover  { background:rgba(255,170,0,0.10); }
  #btn-stop   { border-color:rgba(255,71,87,0.35);  color:var(--red);   }
  #btn-stop:hover   { background:rgba(255,71,87,0.10); }
  #btn-mic    { flex:0 0 40px;border-color:rgba(0,210,255,0.20);color:var(--text3); }
  #btn-mic:hover    { background:rgba(0,210,255,0.08);color:var(--cyan); }
  #btn-mic.active   { color:var(--cyan);border-color:rgba(0,210,255,0.55); }
  .ctrl-btn:disabled { opacity:0.25;cursor:not-allowed; }

  #annot-row { display:flex;gap:6px; }
  #annot-type { width:96px;background:rgba(0,0,0,0.3);border:1px solid rgba(155,89,182,0.25);
    color:rgba(210,230,245,0.8);font-family:'Barlow Condensed',sans-serif;
    font-size:11px;padding:5px 8px;outline:none;flex-shrink:0; }
  #annot-input { flex:1;background:rgba(0,0,0,0.3);border:1px solid rgba(155,89,182,0.25);
    color:rgba(210,230,245,0.8);font-family:'Barlow Condensed',sans-serif;
    font-size:11px;padding:5px 8px;outline:none; }
  #annot-input:focus { border-color:rgba(155,89,182,0.55); }
  #annot-input::placeholder { color:var(--text3); }
  #btn-mark { flex-shrink:0;height:30px;padding:0 12px;
    background:rgba(155,89,182,0.10);border:1px solid rgba(155,89,182,0.35);
    color:var(--purple);font-family:'Barlow Condensed',sans-serif;
    font-size:11px;font-weight:600;letter-spacing:0.1em;cursor:pointer;
    transition:background 0.15s;border-radius:2px; }
  #btn-mark:hover { background:rgba(155,89,182,0.22); }
  #btn-mark:disabled { opacity:0.25;cursor:not-allowed; }

  #marker-list { max-height:80px;overflow-y:auto;display:flex;flex-direction:column;gap:1px; }
  .marker-row { display:flex;align-items:center;gap:8px;
    font-family:'Share Tech Mono',monospace;font-size:10px;
    color:var(--text2);padding:3px 4px;background:rgba(0,0,0,0.15); }
  .marker-time { color:var(--purple);min-width:38px; }
  .marker-type { color:rgba(0,210,255,0.55);min-width:52px;font-size:9px;text-transform:uppercase; }
  .marker-label { flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap; }

  #status-bar { font-size:10px;letter-spacing:0.1em;color:var(--text3);
    text-align:center;padding:4px 0;border-top:1px solid var(--border);margin-top:2px; }

  /* Save dialog */
  #save-overlay { position:fixed;inset:0;background:rgba(0,0,0,0.85);
    z-index:100;display:flex;align-items:center;justify-content:center; }
  .save-panel { background:#0a1628;border:1px solid rgba(0,210,255,0.25);
    width:340px;box-shadow:0 16px 40px rgba(0,0,0,0.8); }
  .save-hdr { padding:11px 14px;border-bottom:1px solid rgba(0,210,255,0.12);
    display:flex;align-items:center;justify-content:space-between;
    font-family:'Share Tech Mono',monospace;font-size:11px;
    letter-spacing:0.14em;color:#00d2ff; }
  .save-body { padding:12px 14px;display:flex;flex-direction:column;gap:10px; }
  .save-label { font-family:'Share Tech Mono',monospace;font-size:10px;
    color:rgba(160,190,220,0.4);letter-spacing:0.12em;display:block;margin-bottom:3px; }
  .save-body input,.save-body select {
    width:100%;box-sizing:border-box;background:rgba(0,0,0,0.35);
    border:1px solid rgba(0,210,255,0.16);color:rgba(215,232,248,0.9);
    font-family:'Barlow',sans-serif;font-size:12px;padding:6px 8px;outline:none; }
  .save-footer { display:flex;gap:6px;padding:11px 14px;
    border-top:1px solid rgba(0,210,255,0.08); }
  .save-submit { flex:1;padding:8px;background:rgba(0,210,255,0.10);
    border:1px solid rgba(0,210,255,0.35);color:#00d2ff;
    font-family:'Barlow Condensed',sans-serif;font-size:11px;
    font-weight:600;letter-spacing:0.1em;cursor:pointer;transition:background 0.15s; }
  .save-submit:hover { background:rgba(0,210,255,0.20); }
  .save-submit:disabled { opacity:0.4;cursor:not-allowed; }
  .save-discard { padding:8px 14px;background:none;
    border:1px solid rgba(255,71,87,0.20);color:rgba(255,71,87,0.5);
    font-family:'Barlow Condensed',sans-serif;font-size:11px;
    font-weight:600;letter-spacing:0.1em;cursor:pointer; }
  .save-discard:hover { color:#ff4757; }
  .save-progress { font-family:'Share Tech Mono',monospace;font-size:10px;
    color:#00d2ff;text-align:center;padding:4px 0;letter-spacing:0.1em; }

  ::-webkit-scrollbar { width:4px; }
  ::-webkit-scrollbar-thumb { background:rgba(0,210,255,0.15);border-radius:2px; }
</style>
</head>
<body>

<div id="drag-bar">
  <div id="drag-title">
    <span style="color:#ff4757;font-size:12px;">⏺</span> HUD RECORDER
  </div>
  <button id="drag-close">✕</button>
</div>

<div id="panel">
  <div id="timer-row">
    <div id="rec-dot"></div>
    <div id="timer">00:00</div>
    <div id="state-label">READY</div>
  </div>

  <div id="controls">
    <button class="ctrl-btn" id="btn-start">
      <svg width="10" height="10" viewBox="0 0 12 12" fill="currentColor">
        <circle cx="6" cy="6" r="5" stroke="currentColor" stroke-width="1.5" fill="none"/>
        <circle cx="6" cy="6" r="3"/>
      </svg>START
    </button>
    <button class="ctrl-btn" id="btn-pause" disabled>
      <svg width="10" height="10" viewBox="0 0 12 12" fill="currentColor">
        <rect x="1.5" y="1" width="3" height="10"/><rect x="7.5" y="1" width="3" height="10"/>
      </svg><span id="pause-label">PAUSE</span>
    </button>
    <button class="ctrl-btn" id="btn-stop" disabled>
      <svg width="10" height="10" viewBox="0 0 12 12" fill="currentColor">
        <rect x="1" y="1" width="10" height="10"/>
      </svg>STOP
    </button>
    <button class="ctrl-btn" id="btn-mic" title="Toggle microphone">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/>
        <path d="M19 10v2a7 7 0 01-14 0v-2M12 19v4M8 23h8"/>
      </svg>
    </button>
  </div>

  <div id="annot-row">
    <select id="annot-type">
      <option value="chapter">Chapter</option>
      <option value="callout">Callout</option>
      <option value="zoom">Zoom</option>
      <option value="note">Note</option>
    </select>
    <input id="annot-input" type="text" placeholder="Annotation label…"/>
    <button id="btn-mark" disabled>◆ MARK</button>
  </div>

  <div id="marker-list"></div>
  <div id="status-bar">READY TO RECORD</div>
</div>

<script>
// ── Config ────────────────────────────────────────────────────
const SUPABASE_URL      = 'https://dvbetgdzksatcgdfftbs.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR2YmV0Z2R6a3NhdGNnZGZmdGJzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1NDc2MTYsImV4cCI6MjA4OTEyMzYxNn0.1geeKhrLL3nhjW08ieKr7YZmE0AVX4xnom7i2j1W358';

// ── BroadcastChannel ──────────────────────────────────────────
const ch = new BroadcastChannel('hud-recorder');

// ── State ─────────────────────────────────────────────────────
let state        = 'idle';
let stream       = null;
let recorder     = null;
let chunks       = [];
let startTime    = 0;
let pausedMs     = 0;
let pauseStart   = 0;
let annotations  = [];
let timerInterval= null;
let micStream    = null;
let micEnabled   = false;

// ── DOM refs ──────────────────────────────────────────────────
const timerEl    = document.getElementById('timer');
const stateEl    = document.getElementById('state-label');
const markerList = document.getElementById('marker-list');
const statusBar  = document.getElementById('status-bar');
const annotInput = document.getElementById('annot-input');
const annotType  = document.getElementById('annot-type');
const btnStart   = document.getElementById('btn-start');
const btnPause   = document.getElementById('btn-pause');
const btnStop    = document.getElementById('btn-stop');
const btnMark    = document.getElementById('btn-mark');
const btnMic     = document.getElementById('btn-mic');
const pauseLabel = document.getElementById('pause-label');

// ── Helpers ───────────────────────────────────────────────────
function elapsed() {
  if (state === 'idle') return 0;
  const now = state === 'paused' ? pauseStart : Date.now();
  return Math.floor((now - startTime - pausedMs) / 1000);
}
function fmtTime(s) {
  const h = Math.floor(s/3600), m = Math.floor((s%3600)/60), sec = s%60;
  if (h > 0) return h+':'+pad(m)+':'+pad(sec);
  return pad(m)+':'+pad(sec);
}
function pad(n) { return String(n).padStart(2,'0'); }
function tick() { timerEl.textContent = fmtTime(elapsed()); }
function setBodyState(s) { document.body.className = s; stateEl.textContent = s.toUpperCase(); }
function setStatus(msg, color) { statusBar.textContent = msg; statusBar.style.color = color||''; }

// ── START ─────────────────────────────────────────────────────
btnStart.addEventListener('click', async () => {
  if (state !== 'idle') return;

  setStatus('Requesting screen share…', 'var(--cyan)');

  // Try with audio — fall back to video-only if rejected
  try {
    stream = await navigator.mediaDevices.getDisplayMedia({
      video: { frameRate: 30, cursor: 'always' },
      audio: true,
    });
  } catch (e1) {
    try {
      stream = await navigator.mediaDevices.getDisplayMedia({
        video: { frameRate: 30, cursor: 'always' },
        audio: false,
      });
    } catch (e2) {
      setStatus('Screen share cancelled', 'var(--text3)');
      return;
    }
  }

  // Merge mic if active
  if (micEnabled && micStream) {
    micStream.getAudioTracks().forEach(t => stream.addTrack(t));
  }

  // Pick best mimeType — pass nothing if unsupported to let browser choose
  const MIME_CANDIDATES = [
    'video/webm;codecs=vp9,opus',
    'video/webm;codecs=vp8,opus',
    'video/webm;codecs=vp9',
    'video/webm',
  ];
  const mimeType = MIME_CANDIDATES.find(t => MediaRecorder.isTypeSupported(t));

  try {
    recorder = mimeType
      ? new MediaRecorder(stream, { mimeType })
      : new MediaRecorder(stream);
  } catch (e) {
    // Last resort — no options
    recorder = new MediaRecorder(stream);
  }

  chunks      = [];
  annotations = [];
  pausedMs    = 0;
  startTime   = Date.now();
  state       = 'recording';

  recorder.ondataavailable = e => { if (e.data && e.data.size > 0) chunks.push(e.data); };
  recorder.onstop = onRecorderStop;
  recorder.start(1000);

  // Watch for user closing the share via browser chrome
  const videoTracks = stream.getVideoTracks();
  if (videoTracks.length > 0) {
    videoTracks[0].addEventListener('ended', () => {
      if (state !== 'idle') doStop();
    });
  }

  // Update UI
  setBodyState('recording');
  timerInterval = setInterval(tick, 500);
  btnStart.disabled = true;
  btnPause.disabled = false;
  btnStop.disabled  = false;
  btnMark.disabled  = false;
  setStatus('● RECORDING', 'var(--red)');

  // Notify main window (red border)
  ch.postMessage({ evt: 'RECORDING_STARTED', startTime });
});

// ── PAUSE / RESUME ────────────────────────────────────────────
btnPause.addEventListener('click', () => {
  if (state === 'recording') {
    recorder.pause();
    pauseStart = Date.now();
    state = 'paused';
    setBodyState('paused');
    pauseLabel.textContent = 'RESUME';
    setStatus('⏸ PAUSED', 'var(--amber)');
    ch.postMessage({ evt: 'PAUSED' });
  } else if (state === 'paused') {
    pausedMs += Date.now() - pauseStart;
    recorder.resume();
    state = 'recording';
    setBodyState('recording');
    pauseLabel.textContent = 'PAUSE';
    setStatus('● RECORDING', 'var(--red)');
    ch.postMessage({ evt: 'RESUMED' });
  }
});

// ── STOP ──────────────────────────────────────────────────────
btnStop.addEventListener('click', doStop);

function doStop() {
  if (state === 'idle') return;
  clearInterval(timerInterval);
  state = 'idle';
  setBodyState('idle');
  btnStart.disabled = false;
  btnPause.disabled = true;
  btnStop.disabled  = true;
  btnMark.disabled  = true;
  pauseLabel.textContent = 'PAUSE';

  stream.getTracks().forEach(t => t.stop());
  if (micStream) { micStream.getTracks().forEach(t => t.stop()); micStream = null; micEnabled = false; btnMic.classList.remove('active'); }

  if (recorder && recorder.state !== 'inactive') {
    recorder.stop(); // triggers onRecorderStop
  }

  setStatus('PROCESSING…', 'var(--cyan)');
  ch.postMessage({ evt: 'STOPPED' });
}

function onRecorderStop() {
  const blob     = new Blob(chunks, { type: 'video/webm' });
  const duration = Math.floor((Date.now() - startTime - pausedMs) / 1000);
  showSaveDialog(blob, duration);
}

// ── MIC TOGGLE ────────────────────────────────────────────────
btnMic.addEventListener('click', async () => {
  if (micEnabled) {
    micStream.getTracks().forEach(t => t.stop());
    micStream = null;
    micEnabled = false;
    btnMic.classList.remove('active');
    btnMic.title = 'Enable microphone';
  } else {
    try {
      micStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
      micEnabled = true;
      btnMic.classList.add('active');
      btnMic.title = 'Disable microphone';
      // Add live if already recording
      if (state === 'recording' && stream) {
        micStream.getAudioTracks().forEach(t => stream.addTrack(t));
      }
    } catch (e) {
      setStatus('Mic access denied', 'var(--red)');
      setTimeout(() => { if (state !== 'idle') setStatus('● RECORDING','var(--red)'); else setStatus('READY TO RECORD'); }, 2000);
    }
  }
});

// ── ANNOTATIONS ───────────────────────────────────────────────
btnMark.addEventListener('click', addMark);
annotInput.addEventListener('keydown', e => { if (e.key === 'Enter') addMark(); });

function addMark() {
  const label = annotInput.value.trim();
  if (!label || state === 'idle') return;
  const ann = { time_seconds: elapsed(), type: annotType.value, label };
  annotations.push(ann);
  const row = document.createElement('div');
  row.className = 'marker-row';
  row.innerHTML = '<span class="marker-time">'+fmtTime(ann.time_seconds)+'</span>'
    +'<span class="marker-type">'+ann.type+'</span>'
    +'<span class="marker-label">'+ann.label+'</span>';
  markerList.appendChild(row);
  markerList.scrollTop = markerList.scrollHeight;
  annotInput.value = '';
  const orig = btnMark.textContent;
  btnMark.textContent = '✓';
  setTimeout(() => { btnMark.textContent = orig; }, 800);
}

// ── CLOSE ─────────────────────────────────────────────────────
document.getElementById('drag-close').addEventListener('click', () => {
  if (state !== 'idle') {
    if (!confirm('Recording in progress. Stop and close?')) return;
    doStop();
    setTimeout(() => window.close(), 500);
  } else {
    window.close();
  }
});

// ── SAVE DIALOG ───────────────────────────────────────────────
function showSaveDialog(blob, duration) {
  const dlg = document.createElement('div');
  dlg.id = 'save-overlay';
  dlg.innerHTML =
    '<div class="save-panel">'
    +'<div class="save-hdr"><span>⏺ SAVE RECORDING</span>'
    +'<span style="color:rgba(0,210,255,0.4);font-size:10px;">'+fmtTime(duration)+' · '+(blob.size/1024/1024).toFixed(1)+'MB</span></div>'
    +'<div class="save-body">'
    +'<div><label class="save-label">TITLE *</label><input id="sv-title" type="text" placeholder="e.g. EVM Walkthrough"/></div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">'
    +'<div><label class="save-label">CATEGORY</label><select id="sv-cat"><option value="internal">Internal</option><option value="training">Training</option><option value="marketing">Marketing</option></select></div>'
    +'<div><label class="save-label">TAGS</label><input id="sv-tags" type="text" placeholder="tag1, tag2"/></div>'
    +'</div>'
    +'<div id="sv-progress" class="save-progress" style="display:none;"></div>'
    +'</div>'
    +'<div class="save-footer">'
    +'<button class="save-submit" id="sv-save">↑ SAVE TO LIBRARY</button>'
    +'<button class="save-discard" id="sv-discard">DISCARD</button>'
    +'</div></div>';

  document.body.appendChild(dlg);
  dlg.querySelector('#sv-title').focus();

  dlg.querySelector('#sv-save').addEventListener('click', () => doSave(blob, duration, dlg));
  dlg.querySelector('#sv-discard').addEventListener('click', () => {
    if (confirm('Discard recording?')) {
      dlg.remove();
      timerEl.textContent = '00:00';
      setStatus('READY TO RECORD');
      chunks = []; annotations = [];
      ch.postMessage({ evt: 'DISCARDED' });
    }
  });
}

// ── UPLOAD ────────────────────────────────────────────────────
async function doSave(blob, duration, dlg) {
  const title = dlg.querySelector('#sv-title').value.trim();
  if (!title) { dlg.querySelector('#sv-title').focus(); return; }

  const btn  = dlg.querySelector('#sv-save');
  const prog = dlg.querySelector('#sv-progress');
  btn.disabled = true;
  prog.style.display = 'block';
  prog.textContent = 'REQUESTING AUTH…';

  try {
    // Get fresh token from main window
    const tokenPromise = new Promise((resolve) => {
      const tmpCh = new BroadcastChannel('hud-recorder');
      const timeout = setTimeout(() => { tmpCh.close(); resolve(null); }, 4000);
      tmpCh.addEventListener('message', e => {
        if (e.data.evt === 'AUTH_TOKEN') {
          clearTimeout(timeout); tmpCh.close(); resolve(e.data.token);
        }
      });
      ch.postMessage({ evt: 'REQUEST_AUTH_TOKEN' });
    });

    const token = await tokenPromise;
    if (!token) throw new Error('Auth token unavailable — is ProjectHUD open?');

    // Extract user ID from JWT payload
    let userId = null;
    try {
      userId = JSON.parse(atob(token.split('.')[1])).sub || null;
    } catch(e) {}

    prog.textContent = 'UPLOADING…';
    const ts   = new Date().toISOString().replace(/[:.]/g, '-');
    const path = 'recordings/' + ts + '.webm';
    const category = dlg.querySelector('#sv-cat').value;

    const uploadRes = await fetch(
      SUPABASE_URL + '/storage/v1/object/video-library/' + path,
      { method:'POST', headers:{ 'Authorization':'Bearer '+token, 'Content-Type':'video/webm', 'x-upsert':'false' }, body:blob }
    );
    if (!uploadRes.ok) {
      const err = await uploadRes.json().catch(() => ({}));
      throw new Error(err.message || err.error || uploadRes.statusText);
    }

    prog.textContent = 'SAVING METADATA…';
    const tags = dlg.querySelector('#sv-tags').value.split(',').map(t=>t.trim()).filter(Boolean);

    prog.textContent = 'SAVING METADATA…';

    // Extract user ID from JWT payload (declared above)
    try { userId = JSON.parse(atob(token.split('.')[1])).sub || null; } catch(e) {}

    // Save metadata directly via Supabase REST API using the same fresh token
    // (avoids relying on main window which may have an expired session)
    const metaRes = await fetch(SUPABASE_URL + '/rest/v1/video_clips', {
      method:  'POST',
      headers: {
        'Authorization': 'Bearer ' + token,
        'apikey':        SUPABASE_ANON_KEY,
        'Content-Type':  'application/json',
        'Prefer':        'return=minimal',
      },
      body: JSON.stringify({
        title,
        duration_seconds: duration,
        file_path:        path,
        file_size_bytes:  blob.size,
        category,
        tags,
        annotations,
        is_public:        category === 'marketing',
        author_id:        userId,
      }),
    });
    if (!metaRes.ok) {
      const metaErr = await metaRes.json().catch(() => ({}));
      throw new Error(metaErr.message || metaErr.error || 'Metadata save failed (' + metaRes.status + ')');
    }

    // Notify main window recording was saved
    ch.postMessage({ evt: 'SAVED' });

    prog.textContent = '✓ SAVED';
    prog.style.color = '#00e5a0';
    setTimeout(() => {
      dlg.remove();
      timerEl.textContent = '00:00';
      setStatus('READY TO RECORD');
      chunks = []; annotations = [];
    }, 1400);

  } catch (err) {
    prog.textContent = '✗ ' + err.message;
    prog.style.color = '#ff4757';
    btn.disabled = false;
  }
}
</script>
</body>
</html>
