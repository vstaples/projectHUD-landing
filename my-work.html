      }).join('') : `<div style="padding:10px 11px;font-family:var(--font-head);font-size:12px;color:var(--text3)">No unacknowledged flags</div>`;
      // CoC-derived AI brief (pattern analysis)
      const rejCount = projCoc.filter(e=>e.event_type==='step_reset').length;
      const overdueCount = overdueTasks.length;
      const aiBriefHtml = `<div class="pm-aicard">
        <div class="pm-ai-lbl">■ REQUIRES ACTION</div>
        ${projFlags.length>0?`<div class="pm-ai-item">${esc(projFlags[0].instTitle)} — ${rejCount} rejection${rejCount!==1?'s':''} on this step${projFlags[0].event_notes?', "'+esc(projFlags[0].event_notes.slice(0,60))+'"':''}</div>`:''}
        ${projReqs.length>0?`<div class="pm-ai-item">${projReqs.length} resource request${projReqs.length>1?'s':''} aging — no response</div>`:''}
        ${projFlags.length===0&&projReqs.length===0?`<div class="pm-ai-item">No immediate actions required</div>`:''}
        ${overdueCount>0?`<div style="margin-top:6px"><div class="pm-ai-lbl">● TRENDING TO RISK</div><div class="pm-ai-item">${overdueCount} task${overdueCount!==1?'s':''} overdue — review assignments</div></div>`:''}
        <div style="margin-top:7px;padding-top:6px;border-top:1px solid rgba(239,159,39,.15);display:flex;justify-content:space-between;align-items:center">
          <span style="font-family:var(--font-head);font-size:11px;color:#5A84A8">AI morning brief</span>
          <button class="pm-btn pm-btn-cyan" style="padding:3px 10px;font-size:11px">Full brief →</button>
        </div>
      </div>`;
      // Brief archive (last 6 CoC days)
      const briefDays = (() => {
        const days = {};
        projCoc.forEach(e => { const d=e.created_at.slice(0,10); if(!days[d]) days[d]={date:d,flags:0,risk:0}; if(e.event_type==='step_reset') days[d].flags++; else if(e.event_type==='step_activated') days[d].risk++; });
        return Object.values(days).sort((a,b)=>b.date.localeCompare(a.date)).slice(0,6);
      })();
      const archiveHtml = briefDays.length>0 ? briefDays.map(b=>{
        const isToday=b.date===today;
        const dotColor=b.flags>0?'#E24B4A':b.risk>0?'#EF9F27':'#1D9E75';
        const label=b.flags>0?`<span style="color:#E24B4A">${b.flags} flag${b.flags>1?'s':''}</span>`:b.risk>0?`<span style="color:#EF9F27">${b.risk} activated</span>`:`<span style="color:#5A84A8">all clear</span>`;
        const dLabel=new Date(b.date+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',weekday:'short'});
        return `<div class="pm-brief-row">
          <span style="width:6px;height:6px;border-radius:50%;background:${dotColor};flex-shrink:0;margin-top:2px"></span>
          <div class="pm-bdate">${dLabel}${isToday?' · Today':''}</div>
          <div class="pm-bflag">${label}</div>
        </div>`;
      }).join('') : `<div style="padding:8px 11px;font-family:var(--font-head);font-size:12px;color:var(--text3)">No activity this week</div>`;
      drawer.innerHTML = `
        <div class="pm-drhdr">
          <div style="display:flex;align-items:flex-start;justify-content:space-between">
            <div>
              <div class="pm-drname">${esc(p.name)}</div>
              <div class="pm-drdesc">${esc(p.description||p.client||'—')} · Target: ${p.target_date?fmtDate(p.target_date):'—'}</div>
              <div style="display:flex;align-items:center;gap:6px;margin-top:4px">
                ${slabel}
                <span class="pm-chip pm-chip-g">Active</span>
                <span style="display:flex;align-items:center;gap:4px;font-family:var(--font-data);font-size:11px;color:var(--compass-green)">
                  <span class="pm-live-dot"></span>Live
                </span>
              </div>
            </div>
            <div style="text-align:right;flex-shrink:0;margin-left:12px">
              <div style="font-family:var(--font-head);font-size:11px;color:#5A84A8">PM / Owner</div>
              <div style="font-family:var(--font-head);font-size:13px;font-weight:700;color:#F0F6FF">${pmName?esc(pmName.first_name+' '+pmName.last_name):'—'}</div>
              <div style="font-family:var(--font-data);font-size:11px;color:#5A84A8;margin-top:2px">${new Date().toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})}</div>
              <button onclick="document.getElementById('pm-drawer').remove();document.querySelectorAll('.pm-pcard').forEach(c=>c.classList.remove('open'))"
                style="background:none;border:none;color:#5A84A8;font-size:16px;cursor:pointer;margin-top:3px;padding:0;line-height:1"
                onmouseenter="this.style.color='#F0F6FF'" onmouseleave="this.style.color='#5A84A8'">✕</button>
            </div>
          </div>
        </div>
        <div class="pm-drstrip">
          <div class="pm-drc"><div class="pm-drc-lbl">Tasks</div><div class="pm-drc-val" style="color:var(--text0)"><span style="color:var(--compass-green)">${doneTasks}</span>/${totalTasks}</div><div class="pm-drc-sub">complete</div></div>
          <div class="pm-drc"><div class="pm-drc-lbl">Overdue</div><div class="pm-drc-val" style="color:${overdueTasks.length>0?'var(--compass-red)':'var(--text3)'}">${overdueTasks.length}</div><div class="pm-drc-sub">tasks</div></div>
          <div class="pm-drc"><div class="pm-drc-lbl">Workflows</div><div class="pm-drc-val" style="color:var(--compass-cyan)">${projInsts.length}</div><div class="pm-drc-sub">in progress</div></div>
          <div class="pm-drc"><div class="pm-drc-lbl">Red flags</div><div class="pm-drc-val" style="color:${projFlags.length>0?'var(--compass-red)':'var(--text3)'}">${projFlags.length}</div><div class="pm-drc-sub">unacknowledged</div></div>
          <div class="pm-drc"><div class="pm-drc-lbl">Hours today</div><div class="pm-drc-val" style="color:var(--compass-cyan)">${todayHrs.toFixed(1)}h</div><div class="pm-drc-sub">across team</div></div>
          <div class="pm-drc"><div class="pm-drc-lbl">Requests</div><div class="pm-drc-val" style="color:${projReqs.length>0?'var(--compass-amber)':'var(--text3)'}">${projReqs.length}</div><div class="pm-drc-sub">pending</div></div>
        </div>
        <div class="pm-drtabs">
          <div class="pm-drtab on">Overview</div>
          <div class="pm-drtab">People</div>
          <div class="pm-drtab">Timesheet</div>
          <div class="pm-drtab">Morning briefs</div>
          <div class="pm-drtab">Decision log</div>
        </div>
        <div class="pm-drbody">
          <div class="pm-drcol">
            <div class="pm-dcsec" style="color:${projFlags.length>0?'#E24B4A':'#5A84A8'}">
              RED FLAGS — PINNED
              ${projFlags.length>0?`<span style="background:rgba(226,75,74,.2);color:#E24B4A;padding:1px 6px;font-size:10px;font-weight:700;margin-left:4px">${projFlags.length} unacknowledged</span>`:''}
            </div>
            ${flagsHtml}
            <div class="pm-dcsec" style="color:#EF9F27;margin-top:4px">AI NARRATIVE · TODAY</div>
            ${aiBriefHtml}
          </div>
          <div class="pm-drcol">
            <div class="pm-dcsec">LIVE FEED <span class="pm-live-dot" style="margin-left:4px"></span></div>
            ${projFeedEvents.length>0
              ? projFeedEvents.map(e=>{
                  const isRej=e.event_type==='step_reset',isDone=e.event_type==='step_completed';
                  const c=isRej?'var(--compass-red)':isDone?'var(--compass-green)':'var(--compass-amber)';
                  return `<div class="pm-feed-row">
                    <span style="color:${c};font-size:12px;flex-shrink:0">${isRej?'↩':isDone?'✓':'●'}</span>
                    <div style="flex:1;min-width:0">
                      <div style="font-family:var(--font-body);font-size:11px;color:var(--text1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(e.step_name||'—')}${e.actor_name?' — '+esc(e.actor_name):''}</div>
                      ${e.event_notes&&isRej?`<div style="font-family:var(--font-head);font-size:11px;color:var(--compass-red);font-style:italic">"${esc(e.event_notes.slice(0,50))}"</div>`:''}
                    </div>
                    <div style="font-family:var(--font-data);font-size:11px;color:#5A84A8;flex-shrink:0">${_timeAgo(e.created_at)}</div>
                  </div>`;
                }).join('')
              : `<div style="padding:10px 11px;font-family:var(--font-head);font-size:12px;color:var(--text3)">No activity for this project</div>`}
            <div class="pm-dcsec" style="margin-top:4px">BRIEF ARCHIVE</div>
            ${archiveHtml}
          </div>
        </div>`;
      document.body.appendChild(drawer);
      // Close on outside click
      setTimeout(()=>{
        document.addEventListener('mousedown', function closeDr(ev){
          if(!drawer.contains(ev.target)&&!ev.target.closest('.pm-pcard')){
            drawer.remove();
            document.querySelectorAll('.pm-pcard').forEach(c=>c.classList.remove('open'));
            document.removeEventListener('mousedown',closeDr);
          }
        });
      },50);
    };

  } catch(e) {
    console.error('[Compass] loadPMView error:', e);
    content.innerHTML = '<div style="padding:20px;font-family:var(--font-head);font-size:11px;color:var(--compass-red)">Failed to load PM view — check console</div>';
  }
}




// ══════════════════════════════════════════════════════════
// VIEW: MANAGEMENT
// ══════════════════════════════════════════════════════════
async function loadManagementView() {
  const content = document.getElementById('mgmt-content');
  if (!content) return;

  content.innerHTML = `<div style="padding:20px;font-family:var(--font-head);font-size:12px;color:var(--text3)">Loading management view…</div>`;

  try {
    const today = new Date().toLocaleDateString('en-CA');
    const todayDate = new Date(today+'T00:00:00');
    const dayOfWeek = todayDate.getDay();
    const isoOffset = dayOfWeek===0?6:dayOfWeek-1;
    const weekStart = new Date(todayDate); weekStart.setDate(todayDate.getDate()-isoOffset);
    const weekDays = Array.from({length:5},(_,i)=>{ const d=new Date(weekStart); d.setDate(weekStart.getDate()+i); return d.toLocaleDateString('en-CA'); });

    const [wfInstances, cocEvents, resourceReqs, confSignals, weekEntries, actionItems] = await Promise.all([
      API.get('workflow_instances?select=id,title,status,current_step_name,project_id,launched_at&status=eq.active&limit=50').catch(()=>[]),
      API.get('workflow_step_instances?select=id,instance_id,event_type,step_name,outcome,actor_name,event_notes,created_at&event_type=in.(step_completed,step_reset,step_activated,task_progress_update,management_decision)&order=created_at.desc&limit=300').catch(()=>[]),
      API.get('resource_requests?select=id,project_id,status,submitted_at&status=eq.pending&order=submitted_at.asc&limit=20').catch(()=>[]),
      API.get(`workflow_step_instances?select=id,instance_id,event_type,outcome,actor_name,created_at&event_type=eq.task_progress_update&created_at=gte.${weekDays[0]}T00:00:00&order=created_at.desc&limit=300`).catch(()=>[]),
      API.get(`time_entries?date=gte.${weekDays[0]}&date=lte.${weekDays[4]}&select=id,project_id,resource_id,date,hours,is_billable&limit=500`).catch(()=>[]),
      API.get('workflow_action_items?status=eq.open&order=due_date.asc&limit=50').catch(()=>[]),
    ]);

    const activeProjects = _projects.filter(p=>p.status==='active');
    const HOURLY_RATE = 8000, HRS_PER_REWORK = 2;
    const reworkEvents = cocEvents.filter(e=>e.event_type==='step_reset');
    const reworkCount  = reworkEvents.length;
    const reworkCost   = reworkCount * HRS_PER_REWORK * HOURLY_RATE;
    const formatYen = n => n>=1000000 ? '¥'+(n/1000000).toFixed(1)+'M' : '¥'+Math.round(n/1000)+'k';

    // Stat cards
    const escalations = (() => {
      const map = {};
      reworkEvents.forEach(e => {
        const k = e.instance_id;
        if (!map[k]) map[k] = 0;
        map[k]++;
      });
      return Object.values(map).filter(c=>c>=2).length;
    })();

    const orgConfidence = (() => {
      const total = confSignals.length;
      if (!total) return null;
      const green = confSignals.filter(e=>e.outcome==='on_track').length;
      return Math.round(green/total*100);
    })();

    const wfTemplates = (() => {
      const tmap = {};
      reworkEvents.forEach(e => {
        const inst = wfInstances.find(w=>w.id===e.instance_id);
        if (!inst) return;
        const key = inst.title||inst.id;
        if (!tmap[key]) tmap[key] = {name:key, resets:0, completions:0};
        tmap[key].resets++;
      });
      cocEvents.filter(e=>e.event_type==='step_completed').forEach(e=>{
        const inst = wfInstances.find(w=>w.id===e.instance_id);
        if (!inst) return;
        const key = inst.title||inst.id;
        if (tmap[key]) tmap[key].completions++;
      });
      return Object.values(tmap).map(t=>({
        ...t,
        failureRate: t.completions>0 ? Math.round(t.resets/(t.resets+t.completions)*100) : (t.resets>0?100:0)
      })).sort((a,b)=>b.failureRate-a.failureRate);
    })();

    const redesignCount = wfTemplates.filter(t=>t.failureRate>=60).length;

    // Per-person sentiment arcs
    const resSentiment = {};
    confSignals.forEach(e=>{
      if(!e.actor_name) return;
      const d = e.created_at.slice(0,10);
      if(!weekDays.includes(d)) return;
      if(!resSentiment[e.actor_name]) resSentiment[e.actor_name]={};
      const prev = resSentiment[e.actor_name][d];
      const rank = {on_track:1,at_risk:2,blocked:3};
      if(!prev||(rank[e.outcome]||0)>(rank[prev]||0)) resSentiment[e.actor_name][d]=e.outcome||'on_track';
    });

    // Build decision queue items
    const queueItems = [];
    // Escalations (instances with 2+ resets)
    const instResets = {};
    reworkEvents.forEach(e=>{ instResets[e.instance_id]=(instResets[e.instance_id]||0)+1; });
    Object.entries(instResets).filter(([,c])=>c>=2).forEach(([instId,count])=>{
      const inst = wfInstances.find(w=>w.id===instId);
      const proj = _projects.find(p=>p.id===inst?.project_id);
      queueItems.push({type:'escalation',priority:'red',title:`${esc(inst?.title||'Workflow')} — ${count} failed interventions`,meta:`${esc(proj?.name||'—')} · ${count} rework cycles without resolution`,rec:`${count} interventions have not resolved this. Requires authority beyond PM level.`,instId,projId:inst?.project_id});
    });
    // Resource requests
    resourceReqs.forEach(r=>{
      const proj = _projects.find(p=>p.id===r.project_id);
      const ageH = Math.round((Date.now()-new Date(r.submitted_at).getTime())/3600000);
      queueItems.push({type:'resource',priority:ageH>48?'red':'amber',title:`Resource request — ${esc(r.role||'Resource')} for ${esc(proj?.name||'—')}`,meta:`Submitted ${ageH}h ago`,rec:ageH>96?`Aging ${ageH}h — requires response`:`Request pending ${ageH}h`,reqId:r.id,projId:r.project_id,age:ageH});
    });

    // Health grid per project
    function dotColor(score) { return score>=0.85?'#1D9E75':score>=0.65?'#EF9F27':'#E24B4A'; }
    function projectHealthDots(p) {
      const projTasks    = _tasks.filter(t=>t.project_id===p.id);
      const overdue      = projTasks.filter(t=>t.due_date&&t.due_date<today&&!['complete','cancelled'].includes(t.status));
      const projInsts    = wfInstances.filter(w=>w.project_id===p.id);
      const projResets   = reworkEvents.filter(e=>projInsts.some(i=>i.id===e.instance_id));
      const projCompleted= cocEvents.filter(e=>e.event_type==='step_completed'&&projInsts.some(i=>i.id===e.instance_id)).length;
      const projEntries  = weekEntries.filter(e=>e.project_id===p.id);
      const projResIds   = new Set(projEntries.map(e=>e.resource_id));
      const taskAssigned = new Set(_tasks.filter(t=>t.project_id===p.id&&t.assigned_to).map(t=>t.assigned_to));
      const projSigs     = confSignals.filter(e=>projInsts.some(i=>i.id===e.instance_id)||projEntries.some(te=>te.resource_id===e.resource_id));
      const hasEsc       = Object.entries(instResets).some(([id,c])=>c>=2&&wfInstances.find(w=>w.id===id)?.project_id===p.id);

      // Honest scores: null = no data (grey), number = scored
      const schedScore = projTasks.length>0 ? 1-(overdue.length/Math.max(projTasks.length,1)) : null;
      const costScore  = p.cpi ? Math.min(parseFloat(p.cpi),1) : null;
      const confScore  = projSigs.length>0 ? projSigs.filter(e=>e.outcome==='on_track').length/projSigs.length : null;
      const reworkScore= projResets.length>0||projCompleted>0 ? (projCompleted>0 ? Math.max(0,1-projResets.length/Math.max(projCompleted,1)) : 0.2) : null;
      const tsScore    = taskAssigned.size>0 ? projResIds.size/taskAssigned.size : null;
      const escScore   = hasEsc ? 0.1 : null;

      function scoreColor(s) {
        if (s===null) return '#2A4060'; // grey = no data
        return s>=0.85?'#1D9E75':s>=0.65?'#EF9F27':'#E24B4A';
      }
      // Expose counts for expand row
      return [
        {label:'Schedule',   score:schedScore, color:scoreColor(schedScore),   overdue:overdue.length,   total:projTasks.length},
        {label:'Cost',       score:costScore,  color:scoreColor(costScore)},
        {label:'Confidence', score:confScore,  color:scoreColor(confScore),    sigCount:projSigs.length, greenSigs:projSigs.filter(e=>e.outcome==='on_track').length},
        {label:'Rework',     score:reworkScore,color:scoreColor(reworkScore),  resets:projResets.length, completions:projCompleted},
        {label:'Timesheets', score:tsScore,    color:scoreColor(tsScore),      logged:projResIds.size,   expected:taskAssigned.size},
        {label:'Escalations',score:escScore,   color:scoreColor(escScore),     hasEsc},
      ];
    }

    // ── Pairing intelligence — actor with highest rejection rate ──────
    const actorResets = {};
    reworkEvents.forEach(e=>{ if(e.actor_name){actorResets[e.actor_name]=(actorResets[e.actor_name]||0)+1;} });
    const topActor = Object.entries(actorResets).sort(([,a],[,b])=>b-a)[0];
    const topActorTotal = topActor ? (cocEvents.filter(e=>e.actor_name===topActor[0]&&(e.event_type==='step_completed'||e.event_type==='step_reset')).length||1) : 0;
    const topActorRate = topActor ? Math.round(topActor[1]/topActorTotal*100) : 0;
    const firmAvgRate  = reworkCount + cocEvents.filter(e=>e.event_type==='step_completed').length > 0
      ? Math.round(reworkCount/(reworkCount+cocEvents.filter(e=>e.event_type==='step_completed').length)*100) : 0;

    // ── Build management brief bullets ───────────────────
    const briefItems = [];
    if (escalations > 0) briefItems.push({color:'#E24B4A',text:`${escalations} escalation${escalations>1?'s':''} — workflow${escalations>1?'s':''} with ${escalations>1?'repeated':'2+'} failed intervention${escalations>1?'s':''}`,tab:'queue'});
    if (resourceReqs.length > 0) briefItems.push({color:'#E24B4A',text:`${resourceReqs.length} resource request${resourceReqs.length>1?'s':''} aging — oldest ${Math.round((Date.now()-new Date(resourceReqs[0].submitted_at).getTime())/3600000)}h`,tab:'queue'});
    if (redesignCount > 0) briefItems.push({color:'#EF9F27',text:`${redesignCount} workflow template${redesignCount>1?'s':''} at redesign threshold`,tab:'workflows'});
    if (topActor && topActorRate > firmAvgRate+20) briefItems.push({color:'#EF9F27',text:`${esc(topActor[0])} — ${topActorRate}% reset rate vs ${firmAvgRate}% firm avg — pairing issue`,tab:'people'});
    const greenProjs = activeProjects.filter(p=>{ const dots=projectHealthDots(p); return dots.every(d=>d.score>=0.8); });
    if (greenProjs.length) briefItems.push({color:'#1D9E75',text:`${greenProjs.map(p=>esc(p.name)).join(', ')} — all health dimensions green`,tab:'overview'});

    // Build mgProjStats for expand row closure (mirrors PM view projStats shape)
    const mgProjStats = activeProjects.map(p => {
      const projTasks    = _tasks.filter(t=>t.project_id===p.id);
      const overdueTasks = projTasks.filter(t=>t.due_date&&t.due_date<today&&!['complete','cancelled'].includes(t.status));
      const projInsts    = wfInstances.filter(w=>w.project_id===p.id);
      const projFlags    = Object.entries(instResets).filter(([id,c])=>c>=2&&wfInstances.find(w=>w.id===id)?.project_id===p.id);
      const projCoc      = cocEvents.filter(e=>projInsts.some(i=>i.id===e.instance_id)).slice(0,6);
      return { p, projTasks, overdueTasks, projInsts, projFlags, projCoc };
    });

    // ─────────────────────────────────────────────────────
    // RENDER
    // ─────────────────────────────────────────────────────
    const s = document.createElement('style');
    s.id='mgmt-styles';
    s.textContent=`
      .mg-wrap{padding:0;background:#070c1a}
      .mg-sstrip{display:grid;grid-template-columns:repeat(5,1fr);border-bottom:1px solid rgba(0,210,255,.1);background:#060b18}
      .mg-sc{padding:10px 14px;border-right:1px solid rgba(0,210,255,.08)}
      .mg-sc:last-child{border-right:none}
      .mg-sc-lbl{font-family:var(--font-head);font-size:11px;font-weight:700;letter-spacing:.09em;color:#3A5C80;margin-bottom:3px;text-transform:uppercase}
      .mg-sc-val{font-family:var(--font-display);font-size:24px;font-weight:700;line-height:1}
      .mg-sc-sub{font-family:var(--font-head);font-size:11px;color:#3A5C80;margin-top:2px}
      .mg-tabs{display:flex;gap:2px;padding:8px 10px;background:#07101f;border-bottom:1px solid rgba(0,210,255,.12)}
      .mg-tab{font-family:var(--font-head);font-size:13px;font-weight:700;letter-spacing:.04em;padding:6px 16px;cursor:pointer;color:#5A84A8;background:#0c1828;border:1px solid rgba(0,210,255,.1);display:flex;align-items:center;gap:6px;transition:all .12s}
      .mg-tab.on{color:#F0F6FF;background:#132035;border-color:rgba(0,210,255,.4)}
      .mg-tab:hover:not(.on){color:#90B8D8;background:#0e1e30}
      .mg-tbadge{font-size:11px;font-weight:700;padding:1px 6px;border-radius:2px}
      .mg-body{padding:10px 12px}
      .mg-panel{background:#0d1a2e;border:1px solid rgba(0,210,255,.1);margin-bottom:10px}
      .mg-panel-head{display:flex;align-items:center;justify-content:space-between;padding:7px 12px;border-bottom:1px solid rgba(0,210,255,.08);background:#07101e}
      .mg-panel-title{font-family:var(--font-head);font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#3A5C80}

    `;
    if (!document.getElementById('mgmt-styles')) document.head.appendChild(s);

    // ─────────────────────────────────────────────────────
    // Module-level management event functions
    // ─────────────────────────────────────────────────────
    window.mgOpenWfModal = function(el) {
      const name  = el.dataset.wfName;
      const rate  = el.dataset.wfRate;
      const resets= el.dataset.wfResets;
      const comp  = el.dataset.wfComp;
      const narr  = el.dataset.aiNarr;
      const act   = el.dataset.actionHtml;
      mgOpenModal(name + ' — Cross-instance analysis',
        '<div class="mg-modal-section">Failure rate</div>' +
        '<div class="mg-modal-block">' + rate + '% own-failure rate · ' + resets + ' resets · ' + comp + ' completions</div>' +
        '<div class="mg-modal-section">AI narrative</div>' +
        '<div class="mg-modal-block mg-modal-ai">' + narr + '</div>' +
        (act ? act : '')
      );
    };
    window.mgOpenLogDecisionModal = function() {
      const body = '<div class="mg-modal-section">Decision type</div>' +
        '<select id="mg-dec-type" class="mg-modal-select"><option>Escalation</option><option>Resource</option><option>Process</option><option>Budget</option><option>People</option></select>' +
        '<div class="mg-modal-section">Decision &amp; reasoning</div>' +
        '<textarea id="mg-dec-text" class="mg-modal-input" rows="3" placeholder="Describe the decision and reasoning…"></textarea>' +
        '<div style="display:flex;gap:6px;margin-top:10px">' +
        '<button class="mg-btn mg-btn-c" onclick="mgLogDecision()">Log decision →</button>' +
        '<button class="mg-btn" style="border-color:rgba(255,255,255,.2);color:#5A84A8" onclick="mgCloseModal()">Cancel</button>' +
        '</div>';
      mgOpenModal('Log a management decision', body);
    };
    window.mgSwitchTab = function(el, name) {
      document.querySelectorAll('.mg-tab').forEach(t=>t.classList.remove('on'));
      document.querySelectorAll('.mg-tc').forEach(c=>c.classList.remove('on'));
      el.classList.add('on');
      const panel = document.getElementById('mg-tc-'+name);
      if (panel) panel.classList.add('on');
    };
    window.mgOpenModal = function(title, bodyHtml) {
      document.getElementById('mg-modal-title').textContent = title;
      document.getElementById('mg-modal-body').innerHTML = bodyHtml;
      document.getElementById('mg-modal-overlay').classList.add('on');
    };
    window.mgCloseModal = function() {
      document.getElementById('mg-modal-overlay').classList.remove('on');
    };

    // ── #5 Stat card tooltips ─────────────────────────────
    window.mgStatHover = function(el, content) {
      let tip = document.getElementById('mg-stat-tip');
      if (!tip) {
        tip = document.createElement('div');
        tip.id = 'mg-stat-tip';
        tip.style.cssText = 'position:fixed;z-index:400;background:#0d1e35;border:1px solid rgba(0,210,255,.3);padding:10px 13px;min-width:220px;max-width:340px;font-family:var(--font-head);font-size:11px;color:#C8DFF0;line-height:1.7;box-shadow:0 8px 32px rgba(0,0,0,.7)';
        document.body.appendChild(tip);
      }
      const r = el.getBoundingClientRect();
      tip.innerHTML = content;
      tip.style.display = 'block';
      tip.style.left = r.left + 'px';
      tip.style.top  = (r.bottom + 6) + 'px';
    };
    window.mgStatLeave = function() {
      const tip = document.getElementById('mg-stat-tip');
      if (tip) tip.style.display = 'none';
    };

    // ── #1 Health grid row expand ──────────────────────────
    window.mgExpandRow = function(projId) {
      const allExp = document.querySelectorAll('.mg-row-expanded');
      const tr = document.getElementById('mg-tr-'+projId);
      const existing = document.getElementById('mg-exp-'+projId);
      allExp.forEach(e => { if (e.id !== 'mg-exp-'+projId) e.remove(); });
      document.querySelectorAll('.mg-hgrid tr.selected').forEach(r=>r.classList.remove('selected'));
      if (existing) { existing.remove(); tr.style.background=''; return; }
      const ps = mgProjStats.find(p=>p.p.id===projId);
      if (!ps || !tr) return;
      tr.classList.add('selected');
      tr.style.background = 'rgba(0,210,255,.06)';
      const dots = projectHealthDots(ps.p);
      const dimRows = dots.map(d => {
        let reason;
        if (d.score === null) {
          reason = 'No data this week';
        } else if (d.label==='Schedule') {
          reason = d.overdue>0 ? d.overdue+' overdue of '+d.total+' tasks · '+ps.overdueTasks.slice(0,3).map(t=>esc(t.name||'task')).join(', ')+(ps.overdueTasks.length>3?' +more':'') : 'All '+d.total+' tasks on schedule';
        } else if (d.label==='Cost') {
          reason = ps.p.cpi ? 'CPI '+parseFloat(ps.p.cpi).toFixed(2) : 'CPI not available';
        } else if (d.label==='Confidence') {
          reason = d.sigCount===0 ? 'No signals posted this week' : d.greenSigs+' green / '+d.sigCount+' total signals ('+Math.round(d.greenSigs/d.sigCount*100)+'%)';
        } else if (d.label==='Rework') {
          reason = d.resets===0&&d.completions===0 ? 'No workflow activity this week' : d.resets+' reset'+(d.resets!==1?'s':'')+' · '+d.completions+' completion'+(d.completions!==1?'s':'');
        } else if (d.label==='Timesheets') {
          reason = d.expected===0 ? 'No assigned resources found' : d.logged+' / '+d.expected+' assigned resources logged time this week';
        } else if (d.label==='Escalations') {
          reason = d.hasEsc ? 'Active escalation — 2+ failed interventions' : 'No escalations';
        }
        const col = d.color;
        return `<div style="display:flex;align-items:baseline;gap:10px;padding:4px 0;border-bottom:1px solid rgba(0,210,255,.06)">
          <div style="width:9px;height:9px;border-radius:50%;background:${col};flex-shrink:0;margin-top:2px"></div>
          <div style="font-family:var(--font-head);font-size:11px;font-weight:700;color:#90B8D8;min-width:88px">${d.label}</div>
          <div style="font-family:var(--font-head);font-size:11px;color:#C8DFF0;flex:1">${d.score===null?'No data':Math.round(d.score*100)+'%'} · ${reason}</div>
        </div>`;
      }).join('');
      const exp = document.createElement('tr');
      exp.id = 'mg-exp-'+projId;
      exp.className = 'mg-row-expanded';
      exp.innerHTML = `<td colspan="7" style="padding:10px 14px;background:#091522;border-left:3px solid rgba(0,210,255,.3)">
        <div style="font-family:var(--font-head);font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#3A5C80;margin-bottom:6px">${esc(ps.p.name)} — Health breakdown</div>
        ${dimRows}
        ${ps.projCoc.length>0?`<div style="font-family:var(--font-head);font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#3A5C80;margin-top:8px;margin-bottom:4px">Recent CoC events</div>
          ${ps.projCoc.slice(0,3).map(e=>`<div style="font-family:var(--font-head);font-size:11px;color:#C8DFF0;padding:3px 0">${e.event_type==='step_reset'?'↩':'✓'} ${esc(e.step_name||'—')} · ${_timeAgo(e.created_at)}${e.actor_name?' · '+esc(e.actor_name):''}</div>`).join('')}`:''}
      </td>`;
      tr.insertAdjacentElement('afterend', exp);
    };

    // ── #2 Queue item expand ───────────────────────────────
    window.mgExpandQueue = function(qi) {
      const existing = document.getElementById('mg-qexp-'+qi);
      const row = document.getElementById('mg-qi-'+qi);
      if (!row) return;
      if (existing) { existing.remove(); row.style.background=''; return; }
      document.querySelectorAll('.mg-qexp').forEach(e=>e.remove());
      document.querySelectorAll('.mg-queue-item').forEach(r=>r.style.background='');
      row.style.background = 'rgba(0,210,255,.04)';
      const q = queueItems[qi];
      if (!q) return;
      const exp = document.createElement('div');
      exp.id = 'mg-qexp-'+qi;
      exp.className = 'mg-qexp';
      exp.style.cssText = 'padding:10px 12px 12px 20px;background:#091522;border-left:3px solid rgba(0,210,255,.2);border-bottom:1px solid rgba(0,210,255,.1)';
      let html = '';
      if (q.type === 'escalation') {
        const projResets = (reworkEvents||[]).filter(e=>wfInstances.find(w=>w.id===e.instance_id)?.project_id===q.projId);
        html += `<div style="font-family:var(--font-head);font-size:11px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:#E24B4A;margin-bottom:6px">Intervention history</div>`;
        if (projResets.length > 0) {
          const grouped = {};
          projResets.forEach(e=>{ grouped[e.instance_id]=(grouped[e.instance_id]||[]); grouped[e.instance_id].push(e); });
          Object.entries(grouped).forEach(([instId, evts]) => {
            const inst = wfInstances.find(w=>w.id===instId);
            html += `<div style="font-family:var(--font-head);font-size:11px;font-weight:700;color:#90B8D8;margin-bottom:3px">${esc(inst?.title||instId)}</div>`;
            evts.forEach(e=>{
              html += `<div style="display:flex;gap:8px;align-items:baseline;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.04)">
                <div style="width:7px;height:7px;border-radius:50%;background:#E24B4A;flex-shrink:0;margin-top:2px"></div>
                <div style="font-family:var(--font-head);font-size:11px;color:#C8DFF0;flex:1">${esc(e.step_name||'Step reset')}${e.event_notes?' — '+esc(e.event_notes.slice(0,80)):''}</div>
                <div style="font-family:var(--font-data);font-size:11px;color:#3A5C80;flex-shrink:0">${_timeAgo(e.created_at)}</div>
              </div>`;
            });
          });
          html += `<div style="font-family:var(--font-head);font-size:11px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:#EF9F27;margin:8px 0 4px">Assessment</div>
            <div style="font-family:var(--font-body);font-size:12px;color:#C8DFF0;line-height:1.55;padding:7px 9px;background:rgba(239,159,39,.05);border-left:2px solid #EF9F27">${instResets.length>=2 ? 'Two or more PM-level interventions have not resolved this issue. The blocking factor appears to require authority beyond PM level — likely direct client authority, an expedited sign-off channel, or a change in the approval architecture.' : 'Single reset on record. PM is managing. Monitor for recurrence before escalating.'}</div>`;
        } else {
          html += `<div style="font-family:var(--font-head);font-size:12px;color:#3A5C80">No CoC intervention history found for this project.</div>`;
        }
      } else {
        const r = resourceReqs.find(req=>req.id===q.reqId);
        const ageH = r ? Math.round((Date.now()-new Date(r.submitted_at).getTime())/3600000) : q.age;
        html += `<div style="font-family:var(--font-head);font-size:11px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:#EF9F27;margin-bottom:6px">Request detail</div>
          <div style="font-family:var(--font-head);font-size:11px;color:#C8DFF0">Submitted ${ageH}h ago · Status: pending</div>
          <div style="font-family:var(--font-head);font-size:11px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:#EF9F27;margin:8px 0 4px">Assessment</div>
          <div style="font-family:var(--font-body);font-size:12px;color:#C8DFF0;line-height:1.55;padding:7px 9px;background:rgba(239,159,39,.05);border-left:2px solid #EF9F27">Request has been pending ${ageH}h. ${ageH>96?'Significantly overdue for response — resource planning impact increasing.':ageH>48?'Aging beyond healthy threshold. PM is blocked on staffing decision.':'Within normal response window.'}</div>`;
      }
      exp.innerHTML = html;
      row.insertAdjacentElement('afterend', exp);
    };

    // ── #3/#4 People — per-project billable breakdown ──────
    window.mgShowPerson = function(fullName, arcStr, weekHrs, taskCount) {
      const r = _resources.find(r=>(r.first_name+' '+r.last_name).trim()===fullName);
      const hasRed = arcStr.includes('R');
      const redIdx = arcStr.indexOf('R'), greenIdx = arcStr.indexOf('G');
      const narrative = hasRed
        ? (redIdx > greenIdx
            ? 'Degradation pattern detected. Review what changed on the day the arc shifted — upstream block or relationship friction is more likely than individual performance failure.'
            : 'Persistent issues this week. Consider direct check-in.')
        : 'Clean week. No pattern concerns.';
      // Per-project billable breakdown
      const projEntries = (weekEntries||[]).filter(e=>e.resource_id===r?.id);
      const byProj = {};
      projEntries.forEach(e => {
        const proj = _projects.find(p=>p.id===e.project_id);
        const k = proj?.name||e.project_id||'Unknown';
        if (!byProj[k]) byProj[k] = {bill:0, nonbill:0, days:{}};
        if (e.is_billable) byProj[k].bill += parseFloat(e.hours||0);
        else byProj[k].nonbill += parseFloat(e.hours||0);
        byProj[k].days[e.date] = (byProj[k].days[e.date]||0) + parseFloat(e.hours||0);
      });
      const dayLbls = ['M','T','W','Th','F'];
      const projBreakdownHtml = Object.entries(byProj).length > 0
        ? Object.entries(byProj).map(([pname, v]) => {
            const tot = v.bill + v.nonbill;
            const billPct = tot > 0 ? Math.round(v.bill/tot*100) : 0;
            const dayBar = weekDays.map((d,i) => {
              const h = v.days[d]||0;
              return `<div style="text-align:center">
                <div style="font-family:var(--font-head);font-size:11px;color:#3A5C80">${dayLbls[i]}</div>
                <div style="height:22px;width:18px;background:rgba(255,255,255,.06);border-radius:1px;overflow:hidden;margin:2px auto 0;position:relative">
                  ${h>0?`<div style="position:absolute;bottom:0;left:0;right:0;height:${Math.min(100,h/8*100)}%;background:var(--compass-cyan);opacity:.8"></div>`:''}
                </div>
                <div style="font-family:var(--font-head);font-size:11px;color:#C8DFF0;margin-top:2px">${h>0?h.toFixed(1):'—'}</div>
              </div>`;
            }).join('');
            return `<div style="background:#091522;border:1px solid rgba(0,210,255,.1);padding:8px 10px;margin-bottom:6px">
              <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px">
                <span style="font-family:var(--font-head);font-size:11px;font-weight:700;color:#90B8D8">${esc(pname)}</span>
                <span style="font-family:var(--font-head);font-size:11px;color:#3A5C80">${tot.toFixed(1)}h · <span style="color:var(--compass-cyan)">${v.bill.toFixed(1)}h bill</span> / <span style="color:#8B5CF6">${v.nonbill.toFixed(1)}h non-bill</span></span>
              </div>
              <div style="height:3px;background:rgba(255,255,255,.07);border-radius:2px;overflow:hidden;margin-bottom:6px">
                <div style="height:100%;width:${billPct}%;background:var(--compass-cyan);border-radius:2px"></div>
              </div>
              <div style="display:flex;gap:8px;justify-content:space-between">${dayBar}</div>
            </div>`;
          }).join('')
        : `<div style="font-family:var(--font-head);font-size:12px;color:#3A5C80">No time entries this week</div>`;
      const body = `
        <div class="mg-modal-section">Week arc — ${arcStr}</div>
        <div style="display:flex;gap:10px;margin-bottom:10px">
          ${arcStr.split('→').map((s,i)=>{
            const c=s==='G'?'#1D9E75':s==='Y'?'#EF9F27':s==='R'?'#E24B4A':'rgba(255,255,255,.12)';
            return `<div style="text-align:center"><div style="width:14px;height:14px;border-radius:50%;background:${c};margin:0 auto"></div><div style="font-family:var(--font-head);font-size:11px;color:#3A5C80;margin-top:3px">${['M','T','W','Th','F'][i]||''}</div></div>`;
          }).join('')}
          <div style="margin-left:auto;text-align:right">
            <div style="font-family:var(--font-display);font-size:20px;font-weight:700;color:var(--compass-cyan)">${weekHrs}h</div>
            <div style="font-family:var(--font-head);font-size:11px;color:#3A5C80">${taskCount} open tasks</div>
          </div>
        </div>
        <div class="mg-modal-section">Billable vs non-billable by project</div>

    const q1Start = new Date(new Date().getFullYear(),0,1).toLocaleDateString('en-CA');

    const [wfInstances, cocEvents, resourceReqs] = await Promise.all([
      API.get('workflow_instances?select=id,title,status,project_id,launched_at&status=eq.active&limit=100').catch(()=>[]),
      API.get('workflow_step_instances?select=id,instance_id,event_type,outcome,actor_name,created_at,step_name&event_type=in.(step_completed,step_reset)&order=created_at.desc&limit=500').catch(()=>[]),
      API.get('resource_requests?select=id,status,submitted_at,project_id&status=eq.pending').catch(()=>[]),
    ]);

    const activeProjects = _projects.filter(p=>p.status==='active');
    const HOURLY_RATE = 8000, HRS_PER_REWORK = 2;
    const reworkEvents  = cocEvents.filter(e=>e.event_type==='step_reset');
    const reworkCount   = reworkEvents.length;
    const reworkCost    = reworkCount * HRS_PER_REWORK * HOURLY_RATE;
    const completedCount= cocEvents.filter(e=>e.event_type==='step_completed').length;
    const reworkRate    = completedCount>0 ? Math.round(reworkCount/(reworkCount+completedCount)*100) : 0;
    const portfolioSPI  = _projects.filter(p=>p.spi).reduce((s,p,_,a)=>s+parseFloat(p.spi)/a.length,0)||null;
    const formatYen = n => n>=1000000 ? '¥'+(n/1000000).toFixed(1)+'M' : '¥'+Math.round(n/1000)+'k';
    const fmtDate2 = s => s ? new Date(s+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'}) : '—';

    // Rework by project
    const reworkByProj = {};
    reworkEvents.forEach(e=>{
      const inst = wfInstances.find(w=>w.id===e.instance_id);
      if(!inst?.project_id) return;
      reworkByProj[inst.project_id] = (reworkByProj[inst.project_id]||0)+1;
    });
    const maxRework = Math.max(1,...Object.values(reworkByProj));

    // Root cause breakdown (stub ratios from observed pattern)
    const preventable = Math.round(reworkCost*0.66);
    const dependency  = Math.round(reworkCost*0.22);
    const complexity  = reworkCost - preventable - dependency;

    // Workflow redesign candidates
    const templateMap = {};
    reworkEvents.forEach(e=>{
      const inst = wfInstances.find(w=>w.id===e.instance_id);
      if(!inst) return;
      const key = inst.title||inst.id;
      if(!templateMap[key]) templateMap[key]={name:key,resets:0,completions:0};
      templateMap[key].resets++;
    });
    cocEvents.filter(e=>e.event_type==='step_completed').forEach(e=>{
      const inst = wfInstances.find(w=>w.id===e.instance_id);
      if(!inst) return;
      const key = inst.title||inst.id;
      if(templateMap[key]) templateMap[key].completions++;
    });
    const redesignTemplates = Object.values(templateMap).filter(t=>{
      const total = t.resets+t.completions;
      return total>0 && t.resets/total>=0.6;
    });
    const redesignCost = redesignTemplates.length * 18000;
    const redesignSavings = reworkCost * 0.6;

    // Archive briefs — built after redesignTemplates is available

// VIEW: CLIENT PORTAL

async function loadClientView() {
  const content = document.getElementById('client-content');
  if (!content) return;

  content.innerHTML = `<div style="padding:20px;font-family:var(--font-head);font-size:12px;color:var(--text3)">Loading client portal…</div>`;

  try {
    const clientProjectId = new URLSearchParams(window.location.search).get('project')||null;
    const clientProject   = clientProjectId
      ? _projects.find(p=>p.id===clientProjectId)
      : _projects.find(p=>p.status==='active')||null;

    if (!clientProject) {
      content.innerHTML='<div style="padding:20px;font-family:var(--font-head);font-size:12px;color:#3A5C80">No active project found for client portal</div>';
      return;
    }

    const today = new Date().toLocaleDateString('en-CA');
    const [projTasks, wfInstances, resourceReqs] = await Promise.all([
      API.get(`tasks?select=id,name,status,due_date,pct_complete,sequence_order&project_id=eq.${clientProject.id}&limit=200`).catch(()=>[]),
      API.get(`workflow_instances?select=id,title,status,current_step_name,project_id&project_id=eq.${clientProject.id}&limit=20`).catch(()=>[]),
      API.get(`resource_requests?select=id,project_id,status,submitted_at&project_id=eq.${clientProject.id}&status=eq.pending`).catch(()=>[]),
    ]);

    const totalTasks = projTasks.length;
    const doneTasks  = projTasks.filter(t=>t.status==='complete').length;
    const overdue    = projTasks.filter(t=>t.due_date&&t.due_date<today&&!['complete','cancelled'].includes(t.status)).length;
    const pct        = totalTasks>0?Math.round(doneTasks/totalTasks*100):0;
    const pmRes      = _resources.find(r=>r.id===clientProject.pm_resource_id);
    const pmName     = pmRes ? pmRes.first_name+' '+pmRes.last_name : 'Project Manager';
    const team       = _resources.filter(r=>r.is_active).slice(0,4);
    const budgetUsedPct = clientProject.budget_hours_used&&clientProject.budget_hours
      ? Math.min(100,Math.round(parseFloat(clientProject.budget_hours_used)/parseFloat(clientProject.budget_hours)*100)) : null;
    const fmtDate3 = s => s ? new Date(s+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : '—';

    // Derive milestones from phases or tasks
    const phases = [...new Set(projTasks.map(t=>t.phase).filter(Boolean))];
    const milestones = phases.length>0 ? phases.map((ph,i)=>{
      const phaseTasks = projTasks.filter(t=>t.phase===ph);
      const done = phaseTasks.filter(t=>t.status==='complete').length;
      const pp = phaseTasks.length>0?Math.round(done/phaseTasks.length*100):0;
      const latestDue = phaseTasks.map(t=>t.due_date).filter(Boolean).sort().slice(-1)[0];
      const status = pp>=100?'complete':i===0||pp>0?'active':'upcoming';
      return {name:'M'+(i+1)+' — '+ph, date:latestDue, pct:pp, status};
    }) : [{name:'M1 — Project work',date:clientProject.target_date,pct,status:pct>=100?'complete':pct>0?'active':'upcoming'}];

    // Client decision items
    const decisions = [];
    if (overdue>0) decisions.push({urgency:'red',title:`${overdue} overdue task${overdue>1?'s':''} — schedule impact`,desc:`${overdue} task${overdue>1?'s':''} passed their planned completion date. Review with your project manager.`,due:'Action needed',action:'Review schedule'});
    if (resourceReqs.length>0) decisions.push({urgency:'amber',title:`Resource allocation — response requested`,desc:'Your project manager has submitted a resource request. Your awareness and any concerns should be shared.',due:`${resourceReqs.length} pending`,action:'Review request'});
    if (clientProject.target_date&&new Date(clientProject.target_date+'T00:00:00')<new Date(Date.now()+30*86400000)) decisions.push({urgency:'amber',title:`Delivery gate approaching — ${fmtDate3(clientProject.target_date)}`,desc:'Delivery date is within 30 days. Confirm your team readiness for handover and review.',due:'Review by '+fmtDate3(clientProject.target_date),action:'Confirm readiness'});

    // Status for KPI

    const statusColor = overdue>5?'#A32D2D':overdue>0?'#854F0B':'#0F6E56';

window.openDecisionSimulator = async function(projectId, projectName, contextNote) {
  document.getElementById('sim-modal')?.remove();

  // Full-screen modal overlay
  const modal = document.createElement('div');
  modal.id = 'sim-modal';
  modal.style.cssText = 'position:fixed;inset:0;background:#060c18;z-index:400;display:flex;flex-direction:column;overflow:hidden;animation:sim-fadein .18s ease';

  // Inject keyframe once
  if (!document.getElementById('sim-anim-style')) {
    const st = document.createElement('style');
    st.id = 'sim-anim-style';
    st.textContent = '@keyframes sim-fadein{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}';
    document.head.appendChild(st);
  }

  const today = new Date().toLocaleDateString('en-CA');
  const HOURLY_RATE = 8000, HRS_PER_REWORK = 2;

  // Fetch live data for this project
  let projTasks = [], wfInstances = [], reworkEvents = [], resourceReqs = [];
  try {
    [projTasks, wfInstances, resourceReqs] = await Promise.all([
      projectId ? API.get(`tasks?project_id=eq.${projectId}&select=id,name,status,due_date,pct_complete,assigned_to,phase,sequence_order,predecessors&order=sequence_order.asc&limit=100`).catch(()=>[]) : Promise.resolve([]),
      projectId ? API.get(`workflow_instances?project_id=eq.${projectId}&status=eq.active&select=id,title,status,current_step_name&limit=20`).catch(()=>[]) : Promise.resolve([]),
      API.get('resource_requests?select=id,project_id,status,submitted_at&status=eq.pending&limit=10').catch(()=>[]),
    ]);
    const instIds = wfInstances.map(i=>i.id);
    if (instIds.length) {
      reworkEvents = await API.get(`workflow_step_instances?select=id,instance_id,event_type,step_name,outcome,created_at&instance_id=in.(${instIds.join(',')})&event_type=eq.step_reset&order=created_at.desc&limit=50`).catch(()=>[]);
    }
  } catch(e) { console.error('[Compass] Simulator data fetch error:', e); }

  const proj = (_projects||[]).find(p=>p.id===projectId);
  const overdueTasks = projTasks.filter(t=>t.due_date&&t.due_date<today&&!['complete','cancelled'].includes(t.status));
  const blockedTasks = projTasks.filter(t=>t.status==='blocked'||t.status==='on_hold');
  const instResets = {};
  reworkEvents.forEach(e=>{ instResets[e.instance_id]=(instResets[e.instance_id]||0)+1; });
  const escalations = Object.entries(instResets).filter(([,c])=>c>=2);
  const slipDays = overdueTasks.length > 0 ? Math.max(...overdueTasks.map(t=>{
    const d = Math.round((new Date(today+'T00:00:00')-new Date(t.due_date+'T00:00:00'))/(86400000));
    return Math.max(0,d);
  })) : 0;
  const dailyCost = 12000; // ¥12k/day default
  const formatYen = n => n>=1000000?'¥'+(n/1000000).toFixed(1)+'M':'¥'+Math.round(n/1000)+'k';

  // Build levers from real data
  const LEVERS_LIVE = [];

  // Escalation levers if there are 2+ resets
  if (escalations.length > 0) {
    const [instId, count] = escalations[0];
    const inst = wfInstances.find(w=>w.id===instId);
    LEVERS_LIVE.push({
      id:'esc-mgmt', group:'escalation',
      name:'Escalate to management — '+esc(inst?.title||'workflow block'),
      costTier:'low', days:-3, hard:0, sr:83, conf:88,
      warn:null,
      pattern: count>=3 ? `${count} consecutive failures — systematic block. Resource reassignment will NOT address this. Escalation is the correct lever.` : null,
      unblocks: overdueTasks.slice(0,3).map(t=>t.id),
      reworkRisk:[], params:[{l:'Response target',o:['24h','48h','72h']}],
      detail: `${count} PM-level intervention${count>1?'s have':' has'} not resolved this. Management authority required — direct client contact or expedited approval path.`
    });
    LEVERS_LIVE.push({
      id:'esc-client', group:'escalation',
      name:'Executive contact — client authority',
      costTier:'low', days:-2, hard:0, sr:76, conf:72,
      warn: null, pattern: null,
      unblocks: overdueTasks.slice(0,3).map(t=>t.id),
      reworkRisk:[], params:[{l:'Channel',o:['Account exec','Technical director','Both']}],
      detail:'Direct client authority contact. Lower confidence (72%) due to external dependency.'
    });
  }

  // Resource levers from pending requests
  resourceReqs.filter(r=>r.project_id===projectId||!projectId).forEach(r=>{
    const ageH = Math.round((Date.now()-new Date(r.submitted_at).getTime())/3600000);
    LEVERS_LIVE.push({
      id:'res-'+r.id, group:'resource',
      name:'Approve resource request — '+esc(r.role||'resource'),
      costTier:'med', days:-2, hard:18000, sr:62, conf:65,
      warn:`Request aging ${ageH}h. Approving now affects resource planning for other projects.`,
      pattern: escalations.length>0 ? `Current block appears to be an approval constraint, not a resource constraint. ${62}% success rate reflects cases where resource reallocation does not address upstream sign-off blocks.` : null,
      unblocks:[], reworkRisk:[], params:[{l:'Duration',o:['1 week','2 weeks','Until resolved']}],
      detail:`Resource request pending ${ageH}h. Approval unblocks PM planning and demonstrates management engagement.`
    });
  });

  // CPM-derived parallel options from tasks with no blockers
  const availableTasks = projTasks.filter(t=>
    !['complete','cancelled'].includes(t.status) &&
    t.status !== 'blocked' &&
    (!t.predecessors || t.predecessors.length===0 || t.predecessors==='{}')
  ).slice(0,4);

  if (availableTasks.length >= 2) {
    LEVERS_LIVE.push({
      id:'cpm-parallel', group:'cpm',
      name:`CPM Option — advance ${availableTasks.length} independent tasks in parallel`,
      costTier:'low', days: -Math.min(3, availableTasks.length), hard:0, sr:95, conf:90,
      warn: null, pattern: null,
      unblocks:[], advances: availableTasks.map(t=>t.id.slice(0,8)),
      reworkRisk:[], params:[],
      detail:`${availableTasks.length} tasks have no blocking predecessors. Advancing these now recovers schedule while the primary block is resolved.`
    });
  }

  // Expedite option (always available as a materials lever)
  LEVERS_LIVE.push({
    id:'mat-exp', group:'materials',
    name:'Expedite delivery / fast-track resolution path',
    costTier:'high', days:-5, hard:85000, sr:95, conf:90,
    risk:'Non-cancellable after 24h. Confirm viability first.',
    warn:null, pattern:null,
    unblocks: overdueTasks.slice(0,3).map(t=>t.id),
    reworkRisk:[], params:[{l:'Track',o:['Expedite supplier (2d, +¥85k)','Alt supplier (4d, +¥60k)','Direct procurement (6d, +¥95k)']}],
    detail:'Deterministic outcome — not behavioural. 95% confidence if capacity confirmed. Net cost ¥25k after schedule value recovered.'
  });

  // Scope deferral
  LEVERS_LIVE.push({
    id:'scope-defer', group:'materials',
    name:'Defer non-critical deliverables to next phase',
    costTier:'low', days:-2, hard:0, sr:92, conf:85,
    warn:null, pattern:null,
    unblocks:[], reworkRisk:[], params:[{l:'Scope',o:['Non-critical docs (2d)','Optional integrations (3d)','Cosmetic items (1d)']}],
    detail:'High success rate because cosmetic and non-critical items have no dependency on blocked path. Frees critical-path resources.'
  });

  const GROUP_META = {
    escalation:{color:'#E24B4A',label:'Escalation levers'},
    resource:{color:'#00D2FF',label:'Resource levers'},
    materials:{color:'#8B5CF6',label:'Materials levers'},
    cpm:{color:'#8B5CF6',label:'CPM-derived parallel options'}
  };

  const selected = new Set();
  let spCount = 0;

  modal.innerHTML = `
    <style>
      .sim-lc{border:1px solid rgba(255,255,255,.07);padding:7px 9px;margin-bottom:4px;transition:border-color .12s,background .12s;cursor:pointer}
      .sim-lc:hover{border-color:rgba(0,210,255,.2);background:rgba(0,210,255,.03)}
      .sim-lc.sim-sel{border-color:rgba(0,210,255,.45);background:rgba(0,210,255,.07)}
      .sim-lc.sim-cpm{border-left:3px solid rgba(139,92,246,.5)}
      .sim-lc.sim-warn{border-left:3px solid rgba(239,159,39,.6)}
      .sim-chk{width:14px;height:14px;border:1px solid rgba(255,255,255,.2);border-radius:2px;display:inline-flex;align-items:center;justify-content:center;font-size:10px;color:transparent;flex-shrink:0;transition:.12s}
      .sim-lc.sim-sel .sim-chk{background:#00D2FF;border-color:#00D2FF;color:#060a10}
      .sim-sp{position:absolute;background:#0d1f35;border:1px solid rgba(0,210,255,.35);min-width:260px;max-width:360px;z-index:500}
      .sim-sp-head{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;background:#091524;border-bottom:1px solid rgba(0,210,255,.2);cursor:move;user-select:none}
      .sim-wf-row{display:flex;align-items:center;gap:8px;margin-bottom:4px;cursor:pointer;padding:3px 0;transition:background .1s}
      .sim-wf-row:hover{background:rgba(255,255,255,.03)}
    </style>
    <div style="display:flex;flex-direction:column;height:100%;overflow:hidden">
      <!-- Nav -->
      <div style="display:flex;align-items:center;height:40px;background:#060a10;border-bottom:1px solid rgba(0,210,255,.12);padding:0 14px;flex-shrink:0;gap:8px">

  // ── Module functions scoped to this simulator instance ──
  function simSwitchTab(tab) {
    document.getElementById('sim-lv-levers').style.display = tab==='levers'?'block':'none';
    document.getElementById('sim-lv-cpm').style.display   = tab==='cpm'?'block':'none';
    document.getElementById('sim-tab-levers').style.color         = tab==='levers'?'#00D2FF':'rgba(255,255,255,.35)';
    document.getElementById('sim-tab-levers').style.borderBottomColor = tab==='levers'?'#00D2FF':'transparent';
    document.getElementById('sim-tab-cpm').style.color           = tab==='cpm'?'#00D2FF':'rgba(255,255,255,.35)';
    document.getElementById('sim-tab-cpm').style.borderBottomColor   = tab==='cpm'?'#00D2FF':'transparent';
  }
  window.simSwitchTab = simSwitchTab;

  function simToggleLever(id) {
    const card = document.getElementById('simlc-'+id);
    if (!card) return;
    if (selected.has(id)) { selected.delete(id); card.classList.remove('sim-sel'); }
    else                  { selected.add(id);    card.classList.add('sim-sel'); }
    simRunSim();
  }
  window.simToggleLever = simToggleLever;

  function simOpenSP(title, rows, result, note, colorBorder) {
    spCount++;
    const pid = 'simsp-'+spCount;
    const inner = document.getElementById('sim-inner');
    const sp = document.createElement('div');
    sp.id = pid;
    sp.className = 'sim-sp';
    sp.style.cssText = `left:${Math.min(360+spCount*16,520)}px;top:${Math.min(60+spCount*16,180)}px;width:300px`;
    sp.style.borderLeftColor = colorBorder||'rgba(0,210,255,.35)';
    sp.innerHTML = `<div class="sim-sp-head" id="sph-${pid}">
      <span style="font-family:var(--font-head);font-size:11px;font-weight:700;color:#00D2FF;text-transform:uppercase;letter-spacing:.06em">${title}</span>
      <button onclick="document.getElementById('${pid}').remove()" style="background:none;border:1px solid rgba(226,75,74,.4);color:#E24B4A;width:18px;height:18px;cursor:pointer;font-size:10px">✕</button>
    </div>
    <div style="padding:10px 12px;max-height:380px;overflow-y:auto">
      ${rows.map(r=>`<div style="display:flex;justify-content:space-between;gap:14px;font-family:var(--font-head);font-size:11px;color:rgba(240,246,255,.75);margin-bottom:4px">
        <span style="color:rgba(255,255,255,.4);flex-shrink:0;max-width:160px">${r[0]}</span>
        <span style="font-weight:700;color:#F0F6FF;text-align:right">${r[1]}</span>
      </div>`).join('')}
      <div style="height:1px;background:rgba(0,210,255,.2);margin:7px 0"></div>
      <div style="font-family:var(--font-display);font-size:14px;font-weight:700;color:#F0F6FF;margin:3px 0">${result}</div>
      ${note?`<div style="font-family:var(--font-body);font-size:11px;color:rgba(255,255,255,.4);margin-top:6px;line-height:1.5;border-top:1px solid rgba(255,255,255,.07);padding-top:6px">${note}</div>`:''}
    </div>
    <div style="position:absolute;bottom:0;right:0;width:12px;height:12px;cursor:se-resize;background:linear-gradient(135deg,transparent 50%,rgba(0,210,255,.25) 50%)" id="spr-${pid}"></div>`;
    inner.appendChild(sp);
    // Draggable
    const head = document.getElementById('sph-'+pid);
    let ox,oy,sx,sy;
    head.addEventListener('mousedown',e=>{
      e.preventDefault(); sx=sp.offsetLeft; sy=sp.offsetTop; ox=e.clientX; oy=e.clientY;
      const mm=e2=>{sp.style.left=(sx+e2.clientX-ox)+'px';sp.style.top=(sy+e2.clientY-oy)+'px';};
      const mu=()=>{document.removeEventListener('mousemove',mm);document.removeEventListener('mouseup',mu);};
      document.addEventListener('mousemove',mm); document.addEventListener('mouseup',mu);
    });
    // Resizable
    const rsz = document.getElementById('spr-'+pid);
    let ow2,oh2,ox2,oy2;
    rsz.addEventListener('mousedown',e=>{
      e.preventDefault(); e.stopPropagation(); ow2=sp.offsetWidth; oh2=sp.offsetHeight; ox2=e.clientX; oy2=e.clientY;
      const mm=e2=>{sp.style.width=Math.max(220,ow2+e2.clientX-ox2)+'px';sp.style.maxHeight=Math.max(180,oh2+e2.clientY-oy2)+'px';};
      const mu=()=>{document.removeEventListener('mousemove',mm);document.removeEventListener('mouseup',mu);};
      document.addEventListener('mousemove',mm); document.addEventListener('mouseup',mu);
    });
  }
  window.simOpenSP = simOpenSP;

  function simRunSim() {
    const results = document.getElementById('sim-results');
    const empty   = document.getElementById('sim-empty');
    const cb      = document.getElementById('sim-cb');
    if (!selected.size) {
      results.style.display='none'; empty.style.display='flex'; cb.style.display='none'; return;
    }
    empty.style.display='none'; results.style.display='block'; cb.style.display='flex';

    let totalDays=0, totalHard=0, minSR=100, wConf=0;
    const levers=[], risks=[], patterns=[];
    const unblockedTasks=new Set(), advancedTasks=new Set(), reworkTasks=new Set();

    selected.forEach(id=>{
      const d = LEVERS_LIVE.find(l=>l.id===id);
      if(!d) return;
      totalDays+=d.days; totalHard+=d.hard; minSR=Math.min(minSR,d.sr); wConf+=d.conf;
      levers.push(d);
      if(d.risk) risks.push({text:d.risk,sev:d.sr<70?'#E24B4A':'#EF9F27'});
      if(d.pattern) patterns.push(d.pattern);
      (d.unblocks||[]).forEach(t=>unblockedTasks.add(t));
      (d.advances||[]).forEach(t=>advancedTasks.add(t));
      (d.reworkRisk||[]).forEach(t=>reworkTasks.add(t));
    });

    const avgConf  = Math.round(wConf/selected.size);
    const recovDays= Math.max(0,-totalDays);
    const projSlip = Math.max(0,slipDays+totalDays);
    const schedVal = recovDays*dailyCost;
    const netCost  = totalHard-schedVal;
    const pd = new Date(); pd.setDate(pd.getDate()+projSlip);
    const fmt = d=>d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
    const noActionDate = new Date(); noActionDate.setDate(noActionDate.getDate()+slipDays+1);

    document.getElementById('sim-cb-sum').innerHTML = `<span>${selected.size}</span> lever${selected.size>1?'s':''} · <span>${recovDays}d</span> recovered · <span>${formatYen(totalHard)}</span> hard cost · net: <span style="color:${netCost<=0?'#1D9E75':'#EF9F27'}">${netCost<=0?formatYen(Math.abs(netCost))+' benefit':formatYen(netCost)+' cost'}</span>`;

    const patternBlock = patterns.length ? `<div style="margin-bottom:12px;padding:9px 11px;background:rgba(139,92,246,.05);border:1px solid rgba(139,92,246,.2);border-left:3px solid #8B5CF6">
      <div style="font-family:var(--font-head);font-size:11px;font-weight:700;color:#8B5CF6;letter-spacing:.06em;text-transform:uppercase;margin-bottom:4px">Pattern analysis — active warning</div>
      <div style="font-family:var(--font-body);font-size:11px;color:rgba(240,246,255,.7);line-height:1.55">${patterns[0]}</div>
    </div>` : '';

    const unblockList = [...unblockedTasks].map(id=>{
      const t = projTasks.find(tt=>tt.id===id);
      return `<div style="display:flex;align-items:center;gap:5px;font-family:var(--font-head);font-size:11px;color:rgba(240,246,255,.75);margin-bottom:3px"><span style="font-weight:700;color:rgba(0,210,255,.6);min-width:60px">${id.slice(0,8)}</span>${esc(t?.name||'Task')}</div>`;
    }).join('');
    const advanceList = [...advancedTasks].map(id=>{
      return `<div style="display:flex;align-items:center;gap:5px;font-family:var(--font-head);font-size:11px;color:rgba(240,246,255,.75);margin-bottom:3px"><span style="font-weight:700;color:#8B5CF6;min-width:60px">${id.slice(0,8)}</span>Parallel advance</div>`;
    }).join('');
    const remainingBlocked = escalations.length>0 && !selected.has('esc-mgmt') && !selected.has('esc-client') && !selected.has('mat-exp')
      ? overdueTasks.slice(0,3).map(t=>`<div style="display:flex;align-items:center;gap:5px;font-family:var(--font-head);font-size:11px;color:#E24B4A;margin-bottom:3px"><span style="font-weight:700;min-width:60px">${t.id.slice(0,8)}</span>${esc(t.name||'task')}</div>`).join('')
      : '';

    results.innerHTML = `
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <div>
          <div style="font-family:var(--font-display);font-size:16px;font-weight:700;color:#F0F6FF">Projected outcome</div>
          <div style="font-family:var(--font-head);font-size:11px;color:#3A5C80;margin-top:2px">${selected.size} lever${selected.size>1?'s':''} · click any value to open explanation</div>
        </div>
      </div>
      ${patternBlock}
      <!-- Scenario comparison -->
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px">
        <div style="border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.02)">

          <div style="padding:9px 11px">
            <div style="font-family:var(--font-head);font-size:11px;color:rgba(255,255,255,.35);margin-bottom:1px">Delivery</div>
            <div style="font-family:var(--font-display);font-size:18px;font-weight:700;color:#E24B4A">${slipDays>0?fmt(noActionDate):'On track'}</div>
            <div style="font-family:var(--font-head);font-size:11px;color:rgba(255,255,255,.3);margin-top:1px">${slipDays>0?'+'+slipDays+'d and growing':'No current slip'}</div>
            <div style="height:1px;background:rgba(255,255,255,.05);margin:7px 0"></div>
            <div style="font-family:var(--font-head);font-size:11px;color:rgba(255,255,255,.35);margin-bottom:1px">Cost accumulating</div>

            <div style="font-family:var(--font-head);font-size:11px;color:rgba(255,255,255,.3)">click for detail</div>
          </div>
        </div>
        <div style="border:1px solid rgba(29,158,117,.3);background:rgba(29,158,117,.04)">
          <div style="padding:7px 11px;border-bottom:1px solid rgba(29,158,117,.15);display:flex;align-items:center;justify-content:space-between">

          </div>
        </div>
      </div>
      <!-- Waterfall -->
