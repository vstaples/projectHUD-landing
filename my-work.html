// ── Negotiation actions ───────────────────────────────────
window.negCheckSubmitGate = function(itemId) {
  const loe     = document.getElementById('neg-loe-' + itemId)?.value;
  const due     = document.getElementById('neg-due-' + itemId)?.value;
  const comment = document.getElementById('neg-comment-' + itemId)?.value?.trim() || '';
  const btn     = document.getElementById('neg-submit-' + itemId);
  const ready   = loe && due && comment.length >= 20;
  if (btn) {
    btn.disabled = !ready;
    btn.style.opacity  = ready ? '1'    : '0.5';
    btn.style.cursor   = ready ? 'pointer' : 'not-allowed';
    btn.style.borderColor = ready ? 'rgba(0,210,255,.4)' : 'rgba(255,255,255,.15)';
  }
};

window.negSubmitRating = async function(itemId) {
  const loe     = document.getElementById('neg-loe-' + itemId)?.value;
  const due     = document.getElementById('neg-due-' + itemId)?.value;
  const comment = document.getElementById('neg-comment-' + itemId)?.value?.trim();
  if (!loe || !due || !comment || comment.length < 20) {
    compassToast('LOE, proposed due date, and a detailed comment are all required.', 3000);
    return;
  }
  const myName = _myResource?.name || 'Me';
  const neg = negGetState(itemId);
  neg.state = 'pending';
  neg.loe = loe;
  neg.proposedDue = due;
  neg.submittedAt = new Date().toISOString();
  neg.thread = neg.thread || [];
  neg.thread.push({ role:'assignee', name:myName, ts:neg.submittedAt, text:'LOE assessment submitted.', loe, proposedDue:due, comment });
  negSaveState(itemId, neg);
  await negWriteCoCEvent(itemId, `LOE rating submitted: ${loe}, proposed due ${due}. Comment: ${comment}`, myName);
  compassToast('Rating submitted. Assigner notified. 24h response window started.');
  // Re-render panel and update row border
  renderNegPanel(itemId, neg.assignerName);
  _negRefreshRow(itemId);
};

window.negEscalate = function(itemId) {
  const neg = negGetState(itemId);
  neg.state = 'escalated';
  negSaveState(itemId, neg);
  negWriteCoCEvent(itemId, 'Escalated to PM for binding decision.', _myResource?.name);
  compassToast('Escalated to PM. Full thread forwarded.');
  renderNegPanel(itemId, neg.assignerName);
  _negRefreshRow(itemId);
};

window.negReviseRating = function(itemId) {
  const neg = negGetState(itemId);
  neg.state = 'unrated';
  negSaveState(itemId, neg);
  renderNegPanel(itemId, neg.assignerName);
  _negRefreshRow(itemId);
};

window.negAcceptCounter = function(itemId) {
  const neg = negGetState(itemId);
  const myName = _myResource?.name || 'Me';
  const lastCounter = (neg.thread||[]).filter(m=>m.role==='assigner').slice(-1)[0];
  neg.state = 'agreed';
  neg.agreedLoe = neg.loe;
  neg.agreedDue = lastCounter?.counterDue || neg.proposedDue;
  neg.lockedAt  = new Date().toISOString();
  neg.thread = neg.thread || [];
  neg.thread.push({ role:'assignee', name:myName, ts:neg.lockedAt, text:`Counter accepted. COB ${neg.agreedDue} confirmed.` });
  neg.thread.push({ role:'system', name:'System · CoC event written', ts:neg.lockedAt,
    text:`Agreement reached. Due date: ${neg.agreedDue}. LOE: ${neg.agreedLoe}. Thread locked — immutable from this point.` });
  negSaveState(itemId, neg);
  negWriteCoCEvent(itemId, `Agreement reached. LOE: ${neg.agreedLoe}, Due: ${neg.agreedDue}. Thread locked.`, myName);
  compassToast('Counter accepted. Agreement locked. CoC event written.');
  renderNegPanel(itemId, neg.assignerName);
  _negRefreshRow(itemId);
};

window.negSubmitCounter = function(itemId) {
  const response = document.getElementById('neg-response-' + itemId)?.value?.trim();
  if (!response) { compassToast('Enter your counter-proposal before submitting.', 2500); return; }
  const myName = _myResource?.name || 'Me';
  const neg = negGetState(itemId);
  neg.thread = neg.thread || [];
  neg.thread.push({ role:'assignee', name:myName, ts:new Date().toISOString(), text:response });
  negSaveState(itemId, neg);
  negWriteCoCEvent(itemId, `Counter-proposal submitted: ${response}`, myName);
  compassToast('Counter submitted. Assigner has 24h to respond.');
  renderNegPanel(itemId, neg.assignerName);
};

// Add a follow-up comment to the thread while in pending state
window.negAddThreadUpdate = function(itemId) {
  const text = document.getElementById('neg-addupdate-' + itemId)?.value?.trim();
  if (!text) { compassToast('Enter a comment before adding to thread.', 2000); return; }
  const myName = _myResource?.name || 'Me';
  const neg = negGetState(itemId);
  neg.thread = neg.thread || [];
  neg.thread.push({ role:'assignee', name:myName, ts:new Date().toISOString(), text });
  negSaveState(itemId, neg);
  negWriteCoCEvent(itemId, `Follow-up: ${text}`, myName);
  compassToast('Comment added to negotiation thread.');
  renderNegPanel(itemId, neg.assignerName);
};

// Called by PM view to post a counter to the assignee
window.negPostCounter = function(itemId, counterText, counterDue, assignerName) {
  const neg = negGetState(itemId);
  neg.state = 'negotiating';
  neg.counterReceivedAt = new Date().toISOString();
  neg.assignerName = assignerName;
  neg.thread = neg.thread || [];
  neg.thread.push({ role:'assigner', name:assignerName, ts:neg.counterReceivedAt, text:counterText, counterDue });
  negSaveState(itemId, neg);
  compassToast('Counter posted. Assignee notified.');
  renderNegPanel(itemId, assignerName);
  _negRefreshRow(itemId);
};

function _negRefreshRow(itemId) {
  const row = document.querySelector(`.wi-row[data-wi-id="${itemId}"]`);
  if (!row) return;
  const neg = negGetState(itemId);
  const s = neg.state;
  // Update left border on row
  if (s === 'unrated')     { row.style.borderLeft = '3px dashed rgba(255,255,255,.2)'; row.style.background = ''; }
  else if (s === 'pending')     { row.style.borderLeft = '3px dashed rgba(239,159,39,.5)'; }
  else if (s === 'negotiating') { row.style.borderLeft = '3px solid rgba(139,92,246,.6)'; }
  else if (s === 'agreed')      { row.style.borderLeft = '3px solid rgba(29,158,117,.5)'; }
  else if (s === 'escalated')   { row.style.borderLeft = '3px solid rgba(226,75,74,.5)'; }
  // Update badge in row if present
  const badgeEl = row.querySelector('[data-neg-badge]');
  if (badgeEl) badgeEl.outerHTML = `<span data-neg-badge style="font-family:var(--font-head);font-size:10px;padding:1px 6px;letter-spacing:.05em;${negGetState(itemId).style||''}">${negGetState(itemId).state}</span>`;
}






function updateConcernBadge() {
  const unread = (window._userConcerns||[]).filter(c=>c.status==='unread'||c.status==='not_yet_read').length;
  const badge = document.getElementById('ust-concerns-badge');
  if (badge) {
    if (unread > 0) {
      badge.textContent = unread+' unread';
      badge.style.display = 'inline';
    } else {
      badge.style.display = 'none';
    }
  }
  // Nav bar concern badge (if visible from other views)
  const navBadge = document.getElementById('concern-nav-badge');
  if (navBadge && unread > 0) { navBadge.textContent = unread; navBadge.style.display='flex'; }
}

// ══════════════════════════════════════════════════════════

// MY WORK DIAGRAM ENGINE
// ══════════════════════════════════════════════════════════

// ── Deterministic project accent color from ID hash ────────
// ── Recommended daily sequence panel ─────────────────────
// Algorithm: (1) blocking others, (2) overdue, (3) critical path proxy (most dependents),
// (4) project health (SPI proxy via overdue ratio), (5) due date
// Shows 3-5 items. Immutable for the session once generated.
window._recSeqGenerated = false;

function buildRecommendedSequence(workItems) {
  const el = document.getElementById('mw-rec-seq');
  if (!el) return;
  if (!workItems || !workItems.length) { el.style.display = 'none'; return; }

  // Only regenerate once per session (immutable for the day)
  if (window._recSeqGenerated && window._recSeqItems) {
    renderRecSeq(window._recSeqItems);
    return;
  }

  const today = new Date().toLocaleDateString('en-CA');
  const open  = workItems.filter(w => w.status !== 'complete' && w.status !== 'resolved' && w.status !== 'done');
  if (!open.length) { el.style.display = 'none'; return; }

  // Score each item
  const scored = open.map(w => {
    let score = 0;
    const reasons = [];

    // 1. Blocking other people — action items assigned by someone else (you are the bottleneck)
    const isActionByOther = w.type === 'action' && w.createdBy && w.createdBy !== (_myResource?.name || '');
    if (isActionByOther) { score += 1000; reasons.push('Blocking ' + esc(w.createdBy)); }

    // 2. Overdue
    if (w.overdue) {
      const daysLate = w.due ? Math.floor((Date.now() - new Date(w.due+'T00:00:00').getTime()) / 86400000) : 1;
      score += 500 + daysLate * 10;
      reasons.push(daysLate + 'd overdue');
    }

    // 3. Due today
    if (w.due === today && !w.overdue) { score += 300; reasons.push('Due today'); }

    // 4. Blocked status — needs attention to unblock others
    if (w.status === 'blocked') { score += 400; reasons.push('Blocked — needs action'); }

    // 5. Unrated action item — needs rating before capacity can be assessed
    if (w.type === 'action') {
      const neg = negGetState(w.id);
      if (!neg || neg.state === 'unrated') { score += 200; reasons.push('Unrated — capacity unknown'); }
    }

    // 6. Project health proxy — if project has multiple overdue items, this project is at risk
    const projOverdue = open.filter(x => x.projectId && x.projectId === w.projectId && x.overdue).length;
    if (projOverdue >= 2) { score += 100; if (!reasons.some(r=>r.includes('overdue'))) reasons.push('Project at risk · ' + projOverdue + ' overdue'); }

    // 7. Due soon (within 2 days)
    if (w.due && !w.overdue && w.due !== today) {
      const daysOut = Math.floor((new Date(w.due+'T00:00:00').getTime() - Date.now()) / 86400000);
      if (daysOut <= 2) { score += 150 - daysOut * 30; reasons.push('Due in ' + daysOut + 'd'); }
    }

    // 8. In progress — finish what you started
    if (w.status === 'in_progress') score += 50;

    return { ...w, _score: score, _reasons: reasons };
  });

  // Sort descending by score, take top 5
  scored.sort((a, b) => b._score - a._score);
  const top = scored.filter(w => w._score > 0).slice(0, 5);

  if (!top.length) { el.style.display = 'none'; return; }

  window._recSeqItems = top;
  window._recSeqGenerated = true;
  renderRecSeq(top);
}

function renderRecSeq(items) {
  const el = document.getElementById('mw-rec-seq');
  if (!el) return;

  const rows = items.map((w, i) => {
    const rankColor = i === 0 ? 'var(--compass-cyan)' : i === 1 ? 'rgba(0,210,255,.6)' : 'rgba(0,210,255,.35)';
    const reasonHtml = w._reasons.slice(0, 2).map(r =>
      `<span style="font-family:var(--font-head);font-size:11px;padding:1px 6px;background:rgba(0,210,255,.06);border:1px solid rgba(0,210,255,.15);color:rgba(0,210,255,.7);border-radius:2px">${r}</span>`
    ).join('');
    return `<div style="display:flex;align-items:center;gap:10px;padding:7px 12px;border-bottom:1px solid rgba(255,255,255,.04);cursor:pointer"
      data-wi-id="${w.id}" data-wi-type="${w.type}" data-action="diag-open-task"
      onmouseenter="this.style.background='rgba(0,210,255,.03)'" onmouseleave="this.style.background=''">
      <div style="font-family:var(--font-display);font-size:15px;font-weight:700;color:${rankColor};width:18px;flex-shrink:0;text-align:center">${i+1}</div>
      <div style="flex:1;min-width:0">
        <div style="font-family:var(--font-body);font-size:12px;font-weight:500;color:var(--text0);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(w.title)}</div>
        <div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:3px">${reasonHtml}</div>
      </div>
      <div style="font-family:var(--font-head);font-size:11px;color:var(--text3);flex-shrink:0">${esc(w.project||'')}</div>
    </div>`;
  }).join('');

  el.style.display = 'block';
  el.innerHTML = `
    <div style="background:rgba(0,210,255,.03);border:1px solid rgba(0,210,255,.15);border-left:3px solid var(--compass-cyan)">
      <div style="display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:1px solid rgba(0,210,255,.1)">
        <div style="font-family:var(--font-head);font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--compass-cyan)">Recommended sequence for today</div>
        <div style="font-family:var(--font-head);font-size:11px;color:rgba(255,255,255,.25);margin-left:auto">System-generated · ${new Date().toLocaleDateString('en-US',{month:'short',day:'numeric'})}</div>
        <button onclick="document.getElementById('mw-rec-seq').style.display='none'" style="background:none;border:none;color:rgba(255,255,255,.25);cursor:pointer;font-size:14px;padding:0 0 0 6px;line-height:1" title="Dismiss">×</button>
      </div>
      ${rows}
    </div>`;
}

function _diagProjColor(projId) {
  const palette = ['#00D2FF','#8B5CF6','#1D9E75','#EF9F27','#E24B4A','#F472B6','#38BDF8','#A3E635'];
  if (!projId) return palette[0];
  let h = 0;
  for (let i = 0; i < projId.length; i++) h = (h * 31 + projId.charCodeAt(i)) >>> 0;
  return palette[h % palette.length];
}

// ── Slot allocation engine (pure function) ─────────────────
function _diagAllocateSlots(nodes, CW) {
  const colSlots = {};
  const positions = {};
  const CARD_H = 76, CARD_GAP = 6, ROW_PAD = 8;
  const typeOrder = { task: 0, action: 1 };
  const sorted = [...nodes].sort((a, b) => {
    const da = a.due || '9999', db = b.due || '9999';
    if (da !== db) return da.localeCompare(db);
    return (typeOrder[a.type] ?? 2) - (typeOrder[b.type] ?? 2);
  });
  sorted.forEach(n => {
    const col = n.due || '9999';
    if (!colSlots[col]) colSlots[col] = [];
    let slot = 0;
    while (colSlots[col].includes(slot)) slot++;
    colSlots[col].push(slot);
    positions[n.id] = { col, slot, y: slot * (CARD_H + CARD_GAP) + ROW_PAD };
  });
  return { positions, CARD_H, CARD_GAP, ROW_PAD };
}

// ── Build and render the diagram ──────────────────────────
function _diagApplyTransform() {
  // Zoom = column width only. Rebuild to reflect new CW.
  buildWorkDiagram();
  const lbl = document.getElementById('diag-zoom-lbl');
  if (lbl) lbl.textContent = Math.round(_diagScale * 100) + '%';
}

function buildWorkDiagram() {
  const root    = document.getElementById('mw-diag-root');
  const tlHdr   = document.getElementById('mw-diag-tl-header');
  const stubCol = document.getElementById('mw-diag-stub-col');
  if (!root || !tlHdr || !stubCol) return;
  root.innerHTML = ''; tlHdr.innerHTML = ''; stubCol.innerHTML = '';

  const today = new Date().toLocaleDateString('en-CA');
  const items = _wiItems || [];
  if (!items.length) {
    root.innerHTML = '<div style="padding:40px;text-align:center;font-family:var(--font-head);font-size:12px;color:var(--text3)">No tasks in current view</div>';
    return;
  }

  // ── Date columns ──────────────────────────────────────
  const dueDates = [...new Set(items.map(w => w.due).filter(Boolean))].sort();
  const minDate  = dueDates[0] || today;
  const maxDate  = dueDates[dueDates.length - 1] || today;
  const allDates = new Set(dueDates);
  allDates.add(today);
  const endD = new Date(maxDate + 'T00:00:00'); endD.setDate(endD.getDate() + 7);
  for (let d = new Date(minDate + 'T00:00:00'); d <= endD; d.setDate(d.getDate() + 1)) {
    if (d.getDay() !== 0 && d.getDay() !== 6) allDates.add(d.toLocaleDateString('en-CA'));
  }
  const DATES = [...allDates].sort();
  const dateIndex = {};
  DATES.forEach((d, i) => dateIndex[d] = i);

  const BASE_CW = 120, CW = Math.round(BASE_CW * _diagScale);
  const CARD_W = 108, CARD_H = 76, CARD_GAP = 6, ROW_PAD = 8;
  const todayIdx = dateIndex[today];
  const totalCW  = DATES.length * CW + 40;

  // ── Group by project ──────────────────────────────────
  const projMap = {};
  items.forEach(w => {
    const key = w.projectId || '__actions__';
    if (!projMap[key]) projMap[key] = { id: key, name: w.projectId ? (w.project || '—') : 'Action Items', nodes: [] };
    projMap[key].nodes.push(w);
  });

  // ══ TOP-RIGHT: Timeline header (h-scroll synced) ══════
  const tlRow = document.createElement('div');
  tlRow.style.cssText = `display:flex;width:${totalCW}px`;
  DATES.forEach(d => {
    const isToday = d === today;
    const dt = new Date(d + 'T00:00:00');
    const col = document.createElement('div');
    col.style.cssText = `width:${CW}px;flex-shrink:0;border-right:1px solid rgba(255,255,255,.04);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:3px 0`;
    const dayNum  = dt.toLocaleDateString('en-US', { month:'short', day:'numeric' });
    const dayName = dt.toLocaleDateString('en-US', { weekday:'short' });
    col.innerHTML = `<div style="font-family:var(--font-head);font-size:11px;font-weight:${isToday?'700':'400'};color:${isToday?'#00D2FF':'rgba(255,255,255,.3)'}">${dayNum}</div><div style="font-family:var(--font-head);font-size:11px;color:${isToday?'#00D2FF':'rgba(255,255,255,.2)'}">${dayName}</div>`;
    tlRow.appendChild(col);
  });
  tlHdr.appendChild(tlRow);

  // ══ CAPACITY BAR ROW (below timeline header) ══════════
  // One bar per day column. Unrated action items excluded.
  // Available: 8h/day. Rated items contribute LOE spread across working days to due date.
  const AVAIL_HRS = 8;

  // Helper: parse LOE string → hours
  function _loeToHours(loeStr) {
    if (!loeStr) return 0;
    const s = loeStr.toLowerCase().trim();
    if (s.includes('week'))  return parseFloat(s) * 40 || 40;
    if (s.includes('day'))   return parseFloat(s) * 8  || 8;
    if (s.includes('hour'))  return parseFloat(s)      || 0;
    return 0;
  }

  // Helper: working days between two date strings (inclusive)
  function _workingDaysBetween(startStr, endStr) {
    const days = [];
    const s = new Date(startStr + 'T00:00:00');
    const e = new Date((endStr || startStr) + 'T00:00:00');
    for (let d = new Date(s); d <= e; d.setDate(d.getDate() + 1)) {
      const dow = d.getDay();
      if (dow !== 0 && dow !== 6) days.push(d.toLocaleDateString('en-CA'));
    }
    return days;
  }

  // Build per-date hour allocation map
  const allocMap = {}; // { dateStr: hours }
  DATES.forEach(d => { allocMap[d] = 0; });

  items.forEach(item => {
    let hrs = 0;
    if (item.type === 'action') {
      const neg = negGetState(item.id);
      if (!neg || neg.state === 'unrated') return; // skip unrated
      hrs = _loeToHours(neg.loe || neg.agreedLoe || '');
      if (hrs <= 0) return;
      // Spread evenly across working days from today to proposed/agreed due date
      const dueDate = neg.agreedDue || neg.proposedDue || item.due;
      if (!dueDate) { allocMap[today] = (allocMap[today] || 0) + hrs; return; }
      const spread = _workingDaysBetween(today, dueDate).filter(d => DATES.includes(d));
      if (!spread.length) return;
      const hrsPerDay = hrs / spread.length;
      spread.forEach(d => { allocMap[d] = (allocMap[d] || 0) + hrsPerDay; });
    } else {
      // Task: use budgetHours or effortDays
      hrs = item.budgetHours || (item.effortDays ? item.effortDays * 8 : 0);
      if (hrs <= 0) return;
      if (!item.due) { allocMap[today] = (allocMap[today] || 0) + hrs; return; }
      const spread = _workingDaysBetween(today, item.due).filter(d => DATES.includes(d));
      if (!spread.length) { allocMap[item.due] = (allocMap[item.due] || 0) + hrs; return; }
      const hrsPerDay = hrs / spread.length;
      spread.forEach(d => { allocMap[d] = (allocMap[d] || 0) + hrsPerDay; });
    }
  });

  // Render capacity bar row in tlHdr (second row)
  const capRow = document.createElement('div');
  capRow.style.cssText = `display:flex;width:${totalCW}px;background:#060a10;border-bottom:1px solid rgba(0,210,255,.08)`;
  DATES.forEach(d => {
    const isToday = d === today;
    const alloc   = allocMap[d] || 0;
    const pct     = Math.min(alloc / AVAIL_HRS, 1);
    const over    = alloc > AVAIL_HRS;
    const warn    = pct > 0.7 && !over;
    const barColor = over ? '#E24B4A' : warn ? '#EF9F27' : '#1D9E75';
    const remaining = Math.max(0, AVAIL_HRS - alloc).toFixed(1);
    const col = document.createElement('div');
    col.style.cssText = `width:${CW}px;flex-shrink:0;border-right:1px solid rgba(255,255,255,.04);padding:3px 4px;box-sizing:border-box`;
    col.title = `${d}: ${alloc.toFixed(1)}h allocated / ${AVAIL_HRS}h available`;
    col.innerHTML = `
      <div style="height:5px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden;margin-bottom:2px">
        <div style="height:100%;width:${Math.round(pct*100)}%;background:${barColor};border-radius:2px;transition:width .3s"></div>
      </div>
      <div style="font-family:var(--font-head);font-size:11px;font-weight:700;color:${over?'#E24B4A':warn?'#EF9F27':isToday?'#00D2FF':'rgba(255,255,255,.45)'};text-align:center;white-space:nowrap;letter-spacing:.03em">
        ${isToday ? (over?'+':'') + (over ? (alloc-AVAIL_HRS).toFixed(1)+'h over' : remaining+'h left') : alloc > 0 ? alloc.toFixed(1)+'h' : ''}
      </div>`;
    capRow.appendChild(col);
  });
  tlHdr.appendChild(capRow);

  // ══ BOTTOM-RIGHT: Card canvas (master scroll) ═════════
  // ══ BOTTOM-LEFT:  Stub column (v-scroll synced) ═══════
  // Build both in lockstep — each project/lane appends a matching-height row to each

  root.style.cssText = `width:${totalCW}px`;

  Object.values(projMap).forEach(proj => {
    const projColor = _diagProjColor(proj.id === '__actions__' ? null : proj.id);
    const collapsed  = _diagCollapsed.has(proj.id);
    const PROJ_HDR_H = 28;

    // Stub: project header
    const ps = document.createElement('div');
    ps.style.cssText = `height:${PROJ_HDR_H}px;display:flex;align-items:center;gap:7px;padding:0 10px;cursor:pointer;background:rgba(255,255,255,.025);border-bottom:1px solid rgba(255,255,255,.04);box-sizing:border-box`;
    ps.innerHTML = `<div style="width:3px;height:14px;background:${projColor};border-radius:1px;flex-shrink:0"></div><div style="font-family:var(--font-head);font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:${projColor};flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(proj.name)}</div><div id="diag-tog-${proj.id}" style="font-family:var(--font-head);font-size:11px;color:rgba(255,255,255,.3)">${collapsed?'▸':'▾'}</div>`;
    ps.dataset.action = 'diag-toggle-proj';
    ps.dataset.projId = proj.id;
    stubCol.appendChild(ps);

    // Canvas: project header (full canvas width)
    const projHdr = document.createElement('div');
    projHdr.style.cssText = `height:${PROJ_HDR_H}px;width:${totalCW}px;background:rgba(255,255,255,.025);border-bottom:1px solid rgba(255,255,255,.04);position:relative`;
    if (todayIdx !== undefined) {
      const tx = todayIdx * CW + CW / 2;
      projHdr.innerHTML = `<div style="position:absolute;left:${tx}px;top:0;bottom:0;width:1px;background:rgba(0,210,255,.12)"></div>`;
    }
    root.appendChild(projHdr);

    if (collapsed) return;

    const taskNodes   = proj.nodes.filter(n => n.type === 'task');
    const actionNodes = proj.nodes.filter(n => n.type === 'action');
    const subLanes = [];
    if (taskNodes.length)   subLanes.push({ label:'Tasks',   nodes:taskNodes });
    if (actionNodes.length) subLanes.push({ label:'Actions', nodes:actionNodes });
    if (!subLanes.length)   subLanes.push({ label:'',        nodes:proj.nodes });

    subLanes.forEach(lane => {
      // Slot allocation
      const colSlots = {}, positions = {};
      const typeOrd = { task:0, action:1 };
      [...lane.nodes].sort((a,b)=>{
        const da=a.due||'9999', db=b.due||'9999';
        return da!==db ? da.localeCompare(db) : (typeOrd[a.type]??2)-(typeOrd[b.type]??2);
      }).forEach(n=>{
        const col=n.due||'9999';
        if(!colSlots[col]) colSlots[col]=[];
        let slot=0; while(colSlots[col].includes(slot)) slot++;
        colSlots[col].push(slot);
        positions[n.id]={col,slot,y:slot*(CARD_H+CARD_GAP)+ROW_PAD};
      });
      const maxSlot = Math.max(0,...lane.nodes.map(n=>positions[n.id]?.slot??0));
      const lh = (maxSlot+1)*(CARD_H+CARD_GAP)+ROW_PAD*2;

      // Stub: lane label
      const ls = document.createElement('div');
      ls.style.cssText = `height:${lh}px;background:rgba(255,255,255,.01);border-bottom:1px solid rgba(255,255,255,.03);display:flex;align-items:flex-start;padding:6px 10px;box-sizing:border-box`;
      ls.innerHTML = `<span style="font-family:var(--font-head);font-size:11px;color:rgba(255,255,255,.2);letter-spacing:.06em;text-transform:uppercase">${lane.label}</span>`;
      stubCol.appendChild(ls);

      // Canvas: lane row
      const cv = document.createElement('div');
      cv.style.cssText = `position:relative;height:${lh}px;width:${totalCW}px;border-bottom:1px solid rgba(255,255,255,.03)`;

      // SVG: today line
      const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
      svg.style.cssText = `position:absolute;top:0;left:0;pointer-events:none;overflow:visible;z-index:2`;
      svg.setAttribute('width',totalCW); svg.setAttribute('height',lh);
      if (todayIdx !== undefined) {
        const tx = todayIdx*CW+CW/2;
        const vl = document.createElementNS('http://www.w3.org/2000/svg','line');
        vl.setAttribute('x1',tx); vl.setAttribute('y1',0); vl.setAttribute('x2',tx); vl.setAttribute('y2',lh);
        vl.setAttribute('stroke','rgba(0,210,255,.18)'); vl.setAttribute('stroke-width','1.5');
        svg.appendChild(vl);
      }
      cv.appendChild(svg);

      // Node cards
      lane.nodes.forEach(node=>{
        const pos=positions[node.id]; if(!pos) return;
        const colIdx=dateIndex[pos.col]??0;
        const x=colIdx*CW+Math.max(0,(CW-CARD_W)/2);
        const isOverdue=node.overdue, isTod=pos.col===today;
        const nc=isOverdue?'#E24B4A':isTod?'#EF9F27':node.type==='action'?'#8B5CF6':'#00D2FF';
        const pct=node.pct||0, sl=(node.status||'open').replace(/_/g,' ');
        const nd=document.createElement('div');
        nd.style.cssText=`position:absolute;left:${x}px;top:${pos.y}px;width:${CARD_W}px;cursor:pointer;z-index:3`;
        nd.dataset.wiId=node.id; nd.dataset.action='diag-open-task';
        nd.innerHTML=`<div class="diag-nd-inner" style="border:1px solid ${nc}44;border-left:3px solid ${nc};background:rgba(10,12,28,.9);border-radius:3px;padding:5px 7px;height:${CARD_H}px;box-sizing:border-box;overflow:hidden"><div style="font-family:var(--font-head);font-size:11px;color:${nc};letter-spacing:.05em;text-transform:uppercase;opacity:.7;margin-bottom:2px">${node.type}</div><div style="font-family:var(--font-head);font-size:11px;font-weight:700;color:#F0F6FF;line-height:1.3;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:${CARD_W-14}px" title="${esc(node.title)}">${esc(node.title)}</div><div style="font-family:var(--font-head);font-size:11px;color:rgba(255,255,255,.35);margin-bottom:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(node.project)}</div>${pct>0?`<div style="height:2px;background:rgba(255,255,255,.08);border-radius:1px;overflow:hidden;margin-bottom:3px"><div style="height:100%;width:${pct}%;background:${nc};border-radius:1px"></div></div>`:''}<div style="font-family:var(--font-head);font-size:11px;padding:1px 5px;border:1px solid ${nc}55;color:${nc};display:inline-block;letter-spacing:.04em">${sl}</div></div>`;
        cv.appendChild(nd);
      });

      // Connectors
      setTimeout(()=>{
        const cvRect=cv.getBoundingClientRect();
        lane.nodes.forEach(node=>{
          if(node.type!=='action') return;
          const parent=proj.nodes.find(p=>p.type==='task'&&positions[p.id]&&positions[node.id]&&
            dateIndex[positions[p.id]?.col]<dateIndex[positions[node.id]?.col]);
          if(!parent) return;
          const pEl=cv.querySelector(`[data-wi-id="${parent.id}"]`), cEl=cv.querySelector(`[data-wi-id="${node.id}"]`);
          if(!pEl||!cEl) return;
          const pR=pEl.getBoundingClientRect(), cR=cEl.getBoundingClientRect();
          const fx=pR.right-cvRect.left, fy=pR.top+pR.height/2-cvRect.top;
          const tx=cR.left-cvRect.left,   ty=cR.top+cR.height/2-cvRect.top;
          const mx=(fx+tx)/2;
          const d=Math.abs(fy-ty)<4?`M${fx},${fy} H${tx}`:`M${fx},${fy} H${mx} V${ty} H${tx}`;
          const path=document.createElementNS('http://www.w3.org/2000/svg','path');
          path.setAttribute('d',d); path.setAttribute('stroke','rgba(0,210,255,.3)');
          path.setAttribute('stroke-width','1.2'); path.setAttribute('fill','none');
          path.setAttribute('stroke-dasharray','4,3');
          const arr=document.createElementNS('http://www.w3.org/2000/svg','polygon');
          arr.setAttribute('points',`${tx},${ty} ${tx-7},${ty-3.5} ${tx-7},${ty+3.5}`);
          arr.setAttribute('fill','rgba(0,210,255,.4)');
          svg.appendChild(path); svg.appendChild(arr);
        });
      },80);

      root.appendChild(cv);
    });
  });
}

// ── Scroll sync: canvas drives header + stub ────────────
(function _initDiagScrollSync() {
  document.addEventListener('scroll', function(ev) {
    const canvas = document.getElementById('mw-diag-canvas-wrap');
    if (!canvas || ev.target !== canvas) return;
    const tl  = document.getElementById('mw-diag-tl-header');
    const stub = document.getElementById('mw-diag-stub-col');
    if (tl)   tl.scrollLeft   = canvas.scrollLeft;   // h-sync: timeline follows canvas
    if (stub) stub.scrollTop  = canvas.scrollTop;     // v-sync: stubs follow canvas
  }, true);

  // Wheel zoom: adjust CW, rebuild
  document.addEventListener('wheel', function(ev) {
    const canvas = document.getElementById('mw-diag-canvas-wrap');
    if (!canvas || !_diagramMode || !canvas.contains(ev.target)) return;
    ev.preventDefault();
    _diagScale = Math.min(3, Math.max(0.3, _diagScale + (ev.deltaY > 0 ? -0.1 : 0.1)));
    const sl = canvas.scrollLeft, st = canvas.scrollTop;
    buildWorkDiagram();
    canvas.scrollLeft = sl; canvas.scrollTop = st;
    const lbl = document.getElementById('diag-zoom-lbl');
    if (lbl) lbl.textContent = Math.round(_diagScale * 100) + '%';
  }, { passive:false });

  // Drag pan
  let _px=false, _lx=0, _ly=0;
  document.addEventListener('mousedown', function(ev) {
    const canvas = document.getElementById('mw-diag-canvas-wrap');
    if (!canvas || !_diagramMode || !canvas.contains(ev.target)) return;
    if (ev.target.closest('[data-action]')) return;
    _px=true; _lx=ev.clientX; _ly=ev.clientY;
    canvas.style.cursor='grabbing';
  });
  document.addEventListener('mousemove', function(ev) {
    if (!_px) return;
    const canvas = document.getElementById('mw-diag-canvas-wrap');
    if (!canvas) return;
    canvas.scrollLeft -= ev.clientX - _lx;
    canvas.scrollTop  -= ev.clientY - _ly;
    _lx=ev.clientX; _ly=ev.clientY;
  });
  document.addEventListener('mouseup', function() {
    _px=false;
    const canvas = document.getElementById('mw-diag-canvas-wrap');
    if (canvas) canvas.style.cursor='grab';
  });
  document.addEventListener('touchstart', function(ev) {
    const canvas=document.getElementById('mw-diag-canvas-wrap');
    if (!canvas||!_diagramMode||!canvas.contains(ev.target)||ev.touches.length!==1) return;
    _px=true; _lx=ev.touches[0].clientX; _ly=ev.touches[0].clientY;
  },{passive:true});
  document.addEventListener('touchmove', function(ev) {
    if (!_px||ev.touches.length!==1) return;
    const canvas=document.getElementById('mw-diag-canvas-wrap');
    if (!canvas) return;
    canvas.scrollLeft -= ev.touches[0].clientX - _lx;
    canvas.scrollTop  -= ev.touches[0].clientY - _ly;
    _lx=ev.touches[0].clientX; _ly=ev.touches[0].clientY;
  },{passive:true});
  document.addEventListener('touchend',()=>{ _px=false; });
})();

        const stepName = (e.step_name||'').replace(/^CONCERN:\s*/,'');

        const isLast = i === arr.length - 1;
        const outcomeColor = e.outcome==='on_track'?'var(--compass-green)':e.outcome==='at_risk'?'var(--compass-amber)':e.outcome==='blocked'?'var(--compass-red)':col;
        const outcomeLabel = e.outcome==='on_track'?'On track':e.outcome==='at_risk'?'At risk':e.outcome==='blocked'?'Blocked':e.outcome?(e.outcome.replace(/_/g,' ')):'';
        let h = '<div style="display:flex;gap:8px;padding:8px 14px;border-bottom:1px solid rgba(255,255,255,.04)">'

          + (!isLast ? '<div style="width:1px;flex:1;min-height:8px;background:rgba(255,255,255,.08);margin-top:2px"></div>' : '')
          + '</div>'

        if (outcomeLabel) h += '<div style="display:inline-flex;align-items:center;gap:4px;margin-top:3px;padding:2px 8px;border-radius:10px;border:1px solid '+outcomeColor+'44">'

};

  </div>
  <div style="display:flex;gap:6px;align-items:center">
    <button onclick="irOpenLogModal()" style="font-family:var(--font-head);font-size:11px;font-weight:700;padding:4px 12px;background:none;border:1px solid rgba(0,210,255,.3);color:#00D2FF;cursor:pointer;letter-spacing:.08em">+ Log intervention</button>
    <button onclick="document.getElementById('ir-drawer')?.remove();document.getElementById('ir-esc-composer')?.remove();" style="background:none;border:none;color:#5A84A8;font-size:16px;cursor:pointer;padding:0">✕</button>
  </div>`;
  drawer.appendChild(hdr);
  // Body
  const body = document.createElement('div');
  body.id='ir-body';
  body.style.cssText='flex:1;overflow-y:auto;padding:10px 12px';
  body.innerHTML='<div style="font-family:var(--font-head);font-size:12px;color:#3A5C80">Loading…</div>';
  drawer.appendChild(body);
  // Log modal (hidden)
  const logModal = document.createElement('div');
  logModal.id='ir-modal-overlay';
  logModal.style.cssText='position:absolute;inset:0;background:rgba(0,0,0,.6);z-index:10;display:none;align-items:flex-start;justify-content:center;padding-top:30px';
  logModal.innerHTML=`<div style="background:#0f1e35;border:1px solid rgba(0,210,255,.2);width:480px;max-height:80vh;overflow-y:auto">
    <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid rgba(0,210,255,.1)">
      <div style="font-family:var(--font-display);font-size:14px;font-weight:700;color:#F0F6FF">Log intervention</div>
      <button onclick="document.getElementById('ir-modal-overlay').style.display='none'" style="background:none;border:1px solid rgba(255,255,255,.15);color:#5A84A8;width:22px;height:22px;cursor:pointer;font-size:14px">✕</button>
    </div>
    <div style="padding:14px">
      <div style="font-family:var(--font-head);font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#00D2FF;margin-bottom:5px">Problem signal</div>
      <textarea id="ir-signal-input" rows="2" style="width:100%;font-family:var(--font-body);font-size:12px;padding:7px 9px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);color:#C8DFF0;outline:none;resize:none;box-sizing:border-box;margin-bottom:10px" placeholder="Describe the problem signal…"></textarea>
      <div style="font-family:var(--font-head);font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#00D2FF;margin-bottom:5px">Action type</div>
      <select id="ir-action-type" style="width:100%;font-family:var(--font-head);font-size:12px;padding:6px 8px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);color:#C8DFF0;outline:none;cursor:pointer;margin-bottom:10px">
        <option>Resource reassignment</option><option>Meeting convened</option><option>Action item created</option>
        <option>Escalation to management</option><option>Template redesign</option><option>Process change</option><option>External intervention</option>
      </select>
      <div style="font-family:var(--font-head);font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#00D2FF;margin-bottom:5px">What did you do?</div>
      <textarea id="ir-action-text" rows="3" style="width:100%;font-family:var(--font-body);font-size:12px;padding:7px 9px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);color:#C8DFF0;outline:none;resize:none;box-sizing:border-box;margin-bottom:10px" placeholder="Describe the corrective action…"></textarea>
      <div style="font-family:var(--font-head);font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#00D2FF;margin-bottom:5px">Expected outcome</div>
      <textarea id="ir-expected" rows="2" style="width:100%;font-family:var(--font-body);font-size:12px;padding:7px 9px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);color:#C8DFF0;outline:none;resize:none;box-sizing:border-box;margin-bottom:10px" placeholder="What do you expect to happen?"></textarea>
      <div style="font-family:var(--font-head);font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#00D2FF;margin-bottom:5px">Measurement window</div>
      <select id="ir-window" style="width:100%;font-family:var(--font-head);font-size:12px;padding:6px 8px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);color:#C8DFF0;outline:none;cursor:pointer;margin-bottom:12px">
        <option>24 hours</option><option>48 hours</option><option>72 hours</option><option>1 week</option>
      </select>
      <div style="display:flex;gap:6px">
        <button id="ir-save-btn" style="font-family:var(--font-head);font-size:11px;font-weight:700;padding:6px 16px;background:none;border:1px solid rgba(0,210,255,.4);color:#00D2FF;cursor:pointer;letter-spacing:.08em">Save intervention</button>
        <button onclick="document.getElementById('ir-modal-overlay').style.display='none'" style="font-family:var(--font-head);font-size:11px;padding:6px 14px;background:none;border:1px solid rgba(255,255,255,.2);color:#5A84A8;cursor:pointer">Cancel</button>
      </div>
    </div>
  </div>`;
  drawer.appendChild(logModal);
  document.body.appendChild(drawer);

  // Wire save button after DOM insertion
  const saveBtn = document.getElementById('ir-save-btn');
  if(saveBtn) saveBtn.onclick = () => irSaveIntervention(projectId);

  // Close on outside click
  setTimeout(()=>{
    document.addEventListener('mousedown', function irClose(ev){
      const ir=document.getElementById('ir-drawer'), ic=document.getElementById('ir-esc-composer');
      if(!ir?.contains(ev.target)&&!ic?.contains(ev.target)){
        ir?.remove(); ic?.remove();
        document.removeEventListener('mousedown',irClose);
      }
    });
  },120);

  // Load data
  try {
    const projInsts = await API.get(`workflow_instances?select=id,title,status,project_id&project_id=eq.${projectId}&limit=30`).catch(()=>[]);
    const instIds   = projInsts.map(i=>i.id);
    let cocItems = [];
    if(instIds.length>0){
      cocItems = await API.get(`workflow_step_instances?select=id,instance_id,event_type,step_name,outcome,actor_name,event_notes,created_at&instance_id=in.(${instIds.slice(0,50).join(',')})&event_type=in.(step_reset,task_progress_update,intervention,management_decision,client_response)&order=created_at.desc&limit=100`).catch(()=>[]);
    }
    const resets = cocItems.filter(e=>e.event_type==='step_reset');
    const instResetCount={};
    resets.forEach(e=>{instResetCount[e.instance_id]=(instResetCount[e.instance_id]||0)+1;});
    const seenInsts=new Set(), threads=[];
    resets.forEach(e=>{
      if(seenInsts.has(e.instance_id)) return;
      seenInsts.add(e.instance_id);
      const inst=projInsts.find(i=>i.id===e.instance_id);
      const count=instResetCount[e.instance_id];
      threads.push({inst,signalEvent:e,resetCount:count,
        resolved:inst?.status==='complete',
        outcome:inst?.status==='complete'?'resolved':count>=2?'escalation':count===1?'pending':'monitoring',
        relatedEvents:cocItems.filter(x=>x.instance_id===e.instance_id).sort((a,b)=>a.created_at.localeCompare(b.created_at))
      });
    });
    const otherEvents=cocItems.filter(e=>['management_decision','client_response','intervention'].includes(e.event_type));
    const activeCount=threads.filter(t=>!t.resolved).length;
    const resolvedCount=threads.filter(t=>t.resolved).length;
    const escCount=threads.filter(t=>t.outcome==='escalation').length;
    const sumEl=document.getElementById('ir-summary');
    if(sumEl) sumEl.textContent=`${activeCount} active · ${resolvedCount} resolved · ${escCount} escalation${escCount!==1?'s':''} · CoC-linked`;
    const oc_map={resolved:'#1D9E75',escalation:'#E24B4A',pending:'#EF9F27',monitoring:'#5A84A8'};
    const ol_map={resolved:'Resolved',escalation:'Escalation recommended',pending:'Pending outcome',monitoring:'Monitoring'};
    let html='';
    const escThreads=threads.filter(t=>t.outcome==='escalation');
    if(escThreads.length>0){
      html+=`<div style="background:rgba(226,75,74,.07);border:1px solid rgba(226,75,74,.3);border-left:3px solid #E24B4A;padding:10px 12px;margin-bottom:10px">
        <div style="font-family:var(--font-head);font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#E24B4A;margin-bottom:3px">! Escalation recommended</div>
        <div style="font-family:var(--font-body);font-size:12px;color:#C8DFF0;line-height:1.5;margin-bottom:8px">${escThreads.length} workflow${escThreads.length>1?'s have':' has'} had 2+ failed interventions. Requires authority beyond PM level.</div>
        <button onclick="irComposeEscalation('${projectId}','${esc(projectName||'')}')" style="font-family:var(--font-head);font-size:11px;font-weight:700;padding:4px 12px;background:none;border:1px solid rgba(226,75,74,.5);color:#E24B4A;cursor:pointer">Compose escalation brief &rarr;</button>
      </div>`;
    }
    if(!threads.length&&!otherEvents.length){
      html+='<div style="font-family:var(--font-head);font-size:12px;color:#3A5C80;padding:16px 0;text-align:center">No intervention records yet. Use + Log intervention to create the first entry.</div>';
    }
    threads.forEach(t=>{
      const oc=oc_map[t.outcome], ol=ol_map[t.outcome];
      const stepsHtml=t.relatedEvents.map((ev,i)=>{
        const isLast=i===t.relatedEvents.length-1;
        const tlbl=ev.event_type==='step_reset'?'Problem signal':ev.event_type==='management_decision'?'Management decision':'CoC event';
        const dcol=ev.event_type==='step_reset'?'#E24B4A':ev.event_type==='management_decision'?'#8B5CF6':'#00D2FF';
        const outL=ev.outcome==='on_track'?'POSITIVE':ev.outcome==='blocked'?'NEGATIVE':ev.outcome==='at_risk'?'WATCH':null;
        const outC=outL==='POSITIVE'?'rgba(29,158,117,.06)':outL==='NEGATIVE'?'rgba(226,75,74,.05)':'rgba(239,159,39,.05)';
        const outB=outL==='POSITIVE'?'rgba(29,158,117,.25)':outL==='NEGATIVE'?'rgba(226,75,74,.2)':'rgba(239,159,39,.2)';
        const outT=outL==='POSITIVE'?'#1D9E75':outL==='NEGATIVE'?'#E24B4A':'#EF9F27';
        return `<div style="display:flex;gap:8px;padding:8px 12px;border-bottom:1px solid rgba(255,255,255,.04)">
          <div style="display:flex;flex-direction:column;align-items:center;width:16px;flex-shrink:0">
            <div style="width:10px;height:10px;border-radius:50%;background:${dcol};flex-shrink:0"></div>
            ${isLast?'':'<div style="flex:1;width:1px;background:rgba(255,255,255,.08);margin-top:3px;min-height:10px"></div>'}
          </div>
          <div style="flex:1;min-width:0;padding-top:1px">
            <div style="font-family:var(--font-head);font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#3A5C80;margin-bottom:3px">${tlbl}</div>
            <div style="font-family:var(--font-body);font-size:12px;color:#C8DFF0;line-height:1.5">${esc(ev.step_name||ev.event_notes||'—')}</div>
            ${ev.event_notes&&ev.step_name?`<div style="font-family:var(--font-head);font-size:11px;color:#4A6E90;margin-top:2px">${esc(ev.event_notes.slice(0,120))}</div>`:''}
            <div style="font-family:var(--font-head);font-size:11px;color:#3A5C80;margin-top:3px">${_timeAgo(ev.created_at)}${ev.actor_name?' · '+esc(ev.actor_name):''}</div>
            ${outL?`<div style="margin-top:6px;padding:5px 8px;border:1px solid ${outB};background:${outC};font-family:var(--font-head);font-size:11px;color:${outT}">Measured — ${outL}${ev.event_notes?' · '+esc(ev.event_notes.slice(0,80)):''}</div>`:''}
          </div>
        </div>`;
      }).join('');
      html+=`<div style="border:1px solid rgba(255,255,255,.08);margin-bottom:10px;overflow:hidden">
        <div style="padding:9px 12px;border-bottom:1px solid rgba(255,255,255,.06);display:flex;align-items:flex-start;gap:8px;background:rgba(255,255,255,.02);cursor:pointer"
          onclick="const b=this.nextElementSibling;b.style.display=b.style.display==='none'?'block':'none'">
          <div style="width:3px;align-self:stretch;flex-shrink:0;border-radius:1px;background:${oc}"></div>
          <div style="flex:1;min-width:0">
            <div style="font-family:var(--font-head);font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#3A5C80;margin-bottom:2px">${esc(t.inst?.title||'—')}</div>
            <div style="font-family:var(--font-display);font-size:14px;font-weight:700;color:${oc}">${esc(t.signalEvent.step_name||'Step reset')} — ${t.resetCount} intervention${t.resetCount>1?'s':''}</div>
            <div style="font-family:var(--font-head);font-size:11px;color:#3A5C80;margin-top:1px">Identified: ${_timeAgo(t.signalEvent.created_at)}</div>
          </div>
          <span style="font-family:var(--font-head);font-size:11px;font-weight:700;padding:2px 9px;border:1px solid ${oc}40;color:${oc};flex-shrink:0">${ol}</span>
        </div>
        <div>${stepsHtml}</div>
      </div>`;
    });
    if(otherEvents.length>0){
      html+=`<div style="font-family:var(--font-head);font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#3A5C80;margin-bottom:6px;padding-top:4px">Other CoC activity</div>`;
      otherEvents.slice(0,5).forEach(e=>{
        const col=e.event_type==='management_decision'?'#8B5CF6':e.event_type==='client_response'?'#185FA5':'#00D2FF';
        html+=`<div style="display:flex;gap:8px;padding:7px 0;border-bottom:1px solid rgba(0,210,255,.07)">
          <div style="width:7px;height:7px;border-radius:50%;background:${col};flex-shrink:0;margin-top:3px"></div>
          <div style="flex:1">
            <div style="font-family:var(--font-body);font-size:12px;color:#C8DFF0">${esc(e.step_name||e.event_type.replace(/_/g,' '))}</div>
            ${e.event_notes?`<div style="font-family:var(--font-head);font-size:11px;color:#4A6E90;margin-top:1px">${esc(e.event_notes.slice(0,100))}</div>`:''}
            <div style="font-family:var(--font-head);font-size:11px;color:#3A5C80;margin-top:2px">${_timeAgo(e.created_at)}${e.actor_name?' · '+esc(e.actor_name):''}</div>
          </div>
        </div>`;
      });
    }
    body.innerHTML=html;
  } catch(err){
    console.error('[Compass] IR error:',err);
    body.innerHTML='<div style="font-family:var(--font-head);font-size:12px;color:var(--compass-red);padding:12px">Failed to load intervention records</div>';
  }
};

window.irOpenLogModal = function() {
  const mo=document.getElementById('ir-modal-overlay');
  if(mo) mo.style.display='flex';
};

window.irSaveIntervention = async function(projectId) {
  const signal  = document.getElementById('ir-signal-input')?.value?.trim()||'';
  const type    = document.getElementById('ir-action-type')?.value||'';
  const action  = document.getElementById('ir-action-text')?.value?.trim()||'';
  const expected= document.getElementById('ir-expected')?.value?.trim()||'';
  const win     = document.getElementById('ir-window')?.value||'24 hours';
  if(!signal||!action){ compassToast('Signal and action are required',2000); return; }
  await API.post('workflow_step_instances',{
    event_type:'intervention', step_name:signal.slice(0,80),
    event_notes:'['+type+'] '+action+(expected?' Expected: '+expected:'')+'. Window: '+win,
    actor_name:_myResource?.name||null, created_at:new Date().toISOString(),
    firm_id:'aaaaaaaa-0001-0001-0001-000000000001'
  }).catch(()=>{});
  document.getElementById('ir-modal-overlay').style.display='none';
  compassToast('Intervention logged · CoC event written',2000);
  const b=document.getElementById('ir-body');
  if(b) b.innerHTML='<div style="font-family:var(--font-head);font-size:12px;color:#3A5C80">Refreshing…</div>';
  setTimeout(()=>openInterventionRecord(projectId,''),600);
};

window.irComposeEscalation = function(projectId, projName) {
  document.getElementById('ir-esc-composer')?.remove();
  const comp=document.createElement('div');
  comp.id='ir-esc-composer';
  comp.style.cssText='position:fixed;top:44px;right:560px;bottom:0;width:400px;background:#0f1e35;border-left:1px solid rgba(226,75,74,.25);display:flex;flex-direction:column;z-index:255;animation:pm-drawer-in .2s ease';
  comp.innerHTML=`
    <div style="padding:10px 14px;border-bottom:1px solid rgba(0,210,255,.1);background:#07101e;flex-shrink:0;display:flex;justify-content:space-between;align-items:center">
      <div style="font-family:var(--font-display);font-size:14px;font-weight:700;color:#F0F6FF">Escalation brief</div>
      <button onclick="document.getElementById('ir-esc-composer')?.remove()" style="background:none;border:none;color:#5A84A8;font-size:16px;cursor:pointer">✕</button>
    </div>
    <div style="flex:1;overflow-y:auto;padding:12px">
      <div style="font-family:var(--font-head);font-size:11px;color:#3A5C80;margin-bottom:10px">Auto-assembled from intervention record. Review and add context before sending.</div>
      <div style="font-family:var(--font-head);font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#00D2FF;margin-bottom:5px">Project</div>
      <div style="font-family:var(--font-body);font-size:12px;color:#C8DFF0;padding:7px 9px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);margin-bottom:10px">${esc(projName)}</div>
      <div style="font-family:var(--font-head);font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#EF9F27;margin-bottom:5px">AI narrative</div>
      <div style="font-family:var(--font-body);font-size:12px;color:#C8DFF0;padding:7px 9px;background:rgba(239,159,39,.04);border-left:2px solid #EF9F27;border:1px solid rgba(239,159,39,.15);margin-bottom:10px;line-height:1.5">The blocking issue requires authority the PM does not have. Recommended: direct contact with the client technical director or authorization to engage an alternative approach.</div>
      <div style="font-family:var(--font-head);font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#00D2FF;margin-bottom:5px">PM context (optional)</div>
      <textarea rows="3" style="width:100%;font-family:var(--font-body);font-size:12px;padding:7px 9px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);color:#C8DFF0;outline:none;resize:none;box-sizing:border-box;margin-bottom:10px" placeholder="Add context for management…"></textarea>
      <button onclick="irSendEscalation(this,'${projectId}')" style="width:100%;font-family:var(--font-head);font-size:12px;font-weight:700;padding:8px 16px;background:none;border:1px solid rgba(226,75,74,.5);color:#E24B4A;cursor:pointer">Send to management &rarr;</button>
    </div>`;
  document.body.appendChild(comp);
};

window.irSendEscalation = async function(btn, projectId) {
  btn.textContent='✓ Escalation sent — management notified';
  btn.disabled=true;
  await API.post('workflow_step_instances',{
    id:crypto.randomUUID(), instance_id:crypto.randomUUID(), step_type:'manual',
    event_type:'management_decision', step_name:'Escalation',
    event_notes:'PM escalated to management from intervention record.',
    actor_name:_myResource?.name||null, created_at:new Date().toISOString(),
    firm_id:'aaaaaaaa-0001-0001-0001-000000000001'
  }).catch(()=>{});
  compassToast('Escalation sent to management',2500);
  setTimeout(()=>document.getElementById('ir-esc-composer')?.remove(),1500);
};

let _cmpSignal = null;
let _cmpItem   = null;

function openCompletionPanel(item) {
  _cmpItem = item; _cmpSignal = null;
  document.getElementById('completion-micro-panel')?.remove();
  document.getElementById('inprogress-panel')?.remove();

  const panel = document.createElement('div');
  panel.id = 'completion-micro-panel';
  panel.style.cssText = 'grid-column:1/-1;border-bottom:2px solid var(--compass-cyan);background:rgba(0,210,255,.03);padding:12px 16px 14px;animation:micro-open 180ms ease';

  panel.innerHTML = `
    <div style="font-family:var(--font-head);font-size:11px;letter-spacing:.1em;
      text-transform:uppercase;color:var(--compass-cyan);margin-bottom:8px;font-weight:700">
      ${item.type==='task'?'Complete task':'Resolve action'} —
      <span style="font-weight:400;color:var(--text2)">${esc(item.title.slice(0,60))}</span>
    </div>
    <div style="display:grid;grid-template-columns:105px 155px 1fr;gap:12px;align-items:start">
      <div>
        <div style="font-family:var(--font-head);font-size:11px;color:var(--text3);
          letter-spacing:.07em;text-transform:uppercase;margin-bottom:5px">Hours</div>
        <input id="cmp-hours" type="number" min="0" max="24" step="0.25" placeholder="0.0"
          style="width:80px;font-family:var(--font-display);font-size:22px;font-weight:700;
            padding:7px 10px;background:var(--bg2);border:1px solid var(--compass-cyan);
            color:var(--compass-cyan);outline:none;text-align:center"/>
      </div>
      <div>
        <div style="font-family:var(--font-head);font-size:11px;color:var(--text3);
          letter-spacing:.07em;text-transform:uppercase;margin-bottom:8px">Signal</div>
        <div style="display:flex;gap:10px">
          <button id="cmp-sig-green" onclick="setCmpSignal('green')" title="On track"
            style="width:28px;height:28px;border-radius:50%;border:2px solid #1D9E75;background:transparent;cursor:pointer;transition:all .12s"
            onmouseenter="this.style.background='rgba(29,158,117,.2)'"
            onmouseleave="this.style.background=_cmpSignal==='green'?'#1D9E75':'transparent'"></button>
          <button id="cmp-sig-yellow" onclick="setCmpSignal('yellow')" title="Some uncertainty"
            style="width:28px;height:28px;border-radius:50%;border:2px solid #EF9F27;background:transparent;cursor:pointer;transition:all .12s"
            onmouseenter="this.style.background='rgba(239,159,39,.2)'"
            onmouseleave="this.style.background=_cmpSignal==='yellow'?'#EF9F27':'transparent'"></button>
          <button id="cmp-sig-red" onclick="setCmpSignal('red')" title="At risk"
            style="width:28px;height:28px;border-radius:50%;border:2px solid #E24B4A;background:transparent;cursor:pointer;transition:all .12s"
            onmouseenter="this.style.background='rgba(226,75,74,.2)'"
            onmouseleave="this.style.background=_cmpSignal==='red'?'#E24B4A':'transparent'"></button>
        </div>
      </div>

// ── Skip — mark done without time, write CoC event ───────
async function skipCompletion() {
  const item = _cmpItem;
  if (!item) { closeCompletionPanel(); return; }
  closeCompletionPanel();

  const now = new Date();
  const timeStr = now.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true});
  const proj = item.projectId ? _projects?.find(p=>p.id===item.projectId) : null;

  _doneToday.unshift({ id:item.id, title:item.title, project:proj?.name||'—',
    time:timeStr, hours:0, signal:null, noTime:true });

  try {
    await API.post('coc_events',{
      id: crypto.randomUUID(),
      firm_id: 'aaaaaaaa-0001-0001-0001-000000000001',
      entity_id: item.id,
      entity_type: item.type === 'task' ? 'task' : 'action_item',
      event_type: 'completed',
      step_name: item.type === 'task' ? 'Task completed' : 'Action item resolved',
      event_notes: 'Completed — no time logged',
      actor_name: _myResource?.name || null,
      actor_resource_id: _myResource?.id || null,
      outcome: 'on_track',
      created_at: now.toISOString(),
      updated_at: now.toISOString(),
    }).catch(()=>{});
    if (item.type==='task') await API.patch(`tasks?id=eq.${item.id}`,{status:'complete',pct_complete:100,updated_at:now.toISOString()}).catch(()=>{});
    else await API.patch(`workflow_action_items?id=eq.${item.id}`,{status:'resolved',resolved_at:now.toISOString()}).catch(()=>{});
  } catch(e) {}

  // Update Done Today list inline
  const dtList = document.getElementById('done-today-list');
  if (dtList) {
    dtList.querySelector('[style*="italic"]')?.remove();
    const r=document.createElement('div'); r.style.cssText='display:flex;align-items:center;gap:8px;padding:7px 13px;border-bottom:1px solid var(--border);animation:micro-open 200ms ease';
    r.innerHTML=`<span style="color:var(--compass-green);font-size:13px">✓</span>
      <div style="flex:1;min-width:0"><div style="font-family:var(--font-body);font-size:12px;font-weight:500;color:var(--text0);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(item.title)}</div>
      <div style="font-family:var(--font-head);font-size:11px;color:var(--text3)">${esc(proj?.name||'—')} · ${timeStr} · no time logged</div></div>
      <div style="width:8px;height:8px;border-radius:50%;background:var(--muted)"></div>
      <div style="font-family:var(--font-display);font-size:13px;font-weight:700;color:var(--text3)">—</div>`;
    dtList.insertBefore(r, dtList.firstChild);
  }
  const ctr=document.getElementById('done-today-count');
  if (ctr) { ctr.textContent=_doneToday.length; const card=ctr.closest('.stat-done-today'); if(card){card.classList.add('stat-done-pulse');setTimeout(()=>card.classList.remove('stat-done-pulse'),450);} }
  const wiRow=document.querySelector(`.wi-row[data-wi-id="${item.id}"]`);
  if (wiRow) { wiRow.style.transition='opacity 320ms ease'; wiRow.style.opacity='0.3'; setTimeout(()=>wiRow.remove(),340); }
  compassToast(`${esc(item.title.slice(0,40))} — skipped`);
  setTimeout(()=>{_viewLoaded['user']=false;_mwLoadUserView();},360);
}

// ══════════════════════════════════════════════════════════
// COMPLETION MICRO-PANEL
// Captures hours, signal (G/Y/R), and note on any work item

async function submitCompletion() {
  const item     = _cmpItem;
  if (!item) return;

  const hoursRaw = parseFloat(document.getElementById('cmp-hours')?.value || 0);
  const note     = (document.getElementById('cmp-note')?.value || '').trim();
  const billable = document.getElementById('cmp-billable')?.checked ?? true;
  const statusEl = document.getElementById('cmp-status');
  const submitBtn = document.getElementById('cmp-submit');

  // Validate: hours require a note
  if (hoursRaw > 0 && note.length < 10) {
    if (statusEl) statusEl.textContent = 'Add a note to log hours (10+ chars)';
    document.getElementById('cmp-note')?.focus();
    return;
  }

  if (submitBtn) { submitBtn.disabled = true; submitBtn.textContent = 'Saving…'; }
  if (statusEl)  statusEl.textContent = '';

  const today = new Date().toLocaleDateString('en-CA');
  const promises = [];

  // ── 1. Write time_entries row if hours logged ──────────────
  if (hoursRaw > 0) {
    promises.push(
      API.post('time_entries', {
        firm_id:     'aaaaaaaa-0001-0001-0001-000000000001',
        resource_id: _myResource?.id  || null,
        user_id:     _myResource?.user_id || null,
        project_id:  item.projectId   || null,
        task_id:     item.type === 'task'   ? item.id : null,
        source_type: 'direct',
        date:        today,
        hours:       hoursRaw,
        is_billable: billable,
        notes:       note || null,
      }).catch(() => {})
    );
  }

  // ── 2. Patch the work item status ──────────────────────────
  if (item.type === 'task') {
    promises.push(
      API.patch(`tasks?id=eq.${item.id}`, {
        status:       'complete',
        pct_complete: 100,
        updated_at:   new Date().toISOString(),
      }).catch(() => {})
    );
  } else if (item.type === 'action') {
    promises.push(
      API.patch(`workflow_action_items?id=eq.${item.id}`, {
        status:      'resolved',
        resolved_at: new Date().toISOString(),
        resolution_note: note || null,
      }).catch(() => {})
    );
  }

  // ── 3. Write CoC completion event to coc_events ──────────
  const cocEvtId = crypto.randomUUID();
  const cocEvt = {
    id:          cocEvtId,
    firm_id:     'aaaaaaaa-0001-0001-0001-000000000001',
    entity_id:   item.id,
    entity_type: item.type === 'task' ? 'task' : 'action_item',
    event_type:  'completed',
    step_name:   item.type === 'task' ? 'Task completed' : 'Action item resolved',
    event_notes: note || null,
    actor_name:  _myResource?.name || null,
    actor_resource_id: _myResource?.id || null,
    outcome:     _cmpSignal === 'green' ? 'on_track' : _cmpSignal === 'yellow' ? 'at_risk' : _cmpSignal === 'red' ? 'blocked' : 'on_track',
    created_at:  new Date().toISOString(),
    updated_at:  new Date().toISOString(),
  };
  promises.push(API.post('coc_events', cocEvt).catch(()=>{}));
  // Optimistically update local cache
  if (!window._myCocEvents) window._myCocEvents = [];
  window._myCocEvents.unshift(cocEvt);

  try {
    await Promise.all(promises);
    closeCompletionPanel();

    // ── Persist to Done Today ──────────────────────────────
    const now = new Date();
    const timeStr = now.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true});
    const proj = item.projectId ? _projects?.find(p=>p.id===item.projectId) : null;
    _doneToday.unshift({ id:item.id, title:item.title, project:proj?.name||'—',
      time:timeStr, hours:hoursRaw, signal:_cmpSignal, noTime:hoursRaw===0 });

    // ── Inline Done Today update ───────────────────────────
    const dtList = document.getElementById('done-today-list');
    if (dtList) {
      dtList.querySelector('[style*="italic"]')?.remove();
      const sc=_cmpSignal==='green'?'var(--compass-green)':_cmpSignal==='red'?'var(--compass-red)':'var(--compass-amber)';
      const r=document.createElement('div'); r.style.cssText='display:flex;align-items:center;gap:8px;padding:7px 13px;border-bottom:1px solid var(--border);animation:micro-open 200ms ease';
      r.innerHTML=`<span style="color:var(--compass-green);font-size:13px">✓</span>
        <div style="flex:1;min-width:0"><div style="font-family:var(--font-body);font-size:12px;font-weight:500;color:var(--text0);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(item.title)}</div>
        <div style="font-family:var(--font-head);font-size:11px;color:var(--text3)">${esc(proj?.name||'—')} · ${timeStr}${hoursRaw===0?' · no time logged':''}</div></div>
        ${_cmpSignal?`<div style="width:8px;height:8px;border-radius:50%;background:${sc};flex-shrink:0"></div>`:'<div style="width:8px;height:8px"></div>'}
        <div style="font-family:var(--font-display);font-size:13px;font-weight:700;color:${hoursRaw===0?'var(--text3)':'var(--compass-cyan)'}">${hoursRaw===0?'—':hoursRaw.toFixed(1)+'h'}</div>`;
      dtList.insertBefore(r, dtList.firstChild);
    }
    // ── Pulse Done Today counter ───────────────────────────
    const ctr=document.getElementById('done-today-count');
    if (ctr) { ctr.textContent=_doneToday.length; const card=ctr.closest('.stat-done-today'); if(card){card.classList.add('stat-done-pulse');setTimeout(()=>card.classList.remove('stat-done-pulse'),450);} }
    // ── Fade out completed row ─────────────────────────────
    const wiRow=document.querySelector(`.wi-row[data-wi-id="${item.id}"]`);
    if (wiRow) { wiRow.style.transition='opacity 320ms ease'; wiRow.style.opacity='0.3'; setTimeout(()=>wiRow.remove(),340); }

    compassToast(`${esc(item.title.slice(0,40))} — marked complete`);
    setTimeout(()=>{_viewLoaded['user']=false;_mwLoadUserView();},360);
  } catch(e) {
    if (submitBtn) { submitBtn.disabled = false; submitBtn.textContent = 'Mark complete →'; }
    if (statusEl)  statusEl.textContent = 'Failed — try again';
  }
}

        b.style.color = isActive ? '#EF9F27' : 'rgba(255,255,255,.3)';
      });

  // ── New time entry ────────────────────────────────────────
  if (ev.target.closest('.te-new-btn')) { openNewTimeEntry(); return; }
  // ── Time log row ──────────────────────────────────────────
  const teRow = ev.target.closest('.te-row');
  if (teRow) {
    const teId=teRow.dataset.teId, isCad=teRow.dataset.teCadence==='true';
    _teSelected = teId;
    document.querySelectorAll('.te-row').forEach(r => {
      const isThis = r.dataset.teId === teId;
      r.style.borderLeft = isThis ? '2px solid var(--compass-cyan)' : '2px solid transparent';
      r.style.background = isThis ? 'rgba(0,210,255,.04)' : '';
      r.onmouseleave = () => { r.style.background = isThis ? 'rgba(0,210,255,.04)' : ''; };
    });
    if (isCad) { window.location.href = '/cadence.html'; return; }
    const entry = _teEntries.find(e => e.id === teId);
    if (entry) {
      const proj = _projects.find(p => p.id === entry.project_id);
      openTimeEntryEdit({ id:entry.id, hours:entry.hours, notes:entry.notes||'',
        is_billable:entry.is_billable, date:entry.date, week_start_date:entry.week_start_date,
        project_id:entry.project_id, project_name:proj?.name||'—',
        step_name:entry.step_name||null, source_type:entry.source_type });
    }
    return;
  }
  // ── Timesheet submit ──────────────────────────────────────
  const tsSubmit = ev.target.closest('.ts-submit-btn');
  if (tsSubmit) {
    submitTimesheetWeek(tsSubmit.dataset.weekId, tsSubmit.dataset.weekStart, tsSubmit.dataset.weekHours);
    return;
  }
});

// ── Gauge dwell 900ms → Day Intelligence Briefing ─────────
document.addEventListener('mouseover', function(ev) {

  if (!gc) return;
  clearTimeout(_dwellTimer);
  _dwellTimer = setTimeout(() => {
    if (gc.matches(':hover') && gc.dataset.gaugeHasData === 'true')
      openDayBriefing(gc.dataset.gaugeDate);

});
document.addEventListener('mouseout', function(ev) {

});

async function saveInProgressUpdate(itemId, projectId) {
  const pct=parseInt(document.getElementById('ip-pct')?.value)||0;
  const hours=parseFloat(document.getElementById('ip-hours')?.value||0);
  const status=document.getElementById('ip-status')?.value||'in_progress';
  const btn=document.getElementById('ip-save-btn');
  if (btn) { btn.textContent='…'; btn.disabled=true; }
  const today=new Date().toLocaleDateString('en-CA');
  try {
    const ps=[API.patch(`tasks?id=eq.${itemId}`,{pct_complete:pct,status,updated_at:new Date().toISOString()}).catch(()=>{})];
    if (hours>0&&_myResource?.id) {
      const id=crypto.randomUUID();
      ps.push(API.post('time_entries',{id,firm_id:'aaaaaaaa-0001-0001-0001-000000000001',
        resource_id:_myResource.id,user_id:_myResource.user_id||null,
        project_id:projectId||null,task_id:itemId,source_type:'direct',
        date:today,hours,is_billable:true}).catch(()=>{}));
    }
    await Promise.all(ps);
    document.getElementById('inprogress-panel')?.remove();
    compassToast('Progress updated');
    _viewLoaded['user']=false; _mwLoadUserView();
  } catch(e) {
    if (btn) { btn.textContent='Save →'; btn.disabled=false; }
    compassToast('Failed — '+e.message,2500);
  }
}

// COMPONENT 1.F — Full Weekly Timesheet Drawer (640px)
// ══════════════════════════════════════════════════════════
function openFullWeeklyTimesheet({ expandDay=null }={}) {
  document.getElementById('full-weekly-drawer')?.remove();
  const today=new Date().toLocaleDateString('en-CA');
  const todayDt=new Date(today+'T00:00:00');
  const isoOff=todayDt.getDay()===0?6:todayDt.getDay()-1;
  const wkStart=new Date(todayDt); wkStart.setDate(todayDt.getDate()-isoOff);
  const weekStartStr=wkStart.toLocaleDateString('en-CA');
  const weekDays=Array.from({length:5},(_,i)=>{const d=new Date(wkStart);d.setDate(wkStart.getDate()+i);return d.toLocaleDateString('en-CA');});
  const dayNames=['Mon','Tue','Wed','Thu','Fri'];
  const expandTarget=expandDay||today;

  const weekEntries=_teEntries.filter(e=>weekDays.includes(e.date));
  const weekTotal=weekEntries.reduce((s,e)=>s+parseFloat(e.hours||0),0);
  const weekBillable=weekEntries.filter(e=>e.is_billable).reduce((s,e)=>s+parseFloat(e.hours||0),0);
  const dayTotals={};
  weekDays.forEach(d=>{dayTotals[d]=weekEntries.filter(e=>e.date===d).reduce((s,e)=>s+parseFloat(e.hours||0),0);});

  // Project × Day grid
  const projIds=[...new Set(weekEntries.map(e=>e.project_id).filter(Boolean))];
  const gridProjects=projIds.map(pid=>_projects.find(p=>p.id===pid)).filter(Boolean);

  function cellHtml(hrs,d){
    const isPast=d<today,isToday=d===today,isFut=d>today;
    if(isFut) return `<span style="font-family:var(--font-head);font-size:11px;color:var(--text3)">—</span>`;
    if(hrs>0){ const c=isToday?'var(--compass-cyan)':'var(--compass-green)'; return `<span style="font-family:var(--font-head);font-size:12px;font-weight:700;color:${c}">${hrs.toFixed(1)}h ${isToday?'■':'✓'}</span>`; }
    if(isPast) return `<span style="font-family:var(--font-head);font-size:12px;font-weight:700;color:var(--compass-red)">0h !</span>`;
    return `<span style="font-family:var(--font-head);font-size:11px;color:var(--text3)">—</span>`;
  }

  const gridHtml=`<div style="overflow-x:auto;margin-bottom:0">
    <table style="width:100%;border-collapse:collapse;font-family:var(--font-head);font-size:12px">
      <thead><tr style="border-bottom:1px solid var(--border)">
        <th style="text-align:left;padding:6px 13px;font-weight:700;color:var(--text3);font-size:11px;letter-spacing:.07em">PROJECT</th>
        ${weekDays.map((d,i)=>`<th style="text-align:center;padding:6px 8px;font-weight:700;color:${d===today?'var(--compass-cyan)':d<today?'var(--text2)':'var(--text3)'};font-size:11px">${dayNames[i]}</th>`).join('')}
        <th style="text-align:right;padding:6px 13px 6px 0;font-weight:700;color:var(--text3);font-size:11px">TOTAL</th>
      </tr></thead>
      <tbody>
        ${gridProjects.map(proj=>{
          const rowE=weekEntries.filter(e=>e.project_id===proj.id);
          const rTotal=rowE.reduce((s,e)=>s+parseFloat(e.hours||0),0);
          return `<tr style="border-bottom:1px solid rgba(0,210,255,.06)">
            <td style="padding:7px 13px;color:var(--text1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:160px">${esc(proj.name)}</td>
            ${weekDays.map(d=>`<td style="text-align:center;padding:7px 8px">${cellHtml(rowE.filter(e=>e.date===d).reduce((s,e)=>s+parseFloat(e.hours||0),0),d)}</td>`).join('')}
            <td style="text-align:right;padding:7px 13px 7px 0;font-family:var(--font-display);font-size:13px;font-weight:700;color:var(--compass-cyan)">${rTotal.toFixed(1)}h</td>
          </tr>`;
        }).join('')}
        ${gridProjects.length===0?`<tr><td colspan="${weekDays.length+2}" style="padding:12px 13px;color:var(--text3);font-family:var(--font-head);font-size:12px">No time entries this week</td></tr>`:''}
      </tbody>
      <tfoot><tr style="border-top:1px solid var(--border)">
        <td style="padding:7px 13px;font-weight:700;color:var(--text2);font-size:11px;font-family:var(--font-head)">DAILY TOTAL</td>
        ${weekDays.map(d=>`<td style="text-align:center;padding:7px 8px">${cellHtml(dayTotals[d],d)}</td>`).join('')}

      </tr></tfoot>
    </table>
    <div style="padding:4px 13px 6px;font-family:var(--font-head);font-size:11px;color:var(--text3)">✓ Complete · ■ Today · ! No entries</div>
  </div>`;

        <button class="ts-submit-wts-btn"

            padding:7px 16px;background:var(--compass-cyan);color:#060a10;border:none;cursor:pointer"
          onmouseenter="this.style.opacity='.85'" onmouseleave="this.style.opacity='1'">Submit week →</button>
      </div>
    </div>`;

  document.body.appendChild(drawer);

  drawer.addEventListener('click', async ev => {
    const addBtn=ev.target.closest('.acc-add-btn');
    if (addBtn) {
      const d=addBtn.dataset.day;
      const desc=drawer.querySelector(`.acc-desc-inp[data-day="${d}"]`)?.value?.trim()||'';
      const hrs=parseFloat(drawer.querySelector(`.acc-hrs-inp[data-day="${d}"]`)?.value||0);
      const proj=drawer.querySelector(`.acc-proj-sel[data-day="${d}"]`)?.value||'';
      const bill=drawer.querySelector(`.acc-bill-chk[data-day="${d}"]`)?.checked??true;
      if(!hrs||hrs<=0){compassToast('Hours required',2000);return;}
      if(!proj){compassToast('Project required',2000);return;}
      addBtn.textContent='…';addBtn.disabled=true;
      try {
        const id=crypto.randomUUID();
        await API.post('time_entries',{id,firm_id:'aaaaaaaa-0001-0001-0001-000000000001',
          resource_id:_myResource?.id,user_id:_myResource?.user_id||null,
          project_id:proj,source_type:'direct',date:d,hours:hrs,is_billable:bill,notes:desc||null});
        compassToast('Entry added');drawer.remove();
        _viewLoaded['user']=false;_mwLoadUserView();
        setTimeout(()=>openFullWeeklyTimesheet({expandDay:d}),400);
      } catch(e){addBtn.textContent='Add →';addBtn.disabled=false;compassToast('Failed — '+e.message,2500);}
    }
    const delBtn=ev.target.closest('[data-te-del]');
    if (delBtn){
      if(!confirm('Delete this entry?'))return;
      try{
        await API.del('time_entries?id=eq.'+delBtn.dataset.teDel);
        compassToast('Deleted');drawer.remove();_viewLoaded['user']=false;_mwLoadUserView();
        setTimeout(()=>openFullWeeklyTimesheet({expandDay:expandTarget}),400);
      }catch(e){compassToast('Failed',2000);}
    }
    if(ev.target.closest('.mark-today-complete-btn')){
      const todayHrs=dayTotals[today]||0;
      await API.post('coc_events',{
        id: crypto.randomUUID(),
        firm_id: 'aaaaaaaa-0001-0001-0001-000000000001',
        entity_id: _myResource?.id || crypto.randomUUID(),
        entity_type: 'task',
        event_type: 'progress_update',
        step_name: 'Daily timesheet complete',
        event_notes: todayHrs.toFixed(1) + 'h logged today',
        actor_name: _myResource?.name || null,
        actor_resource_id: _myResource?.id || null,
        outcome: 'on_track',
        created_at: new Date().toISOString(),
        updated_at: new Date().toISOString(),
      }).catch(()=>{});
      compassToast('Today marked complete ✓');drawer.remove();_viewLoaded['user']=false;_mwLoadUserView();
    }
    if(ev.target.closest('.ts-submit-wts-btn')){
      drawer.remove();submitTimesheetWeek('',weekStartStr,weekTotal.toFixed(1));
    }
  });

  setTimeout(()=>{
    document.addEventListener('mousedown',function closeWTS(ev){
      if(!drawer.contains(ev.target)){drawer.remove();document.removeEventListener('mousedown',closeWTS);}
    });
  },50);
}

// ══════════════════════════════════════════════════════════
// COMPONENT 1.G — Day Intelligence Briefing (420px)
// ══════════════════════════════════════════════════════════
function openDayBriefing(dateStr) {
  document.getElementById('day-briefing-drawer')?.remove();
  _renderDayBriefing(dateStr, null);
}

function _renderDayBriefing(dateStr, expandEntryId) {
  document.getElementById('day-briefing-drawer')?.remove();

  const today      = new Date().toLocaleDateString('en-CA');
  const dayEntries = _teEntries.filter(e => e.date === dateStr);
  const totalHrs   = dayEntries.reduce((s,e)=>s+parseFloat(e.hours||0),0);
  const billHrs    = dayEntries.filter(e=>e.is_billable).reduce((s,e)=>s+parseFloat(e.hours||0),0);
  const nonBillHrs = totalHrs - billHrs;
  const dayLabel   = new Date(dateStr+'T00:00:00').toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});

  // Project distribution
  const projDist = {};
  dayEntries.forEach(e=>{const pid=e.project_id||'__none__';projDist[pid]=(projDist[pid]||0)+parseFloat(e.hours||0);});
  const distColors = ['var(--compass-cyan)','var(--compass-amber)','var(--compass-green)','var(--compass-purple)','var(--compass-red)'];
  const projDistArr = Object.entries(projDist).map(([pid,hrs])=>{
    const proj=_projects.find(p=>p.id===pid);
    return{pid,name:proj?.name||'Unassigned',hrs,pct:totalHrs>0?Math.round(hrs/totalHrs*100):0};
  }).sort((a,b)=>b.hrs-a.hrs);

  const distBarHtml = totalHrs>0 ? `
    <div style="display:flex;height:7px;border-radius:4px;overflow:hidden;margin-bottom:8px">
      ${projDistArr.map((p,i)=>`<div style="width:${p.pct}%;background:${distColors[i%distColors.length]};min-width:${p.pct>0?2:0}px" title="${p.name}: ${p.pct}%"></div>`).join('')}
    </div>
    <div style="display:flex;flex-direction:column;gap:3px">
      ${projDistArr.map((p,i)=>`<div style="display:flex;align-items:center;gap:8px">
        <div style="width:8px;height:8px;border-radius:50%;background:${distColors[i%distColors.length]};flex-shrink:0"></div>
        <span style="font-family:var(--font-body);font-size:12px;color:var(--text1);flex:1">${esc(p.name)}</span>
        <span style="font-family:var(--font-head);font-size:11px;font-weight:700;color:${distColors[i%distColors.length]}">${p.pct}% (${p.hrs.toFixed(1)}h)</span>
      </div>`).join('')}
    </div>` : '<div style="font-family:var(--font-head);font-size:12px;color:var(--text3)">No entries for this day</div>';

  const billBarHtml = totalHrs>0 ? `
    <div style="display:flex;height:5px;border-radius:3px;overflow:hidden;margin:8px 0 4px">
      <div style="width:${(billHrs/totalHrs*100).toFixed(1)}%;background:var(--compass-cyan)"></div>
      <div style="width:${(nonBillHrs/totalHrs*100).toFixed(1)}%;background:#8B5CF6"></div>
    </div>
    <div style="display:flex;justify-content:space-between;font-family:var(--font-head);font-size:11px;font-weight:700">
      <span style="color:var(--compass-cyan)">Billable ${billHrs.toFixed(1)}h (${Math.round(billHrs/totalHrs*100)}%)</span>
      <span style="color:#8B5CF6">Non-bill ${nonBillHrs.toFixed(1)}h (${Math.round(nonBillHrs/totalHrs*100)}%)</span>
    </div>` : '';

  // ── Entry rows — clickable, expand inline for direct edits ──────
  function entryRowHtml(e) {
    const proj     = _projects.find(p=>p.id===e.project_id);
    const isDirect = e.source_type === 'direct';
    const isExp    = e.id === expandEntryId;
    const pctOfDay = totalHrs>0 ? Math.round(parseFloat(e.hours)/totalHrs*100) : 0;
    const entryHrs = parseFloat(e.hours||0);
    const billDot  = `<div style="width:8px;height:8px;border-radius:50%;background:${e.is_billable?'var(--compass-cyan)':'#8B5CF6'};flex-shrink:0"></div>`;

    const expandForm = isDirect ? `

        <div style="display:grid;grid-template-columns:80px 1fr;gap:10px;margin-bottom:8px;align-items:end">
          <div>
            <div style="font-family:var(--font-head);font-size:11px;color:var(--text3);letter-spacing:.07em;text-transform:uppercase;margin-bottom:4px">Hours</div>
            <input class="db-edit-hrs" data-entry-id="${e.id}" type="number" min="0.25" max="24" step="0.25"
              value="${entryHrs.toFixed(2)}"
              style="width:100%;font-family:var(--font-display);font-size:18px;font-weight:700;padding:6px 8px;
                background:var(--bg2);border:1px solid var(--compass-cyan);color:var(--compass-cyan);
                outline:none;text-align:center;box-sizing:border-box"/>
          </div>
          <div>
            <div style="font-family:var(--font-head);font-size:11px;color:var(--text3);letter-spacing:.07em;text-transform:uppercase;margin-bottom:4px">Project</div>
            <select class="db-edit-proj" data-entry-id="${e.id}"
              style="width:100%;font-family:var(--font-head);font-size:12px;font-weight:600;padding:7px 8px;
                background:var(--bg2);border:1px solid var(--border);color:var(--text1);cursor:pointer;box-sizing:border-box">
              ${(_projects||[]).filter(p=>p.status==='active').map(p=>`<option value="${p.id}" ${p.id===e.project_id?'selected':''}>${esc(p.name)}</option>`).join('')}
