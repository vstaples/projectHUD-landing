        ${recovDays>0?`<div class="sim-wf-row" id="sim-wf-rec"><div style="font-family:var(--font-head);font-size:11px;color:rgba(240,246,255,.7);min-width:220px;flex-shrink:0">Schedule value recovered</div><div style="flex:1;height:14px;background:rgba(255,255,255,.05);border-radius:1px;overflow:hidden"><div style="height:100%;border-radius:1px;background:#1D9E75;width:${Math.min(100,Math.round(schedVal/(slipDays*dailyCost||84000)*100))}%"></div></div><div style="font-family:var(--font-head);font-size:11px;font-weight:700;min-width:65px;text-align:right;color:#1D9E75">+${formatYen(schedVal)}</div></div>`:''}
        <div class="sim-wf-row" id="sim-wf-net" style="border-top:1px solid rgba(255,255,255,.08);padding-top:5px;margin-top:3px">
          <div style="font-family:var(--font-head);font-size:11px;font-weight:700;color:#F0F6FF;min-width:220px;flex-shrink:0">Net position</div>
          <div style="flex:1;height:14px;background:rgba(255,255,255,.05);border-radius:1px;overflow:hidden"><div style="height:100%;border-radius:1px;background:${netCost<=0?'#1D9E75':'#EF9F27'};width:${Math.min(100,Math.round(Math.abs(netCost)/(slipDays*dailyCost||84000)*100))}%"></div></div>
          <div style="font-family:var(--font-head);font-size:11px;font-weight:700;min-width:65px;text-align:right;color:${netCost<=0?'#1D9E75':'#EF9F27'}">${netCost<=0?'+'+formatYen(Math.abs(netCost)):'-'+formatYen(netCost)}</div>
        </div>
      </div>
      <!-- Task network impact -->
      <div style="margin-bottom:12px">
        <div style="font-family:var(--font-head);font-size:11px;font-weight:700;letter-spacing:.08em;color:rgba(255,255,255,.35);text-transform:uppercase;margin-bottom:7px">Task network impact</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:5px">
          ${unblockedTasks.size?`<div style="border:1px solid rgba(29,158,117,.25);background:rgba(29,158,117,.04);padding:7px 9px"><div style="font-family:var(--font-head);font-size:11px;font-weight:700;letter-spacing:.06em;color:rgba(255,255,255,.35);text-transform:uppercase;margin-bottom:4px">Tasks unblocked</div>${unblockList}</div>`:''}
          ${advancedTasks.size?`<div style="border:1px solid rgba(139,92,246,.25);background:rgba(139,92,246,.04);padding:7px 9px"><div style="font-family:var(--font-head);font-size:11px;font-weight:700;letter-spacing:.06em;color:rgba(255,255,255,.35);text-transform:uppercase;margin-bottom:4px">Tasks advanced now</div>${advanceList}</div>`:''}
          ${remainingBlocked?`<div style="border:1px solid rgba(226,75,74,.18);background:rgba(226,75,74,.03);padding:7px 9px"><div style="font-family:var(--font-head);font-size:11px;font-weight:700;letter-spacing:.06em;color:rgba(255,255,255,.35);text-transform:uppercase;margin-bottom:4px">Still blocked</div>${remainingBlocked}</div>`:''}
        </div>
      </div>
      <!-- Risks -->
      ${risks.length?`<div style="border:1px solid rgba(255,255,255,.07);background:rgba(255,255,255,.02);margin-bottom:12px">
        <div style="padding:6px 11px;border-bottom:1px solid rgba(255,255,255,.05);display:flex;align-items:center;gap:6px">
          <div style="width:3px;height:11px;border-radius:1px;background:#EF9F27;flex-shrink:0"></div>
          <div style="font-family:var(--font-head);font-size:11px;font-weight:700;letter-spacing:.08em;color:rgba(255,255,255,.35);text-transform:uppercase">Second-order effects</div>
        </div>
        ${risks.map(r=>`<div style="display:flex;align-items:flex-start;gap:7px;padding:6px 11px;border-bottom:1px solid rgba(255,255,255,.04)">
          <div style="width:6px;height:6px;border-radius:50%;background:${r.sev};flex-shrink:0;margin-top:3px"></div>
          <div style="font-family:var(--font-body);font-size:11px;color:rgba(240,246,255,.7);line-height:1.5;flex:1">${r.text}</div>
        </div>`).join('')}
      </div>`:''}`;

    // Wire clickable stat handlers
    document.getElementById('sim-slip-cl')?.addEventListener('click',()=>simOpenSP('Daily cost breakdown',
      [['Blocked resources','¥10k/day'],['PM coordination','¥1.2k/day'],['Overhead (20%)','¥1.8k/day'],['Total','¥12k/day'],['Current slip',slipDays+'d'],['Total accumulated',formatYen(slipDays*dailyCost)]],
      formatYen(slipDays*dailyCost)+' accumulated cost','Fully-loaded cost of blocked resources. Configure rate in Firm Settings.','#E24B4A'));

    document.getElementById('sim-del-cl')?.addEventListener('click',()=>simOpenSP('Delivery calculation',
      [...levers.filter(l=>l.days<0).map(l=>[l.name,Math.abs(l.days)+'d recovered']),['Combined (capped at slip)',recovDays+'d'],['Remaining slip',projSlip+'d'],['Projected date',projSlip===0?'On contract':fmt(pd)]],
      projSlip===0?'On contract':fmt(pd)+' (+'+projSlip+'d)','Days capped at current slip. Same day cannot be recovered twice.','#00D2FF'));

    document.getElementById('sim-net-cl')?.addEventListener('click',()=>simOpenSP('Net position breakdown',
      [['Slip cost ('+slipDays+'d × ¥12k)','-'+formatYen(slipDays*dailyCost)],...levers.filter(l=>l.hard>0).map(l=>[l.name+' hard cost','-'+formatYen(l.hard)]),['Schedule value recovered','+'+formatYen(schedVal)],['Net',netCost<=0?'+'+formatYen(Math.abs(netCost))+' benefit':'-'+formatYen(netCost)]],
      netCost<=0?'+'+formatYen(Math.abs(netCost))+' benefit':'-'+formatYen(netCost),'Hard costs only. Internal labor excluded.','#EF9F27'));

    document.getElementById('sim-sr-badge')?.addEventListener('click',()=>simOpenSP('Combined success rate',
      [...levers.map(l=>[l.name,l.sr+'% success · '+l.conf+'% conf']),['Combined (weakest lever)',minSR+'%'],['Avg confidence',avgConf+'%']],
      minSR+'% combined · '+avgConf+'% confidence','Combined = weakest lever. A chain is only as strong as its weakest link.','#1D9E75'));
  }
  window.simRunSim = simRunSim;

  async function simCommit() {
    if (!selected.size) return;
    const levers = LEVERS_LIVE.filter(l=>selected.has(l.id));
    const note = levers.map(l=>l.name).join('; ');
    // Write CoC intervention events
    const posts = levers.map(l => API.post('workflow_step_instances',{
      id: crypto.randomUUID(),
      instance_id: crypto.randomUUID(), step_type: 'manual',
      event_type: 'intervention',
      step_name: l.name.slice(0,80),
      event_notes: '[Simulator commit] '+l.detail,
      actor_name: _myResource?.name||null,
      created_at: new Date().toISOString(),
      firm_id: 'aaaaaaaa-0001-0001-0001-000000000001'
    }).catch(()=>{}));
    await Promise.all(posts);
    compassToast('Intervention records created · CoC events written',2500);
    simResetAll();
    // Invalidate morning brief cache
    window._mgBriefData = null;
  }
  window.simCommit = simCommit;

  function simResetAll() {
    selected.clear();
    document.querySelectorAll('.sim-lc.sim-sel').forEach(c=>c.classList.remove('sim-sel'));
    document.getElementById('sim-results').style.display='none';
    document.getElementById('sim-empty').style.display='flex';
    document.getElementById('sim-cb').style.display='none';
  }
  window.simResetAll = simResetAll;

  // ── Build lever list ──────────────────────────────────
  const ll = document.getElementById('sim-lever-list');
  let curGroup = null;
  LEVERS_LIVE.forEach(lev => {
    if (lev.group !== curGroup) {
      curGroup = lev.group;
      const gm = GROUP_META[curGroup];
      const gh = document.createElement('div');
      gh.style.cssText = 'display:flex;align-items:center;gap:6px;margin:8px 0 5px';
      gh.innerHTML = `<div style="width:3px;height:13px;border-radius:1px;background:${gm.color};flex-shrink:0"></div><div style="font-family:var(--font-head);font-size:11px;font-weight:700;letter-spacing:.08em;color:rgba(255,255,255,.4);text-transform:uppercase;flex:1">${gm.label}</div>`;
      ll.appendChild(gh);
    }
    const card = document.createElement('div');
    card.id = 'simlc-'+lev.id;
    card.className = 'sim-lc'+(lev.group==='cpm'?' sim-cpm':'')+(lev.warn||lev.pattern?' sim-warn':'');
    card.onclick = () => simToggleLever(lev.id);
    const tc = {low:'rgba(29,158,117,.7)',med:'rgba(239,159,39,.7)',high:'rgba(226,75,74,.7)'}[lev.costTier||'low'];
    const tl = {low:'Low cost',med:'Med cost',high:'High cost'}[lev.costTier||'low'];
    card.innerHTML = `
      <div style="display:flex;align-items:flex-start;gap:6px;margin-bottom:3px">
        <div class="sim-chk">✓</div>
        <div style="font-family:var(--font-head);font-size:11px;font-weight:700;color:#F0F6FF;flex:1;line-height:1.3">${lev.name}</div>
        <span data-sim-lid="${lev.id}" data-sim-tt="cost"
          style="font-family:var(--font-head);font-size:11px;padding:1px 5px;border:1px solid ${tc}40;color:${tc};flex-shrink:0;cursor:help">${tl}</span>
      </div>
      <div style="display:flex;gap:5px;font-family:var(--font-head);font-size:11px;color:rgba(255,255,255,.35)">
        <span data-sim-lid="${lev.id}" data-sim-tt="success"
          style="display:flex;align-items:center;gap:3px;cursor:help">
          <div style="width:5px;height:5px;border-radius:50%;background:${lev.sr>=80?'#1D9E75':lev.sr>=65?'#EF9F27':'#E24B4A'}"></div>${lev.sr}% success</span>
        <span data-sim-lid="${lev.id}" data-sim-tt="conf"
          style="display:flex;align-items:center;gap:3px;cursor:help">
          <div style="width:5px;height:5px;border-radius:50%;background:#8B5CF6"></div>${lev.conf}% conf</span>
      </div>
      ${lev.warn?`<div style="font-family:var(--font-head);font-size:11px;padding:4px 7px;background:rgba(239,159,39,.06);border:1px solid rgba(239,159,39,.2);border-left:2px solid #EF9F27;color:rgba(239,159,39,.85);line-height:1.45;margin-top:5px">${lev.warn}</div>`:''}
      ${lev.pattern?`<div style="font-family:var(--font-head);font-size:11px;padding:4px 7px;background:rgba(226,75,74,.05);border:1px solid rgba(226,75,74,.18);border-left:2px solid rgba(226,75,74,.6);color:rgba(226,75,74,.8);line-height:1.45;margin-top:5px">${lev.pattern}</div>`:''}
      ${lev.advances?.length?`<div style="display:flex;gap:3px;flex-wrap:wrap;margin-top:5px">${lev.advances.map(t=>`<span style="font-family:var(--font-head);font-size:11px;padding:1px 6px;border:1px solid rgba(139,92,246,.3);color:#8B5CF6">${t} →</span>`).join('')}</div>`:''}
      ${lev.params?.length?`<div style="display:none;border-top:1px solid rgba(255,255,255,.05);padding-top:5px;margin-top:5px" class="sim-params">${lev.params.map(p=>`<div style="display:flex;align-items:center;gap:5px;margin-top:4px"><span style="font-family:var(--font-head);font-size:11px;color:rgba(255,255,255,.3);min-width:75px">${p.l}</span><select onclick="event.stopPropagation();simRunSim()" style="flex:1;padding:2px 6px;background:#1a2a40;border:1px solid rgba(0,210,255,.2);color:#C8DFF0;font-family:var(--font-head);font-size:11px;outline:none;cursor:pointer">${p.o.map(o=>`<option>${o}</option>`).join('')}</select></div>`).join('')}</div>`:''}`;
    // Show params when selected
    const paramEl = card.querySelector('.sim-params');
    if (paramEl) {
      const orig = card.onclick;
      card.onclick = e => { orig(); if(card.classList.contains('sim-sel')) paramEl.style.display='block'; else paramEl.style.display='none'; };
    }
    ll.appendChild(card);
  });

  // ── Delegated stat-chip click handler ────────────────
  ll.addEventListener('click', function(e) {
    const chip = e.target.closest('[data-sim-lid]');
    if (!chip) return;
    e.stopPropagation();
    const lid = chip.dataset.simLid;
    const tt  = chip.dataset.simTt;
    const lev = LEVERS_LIVE.find(l=>l.id===lid);
    if (!lev) return;
    if (tt === 'success') {
      simOpenSP(
        lev.sr+'% success rate',
        [
          ['Lever type', lev.group],
          ['Success rate', lev.sr+'%'],
          ['Confidence', lev.conf+'%'],
          ['Pattern match', lev.pattern ? 'Active warning — see card' : 'No pattern warning'],
          ['Sample basis', 'Historical instances — firm-wide'],
        ],
        lev.sr+'% of prior instances resolved with this lever type',
        lev.pattern || (lev.sr >= 80
          ? 'High success rate. Confidence reflects sample size — more instances will narrow the range.'
          : lev.sr >= 65
            ? 'Moderate rate. Consider pairing with a complementary lever.'
            : 'Lower rate. Today\u2019s block may match the failure pattern. Review carefully before committing.'),
        lev.sr>=80?'#1D9E75':lev.sr>=65?'#EF9F27':'#E24B4A'
      );
    } else if (tt === 'conf') {
      simOpenSP(
        lev.conf+'% confidence',
        [
          ['What this measures', 'Certainty in the success rate estimate'],
          ['Confidence', lev.conf+'%'],
          ['Success rate', lev.sr+'%'],
          ['Practical range', (lev.sr-Math.round((100-lev.conf)/5))+'% – '+(lev.sr+Math.round((100-lev.conf)/5))+'%'],
          ['Grows with', 'More matching historical instances'],
        ],
        lev.conf+'% confident the '+lev.sr+'% rate is accurate',
        'Confidence and success rate are different. Success = how often this lever works. Confidence = how certain we are of that rate. Low confidence with high success may improve as data accumulates.',
        '#8B5CF6'
      );
    } else if (tt === 'cost') {
      const costRows = [
        ['Cost tier', {low:'Low',med:'Medium',high:'High'}[lev.costTier||'low']],
        ['Hard out-of-pocket', lev.hard>0?formatYen(lev.hard):'¥0'],
        ['Labor estimate', lev.group==='escalation'?'~¥24k (PM + management)':lev.group==='resource'?'~¥35k (coverage + approval)':'¥0'],
        ['Refundable if fails?', 'No — cost is independent of outcome'],
      ];
      if (lev.hard>0 && slipDays>0) {
        const daily=12000;
        costRows.push(['Break-even recovery', Math.ceil(lev.hard/daily)+'d of slip']);
      }
      simOpenSP(
        'Cost breakdown — '+lev.name,
        costRows,
        lev.hard>0?formatYen(lev.hard)+' committed immediately':'¥0 hard cost · labor only',
        'Hard costs are committed on approval regardless of outcome. Labor costs are internal and excluded from the net position calculation shown in the waterfall.',
        lev.costTier==='high'?'#E24B4A':lev.costTier==='med'?'#EF9F27':'#1D9E75'
      );
    }
  });

  // ── Build CPM view ────────────────────────────────────
  const cpmList = document.getElementById('sim-cpm-list');
  const statusColor = {blocking:'#E24B4A',critical:'#E24B4A',blocked:'#E24B4A','near-critical':'#EF9F27',available:'#1D9E75',parallelizable:'#8B5CF6',active:'#00D2FF'};
  const sections = [
    {label:'Overdue / blocked tasks',  tasks:overdueTasks},
    {label:'Available for parallel work', tasks: projTasks.filter(t=>!['complete','cancelled','blocked'].includes(t.status)&&!overdueTasks.find(u=>u.id===t.id)&&(!t.predecessors||t.predecessors==='{}'))},
    {label:'All active tasks', tasks: projTasks.filter(t=>!['complete','cancelled'].includes(t.status)).slice(0,10)},
  ];
  sections.forEach(sec => {
    if (!sec.tasks.length) return;
    const lbl = document.createElement('div');
    lbl.style.cssText='font-family:var(--font-head);font-size:11px;font-weight:700;letter-spacing:.08em;color:rgba(0,210,255,.6);text-transform:uppercase;margin:8px 0 5px';
    lbl.textContent = sec.label;
    cpmList.appendChild(lbl);
    sec.tasks.slice(0,6).forEach(t=>{
      const row = document.createElement('div');
      row.style.cssText='display:flex;align-items:center;gap:0;border-bottom:1px solid rgba(255,255,255,.04);cursor:pointer;transition:background .1s';
      row.onmouseenter=()=>row.style.background='rgba(255,255,255,.03)';
      row.onmouseleave=()=>row.style.background='';
      const isOverdue = overdueTasks.find(u=>u.id===t.id);
      const col = isOverdue?'#E24B4A':t.status==='active'?'#00D2FF':'#1D9E75';
      const pct = t.pct_complete||0;
      row.innerHTML=`<div style="width:3px;align-self:stretch;background:${col};flex-shrink:0"></div>
        <div style="flex:1;padding:6px 9px">
          <div style="display:flex;align-items:center;gap:6px;margin-bottom:2px">
            <div style="font-family:var(--font-head);font-size:11px;font-weight:700;color:rgba(0,210,255,.7);min-width:30px">${t.id.slice(0,8)}</div>
            <div style="font-family:var(--font-head);font-size:11px;color:#F0F6FF;flex:1;line-height:1.3">${esc(t.name||'Task')}</div>
          </div>
          <div style="font-family:var(--font-head);font-size:11px;color:rgba(255,255,255,.35);display:flex;gap:8px">
            <span style="color:${col};font-weight:700">${isOverdue?'OVERDUE':t.status}</span>
            <span>${pct}% complete</span>
            ${t.due_date?`<span>Due ${t.due_date}</span>`:''}
          </div>
        </div>`;
      cpmList.appendChild(row);
    });
  });
};

      </div>
      <!-- Archive sidebar + body in a grid -->
      <div style="display:grid;grid-template-columns:160px 1fr;flex:1;min-height:0;overflow:hidden">
        <!-- Archive sidebar -->
        <div style="background:#060b18;border-right:1px solid rgba(0,210,255,.08);overflow-y:auto;padding:10px 8px">
          <div style="font-family:var(--font-head);font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#3A5C80;margin-bottom:8px;padding:0 4px">Brief archive</div>
          <div id="mb-archive-list"></div>
        </div>
        <!-- Main body -->
        <div id="mb-body" style="overflow-y:auto;padding:14px 16px">
          <div style="font-family:var(--font-head);font-size:12px;color:#3A5C80">Loading brief…</div>
        </div>
      </div>
    </div>`;

  document.body.appendChild(panel);
  mbSwitchTier(tier);
  mbRenderArchive();
};

// Tier switcher
window.mbSwitchTier = async function(tier) {
  document.querySelectorAll('.mb-tier-btn').forEach(b => {
    const on = b.dataset.tier === tier;
    b.style.background    = on ? '#132035' : '#0c1828';
    b.style.borderColor   = on ? 'rgba(0,210,255,.4)' : 'rgba(0,210,255,.1)';
    b.style.color         = on ? '#F0F6FF' : '#5A84A8';
  });
  const tierColors = {pm:'#00D2FF',mgmt:'#8B5CF6',exec:'#EF9F27'};
  const tierLabels = {pm:'PM tier',mgmt:'Management tier',exec:'Executive tier'};
  const badge = document.getElementById('mb-tier-badge');
  if (badge) {
    badge.textContent = tierLabels[tier];
    badge.style.color = tierColors[tier];
    badge.style.borderColor = tierColors[tier]+'60';
    badge.style.background = tierColors[tier]+'10';
  }
  await mbRenderBrief(tier);
};

window.mbRenderArchive = function() {
  const list = document.getElementById('mb-archive-list');
  if (!list) return;
  const today = new Date().toLocaleDateString('en-CA');
  // Build archive from cocEvents management_decision dates
  const dates = [...new Set(
    (window._mgBriefData?.cocEvents||[])
      .filter(e=>e.event_type==='management_decision')
      .map(e=>e.created_at.slice(0,10))
  )].sort((a,b)=>b.localeCompare(a)).slice(0,7);
  if (!dates.includes(today)) dates.unshift(today);
  list.innerHTML = dates.map((d,i) => {
    const label = d===today?'Today':new Date(d+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'});
    const color = i===0?'#E24B4A':'#EF9F27';
    return `<div style="display:flex;align-items:center;gap:6px;padding:5px 6px;cursor:pointer;border:1px solid transparent;transition:.12s;margin-bottom:2px;${i===0?'background:rgba(0,210,255,.05);border-color:rgba(0,210,255,.15)':''}"
      onmouseenter="this.style.background='rgba(255,255,255,.03)'"
      onmouseleave="this.style.background='${i===0?'rgba(0,210,255,.05)':'transparent'}'"
      onclick="mbSelectDate('${d}')">
      <div style="width:9px;height:9px;border-radius:50%;background:${color};flex-shrink:0"></div>
      <div style="font-family:var(--font-head);font-size:11px;color:#C8DFF0;flex:1">${label}</div>
      ${i===0?'<div style="font-family:var(--font-head);font-size:11px;color:#3A5C80">Today</div>':''}
    </div>`;
  }).join('');
};

window.mbSelectDate = function(dateStr) {
  const today = new Date().toLocaleDateString('en-CA');
  const body = document.getElementById('mb-body');
  if (!body) return;
  if (dateStr !== today) {
    const events = (window._mgBriefData?.cocEvents||[]).filter(e=>e.created_at.slice(0,10)===dateStr&&e.event_type==='management_decision');
    body.innerHTML = `<div style="font-family:var(--font-head);font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#3A5C80;margin-bottom:10px">${new Date(dateStr+'T00:00:00').toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'})}</div>
      <div style="border-left:2px solid rgba(239,159,39,.6);padding:9px 11px;background:rgba(239,159,39,.04);font-family:var(--font-body);font-size:12px;color:#C8DFF0;line-height:1.6;margin-bottom:12px">Archived brief — immutable snapshot.</div>
      ${events.length>0?events.map(e=>`<div style="display:flex;gap:8px;padding:8px 0;border-bottom:1px solid rgba(0,210,255,.07)"><div style="width:7px;height:7px;border-radius:50%;background:#8B5CF6;flex-shrink:0;margin-top:3px"></div><div><div style="font-family:var(--font-body);font-size:12px;color:#C8DFF0">${esc(e.event_notes||'—')}</div><div style="font-family:var(--font-head);font-size:11px;color:#3A5C80;margin-top:2px">${_timeAgo(e.created_at)}</div></div></div>`).join(''):'<div style="font-family:var(--font-head);font-size:12px;color:#3A5C80">No decisions logged on this date.</div>'}`;
    return;
  }
  // Rerender today
  const activeTier = document.querySelector('.mb-tier-btn[style*="132035"]')?.dataset?.tier||'pm';
  mbRenderBrief(activeTier);
};

window.mbRenderBrief = async function(tier) {
  const body = document.getElementById('mb-body');
  const delta = document.getElementById('mb-delta');
  if (!body) return;
  body.innerHTML = '<div style="font-family:var(--font-head);font-size:12px;color:#3A5C80;padding:16px 0">Loading…</div>';

  // Fetch fresh data if not cached
  if (!window._mgBriefData) {
    const today = new Date().toLocaleDateString('en-CA');
    const dayOfWeek = new Date(today+'T00:00:00').getDay();
    const isoOff = dayOfWeek===0?6:dayOfWeek-1;
    const wkStart = new Date(today+'T00:00:00'); wkStart.setDate(wkStart.getDate()-isoOff);
    const weekStart = wkStart.toLocaleDateString('en-CA');
    const [cocEvents, wfInstances, resourceReqs, confSignals, weekEntries] = await Promise.all([
      API.get('workflow_step_instances?select=id,instance_id,event_type,step_name,outcome,actor_name,event_notes,created_at&event_type=in.(step_completed,step_reset,management_decision,task_progress_update)&order=created_at.desc&limit=300').catch(()=>[]),
      API.get('workflow_instances?select=id,title,status,current_step_name,project_id&status=eq.active&limit=50').catch(()=>[]),
      API.get('resource_requests?select=id,project_id,status,submitted_at&status=eq.pending&limit=20').catch(()=>[]),
      API.get(`workflow_step_instances?select=id,outcome,actor_name,created_at&event_type=eq.task_progress_update&created_at=gte.${weekStart}T00:00:00&order=created_at.desc&limit=200`).catch(()=>[]),
      API.get(`time_entries?select=resource_id,date,hours,is_billable,project_id&date=gte.${weekStart}&limit=500`).catch(()=>[]),
    ]);
    window._mgBriefData = {cocEvents, wfInstances, resourceReqs, confSignals, weekEntries};
  }

  const {cocEvents, wfInstances, resourceReqs, confSignals} = window._mgBriefData;
  const today = new Date().toLocaleDateString('en-CA');
  const HOURLY_RATE = 8000, HRS_PER_REWORK = 2;
  const reworkEvents = cocEvents.filter(e=>e.event_type==='step_reset');
  const reworkCount  = reworkEvents.length;
  const reworkCost   = reworkCount * HRS_PER_REWORK * HOURLY_RATE;
  const activeProjects = (_projects||[]).filter(p=>p.status==='active');
  const instResets = {};
  reworkEvents.forEach(e=>{ instResets[e.instance_id]=(instResets[e.instance_id]||0)+1; });
  const escalations = Object.values(instResets).filter(c=>c>=2).length;
  const overdueCount = (_tasks||[]).filter(t=>t.due_date&&t.due_date<today&&!['complete','cancelled'].includes(t.status)).length;
  const redSignalCount = (confSignals||[]).filter(e=>e.outcome==='blocked'&&e.created_at>=today+'T00:00:00').length;
  const formatYen = n => n>=1000000?'¥'+(n/1000000).toFixed(1)+'M':'¥'+Math.round(n/1000)+'k';
  const firstName = _myResource?.first_name || 'there';

  // Delta chips
  const chips = [];
  if (escalations>0)    chips.push({cls:'dc-red',   text:'+'+escalations+' escalation'+(escalations>1?'s':'')});
  if (overdueCount>0)   chips.push({cls:'dc-amber',  text:overdueCount+' overdue task'+(overdueCount>1?'s':'')});
  if (redSignalCount>0) chips.push({cls:'dc-red',    text:redSignalCount+' red signal'+(redSignalCount>1?'s':'')+' today'});
  if (reworkCost>0)     chips.push({cls:'dc-amber',  text:'Rework '+formatYen(reworkCost)+' this period'});
  if (!chips.length)    chips.push({cls:'dc-green',  text:'All signals green — clean portfolio'});
  const chipColors = {'dc-red':'#E24B4A','dc-amber':'#EF9F27','dc-green':'#1D9E75','dc-gray':'#5A84A8'};
  if (delta) {
    delta.innerHTML = '<span style="font-family:var(--font-head);font-size:11px;color:#3A5C80">Since yesterday: </span>' +
      chips.map(c=>`<span style="font-family:var(--font-head);font-size:11px;font-weight:700;padding:2px 8px;border:1px solid ${chipColors[c.cls]}40;color:${chipColors[c.cls]};background:${chipColors[c.cls]}12">${c.text}</span>`).join('');
  }

  // Build action cards per tier
  const tierGreeting = {pm:'Good morning, '+esc(firstName)+'.', mgmt:'Good morning, '+esc(firstName)+'.', exec:'Good morning.'};
  const titleEl = document.getElementById('mb-title');
  if (titleEl) titleEl.textContent = tierGreeting[tier];

  // Collect action items from real data
  const actionItems = [];

  // Escalation items (2+ resets)
  Object.entries(instResets).filter(([,c])=>c>=2).forEach(([instId,count]) => {
    const inst = wfInstances.find(w=>w.id===instId);
    const proj = (_projects||[]).find(p=>p.id===inst?.project_id);
    actionItems.push({
      section: tier==='exec'?'Requires awareness':'Requires action today',
      sectionColor:'#E24B4A',
      bar:'#E24B4A', badge:'Escalation recommended',
      title: esc(inst?.title||'Workflow')+' \u2014 '+(proj?esc(proj.name)+' \u2014 ':'')+count+' failed interventions',
      why:''+count+' PM-level intervention'+(count>1?'s have':' has')+' not resolved this issue. Authority beyond PM level is required.',
      situation: proj ? esc(proj.name)+' \xb7 '+count+' rework cycles unresolved. Schedule impact accumulating.' : 'Escalation threshold reached.',
      prediction: count>=3?'Pattern: '+count+' consecutive failures \u2014 systematic block, not individual failure. Direct authority contact has highest resolution probability.':'Two interventions exhausted. Standard PM escalation path is blocked.',
      recommended: tier==='exec'?'Monitor \u2014 management handling this escalation.':tier==='mgmt'?'Direct contact with client technical authority. Bypass standard PM channel.':'Send escalation brief. Let management engage the blocking authority.',
      projId_esc: proj?.id||'',
      projName_esc: proj?.name||'',
      instId_esc: instId,
      actions: tier==='pm'
        ? [{label:'Send escalation brief',    primary:true,  key:'esc_send'},
           {label:'View intervention record',  primary:false, key:'esc_view'},
           {label:'◈ Simulate options',        primary:false, key:'esc_sim'}]
        : tier==='mgmt'
        ? [{label:'Open escalation brief',          primary:true,  key:'esc_view'},
           {label:'◈ Simulate intervention',        primary:false, key:'esc_sim'},
           {label:'Log management intervention',    primary:false, key:'esc_log'}]
        : [{label:'Review escalation status',  primary:false, key:'esc_view'}]
    });
  });

  // Resource requests
  if (tier!=='exec') {
    resourceReqs.forEach(r => {
      const proj = (_projects||[]).find(p=>p.id===r.project_id);
      const ageH = Math.round((Date.now()-new Date(r.submitted_at).getTime())/3600000);
      actionItems.push({
        section: tier==='pm'?'Requires action today':'Decisions required from you',
        sectionColor:'#EF9F27',
        bar:'#EF9F27', badge:ageH+'h aging',
        title:'Resource request — '+esc(r.role||'resource')+' · '+(proj?esc(proj.name):'Unknown project'),
        why:'Request has been pending '+ageH+'h.'+( ageH>96?' Significantly overdue.':ageH>48?' Approaching escalation threshold.':' Within response window.'),
        situation: 'Resource request for '+esc(r.role||'role')+(proj?' on '+esc(proj.name):'')+'. Submitted '+ageH+'h ago.',
        prediction: ageH>96?'Extended delay is impacting PM planning. Escalation risk rising.':'Standard aging pattern. Response expected within 48–72h.',
        recommended: tier==='mgmt'?'Review and respond. Consider capacity impact before approving.':'Escalate to management for approval.',
        actions: tier==='mgmt'
          ? [{label:'Review request', primary:true,  key:'req_queue'}]
          : [{label:'View in queue',  primary:false, key:'req_queue'}]
      });
    });
  }

  // Overdue tasks (PM only)
  if (tier==='pm' && overdueCount>0) {
    actionItems.push({
      section:'Trending toward risk', sectionColor:'#EF9F27',
      bar:'#EF9F27', badge:'Watch',
      title:overdueCount+' task'+(overdueCount>1?'s':'')+' overdue across portfolio',
      why:'Overdue tasks indicate schedule pressure. Each day increases cascade risk.',
      situation:overdueCount+' task'+(overdueCount>1?'s':'')+' past planned completion date.',
      prediction:'Without intervention: schedule slip probability increases 15% per day per overdue task.',
      recommended:'Review overdue tasks in PM View Exceptions tab and create intervention records for any blocked items.',
        actions:[{label:'Open Exceptions tab', primary:true, key:'open_exceptions'}]
    });
  }

  // AI narrative per tier
  const narratives = {
    pm: reworkCount>0
      ? 'Portfolio has '+reworkCount+' rework cycle'+(reworkCount>1?'s':'')+' recorded, costing an estimated '+formatYen(reworkCost)+'. '+
        (escalations>0?escalations+' escalation'+(escalations>1?'s':'')+' require'+(escalations>1?'':'s')+' authority beyond PM level — send the escalation brief'+(escalations>1?'s':'')+' today. ':'')+
        (activeProjects.length>0?activeProjects.length+' active project'+(activeProjects.length>1?'s':'')+'. ':'')+'Act on the highest-priority item first.'
      : 'Portfolio appears healthy based on available signals. '+activeProjects.length+' active project'+(activeProjects.length>1?'s':'')+'. No rework cycles recorded this period.',
    mgmt: escalations>0
      ? escalations+' escalation'+(escalations>1?'s require':' requires')+' direct management authority today. '+
        (reworkCost>0?'Rework cost running at '+formatYen(reworkCost)+' — template redesign remains the highest-ROI intervention available. ':'')+
        'Resource decisions have been pending. Org confidence and timesheet compliance should be reviewed before end of day.'
      : 'No escalations requiring management authority. '+
        (reworkCost>0?'Rework cost '+formatYen(reworkCost)+' — monitor against template redesign impact. ':'')+
        'Portfolio operating within normal parameters.',
    exec: 'Portfolio generating revenue toward annual target. '+
      (reworkCost>200000?'Rework cost '+formatYen(reworkCost)+' — primary margin drag. Template redesign investment is the correct response. ':'Rework cost within normal range. ')+
      (escalations>0?'One escalation is in management hands — no executive action required unless management reports unsuccessful resolution. ':'')+
      'No executive decisions required this brief.'
  };

  // Group items by section
  const sections = {};
  actionItems.forEach(item => {
    if (!sections[item.section]) sections[item.section] = {color:item.sectionColor, items:[]};
    sections[item.section].items.push(item);
  });

  let html = '';
  Object.entries(sections).forEach(([secTitle, sec]) => {
    html += `<div style="margin-bottom:18px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
        <div style="width:4px;height:18px;border-radius:2px;background:${sec.color};flex-shrink:0"></div>
        <div style="font-family:var(--font-head);font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:#5A84A8">${secTitle}</div>
        <span style="font-family:var(--font-head);font-size:11px;font-weight:700;padding:1px 6px;border:1px solid ${sec.color}40;color:${sec.color}">${sec.items.length}</span>
      </div>`;
    sec.items.forEach((item, idx) => {
      const cardId = 'mb-card-'+secTitle.replace(/\s/g,'')+'-'+idx;
      html += `<div style="border:1px solid rgba(255,255,255,.08);margin-bottom:6px;overflow:hidden;transition:border-color .12s"
        onmouseenter="this.style.borderColor='rgba(0,210,255,.2)'"
        onmouseleave="this.style.borderColor='rgba(255,255,255,.08)'">
        <div style="display:flex;align-items:flex-start;gap:8px;padding:9px 11px;cursor:pointer" onclick="mbToggleCard('${cardId}')">
          <div style="width:3px;align-self:stretch;border-radius:1px;background:${item.bar};flex-shrink:0"></div>
          <div style="flex:1;min-width:0">
            <div style="font-family:var(--font-body);font-size:12px;font-weight:600;color:#F0F6FF;margin-bottom:2px">${item.title}</div>
            <div style="font-family:var(--font-body);font-size:11px;color:#5A84A8;line-height:1.45">${item.why}</div>
          </div>
          <span style="font-family:var(--font-head);font-size:11px;font-weight:700;padding:2px 7px;border:1px solid ${item.bar}40;color:${item.bar};background:${item.bar}10;flex-shrink:0;white-space:nowrap">${item.badge}</span>
        </div>
        <div id="${cardId}" style="display:none;padding:0 11px 10px 22px;border-top:1px solid rgba(255,255,255,.05)">
          <div style="margin-top:8px">
            <div style="font-family:var(--font-head);font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:rgba(0,210,255,.6);margin-bottom:3px">Situation</div>
            <div style="font-family:var(--font-body);font-size:12px;color:#C8DFF0;line-height:1.55;padding:6px 9px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06)">${item.situation}</div>
          </div>
          <div style="margin-top:7px">
            <div style="font-family:var(--font-head);font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:rgba(139,92,246,.6);margin-bottom:3px">Prediction</div>
            <div style="font-family:var(--font-body);font-size:12px;color:#C8DFF0;line-height:1.55;padding:6px 9px;background:rgba(139,92,246,.05);border:1px solid rgba(139,92,246,.15);border-left:2px solid #8B5CF6">${item.prediction}</div>
          </div>
          <div style="margin-top:7px">
            <div style="font-family:var(--font-head);font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:rgba(0,210,255,.6);margin-bottom:3px">Recommended action</div>
            <div style="font-family:var(--font-body);font-size:12px;color:#C8DFF0;line-height:1.55;padding:6px 9px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06)">${item.recommended}</div>
          </div>
          <div style="display:flex;gap:5px;margin-top:8px;flex-wrap:wrap">
            ${item.actions.map(a=>{
              const cp = "document.getElementById('morning-brief-panel')?.remove();";
              const dispatch =
                a.key==='esc_send'  ? "irComposeEscalation('" + (item.instId_esc||'')  + "','" + (item.projName_esc||'').replace(/'/g,'\\x27') + "');" :
                a.key==='esc_view'  ? "openInterventionRecord('" + (item.projId_esc||'') + "','" + (item.projName_esc||'').replace(/'/g,'\\x27') + "');" :
                a.key==='esc_sim'   ? "openDecisionSimulator('" + (item.projId_esc||'') + "','" + (item.projName_esc||'').replace(/'/g,'\\x27') + "','Escalation — '+'" + (item.instId_esc||'') + "');" :
                a.key==='esc_log'   ? "mgSwitchTab(document.querySelectorAll('.mg-tab')[1],'queue');" :
                a.key==='req_queue' ? "switchView('management');setTimeout(function(){mgSwitchTab(document.querySelectorAll('.mg-tab')[1],'queue');},400);" :
                a.key==='open_exceptions' ? "switchView('pm');setTimeout(function(){pmSwitchTab(document.querySelectorAll('.pm-tab')[1],'pm-tab-exceptions');},400);" : '';
              const pBorder = a.primary ? 'border-color:rgba(0,210,255,.4);color:#00D2FF' : 'border-color:rgba(255,255,255,.15);color:#5A84A8';
              const pHover  = a.primary ? 'rgba(0,210,255,.08)' : 'rgba(255,255,255,.04)';
              return '<button style="font-family:var(--font-head);font-size:11px;font-weight:700;padding:4px 12px;cursor:pointer;border:1px solid;background:none;letter-spacing:.07em;' + pBorder + '" onmouseenter="this.style.background=\''+pHover+'\'" onmouseleave="this.style.background=\'none\'" onclick="'+dispatch+cp+'">' + a.label + '</button>';
            }).join('')}
          </div>
        </div>
      </div>`;
    });
    html += '</div>';
  });

  // AI narrative
  html += `<div style="margin-bottom:18px">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
      <div style="width:4px;height:18px;border-radius:2px;background:#EF9F27;flex-shrink:0"></div>
      <div style="font-family:var(--font-head);font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:#5A84A8">AI narrative</div>
      <span style="font-family:var(--font-head);font-size:11px;color:#3A5C80">Generated 6:00 AM · Immutable</span>
    </div>
    <div style="padding:10px 12px;background:rgba(239,159,39,.04);border:1px solid rgba(239,159,39,.12);border-left:2px solid rgba(239,159,39,.6);font-family:var(--font-body);font-size:12px;color:#C8DFF0;line-height:1.65;margin-bottom:8px">${narratives[tier]}</div>
    <div style="display:flex;align-items:center;justify-content:space-between">
      <span style="font-family:var(--font-head);font-size:11px;color:#3A5C80">Immutable at generation time</span>
      <button style="font-family:var(--font-head);font-size:11px;padding:3px 10px;background:none;border:1px solid rgba(239,159,39,.3);color:rgba(239,159,39,.7);cursor:pointer;transition:.12s"
        onmouseenter="this.style.background='rgba(239,159,39,.08)'" onmouseleave="this.style.background='none'"
        onclick="this.textContent='Regenerated against latest CoC';this.style.color='#1D9E75';this.style.borderColor='rgba(29,158,117,.4)'">Regenerate against current CoC</button>
    </div>
    <div style="margin-top:8px">
      <div style="font-family:var(--font-head);font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#3A5C80;margin-bottom:4px">PM annotation (additive)</div>
      <textarea style="width:100%;font-family:var(--font-body);font-size:12px;padding:7px 9px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);color:#C8DFF0;outline:none;resize:none;box-sizing:border-box;line-height:1.5" rows="2" placeholder="Add context that will carry into tomorrow's delta…"></textarea>
    </div>
  </div>`;

  if (!actionItems.length) {
    html = `<div style="padding:24px 0;text-align:center;font-family:var(--font-head);font-size:12px;color:#3A5C80">No action items detected for this tier today.</div>` + html;
  }

  body.innerHTML = html;
};

window.mbToggleCard = function(cardId) {
  const el = document.getElementById(cardId);
  if (!el) return;
  el.style.display = el.style.display==='none' ? 'block' : 'none';
};

// ── Tab switcher ─────────────────────────────────────────
let _uActiveTab = 'work';
window.uSwitchTab = function(tab, btn) {
  _uActiveTab = tab;
  document.querySelectorAll('.ust').forEach(b => b.classList.remove('on'));
  document.querySelectorAll('.utc').forEach(c => c.classList.remove('on'));
  if (btn) btn.classList.add('on');
  const panel = document.getElementById('utc-'+tab);
  if (panel) panel.classList.add('on');
  if (tab === 'meetings' && !window._mtgLoaded) loadMyMeetingsView();
  else if (tab === 'meetings' && window._mtgRefresh) window._mtgRefresh();
  if (tab === 'concerns' && !window._notesLoaded) loadMyNotesView();
  else if (tab === 'concerns' && window._notesRefresh) window._notesRefresh();
  if (tab === 'calendar' && !window._calLoaded) loadMyCalView();
  else if (tab === 'calendar' && window._calRefresh) window._calRefresh();
  if (tab === 'requests' && !window._requestsLoaded) loadUserRequests();
  if (tab === 'timesheet' && !window._myTimeLoaded) loadMyTimeView();
};

// ── Calendar popup ────────────────────────────────────────
let _ucalYear  = new Date().getFullYear();
let _ucalMonth = new Date().getMonth(); // 0-indexed

window.toggleMwCoc = function() {
  const coc = document.getElementById('mw-coc');
  if (!coc) { console.warn('[Compass] mw-coc not found'); return; }
  // Panel uses flex — toggle between flex and none
  const isVisible = coc.style.display === 'flex';
  if (isVisible) {
    coc.style.display = 'none';
  } else {
    coc.style.display = 'flex';
    coc.style.flexDirection = 'column';
  }
};

window.toggleUserCalendar = function() {
  const p = document.getElementById('user-cal-popup');
  if (!p) return;
  const visible = p.style.display !== 'none';
  p.style.display = visible ? 'none' : 'block';
  if (!visible) renderUserCalendar();
};

window.ucalNav = function(dir) {
  _ucalMonth += dir;
  if (_ucalMonth > 11) { _ucalMonth = 0; _ucalYear++; }
  if (_ucalMonth < 0)  { _ucalMonth = 11; _ucalYear--; }
  renderUserCalendar();
};

function renderUserCalendar() {
  const today = new Date().toLocaleDateString('en-CA');
  const todayDate = new Date(today+'T00:00:00');
  const lblEl = document.getElementById('ucal-month-label');
  if (lblEl) lblEl.textContent = new Date(_ucalYear, _ucalMonth, 1)
    .toLocaleDateString('en-US',{month:'long',year:'numeric'}).toUpperCase();

  const cells = document.getElementById('ucal-cells');
  if (!cells) return;

  // Build event map from live data
  const evMap = {}; // date-string -> array of color
  const addEv = (date, col) => {
    if (!date) return;
    const d = date.slice(0,10);
    if (!evMap[d]) evMap[d] = [];
    evMap[d].push(col);
  };

  // Tasks due
  (_wiItems||[]).forEach(w => { if (w.due) addEv(w.due, w.overdue?'#E24B4A':'#EF9F27'); });
  // Action items
  (window._userConcerns||[]).forEach(c => { if (c.raised_date) addEv(c.raised_date, '#E24B4A'); });
  // Meetings
  (window._userMeetings||[]).forEach(m => { if (m.date) addEv(m.date, '#8B5CF6'); });

  const firstDay = new Date(_ucalYear, _ucalMonth, 1);
  const lastDay  = new Date(_ucalYear, _ucalMonth+1, 0);
  const startDow = (firstDay.getDay()+6)%7; // Mon=0

  let html = '';
  // Blanks
  for (let i=0;i<startDow;i++) {
    const prevDate = new Date(_ucalYear, _ucalMonth, -startDow+i+1);
    html += `<div style="padding:2px 3px;border:1px solid transparent;opacity:.3">
      <div style="font-family:var(--font-head);font-size:11px;color:rgba(255,255,255,.3);text-align:center">${prevDate.getDate()}</div>
    </div>`;
  }
  for (let d=1; d<=lastDay.getDate(); d++) {
    const dt = new Date(_ucalYear, _ucalMonth, d).toLocaleDateString('en-CA');
    const isToday = dt === today;
    const dots = evMap[dt]||[];
    html += `<div onclick="ucalSelectDay('${dt}')" style="min-height:30px;padding:2px 3px;border:1px solid ${isToday?'rgba(0,210,255,.5)':'transparent'};background:${isToday?'rgba(0,210,255,.08)':'transparent'};cursor:pointer;position:relative;transition:border-color .1s" onmouseenter="this.style.borderColor='rgba(0,210,255,.2)'" onmouseleave="this.style.borderColor='${isToday?'rgba(0,210,255,.5)':'transparent'}'">
      <div style="font-family:var(--font-head);font-size:11px;color:${isToday?'#00D2FF':'rgba(255,255,255,.6)'};font-weight:${isToday?'700':'400'};text-align:center">${d}</div>
      <div style="display:flex;gap:1.5px;justify-content:center;flex-wrap:wrap;margin-top:1px">${dots.slice(0,3).map(c=>`<div style="width:4px;height:4px;border-radius:50%;background:${c}"></div>`).join('')}</div>
    </div>`;
  }
  cells.innerHTML = html;
  ucalSelectDay(today); // default to today's agenda
}

window.ucalSelectDay = function(dt) {
  const agendaEl = document.getElementById('ucal-agenda');
  if (!agendaEl) return;
  const label = new Date(dt+'T00:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
  const items = [];
  // Tasks due on this day
  (_wiItems||[]).filter(w=>w.due===dt).forEach(w=>
    items.push({color:w.overdue?'#E24B4A':'#EF9F27', time:'Task', text:esc(w.title)}));
  // Meetings on this day
  (window._userMeetings||[]).filter(m=>m.date&&m.date.slice(0,10)===dt).forEach(m=>
    items.push({color:'#8B5CF6', time:m.time||'Mtg', text:esc(m.title)}));
  agendaEl.innerHTML = `<div style="font-family:var(--font-head);font-size:11px;color:rgba(0,210,255,.5);letter-spacing:.08em;text-transform:uppercase;margin-bottom:5px">${label}</div>` +
    (items.length ? items.map(i=>`<div style="display:flex;align-items:center;gap:6px;font-family:var(--font-head);font-size:11px;color:rgba(240,246,255,.7);padding:3px 0;border-bottom:1px solid rgba(255,255,255,.04)">
      <div style="width:6px;height:6px;border-radius:50%;background:${i.color};flex-shrink:0"></div>
      <span style="color:rgba(255,255,255,.35);min-width:36px;flex-shrink:0">${i.time}</span>
      <span>${i.text}</span>
    </div>`).join('') : `<div style="font-family:var(--font-head);font-size:12px;color:#3A5C80">No events</div>`);
};

// ── My Time loader ────────────────────────────────────────
// Fetches /my-time.html, injects into #mt-root, calls _mtLoadView().
// Subsequent tab clicks hit _mtRefresh() via the loaded guard.
window.loadMyTimeView = async function() {
  if (window._myTimeLoaded) {
    window._mtRefresh && window._mtRefresh();
    return;
  }
  const container = document.getElementById('mt-root');
  if (!container) { console.error('[Compass] #mt-root not found'); return; }
  try {
    const resp = await fetch('/my-time.html');
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const html = await resp.text();
    const parser = new DOMParser();
    const doc    = parser.parseFromString(html, 'text/html');
    Array.from(doc.body.childNodes).forEach(node => {
      if (node.nodeName !== 'SCRIPT') container.appendChild(document.importNode(node, true));
    });
    for (const s of doc.querySelectorAll('script')) {
      const el = document.createElement('script');
      el.textContent = s.textContent;
      document.head.appendChild(el);
    }
    window._myTimeLoaded = true;
    // Hand scoped lets from compass.html to my-time.html via window
    window._mtResource = typeof _myResource !== 'undefined' ? _myResource : null;
    window._mtProjects = typeof _projects  !== 'undefined' ? _projects  : [];
    window._mtTasks    = typeof _tasks     !== 'undefined' ? _tasks     : [];
    window._mtCalEvents = [];
    if (window._mtLoadView) await window._mtLoadView();
    else console.error('[Compass] _mtLoadView not exported by my-time.html');
  } catch (err) {
    console.error('[Compass] Failed to load my-time.html:', err);
    if (window.compassToast) compassToast('Failed to load My Time — check console', 4000);
  }
};

// ── My Calendar loader ───────────────────────────────────
// Fetches /my-calendar.html, injects into #cal-root, calls _calLoadView().
// Bridges _myResource, _wiItems, _mtCalEvents as window._cal* globals.
window.loadMyCalView = async function() {
  if (window._calLoaded) {
    window._calRefresh && window._calRefresh();
    return;
  }
  const container = document.getElementById('cal-root');
  if (!container) { console.error('[Compass] #cal-root not found'); return; }
  try {
    const resp = await fetch('/my-calendar.html');
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const html = await resp.text();
    const parser = new DOMParser();
    const doc    = parser.parseFromString(html, 'text/html');
    // Inject <style> blocks from doc.head — DOMParser puts them there, not in body
    for (const st of doc.querySelectorAll('style')) {
      const el = document.createElement('style');
      el.textContent = st.textContent;
      document.head.appendChild(el);
    }
    Array.from(doc.body.childNodes).forEach(node => {
      if (node.nodeName !== 'SCRIPT') container.appendChild(document.importNode(node, true));
    });
    for (const s of doc.querySelectorAll('script')) {
      const el = document.createElement('script');
      el.textContent = s.textContent;
      document.head.appendChild(el);
    }
    // Bridge scoped vars from compass.html / my-work.html into my-calendar.html
    window._calResource    = typeof _myResource !== 'undefined' ? _myResource : null;
    window._calItems       = typeof _wiItems    !== 'undefined' ? _wiItems    : [];
    window._calCalEvents   = window._mtCalEvents || [];
    window._projects       = typeof _projects   !== 'undefined' ? _projects   : (window._projects || []);
    // Note: _calTimeEntries is fetched directly by buildCalendarTab — no bridge needed
    if (window._calLoadView) await window._calLoadView();
    else console.error('[Compass] _calLoadView not exported by my-calendar.html');
  } catch (err) {
    console.error('[Compass] Failed to load my-calendar.html:', err);
    compassToast('Failed to load My Calendar — check console', 4000);
  }
};

window.loadUserMeetings = async function() {
  window._meetingsLoaded = true;
  const el = document.getElementById('user-meetings-content');
  if (!el) return;

  try {
    // meetings table — linked to pipeline prospects and workflow instances
    const today = new Date().toLocaleDateString('en-CA');
    const resId = _myResource?.id;
    const userId = _myResource?.user_id;

    const [meetings, attendees] = await Promise.all([
      API.get(`v_meetings?select=id,title,meeting_date,duration_minutes,location_or_link,meeting_type,status,organizer_id&order=meeting_date.desc&limit=50`).catch(()=>[]),
      userId ? API.get(`meeting_attendees?select=meeting_id,attendance_status&user_id=eq.${userId}&limit=100`).catch(()=>[]) : Promise.resolve([]),
    ]);

    const myMeetingIds = new Set(attendees.map(a=>a.meeting_id));
    const myMeetings = (meetings||[]);  // show all firm meetings from v_meetings

    window._userMeetings = myMeetings.map(m => ({
      id: m.id,
      title: m.title,
      date: m.meeting_date?.slice(0,10),
      time: m.meeting_date ? new Date(m.meeting_date).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'}) : null,
      duration: m.duration_minutes||60,
      location: m.location_or_link,
      type: m.meeting_type||'meeting',
      status: 'scheduled',
      owned: false,
      past: m.meeting_date && m.meeting_date.slice(0,10) < today,
    }));

    // Update badge
    const todayMtgs = window._userMeetings.filter(m=>m.date===today).length;
    const badge = document.getElementById('ust-meetings-badge');
    if (badge && todayMtgs > 0) {
      badge.textContent = todayMtgs+' today';
      badge.className = 'ust-badge ust-badge-green';
      badge.style.display = 'inline';
    }

    renderUserMeetings();
  } catch(e) {
    console.error('[Compass] meetings load error:', e);
    el.innerHTML = '<div style="font-family:var(--font-head);font-size:12px;color:#E24B4A;padding:16px 0">Failed to load meetings</div>';
  }
};

function renderUserMeetings() {
  const el = document.getElementById('user-meetings-content');
  if (!el) return;
  const today = new Date().toLocaleDateString('en-CA');
  const f = window._mtgFilter;

  const filtered = (window._userMeetings||[]).filter(m => {
    if (f==='owned')    return m.owned;
    if (f==='upcoming') return !m.past;
    if (f==='past')     return m.past;
    if (f==='today')    return m.date===today;
    return true;
  });

  // Group into sections
  const todayMtgs    = filtered.filter(m=>m.date===today);
  const upcomingMtgs = filtered.filter(m=>!m.past&&m.date!==today);
  const pastMtgs     = filtered.filter(m=>m.past).slice(0,10);

  function mtgRow(m) {
    const barColor = m.owned ? '#8B5CF6' : m.past ? 'rgba(255,255,255,.15)' : '#00D2FF';
    const badge = m.owned ? '<span style="font-family:var(--font-head);font-size:11px;padding:2px 7px;border:1px solid rgba(139,92,246,.35);color:#8B5CF6;background:rgba(139,92,246,.07)">Owned by me</span>'
                : m.past  ? '<span style="font-family:var(--font-head);font-size:11px;padding:2px 7px;border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.35)">Completed</span>'
                          : '<span style="font-family:var(--font-head);font-size:11px;padding:2px 7px;border:1px solid rgba(0,210,255,.25);color:rgba(0,210,255,.7);background:rgba(0,210,255,.05)">Invited</span>';
    const timeStr = m.time ? m.time : '';
    const durStr  = m.duration ? m.duration+'min' : '';
    const locStr  = m.location ? esc(m.location) : '';
    const metaParts = [timeStr, durStr, locStr].filter(Boolean);
    const expandId = 'umtg-exp-'+m.id;
    return `<div style="display:flex;align-items:flex-start;gap:0;border:1px solid rgba(255,255,255,.07);margin-bottom:6px;cursor:pointer;transition:border-color .1s" onmouseenter="this.style.borderColor='rgba(0,210,255,.2)'" onmouseleave="this.style.borderColor='rgba(255,255,255,.07)'">
      <div style="width:4px;align-self:stretch;background:${barColor};flex-shrink:0"></div>
      <div style="flex:1;padding:9px 12px">
        <div style="display:flex;align-items:flex-start;gap:8px;margin-bottom:5px">
          <div style="font-family:var(--font-head);font-size:12px;font-weight:700;color:#F0F6FF;flex:1;line-height:1.3">${esc(m.title)}</div>
          ${badge}
        </div>
        <div style="display:flex;gap:10px;font-family:var(--font-head);font-size:11px;color:rgba(255,255,255,.4);flex-wrap:wrap;margin-bottom:5px">${metaParts.map(p=>`<span>${p}</span>`).join('')}</div>
      </div>
      <div style="padding:9px 10px;display:flex;flex-direction:column;gap:4px;flex-shrink:0">
        <button onclick="event.stopPropagation();uToggleMtgExpand('${expandId}')"
          style="font-family:var(--font-head);font-size:11px;padding:3px 10px;background:none;border:1px solid ${m.past?'rgba(255,255,255,.15)':'rgba(0,210,255,.35)'};color:${m.past?'rgba(255,255,255,.4)':'#00D2FF'};cursor:pointer;letter-spacing:.06em">Details</button>
        ${!m.past?`<button onclick="event.stopPropagation();window.location.href='/meeting-minutes.html?meeting_id=${m.id}'"
          style="font-family:var(--font-head);font-size:11px;padding:3px 10px;background:none;border:1px solid rgba(0,210,255,.2);color:#5A84A8;cursor:pointer;letter-spacing:.06em">Minutes</button>`:''}
      </div>
    </div>
    <div id="${expandId}" style="display:none;padding:6px 12px 10px 16px;background:#060c18;border:1px solid rgba(255,255,255,.06);border-top:none;margin-top:-6px;margin-bottom:6px">
      ${m.past?`<div style="font-family:var(--font-head);font-size:11px;color:rgba(255,255,255,.35);letter-spacing:.08em;text-transform:uppercase;margin-bottom:5px">Outcome</div>
        <div style="font-family:var(--font-body);font-size:12px;color:rgba(240,246,255,.65);line-height:1.55;margin-bottom:8px">Meeting completed. Open minutes for full record.</div>`
      :`<div style="font-family:var(--font-head);font-size:11px;color:rgba(255,255,255,.35);letter-spacing:.08em;text-transform:uppercase;margin-bottom:5px">Outcome (fill after meeting)</div>
        <textarea id="umtg-out-${m.id}" style="width:100%;padding:5px 8px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);color:#C8DFF0;font-family:var(--font-body);font-size:12px;outline:none;resize:none;box-sizing:border-box" rows="2" placeholder="Record outcome — will be written to CoC…"></textarea>`}
      <div style="display:flex;gap:5px;margin-top:7px">
        ${!m.past?`<button onclick="uSaveOutcome('${m.id}')"
          style="font-family:var(--font-head);font-size:11px;padding:3px 10px;background:none;border:1px solid rgba(0,210,255,.35);color:#00D2FF;cursor:pointer;letter-spacing:.06em">Save outcome to CoC →</button>
        <button onclick="alert('Action item form — assigns to a team member and logs to CoC')"
          style="font-family:var(--font-head);font-size:11px;padding:3px 10px;background:none;border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.4);cursor:pointer">+ Spawn action item</button>`:''}
        <button onclick="window.location.href='/meeting-minutes.html?meeting_id=${m.id}'"
          style="font-family:var(--font-head);font-size:11px;padding:3px 10px;background:none;border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.4);cursor:pointer">Open minutes →</button>
      </div>
    </div>`;
  }

  function section(label, rows) {
    if (!rows.length) return '';
    return `<div style="font-family:var(--font-head);font-size:11px;font-weight:700;letter-spacing:.1em;color:rgba(0,210,255,.5);text-transform:uppercase;margin:10px 0 7px;padding-bottom:4px;border-bottom:1px solid rgba(0,210,255,.08)">${label}</div>` +
      rows.map(mtgRow).join('');
  }

  const filterBar = `<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap">
    <span style="font-family:var(--font-head);font-size:11px;color:rgba(255,255,255,.35);letter-spacing:.06em;text-transform:uppercase">Show</span>
    ${['all','owned','today','upcoming','past'].map(f=>`<button onclick="window._mtgFilter='${f}';renderUserMeetings()" 
      style="font-family:var(--font-head);font-size:11px;padding:3px 10px;background:${window._mtgFilter===f?'rgba(0,210,255,.08)':'none'};border:1px solid ${window._mtgFilter===f?'rgba(0,210,255,.4)':'rgba(255,255,255,.12)'};color:${window._mtgFilter===f?'#00D2FF':'rgba(255,255,255,.5)'};cursor:pointer;transition:.12s;letter-spacing:.06em;text-transform:capitalize">${f}</button>`).join('')}
    <button onclick="alert('New meeting form: title, project, date/time, duration, attendees, agenda, CoC link')"
      style="font-family:var(--font-head);font-size:11px;margin-left:auto;padding:4px 12px;background:rgba(0,210,255,.1);border:1px solid rgba(0,210,255,.35);color:#00D2FF;cursor:pointer;letter-spacing:.07em">+ Schedule meeting</button>
  </div>`;

  if (!filtered.length) {
    el.innerHTML = filterBar + '<div style="font-family:var(--font-head);font-size:12px;color:#3A5C80;padding:24px 0;text-align:center">No meetings found for this filter.</div>';
    return;
  }

  el.innerHTML = filterBar +
    (f==='all' || f==='today'    ? section('Today — '+new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}), todayMtgs) : '') +
    (f==='all' || f==='upcoming' ? section('Upcoming', upcomingMtgs) : '') +
    (f==='all' || f==='past'     ? section('Past', pastMtgs) : '') +
    (f==='owned' || f==='today' || f==='upcoming' || f==='past' ? filtered.map(mtgRow).join('') : '');
}

  const el = document.getElementById(id);

window.uSaveOutcome = async function(meetingId) {
  const txt = document.getElementById('umtg-out-'+meetingId)?.value?.trim()||'';
  if (!txt) { compassToast('Enter an outcome before saving',2000); return; }
  await API.post('workflow_step_instances',{
    id: crypto.randomUUID(), instance_id: crypto.randomUUID(), step_type: 'manual',
    event_type: 'step_completed',
    step_name: 'Meeting outcome',
    event_notes: txt,
    actor_name: _myResource?.name||null,
    outcome: 'on_track',
    created_at: new Date().toISOString(),
    firm_id: 'aaaaaaaa-0001-0001-0001-000000000001'
  }).catch(()=>{});
  compassToast('Outcome saved to CoC',2200);
  document.getElementById('umtg-out-'+meetingId).value = '';
};

window._concernsLoaded = false;
window._userConcerns   = [];
window._concernFilter  = 'all';
let _concernSeq = 0; // for optimistic local IDs

window.loadUserConcerns = async function() {
  window._concernsLoaded = true;
  const el = document.getElementById('user-concerns-content');
  if (!el) return;

  const resId = _myResource?.id;
  if (!resId) { window._userConcerns = []; renderUserConcerns(); return; }

  try {
    // Load concerns + their comments in parallel
    const [concerns, comments] = await Promise.all([
      API.get(`concerns?raiser_resource_id=eq.${resId}&order=raised_at.desc&limit=100`).catch(()=>[]),
      API.get(`concern_comments?concern_id=not.is.null&order=created_at.asc&limit=500&select=id,concern_id,parent_id,author_name,body,event_type,created_at`).catch(()=>[]),
    ]);

    _concernSeq = 0;
    const commentsByC = {};
    (comments||[]).forEach(c => {
      if (!commentsByC[c.concern_id]) commentsByC[c.concern_id] = [];
      commentsByC[c.concern_id].push(c);
    });

    window._userConcerns = (concerns||[]).map(c => ({
      id:          c.id,
      cid:         'C-' + String(++_concernSeq).padStart(3,'0'),
      title:       c.title,
      description: c.description||'',
      status:      c.status||'unread',
      priority:    c.priority||'medium',
      visibility:  c.visibility||'pm',
      projectId:   c.project_id,
      project:     (_projects||[]).find(p=>p.id===c.project_id)?.name||'—',
      phase:       c.phase||'',
      raised_date: c.raised_at?.slice(0,10),
      raisedAt:    c.raised_at,
      thread:      (commentsByC[c.id]||[]).map(e=>({
        id:        e.id,
        parent_id: e.parent_id||null,
        who:       e.author_name,
        when:      e.created_at,
        text:      e.body,
        type:      e.event_type,
      })),
    }));

    // Migrate any localStorage concerns to DB (one-time)
    try {
      const lsKey = 'compass_concerns_' + resId;
      const lsRaw = localStorage.getItem(lsKey);
      if (lsRaw) {
        const lsItems = JSON.parse(lsRaw)||[];
        const dbIds = new Set((concerns||[]).map(c=>c.id));
        const toMigrate = lsItems.filter(c=>!dbIds.has(c.id));
        for (const c of toMigrate) {
          await API.post('concerns',{
            id: c.id, firm_id:'aaaaaaaa-0001-0001-0001-000000000001',
            raiser_resource_id: resId,
            raiser_name: _myResource?.name||null,
            title: c.title, description: c.description||c.title,
            status: c.status||'unread', priority: c.priority||'medium',
            raised_at: c.raisedAt||new Date().toISOString(),
          }).catch(()=>{});
        }
        if (toMigrate.length) {
          localStorage.removeItem(lsKey);
          // Reload to pick up migrated items
          window._concernsLoaded = false;
          loadUserConcerns(); return;
        }
        localStorage.removeItem(lsKey);
      }
    } catch(e) {}

    updateConcernBadge();
    renderUserConcerns();
  } catch(e) {
    console.error('[Compass] concerns load error:', e);
    window._userConcerns = [];
    renderUserConcerns();
  }
};

  if (badge && activeCount > 0) {
    badge.textContent = activeCount + ' active';
    badge.style.display = 'inline';
  }
  const activeBadge = document.getElementById('myr-active-badge');
  if (activeBadge && activeCount > 0) {
    activeBadge.textContent = activeCount;
    activeBadge.style.display = 'inline';
  }
};

window.myrSwitchView = function(view, btn) {
  document.querySelectorAll('.myr-subnav').forEach(b => {
    b.classList.remove('on');

    b.style.borderBottomColor = 'transparent';

function renderMyRequestsCatalog() {
  const el = document.getElementById('myr-catalog-content');
  if (!el) return;
  let html = '';
  _WF_CATALOG.forEach(cat => {
    html += `<div class="myr-cat-label"><div class="myr-cat-line"></div>${_esc(cat.cat)}<div class="myr-cat-line"></div></div>`;
    html += `<div class="wf-catalog-grid">`;
    cat.items.forEach(wf => {
      const icon = _WF_ICONS[wf.icon] || '';
      html += `<div class="wf-card${wf.isNew?' wf-card-new':''}" onclick="myrOpenWorkflowForm('${wf.id}')">
        <div class="wf-card-top">
          <div class="wf-icon" style="background:${wf.iconBg};color:${wf.iconColor}">${icon}</div>
          <div class="wf-card-title">${_esc(wf.title)}</div>
        </div>
        <div class="wf-card-desc">${_esc(wf.desc)}</div>
        <div class="wf-card-meta">
          <span>${wf.steps} steps</span>
          <span>${wf.avgTime}</span>
          ${wf.usage?`<span>${_esc(wf.usage)}</span>`:''}
        </div>
        <button class="wf-card-submit" onclick="event.stopPropagation();myrOpenWorkflowForm('${wf.id}')">Submit &#8594;</button>
      </div>`;
    });
    html += `</div>`;
  });
  el.innerHTML = html;
}

function renderMyRequestsActive() {
  const el = document.getElementById('myr-active-content');
  if (!el) return;
  const reqs = window._myRequests || [];
  const active = reqs.filter(r => r.status !== 'completed' && r.status !== 'rejected');
  if (!active.length) {
    el.innerHTML = `<div style="font-family:var(--font-head);font-size:12px;color:rgba(255,255,255,.25);padding:20px 0;text-align:center">No active requests. Browse the catalog to submit a new request.</div>`;
    return;
  }
  let html = '';
  active.forEach((req, i) => {
    const statusColor = req.status==='approved'?'#1D9E75': req.status==='awaiting'?'#EF9F27':'#00D2FF';
    const badgeClass = req.status==='approved'?'style="border:1px solid rgba(29,158,117,.3);color:#1D9E75"':
                       req.status==='awaiting' ?'style="border:1px solid rgba(239,159,39,.3);color:#EF9F27"':
                                                'style="border:1px solid rgba(0,210,255,.3);color:#00D2FF"';
    const badgeLabel = req.status==='approved'?'Approved':req.status==='awaiting'?'Awaiting response':'In progress';
    const dotAnim = req.status==='awaiting'?'animation:myrActivePulse 1.5s infinite':'';
    let stepsHtml = (req.steps||[]).map((s,si) => {
      const cls = s.done?'myr-ptd-done':s.active?'myr-ptd-active':'myr-ptd-pending';
      const nameCls = s.done?'done':s.active?'active':'';
      const label = s.done?'&#10003;':(si+1);
      return `<div class="myr-pt-step"><div class="myr-pt-dot ${cls}">${label}</div><div class="myr-pt-name ${nameCls}">${_esc(s.label)}</div></div>`;
    }).join('');
    html += `<div class="myr-active-req">
      <div class="myr-ar-head" onclick="myrToggleReq('myr-ar-body-${i}')">
        <div style="width:8px;height:8px;border-radius:50%;background:${statusColor};flex-shrink:0;${dotAnim}"></div>
        <div style="font-family:var(--font-head);font-size:12px;font-weight:700;color:#F0F6FF;flex:1">${_esc(req.title)}</div>
        <span style="font-family:var(--font-head);font-size:11px;padding:2px 8px;${badgeClass.slice(7,-1)}">${badgeLabel}</span>
        <div style="font-family:var(--font-head);font-size:11px;color:rgba(255,255,255,.3)">${_esc(req.submitted||'')} &middot; ${_esc(req.workflow||'')}</div>
      </div>
      <div class="myr-ar-body${req.expanded?' open':''}" id="myr-ar-body-${i}">
        <div style="font-family:var(--font-head);font-size:11px;color:rgba(255,255,255,.3);margin-bottom:5px">Workflow progress</div>
        <div class="myr-pt-steps">${stepsHtml}</div>
        ${req.cocNote?`<div style="font-family:var(--font-head);font-size:11px;padding:6px 9px;background:rgba(0,210,255,.04);border:1px solid rgba(0,210,255,.1);border-left:2px solid rgba(0,210,255,.35);color:rgba(240,246,255,.65);line-height:1.55;margin-bottom:8px">${_esc(req.cocNote)}</div>`:''}
        <div style="display:flex;gap:5px;flex-wrap:wrap">
          <button onclick="compassToast('Request withdrawn. CoC event written.')" style="font-family:var(--font-head);font-size:11px;padding:4px 12px;background:none;border:1px solid rgba(226,75,74,.3);color:#E24B4A;cursor:pointer;letter-spacing:.06em">Withdraw</button>
          <button onclick="compassToast('Context added to request thread.')" style="font-family:var(--font-head);font-size:11px;padding:4px 12px;background:none;border:1px solid rgba(0,210,255,.3);color:#00D2FF;cursor:pointer;letter-spacing:.06em">Add context</button>

  el.innerHTML = html;

function renderMyRequestsHistory() {
  const el = document.getElementById('myr-history-content');
  if (!el) return;
  const reqs = window._myRequests || [];
  const hist = reqs.filter(r => r.status === 'completed' || r.status === 'rejected');
  if (!hist.length) {
    el.innerHTML = `<div style="font-family:var(--font-head);font-size:12px;color:rgba(255,255,255,.25);padding:20px 0;text-align:center">No completed requests yet.</div>`;
    return;
  }
  let html = `<div style="border:1px solid rgba(255,255,255,.07);overflow:hidden">`;
  hist.forEach((req, i) => {
    const isLast = i === hist.length - 1;
    const outcomeColor = req.status==='completed'?'#1D9E75':req.status==='rejected'?'#E24B4A':'#EF9F27';
    const outcomeBorder = req.status==='completed'?'rgba(29,158,117,.3)':req.status==='rejected'?'rgba(226,75,74,.3)':'rgba(239,159,39,.3)';
    const outcomeLabel = req.status==='completed'?'Approved':req.status==='rejected'?'Rejected':'Pending';
    html += `<div class="myr-hist-row"${isLast?' style="border-bottom:none"':''}>
      <div style="width:7px;height:7px;border-radius:50%;background:${outcomeColor};flex-shrink:0"></div>
      <div style="flex:1;font-family:var(--font-head);font-size:11px;color:#F0F6FF">${_esc(req.title)}</div>
      <div style="font-family:var(--font-head);font-size:11px;color:rgba(255,255,255,.3)">${_esc(req.date||'')}</div>
      <div style="font-family:var(--font-head);font-size:11px;padding:1px 7px;border:1px solid ${outcomeBorder};color:${outcomeColor}">${outcomeLabel}</div>
    </div>`;
  });
  html += `</div>`;
  el.innerHTML = html;
}

window.renderDeltaStrip = function(deltas) {
  // deltas: [{label, color:'red'|'amber'|'green'|'cyan', navigate:fn}]
  const strip = document.getElementById('mw-delta-strip');
  const chips = document.getElementById('mw-delta-chips');
  if (!strip || !chips || !deltas || !deltas.length) {
    if (strip) strip.style.display = 'none';
    return;
  }
  const colorMap = {
    red:   'border:1px solid rgba(226,75,74,.3);color:#E24B4A',
    amber: 'border:1px solid rgba(239,159,39,.3);color:#EF9F27',
    green: 'border:1px solid rgba(29,158,117,.3);color:#1D9E75',
    cyan:  'border:1px solid rgba(0,210,255,.3);color:#00D2FF',
  };
  chips.innerHTML = deltas.map((d, i) =>
    `<span class="delta-chip" style="${colorMap[d.color]||colorMap.cyan}" data-delta-idx="${i}">${_esc(d.label)}</span>`
  ).join('');
  // Store navigate fns
  window._deltaNavigateFns = deltas.map(d => d.navigate || null);
  strip.style.display = 'flex';
};

// Wire delta chip clicks at module level
document.addEventListener('click', function(ev) {
  const chip = ev.target.closest('.delta-chip');
  if (!chip) return;
  const idx = parseInt(chip.dataset.deltaIdx, 10);
  const fn = (window._deltaNavigateFns||[])[idx];
  if (typeof fn === 'function') fn();
});

// Populate delta strip after user view loads (called from _mwLoadUserView)
window.populateDeltaStrip = function() {
  // Build deltas from live data — tasks/concerns overdue since last session
  const tasks    = window._userTasks    || [];
  const concerns = window._userConcerns || [];
  const deltas   = [];
  const newTasks = tasks.filter(t => t._newSinceLogin);
  if (newTasks.length) {
    deltas.push({ label: newTasks.length + ' new action item' + (newTasks.length>1?'s':'') + ' assigned', color:'red',
      navigate: () => uSwitchTab('work', document.querySelector('.ust[data-tab=work]')) });
  }
  const overdue = tasks.filter(t => t.status !== 'done' && t.due_date && new Date(t.due_date) < new Date());
  if (overdue.length) {
    deltas.push({ label: overdue.length + ' item' + (overdue.length>1?'s':'')+' overdue', color:'amber',
      navigate: () => uSwitchTab('work', document.querySelector('.ust[data-tab=work]')) });
  }
  const unreads = concerns.filter(c => c.status==='unread'||c.status==='not_yet_read');
  if (unreads.length) {
    deltas.push({ label: unreads.length + ' unread concern' + (unreads.length>1?'s':''), color:'red',
      navigate: () => uSwitchTab('concerns', document.querySelector('.ust[data-tab=concerns]')) });
  }
  const reqs = window._myRequests || [];
  const recentApproved = reqs.filter(r => r.status==='completed' && r._newSinceLogin);
  if (recentApproved.length) {
    deltas.push({ label: recentApproved.length + ' request'+( recentApproved.length>1?'s':'')+' approved', color:'green',
      navigate: () => { uSwitchTab('requests', document.querySelector('.ust[data-tab=requests]')); myrSwitchView('active', document.querySelector('.myr-subnav[data-myr=active]')); } });
  }
  renderDeltaStrip(deltas);
};

// ── Action item negotiation — state engine ────────────────
// Negotiation state persisted in workflow_action_items.negotiation_state (jsonb)
// In-memory cache: window._negStateCache = { [itemId]: stateObj }
// States: 'unrated' | 'pending' | 'negotiating' | 'agreed' | 'escalated'

window._negStateCache = window._negStateCache || {};

window.negGetState = function(itemId) {
  // 1. Check in-memory cache first (populated from DB on load)
  if (window._negStateCache[itemId]) return window._negStateCache[itemId];
  // 2. Fall back to DB data in myActionItems
  const ai = (window.myActionItems||[]).find(a=>a.id===itemId);
  if (ai?.negotiation_state) {
    window._negStateCache[itemId] = ai.negotiation_state;
    return ai.negotiation_state;
  }
  // 3. Default unrated
  return { state: 'unrated', thread: [] };
};

window.negSaveState = function(itemId, data) {
  // Update in-memory cache immediately
  window._negStateCache[itemId] = data;
  // Update myActionItems cache so row borders re-render correctly
  const ai = (window.myActionItems||[]).find(a=>a.id===itemId);
  if (ai) ai.negotiation_state = data;
  // Persist to Supabase async — no await, fire and forget
  API.patch(`workflow_action_items?id=eq.${itemId}`, {
    negotiation_state: data
  }).catch(e => console.warn('[Compass] negSaveState write failed:', e));
};

window.negRowBorderStyle = function(itemId) {
  const s = negGetState(itemId).state;
  if (s === 'unrated')     return 'border-left:3px dashed rgba(255,255,255,.2)';
  if (s === 'pending')     return 'border-left:3px dashed rgba(239,159,39,.5)';
  if (s === 'negotiating') return 'border-left:3px solid rgba(139,92,246,.6)';
  if (s === 'agreed')      return 'border-left:3px solid rgba(29,158,117,.5)';
  if (s === 'escalated')   return 'border-left:3px solid rgba(226,75,74,.5)';
  return '';
};

// Write a CoC event for negotiation milestone
window.negWriteCoCEvent = async function(itemId, eventNotes, actorName) {
  const now   = new Date().toISOString();
  const actor = actorName || _myResource?.name || null;
  const evtId = crypto.randomUUID();
  const evt = {
    id:          evtId,
    firm_id:     'aaaaaaaa-0001-0001-0001-000000000001',
    entity_id:   itemId,
    entity_type: 'action_item',
    event_type:  'loe_negotiation',
    step_name:   'LOE negotiation',
    event_notes: eventNotes,
    actor_name:  actor,
    actor_resource_id: _myResource?.id || null,
    outcome:     'on_track',
    created_at:  now,
    updated_at:  now,
  };
  // Optimistically update local cache so CoC panel refreshes immediately
  if (!window._myCocEvents) window._myCocEvents = [];
  window._myCocEvents.unshift(evt);
  _negRefreshModalCoC(itemId);
  // Persist to Supabase
  try {
    await API.post('coc_events', evt);
  } catch(e) {
    console.error('[Compass] negWriteCoC FAILED:', e);
    window._myCocEvents = (window._myCocEvents||[]).filter(ev=>ev.id!==evtId);
    _negRefreshModalCoC(itemId);
  }
};

// Refresh the CoC column in the open work item modal for a given item
function _negRefreshModalCoC(itemId) {
  const panel = document.querySelector(`.wi-expanded[data-wi-id="${itemId}"]`);
  if (!panel) return;
  // Re-compute events for this item
  const _itemInstIds = new Set((window._wfInstances||[]).filter(w=>w.task_id===itemId).map(w=>w.id));
  const _aiInst = (window.myActionItems||[]).find(a=>a.id===itemId)?.instance_id;
  if (_aiInst) _itemInstIds.add(_aiInst);
  const evts = (window._myCocEvents||[]).filter(e=>
    e.entity_id === itemId ||
    _itemInstIds.has(e.entity_id) ||
    _itemInstIds.has(e.instance_id)
  );
  const _evtColor={instance_launched:'#00D2FF',instance_completed:'#1D9E75',step_activated:'#e8a838',
    step_completed:'#1D9E75',step_action:'#00D2FF',step_reset:'#E24B4A',
    management_decision:'#EF9F27',intervention:'#8B5CF6'};
  const _evtLabel={instance_launched:'Launched',instance_completed:'Completed',step_activated:'Activated',
    step_completed:'Step done',step_action:'Action',step_reset:'Reset',
    management_decision:'Decision',intervention:'Intervention'};
  const _E=s=>(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const cocHtml = evts.length ? evts.map((e,i)=>{
    const col=_evtColor[e.event_type]||'#5A84A8';
    const lbl=_evtLabel[e.event_type]||e.event_type.replace(/_/g,' ');
    const step=(e.step_name||'').replace(/^CONCERN:\s*/,'');
    const note=e.event_notes||'';
    const ts=e.created_at?new Date(e.created_at).toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'}):'';
    let h='<div style="display:flex;gap:6px;margin-bottom:8px">';
    h+='<div style="display:flex;flex-direction:column;align-items:center;width:10px;flex-shrink:0">';
    h+='<div style="width:6px;height:6px;border-radius:50%;background:'+col+';margin-top:2px;flex-shrink:0"></div>';
    if(i<evts.length-1) h+='<div style="width:1px;flex:1;min-height:8px;background:rgba(255,255,255,.08);margin-top:2px"></div>';
    h+='</div><div style="flex:1;min-width:0">';
    h+='<div style="font-family:var(--font-head);font-size:11px;font-weight:700;color:'+col+'">'+_E(lbl)+'</div>';
    if(step) h+='<div style="font-family:var(--font-head);font-size:11px;color:rgba(255,255,255,.4);margin-top:1px">&rarr; '+_E(step.slice(0,40))+'</div>';
    if(e.actor_name) h+='<div style="font-family:var(--font-head);font-size:11px;color:rgba(255,255,255,.3)">By '+_E(e.actor_name)+'</div>';
    if(note) h+='<div style="font-family:var(--font-body);font-size:11px;color:rgba(240,246,255,.65);margin-top:2px;padding:2px 6px;background:rgba(255,255,255,.03);border-left:2px solid '+col+';line-height:1.4;word-break:break-word">'+_E(note.slice(0,120))+'</div>';
    if(ts) h+='<div style="font-family:var(--font-mono);font-size:11px;color:rgba(255,255,255,.2);margin-top:1px">'+ts+'</div>';
    h+='</div></div>';
    return h;
  }).join('') : '<div style="font-family:var(--font-head);font-size:11px;color:var(--text3);line-height:1.6">No CoC history for this item yet.</div>';
  // Find and update the CoC column header count + body
  const cocCol = panel.querySelector('[data-coc-col]');
  if (cocCol) {
    const countEl = cocCol.querySelector('[data-coc-count]');
    const bodyEl  = cocCol.querySelector('[data-coc-body]');
    if (countEl) countEl.textContent = 'Chain of Custody (' + evts.length + ')';
    if (bodyEl)  bodyEl.innerHTML = cocHtml;
  }
}

      ${actionZone}
    </div>
    ${threadDesc.length ? `
    <div style="border-top:1px solid rgba(255,255,255,.05);padding-top:10px">
      <div style="font-family:var(--font-head);font-size:10px;letter-spacing:.08em;color:rgba(255,255,255,.2);text-transform:uppercase;margin-bottom:8px">Thread — ${threadDesc.length} message${threadDesc.length!==1?'s':''} · newest first</div>
