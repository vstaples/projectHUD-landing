<!-- my-notes.html — Compass My Notes module -->
<!-- Exports: window._notesLoadView, window._notesRefresh -->
<!-- Replaces utc-concerns / My Concerns tab -->

<style>
/* ── Shell ───────────────────────────────────────────────────────────────── */
#notes-shell{display:grid;grid-template-columns:var(--notes-left-w,260px) 4px 1fr;height:calc(100vh - 120px);overflow:hidden;background:var(--bg0,#060a10)}

/* ── Left panel ──────────────────────────────────────────────────────────── */
#notes-left{display:flex;flex-direction:column;overflow:hidden}
#notes-splitter{width:4px;background:rgba(0,210,255,.08);cursor:col-resize;flex-shrink:0;transition:background .15s;position:relative;z-index:10}
#notes-splitter:hover,#notes-splitter.dragging{background:rgba(0,210,255,.35)}
#notes-splitter::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:1px;height:32px;background:rgba(0,210,255,.3);border-radius:1px}
#notes-left-header{padding:10px 14px;border-bottom:1px solid rgba(0,210,255,.08);flex-shrink:0}
#notes-search:focus{border-color:rgba(0,210,255,.35)}
#notes-search::placeholder{color:var(--text3,#6A94B8)}
#notes-new-btn{width:100%;background:none;border:1px dashed rgba(0,210,255,.2);color:rgba(0,210,255,.5);font-family:var(--font-head,'Barlow Condensed',sans-serif);font-size:11px;letter-spacing:.07em;padding:5px;cursor:pointer;transition:all .12s;text-transform:uppercase}
#notes-new-btn:hover{border-color:rgba(0,210,255,.5);color:#00D2FF;background:rgba(0,210,255,.04)}

/* ── Inbox section ───────────────────────────────────────────────────────── */
#notes-inbox-section{flex-shrink:0;border-bottom:1px solid rgba(0,210,255,.08)}
.notes-section-hdr{padding:6px 14px;font-family:var(--font-ui,'Barlow Condensed',sans-serif);font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text2,#90B8D8);display:flex;align-items:center;gap:6px;cursor:pointer;user-select:none}
.notes-section-hdr:hover{color:var(--text2,#90B8D8)}
.notes-inbox-count{font-family:var(--font-mono,monospace);font-size:11px;padding:1px 5px;background:rgba(0,210,255,.1);color:#00D2FF;border:0.5px solid rgba(0,210,255,.2);border-radius:2px;margin-left:auto}
#notes-inbox-list{max-height:180px;overflow-y:auto}#notes-inbox-list .notes-item{padding-left:24px}

/* ── Tree section ────────────────────────────────────────────────────────── */
#notes-tree-section{flex:1;overflow:hidden;display:flex;flex-direction:column}
#notes-tree-scroll{flex:1;overflow-y:auto;padding-bottom:16px}

/* ── Left panel items ────────────────────────────────────────────────────── */
.notes-item{padding:6px 14px 6px 14px;cursor:pointer;display:flex;align-items:flex-start;gap:8px;border-left:2px solid transparent;transition:all .1s}
.notes-item:hover{background:rgba(0,210,255,.03);border-left-color:rgba(0,210,255,.15)}
.notes-item-del{width:14px;height:14px;background:none;border:none;color:rgba(226,75,74,0);
  cursor:pointer;font-size:12px;padding:0;flex-shrink:0;line-height:1;transition:color .1s}
.notes-item:hover .notes-item-del{color:rgba(226,75,74,.5)}
.notes-item-del:hover{color:#E24B4A!important}
.notes-item.active{background:rgba(0,210,255,.06);border-left-color:#00D2FF}
.notes-item.in-grid{background:rgba(0,210,255,.05);border-left-color:#00D2FF}.notes-item.in-grid .notes-item-title{color:rgba(0,210,255,.7)}.notes-slot-badge{font-family:var(--font-mono,monospace);font-size:11px;padding:1px 5px;background:rgba(0,210,255,.15);border:0.5px solid rgba(0,210,255,.4);color:#00D2FF;border-radius:2px;flex-shrink:0;margin-top:2px}
.notes-item-body{flex:1;min-width:0}
.notes-item-title{font-family:var(--font-ui,'Barlow Condensed',sans-serif);font-size:12px;font-weight:400;color:var(--text1,#C8DFF0);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3}
.notes-item-meta{font-family:var(--font-mono,monospace);font-size:10px;color:var(--text3,#6A94B8);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.notes-item-source{font-family:var(--font-mono,monospace);font-size:11px;padding:1px 5px;background:rgba(255,255,255,.06);border:0.5px solid rgba(255,255,255,.1);color:var(--text3);border-radius:2px;flex-shrink:0;margin-top:2px}

/* ── Tree nodes ──────────────────────────────────────────────────────────── */
.notes-branch{padding:5px 14px;font-family:var(--font-ui,'Barlow Condensed',sans-serif);font-size:13px;font-weight:700;color:var(--text0,#F0F6FF);cursor:pointer;display:flex;align-items:center;gap:6px;user-select:none;letter-spacing:.02em}
.notes-branch-label,.notes-subbranch-label{flex:1;outline:none;cursor:text}
.notes-branch-label:focus,.notes-subbranch-label:focus{color:var(--text0,#F0F6FF)}
.notes-branch-add{width:14px;height:14px;background:none;border:none;color:var(--text3);cursor:pointer;font-size:12px;padding:0;opacity:0;transition:opacity .1s;flex-shrink:0;line-height:1}
.notes-branch-del{width:14px;height:14px;background:none;border:none;color:rgba(226,75,74,.5);cursor:pointer;font-size:11px;padding:0;opacity:0;transition:opacity .1s;flex-shrink:0;line-height:1}
.notes-branch:hover .notes-branch-add,.notes-branch:hover .notes-branch-del,
.notes-subbranch:hover .notes-branch-add,.notes-subbranch:hover .notes-branch-del{opacity:1}
.notes-add-root{padding:4px 14px;font-family:var(--font-ui,'Barlow Condensed',sans-serif);font-size:11px;color:rgba(0,210,255,.4);cursor:pointer;display:flex;align-items:center;gap:5px;border:none;background:none;width:100%;transition:color .12s}
.notes-add-root:hover{color:#00D2FF}
.notes-drop-target{background:rgba(0,210,255,.08)!important;border-left:2px solid rgba(0,210,255,.6)!important}.notes-children.notes-drop-target{background:transparent!important;border-left:none!important}
.notes-drop-before{position:relative}
.notes-drop-before::before{content:'';position:absolute;left:0;right:0;top:-1px;height:2px;
  background:#00D2FF;z-index:10;pointer-events:none;
  box-shadow:0 0 6px rgba(0,210,255,.6)}
.notes-drop-after{position:relative}
.notes-drop-after::after{content:'';position:absolute;left:0;right:0;bottom:-1px;height:2px;
  background:#00D2FF;z-index:10;pointer-events:none;
  box-shadow:0 0 6px rgba(0,210,255,.6)}
.notes-branch:hover{color:var(--text0,#F0F6FF)}
.notes-subbranch{padding:4px 14px 4px 26px;font-family:var(--font-ui,'Barlow Condensed',sans-serif);font-size:12px;font-weight:600;color:var(--text2,#90B8D8);cursor:pointer;display:flex;align-items:center;gap:6px;user-select:none}
.notes-subbranch:hover{color:var(--text2)}
.notes-chevron{width:10px;height:10px;transition:transform .15s;flex-shrink:0;opacity:.7;color:var(--text2,#90B8D8)}
.notes-chevron.open{transform:rotate(90deg)}
.notes-branch .notes-chevron{opacity:.8;color:var(--text0,#F0F6FF)}
.notes-children{overflow:hidden}
.notes-branch-items .notes-item{padding-left:28px}
.notes-subbranch-items .notes-item{padding-left:40px}

/* ── Grid workspace ──────────────────────────────────────────────────────── */
#notes-right{display:flex;flex-direction:column;overflow:hidden}
#notes-grid-header{padding:6px 16px;border-bottom:1px solid rgba(0,210,255,.08);display:flex;align-items:center;gap:4px;flex-shrink:0;flex-wrap:wrap}
#notes-grid-label{font-family:var(--font-mono,monospace);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);flex:1}
.notes-grid-btn{font-family:var(--font-ui,'Barlow Condensed',sans-serif);font-size:13px;padding:3px 8px;background:none;border:1px solid rgba(255,255,255,.12);color:var(--text3);cursor:pointer;transition:all .12s;letter-spacing:.04em}
.notes-grid-btn:hover{border-color:rgba(0,210,255,.3);color:#00D2FF}
.notes-grid-btn.active{background:rgba(0,210,255,.1);border-color:rgba(0,210,255,.4);color:#00D2FF}
/* ── Row editor bar ── */
#notes-row-editor{display:flex;align-items:stretch;gap:6px;padding:6px 12px;border-bottom:1px solid rgba(0,210,255,.08);flex-shrink:0;flex-wrap:nowrap;overflow-x:auto;background:rgba(0,0,0,.15)}
#notes-row-editor:empty{display:none}
.nre-row{display:flex;align-items:center;gap:4px;background:rgba(0,210,255,.04);border:1px solid rgba(0,210,255,.12);padding:3px 6px;flex-shrink:0}
.nre-grip{cursor:grab;color:var(--text3);font-size:12px;padding:0 2px;line-height:1;user-select:none}
.nre-grip:active{cursor:grabbing}
.nre-label{font-family:var(--font-mono,monospace);font-size:10px;color:var(--text3);letter-spacing:.06em;white-space:nowrap;padding:0 3px}
.nre-stepper{display:flex;align-items:center;gap:2px}
.nre-step-btn{width:16px;height:16px;background:none;border:1px solid rgba(0,210,255,.2);color:var(--text2);font-size:11px;cursor:pointer;padding:0;line-height:1;display:flex;align-items:center;justify-content:center;transition:all .1s}
.nre-step-btn:hover{border-color:rgba(0,210,255,.5);color:#00D2FF}
.nre-step-btn:disabled{opacity:.25;cursor:not-allowed}
.nre-col-val{font-family:var(--font-mono,monospace);font-size:11px;color:var(--text0);min-width:14px;text-align:center}
.nre-height-sel{background:#0a1628;border:1px solid rgba(0,210,255,.15);color:#90B8D8;font-family:var(--font-mono,monospace);font-size:10px;padding:2px 4px;cursor:pointer;outline:none;-webkit-appearance:auto}.nre-height-sel option{background:#0d1e35 !important;color:#90B8D8 !important}
.nre-height-sel:focus{border-color:rgba(0,210,255,.4)}
.nre-del{background:none;border:none;color:rgba(226,75,74,.3);cursor:pointer;font-size:11px;padding:0 2px;line-height:1;transition:color .1s}
.nre-del:hover{color:#E24B4A}
.nre-del:disabled{opacity:.15;cursor:not-allowed}
.nre-add-row{font-family:var(--font-mono,monospace);font-size:10px;padding:3px 8px;background:none;border:1px dashed rgba(0,210,255,.2);color:rgba(0,210,255,.5);cursor:pointer;transition:all .12s;letter-spacing:.04em;flex-shrink:0;white-space:nowrap;align-self:center}
.nre-add-row:hover{border-color:rgba(0,210,255,.5);color:#00D2FF;background:rgba(0,210,255,.04)}
.nre-add-row:disabled{opacity:.25;cursor:not-allowed}
/* ── Grid area — row-based ── */
#notes-grid-area{flex:1;overflow-y:auto;overflow-x:hidden;padding:8px 12px;display:flex;flex-direction:column;gap:8px;-webkit-overflow-scrolling:touch}
.nre-grid-row{display:grid;gap:8px;flex-shrink:0}
.nre-grid-row[data-height="small"] .notes-tile{min-height:120px}
.nre-grid-row[data-height="medium"] .notes-tile{min-height:180px}
.nre-grid-row[data-height="large"] .notes-tile{min-height:260px}
.nre-grid-row[data-height="auto"] .notes-tile{min-height:120px}
#notes-grid{display:contents}/* legacy compat — children render into #notes-grid-area */
#notes-tray{border-top:1px solid rgba(0,210,255,.08);padding:8px 12px;display:flex;gap:8px;overflow-x:auto;flex-shrink:0;min-height:0}
#notes-tray:empty{display:none}
.notes-tray-chip{font-family:var(--font-mono,monospace);font-size:10px;padding:3px 10px;background:rgba(0,210,255,.06);border:1px solid rgba(0,210,255,.15);color:var(--text2);cursor:pointer;white-space:nowrap;flex-shrink:0}
/* ── Invitation dialog ── */
.notes-invite-dialog-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:600;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(2px)}
.notes-invite-dialog{background:#0d1e35;border:1px solid rgba(0,210,255,.3);box-shadow:0 16px 60px rgba(0,0,0,.8);width:420px;max-width:95vw;padding:0}
.nid-header{padding:20px 24px 16px;border-bottom:1px solid rgba(0,210,255,.1)}
.nid-from{font-family:var(--font-mono,monospace);font-size:10px;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px}
.nid-title{font-family:var(--font-ui,"Barlow Condensed",sans-serif);font-size:18px;font-weight:700;color:var(--text0,#F0F6FF);margin-bottom:4px}
.nid-note-name{font-family:var(--font-ui,"Barlow Condensed",sans-serif);font-size:14px;color:#00D2FF;margin-top:2px}
.nid-body{padding:18px 24px;font-family:var(--font-ui,"Barlow Condensed",sans-serif);font-size:13px;color:var(--text2);line-height:1.6}
.nid-actions{padding:14px 24px;border-top:1px solid rgba(0,210,255,.1);display:flex;gap:10px;justify-content:flex-end}
.nid-btn{font-family:var(--font-mono,monospace);font-size:11px;letter-spacing:.08em;padding:9px 20px;cursor:pointer;transition:all .15s}
.nid-btn-reject{background:none;border:1px solid rgba(226,75,74,.3);color:rgba(226,75,74,.7)}
.nid-btn-reject:hover{background:rgba(226,75,74,.08);color:#E24B4A}
.nid-btn-accept{background:rgba(0,210,255,.1);border:1px solid rgba(0,210,255,.4);color:#00D2FF}
.nid-btn-accept:hover{background:rgba(0,210,255,.18)}
/* ── Floating shared note window ── */
.notes-float-window{position:fixed;z-index:500;background:var(--bg1,#0c1628);border:1px solid rgba(0,210,255,.35);box-shadow:0 16px 60px rgba(0,0,0,.8);width:520px;height:400px;display:flex;flex-direction:column;cursor:default}
.notes-float-titlebar{padding:8px 12px;background:rgba(0,0,0,.3);border-bottom:1px solid rgba(0,210,255,.15);display:flex;align-items:center;gap:8px;cursor:move;user-select:none;flex-shrink:0}
.notes-float-label{font-family:var(--font-mono,monospace);font-size:10px;color:#00D2FF;letter-spacing:.08em;text-transform:uppercase;margin-right:auto}
.notes-float-hint{font-family:var(--font-mono,monospace);font-size:9px;color:var(--text3);letter-spacing:.04em}
.notes-float-close{background:none;border:none;color:rgba(226,75,74,.6);cursor:pointer;font-size:12px;padding:0 4px}
.notes-float-close:hover{color:#E24B4A}
.notes-float-body{flex:1;overflow:hidden;display:flex;flex-direction:column;min-height:0}
.notes-tray-chip:hover{background:rgba(0,210,255,.12);color:#00D2FF}

/* ── Note tile ───────────────────────────────────────────────────────────── */
.notes-tile{display:flex;flex-direction:column;background:var(--bg1,#0c1628);border:1px solid rgba(0,210,255,.1);overflow:hidden;min-height:0;height:100%}
.notes-tile.minimized{height:auto;min-height:0;border-color:rgba(0,210,255,.2)}
.notes-tile.minimized .notes-tile-header{border-bottom:none;background:rgba(0,0,0,.25)}
.notes-tile.maximized{position:fixed;inset:60px 0 0 0;z-index:500;border:none;
  border-top:2px solid rgba(0,210,255,.4);box-shadow:0 0 60px rgba(0,0,0,.8)}
.notes-tile.maximized .notes-tile-header{background:rgba(6,10,16,.98)}
.notes-tile.empty{border:1px dashed rgba(0,210,255,.12);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .12s}
.notes-tile.empty:hover{background:rgba(0,210,255,.03);border-color:rgba(0,210,255,.25)}
.notes-tile-header{padding:6px 10px;display:flex;align-items:center;gap:7px;flex-shrink:0;border-bottom:1px solid rgba(0,210,255,.08);background:rgba(0,0,0,.15)}
.notes-presence{display:flex;align-items:center;gap:3px;flex-shrink:0}
.notes-avatar{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--font-ui,"Barlow Condensed",sans-serif);font-size:9px;font-weight:700;color:#000;flex-shrink:0;border:1.5px solid rgba(0,0,0,.3);cursor:pointer;position:relative}
.notes-avatar.active::after{content:"";position:absolute;bottom:-1px;right:-1px;width:5px;height:5px;border-radius:50%;background:#1D9E75;border:1px solid #0c1628}
.notes-participant-card{position:fixed;z-index:1000;width:340px;background:var(--bg1,#0c1628);border:1px solid var(--border2,rgba(0,210,255,.2));box-shadow:0 8px 40px rgba(0,0,0,.6),0 0 0 1px rgba(0,210,255,.08);pointer-events:all;overflow-y:auto;max-height:calc(100vh - 20px)}
.npc-top{padding:14px 16px 10px;border-bottom:1px solid rgba(0,210,255,.08);display:flex;align-items:flex-start;gap:12px}
.npc-avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--font-ui,"Barlow Condensed",sans-serif);font-size:15px;font-weight:700;flex-shrink:0}
.npc-name{font-family:var(--font-ui,"Barlow Condensed",sans-serif);font-size:15px;font-weight:700;color:var(--text0,#F0F6FF)}
.npc-title{font-family:var(--font-mono,monospace);font-size:10px;color:var(--text3,#6A94B8);margin-top:2px}
.npc-section{padding:10px 16px;border-bottom:1px solid rgba(0,210,255,.06)}
.npc-section:last-child{border-bottom:none}
.npc-section-lbl{font-family:var(--font-mono,monospace);font-size:10px;color:#00D2FF;letter-spacing:.14em;margin-bottom:7px}
.npc-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.npc-row-lbl{font-family:var(--font-mono,monospace);font-size:10px;color:var(--text3,#6A94B8);letter-spacing:.08em}
.npc-row-val{font-family:var(--font-mono,monospace);font-size:10px;color:var(--text2,#90B8D8)}
.npc-active-dot{width:7px;height:7px;border-radius:50%;background:#1D9E75;display:inline-block;margin-right:4px}
.npc-alloc-bar{height:5px;background:rgba(255,255,255,.05);margin:5px 0}
.npc-alloc-fill{height:100%;transition:width .3s}
.npc-remove{width:100%;background:rgba(226,75,74,.08);border:1px solid rgba(226,75,74,.3);color:rgba(226,75,74,.8);font-family:var(--font-mono,monospace);font-size:10px;letter-spacing:.08em;padding:7px;cursor:pointer;transition:all .12s;margin:0}
.npc-remove:hover{background:rgba(226,75,74,.15);color:#E24B4A}
.notes-invite-btn{width:18px;height:18px;border-radius:50%;background:rgba(255,255,255,.06);border:1px dashed rgba(255,255,255,.2);color:var(--text3);cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;transition:all .12s;flex-shrink:0;padding:0}
.notes-invite-btn:hover{background:rgba(0,210,255,.1);border-color:rgba(0,210,255,.4);color:#00D2FF}
.notes-invite-pop{position:fixed;z-index:1000;cursor:default;user-select:none;background:#0d1e35;border:1px solid rgba(0,210,255,.25);box-shadow:0 8px 32px rgba(0,0,0,.7);padding:10px;min-width:260px;max-height:70vh;overflow-y:auto}
.notes-invite-pop input{width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(0,210,255,.15);color:var(--text0);font-family:var(--font-ui,"Barlow Condensed",sans-serif);font-size:12px;padding:5px 8px;outline:none;margin-bottom:6px;box-sizing:border-box}
.notes-invite-pop input:focus{border-color:rgba(0,210,255,.4)}
.notes-invite-result{max-height:480px;overflow-y:auto;cursor:default}.notes-invite-pop .notes-invite-row{cursor:pointer}
.notes-invite-row{padding:5px 7px;cursor:pointer;display:flex;align-items:center;gap:8px;font-family:var(--font-ui,"Barlow Condensed",sans-serif);font-size:12px;color:var(--text1);transition:background .1s}
.notes-invite-row:hover{background:rgba(0,210,255,.06)}
.notes-invite-row .notes-avatar{width:22px;height:22px;font-size:10px}
.notes-tile-title{font-family:var(--font-ui,'Barlow Condensed',sans-serif);font-size:13px;font-weight:600;color:var(--text0,#F0F6FF);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:text;outline:none}
.notes-tile-title:focus{color:#00D2FF}
.notes-tile-source{font-family:var(--font-mono,monospace);font-size:11px;padding:1px 5px;background:rgba(0,210,255,.08);border:0.5px solid rgba(0,210,255,.2);color:rgba(0,210,255,.7);border-radius:2px;flex-shrink:0}
.notes-tile-ctrl{width:16px;height:16px;background:none;border:none;color:var(--text3);cursor:pointer;font-size:10px;padding:0;display:flex;align-items:center;justify-content:center;transition:color .1s;flex-shrink:0}
.notes-tile-ctrl:hover{color:var(--text0)}
.notes-tile-body{display:flex;flex-direction:column;flex:1;overflow:hidden;min-height:0}
.notes-tile-canvas{flex:1;padding:10px 12px;overflow-y:auto;font-family:var(--font-ui,'Barlow Condensed',sans-serif);font-size:13px;color:var(--text1,#C8DFF0);line-height:1.75;resize:none;background:transparent;border:none;outline:none;min-height:0}
.notes-tile-canvas::placeholder{color:var(--text3);font-style:italic}

/* ── Chat panel — bottom strip ───────────────────────────────────────────── */
.notes-chat{border-top:1px solid rgba(0,210,255,.08);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;max-height:160px}
.notes-chat.hidden{display:none}
.notes-chat-msgs{flex:1;overflow-y:auto;padding:8px 10px;display:flex;flex-direction:column;gap:6px}
.notes-chat-msg{font-family:var(--font-ui,'Barlow Condensed',sans-serif);font-size:13px;line-height:1.5}
.notes-chat-author{font-weight:600;color:var(--text2);margin-bottom:1px}
.notes-chat-body{color:var(--text1)}
.notes-chat-time{color:var(--text3);font-size:11px}

<div id="notes-shell">

    <div id="notes-left-header">
      <div style="position:relative;display:flex;align-items:center;margin-bottom:7px">
        <input id="notes-search" type="text" placeholder="Search notes…"
          oninput="_notesSearch(this.value);document.getElementById('notes-search-clear').style.opacity=this.value?'1':'0'"
          style="width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(0,210,255,.12);
            color:var(--text0,#F0F6FF);font-family:var(--font-mono,monospace);font-size:11px;
            padding:5px 24px 5px 9px;outline:none;margin-bottom:0"/>

            cursor:pointer;font-size:13px;padding:0;line-height:1;opacity:0;transition:opacity .15s"
          tabindex="-1">×</button>

    <!-- Inbox -->

        Inbox

<script>
(function() {
'use strict';

// ── State ─────────────────────────────────────────────────────────────────
const FIRM_ID  = 'aaaaaaaa-0001-0001-0001-000000000001';
let _inboxPollInterval = null;
let _inboxLastChecked  = new Date().toISOString();
let _lastTyped         = {}; // noteId → timestamp of last keystroke
let _userId    = null;
let _userName  = 'Vaughn Staples';
let _notes     = [];      // all notes for this user
let _messages  = {};      // noteId → [messages]
let _workspace = {        // full workspace state in Supabase
  activeView: 'Default',
  views: {
    'Default': _notesDefaultView()
  },
  library: {}               // template blueprints keyed by template name
};
// Convenience accessor for current view
function _cv() {
  if (!_workspace.views[_workspace.activeView]) {
    _workspace.views[_workspace.activeView] = _notesDefaultView();
  }
  return _workspace.views[_workspace.activeView];
}
let _saveTimer = null;

// ── Entry point ───────────────────────────────────────────────────────────
window._notesLoadView = async function() {
  if (window._notesLoaded) { window._notesRefresh && window._notesRefresh(); return; }
  window._notesLoaded = true;

  const res = window._notesResource || window._myResource || null;
  _userId   = res?.user_id || null;
  _userName = res?.name || 'Vaughn Staples';

  await _notesFetchAll();
  await _notesLoadWorkspace();
  // First launch seeding — new user with no notes and no workspace
  if (_notes.length === 0 && Object.keys(_workspace.views).length === 1 &&
      _cv().tiles.length === 0) {
    await _notesFirstLaunchSeed();
  }
  _notesRenderLeft();
  _notesRenderGrid();
  // Restore saved panel width and init splitter
  const savedW = _cv().leftPanelWidth;
  if (savedW) {
    const shell = document.getElementById('notes-shell');
    if (shell) shell.style.setProperty('--notes-left-w', savedW + 'px');
  }
  if (window._notesSplitterInit) window._notesSplitterInit();
  _notesDndInit();
  if (window._notesStartInboxPoll) window._notesStartInboxPoll();
  _notesStartSyncPoll();
  // Wire collaboration and start ping system after collab script runs
  setTimeout(() => {
    if (typeof _notesWireTilesCollab === 'function') _notesWireTilesCollab();
    else if (window._notesWireTilesCollab) window._notesWireTilesCollab();
  }, 0);
};

window._notesRefresh = async function() {
  await _notesFetchAll();
  _notesRenderLeft();
  _notesRenderGrid();
};

// ── Fetch ─────────────────────────────────────────────────────────────────
async function _notesFetchAll() {
  if (!_userId) return;
  try {
    const [notes, msgs] = await Promise.all([
      API.get('notes?owner_user_id=eq.' + _userId + '&firm_id=eq.' + FIRM_ID + '&order=updated_at.desc&limit=200').catch(()=>[]),
      API.get('note_messages?note_id=in.(' + '00000000-0000-0000-0000-000000000000' + ')&limit=1').catch(()=>[]), // placeholder — load per tile
    ]);
    _notes = Array.isArray(notes) ? notes : [];
  } catch(e) { console.error('[Compass] Notes fetch error:', e); }
}

async function _notesLoadMessages(noteId) {
  if (_messages[noteId]) return _messages[noteId];
  try {
    const rows = await API.get('note_messages?note_id=eq.' + noteId + '&order=created_at.asc&limit=100').catch(()=>[]);
    _messages[noteId] = Array.isArray(rows) ? rows : [];
  } catch(e) { _messages[noteId] = []; }
  return _messages[noteId];
}

// ── Workspace migration: gridSize → rows ─────────────────────────────────
function _notesMigrateView(view) {
  if (!view.gridSize || view.rows) return view; // already migrated
  const parts  = view.gridSize.split('x');
  const cols   = parseInt(parts[1]) || 2;
  const rowCnt = parseInt(parts[0]) || 2;
  view.rows = Array.from({ length: rowCnt }, (_, i) => ({
    id:      'row' + i,
    columns: cols,
    height:  'medium'
  }));
  view.tiles = (view.tiles || []).map(t => ({
    ...t,
    row:  'row' + Math.floor(t.slot / cols),
    slot: t.slot % cols,
  }));
  delete view.gridSize;
  return view;
}

async function _notesLoadWorkspace() {
  if (!_userId) return;
  try {
    const rows = await API.get('notes_workspace?user_id=eq.' + _userId + '&limit=1').catch(()=>[]);
    if (rows?.[0]?.state) {
      const s = rows[0].state;
      if (s.views) {
        _workspace.activeView = s.activeView || 'Default';
        _workspace.views      = s.views;
        _workspace.library    = s.library || {};
        // Ensure active view exists
        if (!_workspace.views[_workspace.activeView]) {
          _workspace.views[_workspace.activeView] = _notesDefaultView();
        }
        // Migrate any views still using gridSize
        let migrated = false;
        Object.keys(_workspace.views).forEach(vn => {
          const v = _workspace.views[vn];
          if (v.gridSize && !v.rows) { _notesMigrateView(v); migrated = true; }
        });
        if (migrated) _notesSaveWorkspace(true); // persist migration immediately
      } else {
        // Legacy flat format — migrate into Default view
        _workspace.activeView = 'Default';
        const legacy = {
          gridSize: s.gridSize || '2x2',
          tiles:    Array.isArray(s.tiles) ? s.tiles : [],
          tray:     Array.isArray(s.tray)  ? s.tray  : [],
        };
        _workspace.views = { 'Default': _notesMigrateView(legacy) };
        _notesSaveWorkspace(true);
      }
    }
  } catch(e) { console.error('[Compass] Workspace load error:', e); }
  // Clean up any tiles with null/missing row references
  _notesCleanTiles();
}

function _notesCleanTiles() {
  Object.values(_workspace.views || {}).forEach(function(v) {
    if (!v.tiles || !v.rows) return;
    const validRowIds = new Set((v.rows || []).map(function(r) { return r.id; }));
    const orphans = v.tiles.filter(function(t) { return !validRowIds.has(t.row); });
    orphans.forEach(function(t) { if (!v.tray.includes(t.noteId)) v.tray.push(t.noteId); });
    v.tiles = v.tiles.filter(function(t) { return validRowIds.has(t.row); });
  });
}

function _notesDefaultView() {
  return {
    rows:  [{ id: 'row0', columns: 2, height: 'medium' },
            { id: 'row1', columns: 2, height: 'medium' }],
    tiles: [],
    tray:  [],
  };
}

async function _notesSaveNow() {
  if (!_userId) return;
  // Deep clone to capture state at this exact moment
  const snapshot = JSON.parse(JSON.stringify(_workspace));
  try {
    const res = await API.patch(
      'notes_workspace?user_id=eq.' + _userId,
      { state: snapshot, updated_at: new Date().toISOString() }
    );
    if (!res || (Array.isArray(res) && res.length === 0)) {
      await API.post('notes_workspace', {
        firm_id: FIRM_ID, user_id: _userId,
        state: snapshot, updated_at: new Date().toISOString(),
      });
    }
  } catch(e) { console.error('[Compass] Workspace save error:', e); }
}

async function _notesSaveWorkspace(immediate) {
  if (!_userId) return;
  if (immediate) { clearTimeout(_saveTimer); return _notesSaveNow(); }
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(_notesSaveNow, 800);
}

// ── Left panel ────────────────────────────────────────────────────────────
function _notesRenderLeft() {
  _notesRenderLibrary();
  _notesRenderInbox();
  _notesRenderTree();
  _notesWireLeft(); // wire after both inbox and tree are in DOM
}

function _notesRenderInbox() {
  const inbox = _notes.filter(n => n.is_inbox);
  const el    = document.getElementById('notes-inbox-list');
  const badge = document.getElementById('notes-inbox-count');
  if (!el) return;
  if (badge) badge.textContent = inbox.length;
  el.innerHTML = inbox.length === 0
    ? '<div style="padding:8px 14px;font-family:var(--font-mono,monospace);font-size:10px;color:var(--text3)">Empty inbox</div>'
    : inbox.map(n => _notesItemHTML(n)).join('');
}

function _notesRenderTree() {
  const body = document.getElementById('notes-tree-body');
  if (!body) return;

  const organized = _notes.filter(n => !n.is_inbox);
  const branches  = {};
  organized.forEach(n => {
    const parts  = (n.hierarchy_path || 'Work').split('/');
    const top    = parts[0] || 'Work';
    const sub    = parts[1] || null;
    if (!branches[top]) branches[top] = {};
    const subKey = sub || '__root__';
    if (!branches[top][subKey]) branches[top][subKey] = [];
    branches[top][subKey].push(n);
  });
  // Sort each group by sort_order, then updated_at as fallback
  Object.values(branches).forEach(subs => {
    Object.keys(subs).forEach(key => {
      subs[key].sort((a,b) => {
        if (a.sort_order !== b.sort_order) return (a.sort_order||0) - (b.sort_order||0);
        return (b.updated_at||'').localeCompare(a.updated_at||'');
      });
    });
  });

  ['Work','Personal'].forEach(b => { if (!branches[b]) branches[b] = {}; });

  body.innerHTML = '';

  Object.entries(branches).forEach(([branch, subs]) => {
    const bid        = 'nb-' + branch.replace(/\s+/g,'-');
    const totalCount = Object.values(subs).reduce((s,a) => s + a.length, 0);

    // Branch row
    const branchDiv = document.createElement('div');
    branchDiv.className = 'notes-branch';
    branchDiv.dataset.toggle     = bid;
    branchDiv.dataset.branchpath = branch;
    branchDiv.addEventListener('dragover', _notesBranchDragOver);
    branchDiv.addEventListener('dragleave', _notesBranchDragLeave);
    branchDiv.addEventListener('drop', _notesBranchDrop);

    const chev = document.createElementNS('http://www.w3.org/2000/svg','svg');
    chev.setAttribute('viewBox','0 0 10 10');
    chev.setAttribute('fill','none');
    chev.setAttribute('width','10');
    chev.setAttribute('height','10');
    chev.classList.add('notes-chevron','open');
    const chevPath = document.createElementNS('http://www.w3.org/2000/svg','path');
    chevPath.setAttribute('d','M3 2l4 3-4 3');
    chevPath.setAttribute('stroke','currentColor');
    chevPath.setAttribute('stroke-width','1.2');
    chevPath.setAttribute('stroke-linecap','round');
    chev.appendChild(chevPath);

    const label = document.createElement('span');
    label.className     = 'notes-branch-label';
    label.contentEditable = 'true';
    label.spellcheck    = false;
    label.textContent   = branch;
    label.dataset.branch = branch;
    label.addEventListener('click',  e => e.stopPropagation());
    label.addEventListener('mousedown', e => e.stopPropagation());
    label.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); label.blur(); } });
    label.addEventListener('blur', () => _notesRenameBranch(label, branch, null));

    const addBtn = document.createElement('button');
    addBtn.className   = 'notes-branch-add';
    addBtn.title       = 'Add sub-branch';
    addBtn.textContent = '+';
    addBtn.addEventListener('click', e => { e.stopPropagation(); _notesAddBranch(branch); });

    branchDiv.appendChild(chev);
    branchDiv.appendChild(label);
    branchDiv.appendChild(addBtn);

    if (totalCount === 0) {
      const delBtn = document.createElement('button');
      delBtn.className   = 'notes-branch-del';
      delBtn.title       = 'Delete branch';
      delBtn.textContent = '×';
      delBtn.addEventListener('click', e => { e.stopPropagation(); _notesDeleteBranch(branch, null); });
      branchDiv.appendChild(delBtn);
    }

    body.appendChild(branchDiv);

    // Children container — also a drop target for the branch
    const childrenDiv = document.createElement('div');
    childrenDiv.id              = bid;
    childrenDiv.className       = 'notes-children';
    childrenDiv.dataset.branchpath = branch;
    childrenDiv.style.minHeight = '8px'; // ensure drop area even when empty
    childrenDiv.addEventListener('dragover', _notesBranchDragOver);
    childrenDiv.addEventListener('dragleave', _notesBranchDragLeave);
    childrenDiv.addEventListener('drop', _notesBranchDrop);

    // Root-level notes
    const rootNotes = subs['__root__'] || [];
    if (rootNotes.length > 0) {
      const rootWrap = document.createElement('div');
      rootWrap.className = 'notes-branch-items';
      rootWrap.innerHTML = rootNotes.map(n => _notesItemHTML(n)).join('');
      childrenDiv.appendChild(rootWrap);
    }

    // Sub-branches
    Object.entries(subs).forEach(([sub, notes]) => {
      if (sub === '__root__') return;
      const sid      = 'ns-' + branch + '-' + sub.replace(/\s+/g,'-');
      const fullPath = branch + '/' + sub;

      const subDiv = document.createElement('div');
      subDiv.className = 'notes-subbranch';
      subDiv.dataset.toggle     = sid;
      subDiv.dataset.branchpath = fullPath;
      subDiv.addEventListener('dragover', _notesBranchDragOver);
      subDiv.addEventListener('dragleave', _notesBranchDragLeave);
      subDiv.addEventListener('drop', _notesBranchDrop);

      const subChev = document.createElementNS('http://www.w3.org/2000/svg','svg');
      subChev.setAttribute('viewBox','0 0 10 10');
      subChev.setAttribute('fill','none');
      subChev.setAttribute('width','10');
      subChev.setAttribute('height','10');
      subChev.classList.add('notes-chevron','open');
      const subChevPath = document.createElementNS('http://www.w3.org/2000/svg','path');
      subChevPath.setAttribute('d','M3 2l4 3-4 3');
      subChevPath.setAttribute('stroke','currentColor');
      subChevPath.setAttribute('stroke-width','1.2');
      subChevPath.setAttribute('stroke-linecap','round');
      subChev.appendChild(subChevPath);

      const subLabel = document.createElement('span');
      subLabel.className      = 'notes-subbranch-label';
      subLabel.contentEditable = 'true';
      subLabel.spellcheck     = false;
      subLabel.textContent    = sub;
      subLabel.dataset.branch = fullPath;
      subLabel.addEventListener('click', e => e.stopPropagation());
      subLabel.addEventListener('mousedown', e => e.stopPropagation());
      subLabel.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); subLabel.blur(); } });
      subLabel.addEventListener('blur', () => _notesRenameBranch(subLabel, branch, sub));

      const countSpan = document.createElement('span');
      countSpan.style.cssText = 'margin-left:auto;font-family:var(--font-mono,monospace);font-size:11px;color:var(--text3)';

      subDiv.appendChild(countSpan);

      if (notes.length === 0) {
        const delBtn2 = document.createElement('button');
        delBtn2.className   = 'notes-branch-del';
        delBtn2.title       = 'Delete branch';
        delBtn2.textContent = '×';
        delBtn2.addEventListener('click', e => { e.stopPropagation(); _notesDeleteBranch(branch, sub); });
        subDiv.appendChild(delBtn2);
      }

      childrenDiv.appendChild(subDiv);

      const subItemsDiv = document.createElement('div');
      subItemsDiv.id              = sid;
      subItemsDiv.className       = 'notes-children notes-subbranch-items';
      subItemsDiv.dataset.branchpath = fullPath;
      subItemsDiv.style.minHeight = '8px';
      subItemsDiv.innerHTML       = notes.map(n => _notesItemHTML(n)).join('');
      subItemsDiv.addEventListener('dragover', _notesBranchDragOver);
      subItemsDiv.addEventListener('dragleave', _notesBranchDragLeave);
      subItemsDiv.addEventListener('drop', _notesBranchDrop);
      childrenDiv.appendChild(subItemsDiv);
    });

    body.appendChild(childrenDiv);
  });

  // Add root branch button
  const addRoot = document.createElement('button');
  addRoot.className   = 'notes-add-root';
  addRoot.textContent = '+ Add branch';
  addRoot.addEventListener('click', () => _notesAddBranch(null));
  body.appendChild(addRoot);

function _notesItemHTML(n) {
  const tile   = _cv().tiles.find(t => t.noteId === n.id);
  const inGrid = !!tile;
  const age    = _notesRelTime(n.updated_at);

  // (slot badge removed — row-based layout makes individual slot labels confusing)

  // Delete button — shows on hover for all notes

  const delBtn = '<button class="notes-item-del" title="Delete" ' +
    'onclick="event.stopPropagation();' + delFn + '(\'' + _esc(n.id) + '\')">✕</button>';

  return '<div class="notes-item' + (inGrid ? ' in-grid' : '') + '" draggable="true" data-noteid="' + _esc(n.id) + '">' +
    '<div class="notes-item-body">' +
    '<div class="notes-item-title">' + _esc(n.title || 'Untitled') + '</div>' +
    '<div class="notes-item-meta">' + age + '</div>' +
    '</div>' +
    delBtn +
    '</div>';
}

function _notesWireLeft() {
  document.querySelectorAll('#notes-shell [data-toggle]').forEach(el => {
    el.onclick = (e) => {
      // Don't toggle if clicking a button, contenteditable label, or input
      if (e.target?.closest?.('button, [contenteditable]')) return;
      const target = document.getElementById(el.dataset.toggle);
      if (!target) return;
      const open = target.style.display !== 'none';
      target.style.display = open ? 'none' : '';
      el.querySelector('.notes-chevron')?.classList.toggle('open', !open);
    };
  });
  document.querySelectorAll('.notes-item[data-noteid]').forEach(el => {
    el.onclick = (e) => {
      e.stopPropagation();
      const noteId = el.dataset.noteid;
      const note   = _notes.find(n => n.id === noteId);

      // Invitation or removal notification — check which type
      if (note?.entity_id && note?.is_inbox) {
        // Check if it's a removal or declined notification
        if (note.title?.includes('removed themselves from:') ||
            note.title?.includes('declined your invitation')) {
          // Show simple acknowledgment dialog
          const overlay = document.createElement('div');
          overlay.className = 'notes-invite-dialog-overlay';
          overlay.innerHTML =
            '<div class="notes-invite-dialog">' +
              '<div class="nid-header">' +
                '<div class="nid-from">Collaboration Update</div>' +
                '<div class="nid-title">' + _esc(note.title) + '</div>' +
              '</div>' +
              '<div class="nid-body">' + _esc(note.content || '') + '</div>' +
              '<div class="nid-actions">' +
                '<button class="nid-btn nid-btn-accept" id="nid-ack">OK</button>' +
              '</div>' +
            '</div>';
          document.body.appendChild(overlay);
          const dismiss = () => {
            overlay.remove();
            API.del('notes?id=eq.' + note.id).then(() => {
              _notes = _notes.filter(n => n.id !== note.id);
              _notesRenderLeft();
              if (note.entity_id && window._notesRenderPresence) {
                window._notesRenderPresence(note.entity_id);
              }
            }).catch(()=>{});
          };
          overlay.querySelector('#nid-ack').onclick = dismiss;
          overlay.addEventListener('mousedown', e => { if (e.target === overlay) dismiss(); });
          return;
        }
        // Check if already accepted
        const userId = _userId;
        if (userId) {
          API.get('note_participants?note_id=eq.' + note.entity_id + '&user_id=eq.' + userId + '&select=accepted_at&limit=1')
            .then(rows => {
              if (rows?.[0]?.accepted_at) {
                _notesOpenFloatingNote(note.entity_id, note.title?.replace(/^.+invited you to: /, '') || 'Shared Note');
              } else {
                _notesShowInviteDialog(note);
              }
            }).catch(() => _notesShowInviteDialog(note));
        } else {
          _notesShowInviteDialog(note);
        }
        return;
      }

      // Already in grid — do nothing
      if (_cv().tiles.some(t => t.noteId === noteId)) return;

      _notesOpenNote(noteId);
    };
  });
}

function _notesToggleSection(which) {
  const listId = which === 'inbox' ? 'notes-inbox-list' : which === 'library' ? 'notes-library-list' : 'notes-tree-scroll';
  const chevId = 'notes-chev-' + which;
  const el     = document.getElementById(listId);
  const chev   = document.getElementById(chevId);
  if (!el) return;
  const open = el.style.display !== 'none';
  el.style.display = open ? 'none' : '';
  chev?.classList.toggle('open', !open);
}

// ── Grid ──────────────────────────────────────────────────────────────────
function _notesRenderGrid() {
  const gridArea = document.getElementById('notes-grid-area');
  if (!gridArea) return;
  const cv   = _cv();
  const rows = cv.rows || [];
  // Clean orphaned tiles (row id doesn't exist in rows array)
  const validIds = new Set(rows.map(function(r) { return r.id; }));
  const orphaned = cv.tiles.filter(function(t) { return !validIds.has(t.row); });
  orphaned.forEach(function(t) { if (!cv.tray.includes(t.noteId)) cv.tray.push(t.noteId); });
  if (orphaned.length) cv.tiles = cv.tiles.filter(function(t) { return validIds.has(t.row); });

  gridArea.innerHTML = '';
  rows.forEach(function(row) {
    const cols   = Math.max(1, Math.min(8, row.columns || 2));
    const height = row.height || 'medium';
    const rowDiv = document.createElement('div');
    rowDiv.className = 'nre-grid-row';
    rowDiv.dataset.rowid  = row.id;
    rowDiv.dataset.height = height;
    rowDiv.style.gridTemplateColumns = 'repeat(' + cols + ', minmax(0, 1fr))';

    for (let s = 0; s < cols; s++) {
      const tile = cv.tiles.find(function(t) { return t.row === row.id && t.slot === s; });
      const note = tile ? _notes.find(function(n) { return n.id === tile.noteId; }) : null;
      const div  = document.createElement('div');
      if (note) {
        div.className = 'notes-tile' + (tile.minimized ? ' minimized' : '');
        div.setAttribute('draggable', 'true');
        div.innerHTML = _notesTileHTML(note, tile);
        div.dataset.rowid  = row.id;
        div.dataset.slot   = s;
        div.dataset.noteid = note.id;
      } else {
        div.className = 'notes-tile empty';
        div.dataset.rowid = row.id;
        div.dataset.slot  = s;
        div.innerHTML = '<span class="notes-slot-plus">+</span>';
        (function(rid, sl) { div.onclick = function() { _notesNew(rid, sl); }; })(row.id, s);
      }
      rowDiv.appendChild(div);
    }
    gridArea.appendChild(rowDiv);
  });

  _notesWireTiles();
  _notesRenderTray();
  _notesRenderViewSwitcher();
  _notesRenderRowEditor();
}

// ── Row editor bar ────────────────────────────────────────────────────────
function _notesRenderRowEditor() {
  const bar = document.getElementById('notes-row-editor');
  if (!bar) return;
  const cv      = _cv();
  const rows    = cv.rows || [];
  bar.innerHTML = '';

  rows.forEach(function(row, idx) {
    const cols     = Math.max(1, Math.min(8, row.columns || 2));
    const height   = row.height || 'medium';
    const occupied = (cv.tiles || []).some(function(t) { return t.row === row.id; });
    const seg      = document.createElement('div');
    seg.className    = 'nre-row';
    seg.dataset.rowid = row.id;
    seg.innerHTML =
      '<span class="nre-grip" title="Drag to reorder rows">⠿</span>' +
      '<span class="nre-label">R' + (idx + 1) + '</span>' +
      '<div class="nre-stepper">' +
        '<button class="nre-step-btn" data-action="col-dec" data-rowid="' + row.id + '"' + (cols <= 1 ? ' disabled' : '') + '>−</button>' +
        '<span class="nre-col-val">' + cols + '</span>' +
        '<button class="nre-step-btn" data-action="col-inc" data-rowid="' + row.id + '"' + (cols >= 8 ? ' disabled' : '') + '>+</button>' +
      '</div>' +
      '<select class="nre-height-sel" data-action="height" data-rowid="' + row.id + '">' +
        ['small','medium','large','auto'].map(function(h) {
          return '<option value="' + h + '"' + (h === height ? ' selected' : '') + '>' + h[0].toUpperCase() + h.slice(1) + '</option>';
        }).join('') +
      '</select>' +
      '<button class="nre-del" data-action="del-row" data-rowid="' + row.id + '"' +
        (occupied ? ' disabled title="Move or close tiles first"' : ' title="Remove row"') + '>×</button>';
    bar.appendChild(seg);
  });

  const addBtn = document.createElement('button');
  addBtn.className   = 'nre-add-row';
  addBtn.textContent = '+ Add row';
  addBtn.disabled    = rows.length >= 8;
  addBtn.title       = rows.length >= 8 ? 'Maximum 8 rows' : 'Add a new row';
  addBtn.onclick     = _notesAddRow;
  bar.appendChild(addBtn);

  bar.querySelectorAll('[data-action]').forEach(function(el) {
    const action = el.dataset.action;
    const rowId  = el.dataset.rowid;
    if (action === 'col-dec') el.onclick  = function() { _notesRowSetCols(rowId, -1); };
    if (action === 'col-inc') el.onclick  = function() { _notesRowSetCols(rowId,  1); };
    if (action === 'height')  el.onchange = function() { _notesRowSetHeight(rowId, el.value); };
    if (action === 'del-row') el.onclick  = function() { _notesRowDelete(rowId); };
  });

  _notesWireRowDrag(bar);
}

function _notesRowSetCols(rowId, delta) {
  const cv  = _cv();
  const row = cv.rows.find(function(r) { return r.id === rowId; });
  if (!row) return;
  const newCols = Math.max(1, Math.min(8, (row.columns || 2) + delta));
  if (newCols === row.columns) return;
  if (newCols < (row.columns || 2)) {
    const displaced = cv.tiles.filter(function(t) { return t.row === rowId && t.slot >= newCols; });
    displaced.forEach(function(t) { if (!cv.tray.includes(t.noteId)) cv.tray.push(t.noteId); });
    cv.tiles = cv.tiles.filter(function(t) { return !(t.row === rowId && t.slot >= newCols); });
  }
  row.columns = newCols;
  _notesSaveWorkspace(true);
  _notesRenderGrid();
}

function _notesRowSetHeight(rowId, height) {
  const row = _cv().rows.find(function(r) { return r.id === rowId; });
  if (row) { row.height = height; _notesSaveWorkspace(false); _notesRenderGrid(); }
}

function _notesAddRow() {
  const cv = _cv();
  if ((cv.rows || []).length >= 8) return;
  cv.rows.push({ id: 'row' + Date.now(), columns: 2, height: 'medium' });
  _notesSaveWorkspace(true);
  _notesRenderGrid();
}

function _notesRowDelete(rowId) {
  const cv = _cv();
  if ((cv.tiles || []).some(function(t) { return t.row === rowId; })) return;
  cv.rows = cv.rows.filter(function(r) { return r.id !== rowId; });
  if (cv.rows.length === 0) cv.rows.push({ id: 'row0', columns: 2, height: 'medium' });
  _notesSaveWorkspace(true);
  _notesRenderGrid();
}

function _notesWireRowDrag(bar) {
  // Create insertion indicator bar
  const indicator = document.createElement('div');
  indicator.style.cssText = 'width:2px;background:#00D2FF;height:28px;border-radius:1px;flex-shrink:0;display:none;box-shadow:0 0 6px rgba(0,210,255,.6)';
  indicator.id = 'nre-indicator';

  bar.querySelectorAll('.nre-grip').forEach(function(grip) {
    grip.style.cursor = 'grab';
    grip.addEventListener('mousedown', function(e) {
      const seg = grip.closest('.nre-row');
      if (!seg) return;
      e.preventDefault();
      e.stopPropagation();

      const dragging = seg.dataset.rowid;
      seg.style.opacity = '0.5';
      indicator.style.display = 'block';
      bar.appendChild(indicator); // start at end

      function getSorted() {
        return Array.from(bar.querySelectorAll('.nre-row'));
      }

      function onMove(ev) {
        const els = getSorted();
        // Find insertion point based on mouse X
        let insertBefore = null;
        for (const el of els) {
          if (el.dataset.rowid === dragging) continue;
          const r = el.getBoundingClientRect();
          if (ev.clientX < r.left + r.width / 2) {
            insertBefore = el;
            break;
          }
        }
        // Position indicator
        if (insertBefore) {
          bar.insertBefore(indicator, insertBefore);
        } else {
          // After last non-dragging element
          const last = els.filter(el => el.dataset.rowid !== dragging).pop();
          if (last) last.after ? last.after(indicator) : bar.appendChild(indicator);
          else bar.appendChild(indicator);
        }
      }

      function onUp(ev) {
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
        seg.style.opacity = '';
        indicator.style.display = 'none';

        // Read insertion point from indicator position
        const cv      = _cv();
        const rowMap  = {};
        cv.rows.forEach(function(r) { rowMap[r.id] = r; });

        // Build new order: all rows in DOM order, indicator marks where dragged row goes
        const allSegs = Array.from(bar.children); // includes indicator
        const newOrder = [];
        let draggedRow = rowMap[dragging];
        for (const el of allSegs) {
          if (el === indicator) { if (draggedRow) newOrder.push(draggedRow); }
          else if (el.dataset && el.dataset.rowid && el.dataset.rowid !== dragging) {
            const r = rowMap[el.dataset.rowid];
            if (r) newOrder.push(r);
          }
        }
        // Remove indicator from bar
        if (indicator.parentNode === bar) bar.removeChild(indicator);

        if (newOrder.length === cv.rows.length) {
          cv.rows = newOrder;
          _notesSaveWorkspace(true);
          _notesRenderGrid();
        }
      }

      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });
  });
}

function _notesSetGrid(size, btn) { /* no-op — replaced by row editor */ }

function _notesOpenNote(noteId) {
  const cv       = _cv();
  const validIds = new Set((cv.rows || []).map(r => r.id));

  // Clean any orphaned tiles for this note before checking
  const orphaned = cv.tiles.filter(t => t.noteId === noteId && !validIds.has(t.row));
  if (orphaned.length) {
    cv.tiles = cv.tiles.filter(t => !(t.noteId === noteId && !validIds.has(t.row)));
  }

  // Already in grid with valid row — scroll to it
  if (cv.tiles.some(t => t.noteId === noteId && validIds.has(t.row))) {
    const tileEl = document.querySelector('.notes-tile[data-noteid="' + noteId + '"]');
    if (tileEl) tileEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    return;
  }
  // Remove from tray if it was there
  cv.tray = cv.tray.filter(id => id !== noteId);

  // Find first empty {row, slot}
  const rows  = cv.rows || [];
  let placed  = false;
  for (const row of rows) {
    const cols = Math.max(1, Math.min(8, row.columns || 2));
    for (let s = 0; s < cols; s++) {
      if (!cv.tiles.some(t => t.row === row.id && t.slot === s)) {
        cv.tiles.push({ row: row.id, slot: s, noteId, chatOpen: false });
        placed = true; break;
      }
    }
    if (placed) break;
  }
  if (!placed) {
    // Grid full — displace first tile of first row to tray
    const first = rows[0];
    if (first) {
      const displaced = cv.tiles.find(t => t.row === first.id && t.slot === 0);
      if (displaced) cv.tray.push(displaced.noteId);
      cv.tiles = cv.tiles.filter(t => !(t.row === first.id && t.slot === 0));
      cv.tiles.push({ row: first.id, slot: 0, noteId, chatOpen: false });
    }
  }

  _notesSaveWorkspace(true);
  _notesRenderGrid();
  _notesRenderLeft();
}

async function _notesCloseTile(noteId) {
  _cv().tiles = _cv().tiles.filter(t => t.noteId !== noteId);
  _cv().tray  = _cv().tray.filter(id => id !== noteId);
  _notesSaveWorkspace(true);
  _notesRenderGrid();
  _notesRenderLeft();

  // If this is a shared note (we're a participant, not owner), notify the owner
  try {
    // Check if we own this note
    const noteRows = await API.get('notes?id=eq.' + noteId + '&select=owner_user_id,title&limit=1').catch(()=>[]);
    const noteOwnerUserId = noteRows?.[0]?.owner_user_id;
    const noteName        = noteRows?.[0]?.title || _notes.find(n => n.id === noteId)?.title || 'a note';
    const selfUserId      = _userId;

    // If we own it, no notification needed
    if (!noteOwnerUserId || noteOwnerUserId === selfUserId) return;

    const myName = window._notesResource?.name || 'Someone';

    await API.post('notes', {
      firm_id:        FIRM_ID,
      owner_user_id:  noteOwnerUserId,
      title:          myName + ' removed themselves from: ' + noteName,
      content:        myName + ' has removed the shared note "' + noteName + '" from their workspace.',
      hierarchy_path: 'Inbox',
      is_inbox:       true,
      entity_id:      noteId,
      entity_type:    null,
      created_at:     new Date().toISOString(),
      updated_at:     new Date().toISOString(),
    });

    // Remove self from note_participants if present
    await API.del('note_participants?note_id=eq.' + noteId + '&user_id=eq.' + selfUserId).catch(()=>{});
  } catch(e) { console.warn('[Compass] Close notification error:', e); }
}

function _notesToggleChat(noteId) {
  const tile = _cv().tiles.find(t => t.noteId === noteId);
  if (!tile) return;
  tile.chatOpen = !tile.chatOpen;
  const chatEl = document.getElementById('notes-chat-' + noteId);
  if (chatEl) {
    chatEl.classList.toggle('hidden', !tile.chatOpen);
    if (tile.chatOpen) _notesLoadAndRenderMsgs(noteId);
  }
  // Update SVG icon fill and opacity
  const tileEl = document.querySelector('.notes-tile[data-noteid="' + noteId + '"]');
  if (tileEl) {
    const btn  = tileEl.querySelector('[title="Toggle chat"]');
    const path = btn?.querySelector('path');
    if (btn)  btn.style.opacity = tile.chatOpen ? '1' : '.4';
    if (path) path.setAttribute('fill', tile.chatOpen ? 'rgba(0,210,255,.2)' : 'none');
  }
  _notesSaveWorkspace();
}

async function _notesNew(rowId, slot) {
  if (!_userId) return;
  try {
    const res = await API.post('notes', {
      firm_id:       FIRM_ID,
      owner_user_id: _userId,
      title:         'New note',
      content:       '',
      hierarchy_path:'Work',
      is_inbox:      false,
      created_at:    new Date().toISOString(),
      updated_at:    new Date().toISOString(),
    });
    const newNote = res?.[0];
    if (!newNote?.id) return;
    _notes.unshift(newNote);
    if (rowId && typeof slot === 'number') {
      // Place in specific row+slot, displacing any existing tile to tray
      const cv = _cv();
      const existing = cv.tiles.find(t => t.row === rowId && t.slot === slot);
      if (existing) { cv.tray.push(existing.noteId); cv.tiles = cv.tiles.filter(t => !(t.row === rowId && t.slot === slot)); }
      cv.tiles.push({ row: rowId, slot, noteId: newNote.id, chatOpen: false });
    } else {
      _notesOpenNote(newNote.id);
    }
    _notesSaveWorkspace();
    _notesRenderLeft();
    _notesRenderGrid();
    setTimeout(() => {
      const titleEl = document.querySelector('[data-noteid="' + newNote.id + '"].notes-tile-title');
      if (titleEl) { titleEl.focus(); document.execCommand('selectAll', false, null); }
    }, 50);
  } catch(e) { console.error('[Compass] New note error:', e); }
}

// ── Save handlers ─────────────────────────────────────────────────────────
let _contentTimers = {};

function _notesSaveContent(el) {
  const noteId = el.dataset.noteid;
  if (!noteId) return;
  const note = _notes.find(n => n.id === noteId);
  if (note) note.content = el.value;
  // Track when user last typed for sync collision avoidance
  _lastTyped[noteId] = Date.now();
  clearTimeout(_contentTimers[noteId]);
  _contentTimers[noteId] = setTimeout(async () => {
    try {
      await API.patch('notes?id=eq.' + noteId, { content: el.value, updated_at: new Date().toISOString() });
    } catch(e) { console.error('[Compass] Note save error:', e); }
  }, 1200);
}

function _notesSaveTitle(el) {
  const noteId = el.dataset.noteid;
  if (!noteId) return;
  const newTitle = el.textContent.trim() || 'Untitled';
  el.textContent = newTitle;

  if (note) note.title = newTitle;
  API.patch('notes?id=eq.' + noteId, { title: newTitle, updated_at: new Date().toISOString() }).catch(()=>{});

// ── Search ────────────────────────────────────────────────────────────────
function _notesSearch(q) {
  const query = q.toLowerCase().trim();
  document.querySelectorAll('.notes-item[data-noteid]').forEach(el => {
    const n = _notes.find(x => x.id === el.dataset.noteid);
    if (!n) return;
    const hay = [n.title, n.content, n.hierarchy_path].filter(Boolean).join(' ').toLowerCase();
    el.style.display = (!query || hay.includes(query)) ? '' : 'none';
  });

// ── Helpers ───────────────────────────────────────────────────────────────
function _notesRelTime(iso) {
  if (!iso) return '';
  const diff = Date.now() - new Date(iso).getTime();
  const m = Math.floor(diff / 60000);
  if (m < 1)  return 'just now';
  if (m < 60) return m + 'm ago';
  const h = Math.floor(m / 60);
  if (h < 24) return h + 'h ago';
  const d = Math.floor(h / 24);
  if (d < 7)  return d + 'd ago';
  return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function _esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Invitation accept/reject dialog ──────────────────────────────────────
async function _notesShowInviteDialog(inviteNote) {
  const titleMatch  = (inviteNote.title || '').match(/^(.+?) invited you to: (.+)$/);
  const inviterName = titleMatch?.[1] || 'Someone';
  const noteName    = titleMatch?.[2] || 'a note';
  const sharedNoteId = inviteNote.entity_id;

  const overlay = document.createElement('div');
  overlay.className = 'notes-invite-dialog-overlay';
  overlay.innerHTML =
    '<div class="notes-invite-dialog">' +
      '<div class="nid-header">' +
        '<div class="nid-from">Collaboration Invitation</div>' +
        '<div class="nid-title">' + _esc(inviterName) + ' invited you to collaborate</div>' +
        '<div class="nid-note-name">✎ ' + _esc(noteName) + '</div>' +
      '</div>' +
      '<div class="nid-body">' +
        _esc(inviterName) + ' has shared this note with you.' +
        '<br><br>Accepting will open a live view of the shared note in a floating window. You can then drag it into any grid tile.' +
        '<br><br>Declining will leave this invitation in your inbox.' +
      '</div>' +
      '<div class="nid-actions">' +
        '<button class="nid-btn nid-btn-reject" id="nid-reject">✕ Decline</button>' +
        '<button class="nid-btn nid-btn-accept" id="nid-accept">✓ Accept &amp; Open →</button>' +
      '</div>' +
    '</div>';

  document.body.appendChild(overlay);
  overlay.addEventListener('mousedown', e => { if (e.target === overlay) overlay.remove(); });

  overlay.querySelector('#nid-reject').onclick = async () => {
    overlay.remove();
    // Delete the invitation from Alan's inbox
    try {
      await API.del('notes?id=eq.' + inviteNote.id);
      _notes = _notes.filter(n => n.id !== inviteNote.id);
      _notesRenderLeft();
    } catch(e) {}
    // Remove Alan from note_participants so avatar disappears from Vaughn's view
    try {
      const userId = window._notesResource?.user_id;
      if (userId) {
        await API.del('note_participants?note_id=eq.' + sharedNoteId + '&user_id=eq.' + userId);
      }
    } catch(e) {}
    // Notify Vaughn — try participants table first, fall back to notes.owner_user_id
    try {
      let ownerUserId = null;
      const parts = await API.get('note_participants?note_id=eq.' + sharedNoteId + '&role=eq.owner&limit=1').catch(()=>[]);
      ownerUserId = parts?.[0]?.user_id;
      if (!ownerUserId) {
        const noteRows = await API.get('notes?id=eq.' + sharedNoteId + '&select=owner_user_id&limit=1').catch(()=>[]);
        ownerUserId = noteRows?.[0]?.owner_user_id;
      }
      if (ownerUserId) {
        const myName = window._notesResource?.name || 'Someone';
        await API.post('notes', {
          firm_id: FIRM_ID, owner_user_id: ownerUserId,
          title:   myName + ' declined your invitation to: ' + noteName,
          content: myName + ' has declined your invitation to collaborate on "' + noteName + '".',
          hierarchy_path: 'Inbox', is_inbox: true,
          entity_id: sharedNoteId, entity_type: null,
          created_at: new Date().toISOString(), updated_at: new Date().toISOString(),
        });
      }
    } catch(e) { console.warn('[Compass] Rejection notification failed:', e); }
  };

  overlay.querySelector('#nid-accept').onclick = async () => {
    overlay.remove();
    // Update inbox invitation title to match the actual note title
    try {
      const noteRows = await API.get('notes?id=eq.' + sharedNoteId + '&select=title&limit=1').catch(()=>[]);
      const sharedTitle = noteRows?.[0]?.title;
      if (sharedTitle && inviteNote.id) {
        await API.patch('notes?id=eq.' + inviteNote.id, {
          title:      sharedTitle,
          updated_at: new Date().toISOString(),
        });
        const local = _notes.find(n => n.id === inviteNote.id);
        if (local) local.title = sharedTitle;
        _notesRenderLeft();
      }
    } catch(e) {}
    // Keep invitation in inbox as persistent pointer — clicking it reopens the float
    // Mark participant as accepted — upsert in case row was removed
    try {
      const userId     = window._notesResource?.user_id;
      const resourceId = window._notesResource?.id || null;
      if (userId) {
        // Check if row exists first
        const existing = await API.get(
          'note_participants?note_id=eq.' + sharedNoteId + '&user_id=eq.' + userId + '&limit=1'
        ).catch(()=>[]);
        if (existing?.length) {
          await API.patch(
            'note_participants?note_id=eq.' + sharedNoteId + '&user_id=eq.' + userId,
            { accepted_at: new Date().toISOString() }
          );
        } else {
          // Row was deleted — recreate it
          await API.post('note_participants', {
            note_id:      sharedNoteId,
            user_id:      userId,
            resource_id:  resourceId,
            role:         'participant',
            color:        '#00D2FF',
            invited_at:   new Date().toISOString(),
            accepted_at:  new Date().toISOString(),
            last_seen_at: null,
          });
        }
      }
    } catch(e) { console.warn('[Compass] Accept participant error:', e); }
    await _notesOpenFloatingNote(sharedNoteId, noteName);
  };
}

// ── Floating shared note window ───────────────────────────────────────────
async function _notesOpenFloatingNote(noteId, noteName) {
  let note = _notes.find(n => n.id === noteId);
  if (!note) {
    const rows = await API.get('notes?id=eq.' + noteId + '&limit=1').catch(()=>[]);
    note = rows?.[0];
    if (note) _notes.push(note);
  }
  if (!note) { alert('Could not load the shared note. It may have been deleted.'); return; }

  const win = document.createElement('div');
  win.className = 'notes-float-window';
  win.style.cssText = 'top:80px;left:calc(50% - 260px)';
  win.dataset.noteId = noteId;

  win.innerHTML =
    '<div class="notes-float-titlebar" id="nfw-tb-' + _esc(noteId) + '">' +
      '<div class="notes-float-label">SHARED NOTE</div>' +
      '<span style="font-family:var(--font-ui,\'Barlow Condensed\',sans-serif);font-size:13px;font-weight:600;color:var(--text0,#F0F6FF);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + _esc(note.title || noteName) + '</span>' +
      '<span class="notes-float-hint">drag title bar to move</span>' +
    '<button class="notes-float-close" onclick="_notesFloatClose(\'' + _esc(noteId) + '\',this)">✕</button>' +
    '</div>' +
    '<div class="notes-float-body">' +
      '<textarea class="notes-tile-canvas" data-noteid="' + _esc(noteId) + '" ' +
        'placeholder="Start writing…" oninput="_notesSaveContent(this)">' + _esc(note.content || '') + '</textarea>' +
    '</div>' +
    '<div style="padding:5px 12px;border-top:1px solid rgba(0,210,255,.08);flex-shrink:0">' +
      '<span style="font-family:var(--font-mono,monospace);font-size:10px;color:var(--text3)">Drag title bar to move · Close to return to inbox</span>' +
    '</div>';

  document.body.appendChild(win);
  _notesWireFloatDrag(win, win.querySelector('#nfw-tb-' + noteId));

  // Start presence heartbeat for this shared note so others can see activity
  console.log('[Compass] Float open: starting presence for', noteId, 'fn:', typeof window._notesStartPresence);
  if (window._notesStartPresence) {
    window._notesStartPresence(noteId);
    console.log('[Compass] Presence started');
  } else {
    console.warn('[Compass] _notesStartPresence not available yet');
    // Retry after collab script has run
    setTimeout(() => {
      if (window._notesStartPresence) window._notesStartPresence(noteId);
    }, 500);
  }

  // Stop presence when window is closed
  // Wire close button directly
  const closeBtn = win.querySelector('.notes-float-close');
  if (closeBtn) {
    closeBtn.removeAttribute('onclick');
    closeBtn.addEventListener('click', () => {
      // Don't stop presence — keep heartbeat running so avatar stays active in owner's view
      _notesFloatClose(noteId, closeBtn);
    });
  }
}

function _notesFloatClose(noteId, btn) {
  const win = btn?.closest?.('.notes-float-window') || document.querySelector('.notes-float-window');
  if (win) win.remove();
  // Add shared note to tray so it persists and can be dragged to grid
  if (noteId && !_cv().tiles.some(t => t.noteId === noteId)) {
    if (!_cv().tray.includes(noteId)) {
      _cv().tray.push(noteId);
      _notesSaveWorkspace(true);
      _notesRenderTray();
    }
  }
}
window._notesFloatClose = _notesFloatClose;

function _notesAddFloatToGrid(noteId, winEl) {
  if (winEl) winEl.remove();
  _notesOpenNote(noteId);
}

function _notesWireFloatDrag(win, handle) {
  if (!handle) return;
  let dragging = false, ox = 0, oy = 0;
  handle.addEventListener('mousedown', e => {
    dragging = true;
    win.style.transform = 'none';
    const r = win.getBoundingClientRect();
    win.style.left = r.left + 'px';
    win.style.top  = r.top  + 'px';
    ox = e.clientX - r.left;
    oy = e.clientY - r.top;
    e.preventDefault();
  });
  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    win.style.left = Math.max(0, Math.min(window.innerWidth  - win.offsetWidth,  e.clientX - ox)) + 'px';
    win.style.top  = Math.max(0, Math.min(window.innerHeight - win.offsetHeight, e.clientY - oy)) + 'px';
  });
  document.addEventListener('mouseup', () => { dragging = false; });
}

window._notesAddFloatToGrid    = _notesAddFloatToGrid;
window._notesDeleteInboxNote   = _notesDeleteInboxNote;

function _notesLaunchTemplate(name) {
  const tpl = (_workspace.library || {})[name];
  if (!tpl) return;
  const base = name + ' \u2014 ' + new Date().toLocaleDateString();
  let viewName = base; let idx = 2;
  while (_workspace.views[viewName]) { viewName = base + ' (' + idx++ + ')'; }
  _workspace.views[viewName] = {
    rows: JSON.parse(JSON.stringify(tpl.rows || [])),
    tiles: JSON.parse(JSON.stringify(tpl.tiles || [])),
    tray: [], clonedFrom: name, createdAt: new Date().toISOString(),
  };
  _workspace.activeView = viewName;
  _notesSaveWorkspace(true);
  _notesRenderGrid(); _notesRenderLeft(); _notesRenderViewSwitcher();
}
