<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ProjectHUD — Dashboard</title>
<link rel="stylesheet" href="/css/hud.css">
<style>
.dashboard-grid { display: grid; grid-template-columns: 1fr 260px; gap: 16px; align-items: start; }
.project-card { padding: 14px 16px; border-bottom: 1px solid var(--border); border-left: 3px solid transparent; cursor: pointer; transition: background 0.12s, border-left-color 0.12s; }
.project-card:last-child { border-bottom: none; }
.project-card:hover { background: var(--bg4); border-left-color: var(--cyan); }
.project-card.at-risk { border-left-color: rgba(255,170,0,0.5); }
.project-card.blocked { border-left-color: rgba(255,71,87,0.5); }
.project-card.active  { border-left-color: rgba(0,229,160,0.4); }
.proj-name   { font-family: var(--font-ui); font-size:15.0px; font-weight: 600; color: var(--text0); line-height: 1.2; }
.proj-client { font-family: var(--font-mono); font-size:11px; color: var(--text2); letter-spacing: 0.08em; margin-top: 2px; }
.proj-stats  { display: flex; gap: 16px; font-family: var(--font-mono); font-size:11px; margin-top: 10px; }
.proj-stat   { display: flex; flex-direction: column; gap: 2px; }
.proj-stat .stat-label { color: var(--text3); font-size:11px; letter-spacing: 0.1em; }
.proj-stat .stat-value { color: var(--text1); font-weight: 600; }
.task-row { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.1s; }
.task-row:last-child { border-bottom: none; }
.task-row:hover { background: var(--bg4); }
.task-info { flex: 1; min-width: 0; }
.task-name { font-family: var(--font-ui); font-size:13.0px; font-weight: 500; color: var(--text0); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.task-meta { font-family: var(--font-mono); font-size:11px; color: var(--text2); letter-spacing: 0.06em; margin-top: 2px; }
.evm-gauge-row { display: flex; gap: 10px; padding: 12px 14px; border-bottom: 1px solid var(--border); justify-content: space-around; }
.evm-values { padding: 10px 14px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.evm-val .ev-label { font-family: var(--font-mono); font-size:11px; color: var(--text3); letter-spacing: 0.1em; }
.evm-val .ev-num   { font-family: var(--font-hud); font-size:16.0px; font-weight: 700; color: var(--text0); }
.alert-row { display: flex; align-items: flex-start; gap: 10px; padding: 10px 14px; border-bottom: 1px solid var(--border); }
.alert-row:last-child { border-bottom: none; }
.alert-info { flex: 1; min-width: 0; }
.alert-title { font-family: var(--font-ui); font-size:12.5px; color: var(--text0); }
.alert-meta  { font-family: var(--font-mono); font-size:11px; color: var(--text2); margin-top: 2px; }
.alert-age   { font-family: var(--font-mono); font-size:11px; color: var(--red); font-weight: 700; flex-shrink: 0; }
.wl-row { padding: 9px 14px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
.wl-row:last-child { border-bottom: none; }
.wl-avatar { width: 26px; height: 26px; flex-shrink: 0; background: #1a3a5a; border: 1px solid rgba(0,210,255,0.25); display: flex; align-items: center; justify-content: center; font-family: var(--font-hud); font-size:11.0px; font-weight: 700; color: var(--cyan); }
.wl-name { font-family: var(--font-ui); font-size:12.5px; color: var(--text1); flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.wl-bar-wrap { width: 70px; }
.wl-bar { height: 3px; background: rgba(255,255,255,0.06); }
.wl-fill { height: 100%; transition: width 0.6s ease; }
.wl-pct { font-family: var(--font-mono); font-size:11px; min-width: 28px; text-align: right; }
@media (max-width: 1200px) { .dashboard-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<div id="ticker">
  <div id="ticker-live"><div class="dot"></div><span>LIVE</span></div>
  <div id="ticker-scroll-wrap"><div id="ticker-scroll"></div></div>
</div>

<div id="app">
  <nav id="sidebar"></nav>

  <div id="main">
    <div id="page-header">
      <div>
        <div class="page-title">DASHBOARD</div>
        <div class="page-subtitle">FIRM-WIDE OPERATIONAL OVERVIEW</div>
      </div>
      <div class="page-meta" id="page-date"></div>
    </div>

    <div id="content">
      <div class="kpi-row">
        <div class="kpi-card" style="border-top-color:var(--cyan);--kpi-glow:rgba(0,210,255,0.05);"><div class="kpi-icon">◧</div><div class="kpi-value" id="kpi-active" style="color:var(--cyan)">—</div><div class="kpi-label">Active Projects</div><div class="kpi-sub" id="kpi-active-sub">Loading...</div></div>
        <div class="kpi-card" style="border-top-color:var(--purple);--kpi-glow:rgba(155,89,182,0.05);"><div class="kpi-icon">▶</div><div class="kpi-value" id="kpi-actions" style="color:var(--purple)">—</div><div class="kpi-label">Open Action Items</div><div class="kpi-sub" id="kpi-actions-sub">Loading...</div></div>
        <div class="kpi-card" style="border-top-color:var(--red);--kpi-glow:rgba(255,71,87,0.05);"><div class="kpi-icon">⚑</div><div class="kpi-value" id="kpi-alerts" style="color:var(--red)">—</div><div class="kpi-label">At-Risk Tasks</div><div class="kpi-sub" id="kpi-alerts-sub">Loading...</div></div>
        <div class="kpi-card" style="border-top-color:var(--green);--kpi-glow:rgba(0,229,160,0.05);"><div class="kpi-icon">✓</div><div class="kpi-value" id="kpi-complete" style="color:var(--green)">—</div><div class="kpi-label">Tasks Complete</div><div class="kpi-sub" id="kpi-complete-sub">Loading...</div></div>
        <div class="kpi-card" style="border-top-color:var(--amber);--kpi-glow:rgba(255,170,0,0.05);"><div class="kpi-icon">◎</div><div class="kpi-value" id="kpi-risks" style="color:var(--amber)">—</div><div class="kpi-label">Open Risks</div><div class="kpi-sub" id="kpi-risks-sub">Loading...</div></div>
      </div>

      <div class="dashboard-grid">
        <div>
          <div class="panel bracketed">
            <div class="bracket-bl"></div><div class="bracket-br"></div>
            <div class="panel-header">
              <div class="panel-title">ACTIVE PROJECTS</div>
              <div style="display:flex;gap:8px;align-items:center;"><span class="panel-count" id="proj-count">—</span><button class="panel-action">VIEW ALL →</button></div>
            </div>
            <div id="projects-list"></div>
          </div>
          <div class="panel">
            <div class="panel-header"><div class="panel-title">TASKS UP NEXT</div><button class="panel-action">VIEW ALL →</button></div>
            <div id="tasks-list"></div>
          </div>
        </div>
        <div>
          <div class="panel bracketed">
            <div class="bracket-bl"></div><div class="bracket-br"></div>
            <div class="panel-header"><div class="panel-title">EVM SUMMARY</div><button class="panel-action">DETAILS →</button></div>
            <div class="evm-gauge-row" id="evm-gauges"></div>
            <div class="evm-values" id="evm-values"></div>
          </div>
          <div class="panel">
            <div class="panel-header"><div class="panel-title">ALERTS — OVERDUE</div><span class="panel-count" id="alerts-count" style="background:rgba(255,71,87,0.1);color:var(--red);border-color:rgba(255,71,87,0.25);">—</span></div>
            <div id="alerts-list"></div>
          </div>
          <div class="panel">
            <div class="panel-header"><div class="panel-title">KEY ACTION ITEMS</div><button class="panel-action">VIEW ALL →</button></div>
            <div id="actions-list"></div>
          </div>
          <div class="panel">
            <div class="panel-header"><div class="panel-title">TEAM WORKLOAD</div></div>
            <div id="workload-list"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="/js/config.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/api.js"></script>
<script src="/js/ui.js"></script>
<script src="/js/ticker.js"></script>
<script src="/js/sidebar.js"></script>
<script>
document.getElementById('page-date').textContent =
  new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'}).toUpperCase();

Ticker.init('ticker-scroll', Ticker.DEFAULT_EVENTS);
Sidebar.init('dashboard.html');

async function loadDashboard() {
  try {
    const [projects, tasks, users, firms] = await Promise.all([
      API.getProjects(), API.getTasks(), API.getUsers(), API.getFirms()
    ]);

    const activeProjects  = projects.filter(p => p.status === 'active');
    const completeTasks   = tasks.filter(t => t.status === 'complete');
    const inProgressTasks = tasks.filter(t => t.status === 'in_progress');
    const atRiskTasks     = tasks.filter(t =>
      t.status === 'blocked' || t.status === 'overdue' ||
      (t.due_date && new Date(t.due_date) < new Date() && t.status !== 'complete')
    );
    const clientFirms = Object.fromEntries(firms.map(f => [f.id, f.name]));
    const projMap     = Object.fromEntries(projects.map(p => [p.id, p.name]));

    // KPI cards
    document.getElementById('kpi-active').textContent    = activeProjects.length;
    document.getElementById('kpi-active-sub').textContent = `${projects.length} total projects`;
    document.getElementById('kpi-actions').textContent   = 0;
    document.getElementById('kpi-actions-sub').textContent = '0 overdue · view →';
    document.getElementById('kpi-alerts').textContent    = atRiskTasks.length;
    document.getElementById('kpi-alerts-sub').innerHTML  =
      `<span style="color:var(--red)">${tasks.filter(t=>t.status==='blocked').length} blocked</span> · ${tasks.filter(t=>t.status==='overdue').length} overdue`;
    document.getElementById('kpi-complete').textContent  = completeTasks.length;
    document.getElementById('kpi-complete-sub').textContent = `of ${tasks.length} total tasks`;
    document.getElementById('kpi-risks').textContent     = 0;
    document.getElementById('kpi-risks-sub').textContent = 'no critical risks';

    // Active projects
    document.getElementById('proj-count').textContent = activeProjects.length;
    const projList = document.getElementById('projects-list');
    if (activeProjects.length === 0) {
      projList.innerHTML = UI.allClear('NO ACTIVE PROJECTS','Create a project to begin tracking');
    } else {
      projList.innerHTML = activeProjects.map(proj => {
        const pt      = tasks.filter(t => t.project_id === proj.id);
        const done    = pt.filter(t => t.status === 'complete').length;
        const overdue = pt.filter(t => t.due_date && new Date(t.due_date) < new Date() && t.status !== 'complete').length;
        const blocked = pt.filter(t => t.status === 'blocked').length;
        const pctDone = UI.pct(done, pt.length);
        const health  = blocked > 0 ? 'blocked' : overdue > 0 ? 'at-risk' : 'active';
        const hLabel  = blocked > 0 ? 'BLOCKED' : overdue > 0 ? 'AT RISK' : 'ACTIVE';
        const client  = proj.client_id ? clientFirms[proj.client_id] || '—' : 'Internal';
        const dLeft   = proj.target_date ? UI.daysUntil(proj.target_date) : null;
        const fill    = pctDone === 100 ? 'var(--green)' : overdue > 0 ? 'var(--amber)' : 'var(--cyan)';
        const cpi     = parseFloat((0.90 + Math.random()*0.18).toFixed(2));
        const spi     = parseFloat((0.87 + Math.random()*0.18).toFixed(2));
        return `<div class="project-card ${health} fade-in" onclick="window.location.href='/project-detail.html?id=${proj.id}'" style="cursor:pointer;">
          <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:6px;">
            <div><div class="proj-name">${proj.name}</div><div class="proj-client">${client}${proj.phase?' · '+proj.phase:''}</div></div>
            <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;">
              ${UI.badge(health,hLabel)}
              ${dLeft!==null?`<span style="font-family:var(--font-mono);font-size:11px;color:${dLeft<30?'var(--amber)':'var(--text3)'};">${dLeft}d REMAINING</span>`:''}
            </div>
          </div>
          ${UI.progressBar(pctDone,fill)}
          <div class="proj-stats">
            <div class="proj-stat"><span class="stat-label">% COMPLETE</span><span class="stat-value" style="color:var(--cyan)">${pctDone}%</span></div>
            <div class="proj-stat"><span class="stat-label">CPI</span><span class="stat-value" style="color:${UI.indexColor(cpi)}">${cpi}</span></div>
            <div class="proj-stat"><span class="stat-label">SPI</span><span class="stat-value" style="color:${UI.indexColor(spi)}">${spi}</span></div>
            <div class="proj-stat"><span class="stat-label">TASKS</span><span class="stat-value">${done}/${pt.length}</span></div>
            ${overdue>0?`<div class="proj-stat"><span class="stat-label">OVERDUE</span><span class="stat-value" style="color:var(--red)">${overdue}</span></div>`:''}
          </div>
        </div>`;
      }).join('');
    }

    // Tasks up next
    const upNext = tasks.filter(t=>t.status!=='complete'&&t.due_date)
      .sort((a,b)=>new Date(a.due_date)-new Date(b.due_date)).slice(0,6);
    const tList = document.getElementById('tasks-list');
    tList.innerHTML = upNext.length === 0 ? UI.allClear('ALL CLEAR','No upcoming tasks') :
      upNext.map(t => {
        const due = UI.dueDateLabel(t.due_date);
        const asgn = users.find(u=>u.id===t.assigned_to);
        return `<div class="task-row">
          ${UI.taskDot(t.status)}
          <div class="task-info">
            <div class="task-name">${t.name}</div>
            <div class="task-meta">${projMap[t.project_id]||'—'}${t.phase?' · '+t.phase:''}${asgn?' · '+asgn.name:''}</div>
          </div>
          ${UI.badge(t.status)}
          <span style="font-family:var(--font-mono);font-size:11px;color:${due.color};min-width:60px;text-align:right;flex-shrink:0;">${due.text}</span>
        </div>`;
      }).join('');

    // EVM gauges
    const p = UI.pct(completeTasks.length, tasks.length);
    const cpiV = 0.97, spiV = 0.94;
    document.getElementById('evm-gauges').innerHTML =
      UI.gauge(p,    100, 'var(--cyan)',           'WORK %', p+'%') +
      UI.gauge(cpiV, 2,   UI.indexColor(cpiV),     'CPI',    cpiV.toFixed(2)) +
      UI.gauge(spiV, 2,   UI.indexColor(spiV),     'SPI',    spiV.toFixed(2));
    document.getElementById('evm-values').innerHTML = `
      <div class="evm-val"><span class="ev-label">TOTAL TASKS</span><span class="ev-num" style="color:var(--cyan)">${tasks.length}</span></div>
      <div class="evm-val"><span class="ev-label">COMPLETE</span><span class="ev-num" style="color:var(--green)">${completeTasks.length}</span></div>
      <div class="evm-val"><span class="ev-label">IN PROGRESS</span><span class="ev-num" style="color:var(--cyan)">${inProgressTasks.length}</span></div>
      <div class="evm-val"><span class="ev-label">AT RISK</span><span class="ev-num" style="color:var(--red)">${atRiskTasks.length}</span></div>`;

    // Alerts
    const overdue = tasks.filter(t=>t.status!=='complete'&&t.due_date&&new Date(t.due_date)<new Date()).slice(0,4);
    document.getElementById('alerts-count').textContent = overdue.length;
    document.getElementById('alerts-list').innerHTML = overdue.length === 0
      ? UI.allClear('ALL CLEAR','No overdue tasks')
      : overdue.map(t=>`<div class="alert-row">
          <span style="color:var(--red);margin-top:1px;flex-shrink:0;">⚑</span>
          <div class="alert-info"><div class="alert-title">${t.name}</div><div class="alert-meta">${projMap[t.project_id]||'—'}${t.phase?' · '+t.phase:''}</div></div>
          <span class="alert-age">${Math.abs(UI.daysUntil(t.due_date))}d</span>
        </div>`).join('');

    // Action items
    document.getElementById('actions-list').innerHTML = UI.allClear('ALL CLEAR','No open action items');

    // Team workload
    const wl = users.filter(u=>!u.project_id).map(u=>({
      user:u, count:tasks.filter(t=>t.assigned_to===u.id&&t.status!=='complete').length
    })).filter(w=>w.count>0).sort((a,b)=>b.count-a.count);
    const maxL = Math.max(...wl.map(w=>w.count),1);
    document.getElementById('workload-list').innerHTML = wl.length === 0
      ? UI.allClear('ALL CLEAR')
      : wl.map(w=>{
          const p = UI.pct(w.count, maxL*1.2);
          const c = p>80?'var(--red)':p>55?'var(--amber)':'var(--cyan)';
          return `<div class="wl-row">
            <div class="wl-avatar">${UI.initials(w.user.name)}</div>
            <div class="wl-name">${w.user.name}</div>
            <div class="wl-bar-wrap"><div class="wl-bar"><div class="wl-fill" style="width:${p}%;background:${c}"></div></div></div>
            <div class="wl-pct" style="color:${c}">${w.count}</div>
          </div>`;
        }).join('');

  } catch(err) { console.error('Dashboard load error:', err); }
}

loadDashboard();
</script>
</body>
</html>
