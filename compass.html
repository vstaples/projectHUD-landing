<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compass — Operational Intelligence</title>
<link rel="stylesheet" href="/css/hud.css">
<style>
/* ── Compass shell variables ─────────────────────────────── */
:root {
  --compass-cyan:   #00D2FF;
  --compass-amber:  #EF9F27;
  --compass-green:  #1D9E75;
  --compass-red:    #E24B4A;
  --compass-purple: #8B5CF6;

  /* Override hud.css text hierarchy for Compass — brighter, higher contrast */
  --text0: #F0F6FF;   /* primary text — near white */
  --text1: #C8DFF0;   /* secondary text — light blue-white */
  --text2: #90B8D8;   /* tertiary text — medium blue (was #7a9bbf, bumped up) */
  --text3: #6A94B8;   /* metadata / labels — readable mid-blue (was #3a5a7a, major bump) */
  --muted: #5A84A8;   /* muted elements — still visible */
}

/* Compass minimum legible sizes — metadata/label text */
#compass-app .row-sub,
#compass-app .panel-badge,
#compass-app .stat-sub,
#compass-app .stat-label {
  font-size: 11px;
}

/* ── Layout ──────────────────────────────────────────────── */
#compass-app {
  display: flex;
  flex-direction: column;
  min-height: 100vh;
  background: var(--bg0, #060a10);
}

/* ── Top nav bar ─────────────────────────────────────────── */
#compass-nav {
  display: flex;
  align-items: center;
  gap: 0;
  height: 44px;
  background: var(--bg1, #0c1628);
  border-bottom: 1px solid var(--border, rgba(0,210,255,.12));
  padding: 0 16px;
  flex-shrink: 0;
  position: sticky;
  top: 0;
  z-index: 100;
}

.compass-logo-mark {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-right: 20px;
  text-decoration: none;
}

.compass-wordmark {
  font-family: var(--font-hud, 'Rajdhani', sans-serif);
  font-size: 17px;
  font-weight: 700;
  letter-spacing: .12em;
  color: var(--text0, #eef4ff);
}

.compass-wordmark span {
  color: var(--compass-cyan);
}

.nav-sep {
  width: 1px;
  height: 22px;
  background: var(--border);
  margin: 0 16px;
}

/* Role tab buttons */
.role-tab {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 0 14px;
  height: 44px;
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  color: var(--text2, #7a9bbf);
  font-family: var(--font-head, 'Barlow Condensed', sans-serif);
  font-size: 13px;
  font-weight: 600;
  letter-spacing: .08em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all .12s;
  white-space: nowrap;
}

.role-tab:hover {
  color: var(--text0);
  background: rgba(255,255,255,.03);
}

.role-tab.active {
  color: var(--compass-cyan);
  border-bottom-color: var(--compass-cyan);
}

.role-tab .tab-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: currentColor;
  opacity: .5;
}

.role-tab.active .tab-dot {
  opacity: 1;
}

/* Badge on role tabs */
.tab-badge {
  background: var(--compass-red);
  color: #fff;
  font-size: 10px;
  font-family: var(--font-mono);
  padding: 1px 5px;
  border-radius: 8px;
  font-weight: 700;
  letter-spacing: 0;
}

/* Nav right side */
.nav-spacer { flex: 1; }

.nav-live {
  display: flex;
  align-items: center;
  gap: 5px;
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--compass-green);
  letter-spacing: .1em;
  margin-right: 12px;
}

.nav-live-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--compass-green);
  animation: pulse-live 2s infinite;
}

@keyframes pulse-live {
  0%, 100% { opacity: 1; }
  50%       { opacity: .35; }
}

.nav-user {
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text2);
}

.nav-avatar {
  width: 26px;
  height: 26px;
  border-radius: 50%;
  background: rgba(0,210,255,.15);
  border: 1px solid rgba(0,210,255,.3);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-hud);
  font-size: 11px;
  font-weight: 700;
  color: var(--compass-cyan);
}

/* ── View panels ─────────────────────────────────────────── */
.compass-view {
  display: none;
  flex: 1;
  overflow-y: auto;
}

.compass-view.active {
  display: block;
}

/* ── Common inner layout ─────────────────────────────────── */
.view-body {
  padding: 20px 22px;
  max-width: 1600px;
}

/* ── Stat strip ──────────────────────────────────────────── */
.stat-strip {
  display: grid;
  gap: 8px;
  margin-bottom: 16px;
}

.stat-strip-4 { grid-template-columns: repeat(4, 1fr); }
.stat-strip-6 { grid-template-columns: repeat(6, 1fr); }

.stat-card {
  background: var(--bg1);
  border: 1px solid var(--border);
  padding: 10px 13px;
  cursor: default;
}

.stat-label {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 4px;
}

.stat-value {
  font-family: var(--font-hud);
  font-size: 26px;
  font-weight: 700;
  color: var(--text0);
  line-height: 1;
}

.stat-sub {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text3);
  margin-top: 3px;
}

.sv-cyan   { color: var(--compass-cyan); }
.sv-amber  { color: var(--compass-amber); }
.sv-green  { color: var(--compass-green); }
.sv-red    { color: var(--compass-red); }
.sv-purple { color: var(--compass-purple); }

/* ── Panel card ──────────────────────────────────────────── */
.cmp-panel {
  background: var(--bg1);
  border: 1px solid var(--border);
  margin-bottom: 14px;
}

.cmp-panel:last-child { margin-bottom: 0; }

.panel-hdr {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 13px;
  border-bottom: 1px solid var(--border);
}

.panel-title {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--text3);
}

.panel-badge {
  font-family: var(--font-mono);
  font-size: 10px;
  padding: 2px 7px;
  font-weight: 700;
}

.pb-red    { background: rgba(226,75,74,.15);  color: var(--compass-red);    border: 1px solid rgba(226,75,74,.3); }
.pb-amber  { background: rgba(239,159,39,.12); color: var(--compass-amber);  border: 1px solid rgba(239,159,39,.3); }
.pb-green  { background: rgba(29,158,117,.12); color: var(--compass-green);  border: 1px solid rgba(29,158,117,.3); }
.pb-cyan   { background: rgba(0,210,255,.08);  color: var(--compass-cyan);   border: 1px solid rgba(0,210,255,.25); }

/* ── Two-column grid ─────────────────────────────────────── */
.two-col { display: grid; grid-template-columns: 1fr minmax(0, 320px); gap: 14px; }
.three-col { display: grid; grid-template-columns: 1fr 1fr minmax(0, 280px); gap: 14px; }

/* ── Row items ───────────────────────────────────────────── */
.cmp-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 13px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background .1s;
}

.cmp-row:last-child { border-bottom: none; }
.cmp-row:hover { background: var(--bg2); }
.wi-selected { background: rgba(0,210,255,.06) !important; border-left: 2px solid var(--compass-cyan,#00D2FF) !important; }

.row-title {
  font-family: var(--font-ui, 'Barlow Condensed', sans-serif);
  font-size: 13px;
  font-weight: 500;
  color: var(--text0);
  flex: 1;
  min-width: 0;
}

.row-sub {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text3);
  margin-top: 2px;
}

/* ── Action rows ─────────────────────────────────────────── */
.action-row {
  padding: 11px 13px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background .1s;
}

.action-row:last-child { border-bottom: none; }
.action-row:hover { background: var(--bg2); }

.action-row.urgent { border-left: 3px solid var(--compass-red); }
.action-row.warning { border-left: 3px solid var(--compass-amber); }

.ar-hdr {
  display: flex;
  align-items: flex-start;
  gap: 9px;
  margin-bottom: 4px;
}

.ar-icon {
  width: 26px;
  height: 26px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  font-size: 12px;
}

.ari-red    { background: rgba(226,75,74,.15);  color: var(--compass-red); }
.ari-amber  { background: rgba(239,159,39,.12); color: var(--compass-amber); }
.ari-cyan   { background: rgba(0,210,255,.1);   color: var(--compass-cyan); }
.ari-green  { background: rgba(29,158,117,.12); color: var(--compass-green); }

.ar-title {
  font-family: var(--font-ui);
  font-size: 12.5px;
  font-weight: 500;
  color: var(--text0);
  flex: 1;
  min-width: 0;
  line-height: 1.3;
}

.ar-due {
  font-family: var(--font-mono);
  font-size: 10px;
  flex-shrink: 0;
}

.ar-due.red   { color: var(--compass-red); }
.ar-due.amber { color: var(--compass-amber); }

.ar-body {
  font-family: var(--font-ui);
  font-size: 11px;
  color: var(--text2);
  line-height: 1.5;
  margin: 3px 0 6px 35px;
}

.ar-warn {
  font-family: var(--font-mono);
  font-size: 10px;
  padding: 5px 8px;
  background: rgba(239,159,39,.08);
  border: 1px solid rgba(239,159,39,.2);
  color: var(--compass-amber);
  margin: 3px 0 6px 35px;
  letter-spacing: .03em;
}

.ar-acts {
  display: flex;
  gap: 6px;
  margin-left: 35px;
  flex-wrap: wrap;
}

/* ── Buttons ─────────────────────────────────────────────── */
.cmp-btn {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: .08em;
  text-transform: uppercase;
  padding: 4px 12px;
  cursor: pointer;
  border: 1px solid;
  transition: opacity .12s;
  white-space: nowrap;
}

.cmp-btn:hover { opacity: .75; }

.btn-approve { border-color: rgba(29,158,117,.5);  background: rgba(29,158,117,.1);  color: var(--compass-green); }
.btn-reject  { border-color: rgba(226,75,74,.5);   background: none;                 color: var(--compass-red); }
.btn-respond { border-color: rgba(0,210,255,.4);   background: rgba(0,210,255,.08);  color: var(--compass-cyan); }
.btn-ghost   { border-color: var(--border);        background: none;                 color: var(--text2); }

/* ── Milestone dot ───────────────────────────────────────── */
.ms-dot {
  width: 11px;
  height: 11px;
  border-radius: 50%;
  flex-shrink: 0;
}

.ms-done   { background: var(--compass-green); }
.ms-active { background: var(--compass-amber); }
.ms-risk   { background: var(--compass-red); }
.ms-future { background: none; border: 1.5px solid var(--border); }

/* ── Status badges ───────────────────────────────────────── */
.status-badge {
  font-family: var(--font-mono);
  font-size: 10px;
  padding: 2px 7px;
  flex-shrink: 0;
}

.sb-done   { background: rgba(29,158,117,.12);  color: var(--compass-green); border: 1px solid rgba(29,158,117,.3); }
.sb-risk   { background: rgba(226,75,74,.12);   color: var(--compass-red);   border: 1px solid rgba(226,75,74,.3); }
.sb-warn   { background: rgba(239,159,39,.1);   color: var(--compass-amber); border: 1px solid rgba(239,159,39,.25); }
.sb-future { background: rgba(255,255,255,.04); color: var(--text3);         border: 1px solid var(--border); }
.sb-cyan   { background: rgba(0,210,255,.08);   color: var(--compass-cyan);  border: 1px solid rgba(0,210,255,.25); }

/* ── Progress bar ────────────────────────────────────────── */
.progress-track {
  height: 4px;
  background: var(--bg2);
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  transition: width .5s;
}

/* ── Budget bar ──────────────────────────────────────────── */
.budget-row {
  padding: 10px 13px;
  border-bottom: 1px solid var(--border);
}

.budget-row:last-child { border-bottom: none; }

.budget-header {
  display: flex;
  justify-content: space-between;
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text3);
  margin-bottom: 5px;
}

.budget-value {
  font-weight: 700;
  color: var(--text1);
}

.budget-track {
  height: 6px;
  background: var(--bg2);
  overflow: hidden;
}

.budget-fill {
  height: 100%;
  transition: width .6s;
}

/* ── Update / thread rows ────────────────────────────────── */
.update-row {
  padding: 10px 13px;
  border-bottom: 1px solid var(--border);
}

.update-row:last-child { border-bottom: none; }

.ur-hdr {
  display: flex;
  align-items: center;
  gap: 7px;
  margin-bottom: 4px;
}

.ur-av {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-hud);
  font-size: 10px;
  font-weight: 700;
  flex-shrink: 0;
}

.av-cyan   { background: rgba(0,210,255,.15);   border: 1px solid rgba(0,210,255,.3);   color: var(--compass-cyan); }
.av-amber  { background: rgba(239,159,39,.15);  border: 1px solid rgba(239,159,39,.3);  color: var(--compass-amber); }
.av-green  { background: rgba(29,158,117,.15);  border: 1px solid rgba(29,158,117,.3);  color: var(--compass-green); }

.ur-name {
  font-family: var(--font-ui);
  font-size: 11.5px;
  font-weight: 500;
  color: var(--text0);
  flex: 1;
}

.ur-time {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text3);
}

.ur-body {
  font-family: var(--font-ui);
  font-size: 11px;
  color: var(--text2);
  line-height: 1.5;
  margin-left: 29px;
}

.ur-flagged {
  border-left: 2px solid var(--compass-amber);
  padding-left: 8px;
  margin-left: 29px;
  color: var(--text1);
  font-family: var(--font-ui);
  font-size: 11px;
  line-height: 1.5;
}

/* ── Thread input ────────────────────────────────────────── */
.thread-in {
  padding: 9px 13px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 7px;
  align-items: center;
}

.thread-in input {
  flex: 1;
  font-family: var(--font-ui);
  font-size: 11px;
  padding: 6px 10px;
  background: var(--bg2);
  border: 1px solid var(--border);
  color: var(--text1);
  outline: none;
  transition: border-color .15s;
}

.thread-in input:focus { border-color: rgba(0,210,255,.4); }

/* ── Document rows ───────────────────────────────────────── */
.doc-row {
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 8px 13px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background .1s;
}

.doc-row:last-child { border-bottom: none; }
.doc-row:hover { background: var(--bg2); }

.doc-icon {
  width: 26px;
  height: 26px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  flex-shrink: 0;
}

.doc-info { flex: 1; min-width: 0; }

.doc-name {
  font-family: var(--font-ui);
  font-size: 12px;
  font-weight: 500;
  color: var(--text0);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.doc-meta {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text3);
  margin-top: 1px;
}

/* ── Scrubber ────────────────────────────────────────────── */
.scrubber-wrap {
  padding: 10px 13px;
  border-bottom: 1px solid var(--border);
}

.scrubber-labels {
  display: flex;
  justify-content: space-between;
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text3);
  margin-bottom: 6px;
}

.scrubber-date-active {
  color: var(--compass-cyan);
  font-weight: 700;
}

.scrubber-track {
  position: relative;
  height: 4px;
  background: var(--bg2);
  cursor: pointer;
  margin-bottom: 6px;
}

.scrubber-fill {
  height: 100%;
  background: var(--compass-cyan);
  transition: width .1s;
}

.scrubber-thumb {
  position: absolute;
  top: 50%;
  width: 12px;
  height: 12px;
  background: var(--bg1);
  border: 2px solid var(--compass-cyan);
  border-radius: 50%;
  transform: translate(-50%, -50%);
  cursor: grab;
  transition: left .1s;
}

.scrubber-dots {
  display: flex;
  justify-content: space-between;
  margin-top: 4px;
}

.sdot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  cursor: pointer;
  transition: transform .1s;
}

.sdot:hover { transform: scale(1.5); }

.scrubber-snapshot {
  padding: 8px 10px;
  background: var(--bg2);
  font-family: var(--font-ui);
  font-size: 11px;
  color: var(--text2);
  line-height: 1.5;
  min-height: 38px;
  margin-top: 6px;
  border-left: 2px solid var(--compass-cyan);
}

/* ── Rejection context card ──────────────────────────────── */
.rejection-context {
  display: flex;
  gap: 9px;
  padding: 9px 10px;
  background: rgba(226,75,74,.07);
  border: 1px solid rgba(226,75,74,.25);
  border-left: 3px solid var(--compass-red);
  margin-bottom: 8px;
}

.rejection-context-icon {
  font-size: 13px;
  color: var(--compass-red);
  flex-shrink: 0;
  margin-top: 1px;
}

.rejection-context-body { flex: 1; min-width: 0; }

.rejection-context-label {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--compass-red);
  margin-bottom: 3px;
}

.rejection-context-text {
  font-family: var(--font-ui);
  font-size: 11px;
  color: var(--text1);
  line-height: 1.45;
  font-style: italic;
}

.rejection-context-meta {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text3);
  margin-top: 3px;
}

/* ── Privacy note ────────────────────────────────────────── */
.privacy-note {
  display: flex;
  align-items: flex-start;
  gap: 7px;
  padding: 8px 13px;
  background: var(--bg2);
  border-top: 1px solid var(--border);
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: .04em;
  color: var(--text3);
  line-height: 1.5;
}

/* ── Toast ───────────────────────────────────────────────── */
#compass-toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--bg1);
  border: 1px solid var(--border);
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: .06em;
  color: var(--text0);
  padding: 9px 20px;
  opacity: 0;
  transition: opacity .2s, transform .2s;
  pointer-events: none;
  z-index: 9999;
  white-space: nowrap;
}

#compass-toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* ── Loading state ───────────────────────────────────────── */
#compass-loading {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 200px;
  gap: 12px;
  color: var(--text3);
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: .1em;
}

.loading-spinner {
  width: 24px;
  height: 24px;
  border: 2px solid var(--border);
  border-top-color: var(--compass-cyan);
  border-radius: 50%;
  animation: spin .8s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* ── Responsive ──────────────────────────────────────────── */
@media (max-width: 1100px) {
  .two-col, .three-col { grid-template-columns: 1fr; }
  .stat-strip-6 { grid-template-columns: repeat(3, 1fr); }
}

@media (max-width: 720px) {
  .stat-strip-4, .stat-strip-6 { grid-template-columns: repeat(2, 1fr); }
  .role-tab span.tab-label { display: none; }
}
</style>
</head>
<body>

<div id="compass-app">

  <!-- ── Top navigation bar ──────────────────────────────── -->
  <nav id="compass-nav">

    <!-- Logo -->
    <a class="compass-logo-mark" href="/dashboard.html" title="Back to dashboard">
      <!-- Compass rose mini icon -->
      <svg width="22" height="22" viewBox="-30 -30 60 60" style="flex-shrink:0">
        <circle r="28" fill="none" stroke="#00D2FF" stroke-width="1" opacity=".2"/>
        <circle r="22" fill="none" stroke="#00D2FF" stroke-width="1" opacity=".38"/>
        <circle r="15" fill="#0c1628"/>
        <circle r="15" fill="none" stroke="#00D2FF" stroke-width="1.2"/>
        <!-- Cardinal ticks -->

<script>
'use strict';

// ── Constants ─────────────────────────────────────────────
const FIRM_ID = 'aaaaaaaa-0001-0001-0001-000000000001';

// ── State ─────────────────────────────────────────────────
let _projects   = [];
let _tasks      = [];
let _resources  = [];
let _users      = [];
let _myResource = null;
let _currentView = null;
let _viewLoaded  = {};
let _identityDebug = {};
let _teFilter    = null;   // date string 'YYYY-MM-DD' | null — filters time log by day
let _teEntries   = [];     // cached time entries for current user view session
let _wiItems     = [];     // cached work items for drawer access
let _teSelected  = null;   // id of currently selected time log row

// My Work filter state
let _wfStatus    = 'all';  // 'all' | 'not_started' | 'in_progress' | 'blocked'
let _wfProject   = '';     // project id | '' = all
let _wfDateRange = 'week'; // 'today' | 'week' | '30d' | 'all'
let _wfType      = 'all';  // 'all' | 'task' | 'action'  [Session 16]
let _doneToday   = [];     // session-persistent completed items  [Session 16]
let _activeGauge = null;   // clicked gauge date key | null  [Session 16]
let _dwellTimer  = null;   // gauge hover dwell timer  [Session 16]
let _weekOffset  = 0;      // weeks back from current week (0 = this week)

// ── Init ──────────────────────────────────────────────────
// compass-date is updated by loadUserView (shows week range when navigating)
document.getElementById('compass-date').textContent =
  new Date().toLocaleDateString('en-US', {
    weekday: 'short', month: 'short', day: 'numeric', year: 'numeric'
  }).toUpperCase();

document.addEventListener('DOMContentLoaded', async () => {
  await loadBaseData();
  // Default view: PM
  const saved = sessionStorage.getItem('compass-view') || 'pm';
  switchView(saved);
});

// ── Load shared base data ─────────────────────────────────
async function loadBaseData() {
  try {
    // ── Step 1: Resolve identity ──────────────────────────────
    let authEmail = null;
    let authSub   = null;
    let appUserId = null;
    let appUserResourceId = null;

    try {
      const token  = await Auth.getFreshToken().catch(() => Auth.getToken());
      const claims = JSON.parse(atob(token.split('.')[1]));
      authSub   = claims.sub;
      authEmail = claims.email || null;

      const uRows   = await API.get(`users?id=eq.${authSub}&select=id,resource_id,name,email`).catch(() => []);
      const appUser = uRows?.[0] || null;
      appUserId          = appUser?.id || null;
      appUserResourceId  = appUser?.resource_id || null;
      if (!authEmail && appUser?.email) authEmail = appUser.email;

      if (appUser?.resource_id) {
        const rRows = await API.get(
          `resources?id=eq.${appUser.resource_id}&select=id,first_name,last_name,email,is_active,is_external,user_id,firm_id,department`
        ).catch(() => []);
        const r = rRows?.[0] || null;
        if (r) {
          _myResource = { ...r,
            name: `${r.first_name||''} ${r.last_name||''}`.trim() || appUser.name || appUser.email || '—',
          };
        }
      }

      // Fallback — match by email if resource_id path didn't resolve
      if (!_myResource && authEmail) {
        const eRows = await API.get(
          `resources?email=eq.${encodeURIComponent(authEmail)}&select=id,first_name,last_name,email,is_active,is_external,user_id,firm_id,department&limit=1`
        ).catch(() => []);
        const r = eRows?.[0] || null;
        if (r) {
          _myResource = { ...r,
            name: `${r.first_name||''} ${r.last_name||''}`.trim() || authEmail || '—',
          };
        }
      }

      // Store debug info for error messages
      _identityDebug = {
        authEmail,
        authSub:    authSub?.slice(0,8) + '…',
        appUserId:  appUserId?.slice(0,8) + '…' || 'none',
        resourceId: appUserResourceId?.slice(0,8) + '…' || 'none',
        resolved:   !!_myResource,
        name:       _myResource?.name || null,
      };

      console.log('[Compass] Identity:', _myResource?.name || 'unresolved',
        '| email:', authEmail, '| sub:', authSub?.slice(0,8),
        '| resource_id:', appUserResourceId?.slice(0,8) || 'none');

    } catch(e) {
      console.warn('[Compass] Identity resolution failed:', e.message);
      _identityDebug = { error: e.message };
    }

    // ── Step 2: Load shared data ──────────────────────────────
    [_projects, _tasks, _resources, _users] = await Promise.all([
      API.getProjects().catch(() => []),
      API.getTasks().catch(() => []),
      API.get('resources?select=id,first_name,last_name,email,is_active,user_id,firm_id,department&is_active=eq.true&firm_id=eq.' + FIRM_ID).catch(() => []),
      API.getUsers().catch(() => []),
    ]);

    _resources = (_resources || []).map(r => ({
      ...r,
      name: `${r.first_name||''} ${r.last_name||''}`.trim() || r.email || '—',
    }));

    // Update nav avatar
    if (_myResource?.name) {
      const initials = _myResource.name.split(' ').map(n => n[0]).join('').slice(0, 2).toUpperCase();
      const avEl = document.getElementById('compass-user-av');
      if (avEl) avEl.textContent = initials;
    }
  } catch (e) {
    console.error('[Compass] loadBaseData failed:', e);
  }
}

// ── View switcher ─────────────────────────────────────────
function switchView(viewId) {
  // Hide all views
  document.querySelectorAll('.compass-view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.role-tab').forEach(t => t.classList.remove('active'));

  // Show target
  const viewEl = document.getElementById('view-' + viewId);
  const tabEl  = document.getElementById('tab-' + viewId);
  if (!viewEl) return;

  viewEl.classList.add('active');
  if (tabEl) tabEl.classList.add('active');

  _currentView = viewId;
  sessionStorage.setItem('compass-view', viewId);

  // Lazy-load view data on first activation
  if (!_viewLoaded[viewId]) {
    _viewLoaded[viewId] = true;
    switch (viewId) {
      case 'user':       loadUserView();       break;
      case 'pm':         loadPMView();         break;
      case 'management': loadManagementView(); break;
      case 'executive':  loadExecutiveView();  break;
      case 'client':     loadClientView();     break;
    }
  }
}

// ── Toast ─────────────────────────────────────────────────
function compassToast(msg, duration = 2200) {
  const el = document.getElementById('compass-toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), duration);
}

// ── Escape HTML ───────────────────────────────────────────
function esc(s) {
  return String(s ?? '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Date formatting ───────────────────────────────────────
function fmtDate(iso) {
  if (!iso) return '—';
  return new Date(iso + 'T00:00:00').toLocaleDateString('en-US', {
    month: 'short', day: 'numeric'
  });
}

function fmtDateTime(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleDateString('en-US', {
    month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit'
  });
}

function daysOverdue(dateStr) {
  if (!dateStr) return 0;
  const diff = Date.now() - new Date(dateStr + 'T00:00:00').getTime();
  return Math.max(0, Math.floor(diff / 86400000));
}

function _timeAgo(iso) {
  if (!iso) return '—';
  const diff = Date.now() - new Date(iso).getTime();
  const mins  = Math.floor(diff / 60000);
  const hours = Math.floor(diff / 3600000);
  const days  = Math.floor(diff / 86400000);
  if (mins  <  1) return 'just now';
  if (mins  < 60) return `${mins}m ago`;
  if (hours < 24) return `${hours}h ago`;
  if (days  <  7) return `${days}d ago`;
  return fmtDate(iso);
}

// ── Avatar HTML ───────────────────────────────────────────
function avatarHtml(name, size = 24, cls = 'av-cyan') {
  const initials = (name || '?').split(' ').map(n => n[0]).join('').slice(0, 2).toUpperCase();
  return `<div class="ur-av ${cls}" style="width:${size}px;height:${size}px;font-size:${Math.floor(size*0.4)}px">${initials}</div>`;
}


// ══════════════════════════════════════════════════════════
// VIEW: MY WORK (Individual Contributor) — Feature #1 · Session 16
// ══════════════════════════════════════════════════════════
async function loadUserView() {
  const loading = document.getElementById('compass-loading');
  const content = document.getElementById('user-content');

  if (!_myResource?.id) {
    if (loading) loading.style.display = 'none';
    content.style.display = 'block';
    const d = _identityDebug;
    content.innerHTML = `
      <div style="padding:40px 20px;text-align:center">
        <div style="font-family:var(--font-head);font-size:11px;color:var(--compass-red);
          margin-bottom:12px;letter-spacing:.12em">⚠ IDENTITY NOT RESOLVED</div>
        <div style="display:inline-block;text-align:left;background:var(--bg1);
          border:1px solid var(--border);padding:14px 20px;margin-bottom:16px;
          font-family:var(--font-data);font-size:11px;line-height:2;min-width:320px">
          <div style="color:var(--text3);letter-spacing:.08em;margin-bottom:4px">SESSION DETAILS</div>
          <div><span style="color:var(--text3)">Auth email&nbsp;&nbsp;&nbsp;</span>
            <span style="color:${d.authEmail?'var(--compass-cyan)':' var(--compass-red)'}">
              ${d.authEmail||'— not found in JWT —'}</span></div>
          <div><span style="color:var(--text3)">Auth UUID&nbsp;&nbsp;&nbsp;&nbsp;</span>
            <span style="color:var(--text2)">${d.authSub||'—'}</span></div>
          <div><span style="color:var(--text3)">App user ID&nbsp;&nbsp;</span>
            <span style="color:${d.appUserId&&d.appUserId!=='undefin…'?'var(--text2)':' var(--compass-red)'}">
              ${d.appUserId&&d.appUserId!=='undefin…'?d.appUserId:'— no users row found —'}</span></div>
          <div><span style="color:var(--text3)">Resource ID&nbsp;&nbsp;</span>
            <span style="color:${d.resourceId&&d.resourceId!=='undefin…'?'var(--text2)':' var(--compass-red)'}">
              ${d.resourceId&&d.resourceId!=='undefin…'?d.resourceId:'— not linked —'}</span></div>
          ${d.error?`<div style="color:var(--compass-red);margin-top:4px">Error: ${esc(d.error)}</div>`:''}
        </div>
        <div style="font-family:var(--font-body);font-size:12px;color:var(--text3);
          margin-bottom:16px;line-height:1.6;max-width:480px;margin-left:auto;margin-right:auto">
          ${d.authEmail
            ?`Logged in as <strong style="color:var(--text1)">${esc(d.authEmail)}</strong> but no matching resource was found.`
            :'No email found in session token. Try logging out and back in.'}
        </div>
        <a href="/users.html" style="font-family:var(--font-head);font-size:11px;
          letter-spacing:.1em;color:var(--compass-cyan);text-decoration:none;
          border:1px solid rgba(0,210,255,.3);padding:6px 16px;margin-right:8px">USER MGMT →</a>
        <button onclick="_viewLoaded['user']=false;loadUserView()"
          style="font-family:var(--font-head);font-size:11px;letter-spacing:.1em;
            color:var(--text2);background:none;border:1px solid var(--border);
            padding:6px 16px;cursor:pointer">RETRY</button>
      </div>`;
    return;
  }

  try {
    const resId = _myResource.id;
    const today = new Date().toLocaleDateString('en-CA');
    const todayDate = new Date(today + 'T00:00:00');
    const dayOfWeek = todayDate.getDay();
    const isoOffset = dayOfWeek === 0 ? 6 : dayOfWeek - 1;
    const weekStart = new Date(todayDate);
    weekStart.setDate(todayDate.getDate() - isoOffset - (_weekOffset * 7));
    const weekStartDate = weekStart.toLocaleDateString('en-CA');
    const weekEnd = new Date(weekStart); weekEnd.setDate(weekStart.getDate() + 6);
    const weekEndDate = weekEnd.toLocaleDateString('en-CA');
    const weekDays = Array.from({length:7}, (_, i) => {
      const d = new Date(weekStart); d.setDate(weekStart.getDate() + i);
      return d.toLocaleDateString('en-CA');
    });
    const weekLabels = ['MON','TUE','WED','THU','FRI','SAT','SUN'];

    // Update top-right date display to reflect current week view
    const dateEl = document.getElementById('compass-date');
    if (dateEl) {
      if (_weekOffset === 0) {
        dateEl.textContent = new Date().toLocaleDateString('en-US',{
          weekday:'short',month:'short',day:'numeric',year:'numeric'}).toUpperCase();
      } else {
        const ws = new Date(weekStart).toLocaleDateString('en-US',{month:'short',day:'numeric'});
        const we = new Date(weekEnd).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
        dateEl.textContent = (ws + ' – ' + we).toUpperCase();
      }
    }

    const [myTasks, myActionItems, wfInstances, myTimeEntries, myWeek, completedThisWeek, resolvedThisWeek] = await Promise.all([
      API.get(`tasks?select=id,name,project_id,status,due_date,pct_complete,budget_hours,effort_days,actual_hours,complexity_rating&assigned_to=eq.${_myResource.user_id}&status=neq.complete&order=created_at.desc&limit=200`).catch(() => []),
      API.get(`workflow_action_items?owner_resource_id=eq.${resId}&status=eq.open&limit=100`).catch(() => []),
      API.get(`workflow_instances?select=id,title,status,current_step_name,project_id&status=eq.active&limit=20`).catch(() => []),
      API.get(`time_entries?resource_id=eq.${resId}&order=date.desc&limit=200&select=id,date,hours,is_billable,project_id,task_id,step_name,source_type,notes,week_start_date`).catch(() => []),
      API.get(`timesheet_weeks?resource_id=eq.${resId}&week_start_date=eq.${weekStartDate}&select=id,status,total_hours,billable_hours,submitted_at,approved_at,approver_name,rejection_reason&limit=1`).catch(() => []),
      API.get(`tasks?select=id,name,updated_at&assigned_to=eq.${_myResource.user_id}&status=eq.complete&updated_at=gte.${weekStartDate}T00:00:00&limit=100`).catch(() => []),
      API.get(`workflow_action_items?owner_resource_id=eq.${resId}&status=eq.resolved&limit=100`).catch(() => []),
    ]);

    // ── Hours per day ─────────────────────────────────────────────────
    const hoursByDay = {}, billableByDay = {};
    weekDays.forEach(d => { hoursByDay[d] = 0; billableByDay[d] = 0; });
    myTimeEntries.forEach(e => {
      if (Object.prototype.hasOwnProperty.call(hoursByDay, e.date)) {
        const h = parseFloat(e.hours || 0);
        hoursByDay[e.date] += h;
        if (e.is_billable) billableByDay[e.date] += h;
      }
    });

    // ── Week totals ───────────────────────────────────────────────────
    const weekEntries  = myTimeEntries.filter(e => weekDays.includes(e.date));
    const weekTotal    = weekEntries.reduce((s,e) => s + parseFloat(e.hours||0), 0);
    const weekBillable = weekEntries.filter(e=>e.is_billable).reduce((s,e)=>s+parseFloat(e.hours||0), 0);
    const todayTotal   = parseFloat(hoursByDay[today] || 0);
    const maxDayHours  = Math.max(...Object.values(hoursByDay), 1);

    // ── Work list ─────────────────────────────────────────────────────
    const workItems = [];
    (myTasks || [])
      .filter(t => t.status !== 'cancelled')
      .filter(t => { const p=parseFloat(t.pct_complete)||0; const pn=p<=1&&p>0?Math.round(p*100):Math.round(p); return pn < 100; })
      .forEach(t => {
        const proj = _projects.find(p => p.id === t.project_id);
        const overdue = t.due_date && t.due_date < today;
        const p = parseFloat(t.pct_complete)||0;
        const pctNorm = p<=1&&p>0?Math.round(p*100):Math.round(p);
        const budgetHrs = t.budget_hours ? parseFloat(t.budget_hours) : t.effort_days ? parseFloat(t.effort_days)*8 : null;
        workItems.push({ type:'task', id:t.id, title:t.name, project:proj?.name||'—',
          projectId:t.project_id||null, status:t.status, due:t.due_date, overdue, pct:pctNorm,
          budgetHours: budgetHrs,
          effortDays:  t.effort_days  ? parseFloat(t.effort_days)  : null,
          actualHours: t.actual_hours ? parseFloat(t.actual_hours) : null,
          complexity:  t.complexity_rating||null,
          urgency: overdue ? 0 : (t.due_date ? 1 : 2) });
      });
    (myActionItems||[]).filter(a=>a.owner_resource_id).forEach(a => {
      const overdue = a.due_date && a.due_date < today;
      workItems.push({ type:'action', id:a.id, title:a.title, project:'Action item',
        projectId:null, status:a.status||'open', due:a.due_date, overdue, urgency: overdue?0:1 });
    });
    workItems.sort((a,b) => {
      if (a.urgency !== b.urgency) return a.urgency - b.urgency;
      if (a.due && b.due) return a.due.localeCompare(b.due);
      return 0;
    });
    _wiItems = workItems;
    _teEntries = myTimeEntries;
    if (_teFilter && !weekDays.includes(_teFilter)) _teFilter = null;

    const overdueCount = workItems.filter(w => w.overdue).length;
    const waiting    = workItems.filter(w => w.status==='not_started').length;
    const inProgress = workItems.filter(w => w.status==='in_progress').length;
    const blocked    = workItems.filter(w => w.status==='blocked').length;

    // Streak
    const uniqueDates = [...new Set(myTimeEntries.map(e=>e.date))].sort().reverse();
    let streak = 0;
    for (let i = 0; i < 60; i++) {
      const dd = new Date(today+'T00:00:00'); dd.setDate(dd.getDate()-i);
      if (uniqueDates.includes(dd.toLocaleDateString('en-CA'))) streak++; else if (i>0) break;
    }
    const firstName = (_myResource?.name||'there').split(' ')[0];
    const hour = new Date().getHours();
    const greeting = hour<12?'Good morning':hour<17?'Good afternoon':'Good evening';
    const weekOf = weekStart.toLocaleDateString('en-US',{month:'short',day:'numeric'});

    // Real completed counts this week (from DB, not session memory)
    const completedTasksCount  = (completedThisWeek||[]).length;
    const resolvedActionsCount = (resolvedThisWeek||[]).filter(a => {
      // Filter client-side since updated_at column may not exist on this table
      return true; // count all resolved for this resource this week (approximate)
    }).length;
    const weekDoneCount = completedTasksCount + resolvedActionsCount;
    const weekDoneLabel = (() => {
      if (weekDoneCount === 0) return '0 completed';
      const parts = [];
      if (completedTasksCount > 0)  parts.push(`${completedTasksCount} task${completedTasksCount!==1?'s':''}`);
      if (resolvedActionsCount > 0) parts.push(`${resolvedActionsCount} action${resolvedActionsCount!==1?'s':''}`);
      return parts.join(' · ') + ' done';
    })();

    // EOD nudge
    const nowHr = new Date().getHours() + new Date().getMinutes()/60;
    let eodNudge = null;
    if (nowHr >= 17 && todayTotal === 0) eodNudge = 'red';
    else if (nowHr >= 16 && todayTotal < 4) eodNudge = 'amber';

    // Timesheet status
    const myWeekRow = myWeek?.[0] || null;
    const wsStatus  = myWeekRow?.status || 'draft';
    const wsLabel   = {draft:'DRAFT',submitted:'SUBMITTED',approved:'APPROVED',rejected:'REJECTED',amended:'AMENDED'}[wsStatus]||wsStatus.toUpperCase();
    const wsColor   = wsStatus==='approved'?'var(--compass-green)':wsStatus==='submitted'?'var(--compass-cyan)':wsStatus==='rejected'?'var(--compass-red)':'var(--text3)';

    // Day dots M-F
    function dayDotHtml(d, label) {
      const hrs=hoursByDay[d]||0, isPast=d<today, isToday=d===today;
      let fill, border, char, color;
      if (isToday)           { fill='var(--compass-cyan)'; border='var(--compass-cyan)'; char='■'; color='#060a10'; }
      else if (isPast&&hrs>0){ fill='var(--compass-green)'; border='var(--compass-green)'; char='✓'; color='#060a10'; }
      else if (isPast)       { fill='var(--compass-red)'; border='var(--compass-red)'; char='!'; color='#fff'; }
      else                   { fill='transparent'; border='var(--muted)'; char='—'; color='var(--muted)'; }
      return `<div class="day-dot" data-day="${d}" title="${label} · ${hrs.toFixed(1)}h"
        style="display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer">
        <div style="width:22px;height:22px;border-radius:50%;background:${fill};
          border:1.5px solid ${border};display:flex;align-items:center;justify-content:center;
          font-size:10px;color:${color};font-family:var(--font-head);font-weight:700;
          transition:transform .1s"
          onmouseenter="this.style.transform='scale(1.15)'"
          onmouseleave="this.style.transform='scale(1)'">${char}</div>
        <span style="font-family:var(--font-head);font-size:11px;font-weight:600;color:var(--text3)">${label}</span>
      </div>`;
    }
    const dotsHtml = weekDays.slice(0,5).map((d,i)=>dayDotHtml(d,['M','T','W','T','F'][i])).join('');

    // ══════════════════════════════════════════════════════════
    // SPEEDOMETER GAUGES — original design preserved exactly.
    // Scaled from GW=90→74 so all 7 fit compactly side by side.
    // ALL visual elements kept: tick marks, dual arc (billable +
    // non-billable purple), needle, centre dot, pill readout.
    // ══════════════════════════════════════════════════════════
    const gaugeMax = Math.max(maxDayHours, 8);
    const GW=74, GH=70, GCX=37, GCY=48, GR=30;

    function gPt(deg) {
      const a = (deg - 180) * Math.PI / 180;
      return [(GCX + GR * Math.cos(a)).toFixed(1), (GCY + GR * Math.sin(a)).toFixed(1)];
    }
    function gArc(d1, d2) {
      if (d2 <= d1) return '';
      const [x1,y1] = gPt(d1), [x2,y2] = gPt(Math.min(d2, 179.9));
      return `M${x1},${y1} A${GR},${GR} 0 ${d2-d1>180?1:0} 1 ${x2},${y2}`;
    }

    // Tick marks + % labels — same geometry as original, rescaled
    const gTicks = Array.from({length:11}, (_,i) => {
      const deg = i * 18;
      const isMaj = i % 2 === 0;
      const a = (deg - 180) * Math.PI / 180;
      const r0 = GR + 2, r1 = isMaj ? GR + 7 : GR + 4;
      const x0=(GCX+r0*Math.cos(a)).toFixed(1), y0=(GCY+r0*Math.sin(a)).toFixed(1);
      const x1=(GCX+r1*Math.cos(a)).toFixed(1), y1=(GCY+r1*Math.sin(a)).toFixed(1);
      const tick = `<line x1="${x0}" y1="${y0}" x2="${x1}" y2="${y1}" stroke="rgba(255,255,255,.28)" stroke-width="${isMaj?1:.6}"/>`;
      if (!isMaj) return tick;
      const rl=GR+13, lx=(GCX+rl*Math.cos(a)).toFixed(1), ly=(GCY+rl*Math.sin(a)).toFixed(1);
      return tick + `<text x="${lx}" y="${ly}" text-anchor="middle" dominant-baseline="central" font-size="5.5" font-family="monospace" fill="rgba(255,255,255,.4)">${i*10}%</text>`;
    }).join('');

    const gaugesHtml = weekDays.map((d, i) => {
      const hrs=hoursByDay[d]||0, bill=billableByDay[d]||0, nonBill=hrs-bill;
      const isToday=d===today, isActive=_activeGauge===d;
      const pct=Math.min(hrs/gaugeMax,1), billPct=Math.min(bill/gaugeMax,1), nbPct=Math.min(nonBill/gaugeMax,1);
      const billEnd=billPct*180, nbEnd=(billPct+nbPct)*180;
      const needleRad=(pct*180-180)*Math.PI/180;
      const nx=(GCX+(GR-6)*Math.cos(needleRad)).toFixed(1);
      const ny=(GCY+(GR-6)*Math.sin(needleRad)).toFixed(1);
      const arcColor  = isActive?'#EF9F27':isToday?'#00D2FF':hrs>0?'#1D9E75':'rgba(255,255,255,.08)';
      const pillColor = isActive?'#EF9F27':isToday?'#00D2FF':hrs>0?'#1D9E75':'rgba(255,255,255,.2)';
      const dayColor  = isActive?'#EF9F27':isToday?'#00D2FF':'#6A94B8';
      const fw        = isToday||isActive?'600':'400';
      return `
      <div class="gauge-col" data-gauge-date="${d}" data-gauge-has-data="${hrs>0}"
        style="display:flex;flex-direction:column;align-items:center;gap:2px;flex:1;min-width:0;cursor:pointer">
        <svg viewBox="0 0 ${GW} ${GH}" width="${GW}" height="${GH}" style="overflow:visible">
          ${gTicks}
          <path d="${gArc(0,179.9)}" fill="none" stroke="rgba(255,255,255,.07)" stroke-width="4" stroke-linecap="round"/>
          ${hrs>0?`
          ${bill>0?`<path d="${gArc(0,billEnd)}" fill="none" stroke="${arcColor}" stroke-width="4" stroke-linecap="round"/>`:''}
          ${nonBill>0?`<path d="${gArc(billEnd,nbEnd)}" fill="none" stroke="#8B5CF6" stroke-width="4" stroke-linecap="round"/>`:''}
          <line x1="${GCX}" y1="${GCY}" x2="${nx}" y2="${ny}" stroke="${arcColor}" stroke-width="1.5" stroke-linecap="round"/>
          <circle cx="${GCX}" cy="${GCY}" r="3" fill="${arcColor}"/>
          `:`<circle cx="${GCX}" cy="${GCY}" r="2" fill="rgba(255,255,255,.12)"/>`}
          <rect x="${GCX-17}" y="${GCY+5}" width="34" height="14" rx="7" fill="rgba(6,10,16,.7)" stroke="${pillColor}" stroke-width="1.2"/>
          <text x="${GCX}" y="${GCY+12}" text-anchor="middle" dominant-baseline="central"
            font-size="11" font-family="monospace" font-weight="700" fill="${pillColor}">
            ${hrs>0?hrs.toFixed(1)+'h':'—'}
          </text>
        </svg>
        <div style="font-family:var(--font-head);font-size:11px;font-weight:700;
          color:${isToday||isActive?dayColor:'#F0F6FF'};text-align:center;line-height:1.4;letter-spacing:.04em">
          ${weekLabels[i]}<br>
          <span style="font-weight:400;color:${dayColor};font-size:11px">${new Date(d+'T00:00:00').getDate()}</span>
        </div>
      </div>`;
    }).join('');

    const barLegend = `
      <div style="display:flex;align-items:center;gap:12px;padding:0 13px 8px;
        font-family:var(--font-mono);font-size:11px;color:var(--text3)">
        <div style="display:flex;align-items:center;gap:5px">
          <div style="width:14px;height:4px;background:var(--compass-cyan);border-radius:2px"></div>
          <span>Billable</span></div>
        <div style="display:flex;align-items:center;gap:5px">
          <div style="width:14px;height:4px;background:#8B5CF6;border-radius:2px"></div>
          <span>Non-billable</span></div>
        <span>Scale: 8h = full</span>
        ${_activeGauge?`<button class="gauge-clear-btn" style="margin-left:auto;font-family:var(--font-head);
          font-size:11px;color:var(--compass-amber);background:none;border:none;cursor:pointer;padding:0">
          ✕ clear filter</button>`:''}
      </div>`;

    // Recent time entries
    const displayEntries = _teFilter ? myTimeEntries.filter(e=>e.date===_teFilter) : myTimeEntries.slice(0,8);
    const filterLabel = _teFilter ? new Date(_teFilter+'T00:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'}) : null;

    // EOD nudge HTML
    const eodNudgeHtml = (() => {
      if (!eodNudge) return '';
      const isRed=eodNudge==='red', c=isRed?'var(--compass-red)':'var(--compass-amber)';
      const bg=isRed?'rgba(226,75,74,.06)':'rgba(239,159,39,.06)';
      return `<div style="border-left:3px solid ${c};background:${bg};padding:9px 12px;margin-top:10px;
        display:flex;align-items:center;justify-content:space-between;gap:8px">
        <div>
          <div style="font-family:var(--font-head);font-size:12px;font-weight:700;color:${c}">
            ■ ${isRed?'No time logged today.':'Log today\'s time before EOD'}</div>
          <div style="font-family:var(--font-head);font-size:11px;color:var(--text3);margin-top:2px">
            ${isRed?(8-todayTotal).toFixed(1)+'h gap':todayTotal.toFixed(1)+'h of ~8h expected'}</div>
        </div>
        <button class="open-weekly-ts-btn" data-expand-today="1"
          style="font-family:var(--font-head);font-size:11px;font-weight:600;letter-spacing:.06em;
            padding:5px 10px;background:none;border:1px solid ${c};color:${c};cursor:pointer;
            white-space:nowrap;flex-shrink:0">Log today →</button>
      </div>`;
    })();

    // Work list rows
    function workListRows() {
      const cutoff30d = new Date(Date.now()+30*86400000).toLocaleDateString('en-CA');
      const filtered = workItems.filter(w => {
        if (_wfType !== 'all' && w.type !== _wfType) return false;
        if (_wfStatus !== 'all') {
          if (w.type!=='action' && w.status !== _wfStatus) return false;
        }
        if (_wfProject && w.projectId !== _wfProject) return false;
        if (_wfDateRange==='today') return !w.due||w.due===today||w.overdue;
        if (_wfDateRange==='week')  return !w.due||w.due<=weekDays[6]||w.overdue;
        if (_wfDateRange==='30d')   return !w.due||w.due<=cutoff30d||w.overdue;
        return true;
      });
      if (!filtered.length) return `<div style="padding:18px 13px;text-align:center;
        font-family:var(--font-head);font-size:12px;color:var(--text3)">No items match filters</div>`;
      return filtered.map(w => {
        const tc = w.type==='task'
          ?{c:'var(--compass-cyan)',bg:'rgba(0,210,255,.08)',lbl:'Task'}
          :{c:'var(--compass-green)',bg:'rgba(29,158,117,.08)',lbl:'Action'};
        const badge=`<div style="display:inline-flex;align-items:center;padding:1px 7px;
          border:1px solid ${tc.c};background:${tc.bg};border-radius:3px;
          font-family:var(--font-head);font-size:11px;font-weight:600;color:${tc.c};
          white-space:nowrap">${tc.lbl}</div>`;
        let progressCell=`<span style="font-family:var(--font-head);font-size:11px;color:var(--text3)">—</span>`;
        if (w.type==='task'&&w.pct>0) {
          const fc=w.pct>=80?'var(--compass-green)':w.pct>=40?'var(--compass-cyan)':'rgba(255,255,255,.25)';
          progressCell=`<div style="position:relative;margin-top:10px">
            <div style="height:5px;background:rgba(255,255,255,.06);border-radius:3px;overflow:visible;position:relative">
              <div style="height:100%;width:${Math.min(w.pct,100)}%;background:${fc};border-radius:3px;transition:width .3s;position:relative">
                <span style="position:absolute;right:0;top:-14px;transform:translateX(50%);
                  font-family:var(--font-head);font-size:11px;font-weight:700;color:${fc};white-space:nowrap">${w.pct}%</span>
              </div></div></div>`;
        }
        const dueCell=w.overdue
          ?`<span style="font-family:var(--font-head);font-size:11px;font-weight:700;color:var(--compass-red)">${daysOverdue(w.due)}d</span>`
          :w.due?`<span style="font-family:var(--font-head);font-size:11px;color:var(--text3)">${fmtDate(w.due)}</span>`
          :`<span style="color:var(--text3);font-size:11px">—</span>`;
        let btnLabel,btnStyle;
        if (w.type==='action')            {btnLabel='Resolve';    btnStyle=`color:var(--compass-green);border:1px solid var(--compass-green);background:none`;}
        else if (w.status==='blocked')    {btnLabel='Unblock';    btnStyle=`color:var(--compass-amber);border:1px solid var(--compass-amber);background:none`;}
        else if (w.pct>=100)               {btnLabel='Mark Done';  btnStyle=`color:#060a10;border:none;background:var(--compass-cyan)`;}
        else if (w.status==='in_progress'){btnLabel='In Progress';btnStyle=`color:var(--compass-amber);border:1px solid rgba(239,159,39,.5);background:none`;}
        else                               {btnLabel='Start';      btnStyle=`color:var(--compass-cyan);border:1px solid rgba(0,210,255,.4);background:none`;}
        return `<div class="cmp-row wi-row" data-wi-id="${w.id}" data-wi-type="${w.type}"
          data-wi-status="${w.status}" data-wi-projectid="${w.projectId||''}"
          style="display:grid;grid-template-columns:14px 80px 1fr 140px 56px 78px;
            gap:0;align-items:center;padding:0 8px 0 4px;min-height:38px">
          <div style="display:flex;align-items:center;justify-content:center">
            <div class="wi-complete-circle" data-wi-id="${w.id}" data-wi-type="${w.type}"
              data-wi-title="${esc(w.title)}" data-wi-projectid="${w.projectId||''}"
              data-wi-status="${w.status}" title="Click to mark complete"
              style="width:11px;height:11px;border-radius:50%;border:1.5px solid var(--text3);
                cursor:pointer;flex-shrink:0;transition:all .12s"
              onmouseenter="this.style.borderColor='var(--compass-green)';this.style.boxShadow='0 0 0 2px rgba(29,158,117,.25)'"
              onmouseleave="this.style.borderColor='var(--text3)';this.style.boxShadow='none'"></div>
          </div>
          <div style="padding:0 6px 0 2px;display:flex;align-items:center">${badge}</div>
          <div style="padding:8px 8px 8px 4px;min-width:0">
            <div style="font-family:var(--font-body);font-size:12px;font-weight:500;color:var(--text0);
              white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(w.title)}</div>
            <div style="font-family:var(--font-head);font-size:11px;color:var(--text3);margin-top:1px">
              ${esc(w.project)}${w.due?' · Due '+fmtDate(w.due):''}</div>
          </div>
          <div style="padding:0 8px">${progressCell}</div>
          <div style="text-align:center">${dueCell}</div>
          <div style="padding:0 4px">
            <button class="wi-action-btn" data-wi-id="${w.id}" data-wi-type="${w.type}"
              data-wi-title="${esc(w.title)}" data-wi-projectid="${w.projectId||''}"
              data-wi-status="${w.status}" data-wi-pct="${w.pct||0}"
              style="width:100%;font-family:var(--font-head);font-size:11px;font-weight:600;
                letter-spacing:.06em;padding:4px 0;cursor:pointer;border-radius:3px;
                transition:opacity .12s;${btnStyle}"
              onmouseenter="this.style.opacity='.8'" onmouseleave="this.style.opacity='1'">${btnLabel}</button>
          </div>
        </div>`;
      }).join('');
    }

    // Done Today rows
    function doneTodayRows() {
      if (!_doneToday.length) return `<div style="padding:12px 13px;font-family:var(--font-body);
        font-size:12px;color:var(--text3);font-style:italic">
        Nothing completed yet today — complete items from your work list to see them here.</div>`;
      return _doneToday.map(item=>{
        const sc=item.signal==='green'?'var(--compass-green)':item.signal==='red'?'var(--compass-red)':'var(--compass-amber)';
        return `<div style="display:flex;align-items:center;gap:8px;padding:7px 13px;border-bottom:1px solid var(--border)">
          <span style="color:var(--compass-green);font-size:13px;flex-shrink:0">✓</span>
          <div style="flex:1;min-width:0">
            <div style="font-family:var(--font-body);font-size:12px;font-weight:500;color:var(--text0);
              white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(item.title)}</div>
            <div style="font-family:var(--font-head);font-size:11px;color:var(--text3)">
              ${esc(item.project||'—')} · ${item.time||'—'}${item.noTime?' · <span style="color:var(--text3)">no time logged</span>':''}</div>
          </div>
          ${item.signal?`<div style="width:8px;height:8px;border-radius:50%;background:${sc};flex-shrink:0"></div>`:`<div style="width:8px;height:8px"></div>`}
          <div style="font-family:var(--font-display);font-size:13px;font-weight:700;
            color:${item.noTime?'var(--text3)':'var(--compass-cyan)'};flex-shrink:0">
            ${item.noTime?'—':(item.hours||0).toFixed(1)+'h'}</div>
        </div>`;
      }).join('');
    }

    content.innerHTML = `
    <!-- 1.A Greeting -->
    <div style="display:grid;grid-template-columns:1fr auto;align-items:center;gap:12px;margin-bottom:14px">
      <div>
        <div style="font-family:var(--font-display);font-size:22px;font-weight:700;color:var(--text0);line-height:1.1">${greeting}, ${esc(firstName)}</div>
        <div style="font-family:var(--font-head);font-size:12px;color:var(--text3);margin-top:2px">
          ${new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'})}</div>
      </div>
      ${streak>0?`<div style="display:flex;align-items:center;gap:6px;padding:5px 12px;
        background:rgba(239,159,39,.1);border:1px solid rgba(239,159,39,.3);border-radius:4px;
        font-family:var(--font-head);font-size:13px;font-weight:700;color:var(--compass-amber);white-space:nowrap">
        ■ ${streak}-day streak · ${weekDoneLabel}</div>`:''}
    </div>

    <!-- 1.A 8-Card Strip -->
    <div style="display:grid;grid-template-columns:repeat(8,1fr);gap:7px;margin-bottom:14px">
      <div class="stat-card" style="border-top:2px solid var(--text3)">
        <div class="stat-label" style="font-family:var(--font-head)">Waiting</div>
        <div class="stat-value" style="font-family:var(--font-display);color:var(--text3)">${waiting}</div>
        <div class="stat-sub" style="font-family:var(--font-head)">assigned</div>
      </div>
      <div class="stat-card" style="border-top:2px solid var(--compass-cyan)">
        <div class="stat-label" style="font-family:var(--font-head)">In Progress</div>
        <div class="stat-value sv-cyan" style="font-family:var(--font-display)">${inProgress}</div>
        <div class="stat-sub" style="font-family:var(--font-head)">active now</div>
      </div>
      <div class="stat-card" style="border-top:2px solid ${blocked>0?'var(--compass-red)':'var(--border)'}">
        <div class="stat-label" style="font-family:var(--font-head)">Blocked</div>
        <div class="stat-value" style="font-family:var(--font-display);color:${blocked>0?'var(--compass-red)':'var(--text2)'}">${blocked}</div>
        <div class="stat-sub" style="font-family:var(--font-head)">needs attention</div>
      </div>
      <div class="stat-card stat-done-today" style="border-top:2px solid var(--compass-green)">
        <div class="stat-label" style="font-family:var(--font-head)">Done Today</div>
        <div class="stat-value" id="done-today-count" style="font-family:var(--font-display);color:var(--compass-green)">${_doneToday.length}</div>
        <div class="stat-sub" style="font-family:var(--font-head)">completed</div>
      </div>
      <div class="stat-card" style="border-top:2px solid var(--compass-amber)">
        <div class="stat-label" style="font-family:var(--font-head)">Hrs — Week</div>
        <div class="stat-value sv-amber" style="font-family:var(--font-display)">${weekTotal.toFixed(1)}</div>
        <div class="stat-sub" style="font-family:var(--font-head)">${weekBillable.toFixed(1)}h billable</div>
      </div>
      <div class="stat-card" style="border-top:2px solid var(--compass-cyan)">
        <div class="stat-label" style="font-family:var(--font-head)">Hrs — Today</div>
        <div class="stat-value sv-cyan" style="font-family:var(--font-display)">${todayTotal.toFixed(1)}</div>
        <div class="stat-sub" style="font-family:var(--font-head)">of ~8h expected</div>
      </div>
      <div class="stat-card" style="border-top:2px solid ${overdueCount>0?'var(--compass-amber)':'var(--border)'}">
        <div class="stat-label" style="font-family:var(--font-head)">Open Items</div>
        <div class="stat-value" style="font-family:var(--font-display);color:${overdueCount>0?'var(--compass-amber)':'var(--text1)'}">${workItems.length}</div>
        <div class="stat-sub" style="font-family:var(--font-head);color:${overdueCount>0?'var(--compass-red)':'var(--text3)'}">${overdueCount>0?overdueCount+' overdue':'all current'}</div>
      </div>
      <div class="stat-card" style="border-top:2px solid var(--compass-purple)">
        <div class="stat-label" style="font-family:var(--font-head)">Active WF</div>
        <div class="stat-value" style="font-family:var(--font-display);color:var(--compass-purple)">${wfInstances.length}</div>
        <div class="stat-sub" style="font-family:var(--font-head)">firm-wide</div>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr minmax(0,300px);gap:14px">
      <div>
        <!-- 1.B Speedometer Row + Bill/Non-bill bar -->
        <div class="cmp-panel" style="margin-bottom:14px">
          <div class="panel-hdr">

                ${_weekOffset>0?`onmouseenter="this.style.borderColor='var(--compass-cyan)';this.style.color='var(--compass-cyan)'"
                  onmouseleave="this.style.borderColor='var(--border)';this.style.color='var(--text3)'"`:''}
                >›</button>

          <div style="display:grid;grid-template-columns:auto 200px;gap:0;align-items:start">
            <!-- Gauges column -->
            <div>
              <div style="display:flex;justify-content:flex-start;padding:8px 4px 0;gap:0">

              </div>

            <!-- Billable summary column -->
            <div style="padding:12px 14px 10px;border-left:1px solid var(--border);display:flex;flex-direction:column;gap:8px;min-width:0">

                  <div style="font-family:var(--font-head);font-size:11px;color:var(--text3);margin-top:2px">billable</div>
                </div>
                <div style="text-align:right">
                  <div style="font-family:var(--font-display);font-size:22px;font-weight:700;line-height:1;color:#8B5CF6">${(weekTotal-weekBillable).toFixed(1)}h</div>
                  <div style="font-family:var(--font-head);font-size:11px;color:var(--text3);margin-top:2px">non-bill</div>
                </div>
              </div>
              <!-- The bar -->
              ${weekTotal>0?`
              <div>
                <div style="display:flex;height:6px;border-radius:3px;overflow:hidden;background:rgba(255,255,255,.06)">
                  <div style="width:${(weekBillable/weekTotal*100).toFixed(1)}%;background:var(--compass-cyan);transition:width .4s ease"></div>
                  <div style="width:${((weekTotal-weekBillable)/weekTotal*100).toFixed(1)}%;background:#8B5CF6;transition:width .4s ease"></div>
                </div>
                <div style="display:flex;justify-content:space-between;margin-top:4px;font-family:var(--font-head);font-size:11px;font-weight:700">
                  <span style="color:var(--compass-cyan)">${weekTotal>0?Math.round(weekBillable/weekTotal*100):0}%</span>
                  <span style="color:#8B5CF6">${weekTotal>0?Math.round((weekTotal-weekBillable)/weekTotal*100):0}%</span>
                </div>
              </div>
              <div style="font-family:var(--font-head);font-size:11px;color:var(--text3);border-top:1px solid var(--border);padding-top:8px">
                <span style="color:var(--text1);font-weight:600">${weekTotal.toFixed(1)}h</span> total this week
              </div>`:`<div style="font-family:var(--font-head);font-size:12px;color:var(--text3)">No hours logged yet</div>`}
            </div>
          </div>
        </div>

        <!-- 1.C Work List -->
        <div class="cmp-panel" style="margin-bottom:14px">
          <div class="panel-hdr" style="flex-wrap:wrap;gap:6px;padding-bottom:8px">
            <div class="panel-title">My work</div>
            <div style="display:flex;align-items:center;gap:8px">
              ${overdueCount>0?`<span class="panel-badge pb-red">${overdueCount} overdue</span>`:`<span class="panel-badge pb-green">All current</span>`}
            </div>
          </div>
          <div style="display:flex;align-items:center;gap:6px;padding:7px 13px;
            border-bottom:1px solid var(--border);flex-wrap:wrap;background:var(--bg2)">
            <span style="font-family:var(--font-head);font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.06em">TYPE</span>
            <div style="display:flex;gap:3px">
              ${['all','task','action'].map(t=>{const labels={all:'All',task:'Tasks',action:'Actions'},active=_wfType===t;return `<button class="wf-type-btn" data-type="${t}" style="font-family:var(--font-head);font-size:11px;font-weight:600;padding:3px 8px;background:${active?'rgba(139,92,246,.25)':'none'};color:${active?'#8B5CF6':'var(--text2)'};border:1px solid ${active?'#8B5CF6':'var(--border)'};cursor:pointer">${labels[t]}</button>`;}).join('')}
            </div>
            <span style="font-family:var(--font-head);font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.06em;margin-left:4px">STATUS</span>
            <div style="display:flex;gap:3px">
              ${['all','not_started','in_progress','blocked'].map(s=>{const labels={all:'All',not_started:'Not started',in_progress:'In progress',blocked:'Blocked'},active=_wfStatus===s;return `<button class="wf-status-btn" data-status="${s}" style="font-family:var(--font-head);font-size:11px;font-weight:600;padding:3px 8px;background:${active?'rgba(0,210,255,.12)':'none'};color:${active?'var(--compass-cyan)':'var(--text2)'};border:1px solid ${active?'var(--compass-cyan)':'var(--border)'};cursor:pointer">${labels[s]}</button>`;}).join('')}
            </div>
            <span style="font-family:var(--font-head);font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.06em;margin-left:4px">RANGE</span>
            <div style="display:flex;gap:3px">
              ${[['today','Today'],['week','Week'],['30d','30d'],['all','All time']].map(([v,l])=>{const active=_wfDateRange===v;return `<button class="wf-date-btn" data-range="${v}" style="font-family:var(--font-head);font-size:11px;font-weight:600;padding:3px 8px;background:${active?'rgba(239,159,39,.15)':'none'};color:${active?'var(--compass-amber)':'var(--text2)'};border:1px solid ${active?'var(--compass-amber)':'var(--border)'};cursor:pointer">${l}</button>`;}).join('')}
            </div>
            <select class="wf-proj-sel" style="font-family:var(--font-head);font-size:11px;padding:3px 8px;
              background:var(--bg1);color:var(--text1);border:1px solid ${_wfProject?'var(--compass-cyan)':'var(--border)'};
              cursor:pointer;flex:1;min-width:100px;max-width:160px;margin-left:auto">
              <option value="">All projects</option>
              ${[...new Set(workItems.filter(w=>w.projectId).map(w=>w.projectId))].map(pid=>{const p=_projects.find(p=>p.id===pid);return p?`<option value="${p.id}" ${_wfProject===p.id?'selected':''}}>${esc(p.name)}</option>`:'';}).join('')}
            </select>
          </div>
          <div style="display:grid;grid-template-columns:14px 80px 1fr 140px 56px 78px;
            gap:0;padding:5px 8px 5px 4px;border-bottom:1px solid var(--border);
            font-family:var(--font-head);font-size:11px;font-weight:700;color:var(--text3);
            letter-spacing:.08em;text-transform:uppercase">
            <div></div><div style="padding-left:2px">TYPE</div>
            <div style="padding-left:4px">TASK / ACTION</div>
            <div style="padding:0 8px">PROGRESS</div>
            <div style="text-align:center">DUE</div><div></div>
          </div>
          <div id="work-list-rows">${workListRows()}</div>
        </div>

        <!-- 1.D Done Today -->
        <div class="cmp-panel" style="margin-bottom:14px">
          <div class="panel-hdr">
            <div class="panel-title">Done today
              ${_doneToday.length>0?`<span style="font-family:var(--font-head);font-size:11px;font-weight:600;color:var(--compass-green);margin-left:8px">${_doneToday.length} completed</span>`:''}</div>
          </div>
          <div id="done-today-list">${doneTodayRows()}</div>
        </div>
      </div>

      <div>
        <!-- 1.E Timesheet Status -->
        <div class="cmp-panel" style="margin-bottom:14px">
          <div style="padding:10px 13px 6px">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
              <span style="font-family:var(--font-head);font-size:13px;font-weight:700;color:var(--text1)">WEEK OF ${weekOf}</span>
              <span style="font-family:var(--font-head);font-size:11px;font-weight:700;letter-spacing:.1em;
                color:${wsColor};border:1px solid ${wsColor};padding:1px 7px">${wsLabel}</span>
            </div>
            <div style="font-family:var(--font-display);font-size:26px;font-weight:700;color:var(--text0);line-height:1">${weekTotal.toFixed(1)}h</div>
            <div style="font-family:var(--font-head);font-size:12px;color:var(--text3);margin-top:2px">
              <span style="color:var(--compass-cyan)">${weekBillable.toFixed(1)}h billable</span>
              · <span style="color:#8B5CF6">${(weekTotal-weekBillable).toFixed(1)}h non-billable</span>
            </div>
          </div>
          <div style="display:flex;align-items:center;justify-content:space-around;
            padding:8px 13px 10px;border-top:1px solid var(--border);border-bottom:1px solid var(--border)">
            ${dotsHtml}
          </div>
          ${eodNudgeHtml}
          <div style="padding:8px 13px;display:flex;gap:8px;align-items:center">
            <button class="open-weekly-ts-btn"
              style="flex:1;font-family:var(--font-head);font-size:11px;font-weight:700;
                letter-spacing:.07em;text-transform:uppercase;padding:7px;
                background:none;border:1px solid rgba(0,210,255,.3);color:var(--compass-cyan);
                cursor:pointer;transition:background .12s"
              onmouseenter="this.style.background='rgba(0,210,255,.07)'"
              onmouseleave="this.style.background='none'">Full week view →</button>
            ${(wsStatus==='draft'||wsStatus==='rejected'||wsStatus==='amended')?`
            <button class="ts-submit-btn" data-week-id="${myWeekRow?.id||''}"
              data-week-start="${weekStartDate}" data-week-hours="${weekTotal.toFixed(1)}"
              style="font-family:var(--font-head);font-size:11px;font-weight:700;letter-spacing:.07em;
                text-transform:uppercase;padding:7px 14px;background:var(--compass-cyan);
                color:#060a10;border:none;cursor:pointer;transition:opacity .12s"
              onmouseenter="this.style.opacity='.85'" onmouseleave="this.style.opacity='1'">Submit →</button>`:''}
          </div>
        </div>

        <!-- Time log -->
        <div class="cmp-panel" style="margin-bottom:14px">
          <div class="panel-hdr">
            <div class="panel-title">Time log${filterLabel?' — '+filterLabel:' — recent'}</div>
            <div style="display:flex;gap:8px;align-items:center">
              ${filterLabel?`<button class="te-clear-filter"
                style="font-family:var(--font-head);font-size:11px;color:var(--compass-amber);
                  background:none;border:none;cursor:pointer;padding:0">✕ clear</button>`:''  }
              <button class="te-new-btn"
                style="font-family:var(--font-head);font-size:11px;font-weight:700;
                  letter-spacing:.06em;color:var(--compass-cyan);background:none;
                  border:1px solid rgba(0,210,255,.25);padding:3px 8px;cursor:pointer"
                onmouseenter="this.style.background='rgba(0,210,255,.08)'"
                onmouseleave="this.style.background='none'">+ Log time</button>
              <button class="te-week-footer"
                style="font-family:var(--font-head);font-size:11px;color:var(--text3);
                  background:none;border:none;cursor:pointer;padding:0">Week view →</button>
            </div>
          </div>
          ${displayEntries.length===0
            ?`<div style="padding:14px 13px;font-family:var(--font-head);font-size:12px;color:var(--text3)">
              ${filterLabel?'No entries for this day':'No time entries this period'}</div>`
            :displayEntries.map(e=>{
              const proj=_projects.find(p=>p.id===e.project_id);
              const srcIcon=e.source_type==='step_comment'?'◈':e.source_type==='action_item'?'⊡':'●';
              const srcColor=e.source_type==='step_comment'?'var(--compass-cyan)':e.source_type==='action_item'?'var(--compass-purple)':'var(--text3)';
              const isCadence=e.source_type==='step_comment';
              return `<div class="te-row" data-te-id="${e.id}" data-te-cadence="${isCadence}"
                style="display:flex;align-items:center;gap:8px;padding:7px 13px;
                  border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;
                  border-left:2px solid ${_teSelected===e.id?'var(--compass-cyan)':'transparent'};
                  background:${_teSelected===e.id?'rgba(0,210,255,.04)':''}"
                onmouseenter="this.style.background='var(--bg2)'"
                onmouseleave="this.style.background='${_teSelected===e.id?'rgba(0,210,255,.04)':''}' ">
                <div style="font-size:13px;color:${srcColor};flex-shrink:0">${srcIcon}</div>
                <div style="flex:1;min-width:0">
                  <div style="font-family:var(--font-body);font-size:12px;font-weight:500;
                    color:var(--text0);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">
                    ${e.step_name?esc(e.step_name):esc(proj?.name||'—')}</div>
                  <div style="font-family:var(--font-head);font-size:11px;color:var(--text3);margin-top:1px">
                    ${fmtDate(e.date)} · ${e.is_billable?'Billable':'Non-billable'}
                    ${isCadence?' · <span style="color:var(--compass-cyan)">via Cadence</span>':''}</div>
                </div>
                <div style="font-family:var(--font-display);font-size:13px;font-weight:700;
                  color:${e.is_billable?'var(--compass-green)':'var(--text2)'};flex-shrink:0">
                  ${parseFloat(e.hours).toFixed(1)}h</div>
              </div>`;
            }).join('')
            +`<div style="padding:8px 13px;display:flex;justify-content:space-between;
              align-items:center;border-top:1px solid var(--border)">
              <span style="font-family:var(--font-head);font-size:11px;color:var(--text3)">
                ${filterLabel?filterLabel+' total':'Week of '+new Date(weekStartDate+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'})}</span>
              <div style="display:flex;align-items:center;gap:12px">
                <span style="font-family:var(--font-display);font-size:13px;font-weight:700;color:var(--compass-cyan)">
                  ${filterLabel?displayEntries.reduce((s,e)=>s+parseFloat(e.hours||0),0).toFixed(1):weekTotal.toFixed(1)}h</span>
                <button class="te-week-footer"
                  style="font-family:var(--font-head);font-size:11px;color:var(--compass-cyan);
                    background:none;border:1px solid rgba(0,210,255,.25);padding:3px 10px;cursor:pointer"
                  onmouseenter="this.style.background='rgba(0,210,255,.08)'"
                  onmouseleave="this.style.background='none'">Week view →</button>
              </div>
            </div>`}
        </div>

        <!-- Active Workflows -->
        <div class="cmp-panel" style="margin-bottom:14px">
          <div class="panel-hdr"><div class="panel-title">Active workflows</div></div>
          ${wfInstances.slice(0,4).map(w=>{const proj=_projects.find(p=>p.id===w.project_id);return `<div class="cmp-row" onclick="window.location.href='/cadence.html?instance=${w.id}'">
            <div style="width:7px;height:7px;border-radius:50%;background:var(--compass-amber);flex-shrink:0"></div>
            <div style="flex:1;min-width:0"><div class="row-title">${esc(w.title)}</div>
              <div class="row-sub">${proj?esc(proj.name)+' · ':''  }${w.current_step_name?esc(w.current_step_name):'Active'}</div></div>
            <span style="font-family:var(--font-head);font-size:11px;color:var(--text3)">▶</span>
          </div>`;}).join('')||'<div style="padding:12px 13px;font-family:var(--font-head);font-size:12px;color:var(--text3)">No active instances</div>'}
        </div>

        <!-- Quick access -->
        <div class="cmp-panel">
          <div class="panel-hdr"><div class="panel-title">Quick access</div></div>
          <div class="cmp-row" onclick="window.location.href='/cadence.html'">
            <div style="flex:1"><div class="row-title">Cadence canvas →</div>
            <div class="row-sub">Log hours while advancing steps</div></div>
          </div>
          <div class="cmp-row" onclick="window.location.href='/resources.html'">
            <div style="flex:1"><div class="row-title">Full timesheet →</div>
            <div class="row-sub">Edit, submit, and review all entries</div></div>
          </div>
        </div>
      </div>
    </div>`;

    if (loading) loading.style.display = 'none';
    content.style.display = 'block';

  } catch (e) {
    console.error('[Compass] loadUserView error:', e);
    if (loading) loading.innerHTML = '<div style="color:var(--compass-red);font-family:var(--font-head);font-size:11px">Failed to load — check console</div>';
  }
}
