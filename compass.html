<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compass — Operational Intelligence</title>
<link rel="stylesheet" href="/css/hud.css">
<style>
/* ── Compass shell variables ─────────────────────────────── */
:root {
  --compass-cyan:   #00D2FF;
  --compass-amber:  #EF9F27;
  --compass-green:  #1D9E75;
  --compass-red:    #E24B4A;
  --compass-purple: #8B5CF6;
}

/* ── Layout ──────────────────────────────────────────────── */
#compass-app {
  display: flex;
  flex-direction: column;
  min-height: 100vh;
  background: var(--bg0, #060a10);
}

/* ── Top nav bar ─────────────────────────────────────────── */
#compass-nav {
  display: flex;
  align-items: center;
  gap: 0;
  height: 44px;
  background: var(--bg1, #0c1628);
  border-bottom: 1px solid var(--border, rgba(0,210,255,.12));
  padding: 0 16px;
  flex-shrink: 0;
  position: sticky;
  top: 0;
  z-index: 100;
}

.compass-logo-mark {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-right: 20px;
  text-decoration: none;
}

.compass-wordmark {
  font-family: var(--font-hud, 'Rajdhani', sans-serif);
  font-size: 17px;
  font-weight: 700;
  letter-spacing: .12em;
  color: var(--text0, #eef4ff);
}

.compass-wordmark span {
  color: var(--compass-cyan);
}

.nav-sep {
  width: 1px;
  height: 22px;
  background: var(--border);
  margin: 0 16px;
}

/* Role tab buttons */
.role-tab {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 0 14px;
  height: 44px;
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  color: var(--text2, #7a9bbf);
  font-family: var(--font-mono, 'Share Tech Mono', monospace);
  font-size: 10px;
  letter-spacing: .1em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all .12s;
  white-space: nowrap;
}

.role-tab:hover {
  color: var(--text0);
  background: rgba(255,255,255,.03);
}

.role-tab.active {
  color: var(--compass-cyan);
  border-bottom-color: var(--compass-cyan);
}

.role-tab .tab-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: currentColor;
  opacity: .5;
}

.role-tab.active .tab-dot {
  opacity: 1;
}

/* Badge on role tabs */
.tab-badge {
  background: var(--compass-red);
  color: #fff;
  font-size: 10px;
  font-family: var(--font-mono);
  padding: 1px 5px;
  border-radius: 8px;
  font-weight: 700;
  letter-spacing: 0;
}

/* Nav right side */
.nav-spacer { flex: 1; }

.nav-live {
  display: flex;
  align-items: center;
  gap: 5px;
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--compass-green);
  letter-spacing: .1em;
  margin-right: 12px;
}

.nav-live-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--compass-green);
  animation: pulse-live 2s infinite;
}

@keyframes pulse-live {
  0%, 100% { opacity: 1; }
  50%       { opacity: .35; }
}

.nav-user {
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text2);
}

.nav-avatar {
  width: 26px;
  height: 26px;
  border-radius: 50%;
  background: rgba(0,210,255,.15);
  border: 1px solid rgba(0,210,255,.3);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-hud);
  font-size: 11px;
  font-weight: 700;
  color: var(--compass-cyan);
}

/* ── View panels ─────────────────────────────────────────── */
.compass-view {
  display: none;
  flex: 1;
  overflow-y: auto;
}

.compass-view.active {
  display: block;
}

/* ── Common inner layout ─────────────────────────────────── */
.view-body {
  padding: 20px 22px;
  max-width: 1600px;
}

/* ── Stat strip ──────────────────────────────────────────── */
.stat-strip {
  display: grid;
  gap: 8px;
  margin-bottom: 16px;
}

.stat-strip-4 { grid-template-columns: repeat(4, 1fr); }
.stat-strip-6 { grid-template-columns: repeat(6, 1fr); }

.stat-card {
  background: var(--bg1);
  border: 1px solid var(--border);
  padding: 10px 13px;
  cursor: default;
}

.stat-label {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 4px;
}

.stat-value {
  font-family: var(--font-hud);
  font-size: 26px;
  font-weight: 700;
  color: var(--text0);
  line-height: 1;
}

.stat-sub {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text3);
  margin-top: 3px;
}

.sv-cyan   { color: var(--compass-cyan); }
.sv-amber  { color: var(--compass-amber); }
.sv-green  { color: var(--compass-green); }
.sv-red    { color: var(--compass-red); }
.sv-purple { color: var(--compass-purple); }

/* ── Panel card ──────────────────────────────────────────── */
.cmp-panel {
  background: var(--bg1);
  border: 1px solid var(--border);
  margin-bottom: 14px;
}

.cmp-panel:last-child { margin-bottom: 0; }

.panel-hdr {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 13px;
  border-bottom: 1px solid var(--border);
}

.panel-title {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--text3);
}

.panel-badge {
  font-family: var(--font-mono);
  font-size: 10px;
  padding: 2px 7px;
  font-weight: 700;
}

.pb-red    { background: rgba(226,75,74,.15);  color: var(--compass-red);    border: 1px solid rgba(226,75,74,.3); }
.pb-amber  { background: rgba(239,159,39,.12); color: var(--compass-amber);  border: 1px solid rgba(239,159,39,.3); }
.pb-green  { background: rgba(29,158,117,.12); color: var(--compass-green);  border: 1px solid rgba(29,158,117,.3); }
.pb-cyan   { background: rgba(0,210,255,.08);  color: var(--compass-cyan);   border: 1px solid rgba(0,210,255,.25); }

/* ── Two-column grid ─────────────────────────────────────── */
.two-col { display: grid; grid-template-columns: 1fr minmax(0, 320px); gap: 14px; }
.three-col { display: grid; grid-template-columns: 1fr 1fr minmax(0, 280px); gap: 14px; }

/* ── Row items ───────────────────────────────────────────── */
.cmp-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 13px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background .1s;
}

.cmp-row:last-child { border-bottom: none; }
.cmp-row:hover { background: var(--bg2); }

.row-title {
  font-family: var(--font-ui, 'Barlow Condensed', sans-serif);
  font-size: 13px;
  font-weight: 500;
  color: var(--text0);
  flex: 1;
  min-width: 0;
}

.row-sub {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text3);
  margin-top: 2px;
}

/* ── Action rows ─────────────────────────────────────────── */
.action-row {
  padding: 11px 13px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background .1s;
}

.action-row:last-child { border-bottom: none; }
.action-row:hover { background: var(--bg2); }

.action-row.urgent { border-left: 3px solid var(--compass-red); }
.action-row.warning { border-left: 3px solid var(--compass-amber); }

.ar-hdr {
  display: flex;
  align-items: flex-start;
  gap: 9px;
  margin-bottom: 4px;
}

.ar-icon {
  width: 26px;
  height: 26px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  font-size: 12px;
}

.ari-red    { background: rgba(226,75,74,.15);  color: var(--compass-red); }
.ari-amber  { background: rgba(239,159,39,.12); color: var(--compass-amber); }
.ari-cyan   { background: rgba(0,210,255,.1);   color: var(--compass-cyan); }
.ari-green  { background: rgba(29,158,117,.12); color: var(--compass-green); }

.ar-title {
  font-family: var(--font-ui);
  font-size: 12.5px;
  font-weight: 500;
  color: var(--text0);
  flex: 1;
  min-width: 0;
  line-height: 1.3;
}

.ar-due {
  font-family: var(--font-mono);
  font-size: 10px;
  flex-shrink: 0;
}

.ar-due.red   { color: var(--compass-red); }
.ar-due.amber { color: var(--compass-amber); }

.ar-body {
  font-family: var(--font-ui);
  font-size: 11px;
  color: var(--text2);
  line-height: 1.5;
  margin: 3px 0 6px 35px;
}

.ar-warn {
  font-family: var(--font-mono);
  font-size: 10px;
  padding: 5px 8px;
  background: rgba(239,159,39,.08);
  border: 1px solid rgba(239,159,39,.2);
  color: var(--compass-amber);
  margin: 3px 0 6px 35px;
  letter-spacing: .03em;
}

.ar-acts {
  display: flex;
  gap: 6px;
  margin-left: 35px;
  flex-wrap: wrap;
}

/* ── Buttons ─────────────────────────────────────────────── */
.cmp-btn {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: .08em;
  text-transform: uppercase;
  padding: 4px 12px;
  cursor: pointer;
  border: 1px solid;
  transition: opacity .12s;
  white-space: nowrap;
}

.cmp-btn:hover { opacity: .75; }

.btn-approve { border-color: rgba(29,158,117,.5);  background: rgba(29,158,117,.1);  color: var(--compass-green); }
.btn-reject  { border-color: rgba(226,75,74,.5);   background: none;                 color: var(--compass-red); }
.btn-respond { border-color: rgba(0,210,255,.4);   background: rgba(0,210,255,.08);  color: var(--compass-cyan); }
.btn-ghost   { border-color: var(--border);        background: none;                 color: var(--text2); }

/* ── Milestone dot ───────────────────────────────────────── */
.ms-dot {
  width: 11px;
  height: 11px;
  border-radius: 50%;
  flex-shrink: 0;
}

.ms-done   { background: var(--compass-green); }
.ms-active { background: var(--compass-amber); }
.ms-risk   { background: var(--compass-red); }
.ms-future { background: none; border: 1.5px solid var(--border); }

/* ── Status badges ───────────────────────────────────────── */
.status-badge {
  font-family: var(--font-mono);
  font-size: 10px;
  padding: 2px 7px;
  flex-shrink: 0;
}

.sb-done   { background: rgba(29,158,117,.12);  color: var(--compass-green); border: 1px solid rgba(29,158,117,.3); }
.sb-risk   { background: rgba(226,75,74,.12);   color: var(--compass-red);   border: 1px solid rgba(226,75,74,.3); }
.sb-warn   { background: rgba(239,159,39,.1);   color: var(--compass-amber); border: 1px solid rgba(239,159,39,.25); }
.sb-future { background: rgba(255,255,255,.04); color: var(--text3);         border: 1px solid var(--border); }
.sb-cyan   { background: rgba(0,210,255,.08);   color: var(--compass-cyan);  border: 1px solid rgba(0,210,255,.25); }

/* ── Progress bar ────────────────────────────────────────── */
.progress-track {
  height: 4px;
  background: var(--bg2);
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  transition: width .5s;
}

/* ── Budget bar ──────────────────────────────────────────── */
.budget-row {
  padding: 10px 13px;
  border-bottom: 1px solid var(--border);
}

.budget-row:last-child { border-bottom: none; }

.budget-header {
  display: flex;
  justify-content: space-between;
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text3);
  margin-bottom: 5px;
}

.budget-value {
  font-weight: 700;
  color: var(--text1);
}

.budget-track {
  height: 6px;
  background: var(--bg2);
  overflow: hidden;
}

.budget-fill {
  height: 100%;
  transition: width .6s;
}

/* ── Update / thread rows ────────────────────────────────── */
.update-row {
  padding: 10px 13px;
  border-bottom: 1px solid var(--border);
}

.update-row:last-child { border-bottom: none; }

.ur-hdr {
  display: flex;
  align-items: center;
  gap: 7px;
  margin-bottom: 4px;
}

.ur-av {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-hud);
  font-size: 10px;
  font-weight: 700;
  flex-shrink: 0;
}

.av-cyan   { background: rgba(0,210,255,.15);   border: 1px solid rgba(0,210,255,.3);   color: var(--compass-cyan); }
.av-amber  { background: rgba(239,159,39,.15);  border: 1px solid rgba(239,159,39,.3);  color: var(--compass-amber); }
.av-green  { background: rgba(29,158,117,.15);  border: 1px solid rgba(29,158,117,.3);  color: var(--compass-green); }

.ur-name {
  font-family: var(--font-ui);
  font-size: 11.5px;
  font-weight: 500;
  color: var(--text0);
  flex: 1;
}

.ur-time {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text3);
}

.ur-body {
  font-family: var(--font-ui);
  font-size: 11px;
  color: var(--text2);
  line-height: 1.5;
  margin-left: 29px;
}

.ur-flagged {
  border-left: 2px solid var(--compass-amber);
  padding-left: 8px;
  margin-left: 29px;
  color: var(--text1);
  font-family: var(--font-ui);
  font-size: 11px;
  line-height: 1.5;
}

/* ── Thread input ────────────────────────────────────────── */
.thread-in {
  padding: 9px 13px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 7px;
  align-items: center;
}

.thread-in input {
  flex: 1;
  font-family: var(--font-ui);
  font-size: 11px;
  padding: 6px 10px;
  background: var(--bg2);
  border: 1px solid var(--border);
  color: var(--text1);
  outline: none;
  transition: border-color .15s;
}

.thread-in input:focus { border-color: rgba(0,210,255,.4); }

/* ── Document rows ───────────────────────────────────────── */
.doc-row {
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 8px 13px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background .1s;
}

.doc-row:last-child { border-bottom: none; }
.doc-row:hover { background: var(--bg2); }

.doc-icon {
  width: 26px;
  height: 26px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  flex-shrink: 0;
}

.doc-info { flex: 1; min-width: 0; }

.doc-name {
  font-family: var(--font-ui);
  font-size: 12px;
  font-weight: 500;
  color: var(--text0);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.doc-meta {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text3);
  margin-top: 1px;
}

/* ── Scrubber ────────────────────────────────────────────── */
.scrubber-wrap {
  padding: 10px 13px;
  border-bottom: 1px solid var(--border);
}

.scrubber-labels {
  display: flex;
  justify-content: space-between;
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text3);
  margin-bottom: 6px;
}

.scrubber-date-active {
  color: var(--compass-cyan);
  font-weight: 700;
}

.scrubber-track {
  position: relative;
  height: 4px;
  background: var(--bg2);
  cursor: pointer;
  margin-bottom: 6px;
}

.scrubber-fill {
  height: 100%;
  background: var(--compass-cyan);
  transition: width .1s;
}

.scrubber-thumb {
  position: absolute;
  top: 50%;
  width: 12px;
  height: 12px;
  background: var(--bg1);
  border: 2px solid var(--compass-cyan);
  border-radius: 50%;
  transform: translate(-50%, -50%);
  cursor: grab;
  transition: left .1s;
}

.scrubber-dots {
  display: flex;
  justify-content: space-between;
  margin-top: 4px;
}

.sdot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  cursor: pointer;
  transition: transform .1s;
}

.sdot:hover { transform: scale(1.5); }

.scrubber-snapshot {
  padding: 8px 10px;
  background: var(--bg2);
  font-family: var(--font-ui);
  font-size: 11px;
  color: var(--text2);
  line-height: 1.5;
  min-height: 38px;
  margin-top: 6px;
  border-left: 2px solid var(--compass-cyan);
}

/* ── Rejection context card ──────────────────────────────── */
.rejection-context {
  display: flex;
  gap: 9px;
  padding: 9px 10px;
  background: rgba(226,75,74,.07);
  border: 1px solid rgba(226,75,74,.25);
  border-left: 3px solid var(--compass-red);
  margin-bottom: 8px;
}

.rejection-context-icon {
  font-size: 13px;
  color: var(--compass-red);
  flex-shrink: 0;
  margin-top: 1px;
}

.rejection-context-body { flex: 1; min-width: 0; }

.rejection-context-label {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--compass-red);
  margin-bottom: 3px;
}

.rejection-context-text {
  font-family: var(--font-ui);
  font-size: 11px;
  color: var(--text1);
  line-height: 1.45;
  font-style: italic;
}

.rejection-context-meta {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text3);
  margin-top: 3px;
}

/* ── Privacy note ────────────────────────────────────────── */
.privacy-note {
  display: flex;
  align-items: flex-start;
  gap: 7px;
  padding: 8px 13px;
  background: var(--bg2);
  border-top: 1px solid var(--border);
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: .04em;
  color: var(--text3);
  line-height: 1.5;
}

/* ── Toast ───────────────────────────────────────────────── */
#compass-toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--bg1);
  border: 1px solid var(--border);
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: .06em;
  color: var(--text0);
  padding: 9px 20px;
  opacity: 0;
  transition: opacity .2s, transform .2s;
  pointer-events: none;
  z-index: 9999;
  white-space: nowrap;
}

#compass-toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* ── Loading state ───────────────────────────────────────── */
#compass-loading {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 200px;
  gap: 12px;
  color: var(--text3);
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: .1em;
}

.loading-spinner {
  width: 24px;
  height: 24px;
  border: 2px solid var(--border);
  border-top-color: var(--compass-cyan);
  border-radius: 50%;
  animation: spin .8s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* ── Responsive ──────────────────────────────────────────── */
@media (max-width: 1100px) {
  .two-col, .three-col { grid-template-columns: 1fr; }
  .stat-strip-6 { grid-template-columns: repeat(3, 1fr); }
}

@media (max-width: 720px) {
  .stat-strip-4, .stat-strip-6 { grid-template-columns: repeat(2, 1fr); }
  .role-tab span.tab-label { display: none; }
}
</style>
</head>
<body>

<div id="compass-app">

  <!-- ── Top navigation bar ──────────────────────────────── -->
  <nav id="compass-nav">

    <!-- Logo -->
    <a class="compass-logo-mark" href="/dashboard.html" title="Back to dashboard">
      <!-- Compass rose mini icon -->
      <svg width="22" height="22" viewBox="-30 -30 60 60" style="flex-shrink:0">
        <circle r="28" fill="none" stroke="#00D2FF" stroke-width="1" opacity=".2"/>
        <circle r="22" fill="none" stroke="#00D2FF" stroke-width="1" opacity=".38"/>
        <circle r="15" fill="#0c1628"/>
        <circle r="15" fill="none" stroke="#00D2FF" stroke-width="1.2"/>
        <!-- Cardinal ticks -->
        <line x1="0" y1="-12" x2="0" y2="-15" stroke="#00D2FF" stroke-width="1.8" opacity=".9"/>
        <line x1="0" y1="12" x2="0" y2="15" stroke="#00D2FF" stroke-width="1.8" opacity=".9"/>
        <line x1="-12" y1="0" x2="-15" y2="0" stroke="#00D2FF" stroke-width="1.8" opacity=".9"/>
        <line x1="12" y1="0" x2="15" y2="0" stroke="#00D2FF" stroke-width="1.8" opacity=".9"/>
        <!-- 45° ticks -->
        <line x1="8" y1="-8" x2="10" y2="-10" stroke="#00D2FF" stroke-width="1.2" opacity=".6"/>
        <line x1="-8" y1="-8" x2="-10" y2="-10" stroke="#00D2FF" stroke-width="1.2" opacity=".6"/>

<script>
'use strict';

// ── Constants ─────────────────────────────────────────────
const FIRM_ID = 'aaaaaaaa-0001-0001-0001-000000000001';

// ── State ─────────────────────────────────────────────────
let _projects   = [];
let _tasks      = [];
let _resources  = [];
let _users      = [];
let _myResource = null;
let _currentView = null;
let _viewLoaded  = {};
let _identityDebug = {};
let _teFilter    = null;   // date string 'YYYY-MM-DD' | null — filters time log by day
let _teEntries   = [];     // cached time entries for current user view session

// ── Init ──────────────────────────────────────────────────
document.getElementById('compass-date').textContent =
  new Date().toLocaleDateString('en-US', {
    weekday: 'short', month: 'short', day: 'numeric', year: 'numeric'
  }).toUpperCase();

document.addEventListener('DOMContentLoaded', async () => {
  await loadBaseData();
  // Default view: PM
  const saved = sessionStorage.getItem('compass-view') || 'pm';
  switchView(saved);
});

// ── Load shared base data ─────────────────────────────────
async function loadBaseData() {
  try {
    // ── Step 1: Resolve identity ──────────────────────────────
    let authEmail = null;
    let authSub   = null;
    let appUserId = null;
    let appUserResourceId = null;

    try {
      const token  = await Auth.getFreshToken().catch(() => Auth.getToken());
      const claims = JSON.parse(atob(token.split('.')[1]));
      authSub   = claims.sub;
      authEmail = claims.email || null;

      const uRows   = await API.get(`users?id=eq.${authSub}&select=id,resource_id,name,email`).catch(() => []);
      const appUser = uRows?.[0] || null;
      appUserId          = appUser?.id || null;
      appUserResourceId  = appUser?.resource_id || null;
      if (!authEmail && appUser?.email) authEmail = appUser.email;

      if (appUser?.resource_id) {
        const rRows = await API.get(
          `resources?id=eq.${appUser.resource_id}&select=id,first_name,last_name,email,is_active,is_external,user_id,firm_id,department`
        ).catch(() => []);
        const r = rRows?.[0] || null;
        if (r) {
          _myResource = { ...r,
            name: `${r.first_name||''} ${r.last_name||''}`.trim() || appUser.name || appUser.email || '—',
          };
        }
      }

      // Fallback — match by email if resource_id path didn't resolve
      if (!_myResource && authEmail) {
        const eRows = await API.get(
          `resources?email=eq.${encodeURIComponent(authEmail)}&select=id,first_name,last_name,email,is_active,is_external,user_id,firm_id,department&limit=1`
        ).catch(() => []);
        const r = eRows?.[0] || null;
        if (r) {
          _myResource = { ...r,
            name: `${r.first_name||''} ${r.last_name||''}`.trim() || authEmail || '—',
          };
        }
      }

      // Store debug info for error messages
      _identityDebug = {
        authEmail,
        authSub:    authSub?.slice(0,8) + '…',
        appUserId:  appUserId?.slice(0,8) + '…' || 'none',
        resourceId: appUserResourceId?.slice(0,8) + '…' || 'none',
        resolved:   !!_myResource,
        name:       _myResource?.name || null,
      };

      console.log('[Compass] Identity:', _myResource?.name || 'unresolved',
        '| email:', authEmail, '| sub:', authSub?.slice(0,8),
        '| resource_id:', appUserResourceId?.slice(0,8) || 'none');

    } catch(e) {
      console.warn('[Compass] Identity resolution failed:', e.message);
      _identityDebug = { error: e.message };
    }

    // ── Step 2: Load shared data ──────────────────────────────
    [_projects, _tasks, _resources, _users] = await Promise.all([
      API.getProjects().catch(() => []),
      API.getTasks().catch(() => []),
      API.get('resources?select=id,first_name,last_name,email,is_active,user_id,firm_id,department&is_active=eq.true&firm_id=eq.' + FIRM_ID).catch(() => []),
      API.getUsers().catch(() => []),
    ]);

    _resources = (_resources || []).map(r => ({
      ...r,
      name: `${r.first_name||''} ${r.last_name||''}`.trim() || r.email || '—',
    }));

    // Update nav avatar
    if (_myResource?.name) {
      const initials = _myResource.name.split(' ').map(n => n[0]).join('').slice(0, 2).toUpperCase();
      const avEl = document.getElementById('compass-user-av');
      if (avEl) avEl.textContent = initials;
    }
  } catch (e) {
    console.error('[Compass] loadBaseData failed:', e);
  }
}

// ── View switcher ─────────────────────────────────────────
function switchView(viewId) {
  // Hide all views
  document.querySelectorAll('.compass-view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.role-tab').forEach(t => t.classList.remove('active'));

  // Show target
  const viewEl = document.getElementById('view-' + viewId);
  const tabEl  = document.getElementById('tab-' + viewId);
  if (!viewEl) return;

  viewEl.classList.add('active');
  if (tabEl) tabEl.classList.add('active');

  _currentView = viewId;
  sessionStorage.setItem('compass-view', viewId);

  // Lazy-load view data on first activation
  if (!_viewLoaded[viewId]) {
    _viewLoaded[viewId] = true;
    switch (viewId) {
      case 'user':       loadUserView();       break;
      case 'pm':         loadPMView();         break;
      case 'management': loadManagementView(); break;
      case 'executive':  loadExecutiveView();  break;
      case 'client':     loadClientView();     break;
    }
  }
}

// ── Toast ─────────────────────────────────────────────────
function compassToast(msg, duration = 2200) {
  const el = document.getElementById('compass-toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), duration);
}

// ── Escape HTML ───────────────────────────────────────────
function esc(s) {
  return String(s ?? '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Date formatting ───────────────────────────────────────
function fmtDate(iso) {
  if (!iso) return '—';
  return new Date(iso + 'T00:00:00').toLocaleDateString('en-US', {
    month: 'short', day: 'numeric'
  });
}

function fmtDateTime(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleDateString('en-US', {
    month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit'
  });
}

function daysOverdue(dateStr) {
  if (!dateStr) return 0;
  const diff = Date.now() - new Date(dateStr + 'T00:00:00').getTime();
  return Math.max(0, Math.floor(diff / 86400000));
}

function _timeAgo(iso) {
  if (!iso) return '—';
  const diff = Date.now() - new Date(iso).getTime();
  const mins  = Math.floor(diff / 60000);
  const hours = Math.floor(diff / 3600000);
  const days  = Math.floor(diff / 86400000);
  if (mins  <  1) return 'just now';
  if (mins  < 60) return `${mins}m ago`;
  if (hours < 24) return `${hours}h ago`;
  if (days  <  7) return `${days}d ago`;
  return fmtDate(iso);
}

// ── Avatar HTML ───────────────────────────────────────────
function avatarHtml(name, size = 24, cls = 'av-cyan') {
  const initials = (name || '?').split(' ').map(n => n[0]).join('').slice(0, 2).toUpperCase();
  return `<div class="ur-av ${cls}" style="width:${size}px;height:${size}px;font-size:${Math.floor(size*0.4)}px">${initials}</div>`;
}


// ══════════════════════════════════════════════════════════
// VIEW: MY WORK (Individual Contributor)
// ══════════════════════════════════════════════════════════
async function loadUserView() {
  const loading = document.getElementById('compass-loading');
  const content = document.getElementById('user-content');

  // Guard: identity must be resolved before querying per-resource data
  if (!_myResource?.id) {
    if (loading) loading.style.display = 'none';
    content.style.display = 'block';
    const d = _identityDebug;
    content.innerHTML = `
      <div style="padding:40px 20px;text-align:center">
        <div style="font-family:var(--font-mono);font-size:10px;color:var(--compass-red);
          margin-bottom:12px;letter-spacing:.12em">⚠ IDENTITY NOT RESOLVED</div>

        <!-- What we found -->
        <div style="display:inline-block;text-align:left;background:var(--bg1);
          border:1px solid var(--border);padding:14px 20px;margin-bottom:16px;
          font-family:var(--font-mono);font-size:10px;line-height:2;min-width:320px">
          <div style="color:var(--text3);letter-spacing:.08em;margin-bottom:4px">SESSION DETAILS</div>
          <div><span style="color:var(--text3)">Auth email&nbsp;&nbsp;&nbsp;</span>
            <span style="color:${d.authEmail ? 'var(--compass-cyan)' : 'var(--compass-red)'}">
              ${d.authEmail || '— not found in JWT —'}</span></div>
          <div><span style="color:var(--text3)">Auth UUID&nbsp;&nbsp;&nbsp;&nbsp;</span>
            <span style="color:var(--text2)">${d.authSub || '—'}</span></div>
          <div><span style="color:var(--text3)">App user ID&nbsp;&nbsp;</span>
            <span style="color:${d.appUserId && d.appUserId !== 'undefin…' ? 'var(--text2)' : 'var(--compass-red)'}">
              ${d.appUserId && d.appUserId !== 'undefin…' ? d.appUserId : '— no users row found —'}</span></div>
          <div><span style="color:var(--text3)">Resource ID&nbsp;&nbsp;</span>
            <span style="color:${d.resourceId && d.resourceId !== 'undefin…' ? 'var(--text2)' : 'var(--compass-red)'}">
              ${d.resourceId && d.resourceId !== 'undefin…' ? d.resourceId : '— not linked —'}</span></div>
          ${d.error ? `<div style="color:var(--compass-red);margin-top:4px">Error: ${esc(d.error)}</div>` : ''}
        </div>

        <div style="font-family:var(--font-ui);font-size:12px;color:var(--text3);
          margin-bottom:16px;line-height:1.6;max-width:480px;margin-left:auto;margin-right:auto">
          ${d.authEmail
            ? `Logged in as <strong style="color:var(--text1)">${esc(d.authEmail)}</strong> but no matching resource record was found.<br>
               Ensure your <code style="color:var(--compass-cyan)">users</code> row has
               <code style="color:var(--compass-cyan)">resource_id</code> set, or that a resource record
               exists with this email address.`
            : `No email found in session token. Try logging out and back in.`}
        </div>

        <a href="/users.html" style="font-family:var(--font-mono);font-size:10px;
          letter-spacing:.1em;color:var(--compass-cyan);text-decoration:none;
          border:1px solid rgba(0,210,255,.3);padding:6px 16px;margin-right:8px">
          USER MGMT →
        </a>
        <button onclick="_viewLoaded['user']=false;loadUserView()"
          style="font-family:var(--font-mono);font-size:10px;letter-spacing:.1em;
            color:var(--text2);background:none;border:1px solid var(--border);
            padding:6px 16px;cursor:pointer">
          RETRY
        </button>
      </div>`;
    return;
  }

  try {
    const resId = _myResource.id;

    const [myTasks, myActionItems, wfInstances, myTimeEntries] = await Promise.all([
      API.get(`tasks?select=id,name,project_id,status,due_date,pct_complete&assigned_to=eq.${_myResource.user_id}&status=neq.complete&order=due_date.asc`).catch(() => []),
      API.get(`workflow_action_items?owner_resource_id=eq.${resId}&status=eq.open&order=due_date.asc`).catch(() => []),
      API.get(`workflow_instances?select=id,title,status,current_step_name,project_id&status=eq.active&limit=20`).catch(() => []),
      API.get(`time_entries?resource_id=eq.${resId}&order=date.desc&limit=200&select=id,date,hours,is_billable,project_id,task_id,step_name,source_type,notes,week_start_date`).catch(() => []),
    ]);

    const today     = new Date().toLocaleDateString('en-CA');
    const todayDate = new Date(today + 'T00:00:00');

    // ── Week boundaries (Mon–Sun) ─────────────────────────────────────
    const dayOfWeek  = todayDate.getDay(); // 0=Sun … 6=Sat
    const isoOffset  = dayOfWeek === 0 ? 6 : dayOfWeek - 1; // offset to Monday
    const weekStart  = new Date(todayDate); weekStart.setDate(todayDate.getDate() - isoOffset);
    const weekDays   = Array.from({ length: 7 }, (_, i) => {
      const d = new Date(weekStart); d.setDate(weekStart.getDate() + i);
      return d.toLocaleDateString('en-CA');
    });
    const weekLabels = ['M','T','W','T','F','S','S'];

    // ── Hours per day this week ───────────────────────────────────────
    const hoursByDay = {};
    weekDays.forEach(d => hoursByDay[d] = 0);
    myTimeEntries.forEach(e => {
      if (hoursByDay.hasOwnProperty(e.date)) {
        hoursByDay[e.date] += parseFloat(e.hours || 0);
      }
    });

    // ── This-week totals ──────────────────────────────────────────────
    const weekEntries    = myTimeEntries.filter(e => weekDays.includes(e.date));
    const weekTotal      = weekEntries.reduce((s, e) => s + parseFloat(e.hours || 0), 0);
    const weekBillable   = weekEntries.filter(e => e.is_billable).reduce((s, e) => s + parseFloat(e.hours || 0), 0);
    const todayTotal     = parseFloat(hoursByDay[today] || 0);
    const maxDayHours    = Math.max(...Object.values(hoursByDay), 1);

    // ── Work list ─────────────────────────────────────────────────────
    const workItems = [];
    myTasks.forEach(t => {
      const proj = _projects.find(p => p.id === t.project_id);
      const overdue = t.due_date && t.due_date < today;
      workItems.push({ type:'task', id:t.id, title:t.name, project:proj?.name||'—',
        projectId: t.project_id || null,
        due:t.due_date, overdue, pct:t.pct_complete||0,
        urgency: overdue ? 0 : (t.due_date ? 1 : 2) });
    });
    myActionItems.forEach(a => {
      const overdue = a.due_date && a.due_date < today;
      workItems.push({ type:'action', id:a.id, title:a.title, project:'Action item',
        projectId: null,
        due:a.due_date, overdue, urgency: overdue ? 0 : 1 });
    });
    workItems.sort((a, b) => {
      if (a.urgency !== b.urgency) return a.urgency - b.urgency;
      if (a.due && b.due) return a.due.localeCompare(b.due);
      return 0;
    });
    const overdueCount = workItems.filter(w => w.overdue).length;

    // ── Cache for interactive time log ───────────────────────────────
    _teEntries = myTimeEntries;
    if (_teFilter && !weekDays.includes(_teFilter)) _teFilter = null; // reset if stale

    // ── Bar chart HTML ────────────────────────────────────────────────
    const barChart = weekDays.map((d, i) => {
      const hrs      = hoursByDay[d] || 0;
      const pct      = Math.round((hrs / Math.max(maxDayHours, 8)) * 100);
      const isToday  = d === today;
      const isFuture = d > today;
      const isActive = _teFilter === d;
      const barColor = isActive ? 'var(--compass-amber)' : isToday ? 'var(--compass-cyan)' : isFuture ? 'var(--border)' : hrs > 0 ? 'var(--compass-green)' : 'var(--border)';
      return `
        <div class="te-bar-col" data-date="${d}" data-has-hours="${hrs > 0}"
          style="display:flex;flex-direction:column;align-items:center;gap:3px;flex:1;
            cursor:${hrs > 0 ? 'pointer' : 'default'}">
          <div style="font-family:var(--font-mono);font-size:10px;
            color:${isActive ? 'var(--compass-amber)' : isToday ? 'var(--compass-cyan)' : 'var(--text3)'}">
            ${hrs > 0 ? hrs.toFixed(1) : ''}
          </div>
          <div style="width:100%;height:48px;display:flex;align-items:flex-end;justify-content:center">
            <div style="width:80%;height:${Math.max(pct, hrs > 0 ? 4 : 0)}%;background:${barColor};
              border-radius:2px 2px 0 0;transition:all .2s;min-height:${hrs > 0 ? '2px' : '0'}"></div>
          </div>
          <div style="font-family:var(--font-mono);font-size:10px;
            color:${isActive ? 'var(--compass-amber)' : isToday ? 'var(--compass-cyan)' : 'var(--text3)'};
            font-weight:${isToday || isActive ? '600' : '400'}">${weekLabels[i]}</div>
          <div style="font-family:var(--font-mono);font-size:10px;color:var(--text3)">
            ${new Date(d + 'T00:00:00').getDate()}
          </div>
        </div>`;
    }).join('');

    // ── Recent time entries — filtered by day if bar clicked ─────────
    const displayEntries = _teFilter
      ? myTimeEntries.filter(e => e.date === _teFilter)
      : myTimeEntries.slice(0, 8);
    const filterLabel = _teFilter
      ? new Date(_teFilter + 'T00:00:00').toLocaleDateString('en-US', {weekday:'short', month:'short', day:'numeric'})
      : null;

    content.innerHTML = `
      <div class="stat-strip stat-strip-4" style="margin-bottom:14px">
        <div class="stat-card">
          <div class="stat-label">Hours this week</div>
          <div class="stat-value sv-cyan">${weekTotal.toFixed(1)}</div>
          <div class="stat-sub">${weekBillable.toFixed(1)}h billable</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Today</div>
          <div class="stat-value ${todayTotal > 0 ? 'sv-green' : ''}">${todayTotal.toFixed(1)}h</div>
          <div class="stat-sub">logged so far</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Open items</div>
          <div class="stat-value ${overdueCount > 0 ? 'sv-red' : ''}">${workItems.length}</div>
          <div class="stat-sub">${overdueCount > 0 ? overdueCount + ' overdue' : 'all current'}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Active workflows</div>
          <div class="stat-value sv-amber">${wfInstances.length}</div>
          <div class="stat-sub">firm-wide</div>
        </div>
      </div>

      <div style="display:grid;grid-template-columns:1fr minmax(0,300px);gap:14px">
        <div>

          <!-- Weekly bar chart -->
          <div class="cmp-panel" style="margin-bottom:14px">
            <div class="panel-hdr">
              <div class="panel-title">This week — hours by day</div>
              <div style="font-family:var(--font-mono);font-size:10px;color:var(--text3)">
                ${new Date(weekDays[0]+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'})}
                –
                ${new Date(weekDays[6]+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'})}
              </div>
            </div>
            <div style="display:flex;gap:4px;padding:10px 13px 8px;align-items:flex-end">
              ${barChart}
            </div>
          </div>

          <!-- My work list -->
          <div class="cmp-panel">
            <div class="panel-hdr">
              <div class="panel-title">My work</div>
              ${overdueCount > 0
                ? `<span class="panel-badge pb-red">${overdueCount} overdue</span>`
                : '<span class="panel-badge pb-green">All current</span>'}
            </div>
            ${workItems.length === 0
              ? `<div style="padding:18px 13px;text-align:center;font-family:var(--font-mono);font-size:11px;color:var(--text3)">No open items assigned to you</div>`
              : workItems.map(w => `
              <div class="cmp-row" onclick="compassToast('${esc(w.title)}')">
                <div style="width:8px;height:8px;border-radius:50%;flex-shrink:0;
                  background:${w.overdue ? 'var(--compass-red)' : w.due ? 'var(--compass-amber)' : 'var(--border)'}"></div>
                <div style="flex:1;min-width:0">
                  <div class="row-title">${esc(w.title)}</div>
                  <div class="row-sub">${esc(w.project)} · ${w.type === 'task' ? 'Task' : 'Action item'}${w.due ? ' · Due ' + fmtDate(w.due) : ''}</div>
                  ${w.type === 'task' && w.pct > 0 ? `
                  <div class="progress-track" style="margin-top:4px;width:100px">
                    <div class="progress-fill" style="width:${w.pct}%;background:var(--compass-cyan)"></div>
                  </div>` : ''}
                </div>
                ${w.overdue ? `<span class="status-badge sb-risk">${daysOverdue(w.due)}d over</span>` : ''}
                <button class="cmp-btn btn-approve" style="padding:3px 10px"
                  onclick="event.stopPropagation();openCompletionPanel(${JSON.stringify({
                    id: w.id, type: w.type, title: w.title,
                    projectId: w.projectId || null
                  })})">Complete</button>
              </div>`).join('')}
          </div>
        </div>

        <div>
          <!-- Timesheet — recent entries -->
          <div class="cmp-panel" style="margin-bottom:14px">
            <div class="panel-hdr">
              <div class="panel-title">Time log${filterLabel ? ` — ${filterLabel}` : ' — recent'}</div>
              <div style="display:flex;gap:8px;align-items:center">
                ${filterLabel ? `<button class="te-clear-filter"
                  style="font-family:var(--font-mono);font-size:10px;color:var(--compass-amber);
                    background:none;border:none;cursor:pointer;padding:0">✕ clear</button>` : ''}
                <a href="/resources.html" style="font-family:var(--font-mono);font-size:10px;
                  color:var(--compass-cyan);text-decoration:none">Full view →</a>
              </div>
            </div>
            ${displayEntries.length === 0
              ? `<div style="padding:14px 13px;font-family:var(--font-mono);font-size:11px;color:var(--text3)">
                  ${filterLabel ? 'No entries for this day' : 'No time entries this period'}
                 </div>`
              : displayEntries.map((e, idx) => {
                  const proj = _projects.find(p => p.id === e.project_id);
                  const sourceIcon  = e.source_type === 'step_comment' ? '◈' : e.source_type === 'action_item' ? '⊡' : '●';
                  const sourceColor = e.source_type === 'step_comment' ? 'var(--compass-cyan)' : e.source_type === 'action_item' ? 'var(--compass-purple)' : 'var(--text3)';
                  const isCadence   = e.source_type === 'step_comment';
                  return `
                  <div class="te-row" data-te-id="${e.id}" data-te-cadence="${isCadence}"
                    style="display:flex;align-items:center;gap:8px;padding:7px 13px;
                      border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s"
                    onmouseenter="this.style.background='var(--bg2)'"
                    onmouseleave="this.style.background=''">
                    <div style="font-size:13px;color:${sourceColor};flex-shrink:0">${sourceIcon}</div>
                    <div style="flex:1;min-width:0">
                      <div style="font-family:var(--font-ui);font-size:12px;font-weight:500;
                        color:var(--text0);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">
                        ${e.step_name ? esc(e.step_name) : esc(proj?.name || '—')}
                      </div>
                      <div style="font-family:var(--font-mono);font-size:10px;color:var(--text3);margin-top:1px">
                        ${fmtDate(e.date)} · ${e.is_billable ? 'Billable' : 'Non-billable'}
                        ${isCadence ? ' · <span style="color:var(--compass-cyan)">via Cadence</span>' : ' · <span style="color:var(--text3)">click to edit</span>'}
                      </div>
                    </div>
                    <div style="font-family:var(--font-mono);font-size:13px;font-weight:600;
                      color:${e.is_billable ? 'var(--compass-green)' : 'var(--text2)'};flex-shrink:0">
                      ${parseFloat(e.hours).toFixed(1)}h
                    </div>
                  </div>`;
                }).join('')}
            <div style="padding:8px 13px;display:flex;justify-content:space-between;
              font-family:var(--font-mono);font-size:10px">
              <span style="color:var(--text3)">${filterLabel ? filterLabel + ' total' : 'Week total'}</span>
              <span style="font-weight:600;color:var(--compass-cyan)">
                ${filterLabel
                  ? displayEntries.reduce((s, e) => s + parseFloat(e.hours || 0), 0).toFixed(1)
                  : weekTotal.toFixed(1)}h
              </span>
            </div>
          </div>

          <!-- Workflows -->
          <div class="cmp-panel" style="margin-bottom:14px">
            <div class="panel-hdr"><div class="panel-title">Active workflows</div></div>
            ${wfInstances.slice(0, 4).map(w => {
              const proj = _projects.find(p => p.id === w.project_id);
              return `
              <div class="cmp-row" onclick="window.location.href='/cadence.html?instance=${w.id}'">
                <div style="width:7px;height:7px;border-radius:50%;
                  background:var(--compass-amber);flex-shrink:0"></div>
                <div style="flex:1;min-width:0">
                  <div class="row-title">${esc(w.title)}</div>
                  <div class="row-sub">${proj ? esc(proj.name) + ' · ' : ''}${w.current_step_name ? esc(w.current_step_name) : 'Active'}</div>
                </div>
                <span style="font-family:var(--font-mono);font-size:10px;color:var(--text3)">▶</span>
              </div>`;
            }).join('') || '<div style="padding:12px 13px;font-family:var(--font-mono);font-size:10px;color:var(--text3)">No active instances</div>'}
          </div>

          <!-- Quick actions -->
          <div class="cmp-panel">
            <div class="panel-hdr"><div class="panel-title">Quick access</div></div>
            <div class="cmp-row" onclick="window.location.href='/cadence.html'">
              <div style="flex:1"><div class="row-title">Cadence canvas →</div>
              <div class="row-sub">Log hours while advancing steps</div></div>
            </div>
            <div class="cmp-row" onclick="window.location.href='/resources.html'">
              <div style="flex:1"><div class="row-title">Full timesheet →</div>
              <div class="row-sub">Edit, submit, and review all entries</div></div>
            </div>
          </div>
        </div>
      </div>`;

    if (loading) loading.style.display = 'none';
    content.style.display = 'block';

  } catch (e) {
    console.error('[Compass] loadUserView error:', e);
    if (loading) loading.innerHTML = '<div style="color:var(--compass-red);font-family:var(--font-mono);font-size:11px">Failed to load — check console</div>';
  }
}


// ══════════════════════════════════════════════════════════
// VIEW: PM PORTFOLIO
// ══════════════════════════════════════════════════════════
async function loadPMView() {
  const content = document.getElementById('pm-content');

  try {
    const [wfInstances, actionItems, cocEvents, resourceReqs] = await Promise.all([
      API.get(`workflow_instances?select=id,title,status,current_step_name,project_id,launched_at,priority,stakes&status=eq.active&order=launched_at.desc&limit=50`).catch(() => []),
      API.get(`workflow_action_items?status=eq.open&order=due_date.asc&limit=100`).catch(() => []),
      API.get(`workflow_step_instances?select=id,instance_id,event_type,step_name,outcome,actor_name,event_notes,created_at&event_type=in.(step_completed,step_reset,step_activated)&order=created_at.desc&limit=100`).catch(() => []),
      API.get(`resource_requests?select=id,project_id,status,submitted_at&status=eq.pending&order=submitted_at.asc&limit=20`).catch(() => []),
    ]);

    const activeProjects = _projects.filter(p => p.status === 'active');
    const today = new Date().toLocaleDateString('en-CA');

    // ── Red flags — rejections in the last 48h ────────────────
    // Deduplicate: one chip per instance (most recent reset event only)
    const cutoff48h = new Date(Date.now() - 48 * 3600000).toISOString();
    const flagsByInstance = {};
    cocEvents
      .filter(e => e.event_type === 'step_reset' && e.created_at > cutoff48h)
      .forEach(e => {
        const inst = wfInstances.find(w => w.id === e.instance_id);
        const proj = _projects.find(p => p.id === inst?.project_id);
        const key  = e.instance_id;
        if (!flagsByInstance[key] || e.created_at > flagsByInstance[key].created_at) {
          flagsByInstance[key] = { ...e, instTitle: inst?.title || '—', projName: proj?.name || '—', projId: inst?.project_id, count: 1 };
        } else {
          flagsByInstance[key].count++;
        }
      });
    const redFlags = Object.values(flagsByInstance)
      .sort((a, b) => b.created_at.localeCompare(a.created_at));

    // ── Per-project stats ─────────────────────────────────────
    const projStats = activeProjects.map(p => {
      const projTasks = _tasks.filter(t => t.project_id === p.id);
      const overdue   = projTasks.filter(t => t.due_date && t.due_date < today && !['complete','cancelled'].includes(t.status));
      const projInsts = wfInstances.filter(w => w.project_id === p.id);
      const projAIs   = actionItems.filter(a => projInsts.some(i => i.id === a.instance_id));
      const overdueAIs= projAIs.filter(a => a.due_date && a.due_date < today);
      const projFlags = redFlags.filter(f => f.projId === p.id);
      const projReqs  = resourceReqs.filter(r => r.project_id === p.id);

      // Recent CoC events for this project's instances
      const projCoc = cocEvents
        .filter(e => projInsts.some(i => i.id === e.instance_id))
        .slice(0, 5);

      const urgency = projFlags.length * 5 + overdue.length * 3 + overdueAIs.length * 2 + projInsts.length + projReqs.length;

      return { proj: p, projTasks, overdue, projInsts, projAIs, overdueAIs, projFlags, projReqs, projCoc, urgency };
    }).sort((a, b) => b.urgency - a.urgency);

    const totalOverdue = projStats.reduce((s, p) => s + p.overdue.length, 0);
    const totalInsts   = wfInstances.length;
    const totalAIs     = actionItems.filter(a => a.due_date && a.due_date < today).length;
    const totalFlags   = redFlags.length;
    const totalReqs    = resourceReqs.length;

    // ── Live feed — last 20 CoC events across all instances ───
    const feedEvents = cocEvents.slice(0, 20).map(e => {
      const inst = wfInstances.find(w => w.id === e.instance_id);
      const proj = _projects.find(p => p.id === inst?.project_id);
      const isRejection = e.event_type === 'step_reset';
      const isComplete  = e.event_type === 'step_completed';
      const color = isRejection ? 'var(--compass-red)' : isComplete ? 'var(--compass-green)' : 'var(--compass-amber)';
      const icon  = isRejection ? '↩' : isComplete ? '✓' : '●';
      const age   = _timeAgo(e.created_at);
      return { e, inst, proj, color, icon, age, isRejection };
    });

    content.innerHTML = `
      <!-- Stat strip -->
      <div class="stat-strip stat-strip-4" style="margin-bottom:14px">
        <div class="stat-card" style="border-top:2px solid var(--compass-cyan)">
          <div class="stat-label">Active projects</div>
          <div class="stat-value sv-cyan">${activeProjects.length}</div>
          <div class="stat-sub">${totalInsts} workflow${totalInsts !== 1 ? 's' : ''} running</div>
        </div>
        <div class="stat-card" style="border-top:2px solid ${totalOverdue > 0 ? 'var(--compass-red)' : 'var(--compass-green)'}">
          <div class="stat-label">Overdue tasks</div>
          <div class="stat-value ${totalOverdue > 0 ? 'sv-red' : 'sv-green'}">${totalOverdue}</div>
          <div class="stat-sub">across all projects</div>
        </div>
        <div class="stat-card" style="border-top:2px solid ${totalFlags > 0 ? 'var(--compass-red)' : 'var(--border)'}">
          <div class="stat-label">Red flags — 48h</div>
          <div class="stat-value ${totalFlags > 0 ? 'sv-red' : ''}">${totalFlags}</div>
          <div class="stat-sub">rejections / resets</div>
        </div>
        <div class="stat-card" style="border-top:2px solid ${totalReqs > 0 ? 'var(--compass-amber)' : 'var(--border)'}">
          <div class="stat-label">Pending requests</div>
          <div class="stat-value ${totalReqs > 0 ? 'sv-amber' : ''}">${totalReqs}</div>
          <div class="stat-sub">resource requests</div>
        </div>
      </div>

      <!-- Red flag rail — only shown when flags exist -->
      ${redFlags.length > 0 ? `
      <div style="background:rgba(226,75,74,.06);border:1px solid rgba(226,75,74,.3);
        border-left:3px solid var(--compass-red);padding:8px 13px;margin-bottom:14px">
        <div style="font-family:var(--font-mono);font-size:10px;letter-spacing:.1em;
          text-transform:uppercase;color:var(--compass-red);margin-bottom:6px">
          ⚑ Red flags — last 48h
        </div>
        <div style="display:flex;flex-wrap:wrap;gap:6px">
          ${redFlags.map(f => `
          <a href="/cadence.html?instance=${f.instance_id}"
            style="display:inline-flex;align-items:center;gap:5px;
            font-family:var(--font-mono);font-size:10px;color:var(--compass-red);
            border:1px solid rgba(226,75,74,.35);padding:3px 9px;
            text-decoration:none;background:rgba(226,75,74,.06);transition:background .1s"
            onmouseenter="this.style.background='rgba(226,75,74,.14)'"
            onmouseleave="this.style.background='rgba(226,75,74,.06)'"
            title="${esc(f.event_notes || 'No rejection note')}">
            ↩ ${esc(f.instTitle)}${f.count > 1 ? ` <span style="opacity:.7">(${f.count}×)</span>` : ''}
            <span style="color:rgba(226,75,74,.6)">${_timeAgo(f.created_at)}</span>
          </a>`).join('')}
        </div>
      </div>` : ''}

      <div class="two-col">
        <div>
          <!-- Portfolio cards — urgency ordered -->
          <div class="cmp-panel">
            <div class="panel-hdr">
              <div class="panel-title">Portfolio — by urgency</div>
              <span class="panel-badge pb-cyan">${activeProjects.length} active</span>
            </div>
            ${projStats.length === 0
              ? `<div style="padding:20px 13px;text-align:center;font-family:var(--font-mono);font-size:11px;color:var(--text3)">No active projects</div>`
              : projStats.map(({ proj: p, overdue, projInsts, overdueAIs, projFlags, projReqs, projCoc }) => {
                  const hasFlag  = projFlags.length > 0;
                  const hasRisk  = overdue.length > 0 || overdueAIs.length > 0;
                  const barColor = hasFlag ? 'var(--compass-red)' : hasRisk ? 'var(--compass-amber)' : projInsts.length > 0 ? 'var(--compass-cyan)' : 'var(--compass-green)';
                  return `
                  <div style="border-bottom:1px solid var(--border);border-left:3px solid ${barColor};
                    padding:11px 13px;cursor:pointer;transition:background .1s"
                    onmouseenter="this.style.background='var(--bg2)'"
                    onmouseleave="this.style.background=''"
                    onclick="window.location.href='/project-detail.html?id=${p.id}'">

                    <!-- Project name + badges -->
                    <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:5px">
                      <div style="font-family:var(--font-ui);font-size:13.5px;font-weight:600;
                        color:var(--text0);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">
                        ${esc(p.name)}
                      </div>
                      <div style="display:flex;gap:4px;flex-shrink:0;flex-wrap:wrap">
                        ${projFlags.length  > 0 ? `<span class="status-badge sb-risk">⚑ ${projFlags.length} flag${projFlags.length > 1 ? 's' : ''}</span>` : ''}
                        ${overdue.length    > 0 ? `<span class="status-badge sb-risk">${overdue.length} overdue</span>` : ''}
                        ${projInsts.length  > 0 ? `<span class="status-badge sb-warn">${projInsts.length} workflow${projInsts.length > 1 ? 's' : ''}</span>` : ''}
                        ${projReqs.length   > 0 ? `<span class="status-badge sb-warn">${projReqs.length} req</span>` : ''}
                      </div>
                    </div>

                    <!-- Target date -->
                    <div style="font-family:var(--font-mono);font-size:10px;color:var(--text3);margin-bottom:6px">
                      Target: ${p.target_date ? fmtDate(p.target_date) : '—'}
                    </div>

                    <!-- Active workflow chips -->
                    ${projInsts.length > 0 ? `
                    <div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:5px">
                      ${projInsts.slice(0, 3).map(w => `
                        <a href="/cadence.html?instance=${w.id}" onclick="event.stopPropagation()"
                          style="font-family:var(--font-mono);font-size:10px;
                            color:var(--compass-cyan);border:1px solid rgba(0,210,255,.22);
                            padding:2px 7px;text-decoration:none;transition:background .1s;white-space:nowrap"
                          onmouseenter="this.style.background='rgba(0,210,255,.08)'"
                          onmouseleave="this.style.background=''">
                          ▶ ${esc(w.title)}${w.current_step_name ? ' — ' + esc(w.current_step_name) : ''}
                        </a>`).join('')}
                      ${projInsts.length > 3 ? `<span style="font-family:var(--font-mono);font-size:10px;color:var(--text3)">+${projInsts.length - 3}</span>` : ''}
                    </div>` : ''}

                    <!-- Recent CoC events for this project -->
                    ${projCoc.length > 0 ? `
                    <div style="border-top:1px solid var(--border);margin-top:5px;padding-top:5px">
                      ${projCoc.slice(0, 3).map(e => {
                        const isRej = e.event_type === 'step_reset';
                        const isDone = e.event_type === 'step_completed';
                        const col = isRej ? 'var(--compass-red)' : isDone ? 'var(--compass-green)' : 'var(--compass-amber)';
                        return `<div style="font-family:var(--font-mono);font-size:10px;
                          color:${col};display:flex;gap:5px;align-items:baseline;margin-bottom:2px">
                          <span>${isRej ? '↩' : isDone ? '✓' : '●'}</span>
                          <span style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text2)">
                            ${esc(e.step_name || '—')}${e.event_notes ? ' — ' + esc(e.event_notes.slice(0,60)) : ''}
                          </span>
                          <span style="color:var(--text3);flex-shrink:0">${_timeAgo(e.created_at)}</span>
                        </div>`;
                      }).join('')}
                    </div>` : ''}
                  </div>`;
                }).join('')}
          </div>
        </div>

        <div>
          <!-- Live portfolio feed -->
          <div class="cmp-panel" style="margin-bottom:14px">
            <div class="panel-hdr">
              <div class="panel-title">Live feed</div>
              <div style="display:flex;align-items:center;gap:4px">
                <div style="width:6px;height:6px;border-radius:50%;background:var(--compass-green);animation:pulse-live 2s infinite"></div>
                <span style="font-family:var(--font-mono);font-size:10px;color:var(--compass-green)">LIVE</span>
              </div>
            </div>
            ${feedEvents.length === 0
              ? `<div style="padding:14px 13px;font-family:var(--font-mono);font-size:10px;color:var(--text3)">No recent workflow activity</div>`
              : feedEvents.map(({ e, proj, color, icon, age, isRejection }) => `
              <div style="display:flex;gap:8px;padding:7px 13px;border-bottom:1px solid var(--border);
                cursor:pointer;transition:background .1s"
                onclick="window.location.href='/cadence.html?instance=${e.instance_id}'"
                onmouseenter="this.style.background='var(--bg2)'"
                onmouseleave="this.style.background=''">
                <div style="font-size:11px;color:${color};flex-shrink:0;width:14px;text-align:center;
                  margin-top:1px">${icon}</div>
                <div style="flex:1;min-width:0">
                  <div style="font-family:var(--font-ui);font-size:11px;color:var(--text1);
                    white-space:nowrap;overflow:hidden;text-overflow:ellipsis">
                    ${proj ? `<span style="color:var(--text3)">${esc(proj.name)} — </span>` : ''}${esc(e.step_name || '—')}
                  </div>
                  ${e.event_notes && isRejection ? `<div style="font-family:var(--font-ui);font-size:10px;
                    color:var(--compass-red);margin-top:1px;font-style:italic;
                    white-space:nowrap;overflow:hidden;text-overflow:ellipsis">
                    "${esc(e.event_notes.slice(0,80))}"
                  </div>` : ''}
                </div>
                <div style="font-family:var(--font-mono);font-size:10px;color:var(--text3);
                  flex-shrink:0;align-self:center">${age}</div>
              </div>`).join('')}
          </div>

          <!-- Open action items -->
          <div class="cmp-panel" style="margin-bottom:14px">
            <div class="panel-hdr">
              <div class="panel-title">Open action items</div>
              ${totalAIs > 0 ? `<span class="panel-badge pb-red">${totalAIs} overdue</span>` : '<span class="panel-badge pb-green">All current</span>'}
            </div>
            ${actionItems.slice(0, 6).map(a => {
              const overdue = a.due_date && a.due_date < today;
              return `
              <div class="cmp-row">
                <div style="width:7px;height:7px;border-radius:50%;flex-shrink:0;
                  background:${overdue ? 'var(--compass-red)' : 'var(--compass-amber)'}"></div>
                <div style="flex:1;min-width:0">
                  <div class="row-title">${esc(a.title)}</div>
                  <div class="row-sub">${a.owner_name ? esc(a.owner_name) : 'Unassigned'}${a.due_date ? ' · Due ' + fmtDate(a.due_date) : ''}</div>
                </div>
                ${overdue ? `<span class="status-badge sb-risk">Overdue</span>` : ''}
              </div>`;
            }).join('') || `<div style="padding:12px 13px;font-family:var(--font-mono);font-size:10px;color:var(--text3)">No open action items</div>`}
          </div>

          <!-- Quick nav -->
          <div class="cmp-panel">
            <div class="panel-hdr"><div class="panel-title">Quick access</div></div>
            <div class="cmp-row" onclick="window.location.href='/cadence.html'">
              <div style="flex:1"><div class="row-title">Cadence canvas →</div>

async function loadManagementView() {
  const content = document.getElementById('mgmt-content');

      API.get('resource_requests?select=id,project_id,status,created_at,submitted_at&status=eq.pending&order=submitted_at.asc&limit=20').catch(() => []),
      API.get('workflow_step_instances?select=id,instance_id,event_type,outcome,created_at,template_step_id&event_type=in.(step_completed,step_reset)&order=created_at.desc&limit=200').catch(() => []),
    ]);

    const activeProjects = _projects.filter(p => p.status === 'active');

    const reworkByProject = {};

    content.innerHTML = `

          <div class="stat-label">Decisions pending</div>

          <div class="stat-sub">resource requests</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Active projects</div>
          <div class="stat-value sv-cyan">${activeProjects.length}</div>

        </div>
        <div class="stat-card">
          <div class="stat-label">Active workflows</div>

          <div class="stat-sub">running instances</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Rework cycles — recent</div>
          <div class="stat-value ${totalRework > 5 ? 'sv-red' : totalRework > 2 ? 'sv-amber' : 'sv-green'}">${totalRework}</div>
          <div class="stat-sub">step resets / rejections</div>
        </div>

      <div class="two-col">
        <div>
          <!-- Portfolio health grid -->
          <div class="cmp-panel" style="margin-bottom:14px">
            <div class="panel-hdr">

              <span class="panel-badge pb-cyan">${activeProjects.length} projects</span>
            </div>
            <div style="overflow-x:auto">
              <table style="width:100%;border-collapse:collapse;font-family:var(--font-mono);font-size:10px">

                  <tr style="border-bottom:1px solid var(--border)">
                    <th style="padding:7px 13px;text-align:left;color:var(--text3);font-weight:600;letter-spacing:.08em">PROJECT</th>

                    <th style="padding:7px 8px;text-align:center;color:var(--text3);font-weight:600;letter-spacing:.08em">REWORK</th>

                  </tr>
                </thead>
                <tbody>
                  ${activeProjects.map(p => {
                    const insts   = wfInstances.filter(w => w.project_id === p.id);
                    const rework  = reworkByProject[p.id] || 0;
                    const healthy = insts.length === 0 && rework === 0;
                    const atRisk  = rework > 2 || insts.length > 3;
                    const statusColor = atRisk ? 'var(--compass-red)' : healthy ? 'var(--compass-green)' : 'var(--compass-amber)';
                    return `

                      <td style="padding:8px;text-align:center;color:${rework > 0 ? 'var(--compass-red)' : 'var(--text3)'}">${rework > 0 ? rework : '—'}</td>
                      <td style="padding:8px;text-align:center">

                  }).join('')}
                </tbody>
              </table>
            </div>
          </div>

          <!-- Pending resource requests -->
          <div class="cmp-panel">

              <div class="panel-title">Resource requests pending approval</div>

            </div>
            <div class="cmp-row" onclick="window.location.href='/resources.html'">
              <div style="flex:1"><div class="row-title">Resources →</div><div class="row-sub">Team allocation, capacity, utilization</div></div>
            </div>
            <div class="cmp-row" onclick="window.location.href='/resource-requests.html'">

            ${Object.entries(reworkByProject).length === 0
              ? '<div style="padding:12px 13px;font-family:var(--font-mono);font-size:10px;color:var(--text3)">No rework cycles recorded</div>'
              : Object.entries(reworkByProject)
                  .sort(([,a],[,b]) => b - a)
                  .slice(0, 6)
                  .map(([projId, count]) => {
                    const proj = _projects.find(p => p.id === projId);
                    const max  = Math.max(...Object.values(reworkByProject));
                    const pct  = max > 0 ? Math.round((count / max) * 100) : 0;
                    return `

                      <div class="budget-header">
                        <span>${esc(proj?.name || 'Unknown')}</span>

    content.innerHTML = '<div style="padding:20px;font-family:var(--font-mono);font-size:11px;color:var(--compass-red)">Failed to load management view</div>';
  }
}

async function approveResourceRequest(reqId, btn) {
  if (btn) { btn.disabled = true; btn.textContent = 'Approving…'; }
  try {
    await API.patch(`resource_requests?id=eq.${reqId}`, { status: 'approved' });
    compassToast('Resource request approved');
    const row = btn?.closest('.action-row');
    if (row) { row.style.transition = 'opacity .3s'; row.style.opacity = '0'; setTimeout(() => row.remove(), 300); }
  } catch (e) {
    compassToast('Failed to approve — check console');
    if (btn) { btn.disabled = false; btn.textContent = 'Approve'; }
  }
}

function setCmpSignal(sig) {
  _cmpSignal = _cmpSignal === sig ? null : sig;  // toggle
  const colors = { green:'#1D9E75', yellow:'#EF9F27', red:'#E24B4A' };
  ['green','yellow','red'].forEach(s => {
    const btn = document.getElementById(`cmp-sig-${s}`);
    if (btn) btn.style.background = _cmpSignal === s ? colors[s] : 'transparent';
  });
}

function closeCompletionPanel() {
  const panel = document.getElementById('completion-micro-panel');
  if (!panel) return;
  panel.style.transition = 'transform .15s ease, opacity .15s';
  panel.style.transform  = 'translateY(100%)';
  panel.style.opacity    = '0';
  setTimeout(() => panel.remove(), 160);
  _cmpItem   = null;
  _cmpSignal = null;
}

async function submitCompletion() {
  const item     = _cmpItem;
  if (!item) return;

  const hoursRaw = parseFloat(document.getElementById('cmp-hours')?.value || 0);
  const note     = (document.getElementById('cmp-note')?.value || '').trim();
  const billable = document.getElementById('cmp-billable')?.checked ?? true;
  const statusEl = document.getElementById('cmp-status');
  const submitBtn = document.getElementById('cmp-submit');

  // Validate: hours require a note
  if (hoursRaw > 0 && note.length < 10) {
    if (statusEl) statusEl.textContent = 'Add a note to log hours (10+ chars)';
    document.getElementById('cmp-note')?.focus();
    return;
  }

  if (submitBtn) { submitBtn.disabled = true; submitBtn.textContent = 'Saving…'; }
  if (statusEl)  statusEl.textContent = '';

  const today = new Date().toLocaleDateString('en-CA');
  const promises = [];

  // ── 1. Write time_entries row if hours logged ──────────────
  if (hoursRaw > 0) {
    promises.push(
      API.post('time_entries', {
        firm_id:     'aaaaaaaa-0001-0001-0001-000000000001',
        resource_id: _myResource?.id  || null,
        user_id:     _myResource?.user_id || null,
        project_id:  item.projectId   || null,
        task_id:     item.type === 'task'   ? item.id : null,
        source_type: 'direct',
        date:        today,
        hours:       hoursRaw,
        is_billable: billable,
        notes:       note || null,
      }).catch(() => {})
    );
  }

  // ── 2. Patch the work item status ──────────────────────────
  if (item.type === 'task') {
    promises.push(
      API.patch(`tasks?id=eq.${item.id}`, {
        status:       'complete',
        pct_complete: 100,
        updated_at:   new Date().toISOString(),
      }).catch(() => {})
    );
  } else if (item.type === 'action') {
    promises.push(
      API.patch(`workflow_action_items?id=eq.${item.id}`, {
        status:      'resolved',
        resolved_at: new Date().toISOString(),
        resolution_note: note || null,
      }).catch(() => {})
    );
  }

  try {
    await Promise.all(promises);
    closeCompletionPanel();
    compassToast(`${esc(item.title.slice(0,40))} — marked complete`);
    // Refresh the user view so the item disappears and bar chart updates
    _viewLoaded['user'] = false;
    loadUserView();
  } catch(e) {
    if (submitBtn) { submitBtn.disabled = false; submitBtn.textContent = 'Mark complete →'; }
    if (statusEl)  statusEl.textContent = 'Failed — try again';
  }
}

function filterTimeLog(date) {
  _teFilter = (_teFilter === date) ? null : date; // toggle

  loadUserView();
}

// ── Permanent delegated listener for My Work interactions ─
// Wired once at load — survives innerHTML re-renders because
// it lives on document, not on the content container.
document.addEventListener('click', function(ev) {
  // Clear filter button
  if (ev.target.closest('.te-clear-filter')) {
    filterTimeLog(null);
    return;
  }
  // Bar chart column
  const barCol = ev.target.closest('.te-bar-col');
  if (barCol && barCol.dataset.hasHours === 'true') {
    filterTimeLog(barCol.dataset.date);
    return;
  }
  // Time log row
  const teRow = ev.target.closest('.te-row');
  if (teRow) {
    const teId  = teRow.dataset.teId;
    const isCad = teRow.dataset.teCadence === 'true';
    if (isCad) {
      window.location.href = '/cadence.html';
      return;
    }
    const entry = _teEntries.find(e => e.id === teId);
    if (entry) {
      const proj = _projects.find(p => p.id === entry.project_id);
      openTimeEntryEdit({
        id:           entry.id,
        hours:        entry.hours,
        notes:        entry.notes || '',
        is_billable:  entry.is_billable,
        date:         entry.date,
        project_name: proj?.name || '—',
        step_name:    entry.step_name || null,
        source_type:  entry.source_type,
      });
    }
  }
});

        <input id="te-hours" class="te-input" type="number" min="0.25" max="24" step="0.25"
          value="${parseFloat(entry.hours).toFixed(2)}"
          ${!isEditable ? 'readonly style="opacity:.6;cursor:not-allowed"' : ''} />
      </div>

      <div style="margin-bottom:14px">
        <label class="te-label">Notes</label>
        <textarea id="te-notes" class="te-input" rows="3"
          style="resize:vertical;min-height:70px"
          ${!isEditable ? 'readonly style="opacity:.6;cursor:not-allowed"' : ''}
          placeholder="What did you work on?">${esc(entry.notes || '')}</textarea>
      </div>

      <div style="margin-bottom:14px">
        <label style="display:flex;align-items:center;gap:8px;cursor:${isEditable ? 'pointer' : 'default'}">
          <input id="te-billable" type="checkbox" ${entry.is_billable ? 'checked' : ''}
            ${!isEditable ? 'disabled' : ''}
            style="accent-color:var(--compass-cyan);width:14px;height:14px" />
          <span style="font-family:var(--font-mono);font-size:10px;color:var(--text3);
            letter-spacing:.08em;text-transform:uppercase">Billable</span>
        </label>
      </div>
    </div>

    ${isEditable ? `
    <div style="padding:12px 16px;border-top:1px solid var(--border);
      display:flex;gap:8px;flex-shrink:0">
      <button onclick="deleteTimeEntry('${entry.id}')"
        style="font-family:var(--font-mono);font-size:10px;letter-spacing:.08em;
          text-transform:uppercase;padding:7px 14px;background:none;
          border:1px solid rgba(226,75,74,.35);color:var(--compass-red);
          cursor:pointer;transition:all .12s"
        onmouseenter="this.style.background='rgba(226,75,74,.1)'"
        onmouseleave="this.style.background='none'">Delete</button>
      <div style="flex:1"></div>
      <button onclick="document.getElementById('te-edit-drawer').remove()"
        style="font-family:var(--font-mono);font-size:10px;letter-spacing:.08em;
          text-transform:uppercase;padding:7px 14px;background:none;
          border:1px solid var(--border);color:var(--text3);cursor:pointer"
        onmouseenter="this.style.borderColor='var(--text2)'"
        onmouseleave="this.style.borderColor='var(--border)'">Cancel</button>
      <button onclick="saveTimeEntry('${entry.id}')"
        style="font-family:var(--font-mono);font-size:10px;font-weight:600;
          letter-spacing:.08em;text-transform:uppercase;padding:7px 18px;
          background:var(--compass-cyan);color:#060a10;border:none;cursor:pointer"
        onmouseenter="this.style.opacity='.85'"
        onmouseleave="this.style.opacity='1'">Save →</button>
    </div>` : `
    <div style="padding:12px 16px;border-top:1px solid var(--border);flex-shrink:0">
      <button onclick="document.getElementById('te-edit-drawer').remove()"
        style="width:100%;font-family:var(--font-mono);font-size:10px;letter-spacing:.08em;
          text-transform:uppercase;padding:8px;background:none;
          border:1px solid var(--border);color:var(--text2);cursor:pointer">Close</button>
    </div>`}
  `;

  document.body.appendChild(drawer);
  // Close on outside click
  setTimeout(() => {
    document.addEventListener('mousedown', function closeTE(ev) {
      if (!drawer.contains(ev.target)) {
        drawer.remove();
        document.removeEventListener('mousedown', closeTE);
      }
    });
  }, 50);
}

async function saveTimeEntry(id) {
  const hours    = parseFloat(document.getElementById('te-hours')?.value);
  const notes    = document.getElementById('te-notes')?.value?.trim() || null;
  const billable = document.getElementById('te-billable')?.checked ?? true;
  const statusEl = document.querySelector('#te-edit-drawer .te-status');

  if (!hours || hours <= 0) {
    compassToast('Hours must be greater than 0', 2000);
    return;
  }

  try {
    await API.patch(`time_entries?id=eq.${id}`, {
      hours,
      notes,
      is_billable: billable,
      updated_at: new Date().toISOString(),
    });
    document.getElementById('te-edit-drawer')?.remove();
    compassToast('Time entry updated');
    _viewLoaded['user'] = false;
    loadUserView();
  } catch(e) {
    compassToast('Failed to save — try again', 2500);
  }
}

async function deleteTimeEntry(id) {
  if (!confirm('Delete this time entry? This cannot be undone.')) return;
  try {
    await API.del(`time_entries?id=eq.${id}`);
    document.getElementById('te-edit-drawer')?.remove();
    compassToast('Time entry deleted');
    _viewLoaded['user'] = false;
    loadUserView();
  } catch(e) {
    compassToast('Failed to delete — try again', 2500);
  }
}

</script>
</body>
</html>
