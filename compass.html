<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compass — Operational Intelligence</title>
<link rel="stylesheet" href="/css/hud.css">
<style>
/* ── Compass shell variables ─────────────────────────────── */
:root {

  /* ── Typography floor: 10px minimum (10pt rule) ─────────────────────────
     All text in the app must be at minimum 10px. Inline styles < 10px were
     mechanically raised. This comment documents the policy. Any new additions
     below 10px are a violation. --font-size-min enforces it in new code.   */
  --font-size-min: 10px;
  --compass-cyan:   #00D2FF;
  --compass-amber:  #EF9F27;
  --compass-green:  #1D9E75;
  --compass-red:    #E24B4A;
  --compass-purple: #8B5CF6;

  /* Override hud.css text hierarchy for Compass — brighter, higher contrast */
  --text0: #F0F6FF;   /* primary text — near white */
  --text1: #C8DFF0;   /* secondary text — light blue-white */
  --text2: #90B8D8;   /* tertiary text — medium blue (was #7a9bbf, bumped up) */
  --text3: #6A94B8;   /* metadata / labels — readable mid-blue (was #3a5a7a, major bump) */
  --muted: #5A84A8;   /* muted elements — still visible */
}

/* Compass minimum legible sizes — metadata/label text */
#compass-app .row-sub,
#compass-app .panel-badge,
#compass-app .stat-sub,
#compass-app .stat-label {
  font-size: 11px;
}

/* ── Layout ──────────────────────────────────────────────── */
#compass-app {
  display: flex;
  flex-direction: column;
  min-height: 100vh;
  background: var(--bg0, #060a10);
}

/* ── Hover-reveal sidebar — slide-in CSS moved to /css/hud.css (CMD93) ── */

/* ── Compass-specific top-nav CSS removed in CMD95 ──────────────────────
   Unified header (#hud-header), Tier 1 strip (#hud-tier1), and Tier 2
   strip (#hud-tier2) are owned by hud-shell.js. The legacy notification
   bell button is also retired — bell now lives in the unified header. */

/* ── View panels ─────────────────────────────────────────── */
.compass-view {
  display: none;
  flex: 1;
  overflow-y: auto;
}

.compass-view.active {
  display: block;
}

/* ── Common inner layout ─────────────────────────────────── */
.view-body {
  padding: 20px 22px;
  width: 100%;
  max-width: 100%;
  box-sizing: border-box;
}

/* ── Stat strip ──────────────────────────────────────────── */
.stat-strip {
  display: grid;
  gap: 8px;
  margin-bottom: 16px;
}

.stat-strip-4 { grid-template-columns: repeat(4, 1fr); }
.stat-strip-6 { grid-template-columns: repeat(6, 1fr); }

.stat-card {
  background: var(--bg1);
  border: 1px solid var(--border);
  padding: 10px 13px;
  cursor: default;
}

.stat-label {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 4px;
}

.stat-value {
  font-family: var(--font-hud);
  font-size: 26px;
  font-weight: 700;
  color: var(--text0);
  line-height: 1;
}

.stat-sub {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text3);
  margin-top: 3px;
}

.sv-cyan   { color: var(--compass-cyan); }
.sv-amber  { color: var(--compass-amber); }
.sv-green  { color: var(--compass-green); }
.sv-red    { color: var(--compass-red); }
.sv-purple { color: var(--compass-purple); }

/* ── Panel card ──────────────────────────────────────────── */
.cmp-panel {
  background: var(--bg1);
  border: 1px solid var(--border);
  margin-bottom: 14px;
}

.cmp-panel:last-child { margin-bottom: 0; }

.panel-hdr {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 13px;
  border-bottom: 1px solid var(--border);
}

.panel-title {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--text3);
}

.panel-badge {
  font-family: var(--font-mono);
  font-size: 10px;
  padding: 2px 7px;
  font-weight: 700;
}

/* ── Diagram mode ──────────────────────────────────────── */
.diag-nd-inner:hover { filter: brightness(1.2); transform: translateY(-1px); transition: all .1s; }
#mw-worklist-panel.diag-maximized {
  position: fixed; inset: 44px 0 0 0; z-index: 100;
  background: var(--bg0); margin: 0; border-radius: 0;
  display: flex; flex-direction: column;
}
#mw-worklist-panel.diag-maximized #mw-diag-viewport { height: calc(100vh - 180px) !important; }

.pb-red    { background: rgba(226,75,74,.15);  color: var(--compass-red);    border: 1px solid rgba(226,75,74,.3); }
.pb-amber  { background: rgba(239,159,39,.12); color: var(--compass-amber);  border: 1px solid rgba(239,159,39,.3); }
.pb-green  { background: rgba(29,158,117,.12); color: var(--compass-green);  border: 1px solid rgba(29,158,117,.3); }
.pb-cyan   { background: rgba(0,210,255,.08);  color: var(--compass-cyan);   border: 1px solid rgba(0,210,255,.25); }

/* ── Two-column grid ─────────────────────────────────────── */
.two-col { display: grid; grid-template-columns: 1fr minmax(0, 320px); gap: 14px; }
.three-col { display: grid; grid-template-columns: 1fr 1fr minmax(0, 280px); gap: 14px; }

/* ── Row items ───────────────────────────────────────────── */
.cmp-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 13px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background .1s;
}

.cmp-row:last-child { border-bottom: none; }
.cmp-row:hover { background: var(--bg2); }
.wi-selected { background: rgba(0,210,255,.06) !important; border-left: 2px solid var(--compass-cyan,#00D2FF) !important; }

.row-title {
  font-family: var(--font-ui, 'Barlow Condensed', sans-serif);
  font-size: 13px;
  font-weight: 500;
  color: var(--text0);
  flex: 1;
  min-width: 0;
}

.row-sub {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text3);
  margin-top: 2px;
}

/* ── Action rows ─────────────────────────────────────────── */
.action-row {
  padding: 11px 13px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background .1s;
}

.action-row:last-child { border-bottom: none; }
.action-row:hover { background: var(--bg2); }

.action-row.urgent { border-left: 3px solid var(--compass-red); }
.action-row.warning { border-left: 3px solid var(--compass-amber); }

.ar-hdr {
  display: flex;
  align-items: flex-start;
  gap: 9px;
  margin-bottom: 4px;
}

.ar-icon {
  width: 26px;
  height: 26px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  font-size: 12px;
}

.ari-red    { background: rgba(226,75,74,.15);  color: var(--compass-red); }
.ari-amber  { background: rgba(239,159,39,.12); color: var(--compass-amber); }
.ari-cyan   { background: rgba(0,210,255,.1);   color: var(--compass-cyan); }
.ari-green  { background: rgba(29,158,117,.12); color: var(--compass-green); }

.ar-title {
  font-family: var(--font-mono);
  font-size: 12.5px;
  font-weight: 500;
  color: var(--text0);
  flex: 1;
  min-width: 0;
  line-height: 1.3;
}

.ar-due {
  font-family: var(--font-mono);
  font-size: 10px;
  flex-shrink: 0;
}

.ar-due.red   { color: var(--compass-red); }
.ar-due.amber { color: var(--compass-amber); }

.ar-body {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text2);
  line-height: 1.5;
  margin: 3px 0 6px 35px;
}

.ar-warn {
  font-family: var(--font-mono);
  font-size: 10px;
  padding: 5px 8px;
  background: rgba(239,159,39,.08);
  border: 1px solid rgba(239,159,39,.2);
  color: var(--compass-amber);
  margin: 3px 0 6px 35px;
  letter-spacing: .03em;
}

.ar-acts {
  display: flex;
  gap: 6px;
  margin-left: 35px;
  flex-wrap: wrap;
}

/* ── Buttons ─────────────────────────────────────────────── */
.cmp-btn {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: .08em;
  text-transform: uppercase;
  padding: 4px 12px;
  cursor: pointer;
  border: 1px solid;
  transition: opacity .12s;
  white-space: nowrap;
}

.cmp-btn:hover { opacity: .75; }

.btn-approve { border-color: rgba(29,158,117,.5);  background: rgba(29,158,117,.1);  color: var(--compass-green); }
.btn-reject  { border-color: rgba(226,75,74,.5);   background: none;                 color: var(--compass-red); }
.btn-respond { border-color: rgba(0,210,255,.4);   background: rgba(0,210,255,.08);  color: var(--compass-cyan); }
.btn-ghost   { border-color: var(--border);        background: none;                 color: var(--text2); }

/* ── Milestone dot ───────────────────────────────────────── */
.ms-dot {
  width: 11px;
  height: 11px;
  border-radius: 50%;
  flex-shrink: 0;
}

.ms-done   { background: var(--compass-green); }
.ms-active { background: var(--compass-amber); }
.ms-risk   { background: var(--compass-red); }
.ms-future { background: none; border: 1.5px solid var(--border); }

/* ── Status badges ───────────────────────────────────────── */
.status-badge {
  font-family: var(--font-mono);
  font-size: 10px;
  padding: 2px 7px;
  flex-shrink: 0;
}

.sb-done   { background: rgba(29,158,117,.12);  color: var(--compass-green); border: 1px solid rgba(29,158,117,.3); }
.sb-risk   { background: rgba(226,75,74,.12);   color: var(--compass-red);   border: 1px solid rgba(226,75,74,.3); }
.sb-warn   { background: rgba(239,159,39,.1);   color: var(--compass-amber); border: 1px solid rgba(239,159,39,.25); }
.sb-future { background: rgba(255,255,255,.04); color: var(--text3);         border: 1px solid var(--border); }
.sb-cyan   { background: rgba(0,210,255,.08);   color: var(--compass-cyan);  border: 1px solid rgba(0,210,255,.25); }

/* ── Progress bar ────────────────────────────────────────── */
.progress-track {
  height: 4px;
  background: var(--bg2);
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  transition: width .5s;
}

/* ── Budget bar ──────────────────────────────────────────── */
.budget-row {
  padding: 10px 13px;
  border-bottom: 1px solid var(--border);
}

.budget-row:last-child { border-bottom: none; }

.budget-header {
  display: flex;
  justify-content: space-between;
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text3);
  margin-bottom: 5px;
}

.budget-value {
  font-weight: 700;
  color: var(--text1);
}

.budget-track {
  height: 6px;
  background: var(--bg2);
  overflow: hidden;
}

.budget-fill {
  height: 100%;
  transition: width .6s;
}

/* ── Update / thread rows ────────────────────────────────── */
.update-row {
  padding: 10px 13px;
  border-bottom: 1px solid var(--border);
}

.update-row:last-child { border-bottom: none; }

.ur-hdr {
  display: flex;
  align-items: center;
  gap: 7px;
  margin-bottom: 4px;
}

.ur-av {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-hud);
  font-size: 10px;
  font-weight: 700;
  flex-shrink: 0;
}

.av-cyan   { background: rgba(0,210,255,.15);   border: 1px solid rgba(0,210,255,.3);   color: var(--compass-cyan); }
.av-amber  { background: rgba(239,159,39,.15);  border: 1px solid rgba(239,159,39,.3);  color: var(--compass-amber); }
.av-green  { background: rgba(29,158,117,.15);  border: 1px solid rgba(29,158,117,.3);  color: var(--compass-green); }

.ur-name {
  font-family: var(--font-mono);
  font-size: 11.5px;
  font-weight: 500;
  color: var(--text0);
  flex: 1;
}

.ur-time {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text3);
}

.ur-body {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text2);
  line-height: 1.5;
  margin-left: 29px;
}

.ur-flagged {
  border-left: 2px solid var(--compass-amber);
  padding-left: 8px;
  margin-left: 29px;
  color: var(--text1);
  font-family: var(--font-mono);
  font-size: 11px;
  line-height: 1.5;
}

/* ── Thread input ────────────────────────────────────────── */
.thread-in {
  padding: 9px 13px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 7px;
  align-items: center;
}

.thread-in input {
  flex: 1;
  font-family: var(--font-mono);
  font-size: 11px;
  padding: 6px 10px;
  background: var(--bg2);
  border: 1px solid var(--border);
  color: var(--text1);
  outline: none;
  transition: border-color .15s;
}

.thread-in input:focus { border-color: rgba(0,210,255,.4); }

/* ── Document rows ───────────────────────────────────────── */
.doc-row {
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 8px 13px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background .1s;
}

.doc-row:last-child { border-bottom: none; }
.doc-row:hover { background: var(--bg2); }

.doc-icon {
  width: 26px;
  height: 26px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  flex-shrink: 0;
}

.doc-info { flex: 1; min-width: 0; }

.doc-name {
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 500;
  color: var(--text0);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.doc-meta {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text3);
  margin-top: 1px;
}

/* ── Scrubber ────────────────────────────────────────────── */
.scrubber-wrap {
  padding: 10px 13px;
  border-bottom: 1px solid var(--border);
}

.scrubber-labels {
  display: flex;
  justify-content: space-between;
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text3);
  margin-bottom: 6px;
}

.scrubber-date-active {
  color: var(--compass-cyan);
  font-weight: 700;
}

.scrubber-track {
  position: relative;
  height: 4px;
  background: var(--bg2);
  cursor: pointer;
  margin-bottom: 6px;
}

.scrubber-fill {
  height: 100%;
  background: var(--compass-cyan);
  transition: width .1s;
}

.scrubber-thumb {
  position: absolute;
  top: 50%;
  width: 12px;
  height: 12px;
  background: var(--bg1);
  border: 2px solid var(--compass-cyan);
  border-radius: 50%;
  transform: translate(-50%, -50%);
  cursor: grab;
  transition: left .1s;
}

.scrubber-dots {
  display: flex;
  justify-content: space-between;
  margin-top: 4px;
}

.sdot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  cursor: pointer;
  transition: transform .1s;
}

.sdot:hover { transform: scale(1.5); }

.scrubber-snapshot {
  padding: 8px 10px;
  background: var(--bg2);
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text2);
  line-height: 1.5;
  min-height: 38px;
  margin-top: 6px;
  border-left: 2px solid var(--compass-cyan);
}

/* ── Rejection context card ──────────────────────────────── */
.rejection-context {
  display: flex;
  gap: 9px;
  padding: 9px 10px;
  background: rgba(226,75,74,.07);
  border: 1px solid rgba(226,75,74,.25);
  border-left: 3px solid var(--compass-red);
  margin-bottom: 8px;
}

.rejection-context-icon {
  font-size: 13px;
  color: var(--compass-red);
  flex-shrink: 0;
  margin-top: 1px;
}

.rejection-context-body { flex: 1; min-width: 0; }

.rejection-context-label {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--compass-red);
  margin-bottom: 3px;
}

.rejection-context-text {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text1);
  line-height: 1.45;
  font-style: italic;
}

.rejection-context-meta {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text3);
  margin-top: 3px;
}

/* ── Privacy note ────────────────────────────────────────── */
.privacy-note {
  display: flex;
  align-items: flex-start;
  gap: 7px;
  padding: 8px 13px;
  background: var(--bg2);
  border-top: 1px solid var(--border);
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: .04em;
  color: var(--text3);
  line-height: 1.5;
}

/* ── Toast ───────────────────────────────────────────────── */
#compass-toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--bg1);
  border: 1px solid var(--border);
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: .06em;
  color: var(--text0);
  padding: 9px 20px;
  opacity: 0;
  transition: opacity .2s, transform .2s;
  pointer-events: none;
  z-index: 9999;
  white-space: nowrap;
}

#compass-toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* ── Loading state ───────────────────────────────────────── */
#compass-loading {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 200px;
  gap: 12px;
  color: var(--text3);
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: .1em;
}

.loading-spinner {
  width: 24px;
  height: 24px;
  border: 2px solid var(--border);
  border-top-color: var(--compass-cyan);
  border-radius: 50%;
  animation: spin .8s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* ── Responsive ──────────────────────────────────────────── */
@media (max-width: 1100px) {
  .two-col, .three-col { grid-template-columns: 1fr; }
  .stat-strip-6 { grid-template-columns: repeat(3, 1fr); }
}

@media (max-width: 720px) {
  .stat-strip-4, .stat-strip-6 { grid-template-columns: repeat(2, 1fr); }
}

/* ── Spotlight + caption presentation layer (CMD89) ───────────────────────────
   Replaces the CMD88 yellow banner. Per §2 spec:
     - dim overlay rgba(10,12,20,0.78)
     - hole: rounded rect, 14px padding, 12px corners, feathered edges (SVG)
     - caption: 16pt white-on-dark (rgba(20,22,32,0.96)) Arial, 14px corners,
       20px/28px padding, max-width 520px, soft shadow
     - z-index 9000 (above modals)
     - 220ms ease-out fade-in, 180ms ease-in fade-out
   The DOM is lazy-created by cmd-center.js _ensureSpotlightDom on first use,
   so this CSS is the only static surface.

   #phr-spotlight-overlay   — fixed-position container, full viewport
     #phr-spotlight-svg     — dim+hole renderer (SVG mask + feGaussianBlur)
     #phr-spotlight-caption — caption card (positioned by JS via inline left/top)
       #phr-spotlight-caption-msg
       #phr-spotlight-caption-advance  (triangle)
*/
#phr-spotlight-overlay {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 9000;
  pointer-events: auto;
  opacity: 0;
  transition: opacity 220ms ease-out;
}
#phr-spotlight-overlay.visible {
  opacity: 1;
}
/* Out-fade: when .visible is removed, transition runs at 180ms ease-in. */
#phr-spotlight-overlay:not(.visible) {
  transition: opacity 180ms ease-in;
}
#phr-spotlight-svg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  pointer-events: auto;       /* dim absorbs clicks; only caption advances */
  display: block;
}
#phr-spotlight-caption {
  position: absolute;
  display: none;
  align-items: center;
  background: rgba(20, 22, 32, 0.96);
  color: #FFFFFF;
  font-family: Arial, sans-serif;
  font-size: 16pt;            /* §2 spec; > 11pt floor */
  font-weight: 400;
  line-height: 1.45;
  border: 1px solid rgba(255, 255, 255, 0.12);
  border-radius: 14px;
  padding: 20px 28px;
  box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
  max-width: 520px;
  min-width: 320px;
  box-sizing: border-box;
  pointer-events: auto;
  z-index: 1;                 /* above SVG inside overlay */
}
#phr-spotlight-caption-msg {
  flex: 1;
  display: block;
  white-space: normal;
  word-wrap: break-word;
}
#phr-spotlight-caption-advance {
  display: none;              /* JS toggles to flex when paused */
  width: 0; height: 0;
  border-top: 10px solid transparent;
  border-bottom: 10px solid transparent;
  border-left: 14px solid #FFFFFF;
  cursor: pointer;
  margin-left: 12px;
  flex-shrink: 0;
  transition: opacity 120ms ease;
}
#phr-spotlight-caption-advance:hover { opacity: 0.7; }
#phr-spotlight-caption-advance:focus { outline: 2px solid rgba(255,255,255,0.4); outline-offset: 4px; }
</style>

<!-- ── Spotlight + caption overlay (CMD89) ─────────────────────────────────────

<script>
'use strict';

// ── Constants ─────────────────────────────────────────────
const FIRM_ID = window.FIRM_ID || 'aaaaaaaa-0001-0001-0001-000000000001';

// ── State ─────────────────────────────────────────────────
let _projects   = [];
let _tasks      = [];
let _resources  = [];
let _users      = [];
let _myResource = null;
window._myResource = null; // exposed for mw-tabs.js
let _currentView = null;
let _viewLoaded  = {};
let _identityDebug = {};
let _teFilter    = null;   // date string 'YYYY-MM-DD' | null — filters time log by day
let _teEntries   = [];     // cached time entries for current user view session
let _wiItems     = [];     // cached work items for drawer access
let _teSelected  = null;   // id of currently selected time log row

async function loadBaseData() {
  try {
    // ── Step 1: Resolve identity ──────────────────────────────
    let authEmail = null;
    let authSub   = null;
    let appUserId = null;
    let appUserResourceId = null;

    try {
      const token  = await Auth.getFreshToken().catch(() => Auth.getToken());
      const claims = JSON.parse(atob(token.split('.')[1]));
      authSub   = claims.sub;
      authEmail = claims.email || null;

      const uRows   = await API.get(`users?id=eq.${authSub}&select=id,resource_id,name,email`).catch(() => []);
      const appUser = uRows?.[0] || null;
      appUserId          = appUser?.id || null;
      appUserResourceId  = appUser?.resource_id || null;
      if (!authEmail && appUser?.email) authEmail = appUser.email;

      if (appUser?.resource_id) {
        const rRows = await API.get(
          `resources?id=eq.${appUser.resource_id}&select=id,first_name,last_name,email,is_active,is_external,user_id,firm_id,department`
        ).catch(() => []);
        const r = rRows?.[0] || null;
        if (r) {
          _myResource = { ...r,
            name: `${r.first_name||''} ${r.last_name||''}`.trim() || appUser.name || appUser.email || '—',
          };
          window._myResource = _myResource;
        }
      }

      // Fallback — match by email if resource_id path didn't resolve
      if (!_myResource && authEmail) {
        const eRows = await API.get(
          `resources?email=eq.${encodeURIComponent(authEmail)}&select=id,first_name,last_name,email,is_active,is_external,user_id,firm_id,department&limit=1`
        ).catch(() => []);
        const r = eRows?.[0] || null;
        if (r) {
          _myResource = { ...r,
            name: `${r.first_name||''} ${r.last_name||''}`.trim() || authEmail || '—',
          };
          window._myResource = _myResource;
        }
      }

      // Store debug info for error messages
      _identityDebug = {
        authEmail,
        authSub:    authSub?.slice(0,8) + '…',
        appUserId:  appUserId?.slice(0,8) + '…' || 'none',
        resourceId: appUserResourceId?.slice(0,8) + '…' || 'none',
        resolved:   !!_myResource,
        name:       _myResource?.name || null,
      };

      console.log('[Compass] Identity:', _myResource?.name || 'unresolved',
        '| email:', authEmail, '| sub:', authSub?.slice(0,8),
        '| resource_id:', appUserResourceId?.slice(0,8) || 'none');

    } catch(e) {
      console.warn('[Compass] Identity resolution failed:', e.message);
      _identityDebug = { error: e.message };
    }

    // ── Step 2: Load shared data ──────────────────────────────
    [_projects, _tasks, _resources, _users] = await Promise.all([
      API.getProjects().catch(() => []),
      API.getTasks().catch(() => []),
      API.get('resources?select=id,first_name,last_name,email,is_active,user_id,firm_id,department&is_active=eq.true&firm_id=eq.' + FIRM_ID).catch(() => []),
      API.getUsers().catch(() => []),
    ]);

    _resources = (_resources || []).map(r => ({
      ...r,
      name: `${r.first_name||''} ${r.last_name||''}`.trim() || r.email || '—',
    }));

    // Compass nav avatar removed in CMD95 (lives in unified header now).
  } catch (e) {
    console.error('[Compass] loadBaseData failed:', e);
  }
}

// ── View switcher ─────────────────────────────────────────
// Tier 1 click from hud-shell calls into here. Tier 2 visual
// state is owned by hud-shell; this function only swaps the
// content panel and lazy-loads view data.
function switchView(viewId) {
  // Hide all views
  document.querySelectorAll('.compass-view').forEach(v => v.classList.remove('active'));

  // Show target
  const viewEl = document.getElementById('view-' + viewId);
  if (!viewEl) return;

  viewEl.classList.add('active');

  _currentView = viewId;
  sessionStorage.setItem('compass-view', viewId);
  localStorage.setItem('compass-view', viewId);

  // Lazy-load view data on first activation
  if (!_viewLoaded[viewId]) {
    _viewLoaded[viewId] = true;
    switch (viewId) {
      case 'user':       loadUserView();          break;
      case 'pm':         loadPMView();         break;
      case 'management': loadManagementView(); break;
      case 'executive':  loadExecutiveView();  break;
      case 'client':     loadClientView();     break;
    }
  }
}

// ── Toast ─────────────────────────────────────────────────
function compassToast(msg, duration = 2200) {
  const el = document.getElementById('compass-toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), duration);
}

// ── Escape HTML ───────────────────────────────────────────
function esc(s) {
  return String(s ?? '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Date formatting ───────────────────────────────────────
function fmtDate(iso) {
  if (!iso) return '—';
  return new Date(iso + 'T00:00:00').toLocaleDateString('en-US', {
    month: 'short', day: 'numeric'
  });
}

function fmtDateTime(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleDateString('en-US', {
    month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit'
  });
}

function daysOverdue(dateStr) {
  if (!dateStr) return 0;
  const diff = Date.now() - new Date(dateStr + 'T00:00:00').getTime();
  return Math.max(0, Math.floor(diff / 86400000));
}

function _timeAgo(iso) {
  if (!iso) return '—';
  const diff = Date.now() - new Date(iso).getTime();
  const mins  = Math.floor(diff / 60000);
  const hours = Math.floor(diff / 3600000);
  const days  = Math.floor(diff / 86400000);
  if (mins  <  1) return 'just now';
  if (mins  < 60) return `${mins}m ago`;
  if (hours < 24) return `${hours}h ago`;
  if (days  <  7) return `${days}d ago`;
  return fmtDate(iso);
}

// ── Avatar HTML ───────────────────────────────────────────
function avatarHtml(name, size = 24, cls = 'av-cyan') {
  const initials = (name || '?').split(' ').map(n => n[0]).join('').slice(0, 2).toUpperCase();
  return `<div class="ur-av ${cls}" style="width:${size}px;height:${size}px;font-size:${Math.floor(size*0.4)}px">${initials}</div>`;
}




// ── My Work — loaded dynamically from my-work.html ─────────
// State and functions live in my-work.html, injected at runtime.
// Shared globals used by my-work.html: _myResource, _projects, _resources,
// _users, API, compassToast, esc, fmtDate, daysOverdue, _viewLoaded

window._myWorkLoaded = false;

// ── My Time — loaded dynamically from my-time.html ──────────
// Injected into #mt-root inside the My Time suite tab.
// Entry point: window._mtLoadView(); refresh: window._mtRefresh()
// Called by my-work.html when the "My Time" suite tab is clicked.

window._myTimeLoaded = false;

async function loadUserView() {
  // If my-work.html scripts already executed, just refresh the data
  if (window._myWorkLoaded) {
    window._mwRefresh && window._mwRefresh();
    return;
  }
  const content = document.getElementById('user-content');
  const loading  = document.getElementById('compass-loading');
  if (loading) loading.style.display = 'flex';
  if (content) content.style.display = 'none';
  try {
    const resp = await fetch('/my-work.html');
    if (!resp.ok) throw new Error('Failed to load my-work.html: ' + resp.status);
    const html = await resp.text();
    // Parse and inject — extract script separately so it executes
    const parser = new DOMParser();
    const doc = parser.parseFromString(html, 'text/html');
    // Inject HTML content into view-user
    const viewUser = document.getElementById('view-user');
    if (viewUser) {
      // Replace the inner loading/content divs with my-work content
      const body = doc.body;
      // Copy non-script children into view-user
      Array.from(body.children).forEach(el => {
        if (el.tagName !== 'SCRIPT') viewUser.appendChild(el.cloneNode(true));
      });
    }
    // Execute scripts — src-aware loader handles both inline and external <script src> tags
    const scripts = doc.querySelectorAll('script');
    for (const s of scripts) {
      await new Promise((resolve, reject) => {
        const el = document.createElement('script');
        if (s.src) {
          el.src = s.src;
          el.onload  = resolve;
          el.onerror = () => reject(new Error('Failed to load ' + s.src));
        } else {
          el.textContent = s.textContent;
        }
        document.head.appendChild(el);
        if (!s.src) resolve();
      });
    }
    window._myWorkLoaded = true;
    // Now call the real loadUserView that was just loaded
    if (window._mwLoadUserView) await window._mwLoadUserView();
    // Restore last active inner tab
    const savedTab = localStorage.getItem('compass-user-tab');
    if (savedTab && savedTab !== 'work' && window.uSwitchTab) {
      const btn = document.querySelector('.ust[data-tab="' + savedTab + '"]');
      window.uSwitchTab(savedTab, btn || null);
    }
  } catch(e) {
    console.error('[Compass] Failed to load my-work.html:', e);
    if (loading) loading.style.display = 'none';
    if (content) {
      content.style.display = 'block';
      content.innerHTML = '<div style="padding:40px;font-family:var(--font-mono);color:#E24B4A">Failed to load My Work view. Check console.</div>';
    }
  }
}

// ── My Time loader ────────────────────────────────────────
// Called by my-work.html's "My Time" tab click handler.
// Fetches /my-time.html, injects into #mt-root, executes script,
// calls window._mtLoadView(). Subsequent calls trigger _mtRefresh().

async function loadMyTimeView() {
  if (window._myTimeLoaded) {
    window._mtRefresh && window._mtRefresh();
    return;
  }

  // #mt-root is rendered by my-work.html when the My Time tab is first shown
  const container = document.getElementById('mt-root');
  if (!container) {
    console.error('[Compass] #mt-root not found — My Time tab not yet rendered by my-work.html');
    return;
  }

  try {
    const resp = await fetch('/my-time.html');
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const html = await resp.text();

    const parser = new DOMParser();
    const doc    = parser.parseFromString(html, 'text/html');

    // Inject non-script nodes into container
    Array.from(doc.body.childNodes).forEach(node => {
      if (node.nodeName !== 'SCRIPT') {
        container.appendChild(document.importNode(node, true));
      }
    });

    // Execute scripts in declaration order
    for (const s of doc.querySelectorAll('script')) {
      const el = document.createElement('script');
      el.textContent = s.textContent;
      document.head.appendChild(el);
    }

    window._myTimeLoaded = true;

    if (window._mtLoadView) {
      await window._mtLoadView();
    } else {
      console.error('[Compass] _mtLoadView not exported by my-time.html');
    }
  } catch (err) {
    console.error('[Compass] Failed to load my-time.html:', err);
    compassToast('Failed to load My Time — check console', 4000);
  }
}

// ── Tier 1 / Tier 2 configuration (CMD95) ─────────────────
// Tier 1: major-area tabs that map to compass-view ids.
// Tier 2: per-Tier-1 sub-view icon strip. For MY WORK, Tier 2
//   ids correspond to my-work.html .ust[data-tab="..."] entries
//   and dispatch via window.uSwitchTab(). For other Tier 1 tabs,
//   a single placeholder Tier 2 entry is provided pending fuller
//   wiring (surfaced as finding).
const COMPASS_TIER1 = [
  { id: 'user',       label: 'My Work' },
  { id: 'pm',         label: 'PM View' },
  { id: 'management', label: 'Management' },
  { id: 'executive',  label: 'Executive' },
  { id: 'client',     label: 'Client Portal' },
];

const COMPASS_TIER2 = {
  user: [
    { id: 'work',     label: 'My Work',     glyph: '◇' },
    { id: 'time',     label: 'My Time',     glyph: '⏱' },
    { id: 'calendar', label: 'My Calendar', glyph: '▦' },
    { id: 'meetings', label: 'My Meetings', glyph: '◈' },
    { id: 'views',    label: 'My Views',    glyph: '◉' },
    { id: 'notes',    label: 'My Notes',    glyph: '✎' },
    { id: 'requests', label: 'My Requests', glyph: '⬡' },
    { id: 'team',     label: 'My Team',     glyph: '◑' },
  ],
  pm:         [{ id: 'pm-default',         label: 'PM Overview',         glyph: '▥' }],
  management: [{ id: 'mgmt-default',       label: 'Management Overview', glyph: '◈' }],
  executive:  [{ id: 'exec-default',       label: 'Executive Overview',  glyph: '◆' }],
  client:     [{ id: 'client-default',     label: 'Client Portal',       glyph: '⬡' }],
};

function _onTier1Select(tier1Id) {
  switchView(tier1Id);
}

function _onTier2Select(tier1Id, tier2Id) {
  // For MY WORK, defer to my-work.html's tab switcher when loaded.
  if (tier1Id === 'user') {
    if (window.uSwitchTab) {
      const btn = document.querySelector('.ust[data-tab="' + tier2Id + '"]');
      window.uSwitchTab(tier2Id, btn || null);
      try { localStorage.setItem('compass-user-tab', tier2Id); } catch (e) {}
    } else {
      // my-work.html not yet loaded — record intent so loadUserView's
      // savedTab restore picks it up.
      try { localStorage.setItem('compass-user-tab', tier2Id); } catch (e) {}
    }
    return;
  }
  // Other Tier 1 tabs: no-op until wider wiring lands. Finding #2.
}

document.addEventListener('DOMContentLoaded', async () => {
  await loadBaseData();

  // Restore last view or default to My Work
  const saved = localStorage.getItem('compass-view') || sessionStorage.getItem('compass-view') || 'user';

  // Boot the unified shell (header + Tier 1 + Tier 2)
  if (window.HUDShell && typeof HUDShell.init === 'function') {
    await HUDShell.init({
      page:           'compass',
      moduleName:     'Compass',
      tier1:          COMPASS_TIER1,
      tier2:          COMPASS_TIER2,
      initialTier1:   saved,
      onTier1Select:  _onTier1Select,
      onTier2Select:  _onTier2Select,
    });
  }

  // Activate the saved view (HUDShell.init applied initialTier1 visually
  // and recorded its remembered Tier 2, but did not invoke onTier1Select).
  switchView(saved);
});

</script>
