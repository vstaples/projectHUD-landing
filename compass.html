<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compass — Operational Intelligence</title>
<link rel="stylesheet" href="/css/hud.css">
<style>
/* ── Compass shell variables ─────────────────────────────── */
:root {

  /* ── Typography floor: 10px minimum (10pt rule) ─────────────────────────
     All text in the app must be at minimum 10px. Inline styles < 10px were
     mechanically raised. This comment documents the policy. Any new additions
     below 10px are a violation. --font-size-min enforces it in new code.   */
  --font-size-min: 10px;
  --compass-cyan:   #00D2FF;
  --compass-amber:  #EF9F27;
  --compass-green:  #1D9E75;
  --compass-red:    #E24B4A;
  --compass-purple: #8B5CF6;

  /* Override hud.css text hierarchy for Compass — brighter, higher contrast */
  --text0: #F0F6FF;   /* primary text — near white */
  --text1: #C8DFF0;   /* secondary text — light blue-white */
  --text2: #90B8D8;   /* tertiary text — medium blue (was #7a9bbf, bumped up) */
  --text3: #6A94B8;   /* metadata / labels — readable mid-blue (was #3a5a7a, major bump) */
  --muted: #5A84A8;   /* muted elements — still visible */
}

/* Compass minimum legible sizes — metadata/label text */
#compass-app .row-sub,
#compass-app .panel-badge,
#compass-app .stat-sub,
#compass-app .stat-label {
  font-size: 11px;
}

/* ── Layout ──────────────────────────────────────────────── */
#compass-app {
  display: flex;
  flex-direction: column;
  min-height: 100vh;
  background: var(--bg0, #060a10);
}

/* ── Hover-reveal sidebar ─────────────────────────────────── */
#hud-sidebar-trigger {
  position:fixed; left:0; top:0; bottom:0; width:6px; z-index:399; cursor:pointer;
}
#hud-sidebar-panel {
  position:fixed; left:0; top:0; bottom:0; width:200px;
  background:var(--bg1,#0c1628);
  border-right:1px solid rgba(0,210,255,.15);
  box-shadow:4px 0 24px rgba(0,0,0,.6);
  z-index:400;
  transform:translateX(-200px);
  transition:transform 220ms cubic-bezier(.4,0,.2,1);
  overflow:hidden; display:flex; flex-direction:column;
}
#hud-sidebar-panel.open { transform:translateX(0); }
#hud-sidebar-inner { flex:1; overflow-y:auto; overflow-x:hidden; }
#hud-notif-btn {
  position:fixed; top:52px; right:14px; z-index:401;
  background:rgba(6,10,16,.85);
  border:1px solid rgba(0,210,255,.2); border-radius:4px;
  color:rgba(160,200,235,.5); font-size:15px;
  width:34px; height:34px;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; transition:color .15s,border-color .15s,background .15s; padding:0;
}
#hud-notif-btn:hover { color:#00D2FF; border-color:rgba(0,210,255,.45); background:rgba(0,210,255,.08); }
#hud-notif-btn.has-unread { color:#00D2FF; border-color:rgba(0,210,255,.4); }
#hud-notif-badge {
  position:absolute; top:-5px; right:-5px;
  background:#E24B4A; color:#fff;
  font-family:var(--font-mono,monospace); font-size:10px; font-weight:700;
  min-width:16px; height:16px; border-radius:8px;
  display:flex; align-items:center; justify-content:center;
  padding:0 3px; pointer-events:none;
}

/* ── Top nav bar ─────────────────────────────────────────── */
#compass-nav {
  display: flex;
  align-items: center;
  gap: 0;
  height: 44px;
  background: var(--bg1, #0c1628);
  border-bottom: 1px solid var(--border, rgba(0,210,255,.12));
  padding: 0 16px;
  flex-shrink: 0;
  position: sticky;
  top: 0;
  z-index: 100;
}

.compass-logo-mark {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-right: 20px;
  text-decoration: none;
}

.compass-wordmark {
  font-family: var(--font-hud, 'Rajdhani', sans-serif);
  font-size: 17px;
  font-weight: 700;
  letter-spacing: .12em;
  color: var(--text0, #eef4ff);
}

.compass-wordmark span {
  color: var(--compass-cyan);
}

.nav-sep {
  width: 1px;
  height: 22px;
  background: var(--border);
  margin: 0 16px;
}

/* Role tab buttons */
.role-tab {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 0 14px;
  height: 44px;
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  color: var(--text2, #7a9bbf);
  font-family: var(--font-head, 'Barlow Condensed', sans-serif);
  font-size: 13px;
  font-weight: 600;
  letter-spacing: .08em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all .12s;
  white-space: nowrap;
}

.role-tab:hover {
  color: var(--text0);
  background: rgba(255,255,255,.03);
}

.role-tab.active {
  color: var(--compass-cyan);
  border-bottom-color: var(--compass-cyan);
}

.role-tab .tab-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: currentColor;
  opacity: .5;
}

.role-tab.active .tab-dot {
  opacity: 1;
}

/* Badge on role tabs */
.tab-badge {
  background: var(--compass-red);
  color: #fff;
  font-size: 10px;
  font-family: var(--font-mono);
  padding: 1px 5px;
  border-radius: 8px;
  font-weight: 700;
  letter-spacing: 0;
}

/* Nav right side */
.nav-spacer { flex: 1; }

.nav-live {
  display: flex;
  align-items: center;
  gap: 5px;
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--compass-green);
  letter-spacing: .1em;
  margin-right: 12px;
}

.nav-live-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--compass-green);
  animation: pulse-live 2s infinite;
}

@keyframes pulse-live {
  0%, 100% { opacity: 1; }
  50%       { opacity: .35; }
}

.nav-user {
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text2);
}

.nav-avatar {
  width: 26px;
  height: 26px;
  border-radius: 50%;
  background: rgba(0,210,255,.15);
  border: 1px solid rgba(0,210,255,.3);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-hud);
  font-size: 11px;
  font-weight: 700;
  color: var(--compass-cyan);
}

/* ── View panels ─────────────────────────────────────────── */
.compass-view {
  display: none;
  flex: 1;
  overflow-y: auto;
}

.compass-view.active {
  display: block;
}

/* ── Common inner layout ─────────────────────────────────── */
.view-body {
  padding: 20px 22px;
  width: 100%;
  max-width: 100%;
  box-sizing: border-box;
}

/* ── Stat strip ──────────────────────────────────────────── */
.stat-strip {
  display: grid;
  gap: 8px;
  margin-bottom: 16px;
}

.stat-strip-4 { grid-template-columns: repeat(4, 1fr); }
.stat-strip-6 { grid-template-columns: repeat(6, 1fr); }

.stat-card {
  background: var(--bg1);
  border: 1px solid var(--border);
  padding: 10px 13px;
  cursor: default;
}

.stat-label {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 4px;
}

.stat-value {
  font-family: var(--font-hud);
  font-size: 26px;
  font-weight: 700;
  color: var(--text0);
  line-height: 1;
}

.stat-sub {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text3);
  margin-top: 3px;
}

.sv-cyan   { color: var(--compass-cyan); }
.sv-amber  { color: var(--compass-amber); }
.sv-green  { color: var(--compass-green); }
.sv-red    { color: var(--compass-red); }
.sv-purple { color: var(--compass-purple); }

/* ── Panel card ──────────────────────────────────────────── */
.cmp-panel {
  background: var(--bg1);
  border: 1px solid var(--border);
  margin-bottom: 14px;
}

.cmp-panel:last-child { margin-bottom: 0; }

.panel-hdr {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 13px;
  border-bottom: 1px solid var(--border);
}

.panel-title {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--text3);
}

.panel-badge {
  font-family: var(--font-mono);
  font-size: 10px;
  padding: 2px 7px;
  font-weight: 700;
}

/* ── Diagram mode ──────────────────────────────────────── */
.diag-nd-inner:hover { filter: brightness(1.2); transform: translateY(-1px); transition: all .1s; }
#mw-worklist-panel.diag-maximized {
  position: fixed; inset: 44px 0 0 0; z-index: 100;
  background: var(--bg0); margin: 0; border-radius: 0;
  display: flex; flex-direction: column;
}
#mw-worklist-panel.diag-maximized #mw-diag-viewport { height: calc(100vh - 180px) !important; }

.pb-red    { background: rgba(226,75,74,.15);  color: var(--compass-red);    border: 1px solid rgba(226,75,74,.3); }
.pb-amber  { background: rgba(239,159,39,.12); color: var(--compass-amber);  border: 1px solid rgba(239,159,39,.3); }
.pb-green  { background: rgba(29,158,117,.12); color: var(--compass-green);  border: 1px solid rgba(29,158,117,.3); }
.pb-cyan   { background: rgba(0,210,255,.08);  color: var(--compass-cyan);   border: 1px solid rgba(0,210,255,.25); }

/* ── Two-column grid ─────────────────────────────────────── */
.two-col { display: grid; grid-template-columns: 1fr minmax(0, 320px); gap: 14px; }
.three-col { display: grid; grid-template-columns: 1fr 1fr minmax(0, 280px); gap: 14px; }

/* ── Row items ───────────────────────────────────────────── */
.cmp-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 13px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background .1s;
}

.cmp-row:last-child { border-bottom: none; }
.cmp-row:hover { background: var(--bg2); }
.wi-selected { background: rgba(0,210,255,.06) !important; border-left: 2px solid var(--compass-cyan,#00D2FF) !important; }

.row-title {
  font-family: var(--font-ui, 'Barlow Condensed', sans-serif);
  font-size: 13px;
  font-weight: 500;
  color: var(--text0);
  flex: 1;
  min-width: 0;
}

.row-sub {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text3);
  margin-top: 2px;
}

/* ── Action rows ─────────────────────────────────────────── */
.action-row {
  padding: 11px 13px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background .1s;
}

.action-row:last-child { border-bottom: none; }
.action-row:hover { background: var(--bg2); }

.action-row.urgent { border-left: 3px solid var(--compass-red); }
.action-row.warning { border-left: 3px solid var(--compass-amber); }

.ar-hdr {
  display: flex;
  align-items: flex-start;
  gap: 9px;
  margin-bottom: 4px;
}

.ar-icon {
  width: 26px;
  height: 26px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  font-size: 12px;
}

.ari-red    { background: rgba(226,75,74,.15);  color: var(--compass-red); }
.ari-amber  { background: rgba(239,159,39,.12); color: var(--compass-amber); }
.ari-cyan   { background: rgba(0,210,255,.1);   color: var(--compass-cyan); }
.ari-green  { background: rgba(29,158,117,.12); color: var(--compass-green); }

.ar-title {
  font-family: var(--font-mono);
  font-size: 12.5px;
  font-weight: 500;
  color: var(--text0);
  flex: 1;
  min-width: 0;
  line-height: 1.3;
}

.ar-due {
  font-family: var(--font-mono);
  font-size: 10px;
  flex-shrink: 0;
}

.ar-due.red   { color: var(--compass-red); }
.ar-due.amber { color: var(--compass-amber); }

.ar-body {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text2);
  line-height: 1.5;
  margin: 3px 0 6px 35px;
}

.ar-warn {
  font-family: var(--font-mono);
  font-size: 10px;
  padding: 5px 8px;
  background: rgba(239,159,39,.08);
  border: 1px solid rgba(239,159,39,.2);
  color: var(--compass-amber);
  margin: 3px 0 6px 35px;
  letter-spacing: .03em;
}

.ar-acts {
  display: flex;
  gap: 6px;
  margin-left: 35px;
  flex-wrap: wrap;
}

/* ── Buttons ─────────────────────────────────────────────── */
.cmp-btn {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: .08em;
  text-transform: uppercase;
  padding: 4px 12px;
  cursor: pointer;
  border: 1px solid;
  transition: opacity .12s;
  white-space: nowrap;
}

.cmp-btn:hover { opacity: .75; }

.btn-approve { border-color: rgba(29,158,117,.5);  background: rgba(29,158,117,.1);  color: var(--compass-green); }
.btn-reject  { border-color: rgba(226,75,74,.5);   background: none;                 color: var(--compass-red); }
.btn-respond { border-color: rgba(0,210,255,.4);   background: rgba(0,210,255,.08);  color: var(--compass-cyan); }
.btn-ghost   { border-color: var(--border);        background: none;                 color: var(--text2); }

/* ── Milestone dot ───────────────────────────────────────── */
.ms-dot {
  width: 11px;
  height: 11px;
  border-radius: 50%;
  flex-shrink: 0;
}

.ms-done   { background: var(--compass-green); }
.ms-active { background: var(--compass-amber); }
.ms-risk   { background: var(--compass-red); }
.ms-future { background: none; border: 1.5px solid var(--border); }

/* ── Status badges ───────────────────────────────────────── */
.status-badge {
  font-family: var(--font-mono);
  font-size: 10px;
  padding: 2px 7px;
  flex-shrink: 0;
}

.sb-done   { background: rgba(29,158,117,.12);  color: var(--compass-green); border: 1px solid rgba(29,158,117,.3); }
.sb-risk   { background: rgba(226,75,74,.12);   color: var(--compass-red);   border: 1px solid rgba(226,75,74,.3); }
.sb-warn   { background: rgba(239,159,39,.1);   color: var(--compass-amber); border: 1px solid rgba(239,159,39,.25); }
.sb-future { background: rgba(255,255,255,.04); color: var(--text3);         border: 1px solid var(--border); }
.sb-cyan   { background: rgba(0,210,255,.08);   color: var(--compass-cyan);  border: 1px solid rgba(0,210,255,.25); }

/* ── Progress bar ────────────────────────────────────────── */
.progress-track {
  height: 4px;
  background: var(--bg2);
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  transition: width .5s;
}

/* ── Budget bar ──────────────────────────────────────────── */
.budget-row {
  padding: 10px 13px;
  border-bottom: 1px solid var(--border);
}

.budget-row:last-child { border-bottom: none; }

.budget-header {
  display: flex;
  justify-content: space-between;
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text3);
  margin-bottom: 5px;
}

.budget-value {
  font-weight: 700;
  color: var(--text1);
}

.budget-track {
  height: 6px;
  background: var(--bg2);
  overflow: hidden;
}

.budget-fill {
  height: 100%;
  transition: width .6s;
}

/* ── Update / thread rows ────────────────────────────────── */
.update-row {
  padding: 10px 13px;
  border-bottom: 1px solid var(--border);
}

.update-row:last-child { border-bottom: none; }

.ur-hdr {
  display: flex;
  align-items: center;
  gap: 7px;
  margin-bottom: 4px;
}

.ur-av {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-hud);
  font-size: 10px;
  font-weight: 700;
  flex-shrink: 0;
}

.av-cyan   { background: rgba(0,210,255,.15);   border: 1px solid rgba(0,210,255,.3);   color: var(--compass-cyan); }
.av-amber  { background: rgba(239,159,39,.15);  border: 1px solid rgba(239,159,39,.3);  color: var(--compass-amber); }
.av-green  { background: rgba(29,158,117,.15);  border: 1px solid rgba(29,158,117,.3);  color: var(--compass-green); }

.ur-name {
  font-family: var(--font-mono);
  font-size: 11.5px;
  font-weight: 500;
  color: var(--text0);
  flex: 1;
}

.ur-time {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text3);
}

.ur-body {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text2);
  line-height: 1.5;
  margin-left: 29px;
}

.ur-flagged {
  border-left: 2px solid var(--compass-amber);
  padding-left: 8px;
  margin-left: 29px;
  color: var(--text1);
  font-family: var(--font-mono);
  font-size: 11px;
  line-height: 1.5;
}

/* ── Thread input ────────────────────────────────────────── */
.thread-in {
  padding: 9px 13px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 7px;
  align-items: center;
}

.thread-in input {
  flex: 1;
  font-family: var(--font-mono);
  font-size: 11px;
  padding: 6px 10px;
  background: var(--bg2);
  border: 1px solid var(--border);
  color: var(--text1);
  outline: none;
  transition: border-color .15s;
}

.thread-in input:focus { border-color: rgba(0,210,255,.4); }

/* ── Document rows ───────────────────────────────────────── */
.doc-row {
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 8px 13px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background .1s;
}

.doc-row:last-child { border-bottom: none; }
.doc-row:hover { background: var(--bg2); }

.doc-icon {
  width: 26px;
  height: 26px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  flex-shrink: 0;
}

.doc-info { flex: 1; min-width: 0; }

.doc-name {
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 500;
  color: var(--text0);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.doc-meta {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text3);
  margin-top: 1px;
}

/* ── Scrubber ────────────────────────────────────────────── */
.scrubber-wrap {
  padding: 10px 13px;
  border-bottom: 1px solid var(--border);
}

.scrubber-labels {
  display: flex;
  justify-content: space-between;
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text3);
  margin-bottom: 6px;
}

.scrubber-date-active {
  color: var(--compass-cyan);
  font-weight: 700;
}

.scrubber-track {
  position: relative;
  height: 4px;
  background: var(--bg2);
  cursor: pointer;
  margin-bottom: 6px;
}

.scrubber-fill {
  height: 100%;
  background: var(--compass-cyan);
  transition: width .1s;
}

.scrubber-thumb {
  position: absolute;
  top: 50%;
  width: 12px;
  height: 12px;
  background: var(--bg1);
  border: 2px solid var(--compass-cyan);
  border-radius: 50%;
  transform: translate(-50%, -50%);
  cursor: grab;
  transition: left .1s;
}

.scrubber-dots {
  display: flex;
  justify-content: space-between;
  margin-top: 4px;
}

.sdot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  cursor: pointer;
  transition: transform .1s;
}

.sdot:hover { transform: scale(1.5); }

.scrubber-snapshot {
  padding: 8px 10px;
  background: var(--bg2);
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text2);
  line-height: 1.5;
  min-height: 38px;
  margin-top: 6px;
  border-left: 2px solid var(--compass-cyan);
}

/* ── Rejection context card ──────────────────────────────── */
.rejection-context {
  display: flex;
  gap: 9px;
  padding: 9px 10px;
  background: rgba(226,75,74,.07);
  border: 1px solid rgba(226,75,74,.25);
  border-left: 3px solid var(--compass-red);
  margin-bottom: 8px;
}

.rejection-context-icon {
  font-size: 13px;
  color: var(--compass-red);
  flex-shrink: 0;
  margin-top: 1px;
}

.rejection-context-body { flex: 1; min-width: 0; }

.rejection-context-label {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--compass-red);
  margin-bottom: 3px;
}

.rejection-context-text {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text1);
  line-height: 1.45;
  font-style: italic;
}

.rejection-context-meta {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text3);
  margin-top: 3px;
}

/* ── Privacy note ────────────────────────────────────────── */
.privacy-note {
  display: flex;
  align-items: flex-start;
  gap: 7px;

<script>
'use strict';

// ── Constants ─────────────────────────────────────────────
const FIRM_ID = window.FIRM_ID || 'aaaaaaaa-0001-0001-0001-000000000001';

// ── State ─────────────────────────────────────────────────
let _projects   = [];
let _tasks      = [];
let _resources  = [];
let _users      = [];
let _myResource = null;
window._myResource = null; // exposed for mw-tabs.js
let _currentView = null;
let _viewLoaded  = {};
let _identityDebug = {};
let _teFilter    = null;   // date string 'YYYY-MM-DD' | null — filters time log by day
let _teEntries   = [];     // cached time entries for current user view session
let _wiItems     = [];     // cached work items for drawer access
let _teSelected  = null;   // id of currently selected time log row

async function loadBaseData() {
  try {
    // ── Step 1: Resolve identity ──────────────────────────────
    let authEmail = null;
    let authSub   = null;
    let appUserId = null;
    let appUserResourceId = null;

    try {
      const token  = await Auth.getFreshToken().catch(() => Auth.getToken());
      const claims = JSON.parse(atob(token.split('.')[1]));
      authSub   = claims.sub;
      authEmail = claims.email || null;

      const uRows   = await API.get(`users?id=eq.${authSub}&select=id,resource_id,name,email`).catch(() => []);
      const appUser = uRows?.[0] || null;
      appUserId          = appUser?.id || null;
      appUserResourceId  = appUser?.resource_id || null;
      if (!authEmail && appUser?.email) authEmail = appUser.email;

      if (appUser?.resource_id) {
        const rRows = await API.get(
          `resources?id=eq.${appUser.resource_id}&select=id,first_name,last_name,email,is_active,is_external,user_id,firm_id,department`
        ).catch(() => []);
        const r = rRows?.[0] || null;
        if (r) {
          _myResource = { ...r,
            name: `${r.first_name||''} ${r.last_name||''}`.trim() || appUser.name || appUser.email || '—',
          };
          window._myResource = _myResource;
        }
      }

      // Fallback — match by email if resource_id path didn't resolve
      if (!_myResource && authEmail) {
        const eRows = await API.get(
          `resources?email=eq.${encodeURIComponent(authEmail)}&select=id,first_name,last_name,email,is_active,is_external,user_id,firm_id,department&limit=1`
        ).catch(() => []);
        const r = eRows?.[0] || null;
        if (r) {
          _myResource = { ...r,
            name: `${r.first_name||''} ${r.last_name||''}`.trim() || authEmail || '—',
          };
          window._myResource = _myResource;
        }
      }

      // Store debug info for error messages
      _identityDebug = {
        authEmail,
        authSub:    authSub?.slice(0,8) + '…',
        appUserId:  appUserId?.slice(0,8) + '…' || 'none',
        resourceId: appUserResourceId?.slice(0,8) + '…' || 'none',
        resolved:   !!_myResource,
        name:       _myResource?.name || null,
      };

      console.log('[Compass] Identity:', _myResource?.name || 'unresolved',
        '| email:', authEmail, '| sub:', authSub?.slice(0,8),
        '| resource_id:', appUserResourceId?.slice(0,8) || 'none');

    } catch(e) {
      console.warn('[Compass] Identity resolution failed:', e.message);
      _identityDebug = { error: e.message };
    }

    // ── Step 2: Load shared data ──────────────────────────────
    [_projects, _tasks, _resources, _users] = await Promise.all([
      API.getProjects().catch(() => []),
      API.getTasks().catch(() => []),
      API.get('resources?select=id,first_name,last_name,email,is_active,user_id,firm_id,department&is_active=eq.true&firm_id=eq.' + FIRM_ID).catch(() => []),
      API.getUsers().catch(() => []),
    ]);

    _resources = (_resources || []).map(r => ({
      ...r,
      name: `${r.first_name||''} ${r.last_name||''}`.trim() || r.email || '—',
    }));

    // Update nav avatar
    if (_myResource?.name) {
      const initials = _myResource.name.split(' ').map(n => n[0]).join('').slice(0, 2).toUpperCase();
      const avEl = document.getElementById('compass-user-av');
      if (avEl) avEl.textContent = initials;
    }
  } catch (e) {
    console.error('[Compass] loadBaseData failed:', e);
  }
}

// ── View switcher ─────────────────────────────────────────
function switchView(viewId) {
  // Hide all views
  document.querySelectorAll('.compass-view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.role-tab').forEach(t => t.classList.remove('active'));

  // Show target
  const viewEl = document.getElementById('view-' + viewId);
  const tabEl  = document.getElementById('tab-' + viewId);
  if (!viewEl) return;

  viewEl.classList.add('active');
  if (tabEl) tabEl.classList.add('active');

  _currentView = viewId;
  sessionStorage.setItem('compass-view', viewId);
  localStorage.setItem('compass-view', viewId);

  // Lazy-load view data on first activation
  if (!_viewLoaded[viewId]) {
    _viewLoaded[viewId] = true;
    switch (viewId) {
      case 'user':       loadUserView();          break;
      case 'pm':         loadPMView();         break;
      case 'management': loadManagementView(); break;
      case 'executive':  loadExecutiveView();  break;
      case 'client':     loadClientView();     break;
    }
  }
}

// ── Toast ─────────────────────────────────────────────────
function compassToast(msg, duration = 2200) {
  const el = document.getElementById('compass-toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), duration);
}

// ── Escape HTML ───────────────────────────────────────────
function esc(s) {
  return String(s ?? '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Date formatting ───────────────────────────────────────
function fmtDate(iso) {
  if (!iso) return '—';
  return new Date(iso + 'T00:00:00').toLocaleDateString('en-US', {
    month: 'short', day: 'numeric'
  });
}

function fmtDateTime(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleDateString('en-US', {
    month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit'
  });
}

function daysOverdue(dateStr) {
  if (!dateStr) return 0;
  const diff = Date.now() - new Date(dateStr + 'T00:00:00').getTime();
  return Math.max(0, Math.floor(diff / 86400000));
}

function _timeAgo(iso) {
  if (!iso) return '—';
  const diff = Date.now() - new Date(iso).getTime();
  const mins  = Math.floor(diff / 60000);
  const hours = Math.floor(diff / 3600000);
  const days  = Math.floor(diff / 86400000);
  if (mins  <  1) return 'just now';
  if (mins  < 60) return `${mins}m ago`;
  if (hours < 24) return `${hours}h ago`;
  if (days  <  7) return `${days}d ago`;
  return fmtDate(iso);
}

// ── Avatar HTML ───────────────────────────────────────────
function avatarHtml(name, size = 24, cls = 'av-cyan') {
  const initials = (name || '?').split(' ').map(n => n[0]).join('').slice(0, 2).toUpperCase();
  return `<div class="ur-av ${cls}" style="width:${size}px;height:${size}px;font-size:${Math.floor(size*0.4)}px">${initials}</div>`;
}




// ── My Work — loaded dynamically from my-work.html ─────────
// State and functions live in my-work.html, injected at runtime.
// Shared globals used by my-work.html: _myResource, _projects, _resources,
// _users, API, compassToast, esc, fmtDate, daysOverdue, _viewLoaded

window._myWorkLoaded = false;

// ── My Time — loaded dynamically from my-time.html ──────────
// Injected into #mt-root inside the My Time suite tab.
// Entry point: window._mtLoadView(); refresh: window._mtRefresh()
// Called by my-work.html when the "My Time" suite tab is clicked.

window._myTimeLoaded = false;

async function loadUserView() {
  // If my-work.html scripts already executed, just refresh the data
  if (window._myWorkLoaded) {
    window._mwRefresh && window._mwRefresh();
    return;
  }
  const content = document.getElementById('user-content');
  const loading  = document.getElementById('compass-loading');
  if (loading) loading.style.display = 'flex';
  if (content) content.style.display = 'none';
  try {
    const resp = await fetch('/my-work.html');
    if (!resp.ok) throw new Error('Failed to load my-work.html: ' + resp.status);
    const html = await resp.text();
    // Parse and inject — extract script separately so it executes
    const parser = new DOMParser();
    const doc = parser.parseFromString(html, 'text/html');
    // Inject HTML content into view-user
    const viewUser = document.getElementById('view-user');
    if (viewUser) {
      // Replace the inner loading/content divs with my-work content
      const body = doc.body;
      // Copy non-script children into view-user
      Array.from(body.children).forEach(el => {
        if (el.tagName !== 'SCRIPT') viewUser.appendChild(el.cloneNode(true));
      });
    }
    // Execute scripts — src-aware loader handles both inline and external <script src> tags
    const scripts = doc.querySelectorAll('script');
    for (const s of scripts) {
      await new Promise((resolve, reject) => {
        const el = document.createElement('script');
        if (s.src) {
          el.src = s.src;
          el.onload  = resolve;
          el.onerror = () => reject(new Error('Failed to load ' + s.src));
        } else {
          el.textContent = s.textContent;
        }
        document.head.appendChild(el);
        if (!s.src) resolve();
      });
    }
    window._myWorkLoaded = true;
    // Now call the real loadUserView that was just loaded
    if (window._mwLoadUserView) await window._mwLoadUserView();
    // Restore last active inner tab
    const savedTab = localStorage.getItem('compass-user-tab');
    if (savedTab && savedTab !== 'work' && window.uSwitchTab) {
      const btn = document.querySelector('.ust[data-tab="' + savedTab + '"]');
      window.uSwitchTab(savedTab, btn || null);
    }
  } catch(e) {
    console.error('[Compass] Failed to load my-work.html:', e);
    if (loading) loading.style.display = 'none';
    if (content) {
      content.style.display = 'block';
      content.innerHTML = '<div style="padding:40px;font-family:var(--font-mono);color:#E24B4A">Failed to load My Work view. Check console.</div>';
    }
  }
}

// ── My Time loader ────────────────────────────────────────
// Called by my-work.html's "My Time" tab click handler.
// Fetches /my-time.html, injects into #mt-root, executes script,
// calls window._mtLoadView(). Subsequent calls trigger _mtRefresh().

async function loadMyTimeView() {
  if (window._myTimeLoaded) {
    window._mtRefresh && window._mtRefresh();
    return;
  }

  // #mt-root is rendered by my-work.html when the My Time tab is first shown
  const container = document.getElementById('mt-root');
  if (!container) {
    console.error('[Compass] #mt-root not found — My Time tab not yet rendered by my-work.html');
    return;
  }

  try {
    const resp = await fetch('/my-time.html');
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const html = await resp.text();

    const parser = new DOMParser();
    const doc    = parser.parseFromString(html, 'text/html');

    // Inject non-script nodes into container
    Array.from(doc.body.childNodes).forEach(node => {
      if (node.nodeName !== 'SCRIPT') {
        container.appendChild(document.importNode(node, true));
      }
    });

    // Execute scripts in declaration order
    for (const s of doc.querySelectorAll('script')) {
      const el = document.createElement('script');
      el.textContent = s.textContent;
      document.head.appendChild(el);
    }

    window._myTimeLoaded = true;

    if (window._mtLoadView) {
      await window._mtLoadView();
    } else {
      console.error('[Compass] _mtLoadView not exported by my-time.html');
    }
  } catch (err) {
    console.error('[Compass] Failed to load my-time.html:', err);
    compassToast('Failed to load My Time — check console', 4000);
  }
}

document.addEventListener('DOMContentLoaded', async () => {
  await loadBaseData();
  // Restore last view or default to PM
  const saved = localStorage.getItem('compass-view') || sessionStorage.getItem('compass-view') || 'user';
  switchView(saved);
});

</script>

<script>
// ── Compass hover-reveal sidebar ──────────────────────────────────────────
(function() {
  const trigger = document.getElementById('hud-sidebar-trigger');
  const panel   = document.getElementById('hud-sidebar-panel');
  const inner   = document.getElementById('hud-sidebar-inner');
  const notifBtn = document.getElementById('hud-notif-btn');
  const badge    = document.getElementById('hud-notif-badge');
  if (!trigger || !panel) return;

  let hideTimer = null;

  function openPanel() {
    clearTimeout(hideTimer);
    panel.classList.add('open');
  }
  function closePanel() {
    hideTimer = setTimeout(() => panel.classList.remove('open'), 300);
  }

  // Hover trigger zone → open
  trigger.addEventListener('mouseenter', openPanel);
  // Keep open while inside panel
  panel.addEventListener('mouseenter', () => clearTimeout(hideTimer));
  panel.addEventListener('mouseleave', closePanel);
  trigger.addEventListener('mouseleave', closePanel);

  // Populate sidebar inner with Sidebar.render output once Sidebar is ready
  function populateSidebar() {
    if (typeof Sidebar === 'undefined' || !inner) return;
    // Sidebar.init() will target #sidebar — we redirect it to our inner div
    const phantom = document.createElement('div');
    phantom.id = 'sidebar';
    phantom.style.display = 'none';
    document.body.appendChild(phantom);

    // After Sidebar.init populates #sidebar, move its content to our inner div
    const origInit = Sidebar.init.bind(Sidebar);
    const wrappedInit = async function(page) {
      await origInit(page);
      inner.innerHTML = phantom.innerHTML;
      phantom.innerHTML = '';
      // Re-wire HUDNotif badge updates to our visible badge elements
      _syncNotifBadge();
    };
    // Call it once now
    wrappedInit('compass');
  }

  // Sync unread count to the fixed bell button badge
  function _syncNotifBadge() {
    const count = window.HUDNotif ? window.HUDNotif.getUnread() : 0;
    if (badge) {
      badge.textContent = count > 99 ? '99+' : String(count);
      badge.style.display = count > 0 ? 'flex' : 'none';
    }
    if (notifBtn) notifBtn.classList.toggle('has-unread', count > 0);
  }

  // Poll badge sync every 2s (HUDNotif polls every 10s, this just keeps the button in sync)
  setInterval(_syncNotifBadge, 2000);

  // Bell button opens notification panel
  if (notifBtn) {
    notifBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      if (window.HUDNotif) window.HUDNotif._openPanel(notifBtn);
    });
  }

  // Wait for DOM + scripts to be ready, then populate
  if (document.readyState === 'complete') {
    populateSidebar();
  } else {
    window.addEventListener('load', populateSidebar);
  }
})();
</script>
</body>
