    `;
    document.head.appendChild(s);
  }

  try {
    const today = new Date().toLocaleDateString('en-CA');
    const todayDate = new Date(today+'T00:00:00');
    const dayOfWeek = todayDate.getDay();
    const isoOffset = dayOfWeek === 0 ? 6 : dayOfWeek - 1;
    const weekStart = new Date(todayDate); weekStart.setDate(todayDate.getDate() - isoOffset);
    const weekDays = Array.from({length:5}, (_,i)=>{ const d=new Date(weekStart); d.setDate(weekStart.getDate()+i); return d.toLocaleDateString('en-CA'); });
    const dayLabels = ['M','T','W','Th','F'];

    const [wfInstances, actionItems, cocEvents, resourceReqs, weekEntries, confSignals] = await Promise.all([
      API.get('workflow_instances?select=id,title,status,current_step_name,project_id,launched_at,priority,stakes&status=eq.active&order=launched_at.desc&limit=50').catch(() => []),
      API.get('workflow_action_items?status=eq.open&order=due_date.asc&limit=100').catch(() => []),
      API.get('workflow_step_instances?select=id,instance_id,event_type,step_name,outcome,actor_name,event_notes,created_at&event_type=in.(step_completed,step_reset,step_activated,task_progress_update)&order=created_at.desc&limit=300').catch(() => []),
      API.get('resource_requests?select=id,project_id,status,submitted_at&status=eq.pending&order=submitted_at.asc&limit=20').catch(() => []),
      API.get(`time_entries?date=gte.${weekDays[0]}&date=lte.${weekDays[4]}&select=id,project_id,resource_id,date,hours,is_billable&limit=500`).catch(() => []),
      API.get(`workflow_step_instances?select=id,instance_id,event_type,outcome,actor_name,created_at&event_type=eq.task_progress_update&created_at=gte.${weekDays[0]}T00:00:00&order=created_at.desc&limit=300`).catch(() => []),
    ]);

    const activeProjects = _projects.filter(p => p.status === 'active');

    // ── Red flags (step_reset in last 48h) ────────────────
    const cutoff48h = new Date(Date.now() - 48*3600000).toISOString();
    const flagMap = {};
    cocEvents.filter(e => e.event_type==='step_reset' && e.created_at > cutoff48h).forEach(e => {
      const inst = wfInstances.find(w=>w.id===e.instance_id);
      const key = e.instance_id;
      if (!flagMap[key] || e.created_at > flagMap[key].created_at)
        flagMap[key] = { ...e, instTitle:inst?.title||'—', projId:inst?.project_id, projName:_projects.find(p=>p.id===inst?.project_id)?.name||'—', count:1 };
      else flagMap[key].count++;
    });
    const redFlags = Object.values(flagMap).sort((a,b)=>b.created_at.localeCompare(a.created_at));

    // ── Per-project stats ─────────────────────────────────
    const projStats = activeProjects.map(p => {
      const projTasks   = _tasks.filter(t => t.project_id === p.id);
      const totalTasks  = projTasks.length;
      const doneTasks   = projTasks.filter(t => t.status==='complete').length;
      const overdueTasks= projTasks.filter(t => t.due_date && t.due_date < today && !['complete','cancelled'].includes(t.status));
      const projInsts   = wfInstances.filter(w => w.project_id === p.id);
      const projAIs     = actionItems.filter(a => projInsts.some(i=>i.id===a.instance_id));
      const projFlags   = redFlags.filter(f => f.projId === p.id);
      const projReqs    = resourceReqs.filter(r => r.project_id === p.id);
      const projCoc     = cocEvents.filter(e => projInsts.some(i=>i.id===e.instance_id)).slice(0,6);
      // Hours by day for this project
      const hoursByDay  = {};
      weekDays.forEach(d => { hoursByDay[d] = (weekEntries||[]).filter(e=>e.project_id===p.id&&e.date===d).reduce((s,e)=>s+parseFloat(e.hours||0),0); });
      // EVM stub — real data would come from project fields
      const pct = totalTasks>0 ? Math.round(doneTasks/totalTasks*100) : 0;
      const urgency = projFlags.length*5 + overdueTasks.length*3 + projAIs.filter(a=>a.due_date&&a.due_date<today).length*2 + projInsts.length + projReqs.length;
      return { p, projTasks, totalTasks, doneTasks, pct, overdueTasks, projInsts, projAIs, projFlags, projReqs, projCoc, hoursByDay, urgency };
    }).sort((a,b) => b.urgency - a.urgency);

    // Portfolio-level EVM aggregates (stub — real CPI/SPI needs EV/AC/PV from DB)
    const totalOverdue   = projStats.reduce((s,ps)=>s+ps.overdueTasks.length, 0);
    const totalFlags     = redFlags.length;
    const totalReqs      = resourceReqs.length;
    const totalInstances = wfInstances.length;
    const weekHours      = (weekEntries||[]).reduce((s,e)=>s+parseFloat(e.hours||0),0);

    // ── Timesheet compliance — % of active resources who logged today ──
    const activeResIds   = new Set(_resources.filter(r=>r.is_active).map(r=>r.id));
    const loggedToday    = new Set((weekEntries||[]).filter(e=>e.date===today).map(e=>e.resource_id));
    const tsCompliance   = activeResIds.size > 0 ? Math.round(loggedToday.size / activeResIds.size * 100) : null;

    // ── Red signals NOW — team members with red signal today ──────────
    const redSignalsNow  = new Set(
      (confSignals||[]).filter(e=>e.outcome==='blocked'&&e.created_at>=today+'T00:00:00').map(e=>e.actor_name)
    ).size;

    // ── Per-resource daily sentiment arc from progress updates ────────
    // Build: resId → { date → dominant signal (green/yellow/red) }
    const resSentiment = {};
    (confSignals||[]).forEach(e => {
      if (!e.actor_name) return;
      const d = e.created_at.slice(0,10);
      if (!weekDays.includes(d)) return;
      if (!resSentiment[e.actor_name]) resSentiment[e.actor_name] = {};
      // Red beats yellow beats green
      const prev = resSentiment[e.actor_name][d];
      const rank = {on_track:1, at_risk:2, blocked:3};
      if (!prev || (rank[e.outcome]||0) > (rank[prev]||0))
        resSentiment[e.actor_name][d] = e.outcome||'on_track';
    });
    // Also derive from time entries: no entry on a working day = grey
    // Signal color helper
    function sigColor(sig) {
      if (sig==='blocked') return '#E24B4A';
      if (sig==='at_risk')  return '#EF9F27';
      if (sig==='on_track') return '#1D9E75';
      return null; // no data
    }
    function sigLabel(sig) {
      if (sig==='blocked') return 'Blocked';
      if (sig==='at_risk')  return 'At risk';
      if (sig==='on_track') return 'On track';
      return '—';
    }

    // ── 5-segment health bar scores per project ───────────────────────
    // Schedule: SPI if available, else task overdue ratio
    // Cost: CPI if available, else budget consumed ratio
    // Confidence: ratio of green signals vs all signals from team this week
    // Rework: ratio of step_reset events vs step_completed
    // Timesheets: % of expected resources logging time
    function projectHealthSegments(ps) {
      const {p, overdueTasks, projTasks, projCoc, projInsts} = ps;
      const projEntries = (weekEntries||[]).filter(e=>e.project_id===p.id);
      // Schedule
      let schedScore = 1;
      if (p.spi) schedScore = parseFloat(p.spi);
      else if (projTasks.length > 0) schedScore = 1 - (overdueTasks.length / Math.max(projTasks.length,1));
      // Cost
      let costScore = 1;
      if (p.cpi) costScore = parseFloat(p.cpi);
      else if (p.budget_hours && p.budget_hours_used)
        costScore = 1 - Math.max(0, (parseFloat(p.budget_hours_used)/parseFloat(p.budget_hours)) - 1);
      // Confidence: from confSignals matching proj instances this week
      const projInstIds = new Set(projInsts.map(i=>i.id));
      const projSigs = (confSignals||[]).filter(e=>projInstIds.has(e.instance_id)||projEntries.some(te=>te.resource_id===e.resource_id));
      const greenSigs = projSigs.filter(e=>e.outcome==='on_track').length;
      const confScore = projSigs.length > 0 ? greenSigs / projSigs.length : 0.5;
      // Rework: step_resets vs step_completed
      const resets    = projCoc.filter(e=>e.event_type==='step_reset').length;
      const completed = projCoc.filter(e=>e.event_type==='step_completed').length;
      const reworkScore = completed > 0 ? Math.max(0, 1 - resets/Math.max(completed,1)) : (resets > 0 ? 0 : 0.8);
      // Timesheets: resources who logged time this week for this proj
      const projResIds  = new Set(projEntries.map(e=>e.resource_id));
      const taskAssigned = new Set(_tasks.filter(t=>t.project_id===p.id&&t.assigned_to).map(t=>t.assigned_to));
      const tsScore = taskAssigned.size > 0 ? projResIds.size / Math.max(taskAssigned.size,1) : (projResIds.size > 0 ? 1 : 0.5);
      function score2color(s) {
        if (s >= 0.9) return '#1D9E75';
        if (s >= 0.7) return '#EF9F27';
        return '#E24B4A';
      }
      return [
        {label:'Schedule',  color:score2color(Math.min(schedScore,1)), score:schedScore},
        {label:'Cost',      color:score2color(Math.min(costScore,1)),  score:costScore},
        {label:'Confidence',color:score2color(confScore),              score:confScore},
        {label:'Rework',    color:score2color(reworkScore),            score:reworkScore},
        {label:'Timesheets',color:score2color(Math.min(tsScore,1)),    score:tsScore},
      ];
    }

    // ── Live feed events ──────────────────────────────────
    const feedEvents = cocEvents.slice(0,20).map(e => {
      const inst  = wfInstances.find(w=>w.id===e.instance_id);
      const proj  = _projects.find(p=>p.id===inst?.project_id);
      const isRej = e.event_type==='step_reset';
      const isDone= e.event_type==='step_completed';
      return { e, inst, proj, isRej, isDone,
        color: isRej?'var(--compass-red)':isDone?'var(--compass-green)':'var(--compass-amber)',
        icon: isRej?'↩':isDone?'✓':'●', age: _timeAgo(e.created_at) };
    });

    // ── Status color helper ───────────────────────────────
    function projStatusColor(ps) {
      if (ps.projFlags.length>0) return 'var(--compass-red)';
      if (ps.overdueTasks.length>3) return '#E24B4A';
      if (ps.overdueTasks.length>0) return 'var(--compass-amber)';
      if (ps.projInsts.length>0) return 'var(--compass-cyan)';
      return 'var(--compass-green)';
    }
    function projStatusLabel(ps) {
      if (ps.projFlags.length>0) return `<span class="pm-chip pm-chip-r">At risk</span>`;
      if (ps.overdueTasks.length>3) return `<span class="pm-chip pm-chip-r">At risk</span>`;
      if (ps.overdueTasks.length>0) return `<span class="pm-chip pm-chip-a">Watch</span>`;
      return `<span class="pm-chip pm-chip-g">On track</span>`;
    }

    // ── Day grid HTML ────────────────────────────────────
    function dayGridHtml(hoursByDay, projId) {
      return dayLabels.map((lbl,i)=>{
        const d = weekDays[i];
        const hrs = hoursByDay[d]||0;
        const isToday = d===today;
        const dayEntries = (weekEntries||[]).filter(e=>e.project_id===projId&&e.date===d);
        const bill = dayEntries.filter(e=>e.is_billable).reduce((s,e)=>s+parseFloat(e.hours||0),0);
        const nonbill = hrs - bill;
        const billPct = hrs>0 ? Math.round(bill/hrs*100) : 0;
        const dotColor = hrs>8?'#E24B4A':hrs>0?'#1D9E75':isToday?'#00D2FF':'#2A4060';
        const hrsColor = hrs>8?'var(--compass-red)':hrs>0?'var(--compass-green)':isToday?'var(--compass-cyan)':'#2A4060';
        // Build per-person tooltip data
        const byResource = {};
        dayEntries.forEach(e=>{
          if(!byResource[e.resource_id]) byResource[e.resource_id]={bill:0,nonbill:0};
          if(e.is_billable) byResource[e.resource_id].bill+=parseFloat(e.hours||0);
          else byResource[e.resource_id].nonbill+=parseFloat(e.hours||0);
        });
        const personRows = Object.entries(byResource).map(([rid,v])=>{
          const res=_resources.find(r=>r.id===rid);
          const name=res?res.first_name+' '+res.last_name:'Unknown';
          const tot=(v.bill+v.nonbill).toFixed(1);

        <!-- Stats line + budget -->

    // ── Build alert rail (unacknowledged flags + aged requests) ─

          </div>

          <!-- Portfolio tab -->

                redFlags.forEach(f => {
                  html += `<div style="background:rgba(226,75,74,.07);border:1px solid rgba(226,75,74,.28);border-left:3px solid #E24B4A;padding:10px 12px;margin-bottom:7px">
                    <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:3px">

                projStats.filter(ps=>ps.overdueTasks.length>0).forEach(ps => {
                  html += `<div style="font-family:var(--font-head);font-size:11px;font-weight:700;color:#90B8D8;padding:5px 0 3px;letter-spacing:.04em">${esc(ps.p.name)}</div>`;
                  ps.overdueTasks.forEach(t => {
                    const assignee = _resources.find(r=>r.user_id===t.assigned_to);
                    const name = assignee ? assignee.first_name+' '+assignee.last_name : null;

                      <span style="color:#E24B4A;flex-shrink:0">!</span>

              _tasks.filter(t=>t.assigned_to&&!rosterUserIds.has(t.assigned_to)).forEach(t => {

                  resMap[synId] = { id:synId, first_name:parts[0]||nm, last_name:parts.slice(1).join(' ')||'', user_id:t.assigned_to, department:'External', is_active:true, source:'task', taskCount:0, projIds:new Set(), weekHrs:0, billHrs:0 };

              _tasks.filter(t=>t.assigned_to&&!['complete','cancelled'].includes(t.status)).forEach(t => {
                const r = Object.values(resMap).find(r=>r.user_id===t.assigned_to);

              const allRes = Object.values(resMap).filter(r=>r.is_active!==false);

              allRes.forEach(r => { const dept=r.department||'Unassigned'; if(!depts[dept])depts[dept]=[]; depts[dept].push(r); });
              const deptNames = Object.keys(depts).sort();
              if (!allRes.length) return '<div style="font-family:var(--font-head);font-size:12px;color:var(--text3);text-align:center;padding:24px">No team members found</div>';

              // ── Department filter bar ──────────────────────────
              let html = `<div id="pm-team-filter" style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px;padding:8px 0 6px;border-bottom:1px solid rgba(0,210,255,.08)">
                <button class="pm-team-filter-btn on" data-dept="all"
                  style="font-family:var(--font-head);font-size:11px;font-weight:700;padding:3px 10px;background:#132035;border:1px solid rgba(0,210,255,.4);color:#F0F6FF;cursor:pointer"
                  onclick="pmTeamFilter(this,'all')">All (${allRes.length})</button>
                ${deptNames.map(d=>`<button class="pm-team-filter-btn" data-dept="${esc(d)}"
                  style="font-family:var(--font-head);font-size:11px;font-weight:700;padding:3px 10px;background:#0c1828;border:1px solid rgba(0,210,255,.12);color:#5A84A8;cursor:pointer"
                  onclick="pmTeamFilter(this,'${esc(d)}')">${esc(d)} (${depts[d].length})</button>`).join('')}
              </div>`;

              // ── Per-resource rows with sentiment dot arc ───────
              deptNames.forEach(dept => {

                depts[dept].sort((a,b)=>(a.last_name||'').localeCompare(b.last_name||'')).forEach(r => {
                  const initials   = ((r.first_name||'')[0]||'').toUpperCase() + ((r.last_name||'')[0]||'').toUpperCase();

                  const billPct    = r.weekHrs>0 ? Math.round(r.billHrs/r.weekHrs*100) : 0;
                  const projList   = [...r.projIds].map(pid=>_projects.find(p=>p.id===pid)?.name).filter(Boolean).slice(0,2);

                  // Sentiment arc: M–F dots from resSentiment keyed by name

                  const dayDotLabels = ['M','T','W','Th','F'];
                  const dotHtml = weekDays.map((d,i) => {

                      dotColor = '#4A74A0'; // logged time, no signal
                      dotTitle = `${dayDotLabels[i]}: ${hrs.toFixed(1)}h logged, no signal`;
                    } else if (d > today) {
                      dotColor = 'rgba(255,255,255,.08)';

    // ── Tooltip engine ───────────────────────────────────
    (function() {
      let tip = null;
      function getTip() {
        if (!tip) {
          tip = document.createElement('div');
          tip.className = 'pm-tooltip';
          document.body.appendChild(tip);
        }
        return tip;
      }
      function pos(ev) {
        const t=getTip(), W=window.innerWidth, H=window.innerHeight;
        const x = ev.clientX + 14, y = ev.clientY - 10;
        t.style.left = (x + t.offsetWidth > W-16 ? ev.clientX - t.offsetWidth - 14 : x) + 'px';
        t.style.top  = (y + t.offsetHeight > H-16 ? ev.clientY - t.offsetHeight - 6 : y) + 'px';
      }
      window.pmHideTip = function() {
        const t = getTip(); t.classList.remove('show'); t.innerHTML = '';
      };
      window.pmShowDayTip = function(ev, el) {
        try {
          const d = JSON.parse(el.dataset.tt.replace(/&#39;/g,"'"));
          const t = getTip();
          const dateLabel = new Date(d.d+'T00:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
          let html = `<div class="pm-tt-hdr">${dateLabel}</div>`;
          if (parseFloat(d.hrs) > 0) {
            html += `<div class="pm-tt-row"><span>Total</span><span style="color:var(--compass-cyan)">${d.hrs}h</span></div>`;
            html += `<div class="pm-tt-bar"><div class="pm-tt-bar-fill" style="width:${d.billPct}%"></div></div>`;
            html += `<div class="pm-tt-row"><span style="color:var(--compass-cyan)">Billable</span><span style="color:var(--compass-cyan)">${d.bill}h (${d.billPct}%)</span></div>`;
            html += `<div class="pm-tt-row"><span style="color:#8B5CF6">Non-bill</span><span style="color:#8B5CF6">${d.nonbill}h (${100-d.billPct}%)</span></div>`;
            if (d.persons) {
              html += `<div style="margin-top:8px;border-top:1px solid rgba(0,210,255,.12);padding-top:6px">`;
              html += `<div class="pm-tt-hdr" style="margin-bottom:4px">Per person</div>`;
              d.persons.split(';').filter(Boolean).forEach(row => {
                const [name,tot,bill,nb] = row.split('|');
                const bp = tot>0?Math.round(bill/tot*100):0;
                html += `<div class="pm-tt-person">
                  <span style="color:#C8DFF0">${name}</span>
                  <span style="color:var(--compass-cyan)">${tot}h</span>
                  <span style="color:#3A5C80">${bp}% bill</span>
                </div>`;
              });
              html += '</div>';
            }
          } else {
            html += `<div style="font-family:var(--font-head);font-size:11px;color:#3A5C80">No time logged</div>`;
          }
          t.innerHTML = html;
          t.classList.add('show');
          pos(ev);
        } catch(e) {}
      };
      window.pmShowOverdueTip = function(ev, el) {
        try {
          const d = JSON.parse(el.dataset.tt.replace(/&#39;/g,"'"));
          const t = getTip();
          let html = `<div class="pm-tt-hdr">Overdue tasks (${d.items.length}${d.items.length===8?'+':''})</div>`;
          d.items.forEach(item => {
            const days = item.d ? Math.floor((Date.now()-new Date(item.d+'T00:00:00').getTime())/86400000) : null;
            html += `<div class="pm-tt-person">
              <span style="color:#C8DFF0;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${item.n}</span>
              ${days!==null?`<span style="color:#E24B4A;flex-shrink:0;margin-left:8px">${days}d ago</span>`:''}
            </div>`;
          });
          t.innerHTML = html; t.classList.add('show'); pos(ev);
        } catch(e) {}
      };
      window.pmShowReqsTip = function(ev, el) {
        try {
          const d = JSON.parse(el.dataset.tt.replace(/&#39;/g,"'"));
          const t = getTip();
          let html = `<div class="pm-tt-hdr">Pending requests (${d.items.length})</div>`;
          d.items.forEach(item => {
            const age = item.d ? Math.floor((Date.now()-new Date(item.d).getTime())/3600000) : null;
            html += `<div class="pm-tt-person">
              <span style="color:#C8DFF0">${item.p}</span>
              ${age!==null?`<span style="color:${age>48?'#E24B4A':'#EF9F27'};flex-shrink:0">${age}h ago</span>`:''}
            </div>`;
          });
          t.innerHTML = html; t.classList.add('show'); pos(ev);
        } catch(e) {}
      };
      document.addEventListener('mousemove', function(ev) {
        const t = getTip(); if (!t.classList.contains('show')) return;
        pos(ev);
      });
    })();

    // ── Person week brief ─────────────────────────────────
    window.pmPersonWeekBrief = function(name, arcStr, hrs, expected) {
      const redCount   = (arcStr.match(/R/g)||[]).length;
      const yellowCount= (arcStr.match(/Y/g)||[]).length;
      const noActivity = (arcStr.match(/—/g)||[]).length;
      let narrative = `${name} — week arc: ${arcStr}. ${hrs}h logged of ~${expected}h expected (${Math.round(hrs/expected*100)}%).`;
      if (redCount >= 3)     narrative += ` Multiple red signals (${redCount} days) — sustained distress. Recommend direct conversation.`;
      else if (redCount === 2) narrative += ` Two red signal days — emerging pattern. Monitor closely.`;
      else if (noActivity >= 2) narrative += ` ${noActivity} days with no logged activity — possible disengagement or block. Recommend check-in.`;
      else if (arcStr.includes('G→G→Y→Y→R') || arcStr.includes('G→Y→Y→R')) narrative += ' Consistent degradation over the week. Review what changed on the day the arc shifted.';
      else if (!arcStr.includes('R') && !arcStr.includes('Y')) narrative += ' Clean week — consistent performance throughout.';
      else narrative += ' Mixed signals — review individual day briefs for context.';
      pmOpenDayBriefingPanel(name+' · Week summary', arcStr, narrative, {hrs, expected, arc:arcStr});
    };

        g.style.display = (dept==='all' || g.dataset.dept===dept) ? 'block' : 'none';
      });
    };

    // ── Drawer open / close ───────────────────────────────
    window.pmOpenDrawer = function(projId) {
      if (!projId) return;
      // Highlight selected card
      document.querySelectorAll('.pm-pcard').forEach(c => c.classList.toggle('open', c.dataset.projId===projId));

      const ps = projStats.find(ps=>ps.p.id===projId);
      if (!ps) return;
      const {p,pct,doneTasks,totalTasks,overdueTasks,projInsts,projFlags,projReqs,projCoc,hoursByDay} = ps;

      const pmName = _resources.find(r=>r.id===p.pm_resource_id);
      const bcolor = projStatusColor(ps);
      const slabel = projStatusLabel(ps);
      const drawer = document.createElement('div');
      drawer.id = 'pm-drawer';
      drawer.className = 'pm-drawer';
      const flagsHtml = projFlags.length>0 ? projFlags.map(f=>{
        const flagCoc = cocEvents.find(e=>e.instance_id===f.instance_id&&e.event_type==='step_reset'&&e.created_at===f.created_at);
        return `<div class="pm-rfcard">
          <div class="pm-rf-tag">■ RED SIGNAL · ${_timeAgo(f.created_at)}</div>
          <div class="pm-rf-who">${esc(f.actor_name||'Team member')} posted a red confidence signal on <strong>${esc(f.instTitle)}</strong></div>
          <div class="pm-rf-quote">"${esc(f.event_notes||'No note provided')}"</div>

          <div style="display:flex;gap:6px">
            <button class="pm-btn pm-btn-red" style="flex:1">Acknowledge →</button>
            <button class="pm-btn pm-btn-cyan" style="flex:1" onclick="window.location.href='/cadence.html?instance=${f.instance_id}'">Open instance →</button>
          </div>
        </div>`;
      }).join('') : `<div style="padding:10px 11px;font-family:var(--font-head);font-size:12px;color:var(--text3)">No unacknowledged flags</div>`;
      // CoC-derived AI brief (pattern analysis)
      const rejCount = projCoc.filter(e=>e.event_type==='step_reset').length;
      const overdueCount = overdueTasks.length;
      const aiBriefHtml = `<div class="pm-aicard">
        <div class="pm-ai-lbl">■ REQUIRES ACTION</div>
        ${projFlags.length>0?`<div class="pm-ai-item">${esc(projFlags[0].instTitle)} — ${rejCount} rejection${rejCount!==1?'s':''} on this step${projFlags[0].event_notes?', "'+esc(projFlags[0].event_notes.slice(0,60))+'"':''}</div>`:''}
        ${projReqs.length>0?`<div class="pm-ai-item">${projReqs.length} resource request${projReqs.length>1?'s':''} aging — no response</div>`:''}
        ${projFlags.length===0&&projReqs.length===0?`<div class="pm-ai-item">No immediate actions required</div>`:''}
        ${overdueCount>0?`<div style="margin-top:6px"><div class="pm-ai-lbl">● TRENDING TO RISK</div><div class="pm-ai-item">${overdueCount} task${overdueCount!==1?'s':''} overdue — review assignments</div></div>`:''}
        <div style="margin-top:7px;padding-top:6px;border-top:1px solid rgba(239,159,39,.15);display:flex;justify-content:space-between;align-items:center">
          <span style="font-family:var(--font-head);font-size:11px;color:#5A84A8">AI morning brief</span>
          <button class="pm-btn pm-btn-cyan" style="padding:3px 10px;font-size:11px">Full brief →</button>
        </div>
      </div>`;
      // Brief archive (last 6 CoC days)
      const briefDays = (() => {
        const days = {};
        projCoc.forEach(e => { const d=e.created_at.slice(0,10); if(!days[d]) days[d]={date:d,flags:0,risk:0}; if(e.event_type==='step_reset') days[d].flags++; else if(e.event_type==='step_activated') days[d].risk++; });
        return Object.values(days).sort((a,b)=>b.date.localeCompare(a.date)).slice(0,6);
      })();
      const archiveHtml = briefDays.length>0 ? briefDays.map(b=>{
        const isToday=b.date===today;
        const dotColor=b.flags>0?'#E24B4A':b.risk>0?'#EF9F27':'#1D9E75';
        const label=b.flags>0?`<span style="color:#E24B4A">${b.flags} flag${b.flags>1?'s':''}</span>`:b.risk>0?`<span style="color:#EF9F27">${b.risk} activated</span>`:`<span style="color:#5A84A8">all clear</span>`;
        const dLabel=new Date(b.date+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',weekday:'short'});
        return `<div class="pm-brief-row">
          <span style="width:6px;height:6px;border-radius:50%;background:${dotColor};flex-shrink:0;margin-top:2px"></span>
          <div class="pm-bdate">${dLabel}${isToday?' · Today':''}</div>
          <div class="pm-bflag">${label}</div>
        </div>`;
      }).join('') : `<div style="padding:8px 11px;font-family:var(--font-head);font-size:12px;color:var(--text3)">No activity this week</div>`;
      drawer.innerHTML = `
        <div class="pm-drhdr">
          <div style="display:flex;align-items:flex-start;justify-content:space-between">
            <div>
              <div class="pm-drname">${esc(p.name)}</div>
              <div class="pm-drdesc">${esc(p.description||p.client||'—')} · Target: ${p.target_date?fmtDate(p.target_date):'—'}</div>
              <div style="display:flex;align-items:center;gap:6px;margin-top:4px">
                ${slabel}
                <span class="pm-chip pm-chip-g">Active</span>
                <span style="display:flex;align-items:center;gap:4px;font-family:var(--font-data);font-size:11px;color:var(--compass-green)">
                  <span class="pm-live-dot"></span>Live
                </span>
              </div>
            </div>
            <div style="text-align:right;flex-shrink:0;margin-left:12px">
              <div style="font-family:var(--font-head);font-size:11px;color:#5A84A8">PM / Owner</div>
              <div style="font-family:var(--font-head);font-size:13px;font-weight:700;color:#F0F6FF">${pmName?esc(pmName.first_name+' '+pmName.last_name):'—'}</div>
              <div style="font-family:var(--font-data);font-size:11px;color:#5A84A8;margin-top:2px">${new Date().toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})}</div>
              <button onclick="document.getElementById('pm-drawer').remove();document.querySelectorAll('.pm-pcard').forEach(c=>c.classList.remove('open'))"
                style="background:none;border:none;color:#5A84A8;font-size:16px;cursor:pointer;margin-top:3px;padding:0;line-height:1"
                onmouseenter="this.style.color='#F0F6FF'" onmouseleave="this.style.color='#5A84A8'">✕</button>
            </div>
          </div>
        </div>
        <div class="pm-drstrip">
          <div class="pm-drc"><div class="pm-drc-lbl">Tasks</div><div class="pm-drc-val" style="color:var(--text0)"><span style="color:var(--compass-green)">${doneTasks}</span>/${totalTasks}</div><div class="pm-drc-sub">complete</div></div>
          <div class="pm-drc"><div class="pm-drc-lbl">Overdue</div><div class="pm-drc-val" style="color:${overdueTasks.length>0?'var(--compass-red)':'var(--text3)'}">${overdueTasks.length}</div><div class="pm-drc-sub">tasks</div></div>
          <div class="pm-drc"><div class="pm-drc-lbl">Workflows</div><div class="pm-drc-val" style="color:var(--compass-cyan)">${projInsts.length}</div><div class="pm-drc-sub">in progress</div></div>
          <div class="pm-drc"><div class="pm-drc-lbl">Red flags</div><div class="pm-drc-val" style="color:${projFlags.length>0?'var(--compass-red)':'var(--text3)'}">${projFlags.length}</div><div class="pm-drc-sub">unacknowledged</div></div>
          <div class="pm-drc"><div class="pm-drc-lbl">Hours today</div><div class="pm-drc-val" style="color:var(--compass-cyan)">${todayHrs.toFixed(1)}h</div><div class="pm-drc-sub">across team</div></div>
          <div class="pm-drc"><div class="pm-drc-lbl">Requests</div><div class="pm-drc-val" style="color:${projReqs.length>0?'var(--compass-amber)':'var(--text3)'}">${projReqs.length}</div><div class="pm-drc-sub">pending</div></div>
        </div>
        <div class="pm-drtabs">
          <div class="pm-drtab on">Overview</div>
          <div class="pm-drtab">People</div>
          <div class="pm-drtab">Timesheet</div>
          <div class="pm-drtab">Morning briefs</div>
          <div class="pm-drtab">Decision log</div>
        </div>
        <div class="pm-drbody">
          <div class="pm-drcol">
            <div class="pm-dcsec" style="color:${projFlags.length>0?'#E24B4A':'#5A84A8'}">
              RED FLAGS — PINNED
              ${projFlags.length>0?`<span style="background:rgba(226,75,74,.2);color:#E24B4A;padding:1px 6px;font-size:10px;font-weight:700;margin-left:4px">${projFlags.length} unacknowledged</span>`:''}
            </div>
            ${flagsHtml}
            <div class="pm-dcsec" style="color:#EF9F27;margin-top:4px">AI NARRATIVE · TODAY</div>
            ${aiBriefHtml}
          </div>
          <div class="pm-drcol">
            <div class="pm-dcsec">LIVE FEED <span class="pm-live-dot" style="margin-left:4px"></span></div>
            ${projFeedEvents.length>0
              ? projFeedEvents.map(e=>{
                  const isRej=e.event_type==='step_reset',isDone=e.event_type==='step_completed';
                  const c=isRej?'var(--compass-red)':isDone?'var(--compass-green)':'var(--compass-amber)';
                  return `<div class="pm-feed-row">
                    <span style="color:${c};font-size:12px;flex-shrink:0">${isRej?'↩':isDone?'✓':'●'}</span>
                    <div style="flex:1;min-width:0">
                      <div style="font-family:var(--font-body);font-size:11px;color:var(--text1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(e.step_name||'—')}${e.actor_name?' — '+esc(e.actor_name):''}</div>
                      ${e.event_notes&&isRej?`<div style="font-family:var(--font-head);font-size:11px;color:var(--compass-red);font-style:italic">"${esc(e.event_notes.slice(0,50))}"</div>`:''}
                    </div>
                    <div style="font-family:var(--font-data);font-size:11px;color:#5A84A8;flex-shrink:0">${_timeAgo(e.created_at)}</div>
                  </div>`;
                }).join('')
              : `<div style="padding:10px 11px;font-family:var(--font-head);font-size:12px;color:var(--text3)">No activity for this project</div>`}
            <div class="pm-dcsec" style="margin-top:4px">BRIEF ARCHIVE</div>
            ${archiveHtml}
          </div>
        </div>`;
      document.body.appendChild(drawer);
      // Close on outside click
      setTimeout(()=>{
        document.addEventListener('mousedown', function closeDr(ev){
          if(!drawer.contains(ev.target)&&!ev.target.closest('.pm-pcard')){
            drawer.remove();
            document.querySelectorAll('.pm-pcard').forEach(c=>c.classList.remove('open'));
            document.removeEventListener('mousedown',closeDr);
          }
        });
      },50);
    };

  } catch(e) {
    console.error('[Compass] loadPMView error:', e);
    content.innerHTML = '<div style="padding:20px;font-family:var(--font-head);font-size:11px;color:var(--compass-red)">Failed to load PM view — check console</div>';
  }
}




// ══════════════════════════════════════════════════════════
// VIEW: EXECUTIVE
// ══════════════════════════════════════════════════════════
async function loadExecutiveView() {
  const content = document.getElementById('exec-content');

  try {
    const [wfInstances, cocEvents, resourceReqs] = await Promise.all([
      API.get('workflow_instances?select=id,title,status,project_id&status=eq.active&limit=100').catch(() => []),
      API.get('workflow_step_instances?select=id,instance_id,event_type,outcome,created_at&event_type=in.(step_completed,step_reset)&order=created_at.desc&limit=500').catch(() => []),
      API.get('resource_requests?select=id,status,created_at&status=eq.pending').catch(() => []),
    ]);

    const activeProjects = _projects.filter(p => p.status === 'active');
    const today = new Date().toLocaleDateString('en-CA');

    // Rework cost estimation (placeholder rate ¥8,000/hr, avg 2h per rework cycle)
    const HOURLY_RATE = 8000;
    const HRS_PER_REWORK = 2;
    const reworkCount = cocEvents.filter(e => e.event_type === 'step_reset').length;
    const reworkCost  = reworkCount * HRS_PER_REWORK * HOURLY_RATE;

    // On-time milestone check
    const projsWithTarget = activeProjects.filter(p => p.target_date);
    const atRiskProjs = projsWithTarget.filter(p => {
      const today60 = new Date(); today60.setDate(today60.getDate() + 60);
      return new Date(p.target_date + 'T00:00:00') < today60;
    });

    const formatYen = (n) => n >= 1000000
      ? '¥' + (n / 1000000).toFixed(1) + 'M'
      : '¥' + Math.round(n / 1000) + 'k';

    content.innerHTML = `
      <div class="stat-strip stat-strip-6" style="margin-bottom:16px">
        <div class="stat-card" style="border-top:2px solid var(--compass-cyan)">
          <div class="stat-label">Active projects</div>
          <div class="stat-value sv-cyan">${activeProjects.length}</div>
          <div class="stat-sub">in execution</div>
        </div>
        <div class="stat-card" style="border-top:2px solid var(--compass-amber)">
          <div class="stat-label">Active workflows</div>
          <div class="stat-value sv-amber">${wfInstances.length}</div>
          <div class="stat-sub">running instances</div>
        </div>
        <div class="stat-card" style="border-top:2px solid ${reworkCount > 10 ? 'var(--compass-red)' : 'var(--compass-amber)'}">
          <div class="stat-label">Rework cycles</div>
          <div class="stat-value ${reworkCount > 10 ? 'sv-red' : 'sv-amber'}">${reworkCount}</div>
          <div class="stat-sub">step resets recorded</div>
        </div>
        <div class="stat-card" style="border-top:2px solid ${reworkCost > 500000 ? 'var(--compass-red)' : 'var(--compass-amber)'}">
          <div class="stat-label">Est. rework cost</div>
          <div class="stat-value ${reworkCost > 500000 ? 'sv-red' : 'sv-amber'}">${formatYen(reworkCost)}</div>
          <div class="stat-sub">@¥8k/hr · 2h avg</div>
        </div>
        <div class="stat-card" style="border-top:2px solid ${atRiskProjs.length > 0 ? 'var(--compass-amber)' : 'var(--compass-green)'}">
          <div class="stat-label">Projects near target</div>
          <div class="stat-value ${atRiskProjs.length > 0 ? 'sv-amber' : 'sv-green'}">${atRiskProjs.length}</div>
          <div class="stat-sub">within 60 days</div>
        </div>
        <div class="stat-card" style="border-top:2px solid ${resourceReqs.length > 0 ? 'var(--compass-red)' : 'var(--compass-green)'}">
          <div class="stat-label">Decisions pending</div>
          <div class="stat-value ${resourceReqs.length > 0 ? 'sv-red' : 'sv-green'}">${resourceReqs.length}</div>
          <div class="stat-sub">resource requests</div>
        </div>
      </div>

      <div class="two-col">
        <div>
          <!-- Morning brief placeholder -->
          <div class="cmp-panel" style="margin-bottom:14px">
            <div class="panel-hdr">
              <div class="panel-title">Executive brief — ${new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})}</div>
              <span class="panel-badge pb-cyan">AI · Generated</span>
            </div>
            <div style="border-left:3px solid var(--compass-amber);margin:10px 13px;padding:9px 11px;background:rgba(239,159,39,.05)">
              <div style="font-family:var(--font-mono);font-size:11px;letter-spacing:.12em;color:var(--compass-amber);margin-bottom:6px;text-transform:uppercase">Situation</div>
              <div style="font-family:var(--font-ui);font-size:11px;color:var(--text2);line-height:1.55;margin-bottom:5px">
                ${activeProjects.length} project${activeProjects.length !== 1 ? 's' : ''} active · ${wfInstances.length} workflow instance${wfInstances.length !== 1 ? 's' : ''} running · ${reworkCount} rework cycles recorded.
              </div>
              <div style="font-family:var(--font-mono);font-size:11px;letter-spacing:.12em;color:var(--compass-amber);margin-bottom:5px;text-transform:uppercase">Financial signal</div>
              <div style="font-family:var(--font-ui);font-size:11px;color:var(--text2);line-height:1.55;margin-bottom:5px">
                Estimated rework cost: <span style="color:${reworkCost > 500000 ? 'var(--compass-red)' : 'var(--text0)'};font-weight:600">${formatYen(reworkCost)}</span> at current volume. ${reworkCount > 10 ? 'Above healthy threshold — workflow template review recommended.' : 'Within acceptable range.'}
              </div>
              <div style="font-family:var(--font-mono);font-size:11px;letter-spacing:.12em;color:var(--compass-amber);margin-bottom:5px;text-transform:uppercase">Recommended attention</div>
              <div style="font-family:var(--font-ui);font-size:11px;color:var(--text2);line-height:1.55">
                ${resourceReqs.length > 0 ? `${resourceReqs.length} resource request${resourceReqs.length > 1 ? 's' : ''} pending your approval. ` : ''}${atRiskProjs.length > 0 ? `${atRiskProjs.length} project${atRiskProjs.length > 1 ? 's' : ''} approaching target date within 60 days.` : 'No immediate executive action required.'}
              </div>
            </div>
          </div>

          <!-- Project financial overview -->
          <div class="cmp-panel">
            <div class="panel-hdr">
              <div class="panel-title">Portfolio — all active projects</div>
            </div>
            ${activeProjects.map(p => {
              const insts  = wfInstances.filter(w => w.project_id === p.id);
              const near   = p.target_date && new Date(p.target_date + 'T00:00:00') < new Date(Date.now() + 60 * 86400000);
              return `
              <div class="cmp-row" onclick="window.location.href='/project-detail.html?id=${p.id}'">
                <div style="flex:1;min-width:0">
                  <div class="row-title">${esc(p.name)}</div>
                  <div class="row-sub">${esc(p.client_name || p.client_id || '')} · Target: ${fmtDate(p.target_date)}${near ? ' · <span style="color:var(--compass-amber)">Near target</span>' : ''}</div>
                </div>
                ${insts.length > 0 ? `<span class="status-badge sb-warn">${insts.length} workflow${insts.length > 1 ? 's' : ''}</span>` : ''}
                <span class="status-badge ${near ? 'sb-warn' : 'sb-future'}">
                  ${p.status === 'active' ? 'Active' : esc(p.status)}
                </span>
              </div>`;
            }).join('') || '<div style="padding:14px 13px;font-family:var(--font-mono);font-size:11px;color:var(--text3)">No active projects</div>'}
          </div>
        </div>

        <div>
          <!-- Key metrics -->
          <div class="cmp-panel" style="margin-bottom:14px">
            <div class="panel-hdr"><div class="panel-title">Rework cost by project</div></div>
            ${(() => {
              const byProj = {};
              cocEvents.filter(e => e.event_type === 'step_reset').forEach(e => {
                const inst = wfInstances.find(w => w.id === e.instance_id);
                if (!inst?.project_id) return;
                byProj[inst.project_id] = (byProj[inst.project_id] || 0) + 1;
              });
              const entries = Object.entries(byProj).sort(([,a],[,b]) => b - a);
              if (entries.length === 0) return '<div style="padding:12px 13px;font-family:var(--font-mono);font-size:11px;color:var(--text3)">No rework recorded</div>';
              const maxV = Math.max(...entries.map(([,v]) => v));
              return entries.map(([pid, count]) => {
                const proj = _projects.find(p => p.id === pid);
                const cost = count * HRS_PER_REWORK * HOURLY_RATE;
                return `
                <div class="budget-row">
                  <div class="budget-header">
                    <span>${esc(proj?.name || 'Unknown')}</span>
                    <span class="budget-value" style="color:${count > 3 ? 'var(--compass-red)' : 'var(--compass-amber)'}">
                      ${formatYen(cost)} · ${count} cycle${count !== 1 ? 's' : ''}
                    </span>
                  </div>
                  <div class="budget-track">
                    <div class="budget-fill" style="width:${Math.round((count/maxV)*100)}%;background:${count > 3 ? 'var(--compass-red)' : 'var(--compass-amber)'}"></div>
                  </div>
                </div>`;
              }).join('');
            })()}
          </div>

          <!-- Quick nav -->
          <div class="cmp-panel">
            <div class="panel-hdr"><div class="panel-title">Executive access</div></div>
            <div class="cmp-row" onclick="window.location.href='/dashboard.html'">
              <div style="flex:1"><div class="row-title">Dashboard →</div><div class="row-sub">Firm-wide KPI overview</div></div>
            </div>
            <div class="cmp-row" onclick="window.location.href='/projects.html'">
              <div style="flex:1"><div class="row-title">Projects →</div><div class="row-sub">Portfolio with EVM metrics</div></div>
            </div>
            <div class="cmp-row" onclick="window.location.href='/cpm-pert.html'">
              <div style="flex:1"><div class="row-title">CPM / PERT →</div><div class="row-sub">Schedule confidence and critical path</div></div>
            </div>
            <div class="cmp-row" onclick="window.location.href='/pipeline.html'">
              <div style="flex:1"><div class="row-title">Pipeline →</div><div class="row-sub">Business development and prospects</div></div>
            </div>
          </div>
        </div>
      </div>`;

  } catch (e) {
    console.error('[Compass] loadExecutiveView error:', e);
    content.innerHTML = '<div style="padding:20px;font-family:var(--font-mono);font-size:11px;color:var(--compass-red)">Failed to load executive view</div>';
  }
}


// ══════════════════════════════════════════════════════════
// VIEW: CLIENT PORTAL
// ══════════════════════════════════════════════════════════
async function loadClientView() {
  const content = document.getElementById('client-content');

  // Client portal uses the Flexscope project as demo
  // In production: project determined by client auth token / URL param
  const clientProjectId = new URLSearchParams(window.location.search).get('project') || null;
  const clientProject = clientProjectId
    ? _projects.find(p => p.id === clientProjectId)
    : _projects.find(p => p.status === 'active') || null;

  if (!clientProject) {
    content.innerHTML = `
      <div style="padding:40px 20px;text-align:center;font-family:var(--font-mono);font-size:11px;color:var(--text3)">
        No active project found for client portal demo.<br>
        <span style="color:var(--text2)">Add ?project=&lt;id&gt; to the URL to specify a project.</span>
      </div>`;
    return;
  }

  try {
    const [projTasks, wfInstances, actionItems] = await Promise.all([
      API.get(`tasks?select=id,name,status,due_date,pct_complete,milestone_date&project_id=eq.${clientProject.id}&order=due_date.asc`).catch(() => []),
      API.get(`workflow_instances?select=id,title,status,current_step_name,current_step_id&project_id=eq.${clientProject.id}&status=eq.active`).catch(() => []),

function closeCompletionPanel() {

// ── Skip — mark done without time, write CoC event ───────
async function skipCompletion() {
  const item = _cmpItem;
  if (!item) { closeCompletionPanel(); return; }
  closeCompletionPanel();

  const now = new Date();
  const timeStr = now.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true});
  const proj = item.projectId ? _projects?.find(p=>p.id===item.projectId) : null;

  _doneToday.unshift({ id:item.id, title:item.title, project:proj?.name||'—',
    time:timeStr, hours:0, signal:null, noTime:true });

  try {
    await API.post('workflow_step_instances',{event_type:'completion_skip',
      step_name:item.title,event_notes:'skip',created_at:now.toISOString(),
      firm_id:'aaaaaaaa-0001-0001-0001-000000000001'}).catch(()=>{});
    if (item.type==='task') await API.patch(`tasks?id=eq.${item.id}`,{status:'complete',pct_complete:100,updated_at:now.toISOString()}).catch(()=>{});
    else await API.patch(`workflow_action_items?id=eq.${item.id}`,{status:'resolved',resolved_at:now.toISOString()}).catch(()=>{});
  } catch(e) {}

  // Update Done Today list inline
  const dtList = document.getElementById('done-today-list');
  if (dtList) {
    dtList.querySelector('[style*="italic"]')?.remove();
    const r=document.createElement('div'); r.style.cssText='display:flex;align-items:center;gap:8px;padding:7px 13px;border-bottom:1px solid var(--border);animation:micro-open 200ms ease';
    r.innerHTML=`<span style="color:var(--compass-green);font-size:13px">✓</span>
      <div style="flex:1;min-width:0"><div style="font-family:var(--font-body);font-size:12px;font-weight:500;color:var(--text0);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(item.title)}</div>
      <div style="font-family:var(--font-head);font-size:11px;color:var(--text3)">${esc(proj?.name||'—')} · ${timeStr} · no time logged</div></div>
      <div style="width:8px;height:8px;border-radius:50%;background:var(--muted)"></div>
      <div style="font-family:var(--font-display);font-size:13px;font-weight:700;color:var(--text3)">—</div>`;
    dtList.insertBefore(r, dtList.firstChild);
  }
  const ctr=document.getElementById('done-today-count');
  if (ctr) { ctr.textContent=_doneToday.length; const card=ctr.closest('.stat-done-today'); if(card){card.classList.add('stat-done-pulse');setTimeout(()=>card.classList.remove('stat-done-pulse'),450);} }
  const wiRow=document.querySelector(`.wi-row[data-wi-id="${item.id}"]`);
  if (wiRow) { wiRow.style.transition='opacity 320ms ease'; wiRow.style.opacity='0.3'; setTimeout(()=>wiRow.remove(),340); }
  compassToast(`${esc(item.title.slice(0,40))} — skipped`);
  setTimeout(()=>{_viewLoaded['user']=false;loadUserView();},360);
}

// COMPLETION MICRO-PANEL
// Captures hours, signal (G/Y/R), and note on any work item

async function submitCompletion() {
  const item     = _cmpItem;
  if (!item) return;

  const hoursRaw = parseFloat(document.getElementById('cmp-hours')?.value || 0);
  const note     = (document.getElementById('cmp-note')?.value || '').trim();
  const billable = document.getElementById('cmp-billable')?.checked ?? true;
  const statusEl = document.getElementById('cmp-status');
  const submitBtn = document.getElementById('cmp-submit');

  // Validate: hours require a note
  if (hoursRaw > 0 && note.length < 10) {
    if (statusEl) statusEl.textContent = 'Add a note to log hours (10+ chars)';
    document.getElementById('cmp-note')?.focus();
    return;
  }

  if (submitBtn) { submitBtn.disabled = true; submitBtn.textContent = 'Saving…'; }
  if (statusEl)  statusEl.textContent = '';

  const today = new Date().toLocaleDateString('en-CA');
  const promises = [];

  // ── 1. Write time_entries row if hours logged ──────────────
  if (hoursRaw > 0) {
    promises.push(
      API.post('time_entries', {
        firm_id:     'aaaaaaaa-0001-0001-0001-000000000001',
        resource_id: _myResource?.id  || null,
        user_id:     _myResource?.user_id || null,
        project_id:  item.projectId   || null,
        task_id:     item.type === 'task'   ? item.id : null,
        source_type: 'direct',
        date:        today,
        hours:       hoursRaw,
        is_billable: billable,
        notes:       note || null,
      }).catch(() => {})
    );
  }

  // ── 2. Patch the work item status ──────────────────────────
  if (item.type === 'task') {
    promises.push(
      API.patch(`tasks?id=eq.${item.id}`, {
        status:       'complete',
        pct_complete: 100,
        updated_at:   new Date().toISOString(),
      }).catch(() => {})
    );
  } else if (item.type === 'action') {
    promises.push(
      API.patch(`workflow_action_items?id=eq.${item.id}`, {
        status:      'resolved',
        resolved_at: new Date().toISOString(),
        resolution_note: note || null,
      }).catch(() => {})
    );
  }

  try {
    await Promise.all(promises);
    closeCompletionPanel();

    // ── Persist to Done Today ──────────────────────────────
    const now = new Date();
    const timeStr = now.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true});
    const proj = item.projectId ? _projects?.find(p=>p.id===item.projectId) : null;
    _doneToday.unshift({ id:item.id, title:item.title, project:proj?.name||'—',
      time:timeStr, hours:hoursRaw, signal:_cmpSignal, noTime:hoursRaw===0 });

    // ── Inline Done Today update ───────────────────────────
    const dtList = document.getElementById('done-today-list');
    if (dtList) {
      dtList.querySelector('[style*="italic"]')?.remove();
      const sc=_cmpSignal==='green'?'var(--compass-green)':_cmpSignal==='red'?'var(--compass-red)':'var(--compass-amber)';
      const r=document.createElement('div'); r.style.cssText='display:flex;align-items:center;gap:8px;padding:7px 13px;border-bottom:1px solid var(--border);animation:micro-open 200ms ease';
      r.innerHTML=`<span style="color:var(--compass-green);font-size:13px">✓</span>
        <div style="flex:1;min-width:0"><div style="font-family:var(--font-body);font-size:12px;font-weight:500;color:var(--text0);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(item.title)}</div>
        <div style="font-family:var(--font-head);font-size:11px;color:var(--text3)">${esc(proj?.name||'—')} · ${timeStr}${hoursRaw===0?' · no time logged':''}</div></div>
        ${_cmpSignal?`<div style="width:8px;height:8px;border-radius:50%;background:${sc};flex-shrink:0"></div>`:'<div style="width:8px;height:8px"></div>'}
        <div style="font-family:var(--font-display);font-size:13px;font-weight:700;color:${hoursRaw===0?'var(--text3)':'var(--compass-cyan)'}">${hoursRaw===0?'—':hoursRaw.toFixed(1)+'h'}</div>`;
      dtList.insertBefore(r, dtList.firstChild);
    }
    // ── Pulse Done Today counter ───────────────────────────
    const ctr=document.getElementById('done-today-count');
    if (ctr) { ctr.textContent=_doneToday.length; const card=ctr.closest('.stat-done-today'); if(card){card.classList.add('stat-done-pulse');setTimeout(()=>card.classList.remove('stat-done-pulse'),450);} }
    // ── Fade out completed row ─────────────────────────────
    const wiRow=document.querySelector(`.wi-row[data-wi-id="${item.id}"]`);
    if (wiRow) { wiRow.style.transition='opacity 320ms ease'; wiRow.style.opacity='0.3'; setTimeout(()=>wiRow.remove(),340); }

    compassToast(`${esc(item.title.slice(0,40))} — marked complete`);
    setTimeout(()=>{_viewLoaded['user']=false;loadUserView();},360);
  } catch(e) {
    if (submitBtn) { submitBtn.disabled = false; submitBtn.textContent = 'Mark complete →'; }
    if (statusEl)  statusEl.textContent = 'Failed — try again';
  }
}

document.addEventListener('change', function(ev) {
  const projSel = ev.target.closest('.wf-proj-sel');
  if (projSel) { _wfProject = projSel.value; _viewLoaded['user'] = false; loadUserView(); }

document.addEventListener('click', function(ev) {
  // ── Type filter ───────────────────────────────────────────
  const typeBtn = ev.target.closest('.wf-type-btn');
  if (typeBtn) { _wfType = typeBtn.dataset.type; _viewLoaded['user']=false; loadUserView(); return; }
  // ── Status filter ─────────────────────────────────────────
  const statusBtn = ev.target.closest('.wf-status-btn');
  if (statusBtn) { _wfStatus = statusBtn.dataset.status; _viewLoaded['user']=false; loadUserView(); return; }
  // ── Date range filter ─────────────────────────────────────
  const dateBtn = ev.target.closest('.wf-date-btn');
  if (dateBtn) { _wfDateRange = dateBtn.dataset.range; _viewLoaded['user']=false; loadUserView(); return; }
  // ── Week stepper ──────────────────────────────────────────
  if (ev.target.closest('#week-step-back')) {
    _weekOffset += 1;
    _activeGauge = null; _teFilter = null;
    _viewLoaded['user'] = false; loadUserView(); return;
  }
  if (ev.target.closest('#week-step-fwd') && _weekOffset > 0) {
    _weekOffset -= 1;
    _activeGauge = null; _teFilter = null;
    _viewLoaded['user'] = false; loadUserView(); return;
  }
  // ── Gauge click → toggle active / filter time log ─────────
  const gaugeCol = ev.target.closest('.gauge-col');
  if (gaugeCol) {
    const d = gaugeCol.dataset.gaugeDate;
    _activeGauge = (_activeGauge === d) ? null : d;
    _teFilter = _activeGauge;
    _viewLoaded['user']=false; loadUserView(); return;
  }
  // ── Gauge clear filter ────────────────────────────────────
  if (ev.target.closest('.gauge-clear-btn')) {
    _activeGauge=null; _teFilter=null; _viewLoaded['user']=false; loadUserView(); return;
  }
  // ── Day dot → open weekly drawer scrolled to that day ─────
  const dayDot = ev.target.closest('.day-dot');
  if (dayDot) { openFullWeeklyTimesheet({ expandDay: dayDot.dataset.day }); return; }
  // ── Open weekly timesheet buttons ─────────────────────────
  if (ev.target.closest('.open-weekly-ts-btn')) {
    const btn = ev.target.closest('.open-weekly-ts-btn');
    openFullWeeklyTimesheet({ expandDay: btn.dataset.expandToday ? new Date().toLocaleDateString('en-CA') : null });
    return;
  }
  // ── Week view footer / legacy ─────────────────────────────
  if (ev.target.closest('.te-week-footer')) {
    const anyEntry = _teEntries[0];
    if (anyEntry) openWeeklyTimesheet(anyEntry);
    else compassToast('No entries this week', 2000);
    return;
  }
  // ── Clear time log filter ─────────────────────────────────
  if (ev.target.closest('.te-clear-filter')) { filterTimeLog(null); return; }
  // ── Legacy bar chart column ───────────────────────────────
  const barCol = ev.target.closest('.te-bar-col');
  if (barCol && barCol.dataset.hasHours === 'true') { filterTimeLog(barCol.dataset.date); return; }
  // ── Work item action button ───────────────────────────────
  const actionBtn = ev.target.closest('.wi-action-btn');
  if (actionBtn) {
    ev.stopPropagation();
    const item = _wiItems.find(w => w.id === actionBtn.dataset.wiId);
    if (!item) return;
    const status = actionBtn.dataset.wiStatus;
    if (item.type==='action' || parseInt(actionBtn.dataset.wiPct)>=100) {
      openCompletionPanel({ id:item.id, type:item.type, title:item.title, projectId:item.projectId||null });
    } else {
      openInProgressPanel(item);
    }
    return;
  }
  // ── Completion circle ─────────────────────────────────────
  const wiCircle = ev.target.closest('.wi-complete-circle');
  if (wiCircle) {
    ev.stopPropagation();
    const item = _wiItems.find(w => w.id === wiCircle.dataset.wiId);
    if (item) openCompletionPanel({ id:item.id, type:item.type, title:item.title, projectId:item.projectId||null });
    return;
  }
  // ── Legacy wi-complete ────────────────────────────────────
  const wiComplete = ev.target.closest('.wi-complete');
  if (wiComplete) {
    ev.stopPropagation();
    openCompletionPanel({ id:wiComplete.dataset.wiId, type:wiComplete.dataset.wiType,
      title:wiComplete.dataset.wiTitle, projectId:wiComplete.dataset.wiProjectid||null });
    return;
  }
  // ── Work item row → detail drawer ─────────────────────────
  const wiRow = ev.target.closest('.wi-row');
  if (wiRow && !ev.target.closest('.wi-action-btn') && !ev.target.closest('.wi-complete-circle')) {
    document.querySelectorAll('.wi-row').forEach(r => r.classList.remove('wi-selected'));
    wiRow.classList.add('wi-selected');
    const item = _wiItems.find(w => w.id === wiRow.dataset.wiId);
    if (item) openWorkItemDrawer(item);
    return;
  }
  // ── New time entry ────────────────────────────────────────
  if (ev.target.closest('.te-new-btn')) { openNewTimeEntry(); return; }
  // ── Time log row ──────────────────────────────────────────
  const teRow = ev.target.closest('.te-row');
  if (teRow) {
    const teId=teRow.dataset.teId, isCad=teRow.dataset.teCadence==='true';
    _teSelected = teId;
    document.querySelectorAll('.te-row').forEach(r => {
      const isThis = r.dataset.teId === teId;
      r.style.borderLeft = isThis ? '2px solid var(--compass-cyan)' : '2px solid transparent';
      r.style.background = isThis ? 'rgba(0,210,255,.04)' : '';
      r.onmouseleave = () => { r.style.background = isThis ? 'rgba(0,210,255,.04)' : ''; };
    });
    if (isCad) { window.location.href = '/cadence.html'; return; }
    const entry = _teEntries.find(e => e.id === teId);
    if (entry) {
      const proj = _projects.find(p => p.id === entry.project_id);
      openTimeEntryEdit({ id:entry.id, hours:entry.hours, notes:entry.notes||'',
        is_billable:entry.is_billable, date:entry.date, week_start_date:entry.week_start_date,
        project_id:entry.project_id, project_name:proj?.name||'—',
        step_name:entry.step_name||null, source_type:entry.source_type });
    }
    return;
  }
  // ── Timesheet submit ──────────────────────────────────────
  const tsSubmit = ev.target.closest('.ts-submit-btn');
  if (tsSubmit) {
    submitTimesheetWeek(tsSubmit.dataset.weekId, tsSubmit.dataset.weekStart, tsSubmit.dataset.weekHours);
    return;
  }
});

            padding:7px 16px;background:var(--compass-amber);color:#060a10;border:none;cursor:pointer"

async function saveInProgressUpdate(itemId, projectId) {
  const pct=parseInt(document.getElementById('ip-pct')?.value)||0;
  const hours=parseFloat(document.getElementById('ip-hours')?.value||0);
  const status=document.getElementById('ip-status')?.value||'in_progress';
  const btn=document.getElementById('ip-save-btn');
  if (btn) { btn.textContent='…'; btn.disabled=true; }
  const today=new Date().toLocaleDateString('en-CA');
  try {
    const ps=[API.patch(`tasks?id=eq.${itemId}`,{pct_complete:pct,status,updated_at:new Date().toISOString()}).catch(()=>{})];
    if (hours>0&&_myResource?.id) {
      const id=crypto.randomUUID();
      ps.push(API.post('time_entries',{id,firm_id:'aaaaaaaa-0001-0001-0001-000000000001',
        resource_id:_myResource.id,user_id:_myResource.user_id||null,
        project_id:projectId||null,task_id:itemId,source_type:'direct',
        date:today,hours,is_billable:true}).catch(()=>{}));
    }
    await Promise.all(ps);
    document.getElementById('inprogress-panel')?.remove();
    compassToast('Progress updated');
    _viewLoaded['user']=false; loadUserView();
  } catch(e) {
    if (btn) { btn.textContent='Save →'; btn.disabled=false; }
    compassToast('Failed — '+e.message,2500);
  }
}

// COMPONENT 1.F — Full Weekly Timesheet Drawer (640px)
// ══════════════════════════════════════════════════════════
function openFullWeeklyTimesheet({ expandDay=null }={}) {
  document.getElementById('full-weekly-drawer')?.remove();
  const today=new Date().toLocaleDateString('en-CA');
  const todayDt=new Date(today+'T00:00:00');
  const isoOff=todayDt.getDay()===0?6:todayDt.getDay()-1;
  const wkStart=new Date(todayDt); wkStart.setDate(todayDt.getDate()-isoOff);
  const weekStartStr=wkStart.toLocaleDateString('en-CA');
  const weekDays=Array.from({length:5},(_,i)=>{const d=new Date(wkStart);d.setDate(wkStart.getDate()+i);return d.toLocaleDateString('en-CA');});
  const dayNames=['Mon','Tue','Wed','Thu','Fri'];
  const expandTarget=expandDay||today;

  const weekEntries=_teEntries.filter(e=>weekDays.includes(e.date));
  const weekTotal=weekEntries.reduce((s,e)=>s+parseFloat(e.hours||0),0);
  const weekBillable=weekEntries.filter(e=>e.is_billable).reduce((s,e)=>s+parseFloat(e.hours||0),0);
  const dayTotals={};
  weekDays.forEach(d=>{dayTotals[d]=weekEntries.filter(e=>e.date===d).reduce((s,e)=>s+parseFloat(e.hours||0),0);});

  // Project × Day grid
  const projIds=[...new Set(weekEntries.map(e=>e.project_id).filter(Boolean))];
  const gridProjects=projIds.map(pid=>_projects.find(p=>p.id===pid)).filter(Boolean);

  function cellHtml(hrs,d){
    const isPast=d<today,isToday=d===today,isFut=d>today;
    if(isFut) return `<span style="font-family:var(--font-head);font-size:11px;color:var(--text3)">—</span>`;
    if(hrs>0){ const c=isToday?'var(--compass-cyan)':'var(--compass-green)'; return `<span style="font-family:var(--font-head);font-size:12px;font-weight:700;color:${c}">${hrs.toFixed(1)}h ${isToday?'■':'✓'}</span>`; }
    if(isPast) return `<span style="font-family:var(--font-head);font-size:12px;font-weight:700;color:var(--compass-red)">0h !</span>`;
    return `<span style="font-family:var(--font-head);font-size:11px;color:var(--text3)">—</span>`;
  }

  const gridHtml=`<div style="overflow-x:auto;margin-bottom:0">
    <table style="width:100%;border-collapse:collapse;font-family:var(--font-head);font-size:12px">
      <thead><tr style="border-bottom:1px solid var(--border)">
        <th style="text-align:left;padding:6px 13px;font-weight:700;color:var(--text3);font-size:11px;letter-spacing:.07em">PROJECT</th>
        ${weekDays.map((d,i)=>`<th style="text-align:center;padding:6px 8px;font-weight:700;color:${d===today?'var(--compass-cyan)':d<today?'var(--text2)':'var(--text3)'};font-size:11px">${dayNames[i]}</th>`).join('')}
        <th style="text-align:right;padding:6px 13px 6px 0;font-weight:700;color:var(--text3);font-size:11px">TOTAL</th>
      </tr></thead>
      <tbody>
        ${gridProjects.map(proj=>{
          const rowE=weekEntries.filter(e=>e.project_id===proj.id);
          const rTotal=rowE.reduce((s,e)=>s+parseFloat(e.hours||0),0);
          return `<tr style="border-bottom:1px solid rgba(0,210,255,.06)">
            <td style="padding:7px 13px;color:var(--text1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:160px">${esc(proj.name)}</td>
            ${weekDays.map(d=>`<td style="text-align:center;padding:7px 8px">${cellHtml(rowE.filter(e=>e.date===d).reduce((s,e)=>s+parseFloat(e.hours||0),0),d)}</td>`).join('')}
            <td style="text-align:right;padding:7px 13px 7px 0;font-family:var(--font-display);font-size:13px;font-weight:700;color:var(--compass-cyan)">${rTotal.toFixed(1)}h</td>
          </tr>`;
        }).join('')}
        ${gridProjects.length===0?`<tr><td colspan="${weekDays.length+2}" style="padding:12px 13px;color:var(--text3);font-family:var(--font-head);font-size:12px">No time entries this week</td></tr>`:''}
      </tbody>
      <tfoot><tr style="border-top:1px solid var(--border)">
        <td style="padding:7px 13px;font-weight:700;color:var(--text2);font-size:11px;font-family:var(--font-head)">DAILY TOTAL</td>
        ${weekDays.map(d=>`<td style="text-align:center;padding:7px 8px">${cellHtml(dayTotals[d],d)}</td>`).join('')}
        <td style="text-align:right;padding:7px 13px 7px 0;font-family:var(--font-display);font-size:14px;font-weight:700;color:var(--compass-cyan)">${weekTotal.toFixed(1)}h</td>

    <div style="padding:4px 13px 6px;font-family:var(--font-head);font-size:11px;color:var(--text3)">✓ Complete · ■ Today · ! No entries</div>
  </div>`;

        ${isDirect?`<button data-te-del="${e.id}" style="background:none;border:none;color:rgba(226,75,74,.4);cursor:pointer;font-size:12px;padding:0;line-height:1" onmouseenter="this.style.color='var(--compass-red)'" onmouseleave="this.style.color='rgba(226,75,74,.4)'">✕</button>`:'<div></div>'}
      </div>`;
