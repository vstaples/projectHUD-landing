<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compass — Operational Intelligence</title>
<link rel="stylesheet" href="/css/hud.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Barlow+Condensed:wght@400;500;600;700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── Compass shell variables ─────────────────────────────── */
:root {
  --compass-cyan:   #00D2FF;
  --compass-amber:  #EF9F27;
  --compass-green:  #1D9E75;
  --compass-red:    #E24B4A;
  --compass-purple: #8B5CF6;

  /* ── Session 16: Four-font system ─── */
  --font-display: 'Rajdhani', sans-serif;
  --font-head:    'Barlow Condensed', sans-serif;
  --font-body:    'Inter', sans-serif;
  --font-data:    'JetBrains Mono', monospace;

  /* Override hud.css text hierarchy for Compass — brighter, higher contrast */
  --text0: #F0F6FF;   /* primary text — near white */
  --text1: #C8DFF0;   /* secondary text — light blue-white */
  --text2: #90B8D8;   /* tertiary text — medium blue (was #7a9bbf, bumped up) */
  --text3: #6A94B8;   /* metadata / labels — readable mid-blue (was #3a5a7a, major bump) */
  --muted: #5A84A8;   /* muted elements — still visible */
}

/* Compass minimum legible sizes — metadata/label text */
#compass-app .row-sub,
#compass-app .panel-badge,
#compass-app .stat-sub,
#compass-app .stat-label {
  font-size: 11px;
}

/* ── Layout ──────────────────────────────────────────────── */
#compass-app {
  display: flex;
  flex-direction: column;
  min-height: 100vh;
  background: var(--bg0, #060a10);
}

/* ── Top nav bar ─────────────────────────────────────────── */
#compass-nav {
  display: flex;
  align-items: center;
  gap: 0;
  height: 44px;
  background: var(--bg1, #0c1628);
  border-bottom: 1px solid var(--border, rgba(0,210,255,.12));
  padding: 0 16px;
  flex-shrink: 0;
  position: sticky;
  top: 0;
  z-index: 100;
}

.compass-logo-mark {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-right: 20px;
  text-decoration: none;
}

.compass-wordmark {
  font-family: var(--font-hud, 'Rajdhani', sans-serif);
  font-size: 17px;
  font-weight: 700;
  letter-spacing: .12em;
  color: var(--text0, #eef4ff);
}

.compass-wordmark span {
  color: var(--compass-cyan);
}

.nav-sep {
  width: 1px;
  height: 22px;
  background: var(--border);
  margin: 0 16px;
}

/* Role tab buttons */
.role-tab {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 0 14px;
  height: 44px;
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  color: var(--text2, #7a9bbf);
  font-family: var(--font-mono, 'Share Tech Mono', monospace);
  font-size: 10px;
  letter-spacing: .1em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all .12s;
  white-space: nowrap;
}

.role-tab:hover {
  color: var(--text0);
  background: rgba(255,255,255,.03);
}

.role-tab.active {
  color: var(--compass-cyan);
  border-bottom-color: var(--compass-cyan);
}

.role-tab .tab-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: currentColor;
  opacity: .5;
}

.role-tab.active .tab-dot {
  opacity: 1;
}

/* Badge on role tabs */
.tab-badge {
  background: var(--compass-red);
  color: #fff;
  font-size: 10px;
  font-family: var(--font-mono);
  padding: 1px 5px;
  border-radius: 8px;
  font-weight: 700;
  letter-spacing: 0;
}

/* Nav right side */
.nav-spacer { flex: 1; }

.nav-live {
  display: flex;
  align-items: center;
  gap: 5px;
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--compass-green);
  letter-spacing: .1em;
  margin-right: 12px;
}

.nav-live-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--compass-green);
  animation: pulse-live 2s infinite;
}

@keyframes pulse-live {
  0%, 100% { opacity: 1; }
  50%       { opacity: .35; }
}

.nav-user {
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text2);
}

.nav-avatar {
  width: 26px;
  height: 26px;
  border-radius: 50%;
  background: rgba(0,210,255,.15);
  border: 1px solid rgba(0,210,255,.3);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-hud);
  font-size: 11px;
  font-weight: 700;
  color: var(--compass-cyan);
}

/* ── View panels ─────────────────────────────────────────── */
.compass-view {
  display: none;
  flex: 1;
  overflow-y: auto;
}

.compass-view.active {
  display: block;
}

/* ── Common inner layout ─────────────────────────────────── */
.view-body {
  padding: 20px 22px;
  max-width: 1600px;
}

/* ── Stat strip ──────────────────────────────────────────── */
.stat-strip {
  display: grid;
  gap: 8px;
  margin-bottom: 16px;
}

.stat-strip-4 { grid-template-columns: repeat(4, 1fr); }
.stat-strip-6 { grid-template-columns: repeat(6, 1fr); }

.stat-card {
  background: var(--bg1);
  border: 1px solid var(--border);
  padding: 10px 13px;
  cursor: default;
}

.stat-label {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 4px;
}

.stat-value {
  font-family: var(--font-hud);
  font-size: 26px;
  font-weight: 700;
  color: var(--text0);
  line-height: 1;
}

.stat-sub {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text3);
  margin-top: 3px;
}

.sv-cyan   { color: var(--compass-cyan); }
.sv-amber  { color: var(--compass-amber); }
.sv-green  { color: var(--compass-green); }
.sv-red    { color: var(--compass-red); }
.sv-purple { color: var(--compass-purple); }

/* ── Panel card ──────────────────────────────────────────── */
.cmp-panel {
  background: var(--bg1);
  border: 1px solid var(--border);
  margin-bottom: 14px;
}

.cmp-panel:last-child { margin-bottom: 0; }

.panel-hdr {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 13px;
  border-bottom: 1px solid var(--border);
}

.panel-title {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--text3);
}

.panel-badge {
  font-family: var(--font-mono);
  font-size: 10px;
  padding: 2px 7px;
  font-weight: 700;
}

.pb-red    { background: rgba(226,75,74,.15);  color: var(--compass-red);    border: 1px solid rgba(226,75,74,.3); }
.pb-amber  { background: rgba(239,159,39,.12); color: var(--compass-amber);  border: 1px solid rgba(239,159,39,.3); }
.pb-green  { background: rgba(29,158,117,.12); color: var(--compass-green);  border: 1px solid rgba(29,158,117,.3); }
.pb-cyan   { background: rgba(0,210,255,.08);  color: var(--compass-cyan);   border: 1px solid rgba(0,210,255,.25); }

/* ── Two-column grid ─────────────────────────────────────── */
.two-col { display: grid; grid-template-columns: 1fr minmax(0, 320px); gap: 14px; }
.three-col { display: grid; grid-template-columns: 1fr 1fr minmax(0, 280px); gap: 14px; }

/* ── Row items ───────────────────────────────────────────── */
.cmp-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 13px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background .1s;
}

.cmp-row:last-child { border-bottom: none; }
.cmp-row:hover { background: var(--bg2); }
.wi-selected { background: rgba(0,210,255,.06) !important; border-left: 2px solid var(--compass-cyan,#00D2FF) !important; }

.row-title {
  font-family: var(--font-ui, 'Barlow Condensed', sans-serif);
  font-size: 13px;
  font-weight: 500;
  color: var(--text0);
  flex: 1;
  min-width: 0;
}

.row-sub {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text3);
  margin-top: 2px;
}

/* ── Action rows ─────────────────────────────────────────── */
.action-row {
  padding: 11px 13px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background .1s;
}

.action-row:last-child { border-bottom: none; }
.action-row:hover { background: var(--bg2); }

.action-row.urgent { border-left: 3px solid var(--compass-red); }
.action-row.warning { border-left: 3px solid var(--compass-amber); }

.ar-hdr {
  display: flex;
  align-items: flex-start;
  gap: 9px;
  margin-bottom: 4px;
}

.ar-icon {
  width: 26px;
  height: 26px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  font-size: 12px;
}

.ari-red    { background: rgba(226,75,74,.15);  color: var(--compass-red); }
.ari-amber  { background: rgba(239,159,39,.12); color: var(--compass-amber); }
.ari-cyan   { background: rgba(0,210,255,.1);   color: var(--compass-cyan); }
.ari-green  { background: rgba(29,158,117,.12); color: var(--compass-green); }

.ar-title {
  font-family: var(--font-ui);
  font-size: 12.5px;
  font-weight: 500;
  color: var(--text0);
  flex: 1;
  min-width: 0;
  line-height: 1.3;
}

.ar-due {
  font-family: var(--font-mono);
  font-size: 10px;
  flex-shrink: 0;
}

.ar-due.red   { color: var(--compass-red); }
.ar-due.amber { color: var(--compass-amber); }

.ar-body {
  font-family: var(--font-ui);
  font-size: 11px;
  color: var(--text2);
  line-height: 1.5;
  margin: 3px 0 6px 35px;
}

.ar-warn {
  font-family: var(--font-mono);
  font-size: 10px;
  padding: 5px 8px;
  background: rgba(239,159,39,.08);
  border: 1px solid rgba(239,159,39,.2);
  color: var(--compass-amber);
  margin: 3px 0 6px 35px;
  letter-spacing: .03em;
}

.ar-acts {
  display: flex;
  gap: 6px;
  margin-left: 35px;
  flex-wrap: wrap;
}

/* ── Buttons ─────────────────────────────────────────────── */
.cmp-btn {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: .08em;
  text-transform: uppercase;
  padding: 4px 12px;
  cursor: pointer;
  border: 1px solid;
  transition: opacity .12s;
  white-space: nowrap;
}

.cmp-btn:hover { opacity: .75; }

.btn-approve { border-color: rgba(29,158,117,.5);  background: rgba(29,158,117,.1);  color: var(--compass-green); }
.btn-reject  { border-color: rgba(226,75,74,.5);   background: none;                 color: var(--compass-red); }
.btn-respond { border-color: rgba(0,210,255,.4);   background: rgba(0,210,255,.08);  color: var(--compass-cyan); }
.btn-ghost   { border-color: var(--border);        background: none;                 color: var(--text2); }

/* ── Milestone dot ───────────────────────────────────────── */
.ms-dot {
  width: 11px;
  height: 11px;
  border-radius: 50%;
  flex-shrink: 0;
}

.ms-done   { background: var(--compass-green); }
.ms-active { background: var(--compass-amber); }
.ms-risk   { background: var(--compass-red); }
.ms-future { background: none; border: 1.5px solid var(--border); }

/* ── Status badges ───────────────────────────────────────── */
.status-badge {
  font-family: var(--font-mono);
  font-size: 10px;
  padding: 2px 7px;
  flex-shrink: 0;
}

.sb-done   { background: rgba(29,158,117,.12);  color: var(--compass-green); border: 1px solid rgba(29,158,117,.3); }
.sb-risk   { background: rgba(226,75,74,.12);   color: var(--compass-red);   border: 1px solid rgba(226,75,74,.3); }
.sb-warn   { background: rgba(239,159,39,.1);   color: var(--compass-amber); border: 1px solid rgba(239,159,39,.25); }
.sb-future { background: rgba(255,255,255,.04); color: var(--text3);         border: 1px solid var(--border); }
.sb-cyan   { background: rgba(0,210,255,.08);   color: var(--compass-cyan);  border: 1px solid rgba(0,210,255,.25); }

/* ── Progress bar ────────────────────────────────────────── */
.progress-track {
  height: 4px;
  background: var(--bg2);
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  transition: width .5s;
}

/* ── Budget bar ──────────────────────────────────────────── */
.budget-row {
  padding: 10px 13px;
  border-bottom: 1px solid var(--border);
}

.budget-row:last-child { border-bottom: none; }

.budget-header {
  display: flex;
  justify-content: space-between;
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text3);
  margin-bottom: 5px;
}

.budget-value {
  font-weight: 700;
  color: var(--text1);
}

.budget-track {
  height: 6px;
  background: var(--bg2);
  overflow: hidden;
}

.budget-fill {
  height: 100%;
  transition: width .6s;
}

/* ── Update / thread rows ────────────────────────────────── */
.update-row {
  padding: 10px 13px;
  border-bottom: 1px solid var(--border);
}

.update-row:last-child { border-bottom: none; }

.ur-hdr {
  display: flex;
  align-items: center;
  gap: 7px;
  margin-bottom: 4px;
}

.ur-av {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-hud);
  font-size: 10px;
  font-weight: 700;
  flex-shrink: 0;
}

.av-cyan   { background: rgba(0,210,255,.15);   border: 1px solid rgba(0,210,255,.3);   color: var(--compass-cyan); }
.av-amber  { background: rgba(239,159,39,.15);  border: 1px solid rgba(239,159,39,.3);  color: var(--compass-amber); }
.av-green  { background: rgba(29,158,117,.15);  border: 1px solid rgba(29,158,117,.3);  color: var(--compass-green); }

.ur-name {
  font-family: var(--font-ui);
  font-size: 11.5px;
  font-weight: 500;
  color: var(--text0);
  flex: 1;
}

.ur-time {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text3);
}

.ur-body {
  font-family: var(--font-ui);
  font-size: 11px;
  color: var(--text2);
  line-height: 1.5;
  margin-left: 29px;
}

.ur-flagged {
  border-left: 2px solid var(--compass-amber);
  padding-left: 8px;
  margin-left: 29px;
  color: var(--text1);
  font-family: var(--font-ui);
  font-size: 11px;
  line-height: 1.5;
}

/* ── Thread input ────────────────────────────────────────── */
.thread-in {
  padding: 9px 13px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 7px;
  align-items: center;
}

.thread-in input {
  flex: 1;
  font-family: var(--font-ui);
  font-size: 11px;
  padding: 6px 10px;
  background: var(--bg2);
  border: 1px solid var(--border);
  color: var(--text1);
  outline: none;
  transition: border-color .15s;
}

.thread-in input:focus { border-color: rgba(0,210,255,.4); }

/* ── Document rows ───────────────────────────────────────── */
.doc-row {
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 8px 13px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background .1s;
}

.doc-row:last-child { border-bottom: none; }
.doc-row:hover { background: var(--bg2); }

.doc-icon {
  width: 26px;
  height: 26px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  flex-shrink: 0;
}

.doc-info { flex: 1; min-width: 0; }

.doc-name {
  font-family: var(--font-ui);
  font-size: 12px;
  font-weight: 500;
  color: var(--text0);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.doc-meta {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text3);
  margin-top: 1px;
}

/* ── Scrubber ────────────────────────────────────────────── */
.scrubber-wrap {
  padding: 10px 13px;
  border-bottom: 1px solid var(--border);
}

.scrubber-labels {
  display: flex;
  justify-content: space-between;
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text3);
  margin-bottom: 6px;
}

.scrubber-date-active {
  color: var(--compass-cyan);
  font-weight: 700;
}

.scrubber-track {
  position: relative;
  height: 4px;
  background: var(--bg2);
  cursor: pointer;
  margin-bottom: 6px;
}

.scrubber-fill {
  height: 100%;
  background: var(--compass-cyan);
  transition: width .1s;
}

.scrubber-thumb {
  position: absolute;
  top: 50%;
  width: 12px;
  height: 12px;
  background: var(--bg1);
  border: 2px solid var(--compass-cyan);
  border-radius: 50%;
  transform: translate(-50%, -50%);
  cursor: grab;
  transition: left .1s;
}

.scrubber-dots {
  display: flex;
  justify-content: space-between;
  margin-top: 4px;
}

.sdot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  cursor: pointer;
  transition: transform .1s;
}

.sdot:hover { transform: scale(1.5); }

.scrubber-snapshot {
  padding: 8px 10px;
  background: var(--bg2);
  font-family: var(--font-ui);
  font-size: 11px;
  color: var(--text2);
  line-height: 1.5;
  min-height: 38px;
  margin-top: 6px;
  border-left: 2px solid var(--compass-cyan);
}

/* ── Rejection context card ──────────────────────────────── */
.rejection-context {
  display: flex;
  gap: 9px;
  padding: 9px 10px;
  background: rgba(226,75,74,.07);
  border: 1px solid rgba(226,75,74,.25);
  border-left: 3px solid var(--compass-red);
  margin-bottom: 8px;
}

.rejection-context-icon {
  font-size: 13px;
  color: var(--compass-red);
  flex-shrink: 0;
  margin-top: 1px;
}

.rejection-context-body { flex: 1; min-width: 0; }

.rejection-context-label {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--compass-red);
  margin-bottom: 3px;
}

.rejection-context-text {
  font-family: var(--font-ui);
  font-size: 11px;
  color: var(--text1);
  line-height: 1.45;
  font-style: italic;
}

.rejection-context-meta {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text3);
  margin-top: 3px;
}

/* ── Privacy note ────────────────────────────────────────── */
.privacy-note {
  display: flex;
  align-items: flex-start;
  gap: 7px;
  padding: 8px 13px;
  background: var(--bg2);
  border-top: 1px solid var(--border);
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: .04em;
  color: var(--text3);
  line-height: 1.5;
}

/* ── Toast ───────────────────────────────────────────────── */
#compass-toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--bg1);
  border: 1px solid var(--border);
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: .06em;
  color: var(--text0);
  padding: 9px 20px;
  opacity: 0;
  transition: opacity .2s, transform .2s;
  pointer-events: none;
  z-index: 9999;
  white-space: nowrap;
}

#compass-toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* ── Loading state ───────────────────────────────────────── */
#compass-loading {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 200px;
  gap: 12px;
  color: var(--text3);
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: .1em;
}

.loading-spinner {
  width: 24px;
  height: 24px;
  border: 2px solid var(--border);
  border-top-color: var(--compass-cyan);
  border-radius: 50%;
  animation: spin .8s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* ── Responsive ──────────────────────────────────────────── */
@media (max-width: 1100px) {
  .two-col, .three-col { grid-template-columns: 1fr; }
  .stat-strip-6 { grid-template-columns: repeat(3, 1fr); }
}

@media (max-width: 720px) {
  .stat-strip-4, .stat-strip-6 { grid-template-columns: repeat(2, 1fr); }
  .role-tab span.tab-label { display: none; }
}
</style>
</head>
<body>

<div id="compass-app">

<script>
'use strict';

// ── Constants ─────────────────────────────────────────────
const FIRM_ID = 'aaaaaaaa-0001-0001-0001-000000000001';

// ── State ─────────────────────────────────────────────────
let _projects   = [];
let _tasks      = [];
let _resources  = [];
let _users      = [];
let _myResource = null;
let _currentView = null;
let _viewLoaded  = {};
let _identityDebug = {};
let _teFilter    = null;   // date string 'YYYY-MM-DD' | null — filters time log by day
let _teEntries   = [];     // cached time entries for current user view session
let _wiItems     = [];     // cached work items for drawer access
let _teSelected  = null;   // id of currently selected time log row

// My Work filter state
let _wfStatus    = 'all';  // 'all' | 'not_started' | 'in_progress' | 'blocked'
let _wfProject   = '';     // project id | '' = all
let _wfDateRange = 'week'; // 'today' | 'week' | '30d' | 'all'
let _wfType      = 'all';  // 'all' | 'task' | 'workflow' | 'action'  [Session 16]
let _doneToday   = [];     // session-persistent completed items  [Session 16]
let _activeGauge = null;   // clicked gauge date key | null  [Session 16]
let _dwellTimer  = null;   // gauge dwell timer handle

// ── Init ──────────────────────────────────────────────────
document.getElementById('compass-date').textContent =
  new Date().toLocaleDateString('en-US', {
    weekday: 'short', month: 'short', day: 'numeric', year: 'numeric'
  }).toUpperCase();

document.addEventListener('DOMContentLoaded', async () => {
  await loadBaseData();
  // Default view: PM
  const saved = sessionStorage.getItem('compass-view') || 'pm';
  switchView(saved);
});

// ── Load shared base data ─────────────────────────────────
async function loadBaseData() {
  try {
    // ── Step 1: Resolve identity ──────────────────────────────
    let authEmail = null;
    let authSub   = null;
    let appUserId = null;
    let appUserResourceId = null;

    try {
      const token  = await Auth.getFreshToken().catch(() => Auth.getToken());
      const claims = JSON.parse(atob(token.split('.')[1]));
      authSub   = claims.sub;
      authEmail = claims.email || null;

      const uRows   = await API.get(`users?id=eq.${authSub}&select=id,resource_id,name,email`).catch(() => []);
      const appUser = uRows?.[0] || null;
      appUserId          = appUser?.id || null;
      appUserResourceId  = appUser?.resource_id || null;
      if (!authEmail && appUser?.email) authEmail = appUser.email;

      if (appUser?.resource_id) {
        const rRows = await API.get(
          `resources?id=eq.${appUser.resource_id}&select=id,first_name,last_name,email,is_active,is_external,user_id,firm_id,department`
        ).catch(() => []);
        const r = rRows?.[0] || null;
        if (r) {
          _myResource = { ...r,
            name: `${r.first_name||''} ${r.last_name||''}`.trim() || appUser.name || appUser.email || '—',
          };
        }
      }

      // Fallback — match by email if resource_id path didn't resolve
      if (!_myResource && authEmail) {
        const eRows = await API.get(
          `resources?email=eq.${encodeURIComponent(authEmail)}&select=id,first_name,last_name,email,is_active,is_external,user_id,firm_id,department&limit=1`
        ).catch(() => []);
        const r = eRows?.[0] || null;
        if (r) {
          _myResource = { ...r,
            name: `${r.first_name||''} ${r.last_name||''}`.trim() || authEmail || '—',
          };
        }
      }

      // Store debug info for error messages
      _identityDebug = {
        authEmail,
        authSub:    authSub?.slice(0,8) + '…',
        appUserId:  appUserId?.slice(0,8) + '…' || 'none',
        resourceId: appUserResourceId?.slice(0,8) + '…' || 'none',
        resolved:   !!_myResource,
        name:       _myResource?.name || null,
      };

      console.log('[Compass] Identity:', _myResource?.name || 'unresolved',
        '| email:', authEmail, '| sub:', authSub?.slice(0,8),
        '| resource_id:', appUserResourceId?.slice(0,8) || 'none');

    } catch(e) {
      console.warn('[Compass] Identity resolution failed:', e.message);
      _identityDebug = { error: e.message };
    }

    // ── Step 2: Load shared data ──────────────────────────────
    [_projects, _tasks, _resources, _users] = await Promise.all([
      API.getProjects().catch(() => []),
      API.getTasks().catch(() => []),
      API.get('resources?select=id,first_name,last_name,email,is_active,user_id,firm_id,department&is_active=eq.true&firm_id=eq.' + FIRM_ID).catch(() => []),
      API.getUsers().catch(() => []),
    ]);

    _resources = (_resources || []).map(r => ({
      ...r,
      name: `${r.first_name||''} ${r.last_name||''}`.trim() || r.email || '—',
    }));

    // Update nav avatar
    if (_myResource?.name) {
      const initials = _myResource.name.split(' ').map(n => n[0]).join('').slice(0, 2).toUpperCase();
      const avEl = document.getElementById('compass-user-av');
      if (avEl) avEl.textContent = initials;
    }
  } catch (e) {
    console.error('[Compass] loadBaseData failed:', e);
  }
}

// ── View switcher ─────────────────────────────────────────
function switchView(viewId) {
  // Hide all views
  document.querySelectorAll('.compass-view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.role-tab').forEach(t => t.classList.remove('active'));

  // Show target
  const viewEl = document.getElementById('view-' + viewId);
  const tabEl  = document.getElementById('tab-' + viewId);
  if (!viewEl) return;

  viewEl.classList.add('active');
  if (tabEl) tabEl.classList.add('active');

  _currentView = viewId;
  sessionStorage.setItem('compass-view', viewId);

  // Lazy-load view data on first activation
  if (!_viewLoaded[viewId]) {
    _viewLoaded[viewId] = true;
    switch (viewId) {
      case 'user':       loadUserView();       break;
      case 'pm':         loadPMView();         break;
      case 'management': loadManagementView(); break;
      case 'executive':  loadExecutiveView();  break;
      case 'client':     loadClientView();     break;
    }
  }
}

// ── Toast ─────────────────────────────────────────────────
function compassToast(msg, duration = 2200) {
  const el = document.getElementById('compass-toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), duration);
}

// ── Escape HTML ───────────────────────────────────────────
function esc(s) {
  return String(s ?? '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Date formatting ───────────────────────────────────────
function fmtDate(iso) {
  if (!iso) return '—';
  return new Date(iso + 'T00:00:00').toLocaleDateString('en-US', {
    month: 'short', day: 'numeric'
  });
}

function fmtDateTime(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleDateString('en-US', {
    month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit'
  });
}

function daysOverdue(dateStr) {
  if (!dateStr) return 0;
  const diff = Date.now() - new Date(dateStr + 'T00:00:00').getTime();
  return Math.max(0, Math.floor(diff / 86400000));
}

function _timeAgo(iso) {
  if (!iso) return '—';
  const diff = Date.now() - new Date(iso).getTime();
  const mins  = Math.floor(diff / 60000);
  const hours = Math.floor(diff / 3600000);
  const days  = Math.floor(diff / 86400000);
  if (mins  <  1) return 'just now';
  if (mins  < 60) return `${mins}m ago`;
  if (hours < 24) return `${hours}h ago`;
  if (days  <  7) return `${days}d ago`;
  return fmtDate(iso);
}

// ── Avatar HTML ───────────────────────────────────────────
function avatarHtml(name, size = 24, cls = 'av-cyan') {
  const initials = (name || '?').split(' ').map(n => n[0]).join('').slice(0, 2).toUpperCase();
  return `<div class="ur-av ${cls}" style="width:${size}px;height:${size}px;font-size:${Math.floor(size*0.4)}px">${initials}</div>`;
}


// ══════════════════════════════════════════════════════════
// VIEW: MY WORK (Individual Contributor) — Feature #1
// Spec: Compass_MyWork_Spec_v1.pdf · Session 16
// ══════════════════════════════════════════════════════════
async function loadUserView() {
  const loading = document.getElementById('compass-loading');
  const content = document.getElementById('user-content');

  // Guard: identity must be resolved before querying per-resource data
  if (!_myResource?.id) {
    if (loading) loading.style.display = 'none';
    content.style.display = 'block';
    const d = _identityDebug;
    content.innerHTML = `
      <div style="padding:40px 20px;text-align:center">
        <div style="font-family:var(--font-head);font-size:11px;color:var(--compass-red);
          margin-bottom:12px;letter-spacing:.12em">⚠ IDENTITY NOT RESOLVED</div>
        <div style="display:inline-block;text-align:left;background:var(--bg1);
          border:1px solid var(--border);padding:14px 20px;margin-bottom:16px;
          font-family:var(--font-data);font-size:11px;line-height:2;min-width:320px">
          <div style="color:var(--text3);letter-spacing:.08em;margin-bottom:4px">SESSION DETAILS</div>
          <div><span style="color:var(--text3)">Auth email&nbsp;&nbsp;&nbsp;</span>
            <span style="color:${d.authEmail ? 'var(--compass-cyan)' : 'var(--compass-red)'}">
              ${d.authEmail || '— not found in JWT —'}</span></div>
          <div><span style="color:var(--text3)">Auth UUID&nbsp;&nbsp;&nbsp;&nbsp;</span>
            <span style="color:var(--text2)">${d.authSub || '—'}</span></div>
          <div><span style="color:var(--text3)">App user ID&nbsp;&nbsp;</span>
            <span style="color:${d.appUserId && d.appUserId !== 'undefin…' ? 'var(--text2)' : 'var(--compass-red)'}">
              ${d.appUserId && d.appUserId !== 'undefin…' ? d.appUserId : '— no users row found —'}</span></div>
          <div><span style="color:var(--text3)">Resource ID&nbsp;&nbsp;</span>
            <span style="color:${d.resourceId && d.resourceId !== 'undefin…' ? 'var(--text2)' : 'var(--compass-red)'}">
              ${d.resourceId && d.resourceId !== 'undefin…' ? d.resourceId : '— not linked —'}</span></div>
          ${d.error ? `<div style="color:var(--compass-red);margin-top:4px">Error: ${esc(d.error)}</div>` : ''}
        </div>
        <div style="font-family:var(--font-body);font-size:12px;color:var(--text3);
          margin-bottom:16px;line-height:1.6;max-width:480px;margin-left:auto;margin-right:auto">
          ${d.authEmail
            ? `Logged in as <strong style="color:var(--text1)">${esc(d.authEmail)}</strong> but no matching resource record was found.<br>
               Ensure your <code style="color:var(--compass-cyan)">users</code> row has
               <code style="color:var(--compass-cyan)">resource_id</code> set.`
            : `No email found in session token. Try logging out and back in.`}
        </div>
        <a href="/users.html" style="font-family:var(--font-head);font-size:11px;
          letter-spacing:.1em;color:var(--compass-cyan);text-decoration:none;
          border:1px solid rgba(0,210,255,.3);padding:6px 16px;margin-right:8px">USER MGMT →</a>
        <button onclick="_viewLoaded['user']=false;loadUserView()"
          style="font-family:var(--font-head);font-size:11px;letter-spacing:.1em;
            color:var(--text2);background:none;border:1px solid var(--border);
            padding:6px 16px;cursor:pointer">RETRY</button>
      </div>`;
    return;
  }

  try {
    const resId = _myResource.id;
    const today = new Date().toLocaleDateString('en-CA');
    const todayDate = new Date(today + 'T00:00:00');
    const dayOfWeek = todayDate.getDay();
    const isoOffset = dayOfWeek === 0 ? 6 : dayOfWeek - 1;
    const weekStart = new Date(todayDate); weekStart.setDate(todayDate.getDate() - isoOffset);
    const weekStartDate = weekStart.toLocaleDateString('en-CA');
    const weekDays = Array.from({ length: 7 }, (_, i) => {
      const d = new Date(weekStart); d.setDate(weekStart.getDate() + i);
      return d.toLocaleDateString('en-CA');
    });
    const weekLabels = ['M','T','W','T','F','S','S'];

    const [myTasks, myActionItems, wfInstances, myTimeEntries, myWeek] = await Promise.all([
      API.get(`tasks?select=id,name,project_id,status,due_date,pct_complete&assigned_to=eq.${_myResource.user_id}&status=neq.complete&order=created_at.desc&limit=200`).catch(() => []),
      API.get(`workflow_action_items?owner_resource_id=eq.${resId}&status=eq.open&limit=100`).catch(() => []),
      API.get(`workflow_instances?select=id,title,status,current_step_name,project_id,launched_at&status=eq.active&limit=50`).catch(() => []),
      API.get(`time_entries?resource_id=eq.${resId}&order=date.desc&limit=200&select=id,date,hours,is_billable,project_id,task_id,step_name,source_type,notes,week_start_date`).catch(() => []),
      API.get(`timesheet_weeks?resource_id=eq.${resId}&week_start_date=eq.${weekStartDate}&select=id,status,total_hours,billable_hours,submitted_at,approved_at,approver_name,rejection_reason&limit=1`).catch(() => []),
    ]);

    // ── Hours per day this week ───────────────────────────────────────
    const hoursByDay    = {}; const billableByDay = {};
    weekDays.forEach(d => { hoursByDay[d] = 0; billableByDay[d] = 0; });
    myTimeEntries.forEach(e => {
      if (Object.prototype.hasOwnProperty.call(hoursByDay, e.date)) {
        const h = parseFloat(e.hours || 0);
        hoursByDay[e.date] += h;
        if (e.is_billable) billableByDay[e.date] += h;
      }
    });

    // ── Week totals ───────────────────────────────────────────────────
    const weekEntries  = myTimeEntries.filter(e => weekDays.includes(e.date));
    const weekTotal    = weekEntries.reduce((s,e) => s + parseFloat(e.hours||0), 0);
    const weekBillable = weekEntries.filter(e=>e.is_billable).reduce((s,e) => s+parseFloat(e.hours||0), 0);
    const todayTotal   = parseFloat(hoursByDay[today] || 0);

    // ── Work list build ───────────────────────────────────────────────
    const workItems = [];
    (myTasks || [])
      .filter(t => t.status !== 'cancelled')
      .filter(t => { const p = parseFloat(t.pct_complete)||0; const pn = p<=1&&p>0?Math.round(p*100):Math.round(p); return pn < 100; })
      .forEach(t => {
        const proj = _projects.find(p => p.id === t.project_id);
        const overdue = t.due_date && t.due_date < today;
        const p = parseFloat(t.pct_complete)||0;
        const pctNorm = p<=1&&p>0?Math.round(p*100):Math.round(p);
        workItems.push({ type:'task', id:t.id, title:t.name, project:proj?.name||'—',
          projectId:t.project_id||null, status:t.status,
          due:t.due_date, overdue, pct:pctNorm,
          urgency: overdue ? 0 : (t.due_date ? 1 : 2) });
      });
    (myActionItems||[]).filter(a => a.owner_resource_id).forEach(a => {
      const overdue = a.due_date && a.due_date < today;
      workItems.push({ type:'action', id:a.id, title:a.title, project:'Action item',
        projectId:null, status:a.status||'open', due:a.due_date, overdue,
        urgency: overdue ? 0 : 1 });
    });
    workItems.sort((a,b) => {
      if (a.urgency !== b.urgency) return a.urgency - b.urgency;
      if (a.due && b.due) return a.due.localeCompare(b.due);
      return 0;
    });
    _wiItems = workItems;
    _teEntries = myTimeEntries;
    if (_teFilter && !weekDays.includes(_teFilter)) _teFilter = null;

    // ── Stat card counts ──────────────────────────────────────────────
    const waiting    = workItems.filter(w => w.status === 'not_started').length;
    const inProgress = workItems.filter(w => w.status === 'in_progress').length;
    const blocked    = workItems.filter(w => w.status === 'blocked').length;
    const doneTodayCt= _doneToday.length;
    const openItems  = workItems.length;
    const overdueCount = workItems.filter(w => w.overdue).length;
    const activeFirmWF = wfInstances.length;
    // Streak: consecutive days with time entries
    const uniqueDates = [...new Set(myTimeEntries.map(e=>e.date))].sort().reverse();
    let streak = 0;
    for (let i = 0; i < 60; i++) {
      const d = new Date(today); d.setDate(d.getDate() - i);
      const ds = d.toLocaleDateString('en-CA');
      if (uniqueDates.includes(ds)) streak++; else if (i > 0) break;
    }
    // Items completed this week
    const weekCompletedItems = _doneToday.length; // session items; real count would need DB query
    const firstName = (_myResource?.name || '').split(' ')[0] || 'there';
    const hour = new Date().getHours();
    const greeting = hour < 12 ? 'Good morning' : hour < 17 ? 'Good afternoon' : 'Good evening';
    const weekOf = weekStart.toLocaleDateString('en-US',{month:'short',day:'numeric'});
    const myWeekRow = myWeek?.[0] || null;
    const wsStatus = myWeekRow?.status || 'draft';
    const wsLabel = {draft:'DRAFT',submitted:'SUBMITTED',approved:'APPROVED',rejected:'REJECTED',amended:'AMENDED'}[wsStatus]||wsStatus.toUpperCase();
    const wsColor = wsStatus==='approved'?'var(--compass-green)':wsStatus==='submitted'?'var(--compass-cyan)':wsStatus==='rejected'?'var(--compass-red)':'var(--text3)';

    // ── EOD Nudge Logic (1.E) ─────────────────────────────────────────
    const nowHr = new Date().getHours() + new Date().getMinutes()/60;
    const expectedHrs = 8;
    let eodNudge = null; // null | 'amber' | 'red'
    if (nowHr >= 17 && todayTotal === 0) eodNudge = 'red';
    else if (nowHr >= 16 && todayTotal < 4) eodNudge = 'amber';

    // ── Day completion dots (M-F) ─────────────────────────────────────
    function dayDotHtml(d, label) {
      const hrs = hoursByDay[d] || 0;
      const isPast = d < today;
      const isToday = d === today;
      const isFuture = d > today;
      let fill, border, char, color;
      if (isToday) { fill='var(--compass-cyan)'; border='var(--compass-cyan)'; char='■'; color='#060a10'; }
      else if (isPast && hrs > 0) { fill='var(--compass-green)'; border='var(--compass-green)'; char='✓'; color='#060a10'; }
      else if (isPast && hrs === 0) { fill='var(--compass-red)'; border='var(--compass-red)'; char='!'; color='#fff'; }
      else { fill='transparent'; border='var(--muted)'; char='—'; color='var(--muted)'; }
      return `<div class="day-dot" data-day="${d}" title="${label} · ${hrs.toFixed(1)}h"
        style="display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer">
        <div style="width:22px;height:22px;border-radius:50%;background:${fill};border:1.5px solid ${border};
          display:flex;align-items:center;justify-content:center;font-size:10px;color:${color};
          font-family:var(--font-head);font-weight:700;transition:transform .1s"
          onmouseenter="this.style.transform='scale(1.15)'" onmouseleave="this.style.transform='scale(1)'">${char}</div>
        <span style="font-family:var(--font-head);font-size:11px;font-weight:600;color:var(--text3)">${label}</span>
      </div>`;
    }
    const dotLabels = ['M','T','W','T','F'];
    const dotsHtml = weekDays.slice(0,5).map((d,i) => dayDotHtml(d, dotLabels[i])).join('');

    // ── Speedometer Row (1.B) — compact GW=74 ────────────────────────
    const GW=74,GH=58,GCX=37,GCY=49,GR=30;
    function gPt(deg) {
      const a=(deg-180)*Math.PI/180;
      return [(GCX+GR*Math.cos(a)).toFixed(1),(GCY+GR*Math.sin(a)).toFixed(1)];
    }
    function gArc(d1,d2) {
      if(d2<=d1)return '';
      const [x1,y1]=gPt(d1),[x2,y2]=gPt(Math.min(d2,179.9));
      return `M${x1},${y1} A${GR},${GR} 0 ${d2-d1>180?1:0} 1 ${x2},${y2}`;
    }
    const gaugesHtml = weekDays.slice(0,7).map((d,i) => {
      const hrs      = hoursByDay[d]    || 0;
      const bill     = billableByDay[d] || 0;
      const nonBill  = hrs - bill;
      const isToday  = d === today;
      const isActive = _activeGauge === d;
      const pct      = Math.min(hrs/8, 1);
      const billPct  = Math.min(bill/8, 1);
      const nbPct    = Math.min(nonBill/8, 1);
      const billEnd  = billPct * 180;
      const nbEnd    = (billPct+nbPct) * 180;
      const needleRad= (pct*180 - 180)*Math.PI/180;
      const nx       = (GCX+(GR-6)*Math.cos(needleRad)).toFixed(1);
      const ny       = (GCY+(GR-6)*Math.sin(needleRad)).toFixed(1);
      const arcColor = isActive ? '#EF9F27' : isToday ? '#00D2FF' : hrs>0 ? '#1D9E75' : 'rgba(255,255,255,.08)';
      const pillColor= isActive ? '#EF9F27' : isToday ? '#00D2FF' : hrs>0 ? '#1D9E75' : 'rgba(255,255,255,.2)';
      const dayColor = isActive ? '#EF9F27' : isToday ? '#00D2FF' : '#6A94B8';
      const fw       = isToday || isActive ? '700' : '500';
      return `<div class="gauge-col" data-gauge-date="${d}" data-gauge-has-data="${hrs>0}"
        style="display:flex;flex-direction:column;align-items:center;gap:1px;
          flex:1;min-width:0;cursor:pointer;padding:0 1px">
        <svg viewBox="0 0 ${GW} ${GH}" width="${GW}" height="${GH}" style="overflow:visible">
          <path d="${gArc(0,179.9)}" fill="none" stroke="rgba(255,255,255,.05)" stroke-width="4" stroke-linecap="round"/>
          ${hrs>0 ? `
            ${bill>0 ? `<path d="${gArc(0,billEnd)}" fill="none" stroke="${arcColor}" stroke-width="4" stroke-linecap="round"/>` : ''}
            ${nonBill>0 ? `<path d="${gArc(billEnd,nbEnd)}" fill="none" stroke="#8B5CF6" stroke-width="4" stroke-linecap="round"/>` : ''}
            <line x1="${GCX}" y1="${GCY}" x2="${nx}" y2="${ny}" stroke="${arcColor}" stroke-width="1.5" stroke-linecap="round"/>
            <circle cx="${GCX}" cy="${GCY}" r="2.8" fill="${arcColor}"/>
          ` : `<circle cx="${GCX}" cy="${GCY}" r="2" fill="rgba(255,255,255,.12)"/>`}
          <rect x="${GCX-12}" y="${GCY+4}" width="24" height="12" rx="6" fill="none" stroke="${pillColor}" stroke-width="1"/>
          <text x="${GCX}" y="${GCY+10.5}" text-anchor="middle" dominant-baseline="central"
            font-size="6.5" font-family="'JetBrains Mono',monospace" font-weight="700" fill="${pillColor}">
            ${hrs>0 ? hrs.toFixed(1)+'h' : '—'}
          </text>
        </svg>
        <div style="font-family:var(--font-head);font-size:11px;font-weight:${fw};
          color:${dayColor};text-align:center;line-height:1.1;padding-bottom:2px">
          ${weekLabels[i]}<br>
          <span style="font-weight:400;color:rgba(106,148,184,.7);font-size:11px">${new Date(d+'T00:00:00').getDate()}</span>
        </div>
      </div>`;
    }).join('');

    // ── Work list filtered rows (1.C) ─────────────────────────────────
    function workListHtml() {
      const cutoff30d = new Date(Date.now()+30*86400000).toLocaleDateString('en-CA');
      const filtered = workItems.filter(w => {
        if (_wfType !== 'all') { if (w.type !== _wfType) return false; }
        if (_wfStatus !== 'all') {
          if (w.type==='action') { if (_wfStatus !== 'in_progress' && _wfStatus !== 'all') return true; }
          else if (w.status !== _wfStatus) return false;
        }
        if (_wfProject && w.projectId !== _wfProject) return false;
        if (_wfDateRange==='today') return !w.due || w.due===today || w.overdue;
        if (_wfDateRange==='week')  return !w.due || w.due<=weekDays[6] || w.overdue;
        if (_wfDateRange==='30d')   return !w.due || w.due<=cutoff30d || w.overdue;
        return true;
      });
      if (filtered.length===0) return `<div style="padding:18px 13px;text-align:center;
        font-family:var(--font-head);font-size:12px;color:var(--text3)">No items match the current filters</div>`;

      return filtered.map(w => {
        // Type badge
        const typeColors = {
          task:    {c:'var(--compass-cyan)',   bg:'rgba(0,210,255,.08)',   lbl:'Task'},
          action:  {c:'var(--compass-green)',  bg:'rgba(29,158,117,.08)', lbl:'Action Item'},
          workflow:{c:'var(--compass-amber)',  bg:'rgba(239,159,39,.08)', lbl:'Workflow'},
        };
        const tc = typeColors[w.type] || typeColors.task;
        const typeBadge = `<div style="display:inline-flex;align-items:center;padding:1px 7px;
          border:1px solid ${tc.c};background:${tc.bg};border-radius:3px;
          font-family:var(--font-head);font-size:11px;font-weight:600;color:${tc.c};
          white-space:nowrap">${tc.lbl}</div>`;

        // Progress bar
        let progressCell = '<span style="font-family:var(--font-head);font-size:11px;color:var(--text3)">—</span>';
        if (w.type==='task' && w.pct > 0) {
          const fillColor = w.pct>=80?'var(--compass-green)':w.pct>=40?'var(--compass-cyan)':'rgba(255,255,255,.25)';
          progressCell = `<div style="position:relative;margin-top:10px">
            <div style="height:5px;background:rgba(255,255,255,.06);border-radius:3px;overflow:visible;position:relative">
              <div class="prog-fill" data-p="${w.pct}%" style="height:100%;width:${Math.min(w.pct,100)}%;
                background:${fillColor};border-radius:3px;transition:width .3s;position:relative">
                <span style="position:absolute;right:0;top:-14px;transform:translateX(50%);
                  font-family:var(--font-head);font-size:11px;font-weight:700;color:${fillColor};
                  white-space:nowrap">${w.pct}%</span>
              </div>
            </div>
          </div>`;
        } else if (w.type==='task' && w.pct===0) {
          progressCell = '<span style="font-family:var(--font-head);font-size:11px;color:var(--text3)">—</span>';
        }

        // Due cell
        let dueCell = '';
        if (w.overdue) dueCell = `<span style="font-family:var(--font-head);font-size:11px;font-weight:700;
          color:var(--compass-red)">${daysOverdue(w.due)}d</span>`;
        else if (w.due) dueCell = `<span style="font-family:var(--font-head);font-size:11px;color:var(--text3)">${fmtDate(w.due)}</span>`;
        else dueCell = `<span style="color:var(--text3);font-size:11px">—</span>`;

        // Action button per spec NOTE 6
        let btnLabel, btnStyle;
        if (w.type==='action') {
          btnLabel='Resolve'; btnStyle=`color:var(--compass-green);border:1px solid var(--compass-green);background:none`;
        } else if (w.status==='blocked') {
          btnLabel='Unblock'; btnStyle=`color:var(--compass-amber);border:1px solid var(--compass-amber);background:none`;
        } else if (w.pct>=100) {
          btnLabel='Mark Done'; btnStyle=`color:#060a10;border:none;background:var(--compass-cyan)`;
        } else if (w.status==='in_progress') {
          btnLabel='In Progress'; btnStyle=`color:var(--compass-amber);border:1px solid rgba(239,159,39,.5);background:none`;
        } else {
          btnLabel='Start'; btnStyle=`color:var(--compass-cyan);border:1px solid rgba(0,210,255,.4);background:none`;
        }

        return `<div class="cmp-row wi-row" data-wi-id="${w.id}" data-wi-type="${w.type}"
          data-wi-status="${w.status}" data-wi-projectid="${w.projectId||''}"
          style="display:grid;grid-template-columns:14px 86px 1fr 140px 56px 78px;
            gap:0;align-items:center;padding:0 8px 0 4px;min-height:38px">
          <!-- Col 1: completion circle -->
          <div style="display:flex;align-items:center;justify-content:center">
            <div class="wi-complete-circle" data-wi-id="${w.id}" data-wi-type="${w.type}"
              data-wi-title="${esc(w.title)}" data-wi-projectid="${w.projectId||''}"
              data-wi-status="${w.status}"
              title="Click to mark complete"
              style="width:11px;height:11px;border-radius:50%;border:1.5px solid var(--text3);
                cursor:pointer;flex-shrink:0;transition:all .12s"
              onmouseenter="this.style.borderColor='var(--compass-green)';this.style.boxShadow='0 0 0 2px rgba(29,158,117,.25)'"
              onmouseleave="this.style.borderColor='var(--text3)';this.style.boxShadow='none'"></div>
          </div>
          <!-- Col 2: type badge -->
          <div style="padding:0 6px 0 2px;display:flex;align-items:center">${typeBadge}</div>
          <!-- Col 3: title + subtitle -->
          <div style="padding:8px 8px 8px 4px;min-width:0">
            <div style="font-family:var(--font-body);font-size:12px;font-weight:500;color:var(--text0);
              white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(w.title)}</div>
            <div style="font-family:var(--font-head);font-size:11px;color:var(--text3);margin-top:1px">
              ${esc(w.project)}${w.due ? ' · Due '+fmtDate(w.due) : ''}</div>
          </div>
          <!-- Col 4: progress -->
          <div style="padding:0 8px">${progressCell}</div>
          <!-- Col 5: due -->
          <div style="text-align:center">${dueCell}</div>
          <!-- Col 6: action button -->
          <div style="padding:0 4px">
            <button class="wi-action-btn" data-wi-id="${w.id}" data-wi-type="${w.type}"
              data-wi-title="${esc(w.title)}" data-wi-projectid="${w.projectId||''}"
              data-wi-status="${w.status}" data-wi-pct="${w.pct||0}"
              style="width:100%;font-family:var(--font-head);font-size:11px;font-weight:600;
                letter-spacing:.06em;padding:4px 0;cursor:pointer;border-radius:3px;
                transition:opacity .12s;${btnStyle}"
              onmouseenter="this.style.opacity='.8'" onmouseleave="this.style.opacity='1'">
              ${btnLabel}</button>
          </div>
        </div>`;
      }).join('');
    }

    // ── Done Today Panel HTML (1.D) ───────────────────────────────────
    function doneTodayHtml() {
      if (_doneToday.length === 0) return `<div style="padding:12px 13px;
        font-family:var(--font-body);font-size:12px;color:var(--text3);font-style:italic">
        Nothing completed yet today — complete items from your work list to see them here.</div>`;
      return _doneToday.map(item => {
        const signalColor = item.signal==='green'?'var(--compass-green)':item.signal==='red'?'var(--compass-red)':'var(--compass-amber)';
        return `<div style="display:flex;align-items:center;gap:8px;padding:7px 13px;
          border-bottom:1px solid var(--border)">
          <span style="color:var(--compass-green);font-size:13px;flex-shrink:0">✓</span>
          <div style="flex:1;min-width:0">
            <div style="font-family:var(--font-body);font-size:12px;font-weight:500;color:var(--text0);
              white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(item.title)}</div>
            <div style="font-family:var(--font-head);font-size:11px;color:var(--text3)">
              ${esc(item.project||'—')} · ${item.time||'—'}
              ${item.noTime ? ' <span style="color:var(--text3)">· no time logged</span>' : ''}
            </div>
          </div>
          ${item.signal ? `<div style="width:8px;height:8px;border-radius:50%;background:${signalColor};flex-shrink:0"></div>` : `<div style="width:8px;height:8px;border-radius:50%;background:var(--muted);flex-shrink:0"></div>`}
          <div style="font-family:var(--font-display);font-size:13px;font-weight:700;
            color:${item.noTime ? 'var(--text3)' : 'var(--compass-cyan)'};flex-shrink:0">
            ${item.noTime ? '—' : (item.hours||0).toFixed(1)+'h'}</div>
        </div>`;
      }).join('');
    }

    // ── EOD Nudge HTML ────────────────────────────────────────────────
    function eodNudgeHtml() {
      if (!eodNudge) return '';
      const isRed = eodNudge === 'red';
      const c = isRed ? 'var(--compass-red)' : 'var(--compass-amber)';
      const bg = isRed ? 'rgba(226,75,74,.06)' : 'rgba(239,159,39,.06)';
      const msg = isRed ? 'No time logged today.' : 'Log today\'s time before EOD';
      const gap = isRed ? `${(8 - todayTotal).toFixed(1)}h gap` : `${todayTotal.toFixed(1)}h of ~8h expected`;
      return `<div style="border-left:3px solid ${c};background:${bg};padding:9px 12px;margin-top:10px;
        display:flex;align-items:center;justify-content:space-between;gap:8px">
        <div>
          <div style="font-family:var(--font-head);font-size:12px;font-weight:700;color:${c}">■ ${msg}</div>
          <div style="font-family:var(--font-head);font-size:11px;color:var(--text3);margin-top:2px">${gap}</div>
        </div>
        <button class="open-weekly-ts-btn" data-expand-today="1"
          style="font-family:var(--font-head);font-size:11px;font-weight:600;letter-spacing:.06em;
            padding:5px 10px;background:none;border:1px solid ${c};color:${c};cursor:pointer;
            white-space:nowrap;flex-shrink:0;transition:background .12s"
          onmouseenter="this.style.background='rgba(239,159,39,.1)'"
          onmouseleave="this.style.background='none'">Log today →</button>
      </div>`;
    }

    // ── Assemble HTML ─────────────────────────────────────────────────
    content.innerHTML = `

    <!-- 1.A: Greeting row -->
    <div style="display:grid;grid-template-columns:1fr auto;align-items:center;
      gap:12px;margin-bottom:14px;padding:2px 0">
      <div>
        <div style="font-family:var(--font-display);font-size:22px;font-weight:700;
          color:var(--text0);line-height:1.1">${greeting}, ${esc(firstName)}</div>
        <div style="font-family:var(--font-head);font-size:12px;color:var(--text3);margin-top:2px">
          ${new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'})}</div>
      </div>
      ${streak > 0 ? `<div style="display:flex;align-items:center;gap:6px;padding:5px 12px;
        background:rgba(239,159,39,.1);border:1px solid rgba(239,159,39,.3);border-radius:4px;
        font-family:var(--font-head);font-size:13px;font-weight:700;color:var(--compass-amber);
        white-space:nowrap">
        ■ ${streak}-day streak · ${weekCompletedItems} completed this week
      </div>` : ''}
    </div>

    <!-- 1.A: 8-Card Stat Strip -->
    <div style="display:grid;grid-template-columns:repeat(8,1fr);gap:7px;margin-bottom:14px">
      <div class="stat-card" style="border-top:2px solid var(--text3)">
        <div class="stat-label" style="font-family:var(--font-head);font-size:11px">Waiting</div>
        <div class="stat-value" style="font-family:var(--font-display);font-size:22px;font-weight:700;color:var(--text3)">${waiting}</div>
        <div class="stat-sub" style="font-family:var(--font-head);font-size:11px;color:var(--text3)">assigned</div>
      </div>
      <div class="stat-card" style="border-top:2px solid var(--compass-cyan)">
        <div class="stat-label" style="font-family:var(--font-head);font-size:11px">In Progress</div>
        <div class="stat-value sv-cyan" style="font-family:var(--font-display);font-size:22px;font-weight:700">${inProgress}</div>
        <div class="stat-sub" style="font-family:var(--font-head);font-size:11px;color:var(--text3)">active now</div>
      </div>
      <div class="stat-card" style="border-top:2px solid ${blocked>0?'var(--compass-red)':'var(--border)'}">
        <div class="stat-label" style="font-family:var(--font-head);font-size:11px">Blocked</div>
        <div class="stat-value" style="font-family:var(--font-display);font-size:22px;font-weight:700;color:${blocked>0?'var(--compass-red)':'var(--text2)'}">${blocked}</div>
        <div class="stat-sub" style="font-family:var(--font-head);font-size:11px;color:var(--text3)">needs attention</div>
      </div>
      <div class="stat-card stat-done-today" style="border-top:2px solid var(--compass-green)">
        <div class="stat-label" style="font-family:var(--font-head);font-size:11px">Done Today</div>
        <div class="stat-value" id="done-today-count" style="font-family:var(--font-display);font-size:22px;font-weight:700;color:var(--compass-green)">${doneTodayCt}</div>
        <div class="stat-sub" style="font-family:var(--font-head);font-size:11px;color:var(--text3)">completed</div>
      </div>
      <div class="stat-card" style="border-top:2px solid var(--compass-amber)">
        <div class="stat-label" style="font-family:var(--font-head);font-size:11px">Hrs — Week</div>
        <div class="stat-value sv-amber" style="font-family:var(--font-display);font-size:22px;font-weight:700">${weekTotal.toFixed(1)}</div>
        <div class="stat-sub" style="font-family:var(--font-head);font-size:11px;color:var(--text3)">${weekBillable.toFixed(1)}h billable</div>
      </div>
      <div class="stat-card" style="border-top:2px solid var(--compass-cyan)">
        <div class="stat-label" style="font-family:var(--font-head);font-size:11px">Hrs — Today</div>
        <div class="stat-value sv-cyan" style="font-family:var(--font-display);font-size:22px;font-weight:700">${todayTotal.toFixed(1)}</div>
        <div class="stat-sub" style="font-family:var(--font-head);font-size:11px;color:var(--text3)">of ~8h expected</div>
      </div>
      <div class="stat-card" style="border-top:2px solid ${overdueCount>0?'var(--compass-amber)':'var(--border)'}">
        <div class="stat-label" style="font-family:var(--font-head);font-size:11px">Open Items</div>
        <div class="stat-value" style="font-family:var(--font-display);font-size:22px;font-weight:700;color:${overdueCount>0?'var(--compass-amber)':'var(--text1)'}">${openItems}</div>
        <div class="stat-sub" style="font-family:var(--font-head);font-size:11px;color:${overdueCount>0?'var(--compass-red)':'var(--text3)'}">${overdueCount>0?overdueCount+' overdue':'all current'}</div>
      </div>
      <div class="stat-card" style="border-top:2px solid var(--compass-purple)">
        <div class="stat-label" style="font-family:var(--font-head);font-size:11px">Active WF</div>
        <div class="stat-value" style="font-family:var(--font-display);font-size:22px;font-weight:700;color:var(--compass-purple)">${activeFirmWF}</div>
        <div class="stat-sub" style="font-family:var(--font-head);font-size:11px;color:var(--text3)">firm-wide</div>
      </div>
    </div>

    <!-- Two-column layout -->
    <div style="display:grid;grid-template-columns:1fr minmax(0,300px);gap:14px">
      <div>

        <!-- 1.B: Speedometer Row -->
        <div class="cmp-panel" style="margin-bottom:14px">
          <div class="panel-hdr">
            <div class="panel-title" style="font-family:var(--font-head);font-size:13px;font-weight:700">This week — hours by day</div>
            <div style="font-family:var(--font-head);font-size:11px;color:var(--text3)">
              ${new Date(weekDays[0]+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'})}
              –
              ${new Date(weekDays[4]+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'})}
            </div>
          </div>
          <div style="display:flex;padding:6px 6px 0;gap:0">
            ${gaugesHtml}
          </div>
          <div style="display:flex;align-items:center;gap:12px;padding:4px 10px 8px;
            font-family:var(--font-head);font-size:11px;color:var(--text3)">
            <div style="display:flex;align-items:center;gap:5px">
              <div style="width:12px;height:3px;background:var(--compass-cyan);border-radius:2px"></div>
              <span>Billable</span>
            </div>
            <div style="display:flex;align-items:center;gap:5px">

              const isCadence=e.source_type==='step_comment';

                style="display:flex;align-items:center;gap:8px;padding:7px 13px;
                  border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;

                onmouseleave="this.style.background='${_teSelected===e.id?'rgba(0,210,255,.04)':''}'">
                <div style="font-size:13px;color:${sourceColor};flex-shrink:0">${sourceIcon}</div>
                <div style="flex:1;min-width:0">
                  <div style="font-family:var(--font-body);font-size:12px;font-weight:500;
                    color:var(--text0);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">

                  <div style="font-family:var(--font-head);font-size:11px;color:var(--text3);margin-top:1px">
                    ${fmtDate(e.date)} · ${e.is_billable?'Billable':'Non-billable'}

                  </div>

                <div style="font-family:var(--font-display);font-size:13px;font-weight:700;
                  color:${e.is_billable?'var(--compass-green)':'var(--text2)'};flex-shrink:0">
                  ${parseFloat(e.hours).toFixed(1)}h</div>
              </div>`;
            }).join('') + `<div style="padding:8px 13px;display:flex;justify-content:space-between;
              align-items:center;border-top:1px solid var(--border)">
              <span style="font-family:var(--font-head);font-size:11px;color:var(--text3)">

              <span style="font-family:var(--font-display);font-size:13px;font-weight:700;color:var(--compass-cyan)">

          })()}
        </div>

        <!-- Active Workflows -->
        <div class="cmp-panel" style="margin-bottom:14px">

              <div style="flex:1;min-width:0">

                <div class="row-sub">${proj?esc(proj.name)+' · ':''}${w.current_step_name?esc(w.current_step_name):'Active'}</div>

    </div>`;

    if (loading) loading.style.display = 'none';
    content.style.display = 'block';

  } catch (e) {
    console.error('[Compass] loadUserView error:', e);
    if (loading) loading.innerHTML = '<div style="color:var(--compass-red);font-family:var(--font-head);font-size:11px">Failed to load — check console</div>';
  }
}


// ══════════════════════════════════════════════════════════
// VIEW: PM PORTFOLIO
// ══════════════════════════════════════════════════════════
async function loadPMView() {
  const content = document.getElementById('pm-content');

  try {
    const [wfInstances, actionItems, cocEvents, resourceReqs] = await Promise.all([
      API.get(`workflow_instances?select=id,title,status,current_step_name,project_id,launched_at,priority,stakes&status=eq.active&order=launched_at.desc&limit=50`).catch(() => []),
      API.get(`workflow_action_items?status=eq.open&order=due_date.asc&limit=100`).catch(() => []),
      API.get(`workflow_step_instances?select=id,instance_id,event_type,step_name,outcome,actor_name,event_notes,created_at&event_type=in.(step_completed,step_reset,step_activated)&order=created_at.desc&limit=100`).catch(() => []),
      API.get(`resource_requests?select=id,project_id,status,submitted_at&status=eq.pending&order=submitted_at.asc&limit=20`).catch(() => []),
    ]);

    const activeProjects = _projects.filter(p => p.status === 'active');
    const today = new Date().toLocaleDateString('en-CA');

    // ── Red flags — rejections in the last 48h ────────────────
    // Deduplicate: one chip per instance (most recent reset event only)
    const cutoff48h = new Date(Date.now() - 48 * 3600000).toISOString();
    const flagsByInstance = {};
    cocEvents
      .filter(e => e.event_type === 'step_reset' && e.created_at > cutoff48h)
      .forEach(e => {
        const inst = wfInstances.find(w => w.id === e.instance_id);
        const proj = _projects.find(p => p.id === inst?.project_id);
        const key  = e.instance_id;
        if (!flagsByInstance[key] || e.created_at > flagsByInstance[key].created_at) {
          flagsByInstance[key] = { ...e, instTitle: inst?.title || '—', projName: proj?.name || '—', projId: inst?.project_id, count: 1 };
        } else {
          flagsByInstance[key].count++;
        }
      });
    const redFlags = Object.values(flagsByInstance)
      .sort((a, b) => b.created_at.localeCompare(a.created_at));

    // ── Per-project stats ─────────────────────────────────────
    const projStats = activeProjects.map(p => {
      const projTasks = _tasks.filter(t => t.project_id === p.id);
      const overdue   = projTasks.filter(t => t.due_date && t.due_date < today && !['complete','cancelled'].includes(t.status));
      const projInsts = wfInstances.filter(w => w.project_id === p.id);
      const projAIs   = actionItems.filter(a => projInsts.some(i => i.id === a.instance_id));
      const overdueAIs= projAIs.filter(a => a.due_date && a.due_date < today);
      const projFlags = redFlags.filter(f => f.projId === p.id);
      const projReqs  = resourceReqs.filter(r => r.project_id === p.id);

      // Recent CoC events for this project's instances
      const projCoc = cocEvents
        .filter(e => projInsts.some(i => i.id === e.instance_id))
        .slice(0, 5);

      const urgency = projFlags.length * 5 + overdue.length * 3 + overdueAIs.length * 2 + projInsts.length + projReqs.length;

      return { proj: p, projTasks, overdue, projInsts, projAIs, overdueAIs, projFlags, projReqs, projCoc, urgency };
    }).sort((a, b) => b.urgency - a.urgency);

    const totalOverdue = projStats.reduce((s, p) => s + p.overdue.length, 0);
    const totalInsts   = wfInstances.length;
    const totalAIs     = actionItems.filter(a => a.due_date && a.due_date < today).length;
    const totalFlags   = redFlags.length;
    const totalReqs    = resourceReqs.length;

    // ── Live feed — last 20 CoC events across all instances ───
    const feedEvents = cocEvents.slice(0, 20).map(e => {
      const inst = wfInstances.find(w => w.id === e.instance_id);
      const proj = _projects.find(p => p.id === inst?.project_id);
      const isRejection = e.event_type === 'step_reset';
      const isComplete  = e.event_type === 'step_completed';
      const color = isRejection ? 'var(--compass-red)' : isComplete ? 'var(--compass-green)' : 'var(--compass-amber)';
      const icon  = isRejection ? '↩' : isComplete ? '✓' : '●';
      const age   = _timeAgo(e.created_at);
      return { e, inst, proj, color, icon, age, isRejection };
    });

    content.innerHTML = `
      <!-- Stat strip -->
      <div class="stat-strip stat-strip-4" style="margin-bottom:14px">
        <div class="stat-card" style="border-top:2px solid var(--compass-cyan)">
          <div class="stat-label">Active projects</div>
          <div class="stat-value sv-cyan">${activeProjects.length}</div>
          <div class="stat-sub">${totalInsts} workflow${totalInsts !== 1 ? 's' : ''} running</div>
        </div>
        <div class="stat-card" style="border-top:2px solid ${totalOverdue > 0 ? 'var(--compass-red)' : 'var(--compass-green)'}">
          <div class="stat-label">Overdue tasks</div>
          <div class="stat-value ${totalOverdue > 0 ? 'sv-red' : 'sv-green'}">${totalOverdue}</div>
          <div class="stat-sub">across all projects</div>
        </div>
        <div class="stat-card" style="border-top:2px solid ${totalFlags > 0 ? 'var(--compass-red)' : 'var(--border)'}">
          <div class="stat-label">Red flags — 48h</div>
          <div class="stat-value ${totalFlags > 0 ? 'sv-red' : ''}">${totalFlags}</div>
          <div class="stat-sub">rejections / resets</div>
        </div>
        <div class="stat-card" style="border-top:2px solid ${totalReqs > 0 ? 'var(--compass-amber)' : 'var(--border)'}">
          <div class="stat-label">Pending requests</div>
          <div class="stat-value ${totalReqs > 0 ? 'sv-amber' : ''}">${totalReqs}</div>
          <div class="stat-sub">resource requests</div>
        </div>
      </div>

      <!-- Red flag rail — only shown when flags exist -->
      ${redFlags.length > 0 ? `
      <div style="background:rgba(226,75,74,.06);border:1px solid rgba(226,75,74,.3);
        border-left:3px solid var(--compass-red);padding:8px 13px;margin-bottom:14px">
        <div style="font-family:var(--font-mono);font-size:11px;letter-spacing:.1em;
          text-transform:uppercase;color:var(--compass-red);margin-bottom:6px">
          ⚑ Red flags — last 48h
        </div>
        <div style="display:flex;flex-wrap:wrap;gap:6px">
          ${redFlags.map(f => `
          <a href="/cadence.html?instance=${f.instance_id}"
            style="display:inline-flex;align-items:center;gap:5px;
            font-family:var(--font-mono);font-size:11px;color:var(--compass-red);
            border:1px solid rgba(226,75,74,.35);padding:3px 9px;
            text-decoration:none;background:rgba(226,75,74,.06);transition:background .1s"
            onmouseenter="this.style.background='rgba(226,75,74,.14)'"
            onmouseleave="this.style.background='rgba(226,75,74,.06)'"
            title="${esc(f.event_notes || 'No rejection note')}">
            ↩ ${esc(f.instTitle)}${f.count > 1 ? ` <span style="opacity:.7">(${f.count}×)</span>` : ''}
            <span style="color:rgba(226,75,74,.6)">${_timeAgo(f.created_at)}</span>
          </a>`).join('')}
        </div>
      </div>` : ''}

      <div class="two-col">
        <div>
          <!-- Portfolio cards — urgency ordered -->
          <div class="cmp-panel">
            <div class="panel-hdr">
              <div class="panel-title">Portfolio — by urgency</div>
              <span class="panel-badge pb-cyan">${activeProjects.length} active</span>
            </div>
            ${projStats.length === 0
              ? `<div style="padding:20px 13px;text-align:center;font-family:var(--font-mono);font-size:11px;color:var(--text3)">No active projects</div>`
              : projStats.map(({ proj: p, overdue, projInsts, overdueAIs, projFlags, projReqs, projCoc }) => {
                  const hasFlag  = projFlags.length > 0;
                  const hasRisk  = overdue.length > 0 || overdueAIs.length > 0;
                  const barColor = hasFlag ? 'var(--compass-red)' : hasRisk ? 'var(--compass-amber)' : projInsts.length > 0 ? 'var(--compass-cyan)' : 'var(--compass-green)';
                  return `
                  <div style="border-bottom:1px solid var(--border);border-left:3px solid ${barColor};
                    padding:11px 13px;cursor:pointer;transition:background .1s"

// VIEW: MANAGEMENT
// ══════════════════════════════════════════════════════════
async function loadManagementView() {
  const content = document.getElementById('mgmt-content');

  try {
    const [wfInstances, resourceReqs, cocEvents] = await Promise.all([
      API.get('workflow_instances?select=id,title,status,project_id,current_step_name&status=eq.active&limit=50').catch(() => []),
      API.get('resource_requests?select=id,project_id,status,created_at,submitted_at&status=eq.pending&order=submitted_at.asc&limit=20').catch(() => []),
      API.get('workflow_step_instances?select=id,instance_id,event_type,outcome,created_at,template_step_id&event_type=in.(step_completed,step_reset)&order=created_at.desc&limit=200').catch(() => []),
    ]);

    const activeProjects = _projects.filter(p => p.status === 'active');

    // Compute rework counts per project
    const reworkByProject = {};
    cocEvents.forEach(e => {
      const inst = wfInstances.find(w => w.id === e.instance_id);
      if (!inst?.project_id) return;
      if (!reworkByProject[inst.project_id]) reworkByProject[inst.project_id] = 0;
      if (e.event_type === 'step_reset') reworkByProject[inst.project_id]++;
    });

    const pendingReqs = resourceReqs.length;
    const totalRework = Object.values(reworkByProject).reduce((s, v) => s + v, 0);

    content.innerHTML = `
      <div class="stat-strip stat-strip-4" style="margin-bottom:16px">
        <div class="stat-card">
          <div class="stat-label">Decisions pending</div>
          <div class="stat-value ${pendingReqs > 0 ? 'sv-red' : 'sv-green'}">${pendingReqs}</div>
          <div class="stat-sub">resource requests</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Active projects</div>
          <div class="stat-value sv-cyan">${activeProjects.length}</div>
          <div class="stat-sub">firm-wide</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Active workflows</div>
          <div class="stat-value sv-amber">${wfInstances.length}</div>
          <div class="stat-sub">running instances</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Rework cycles — recent</div>
          <div class="stat-value ${totalRework > 5 ? 'sv-red' : totalRework > 2 ? 'sv-amber' : 'sv-green'}">${totalRework}</div>
          <div class="stat-sub">step resets / rejections</div>
        </div>
      </div>

      <div class="two-col">
        <div>
          <!-- Portfolio health grid -->
          <div class="cmp-panel" style="margin-bottom:14px">
            <div class="panel-hdr">
              <div class="panel-title">Portfolio health</div>
              <span class="panel-badge pb-cyan">${activeProjects.length} projects</span>
            </div>
            <div style="overflow-x:auto">
              <table style="width:100%;border-collapse:collapse;font-family:var(--font-mono);font-size:11px">
                <thead>
                  <tr style="border-bottom:1px solid var(--border)">
                    <th style="padding:7px 13px;text-align:left;color:var(--text3);font-weight:600;letter-spacing:.08em">PROJECT</th>
                    <th style="padding:7px 8px;text-align:center;color:var(--text3);font-weight:600;letter-spacing:.08em">WORKFLOWS</th>
                    <th style="padding:7px 8px;text-align:center;color:var(--text3);font-weight:600;letter-spacing:.08em">REWORK</th>
                    <th style="padding:7px 8px;text-align:center;color:var(--text3);font-weight:600;letter-spacing:.08em">STATUS</th>
                  </tr>
                </thead>
                <tbody>
                  ${activeProjects.map(p => {
                    const insts   = wfInstances.filter(w => w.project_id === p.id);
                    const rework  = reworkByProject[p.id] || 0;
                    const healthy = insts.length === 0 && rework === 0;
                    const atRisk  = rework > 2 || insts.length > 3;
                    const statusColor = atRisk ? 'var(--compass-red)' : healthy ? 'var(--compass-green)' : 'var(--compass-amber)';
                    return `
                    <tr style="border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s"
                      onmouseenter="this.style.background='var(--bg2)'"
                      onmouseleave="this.style.background=''"
                      onclick="window.location.href='/project-detail.html?id=${p.id}'">
                      <td style="padding:8px 13px;color:var(--text0);font-family:var(--font-ui);font-size:12px;font-weight:500">${esc(p.name)}</td>
                      <td style="padding:8px;text-align:center;color:${insts.length > 0 ? 'var(--compass-amber)' : 'var(--text3)'}">${insts.length || '—'}</td>
                      <td style="padding:8px;text-align:center;color:${rework > 0 ? 'var(--compass-red)' : 'var(--text3)'}">${rework > 0 ? rework : '—'}</td>
                      <td style="padding:8px;text-align:center">
                        <div style="width:10px;height:10px;border-radius:50%;background:${statusColor};margin:0 auto"></div>
                      </td>
                    </tr>`;
                  }).join('')}
                </tbody>
              </table>
            </div>
          </div>

          <!-- Pending resource requests -->
          <div class="cmp-panel">
            <div class="panel-hdr">
              <div class="panel-title">Resource requests pending approval</div>
              ${pendingReqs > 0 ? `<span class="panel-badge pb-red">${pendingReqs} pending</span>` : '<span class="panel-badge pb-green">None pending</span>'}
            </div>
            ${resourceReqs.length === 0
              ? '<div style="padding:14px 13px;font-family:var(--font-mono);font-size:11px;color:var(--text3)">No pending resource requests</div>'
              : resourceReqs.map(r => {
                const proj = _projects.find(p => p.id === r.project_id);
                const ageDays = Math.floor((Date.now() - new Date(r.submitted_at || r.created_at).getTime()) / 86400000);
                return `
                <div class="action-row ${ageDays > 2 ? 'urgent' : 'warning'}">
                  <div class="ar-hdr">
                    <div class="ar-icon ari-amber">&#9679;</div>
                    <div style="flex:1">
                      <div class="ar-title">${esc(proj?.name || 'Unknown project')} — Resource request</div>
                      <div style="font-family:var(--font-mono);font-size:11px;color:var(--text3);margin-top:1px">Requested ${ageDays}d ago</div>
                    </div>
                    <span class="ar-due ${ageDays > 2 ? 'red' : 'amber'}">${ageDays}d pending</span>
                  </div>
                  <div class="ar-acts">
                    <button class="cmp-btn btn-approve" onclick="approveResourceRequest('${r.id}',this)">Approve</button>
                    <button class="cmp-btn btn-reject" onclick="compassToast('Rejection flow opening…')">Reject</button>
                    <a href="/resource-requests.html" class="cmp-btn btn-ghost" style="text-decoration:none">View details →</a>
                  </div>
                </div>`;
              }).join('')
            }
          </div>
        </div>

        <div>
          <!-- Quick nav to existing pages -->
          <div class="cmp-panel" style="margin-bottom:14px">
            <div class="panel-hdr"><div class="panel-title">Management surfaces</div></div>
            <div class="cmp-row" onclick="window.location.href='/cadence.html'">
              <div style="flex:1"><div class="row-title">Cadence — Workflow Intelligence →</div><div class="row-sub">DAG canvas, rework history, AI briefing</div></div>
            </div>
            <div class="cmp-row" onclick="window.location.href='/resources.html'">
              <div style="flex:1"><div class="row-title">Resources →</div><div class="row-sub">Team allocation, capacity, utilization</div></div>
            </div>
            <div class="cmp-row" onclick="window.location.href='/resource-requests.html'">
              <div style="flex:1"><div class="row-title">Resource requests →</div><div class="row-sub">All pending and historical requests</div></div>
            </div>
            <div class="cmp-row" onclick="window.location.href='/risk-register.html'">
              <div style="flex:1"><div class="row-title">Risk register →</div><div class="row-sub">Firm-wide risk landscape</div></div>
            </div>
          </div>

          <!-- Rework summary by project -->
          <div class="cmp-panel">
            <div class="panel-hdr"><div class="panel-title">Rework cycles — by project</div></div>
            ${Object.entries(reworkByProject).length === 0
              ? '<div style="padding:12px 13px;font-family:var(--font-mono);font-size:11px;color:var(--text3)">No rework cycles recorded</div>'
              : Object.entries(reworkByProject)
                  .sort(([,a],[,b]) => b - a)
                  .slice(0, 6)
                  .map(([projId, count]) => {
                    const proj = _projects.find(p => p.id === projId);
                    const max  = Math.max(...Object.values(reworkByProject));
                    const pct  = max > 0 ? Math.round((count / max) * 100) : 0;
                    return `
                    <div class="budget-row">
                      <div class="budget-header">
                        <span>${esc(proj?.name || 'Unknown')}</span>
                        <span class="budget-value" style="color:${count > 3 ? 'var(--compass-red)' : 'var(--compass-amber)'}">${count} cycle${count !== 1 ? 's' : ''}</span>
                      </div>
                      <div class="budget-track">
                        <div class="budget-fill" style="width:${pct}%;background:${count > 3 ? 'var(--compass-red)' : 'var(--compass-amber)'}"></div>
                      </div>
                    </div>`;
                  }).join('')
            }
          </div>
        </div>
      </div>`;

  } catch (e) {
    console.error('[Compass] loadManagementView error:', e);
    content.innerHTML = '<div style="padding:20px;font-family:var(--font-mono);font-size:11px;color:var(--compass-red)">Failed to load management view</div>';
  }
}

async function approveResourceRequest(reqId, btn) {
  if (btn) { btn.disabled = true; btn.textContent = 'Approving…'; }
  try {
    await API.patch(`resource_requests?id=eq.${reqId}`, { status: 'approved' });
    compassToast('Resource request approved');
    const row = btn?.closest('.action-row');
    if (row) { row.style.transition = 'opacity .3s'; row.style.opacity = '0'; setTimeout(() => row.remove(), 300); }
  } catch (e) {
    compassToast('Failed to approve — check console');
    if (btn) { btn.disabled = false; btn.textContent = 'Approve'; }
  }
}

              return `
              <div class="cmp-row" onclick="window.location.href='/project-detail.html?id=${p.id}'">
