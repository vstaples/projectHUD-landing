                </div>
                ${insts.length > 0 ? `<span class="status-badge sb-warn">${insts.length} workflow${insts.length > 1 ? 's' : ''}</span>` : ''}
                <span class="status-badge ${near ? 'sb-warn' : 'sb-future'}">
                  ${p.status === 'active' ? 'Active' : esc(p.status)}

              </div>`;

          </div>
        </div>

        <div>
          <!-- Key metrics -->
          <div class="cmp-panel" style="margin-bottom:14px">
            <div class="panel-hdr"><div class="panel-title">Rework cost by project</div></div>
            ${(() => {
              const byProj = {};
              cocEvents.filter(e => e.event_type === 'step_reset').forEach(e => {
                const inst = wfInstances.find(w => w.id === e.instance_id);
                if (!inst?.project_id) return;
                byProj[inst.project_id] = (byProj[inst.project_id] || 0) + 1;
              });
              const entries = Object.entries(byProj).sort(([,a],[,b]) => b - a);
              if (entries.length === 0) return '<div style="padding:12px 13px;font-family:var(--font-mono);font-size:11px;color:var(--text3)">No rework recorded</div>';
              const maxV = Math.max(...entries.map(([,v]) => v));
              return entries.map(([pid, count]) => {
                const proj = _projects.find(p => p.id === pid);
                const cost = count * HRS_PER_REWORK * HOURLY_RATE;
                return `
                <div class="budget-row">
                  <div class="budget-header">
                    <span>${esc(proj?.name || 'Unknown')}</span>
                    <span class="budget-value" style="color:${count > 3 ? 'var(--compass-red)' : 'var(--compass-amber)'}">

                    </span>
                  </div>
                  <div class="budget-track">
                    <div class="budget-fill" style="width:${Math.round((count/maxV)*100)}%;background:${count > 3 ? 'var(--compass-red)' : 'var(--compass-amber)'}"></div>
                  </div>
                </div>`;
              }).join('');
            })()}
          </div>

          <!-- Quick nav -->

            <div class="panel-hdr"><div class="panel-title">Executive access</div></div>
            <div class="cmp-row" onclick="window.location.href='/dashboard.html'">

    content.innerHTML = '<div style="padding:20px;font-family:var(--font-mono);font-size:11px;color:var(--compass-red)">Failed to load executive view</div>';

async function loadClientView() {

      API.get(`workflow_instances?select=id,title,status,current_step_name,current_step_id&project_id=eq.${clientProject.id}&status=eq.active`).catch(() => []),

// COMPLETION MICRO-PANEL
// Captures hours, signal (G/Y/R), and note on any work item
// completion. Writes time_entries + patches task/action item.
// ══════════════════════════════════════════════════════════

let _cmpSignal = null;   // 'green' | 'yellow' | 'red' | null
let _cmpItem   = null;   // { id, type, title, projectId }

function openCompletionPanel(item) {
  _cmpItem   = item;
  _cmpSignal = null;

  // Remove any existing panel (mutual exclusivity)
  document.getElementById('completion-micro-panel')?.remove();
  document.getElementById('inprogress-panel')?.remove();

  const today = new Date().toLocaleDateString('en-CA');

  const panel = document.createElement('div');
  panel.id = 'completion-micro-panel';
  panel.style.cssText = `
    grid-column: 1 / -1;
    border-bottom: 2px solid var(--compass-cyan);
    background: rgba(0,210,255,.03);
    padding: 12px 16px 14px;
    animation: micro-open 180ms ease;
  `;

  panel.innerHTML = `
    <div style="font-family:var(--font-head);font-size:11px;letter-spacing:.1em;
      text-transform:uppercase;color:var(--compass-cyan);margin-bottom:8px;font-weight:700">
      ${item.type === 'task' ? 'Complete task' : 'Resolve action item'} —

    </div>
    <div style="display:grid;grid-template-columns:105px 155px 1fr;gap:12px;align-items:start">
      <!-- Col 1: Hours -->

        <div style="font-family:var(--font-head);font-size:11px;color:var(--text3);

            padding:7px 10px;background:var(--bg2,#0c1628);
            border:1px solid var(--compass-cyan);color:var(--compass-cyan);
            outline:none;text-align:center;transition:border-color .15s"
          onfocus="this.style.borderColor='rgba(0,210,255,.8)'"
          onblur="this.style.borderColor='var(--compass-cyan)'" />
      </div>
      <!-- Col 2: Signal -->
      <div>
        <div style="font-family:var(--font-head);font-size:11px;color:var(--text3);
          letter-spacing:.07em;text-transform:uppercase;margin-bottom:8px">Signal</div>
        <div style="display:flex;gap:10px;align-items:center">
          <button id="cmp-sig-green" onclick="setCmpSignal('green')" title="On track"

              background:transparent;cursor:pointer;transition:all .12s"
            onmouseenter="this.style.background='rgba(29,158,117,.2)'"
            onmouseleave="this.style.background=_cmpSignal==='green'?'#1D9E75':'transparent'"></button>
          <button id="cmp-sig-yellow" onclick="setCmpSignal('yellow')" title="Some uncertainty"
            style="width:28px;height:28px;border-radius:50%;border:2px solid #EF9F27;
              background:transparent;cursor:pointer;transition:all .12s"
            onmouseenter="this.style.background='rgba(239,159,39,.2)'"
            onmouseleave="this.style.background=_cmpSignal==='yellow'?'#EF9F27':'transparent'"></button>
          <button id="cmp-sig-red" onclick="setCmpSignal('red')" title="Blocked or at risk"
            style="width:28px;height:28px;border-radius:50%;border:2px solid #E24B4A;
              background:transparent;cursor:pointer;transition:all .12s"
            onmouseenter="this.style.background='rgba(226,75,74,.2)'"
            onmouseleave="this.style.background=_cmpSignal==='red'?'#E24B4A':'transparent'"></button>

      <!-- Col 3: Note -->

        <button onclick="skipCompletion()"
          style="font-family:var(--font-head);font-size:11px;font-weight:600;
            letter-spacing:.07em;text-transform:uppercase;padding:6px 14px;
            background:none;border:1px solid var(--border);color:var(--text3);cursor:pointer;
            transition:all .12s"
          onmouseenter="this.style.borderColor='var(--text2)';this.style.color='var(--text1)'"
          onmouseleave="this.style.borderColor='var(--border)';this.style.color='var(--text3)'">

        </button>
        <button id="cmp-submit" onclick="submitCompletion()"
          style="font-family:var(--font-head);font-size:11px;font-weight:700;
            letter-spacing:.07em;text-transform:uppercase;padding:6px 18px;
            background:var(--compass-cyan,#00D2FF);color:#060a10;
            border:none;cursor:pointer;transition:opacity .12s"
          onmouseenter="this.style.opacity='.85'"
          onmouseleave="this.style.opacity='1'">
          Complete →
        </button>
      </div>
    </div>
  `;

  // Insert inline after the work row (spec: immediately after parent row)
  const wiRow = document.querySelector(`.wi-row[data-wi-id="${item.id}"]`);
  if (wiRow) {
    wiRow.insertAdjacentElement('afterend', panel);
  } else {
    // Fallback: append inside work-list-rows
    const listEl = document.getElementById('work-list-rows');
    if (listEl) listEl.appendChild(panel);
  }

  setTimeout(() => document.getElementById('cmp-hours')?.focus(), 80);
}



function setCmpSignal(sig) {
  _cmpSignal = _cmpSignal === sig ? null : sig;  // toggle
  const colors = { green:'#1D9E75', yellow:'#EF9F27', red:'#E24B4A' };
  ['green','yellow','red'].forEach(s => {
    const btn = document.getElementById(`cmp-sig-${s}`);
    if (btn) btn.style.background = _cmpSignal === s ? colors[s] : 'transparent';
  });
}

function closeCompletionPanel() {
  const panel = document.getElementById('completion-micro-panel');
  if (!panel) return;
  panel.style.transition = 'transform .15s ease, opacity .15s';
  panel.style.transform  = 'translateY(100%)';
  panel.style.opacity    = '0';
  setTimeout(() => panel.remove(), 160);
  _cmpItem   = null;
  _cmpSignal = null;
}

// Skip: mark done without logging time — writes completion_skip CoC event
async function skipCompletion() {
  const item = _cmpItem;
  if (!item) { closeCompletionPanel(); return; }

  closeCompletionPanel();

  const now = new Date();
  const timeStr = now.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true});
  const proj = item.projectId ? _projects?.find(p=>p.id===item.projectId) : null;

  // Add to _doneToday with noTime flag
  _doneToday.unshift({
    id: item.id, title: item.title, project: proj?.name || '—',
    time: timeStr, hours: 0, signal: null, noTime: true,
  });

  // Write completion_skip CoC event (non-fatal)
  try {
    await API.post('workflow_step_instances', {
      event_type:  'completion_skip',
      step_name:   item.title,
      event_notes: 'skip',
      created_at:  now.toISOString(),
      firm_id:     'aaaaaaaa-0001-0001-0001-000000000001',
    }).catch(()=>{});
  } catch(e) {}

  // Mark item done in DB (non-fatal)
  try {
    if (item.type === 'task') {

  // Inline Done Today update
  const dtList = document.getElementById('done-today-list');

    const newRow = document.createElement('div');

        <div style="font-family:var(--font-head);font-size:11px;color:var(--text3)">

  const ctr = document.getElementById('done-today-count');
  if (ctr) {
    ctr.textContent = _doneToday.length;
    const card = ctr.closest('.stat-done-today');
    if (card) { card.classList.add('stat-done-pulse'); setTimeout(()=>card.classList.remove('stat-done-pulse'),450); }

    setTimeout(() => { wiRow.remove(); }, 340);
  }

  compassToast(`${esc(item.title.slice(0,40))} — skipped (no time logged)`);
  setTimeout(() => { _viewLoaded['user'] = false; loadUserView(); }, 360);
}

async function submitCompletion() {
  const item = _cmpItem;
  if (!item) return;

  const hoursRaw = parseFloat(document.getElementById('cmp-hours')?.value || 0);
  const note     = (document.getElementById('cmp-note')?.value || '').trim();
  const billable = document.getElementById('cmp-billable')?.checked ?? true;
  const statusEl = document.getElementById('cmp-status');
  const submitBtn = document.getElementById('cmp-submit');

  // Validate: hours require a note
  if (hoursRaw > 0 && note.length < 10) {
    if (statusEl) statusEl.textContent = 'Add a note to log hours (10+ chars)';
    document.getElementById('cmp-note')?.focus();
    return;
  }

  if (submitBtn) { submitBtn.disabled = true; submitBtn.textContent = 'Saving…'; }
  if (statusEl)  statusEl.textContent = '';

  const today = new Date().toLocaleDateString('en-CA');
  const promises = [];

  // ── 1. Write time_entries row if hours logged ──────────────
  if (hoursRaw > 0) {
    promises.push(
      API.post('time_entries', {
        firm_id:     'aaaaaaaa-0001-0001-0001-000000000001',
        resource_id: _myResource?.id  || null,
        user_id:     _myResource?.user_id || null,
        project_id:  item.projectId   || null,
        task_id:     item.type === 'task'   ? item.id : null,
        source_type: 'direct',
        date:        today,
        hours:       hoursRaw,
        is_billable: billable,
        notes:       note || null,
      }).catch(() => {})
    );
  }

  // ── 2. Patch the work item status ──────────────────────────
  if (item.type === 'task') {
    promises.push(
      API.patch(`tasks?id=eq.${item.id}`, {
        status:       'complete',
        pct_complete: 100,
        updated_at:   new Date().toISOString(),
      }).catch(() => {})
    );
  } else if (item.type === 'action') {
    promises.push(
      API.patch(`workflow_action_items?id=eq.${item.id}`, {
        status:      'resolved',
        resolved_at: new Date().toISOString(),
        resolution_note: note || null,
      }).catch(() => {})
    );
  }

  try {
    await Promise.all(promises);
    closeCompletionPanel();

    // ── Add to Done Today (session-persistent) ────────────
    const now = new Date();
    const timeStr = now.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true});
    const proj = item.projectId ? _projects?.find(p=>p.id===item.projectId) : null;
    _doneToday.unshift({
      id: item.id, title: item.title, project: proj?.name || item.project || '—',
      time: timeStr, hours: hoursRaw, signal: _cmpSignal, noTime: hoursRaw === 0,
    });

    // ── Inline DOM update: Done Today panel ──────────────
    const dtList = document.getElementById('done-today-list');
    if (dtList) {
      const signalColor = _cmpSignal==='green'?'var(--compass-green)':_cmpSignal==='red'?'var(--compass-red)':'var(--compass-amber)';
      const newRow = document.createElement('div');
      newRow.style.cssText = 'display:flex;align-items:center;gap:8px;padding:7px 13px;border-bottom:1px solid var(--border);animation:micro-open 200ms ease';
      newRow.innerHTML = `
        <span style="color:var(--compass-green);font-size:13px;flex-shrink:0">✓</span>
        <div style="flex:1;min-width:0">
          <div style="font-family:var(--font-body);font-size:12px;font-weight:500;color:var(--text0);
            white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(item.title)}</div>
          <div style="font-family:var(--font-head);font-size:11px;color:var(--text3)">
            ${esc(proj?.name||'—')} · ${timeStr}${hoursRaw===0?' <span style="color:var(--text3)">· no time logged</span>':''}
          </div>
        </div>
        ${_cmpSignal ? `<div style="width:8px;height:8px;border-radius:50%;background:${signalColor};flex-shrink:0"></div>` : '<div style="width:8px;height:8px"></div>'}
        <div style="font-family:var(--font-display);font-size:13px;font-weight:700;
          color:${hoursRaw===0?'var(--text3)':'var(--compass-cyan)'};flex-shrink:0">
          ${hoursRaw===0?'—':hoursRaw.toFixed(1)+'h'}</div>`;
      // Remove empty state if present
      dtList.querySelector('div[style*="italic"]')?.remove();
      dtList.insertBefore(newRow, dtList.firstChild);
    }

    // ── Pulse Done Today counter ──────────────────────────
    const ctr = document.getElementById('done-today-count');
    if (ctr) {
      ctr.textContent = _doneToday.length;
      const card = ctr.closest('.stat-done-today');
      if (card) {
        card.classList.add('stat-done-pulse');
        setTimeout(()=>card.classList.remove('stat-done-pulse'), 450);
      }
    }

    // ── Fade out the completed row ────────────────────────
    const wiRow = document.querySelector(`.wi-row[data-wi-id="${item.id}"]`);
    if (wiRow) {
      wiRow.style.transition = 'opacity 320ms ease';
      wiRow.style.opacity = '0.3';
      setTimeout(() => {
        wiRow.remove();
        document.getElementById('inprogress-panel')?.remove();
      }, 340);
    }

    compassToast(`${esc(item.title.slice(0,40))} — marked complete`);
    // Defer full reload slightly so animation plays
    setTimeout(() => { _viewLoaded['user'] = false; loadUserView(); }, 360);
  } catch(e) {
    if (submitBtn) { submitBtn.disabled = false; submitBtn.textContent = 'Mark complete →'; }
    if (statusEl)  statusEl.textContent = 'Failed — try again';
  }
}

// ── Permanent delegated listeners — Session 16 ───────────
// All wired once at load; survive innerHTML re-renders.
document.addEventListener('change', function(ev) {
  const projSel = ev.target.closest('.wf-proj-sel');
  if (projSel) { _wfProject = projSel.value; _viewLoaded['user'] = false; loadUserView(); }
});

document.addEventListener('click', function(ev) {
  // ── Type filter (new in Session 16) ──────────────────────
  const typeBtn = ev.target.closest('.wf-type-btn');
  if (typeBtn) { _wfType = typeBtn.dataset.type; _viewLoaded['user'] = false; loadUserView(); return; }

  // ── Status filter ─────────────────────────────────────────
  const statusBtn = ev.target.closest('.wf-status-btn');
  if (statusBtn) { _wfStatus = statusBtn.dataset.status; _viewLoaded['user'] = false; loadUserView(); return; }

  // ── Date range filter ─────────────────────────────────────
  const dateBtn = ev.target.closest('.wf-date-btn');
  if (dateBtn) { _wfDateRange = dateBtn.dataset.range; _viewLoaded['user'] = false; loadUserView(); return; }

  // ── Gauge click — toggle activeGauge + filter time log ───
  const gaugeCol = ev.target.closest('.gauge-col');
  if (gaugeCol) {
    const d = gaugeCol.dataset.gaugeDate;
    _activeGauge = (_activeGauge === d) ? null : d;
    _teFilter = _activeGauge;
    _viewLoaded['user'] = false; loadUserView(); return;
  }

  // ── Gauge clear filter button ─────────────────────────────
  if (ev.target.closest('.gauge-clear-btn')) {
    _activeGauge = null; _teFilter = null;
    _viewLoaded['user'] = false; loadUserView(); return;
  }

  // ── Day dot click — open weekly drawer scrolled to that day ─
  const dayDot = ev.target.closest('.day-dot');
  if (dayDot) {
    openFullWeeklyTimesheet({ expandDay: dayDot.dataset.day }); return;
  }

  // ── Open weekly timesheet buttons ─────────────────────────
  if (ev.target.closest('.open-weekly-ts-btn')) {
    const btn = ev.target.closest('.open-weekly-ts-btn');
    openFullWeeklyTimesheet({ expandDay: btn.dataset.expandToday ? new Date().toLocaleDateString('en-CA') : null });
    return;
  }

  // ── Work item action button (new in Session 16) ───────────
  const actionBtn = ev.target.closest('.wi-action-btn');
  if (actionBtn) {
    ev.stopPropagation();
    const item = _wiItems.find(w => w.id === actionBtn.dataset.wiId);
    if (!item) return;
    const pct = parseInt(actionBtn.dataset.wiPct) || 0;
    const status = actionBtn.dataset.wiStatus;
    if (item.type === 'action' || pct >= 100) {
      openCompletionPanel({ id: item.id, type: item.type, title: item.title, projectId: item.projectId || null });
    } else if (status === 'blocked') {
      openInProgressPanel(item);
    } else {
      // Start or In Progress — open in-progress update panel
      openInProgressPanel(item);
    }
    return;
  }

  // ── Completion circle (new in Session 16) ────────────────
  const wiCircle = ev.target.closest('.wi-complete-circle');
  if (wiCircle) {
    ev.stopPropagation();
    const item = _wiItems.find(w => w.id === wiCircle.dataset.wiId);
    if (item) openCompletionPanel({ id: item.id, type: item.type, title: item.title, projectId: item.projectId || null });
    return;
  }

  // ── Legacy .wi-complete support ───────────────────────────
  const wiComplete = ev.target.closest('.wi-complete');
  if (wiComplete) {
    ev.stopPropagation();
    openCompletionPanel({ id: wiComplete.dataset.wiId, type: wiComplete.dataset.wiType,
      title: wiComplete.dataset.wiTitle, projectId: wiComplete.dataset.wiProjectid || null });
    return;
  }

  // ── Work item row — detail drawer ─────────────────────────
  const wiRow = ev.target.closest('.wi-row');
  if (wiRow && !ev.target.closest('.wi-action-btn') && !ev.target.closest('.wi-complete-circle')) {
    document.querySelectorAll('.wi-row').forEach(r => r.classList.remove('wi-selected'));
    wiRow.classList.add('wi-selected');
    const item = _wiItems.find(w => w.id === wiRow.dataset.wiId);
    if (item) openWorkItemDrawer(item);
    return;
  }

  // ── Clear time log filter ─────────────────────────────────
  if (ev.target.closest('.te-clear-filter')) { filterTimeLog(null); return; }

  // ── Legacy bar chart column filter ───────────────────────
  const barCol = ev.target.closest('.te-bar-col');
  if (barCol && barCol.dataset.hasHours === 'true') { filterTimeLog(barCol.dataset.date); return; }

  // ── Time log row ──────────────────────────────────────────
  const teRow = ev.target.closest('.te-row');
  if (teRow) {
    const teId  = teRow.dataset.teId;
    const isCad = teRow.dataset.teCadence === 'true';
    _teSelected = teId;
    document.querySelectorAll('.te-row').forEach(r => {
      const isThis = r.dataset.teId === teId;
      r.style.borderLeft = isThis ? '2px solid var(--compass-cyan)' : '2px solid transparent';
      r.style.background = isThis ? 'rgba(0,210,255,.04)' : '';
      r.onmouseleave = () => { r.style.background = isThis ? 'rgba(0,210,255,.04)' : ''; };
    });
    if (isCad) { window.location.href = '/cadence.html'; return; }
    const entry = _teEntries.find(e => e.id === teId);
    if (entry) {
      const proj = _projects.find(p => p.id === entry.project_id);
      openTimeEntryEdit({ id:entry.id, hours:entry.hours, notes:entry.notes||'',
        is_billable:entry.is_billable, date:entry.date, week_start_date:entry.week_start_date,
        project_id:entry.project_id, project_name:proj?.name||'—',
        step_name:entry.step_name||null, source_type:entry.source_type });
    }
    return;
  }

  // ── New time entry ────────────────────────────────────────
  if (ev.target.closest('.te-new-btn')) { openNewTimeEntry(); return; }

  // ── Legacy week footer button ─────────────────────────────
  if (ev.target.closest('.te-week-footer')) {
    const anyEntry = _teEntries[0];
    if (anyEntry) openWeeklyTimesheet(anyEntry);
    else compassToast('No entries this week', 2000);
    return;
  }

  // ── Timesheet submit ──────────────────────────────────────
  const tsSubmit = ev.target.closest('.ts-submit-btn');
  if (tsSubmit) {
    submitTimesheetWeek(tsSubmit.dataset.weekId, tsSubmit.dataset.weekStart, tsSubmit.dataset.weekHours);
    return;
  }
});

// ── Gauge dwell (900ms hover → Day Intelligence Briefing) ─
document.addEventListener('mouseover', function(ev) {
  const gc = ev.target.closest('.gauge-col');
  if (!gc) return;
  const d = gc.dataset.gaugeDate;
  if (!d) return;
  clearTimeout(_dwellTimer);
  _dwellTimer = setTimeout(() => {
    if (gc.matches(':hover') && gc.dataset.gaugeHasData === 'true') {
      openDayBriefing(d);

  }, 900);
});

  const gc = ev.target.closest('.gauge-col');
  if (gc) clearTimeout(_dwellTimer);
});

}

            padding:7px 16px;background:var(--compass-amber);color:#060a10;

async function saveInProgressUpdate(itemId, projectId) {
  const pct    = parseInt(document.getElementById('ip-pct')?.value) || 0;
  const hours  = parseFloat(document.getElementById('ip-hours')?.value || 0);
  const status = document.getElementById('ip-status')?.value || 'in_progress';
  const btn    = document.getElementById('ip-save-btn');
  if (btn) { btn.textContent = '…'; btn.disabled = true; }

  const today = new Date().toLocaleDateString('en-CA');
  try {
    const ps = [
      API.patch(`tasks?id=eq.${itemId}`, { pct_complete: pct, status, updated_at: new Date().toISOString() }).catch(()=>{})
    ];
    if (hours > 0 && _myResource?.id) {
      const id = crypto.randomUUID();
      ps.push(API.post('time_entries', {
        id, firm_id:'aaaaaaaa-0001-0001-0001-000000000001',
        resource_id: _myResource.id, user_id: _myResource.user_id || null,
        project_id: projectId || null, task_id: itemId, source_type:'direct',
        date: today, hours, is_billable: true
      }).catch(()=>{}));
    }
    await Promise.all(ps);
    document.getElementById('inprogress-panel')?.remove();
    compassToast('Progress updated');
    _viewLoaded['user'] = false; loadUserView();
  } catch(e) {
    if (btn) { btn.textContent = 'Save →'; btn.disabled = false; }
    compassToast('Failed — ' + e.message, 2500);
  }
}

// ══════════════════════════════════════════════════════════
// COMPONENT 1.F — Full Weekly Timesheet Drawer
// 640px right drawer · Project×Day grid + Day Accordion
// ══════════════════════════════════════════════════════════
function openFullWeeklyTimesheet({ expandDay = null } = {}) {
  document.getElementById('full-weekly-drawer')?.remove();

  const today = new Date().toLocaleDateString('en-CA');
  const todayDt = new Date(today + 'T00:00:00');
  const isoOff = todayDt.getDay() === 0 ? 6 : todayDt.getDay() - 1;
  const wkStart = new Date(todayDt); wkStart.setDate(todayDt.getDate() - isoOff);
  const weekStartStr = wkStart.toLocaleDateString('en-CA');
  const weekDays = Array.from({length:5},(_,i) => {
    const d = new Date(wkStart); d.setDate(wkStart.getDate()+i);
    return d.toLocaleDateString('en-CA');
  });
  const dayNames = ['Mon','Tue','Wed','Thu','Fri'];
  const expandTarget = expandDay || today;

  // Compute per-day per-project hours from cached entries
  const weekEntries = _teEntries.filter(e => weekDays.includes(e.date));
  const weekBillable = weekEntries.filter(e=>e.is_billable).reduce((s,e)=>s+parseFloat(e.hours||0),0);
  const weekNonBill = weekEntries.filter(e=>!e.is_billable).reduce((s,e)=>s+parseFloat(e.hours||0),0);
  const weekTotal = weekBillable + weekNonBill;

  // Project set from entries
  const projIds = [...new Set(weekEntries.map(e=>e.project_id).filter(Boolean))];
  const gridProjects = projIds.map(pid => _projects.find(p=>p.id===pid)).filter(Boolean);

  // Day totals
  const dayTotals = {};
  weekDays.forEach(d => { dayTotals[d] = weekEntries.filter(e=>e.date===d).reduce((s,e)=>s+parseFloat(e.hours||0),0); });

  // ── Project × Day Grid ────────────────────────────────────
  function cellHtml(hrs, d) {
    const isPast = d < today; const isToday = d === today; const isFuture = d > today;
    if (isFuture) return `<span style="font-family:var(--font-head);font-size:11px;color:var(--text3)">—</span>`;
    if (hrs > 0) {
      const c = isToday ? 'var(--compass-cyan)' : 'var(--compass-green)';
      const mark = isToday ? '■' : '✓';
      return `<span style="font-family:var(--font-head);font-size:12px;font-weight:700;color:${c}">${hrs.toFixed(1)}h ${mark}</span>`;
    }
    if (isPast) return `<span style="font-family:var(--font-head);font-size:12px;font-weight:700;color:var(--compass-red)">0h !</span>`;
    return `<span style="font-family:var(--font-head);font-size:11px;color:var(--text3)">—</span>`;
  }

  const gridHtml = `
    <div style="overflow-x:auto;margin-bottom:0">
      <table style="width:100%;border-collapse:collapse;font-family:var(--font-head);font-size:12px">
        <thead>
          <tr style="border-bottom:1px solid var(--border)">
            <th style="text-align:left;padding:6px 13px;font-weight:700;color:var(--text3);
              font-size:11px;letter-spacing:.07em">PROJECT</th>
            ${weekDays.map((d,i) => `<th style="text-align:center;padding:6px 8px;font-weight:700;
              color:${d===today?'var(--compass-cyan)':d<today?'var(--text2)':'var(--text3)'};font-size:11px">${dayNames[i]}</th>`).join('')}
            <th style="text-align:right;padding:6px 13px 6px 0;font-weight:700;color:var(--text3);font-size:11px">TOTAL</th>
          </tr>
        </thead>
        <tbody>
          ${gridProjects.map(proj => {
            const rowEntries = weekEntries.filter(e=>e.project_id===proj.id);
            const rowTotal = rowEntries.reduce((s,e)=>s+parseFloat(e.hours||0),0);
            return `<tr style="border-bottom:1px solid rgba(0,210,255,.06);cursor:pointer"
              onclick="document.querySelector('.day-acc-header[data-day=\\'${today}\\']')?.click()">
              <td style="padding:7px 13px;color:var(--text1);white-space:nowrap;overflow:hidden;
                text-overflow:ellipsis;max-width:160px">${esc(proj.name)}</td>
              ${weekDays.map(d => {
                const hrs = rowEntries.filter(e=>e.date===d).reduce((s,e)=>s+parseFloat(e.hours||0),0);
                return `<td style="text-align:center;padding:7px 8px">${cellHtml(hrs,d)}</td>`;
              }).join('')}
              <td style="text-align:right;padding:7px 13px 7px 0;font-family:var(--font-display);
                font-size:13px;font-weight:700;color:var(--compass-cyan)">${rowTotal.toFixed(1)}h</td>
            </tr>`;
          }).join('')}
          ${gridProjects.length === 0 ? `<tr><td colspan="${weekDays.length+2}" style="padding:12px 13px;
            color:var(--text3);font-family:var(--font-head);font-size:12px">No time entries this week</td></tr>` : ''}

              font-size:14px;font-weight:700;color:var(--compass-cyan)">${weekTotal.toFixed(1)}h</td>
          </tr>
        </tfoot>
      </table>
      <div style="padding:4px 13px 6px;font-family:var(--font-head);font-size:11px;color:var(--text3)">
        ✓ Complete · ■ Today · ! No entries · Legend
      </div>
    </div>`;

          text-transform:uppercase;color:var(--text3);padding:0 13px 8px">Daily Breakdown</div>
        ${accordionHtml}
      </div>
    </div>

    <!-- Footer -->
    <div style="padding:12px 16px;border-top:1px solid var(--border);
      display:flex;align-items:center;justify-content:space-between;flex-shrink:0">
      <div style="font-family:var(--font-head);font-size:13px;font-weight:700;color:var(--text1)">
        <span>Week total: </span>
        <span style="color:var(--compass-cyan)">${weekTotal.toFixed(1)}h</span>
        <span style="color:var(--text3);font-size:11px;margin-left:8px">
          ${weekBillable.toFixed(1)}h billable · ${weekNonBill.toFixed(1)}h non-bill
        </span>
      </div>
      <div style="display:flex;gap:8px">
        <button class="te-new-btn"
          style="font-family:var(--font-head);font-size:11px;font-weight:700;letter-spacing:.06em;
            color:var(--compass-cyan);background:none;border:1px solid rgba(0,210,255,.3);
            padding:7px 14px;cursor:pointer;transition:background .12s"
          onmouseenter="this.style.background='rgba(0,210,255,.08)'"
          onmouseleave="this.style.background='none'">+ Log time</button>
        <button class="ts-submit-wts-btn"
          style="font-family:var(--font-head);font-size:11px;font-weight:700;letter-spacing:.06em;
            padding:7px 16px;background:var(--compass-cyan);color:#060a10;
            border:none;cursor:pointer;transition:opacity .12s"
          onmouseenter="this.style.opacity='.85'" onmouseleave="this.style.opacity='1'">Submit week →</button>
      </div>
    </div>`;

  document.body.appendChild(drawer);

  // ── Drawer event listeners ────────────────────────────────
  drawer.addEventListener('click', async ev => {
    // Add time button
    const addBtn = ev.target.closest('.acc-add-btn');
    if (addBtn) {
      const d = addBtn.dataset.day;
      const desc = drawer.querySelector(`.acc-desc-inp[data-day="${d}"]`)?.value?.trim() || '';
      const hrs  = parseFloat(drawer.querySelector(`.acc-hrs-inp[data-day="${d}"]`)?.value || 0);
      const proj = drawer.querySelector(`.acc-proj-sel[data-day="${d}"]`)?.value || '';
      const bill = drawer.querySelector(`.acc-bill-chk[data-day="${d}"]`)?.checked ?? true;
      if (!hrs || hrs <= 0) { compassToast('Hours required', 2000); return; }
      if (!proj) { compassToast('Project required', 2000); return; }
      addBtn.textContent = '…'; addBtn.disabled = true;
      try {
        const id = crypto.randomUUID();
        await API.post('time_entries', {
          id, firm_id:'aaaaaaaa-0001-0001-0001-000000000001',
          resource_id: _myResource?.id, user_id: _myResource?.user_id||null,
          project_id: proj, source_type:'direct', date: d, hours: hrs,
          is_billable: bill, notes: desc || null
        });
        compassToast('Entry added');
        drawer.remove();
        _viewLoaded['user'] = false; loadUserView();
        // Re-open to same day
        setTimeout(() => openFullWeeklyTimesheet({ expandDay: d }), 400);
      } catch(e) {
        addBtn.textContent = 'Add →'; addBtn.disabled = false;
        compassToast('Failed — ' + e.message, 2500);
      }
    }

    // Delete entry
    const delBtn = ev.target.closest('[data-te-del]');
    if (delBtn) {
      if (!confirm('Delete this entry?')) return;
      try {
        await API.del('time_entries?id=eq.'+delBtn.dataset.teDel);
        compassToast('Deleted');
        const expandedDay = drawer.querySelector('.day-acc-body[style*="block"]')?.closest('.day-accordion')?.dataset?.day || today;
        drawer.remove(); _viewLoaded['user'] = false; loadUserView();
        setTimeout(() => openFullWeeklyTimesheet({ expandDay: expandedDay }), 400);
      } catch(e) { compassToast('Failed', 2000); }
    }

    // Mark today complete
    if (ev.target.closest('.mark-today-complete-btn')) {
      const todayHrs = dayTotals[today] || 0;
      try {
        await API.post('workflow_step_instances', {
          event_type: 'daily_timesheet_complete',
          event_notes: todayHrs.toFixed(1),
          created_at: new Date().toISOString(),
          firm_id: 'aaaaaaaa-0001-0001-0001-000000000001',
        }).catch(()=>{});
        compassToast('Today marked complete ✓');
        drawer.remove(); _viewLoaded['user'] = false; loadUserView();
      } catch(e) { compassToast('Saved locally', 2000); drawer.remove(); }
    }

    // Submit week
    if (ev.target.closest('.ts-submit-wts-btn')) {
      drawer.remove();
      // Find week ID from cached entries
      const wkEntry = _teEntries.find(e => weekDays.includes(e.date));
      submitTimesheetWeek('', weekDays[0], weekTotal.toFixed(1));
    }
  });

  // Close on overlay click
  setTimeout(() => {
    document.addEventListener('mousedown', function closeWTS(ev) {
      if (!drawer.contains(ev.target)) {
        drawer.remove();
        document.removeEventListener('mousedown', closeWTS);
      }
    });
  }, 50);
}

  if (!document.getElementById('db-style')) {

    background:var(--bg1,#0c1628);border-left:1px solid var(--border);
    box-shadow:-10px 0 32px rgba(0,0,0,.5);display:flex;flex-direction:column;
    animation:db-slide .22s ease;`;

  drawer.innerHTML = `
    <div style="flex-shrink:0;padding:12px 16px 10px;border-bottom:1px solid var(--border)">
      <div style="font-family:var(--font-head);font-size:12px;font-weight:700;
        letter-spacing:1.5px;text-transform:uppercase;color:var(--compass-cyan);margin-bottom:2px">
        Day Intelligence Briefing</div>
      <div style="display:flex;align-items:baseline;justify-content:space-between">

      compassToast('Entry added');
      drawer.remove();
      _viewLoaded['user']=false; loadUserView();
    } catch(e) {
      btn.textContent='Add Entry →'; btn.disabled=false;
      if(statusEl) statusEl.textContent='Failed — '+e.message;

// ── Legacy Weekly Timesheet (entry-based) ─────────────────
function openWeeklyTimesheet(entry) {
  document.getElementById('te-edit-drawer')?.remove();

  const weekEntries = _teEntries.filter(e =>
    entry.week_start_date ? e.week_start_date === entry.week_start_date
      : e.date?.slice(0,7) === entry.date?.slice(0,7)
  ).sort((a,b) => a.date.localeCompare(b.date) || a.id.localeCompare(b.id));

  const weekTotal = weekEntries.reduce((s,e) => s + parseFloat(e.hours||0), 0);
  const weekLabel = (() => {
    if (!entry.week_start_date) return fmtDate(entry.date);
    const ws = new Date(entry.week_start_date+'T00:00:00');
    return ws.toLocaleDateString('en-US',{month:'short',day:'numeric'})
      + ' – ' + new Date(ws.getTime()+6*86400000).toLocaleDateString('en-US',{month:'short',day:'numeric'});
  })();

  const drawer = document.createElement('div');
  drawer.id = 'te-edit-drawer';

    const dayName  = new Date(e.date+'T00:00:00').toLocaleDateString('en-US',{weekday:'short',day:'numeric',month:'short'});

          flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">

          style="background:none;border:none;color:rgba(226,75,74,.4);font-size:12px;
            cursor:pointer;padding:0;line-height:1;flex-shrink:0"

      </div>
      <div style="display:grid;grid-template-columns:68px 1fr 24px 48px;gap:6px;align-items:center">

          value="${parseFloat(e.hours).toFixed(2)}" ${!isDirect ? 'readonly' : ''}
          data-id="${e.id}" data-f="hours"
          style="font-family:var(--font-mono);font-size:13px;font-weight:600;padding:5px 6px;

          <input type="checkbox" ${e.is_billable ? 'checked' : ''} ${!isDirect ? 'disabled' : ''}
            data-id="${e.id}" data-f="billable"
            style="accent-color:var(--compass-cyan);width:13px;height:13px"/>
        </label>
        ${isDirect
          ? `<button data-save="${e.id}"
              style="font-family:var(--font-mono);font-size:11px;font-weight:600;padding:5px 0;
                background:var(--compass-cyan);color:#060a10;border:none;cursor:pointer;width:100%"
              onmouseenter="this.style.opacity='.85'" onmouseleave="this.style.opacity='1'">Save</button>`
          : `<span style="font-family:var(--font-mono);font-size:11px;color:var(--text3);text-align:center">${srcIcon}</span>`}
      </div>
    </div>`;
  }).join('');

  drawer.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;
      padding:14px 16px 10px;border-bottom:1px solid var(--border);flex-shrink:0">
      <div>
        <div style="font-family:var(--font-mono);font-size:11px;letter-spacing:.1em;
          text-transform:uppercase;color:var(--compass-cyan);margin-bottom:2px">Timesheet</div>
        <div style="font-family:var(--font-ui);font-size:13px;font-weight:500;color:var(--text0)">
          Week of ${weekLabel}</div>
        <div style="font-family:var(--font-mono);font-size:11px;color:var(--text3);margin-top:2px">
          ${weekEntries.length} ${weekEntries.length === 1 ? 'entry' : 'entries'} ·
          <span style="color:var(--compass-cyan);font-weight:600">${weekTotal.toFixed(1)}h</span>
        </div>
      </div>
      <button onclick="document.getElementById('te-edit-drawer').remove()"
        style="background:none;border:none;color:var(--text3);font-size:18px;cursor:pointer;padding:0;line-height:1"
        onmouseenter="this.style.color='var(--text0)'" onmouseleave="this.style.color='var(--text3)'">✕</button>
    </div>
    <div style="display:grid;grid-template-columns:68px 1fr 24px 48px;gap:6px;
      padding:5px 16px;border-bottom:1px solid var(--border);flex-shrink:0;
      font-family:var(--font-mono);font-size:11px;color:var(--text3);
      letter-spacing:.07em;text-transform:uppercase">
      <span>Hours</span><span>Notes</span>
      <span style="text-align:center">Bill</span><span></span>
    </div>
    <div style="flex:1;overflow-y:auto">
      ${rowHtml || '<div style="padding:20px 16px;font-family:var(--font-mono);font-size:11px;color:var(--text3)">No entries this week</div>'}
    </div>
    <div style="padding:10px 16px;border-top:1px solid var(--border);
      display:flex;align-items:center;justify-content:space-between;flex-shrink:0">
      <button class="te-new-btn"
        style="font-family:var(--font-mono);font-size:11px;font-weight:600;letter-spacing:.06em;
          color:var(--compass-cyan);background:none;border:1px solid rgba(0,210,255,.25);
          padding:5px 12px;cursor:pointer"
        onmouseenter="this.style.background='rgba(0,210,255,.08)'"
        onmouseleave="this.style.background='none'">+ Log time</button>
      <button onclick="document.getElementById('te-edit-drawer').remove()"
        style="font-family:var(--font-mono);font-size:11px;padding:5px 14px;background:none;
          border:1px solid var(--border);color:var(--text3);cursor:pointer">Close</button>
    </div>`;

  document.body.appendChild(drawer);

  drawer.addEventListener('click', async ev => {
    const saveBtn = ev.target.closest('[data-save]');
    if (saveBtn) {
      const id    = saveBtn.dataset.save;
      const hours = parseFloat(drawer.querySelector('[data-id="'+id+'"][data-f="hours"]')?.value);
      const notes = drawer.querySelector('[data-id="'+id+'"][data-f="notes"]')?.value?.trim() || null;
      const bill  = drawer.querySelector('[data-id="'+id+'"][data-f="billable"]')?.checked ?? true;
      if (!hours || hours <= 0) { compassToast('Hours must be > 0', 2000); return; }
      saveBtn.textContent = '…'; saveBtn.disabled = true;
      try {
        await API.patch('time_entries?id=eq.'+id, { hours, notes, is_billable: bill, updated_at: new Date().toISOString() });
        compassToast('Saved'); _viewLoaded['user'] = false; drawer.remove(); loadUserView();
      } catch(e) { saveBtn.textContent = 'Save'; saveBtn.disabled = false; compassToast('Failed', 2000); }
    }
    const delBtn = ev.target.closest('[data-del]');
    if (delBtn) {
      if (!confirm('Delete this entry?')) return;
      try {
        await API.del('time_entries?id=eq.'+delBtn.dataset.del);
        compassToast('Deleted'); _viewLoaded['user'] = false; drawer.remove(); loadUserView();
      } catch(e) { compassToast('Failed', 2000); }
    }
  });

  setTimeout(() => {
    document.addEventListener('mousedown', function closeTEW(ev) {
      if (!drawer.contains(ev.target)) { drawer.remove(); document.removeEventListener('mousedown', closeTEW); }
    });
  }, 50);
}

// ── Work Item Detail Drawer ───────────────────────────────

  const projectUrl = item.projectId ? `/project-detail.html?id=${item.projectId}` : '/projects.html';

    ? `/project-detail.html?id=${item.projectId}&task=${item.id}`
    : null;

  drawer.innerHTML = `
    <div style="display:flex;align-items:flex-start;justify-content:space-between;
      padding:16px 16px 12px;border-bottom:1px solid var(--border);flex-shrink:0">
      <div style="flex:1;min-width:0">
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">
          <div style="width:8px;height:8px;border-radius:50%;flex-shrink:0;background:${dotColor}"></div>
          <span style="font-family:var(--font-mono);font-size:11px;letter-spacing:.08em;

        <div style="font-family:var(--font-ui);font-size:14px;font-weight:600;

        <div style="font-family:var(--font-mono);font-size:11px;color:var(--text3);margin-top:4px">
          ${esc(item.project)}${item.due ? ' · Due ' + fmtDate(item.due) : ''}
        </div>
      </div>
      <button onclick="document.getElementById('wi-drawer').remove()"
        style="background:none;border:none;color:var(--text3);font-size:18px;
          cursor:pointer;padding:0 0 0 12px;line-height:1;flex-shrink:0"
        onmouseenter="this.style.color='var(--text0)'"
        onmouseleave="this.style.color='var(--text3)'">✕</button>
    </div>

    <div style="flex:1;overflow-y:auto;padding:16px">

      ${item.pct > 0 ? `
      <div style="margin-bottom:16px">
        <div style="display:flex;justify-content:space-between;
          font-family:var(--font-mono);font-size:11px;color:var(--text3);margin-bottom:5px">
          <span>Progress</span><span style="color:var(--compass-cyan)">${item.pct}%</span>
        </div>
        <div style="height:4px;background:var(--bg2);border-radius:2px;overflow:hidden">
          <div style="height:100%;width:${item.pct}%;background:var(--compass-cyan);
            border-radius:2px;transition:width .3s"></div>
        </div>
      </div>` : ''}

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px">
        <div style="background:var(--bg2);padding:10px 12px;border:1px solid var(--border)">
          <div style="font-family:var(--font-mono);font-size:11px;color:var(--text3);
            letter-spacing:.08em;text-transform:uppercase;margin-bottom:3px">Status</div>
          <div style="font-family:var(--font-ui);font-size:12px;font-weight:500;
            color:var(--text0);text-transform:capitalize">${(item.status || 'open').replace('_',' ')}</div>
        </div>
        <div style="background:var(--bg2);padding:10px 12px;border:1px solid var(--border)">
          <div style="font-family:var(--font-mono);font-size:11px;color:var(--text3);

            color:${item.overdue ? 'var(--compass-red)' : 'var(--text0)'}">

        letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px">Actions</div>

        id: item.id, type: item.type, title: item.title, projectId: item.projectId || null

// ── New Direct Time Entry ─────────────────────────────────
function openNewTimeEntry(taskId = null, projectId = null) {
  document.getElementById('te-edit-drawer')?.remove();
  document.getElementById('wi-drawer')?.remove();

  const drawer = document.createElement('div');
  drawer.id = 'te-edit-drawer';
  drawer.style.cssText = `
    position:fixed;top:0;right:0;bottom:0;width:320px;z-index:600;
    background:var(--bg1,#0c1628);
    border-left:1px solid var(--border,rgba(0,210,255,.12));
    box-shadow:-8px 0 32px rgba(0,0,0,.5);
    display:flex;flex-direction:column;
    animation:te-slide-in .2s ease;
  `;

  const today = new Date().toLocaleDateString('en-CA');

  drawer.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;
      padding:16px 16px 12px;border-bottom:1px solid var(--border);flex-shrink:0">
      <div>
        <div style="font-family:var(--font-mono);font-size:11px;letter-spacing:.1em;
          text-transform:uppercase;color:var(--compass-cyan);margin-bottom:3px">Log time</div>
        <div style="font-family:var(--font-ui);font-size:13px;font-weight:500;color:var(--text0)">
          New time entry</div>
      </div>
      <button onclick="document.getElementById('te-edit-drawer').remove()"
        style="background:none;border:none;color:var(--text3);font-size:18px;
          cursor:pointer;padding:0;line-height:1"
        onmouseenter="this.style.color='var(--text0)'"

    <div style="flex:1;overflow-y:auto;padding:16px">
      <div style="margin-bottom:14px">
        <label class="te-label">Date</label>
        <input id="te-new-date" class="te-input" type="date" value="${today}" />
      </div>
      <div style="margin-bottom:14px">
        <label class="te-label">Project</label>
        <select id="te-new-project" class="te-input" style="font-size:12px">

        <label class="te-label">Notes</label>
        <textarea id="te-new-notes" class="te-input" rows="3"
          style="resize:vertical;min-height:70px"
          placeholder="What did you work on?"></textarea>
      </div>
      <div style="margin-bottom:14px">

          <input id="te-new-billable" type="checkbox" checked

          text-transform:uppercase;padding:7px 14px;background:none;
          border:1px solid var(--border);color:var(--text3);cursor:pointer">Cancel</button>

        style="flex:1;font-family:var(--font-mono);font-size:11px;font-weight:600;
          letter-spacing:.08em;text-transform:uppercase;padding:7px;
          background:var(--compass-cyan);color:#060a10;border:none;cursor:pointer"

  document.body.appendChild(drawer);

        drawer.remove();
        document.removeEventListener('mousedown', closeTENew);
      }
    });
  }, 50);
}

async function saveNewTimeEntry(taskId, projectId) {
  const date     = document.getElementById('te-new-date')?.value;
  const projId   = document.getElementById('te-new-project')?.value || projectId || null;
  const hours    = parseFloat(document.getElementById('te-new-hours')?.value);
  const notes    = document.getElementById('te-new-notes')?.value?.trim() || null;
  const billable = document.getElementById('te-new-billable')?.checked ?? true;
  const statusEl = document.getElementById('te-new-status');

  if (!date)            { if(statusEl) statusEl.textContent = 'Date required'; return; }
  if (!hours || hours <= 0) { if(statusEl) statusEl.textContent = 'Hours required'; return; }
  if (!projId)          { if(statusEl) statusEl.textContent = 'Project required'; return; }

  try {
    await API.post('time_entries', {
      firm_id:     'aaaaaaaa-0001-0001-0001-000000000001',
      resource_id: _myResource?.id   || null,
      user_id:     _myResource?.user_id || null,
      project_id:  projId,
      task_id:     taskId || null,
      source_type: 'direct',
      date,
      hours,
      is_billable: billable,
      notes,
    });
    document.getElementById('te-edit-drawer')?.remove();
    compassToast('Time entry saved');
    _viewLoaded['user'] = false;
    loadUserView();
  } catch(e) {
    if(statusEl) statusEl.textContent = 'Failed — ' + e.message;
  }
}

// ── Timesheet Week Submit ─────────────────────────────────
async function submitTimesheetWeek(weekId, weekStart, weekHours) {
  const note = prompt(`Submit ${weekHours}h for week of ${weekStart} for approval?\n\nAdd a note (optional):`);
  if (note === null) return; // cancelled

  try {
    if (weekId) {
      // Week container exists — update status to submitted
      await API.patch(`timesheet_weeks?id=eq.${weekId}`, {
        status:       'submitted',
        submitted_at: new Date().toISOString(),
        resource_notes: note || null,
        updated_at:   new Date().toISOString(),
      });
    } else {
      // No week container yet — create it as submitted
      await API.post('timesheet_weeks', {
        firm_id:        'aaaaaaaa-0001-0001-0001-000000000001',
        resource_id:    _myResource?.id,
        week_start_date: weekStart,
        week_end_date:  new Date(new Date(weekStart+'T00:00:00').getTime() + 6*86400000).toLocaleDateString('en-CA'),
        total_hours:    parseFloat(weekHours),
        status:         'submitted',
        submitted_at:   new Date().toISOString(),
        resource_notes: note || null,
      });
    }
    compassToast('Timesheet submitted for approval');
    _viewLoaded['user'] = false;
    loadUserView();
  } catch(e) {
    compassToast('Submit failed — ' + e.message, 3000);
  }
}
