async function loadManagementView() {
  const content = document.getElementById('mgmt-content');

  try {
    const [wfInstances, resourceReqs, cocEvents] = await Promise.all([
      API.get('workflow_instances?select=id,title,status,project_id,current_step_name&status=eq.active&limit=50').catch(() => []),
      API.get('resource_requests?select=id,project_id,status,created_at,submitted_at&status=eq.pending&order=submitted_at.asc&limit=20').catch(() => []),
      API.get('workflow_step_instances?select=id,instance_id,event_type,outcome,created_at,template_step_id&event_type=in.(step_completed,step_reset)&order=created_at.desc&limit=200').catch(() => []),
    ]);

    const activeProjects = _projects.filter(p => p.status === 'active');

    // Compute rework counts per project
    const reworkByProject = {};
    cocEvents.forEach(e => {
      const inst = wfInstances.find(w => w.id === e.instance_id);
      if (!inst?.project_id) return;
      if (!reworkByProject[inst.project_id]) reworkByProject[inst.project_id] = 0;
      if (e.event_type === 'step_reset') reworkByProject[inst.project_id]++;
    });

    const pendingReqs = resourceReqs.length;
    const totalRework = Object.values(reworkByProject).reduce((s, v) => s + v, 0);

    content.innerHTML = `
      <div class="stat-strip stat-strip-4" style="margin-bottom:16px">
        <div class="stat-card">
          <div class="stat-label">Decisions pending</div>
          <div class="stat-value ${pendingReqs > 0 ? 'sv-red' : 'sv-green'}">${pendingReqs}</div>
          <div class="stat-sub">resource requests</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Active projects</div>
          <div class="stat-value sv-cyan">${activeProjects.length}</div>
          <div class="stat-sub">firm-wide</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Active workflows</div>
          <div class="stat-value sv-amber">${wfInstances.length}</div>
          <div class="stat-sub">running instances</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Rework cycles — recent</div>
          <div class="stat-value ${totalRework > 5 ? 'sv-red' : totalRework > 2 ? 'sv-amber' : 'sv-green'}">${totalRework}</div>
          <div class="stat-sub">step resets / rejections</div>
        </div>
      </div>

      <div class="two-col">
        <div>
          <!-- Portfolio health grid -->
          <div class="cmp-panel" style="margin-bottom:14px">
            <div class="panel-hdr">
              <div class="panel-title">Portfolio health</div>
              <span class="panel-badge pb-cyan">${activeProjects.length} projects</span>
            </div>
            <div style="overflow-x:auto">
              <table style="width:100%;border-collapse:collapse;font-family:var(--font-mono);font-size:11px">
                <thead>
                  <tr style="border-bottom:1px solid var(--border)">
                    <th style="padding:7px 13px;text-align:left;color:var(--text3);font-weight:600;letter-spacing:.08em">PROJECT</th>
                    <th style="padding:7px 8px;text-align:center;color:var(--text3);font-weight:600;letter-spacing:.08em">WORKFLOWS</th>
                    <th style="padding:7px 8px;text-align:center;color:var(--text3);font-weight:600;letter-spacing:.08em">REWORK</th>
                    <th style="padding:7px 8px;text-align:center;color:var(--text3);font-weight:600;letter-spacing:.08em">STATUS</th>
                  </tr>
                </thead>
                <tbody>
                  ${activeProjects.map(p => {
                    const insts   = wfInstances.filter(w => w.project_id === p.id);
                    const rework  = reworkByProject[p.id] || 0;
                    const healthy = insts.length === 0 && rework === 0;
                    const atRisk  = rework > 2 || insts.length > 3;
                    const statusColor = atRisk ? 'var(--compass-red)' : healthy ? 'var(--compass-green)' : 'var(--compass-amber)';
                    return `
                    <tr style="border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s"
                      onmouseenter="this.style.background='var(--bg2)'"
                      onmouseleave="this.style.background=''"
                      onclick="window.location.href='/project-detail.html?id=${p.id}'">
                      <td style="padding:8px 13px;color:var(--text0);font-family:var(--font-ui);font-size:12px;font-weight:500">${esc(p.name)}</td>
                      <td style="padding:8px;text-align:center;color:${insts.length > 0 ? 'var(--compass-amber)' : 'var(--text3)'}">${insts.length || '—'}</td>
                      <td style="padding:8px;text-align:center;color:${rework > 0 ? 'var(--compass-red)' : 'var(--text3)'}">${rework > 0 ? rework : '—'}</td>
                      <td style="padding:8px;text-align:center">
                        <div style="width:10px;height:10px;border-radius:50%;background:${statusColor};margin:0 auto"></div>
                      </td>
                    </tr>`;
                  }).join('')}
                </tbody>
              </table>
            </div>
          </div>

          <!-- Pending resource requests -->
          <div class="cmp-panel">
            <div class="panel-hdr">
              <div class="panel-title">Resource requests pending approval</div>
              ${pendingReqs > 0 ? `<span class="panel-badge pb-red">${pendingReqs} pending</span>` : '<span class="panel-badge pb-green">None pending</span>'}
            </div>
            ${resourceReqs.length === 0

              : resourceReqs.map(r => {
                const proj = _projects.find(p => p.id === r.project_id);

              <div style="flex:1"><div class="row-title">Cadence — Workflow Intelligence →</div><div class="row-sub">DAG canvas, rework history, AI briefing</div></div>
            </div>
            <div class="cmp-row" onclick="window.location.href='/resources.html'">
              <div style="flex:1"><div class="row-title">Resources →</div><div class="row-sub">Team allocation, capacity, utilization</div></div>
            </div>
            <div class="cmp-row" onclick="window.location.href='/resource-requests.html'">

            <div class="cmp-row" onclick="window.location.href='/risk-register.html'">
              <div style="flex:1"><div class="row-title">Risk register →</div><div class="row-sub">Firm-wide risk landscape</div></div>
            </div>
          </div>

          <!-- Rework summary by project -->
          <div class="cmp-panel">
            <div class="panel-hdr"><div class="panel-title">Rework cycles — by project</div></div>
            ${Object.entries(reworkByProject).length === 0
              ? '<div style="padding:12px 13px;font-family:var(--font-mono);font-size:11px;color:var(--text3)">No rework cycles recorded</div>'
              : Object.entries(reworkByProject)
                  .sort(([,a],[,b]) => b - a)
                  .slice(0, 6)

                    const proj = _projects.find(p => p.id === projId);
                    const max  = Math.max(...Object.values(reworkByProject));

                        <div class="budget-fill" style="width:${pct}%;background:${count > 3 ? 'var(--compass-red)' : 'var(--compass-amber)'}"></div>
                      </div>
                    </div>`;
                  }).join('')
            }

  } catch (e) {
    console.error('[Compass] loadManagementView error:', e);
    content.innerHTML = '<div style="padding:20px;font-family:var(--font-mono);font-size:11px;color:var(--compass-red)">Failed to load management view</div>';
  }
}

async function approveResourceRequest(reqId, btn) {
  if (btn) { btn.disabled = true; btn.textContent = 'Approving…'; }
  try {
    await API.patch(`resource_requests?id=eq.${reqId}`, { status: 'approved' });
    compassToast('Resource request approved');
    const row = btn?.closest('.action-row');
    if (row) { row.style.transition = 'opacity .3s'; row.style.opacity = '0'; setTimeout(() => row.remove(), 300); }
  } catch (e) {
    compassToast('Failed to approve — check console');
    if (btn) { btn.disabled = false; btn.textContent = 'Approve'; }
  }
}

          <div class="stat-sub">resource requests</div>

              </div>
              <div style="font-family:var(--font-mono);font-size:11px;letter-spacing:.12em;color:var(--compass-amber);margin-bottom:5px;text-transform:uppercase">Financial signal</div>
              <div style="font-family:var(--font-ui);font-size:11px;color:var(--text2);line-height:1.55;margin-bottom:5px">

async function loadClientView() {

      API.get(`workflow_instances?select=id,title,status,current_step_name,current_step_id&project_id=eq.${clientProject.id}&status=eq.active`).catch(() => []),

function sendClientMessage() {
  const inp = document.getElementById('client-msg');

  compassToast('Message sent to project manager');
  if (inp) inp.value = '';
}

// COMPLETION MICRO-PANEL
// Captures hours, signal (G/Y/R), and note on any work item
// completion. Writes time_entries + patches task/action item.
// ══════════════════════════════════════════════════════════

let _cmpSignal = null;   // 'green' | 'yellow' | 'red' | null
let _cmpItem   = null;   // { id, type, title, projectId }

function openCompletionPanel(item) {
  _cmpItem   = item;
  _cmpSignal = null;

  // Remove any existing panel
  document.getElementById('completion-micro-panel')?.remove();

  const today = new Date().toLocaleDateString('en-CA');

  const panel = document.createElement('div');
  panel.id = 'completion-micro-panel';
  panel.style.cssText = `
    position:fixed;bottom:0;left:0;right:0;z-index:500;

function setCmpSignal(sig) {
  _cmpSignal = _cmpSignal === sig ? null : sig;  // toggle
  const colors = { green:'#1D9E75', yellow:'#EF9F27', red:'#E24B4A' };
  ['green','yellow','red'].forEach(s => {
    const btn = document.getElementById(`cmp-sig-${s}`);
    if (btn) btn.style.background = _cmpSignal === s ? colors[s] : 'transparent';
  });
}

function closeCompletionPanel() {
  const panel = document.getElementById('completion-micro-panel');
  if (!panel) return;
  panel.style.transition = 'transform .15s ease, opacity .15s';
  panel.style.transform  = 'translateY(100%)';
  panel.style.opacity    = '0';
  setTimeout(() => panel.remove(), 160);
  _cmpItem   = null;
  _cmpSignal = null;
}

async function submitCompletion() {
  const item     = _cmpItem;
  if (!item) return;

  const hoursRaw = parseFloat(document.getElementById('cmp-hours')?.value || 0);
  const note     = (document.getElementById('cmp-note')?.value || '').trim();
  const billable = document.getElementById('cmp-billable')?.checked ?? true;
  const statusEl = document.getElementById('cmp-status');
  const submitBtn = document.getElementById('cmp-submit');

  // Validate: hours require a note
  if (hoursRaw > 0 && note.length < 10) {
    if (statusEl) statusEl.textContent = 'Add a note to log hours (10+ chars)';
    document.getElementById('cmp-note')?.focus();
    return;
  }

  if (submitBtn) { submitBtn.disabled = true; submitBtn.textContent = 'Saving…'; }
  if (statusEl)  statusEl.textContent = '';

  const today = new Date().toLocaleDateString('en-CA');
  const promises = [];

  // ── 1. Write time_entries row if hours logged ──────────────
  if (hoursRaw > 0) {
    promises.push(
      API.post('time_entries', {
        firm_id:     'aaaaaaaa-0001-0001-0001-000000000001',
        resource_id: _myResource?.id  || null,
        user_id:     _myResource?.user_id || null,
        project_id:  item.projectId   || null,
        task_id:     item.type === 'task'   ? item.id : null,
        source_type: 'direct',
        date:        today,
        hours:       hoursRaw,
        is_billable: billable,
        notes:       note || null,
      }).catch(() => {})
    );
  }

  // ── 2. Patch the work item status ──────────────────────────
  if (item.type === 'task') {
    promises.push(
      API.patch(`tasks?id=eq.${item.id}`, {
        status:       'complete',
        pct_complete: 100,
        updated_at:   new Date().toISOString(),
      }).catch(() => {})
    );
  } else if (item.type === 'action') {
    promises.push(
      API.patch(`workflow_action_items?id=eq.${item.id}`, {
        status:      'resolved',
        resolved_at: new Date().toISOString(),
        resolution_note: note || null,
      }).catch(() => {})
    );
  }

  try {
    await Promise.all(promises);
    closeCompletionPanel();
    compassToast(`${esc(item.title.slice(0,40))} — marked complete`);
    // Refresh the user view so the item disappears and bar chart updates
    _viewLoaded['user'] = false;
    loadUserView();
  } catch(e) {
    if (submitBtn) { submitBtn.disabled = false; submitBtn.textContent = 'Mark complete →'; }
    if (statusEl)  statusEl.textContent = 'Failed — try again';
  }
}

// Close panel on Escape key
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeCompletionPanel();
});

// ── Bar chart day filter ──────────────────────────────────
function filterTimeLog(date) {
  _teFilter = (_teFilter === date) ? null : date; // toggle
  _viewLoaded['user'] = false;
  loadUserView();
}

// ── Permanent delegated listener for My Work interactions ─
document.addEventListener('change', function(ev) {
  const projSel = ev.target.closest('.wf-proj-sel');
  if (projSel) {
    _wfProject = projSel.value;
    _viewLoaded['user'] = false; loadUserView();
  }
});
// Wired once at load — survives innerHTML re-renders because
// it lives on document, not on the content container.
document.addEventListener('click', function(ev) {
  // My Work filter buttons
  const statusBtn = ev.target.closest('.wf-status-btn');
  if (statusBtn) {
    _wfStatus = statusBtn.dataset.status;
    _viewLoaded['user'] = false; loadUserView(); return;
  }
  const dateBtn = ev.target.closest('.wf-date-btn');
  if (dateBtn) {
    _wfDateRange = dateBtn.dataset.range;
    _viewLoaded['user'] = false; loadUserView(); return;
  }
  // Week view button — opens full weekly timesheet
  if (ev.target.closest('.te-week-footer')) {
    const anyEntry = _teEntries[0];
    if (anyEntry) openWeeklyTimesheet(anyEntry);
    else compassToast('No entries this week', 2000);
    return;
  }
  // Clear filter button
  if (ev.target.closest('.te-clear-filter')) {
    filterTimeLog(null);
    return;
  }
  // Bar chart column
  const barCol = ev.target.closest('.te-bar-col');
  if (barCol && barCol.dataset.hasHours === 'true') {
    filterTimeLog(barCol.dataset.date);
    return;
  }
  // Time log row
  const teRow = ev.target.closest('.te-row');
  if (teRow) {
    const teId  = teRow.dataset.teId;
    const isCad = teRow.dataset.teCadence === 'true';

    // Update selected state and visual highlight
    _teSelected = teId;
    document.querySelectorAll('.te-row').forEach(r => {
      const isThis = r.dataset.teId === teId;
      r.style.borderLeft = isThis ? '2px solid var(--compass-cyan)' : '2px solid transparent';
      r.style.background = isThis ? 'rgba(0,210,255,.04)' : '';
      r.onmouseleave = () => { r.style.background = isThis ? 'rgba(0,210,255,.04)' : ''; };
    });

    if (isCad) {
      window.location.href = '/cadence.html';
      return;
    }
    const entry = _teEntries.find(e => e.id === teId);
    if (entry) {
      const proj = _projects.find(p => p.id === entry.project_id);
      openTimeEntryEdit({
        id:           entry.id,
        hours:        entry.hours,
        notes:        entry.notes || '',
        is_billable:  entry.is_billable,
        date:         entry.date,
        week_start_date: entry.week_start_date,
        project_id:   entry.project_id,
        project_name: proj?.name || '—',
        step_name:    entry.step_name || null,
        source_type:  entry.source_type,
      });
    }
    return;
  }
  // Work item Complete button
  const wiComplete = ev.target.closest('.wi-complete');
  if (wiComplete) {
    ev.stopPropagation();
    openCompletionPanel({
      id:        wiComplete.dataset.wiId,
      type:      wiComplete.dataset.wiType,
      title:     wiComplete.dataset.wiTitle,
      projectId: wiComplete.dataset.wiProjectid || null,
    });
    return;
  }
  // Work item row — open detail drawer
  const wiRow = ev.target.closest('.wi-row');
  if (wiRow && !ev.target.closest('.wi-complete')) {
    // Toggle selected class
    document.querySelectorAll('.wi-row').forEach(r => r.classList.remove('wi-selected'));
    wiRow.classList.add('wi-selected');
    const item = _wiItems.find(w => w.id === wiRow.dataset.wiId);
    if (item) openWorkItemDrawer(item);
    return;
  }
  // New time entry button
  if (ev.target.closest('.te-new-btn')) {
    openNewTimeEntry();
    return;
  }
  // Timesheet submit button
  const tsSubmit = ev.target.closest('.ts-submit-btn');
  if (tsSubmit) {
    submitTimesheetWeek(
      tsSubmit.dataset.weekId,
      tsSubmit.dataset.weekStart,
      tsSubmit.dataset.weekHours
    );
    return;
  }
});

// ── Time entry edit drawer ────────────────────────────────
function openTimeEntryEdit(entry, taskId = null, projectId = null) {
  if (!entry) { openNewTimeEntry(taskId, projectId); return; }
  document.getElementById('te-edit-drawer')?.remove();

  _teSelected = entry.id;
  document.querySelectorAll('.te-row').forEach(r => {
    const isSel = r.dataset.teId === entry.id;
    r.style.borderLeft = isSel ? '2px solid var(--compass-cyan)' : '2px solid transparent';
    r.style.background = isSel ? 'rgba(0,210,255,.04)' : '';
    r.onmouseleave = () => { r.style.background = isSel ? 'rgba(0,210,255,.04)' : ''; };
  });

  const isDirect = entry.source_type === 'direct';
  const proj     = _projects.find(p => p.id === entry.project_id);
  const title    = esc(entry.step_name || proj?.name || '—');
  const roAttr   = isDirect ? '' : 'readonly';
  const roStyle  = isDirect ? '' : 'opacity:.5;cursor:not-allowed';
  const disAttr  = isDirect ? '' : 'disabled';
  const billChk  = entry.is_billable ? 'checked' : '';
  const weekEntries = _teEntries.filter(e =>
    entry.week_start_date ? e.week_start_date === entry.week_start_date
      : e.date?.slice(0,7) === entry.date?.slice(0,7)
  );
  const weekTotal = weekEntries.reduce((s,e) => s + parseFloat(e.hours||0), 0);

  if (!document.getElementById('te-style')) {
    const s = document.createElement('style');
    s.id = 'te-style';
    s.textContent = '@keyframes te-slide-in{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}';
    document.head.appendChild(s);
  }

  const drawer = document.createElement('div');
  drawer.id = 'te-edit-drawer';
  drawer.style.cssText = 'position:fixed;top:0;right:0;bottom:0;width:360px;z-index:600;background:var(--bg1,#0c1628);border-left:1px solid var(--border,rgba(0,210,255,.12));box-shadow:-8px 0 32px rgba(0,0,0,.5);display:flex;flex-direction:column;animation:te-slide-in .2s ease;';

  drawer.innerHTML = `
    <div style="display:flex;align-items:flex-start;justify-content:space-between;
      padding:14px 16px 10px;border-bottom:1px solid var(--border);flex-shrink:0">
      <div>
        <div style="font-family:var(--font-mono);font-size:11px;letter-spacing:.1em;
          text-transform:uppercase;color:var(--compass-cyan);margin-bottom:3px">
          ${isDirect ? 'Edit entry' : 'Entry detail'}</div>
        <div style="font-family:var(--font-ui);font-size:13px;font-weight:500;color:var(--text0)">${title}</div>
        <div style="font-family:var(--font-mono);font-size:11px;color:var(--text3);margin-top:3px">
          ${new Date(entry.date+'T00:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})}
          · ${entry.is_billable ? 'Billable' : 'Non-billable'}
          · ${entry.source_type === 'step_comment' ? 'via Cadence' : 'Direct'}
        </div>
      </div>
      <button onclick="document.getElementById('te-edit-drawer').remove();_teSelected=null;"
        style="background:none;border:none;color:var(--text3);font-size:18px;cursor:pointer;padding:0;line-height:1"
        onmouseenter="this.style.color='var(--text0)'" onmouseleave="this.style.color='var(--text3)'">✕</button>
    </div>

    <div style="flex:1;overflow-y:auto;padding:16px">
      ${!isDirect ? `
      <div style="background:rgba(239,159,39,.06);border:1px solid rgba(239,159,39,.25);
        padding:9px 12px;margin-bottom:14px;font-family:var(--font-mono);font-size:11px;
        color:var(--compass-amber);line-height:1.6">
        Created via ${entry.source_type === 'step_comment' ? 'Cadence' : 'import'} — edit in source system.
      </div>` : ''}
      <div style="display:grid;grid-template-columns:80px 1fr;gap:10px;margin-bottom:14px">
        <div>
          <div style="font-family:var(--font-mono);font-size:11px;color:var(--text3);
            letter-spacing:.07em;text-transform:uppercase;margin-bottom:4px">Hours</div>
          <input id="te-hours" type="number" min="0.25" max="24" step="0.25"
            value="${parseFloat(entry.hours).toFixed(2)}" ${roAttr}
            style="width:100%;font-family:var(--font-mono);font-size:16px;font-weight:600;
              padding:7px 8px;background:var(--bg2);text-align:center;
              border:1px solid rgba(0,210,255,.3);color:var(--compass-cyan);
              outline:none;box-sizing:border-box;${roStyle}" />
        </div>
        <div>
          <div style="font-family:var(--font-mono);font-size:11px;color:var(--text3);
            letter-spacing:.07em;text-transform:uppercase;margin-bottom:4px">Notes</div>
          <textarea id="te-notes" rows="3" ${roAttr}
            style="width:100%;font-family:var(--font-ui);font-size:12px;padding:7px 8px;
              background:var(--bg2);border:1px solid rgba(0,210,255,.15);color:var(--text1);
              outline:none;resize:vertical;min-height:60px;box-sizing:border-box;${roStyle}"
            placeholder="What did you work on?">${esc(entry.notes || '')}</textarea>
        </div>
      </div>
      <label style="display:flex;align-items:center;gap:8px;cursor:${isDirect ? 'pointer' : 'default'};margin-bottom:14px">

        document.removeEventListener('mousedown', closeTES);

function openWeeklyTimesheet(entry) {
  document.getElementById('te-edit-drawer')?.remove();

  const weekEntries = _teEntries.filter(e =>
    entry.week_start_date ? e.week_start_date === entry.week_start_date
      : e.date?.slice(0,7) === entry.date?.slice(0,7)
  ).sort((a,b) => a.date.localeCompare(b.date) || a.id.localeCompare(b.id));

  const weekTotal = weekEntries.reduce((s,e) => s + parseFloat(e.hours||0), 0);
  const weekLabel = (() => {
    if (!entry.week_start_date) return fmtDate(entry.date);
    const ws = new Date(entry.week_start_date+'T00:00:00');
    return ws.toLocaleDateString('en-US',{month:'short',day:'numeric'})
      + ' – ' + new Date(ws.getTime()+6*86400000).toLocaleDateString('en-US',{month:'short',day:'numeric'});
  })();

  const drawer = document.createElement('div');
  drawer.id = 'te-edit-drawer';
  drawer.style.cssText = 'position:fixed;top:0;right:0;bottom:0;width:460px;z-index:600;background:var(--bg1,#0c1628);border-left:1px solid var(--border,rgba(0,210,255,.12));box-shadow:-8px 0 32px rgba(0,0,0,.5);display:flex;flex-direction:column;animation:te-slide-in .2s ease;';

  const rowHtml = weekEntries.map(e => {
    const proj    = _projects.find(p => p.id === e.project_id);
    const isDirect = e.source_type === 'direct';
    const srcIcon  = e.source_type === 'step_comment' ? '◈' : '●';
    const srcColor = e.source_type === 'step_comment' ? 'var(--compass-cyan)' : 'var(--text3)';
    const dayName  = new Date(e.date+'T00:00:00').toLocaleDateString('en-US',{weekday:'short',day:'numeric',month:'short'});
    return `<div style="border-bottom:1px solid var(--border);padding:9px 16px">
      <div style="display:flex;align-items:center;gap:7px;margin-bottom:6px">
        <span style="font-size:11px;color:${srcColor};flex-shrink:0">${srcIcon}</span>
        <span style="font-family:var(--font-mono);font-size:11px;font-weight:600;color:var(--text0);flex-shrink:0">${dayName}</span>
        <span style="font-family:var(--font-ui);font-size:11px;color:var(--text2);
          flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">
          ${esc(e.step_name || proj?.name || '—')}</span>
        ${isDirect ? `<button data-del="${e.id}"
          style="background:none;border:none;color:rgba(226,75,74,.4);font-size:12px;
            cursor:pointer;padding:0;line-height:1;flex-shrink:0"
          onmouseenter="this.style.color='var(--compass-red)'"
          onmouseleave="this.style.color='rgba(226,75,74,.4)'">✕</button>` : ''}
      </div>
      <div style="display:grid;grid-template-columns:68px 1fr 24px 48px;gap:6px;align-items:center">
        <input type="number" min="0.25" max="24" step="0.25"
          value="${parseFloat(e.hours).toFixed(2)}" ${!isDirect ? 'readonly' : ''}
          data-id="${e.id}" data-f="hours"
          style="font-family:var(--font-mono);font-size:13px;font-weight:600;padding:5px 6px;
            background:var(--bg2);text-align:center;
            border:1px solid var(--border);color:${e.is_billable ? 'var(--compass-cyan)' : 'var(--text2)'};
            outline:none;width:100%;box-sizing:border-box;${!isDirect ? 'opacity:.5;cursor:not-allowed' : ''}"/>
        <input type="text" value="${esc(e.notes||'')}" ${!isDirect ? 'readonly' : ''}
          data-id="${e.id}" data-f="notes" placeholder="${isDirect ? 'Notes…' : '—'}"
          style="font-family:var(--font-ui);font-size:11px;padding:5px 7px;
            background:var(--bg2);border:1px solid var(--border);color:var(--text1);
            outline:none;width:100%;box-sizing:border-box;${!isDirect ? 'opacity:.5;cursor:not-allowed' : ''}"/>
        <label style="display:flex;justify-content:center;cursor:${isDirect ? 'pointer' : 'default'}">
          <input type="checkbox" ${e.is_billable ? 'checked' : ''} ${!isDirect ? 'disabled' : ''}
            data-id="${e.id}" data-f="billable"
            style="accent-color:var(--compass-cyan);width:13px;height:13px"/>
        </label>
        ${isDirect
          ? `<button data-save="${e.id}"
              style="font-family:var(--font-mono);font-size:11px;font-weight:600;padding:5px 0;
                background:var(--compass-cyan);color:#060a10;border:none;cursor:pointer;width:100%"
              onmouseenter="this.style.opacity='.85'" onmouseleave="this.style.opacity='1'">Save</button>`
          : `<span style="font-family:var(--font-mono);font-size:11px;color:var(--text3);text-align:center">${srcIcon}</span>`}
      </div>
    </div>`;
  }).join('');

  drawer.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;
      padding:14px 16px 10px;border-bottom:1px solid var(--border);flex-shrink:0">
      <div>
        <div style="font-family:var(--font-mono);font-size:11px;letter-spacing:.1em;
          text-transform:uppercase;color:var(--compass-cyan);margin-bottom:2px">Timesheet</div>
        <div style="font-family:var(--font-ui);font-size:13px;font-weight:500;color:var(--text0)">
          Week of ${weekLabel}</div>
        <div style="font-family:var(--font-mono);font-size:11px;color:var(--text3);margin-top:2px">
          ${weekEntries.length} ${weekEntries.length === 1 ? 'entry' : 'entries'} ·
          <span style="color:var(--compass-cyan);font-weight:600">${weekTotal.toFixed(1)}h</span>
        </div>
      </div>
      <button onclick="document.getElementById('te-edit-drawer').remove()"
        style="background:none;border:none;color:var(--text3);font-size:18px;cursor:pointer;padding:0;line-height:1"
        onmouseenter="this.style.color='var(--text0)'" onmouseleave="this.style.color='var(--text3)'">✕</button>
    </div>
    <div style="display:grid;grid-template-columns:68px 1fr 24px 48px;gap:6px;
      padding:5px 16px;border-bottom:1px solid var(--border);flex-shrink:0;
      font-family:var(--font-mono);font-size:11px;color:var(--text3);
      letter-spacing:.07em;text-transform:uppercase">
      <span>Hours</span><span>Notes</span>
      <span style="text-align:center">Bill</span><span></span>
    </div>
    <div style="flex:1;overflow-y:auto">
      ${rowHtml || '<div style="padding:20px 16px;font-family:var(--font-mono);font-size:11px;color:var(--text3)">No entries this week</div>'}
    </div>
    <div style="padding:10px 16px;border-top:1px solid var(--border);
      display:flex;align-items:center;justify-content:space-between;flex-shrink:0">
      <button class="te-new-btn"
        style="font-family:var(--font-mono);font-size:11px;font-weight:600;letter-spacing:.06em;
          color:var(--compass-cyan);background:none;border:1px solid rgba(0,210,255,.25);
          padding:5px 12px;cursor:pointer"
        onmouseenter="this.style.background='rgba(0,210,255,.08)'"
        onmouseleave="this.style.background='none'">+ Log time</button>
      <button onclick="document.getElementById('te-edit-drawer').remove()"
        style="font-family:var(--font-mono);font-size:11px;padding:5px 14px;background:none;
          border:1px solid var(--border);color:var(--text3);cursor:pointer">Close</button>
    </div>`;

  document.body.appendChild(drawer);

  drawer.addEventListener('click', async ev => {
    const saveBtn = ev.target.closest('[data-save]');
    if (saveBtn) {
      const id    = saveBtn.dataset.save;
      const hours = parseFloat(drawer.querySelector('[data-id="'+id+'"][data-f="hours"]')?.value);
      const notes = drawer.querySelector('[data-id="'+id+'"][data-f="notes"]')?.value?.trim() || null;
      const bill  = drawer.querySelector('[data-id="'+id+'"][data-f="billable"]')?.checked ?? true;
      if (!hours || hours <= 0) { compassToast('Hours must be > 0', 2000); return; }
      saveBtn.textContent = '…'; saveBtn.disabled = true;
      try {
        await API.patch('time_entries?id=eq.'+id, { hours, notes, is_billable: bill, updated_at: new Date().toISOString() });
        compassToast('Saved'); _viewLoaded['user'] = false; drawer.remove(); loadUserView();
      } catch(e) { saveBtn.textContent = 'Save'; saveBtn.disabled = false; compassToast('Failed', 2000); }
    }
    const delBtn = ev.target.closest('[data-del]');
    if (delBtn) {
      if (!confirm('Delete this entry?')) return;
      try {
        await API.del('time_entries?id=eq.'+delBtn.dataset.del);
        compassToast('Deleted'); _viewLoaded['user'] = false; drawer.remove(); loadUserView();
      } catch(e) { compassToast('Failed', 2000); }
    }
  });

  setTimeout(() => {
    document.addEventListener('mousedown', function closeTEW(ev) {
      if (!drawer.contains(ev.target)) { drawer.remove(); document.removeEventListener('mousedown', closeTEW); }
    });
  }, 50);
}

// ── Work Item Detail Drawer ───────────────────────────────

      </div>
      <button onclick="document.getElementById('wi-drawer').remove()"
        style="background:none;border:none;color:var(--text3);font-size:18px;
          cursor:pointer;padding:0 0 0 12px;line-height:1;flex-shrink:0"
        onmouseenter="this.style.color='var(--text0)'"
        onmouseleave="this.style.color='var(--text3)'">✕</button>

    <div style="flex:1;overflow-y:auto;padding:16px">

          <span>Progress</span><span style="color:var(--compass-cyan)">${item.pct}%</span>
        </div>
        <div style="height:4px;background:var(--bg2);border-radius:2px;overflow:hidden">
          <div style="height:100%;width:${item.pct}%;background:var(--compass-cyan);
            border-radius:2px;transition:width .3s"></div>

      </div>` : ''}

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px">
        <div style="background:var(--bg2);padding:10px 12px;border:1px solid var(--border)">
          <div style="font-family:var(--font-mono);font-size:11px;color:var(--text3);
            letter-spacing:.08em;text-transform:uppercase;margin-bottom:3px">Status</div>
          <div style="font-family:var(--font-ui);font-size:12px;font-weight:500;
            color:var(--text0);text-transform:capitalize">${(item.status || 'open').replace('_',' ')}</div>
        </div>
        <div style="background:var(--bg2);padding:10px 12px;border:1px solid var(--border)">
          <div style="font-family:var(--font-mono);font-size:11px;color:var(--text3);

        letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px">Actions</div>

// ── New Direct Time Entry ─────────────────────────────────
function openNewTimeEntry(taskId = null, projectId = null) {

  document.getElementById('wi-drawer')?.remove();

  const drawer = document.createElement('div');
  drawer.id = 'te-edit-drawer';
  drawer.style.cssText = `
    position:fixed;top:0;right:0;bottom:0;width:320px;z-index:600;

    border-left:1px solid var(--border,rgba(0,210,255,.12));

    display:flex;flex-direction:column;
    animation:te-slide-in .2s ease;

    <div style="display:flex;align-items:center;justify-content:space-between;
      padding:16px 16px 12px;border-bottom:1px solid var(--border);flex-shrink:0">
      <div>
        <div style="font-family:var(--font-mono);font-size:11px;letter-spacing:.1em;
          text-transform:uppercase;color:var(--compass-cyan);margin-bottom:3px">Log time</div>
        <div style="font-family:var(--font-ui);font-size:13px;font-weight:500;color:var(--text0)">
          New time entry</div>
      </div>
      <button onclick="document.getElementById('te-edit-drawer').remove()"
        style="background:none;border:none;color:var(--text3);font-size:18px;

      <div style="margin-bottom:14px">
        <label class="te-label">Date</label>
        <input id="te-new-date" class="te-input" type="date" value="${today}" />
      </div>
      <div style="margin-bottom:14px">
        <label class="te-label">Project</label>
        <select id="te-new-project" class="te-input" style="font-size:12px">

        <label class="te-label">Notes</label>
        <textarea id="te-new-notes" class="te-input" rows="3"
          style="resize:vertical;min-height:70px"
          placeholder="What did you work on?"></textarea>
      </div>

      <span id="te-new-status" style="font-family:var(--font-mono);font-size:11px;

          text-transform:uppercase;padding:7px 14px;background:none;

        style="flex:1;font-family:var(--font-mono);font-size:11px;font-weight:600;
          letter-spacing:.08em;text-transform:uppercase;padding:7px;
          background:var(--compass-cyan);color:#060a10;border:none;cursor:pointer"

  document.body.appendChild(drawer);

        document.removeEventListener('mousedown', closeTENew);
      }

async function saveNewTimeEntry(taskId, projectId) {
  const date     = document.getElementById('te-new-date')?.value;
  const projId   = document.getElementById('te-new-project')?.value || projectId || null;
  const hours    = parseFloat(document.getElementById('te-new-hours')?.value);
  const notes    = document.getElementById('te-new-notes')?.value?.trim() || null;
  const billable = document.getElementById('te-new-billable')?.checked ?? true;
  const statusEl = document.getElementById('te-new-status');

  if (!date)            { if(statusEl) statusEl.textContent = 'Date required'; return; }
  if (!hours || hours <= 0) { if(statusEl) statusEl.textContent = 'Hours required'; return; }
  if (!projId)          { if(statusEl) statusEl.textContent = 'Project required'; return; }

  try {
    await API.post('time_entries', {
      firm_id:     'aaaaaaaa-0001-0001-0001-000000000001',
      resource_id: _myResource?.id   || null,
      user_id:     _myResource?.user_id || null,
      project_id:  projId,
      task_id:     taskId || null,
      source_type: 'direct',
      date,
      hours,
      is_billable: billable,
      notes,
    });
    document.getElementById('te-edit-drawer')?.remove();
    compassToast('Time entry saved');
    _viewLoaded['user'] = false;
    loadUserView();
  } catch(e) {
    if(statusEl) statusEl.textContent = 'Failed — ' + e.message;
  }
}

// ── Timesheet Week Submit ─────────────────────────────────
async function submitTimesheetWeek(weekId, weekStart, weekHours) {
  const note = prompt(`Submit ${weekHours}h for week of ${weekStart} for approval?\n\nAdd a note (optional):`);
  if (note === null) return; // cancelled

  try {
    if (weekId) {
      // Week container exists — update status to submitted
      await API.patch(`timesheet_weeks?id=eq.${weekId}`, {
        status:       'submitted',
        submitted_at: new Date().toISOString(),
        resource_notes: note || null,
        updated_at:   new Date().toISOString(),
      });
    } else {
      // No week container yet — create it as submitted
      await API.post('timesheet_weeks', {
        firm_id:        'aaaaaaaa-0001-0001-0001-000000000001',
        resource_id:    _myResource?.id,
        week_start_date: weekStart,
        week_end_date:  new Date(new Date(weekStart+'T00:00:00').getTime() + 6*86400000).toLocaleDateString('en-CA'),
        total_hours:    parseFloat(weekHours),
        status:         'submitted',
        submitted_at:   new Date().toISOString(),
        resource_notes: note || null,
      });
    }
    compassToast('Timesheet submitted for approval');
    _viewLoaded['user'] = false;
    loadUserView();
  } catch(e) {
    compassToast('Submit failed — ' + e.message, 3000);
  }
}
